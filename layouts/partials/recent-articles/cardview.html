{{ $n := .Site.Params.homepage.showRecentItems | default 50 }}
{{ $pages := sort (where .Site.RegularPages "Type" "in" .Site.Params.mainSections) "Lastmod" "desc" }}

<section class="w-full grid gap-4 sm:grid-cols-2 md:grid-cols-3">
  {{ range first $n $pages }}
    {{ partial "article-link/card.html" . }}
  {{ end }}
</section>
