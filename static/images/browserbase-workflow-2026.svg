<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Browserbase Workflow 2026</title>
  <desc id="desc">Browserbase infrastructure workflow showing app, sessions, stealth and observability.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Browserbase Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Cloud browser infrastructure, sessions, stealth and observability</text>

  <rect x="80" y="210" width="220" height="120" rx="24" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="144" y="262" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">App</text>
  <text x="104" y="292" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Stagehand / Playwright</text>

  <rect x="350" y="150" width="500" height="370" rx="28" fill="#fff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="515" y="202" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Browserbase</text>
  <rect x="405" y="245" width="160" height="82" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="442" y="295" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">sessions</text>
  <rect x="625" y="245" width="160" height="82" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="667" y="295" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">stealth</text>
  <rect x="405" y="360" width="160" height="82" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="421" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">session</text>
  <text x="426" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">inspector</text>
  <rect x="625" y="360" width="160" height="82" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="644" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">proxies</text>
  <text x="637" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">recordings</text>

  <rect x="920" y="210" width="200" height="120" rx="24" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="954" y="262" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Cloud Browser</text>
  <text x="962" y="292" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">live view</text>

  <path d="M300 270 C330 270, 338 270, 350 270" fill="none" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M850 270 C885 270, 900 270, 920 270" fill="none" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M485 327 C485 337, 485 347, 485 360" fill="none" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M705 327 C705 337, 705 347, 705 360" fill="none" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
