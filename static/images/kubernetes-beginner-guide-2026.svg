<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#F8FAFC" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Kubernetes 클러스터 구조</text>

  <!-- Cluster border -->
  <rect x="20" y="55" width="760" height="370" rx="10" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="40" y="75" font-size="12" fill="#3B82F6" font-weight="bold">Kubernetes Cluster</text>

  <!-- Control Plane -->
  <rect x="40" y="85" width="340" height="150" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="210" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">Control Plane (Master Node)</text>

  <rect x="55" y="118" width="140" height="50" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="125" y="139" text-anchor="middle" font-size="12" font-weight="bold" fill="#6D28D9">API Server</text>
  <text x="125" y="157" text-anchor="middle" font-size="10" fill="#7C3AED">모든 요청의 관문</text>

  <rect x="215" y="118" width="140" height="50" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="285" y="139" text-anchor="middle" font-size="12" font-weight="bold" fill="#6D28D9">Scheduler</text>
  <text x="285" y="157" text-anchor="middle" font-size="10" fill="#7C3AED">Pod 배치 결정</text>

  <rect x="55" y="178" width="140" height="50" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="125" y="199" text-anchor="middle" font-size="12" font-weight="bold" fill="#6D28D9">Controller Mgr</text>
  <text x="125" y="217" text-anchor="middle" font-size="10" fill="#7C3AED">상태 유지 관리</text>

  <rect x="215" y="178" width="140" height="50" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="285" y="199" text-anchor="middle" font-size="12" font-weight="bold" fill="#6D28D9">etcd</text>
  <text x="285" y="217" text-anchor="middle" font-size="10" fill="#7C3AED">클러스터 상태 저장</text>

  <!-- Worker Node 1 -->
  <rect x="420" y="85" width="165" height="200" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="503" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">Worker Node 1</text>

  <rect x="435" y="118" width="135" height="40" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="503" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">Pod (nginx)</text>
  <text x="503" y="150" text-anchor="middle" font-size="10" fill="#B45309">Container x2</text>

  <rect x="435" y="167" width="135" height="40" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="503" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">Pod (app)</text>
  <text x="503" y="199" text-anchor="middle" font-size="10" fill="#B45309">Container x1</text>

  <rect x="435" y="216" width="135" height="40" rx="5" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="503" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">kubelet</text>
  <text x="503" y="248" text-anchor="middle" font-size="10" fill="#6B7280">노드 에이전트</text>

  <rect x="435" y="262" width="135" height="15" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="503" y="274" text-anchor="middle" font-size="9" fill="#6B7280">kube-proxy</text>

  <!-- Worker Node 2 -->
  <rect x="605" y="85" width="165" height="200" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="688" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">Worker Node 2</text>

  <rect x="620" y="118" width="135" height="40" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="688" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">Pod (db)</text>
  <text x="688" y="150" text-anchor="middle" font-size="10" fill="#B45309">Container x1</text>

  <rect x="620" y="167" width="135" height="40" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="688" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">Pod (cache)</text>
  <text x="688" y="199" text-anchor="middle" font-size="10" fill="#B45309">Container x1</text>

  <rect x="620" y="216" width="135" height="40" rx="5" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="688" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">kubelet</text>
  <text x="688" y="248" text-anchor="middle" font-size="10" fill="#6B7280">노드 에이전트</text>

  <rect x="620" y="262" width="135" height="15" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="688" y="274" text-anchor="middle" font-size="9" fill="#6B7280">kube-proxy</text>

  <!-- Arrow from Control Plane to Worker Nodes -->
  <line x1="380" y1="160" x2="420" y2="160" stroke="#3B82F6" stroke-width="2" marker-end="url(#k8sarrow)"/>
  <line x1="380" y1="185" x2="605" y2="185" stroke="#3B82F6" stroke-width="2" marker-end="url(#k8sarrow)"/>

  <!-- Service / Deployment / Ingress -->
  <rect x="40" y="265" width="340" height="140" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="210" y="288" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400E">핵심 리소스</text>

  <rect x="55" y="298" width="95" height="55" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="103" y="318" text-anchor="middle" font-size="12" font-weight="bold" fill="#1D4ED8">Deployment</text>
  <text x="103" y="336" text-anchor="middle" font-size="10" fill="#3B82F6">Pod 복제 수</text>
  <text x="103" y="349" text-anchor="middle" font-size="10" fill="#3B82F6">롤링 업데이트</text>

  <rect x="163" y="298" width="95" height="55" rx="5" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="211" y="318" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">Service</text>
  <text x="211" y="336" text-anchor="middle" font-size="10" fill="#10B981">로드 밸런싱</text>
  <text x="211" y="349" text-anchor="middle" font-size="10" fill="#10B981">안정적 IP</text>

  <rect x="271" y="298" width="95" height="55" rx="5" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="319" y="318" text-anchor="middle" font-size="12" font-weight="bold" fill="#6D28D9">Ingress</text>
  <text x="319" y="336" text-anchor="middle" font-size="10" fill="#8B5CF6">HTTP 라우팅</text>
  <text x="319" y="349" text-anchor="middle" font-size="10" fill="#8B5CF6">TLS 종료</text>

  <rect x="55" y="363" width="310" height="30" rx="5" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="210" y="378" text-anchor="middle" font-size="11" fill="#991B1B">ConfigMap / Secret — 설정 및 민감정보 분리 관리</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="k8sarrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
  </defs>

  <text x="400" y="440" text-anchor="middle" font-size="11" fill="#9CA3AF">Kubernetes — Control Plane이 Worker Node의 Pod를 선언적으로 관리</text>
</svg>
