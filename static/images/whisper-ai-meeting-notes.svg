<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <rect width="800" height="450" fill="#F8FAFC" rx="12"/>
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">Whisper AI 회의록 자동화 파이프라인</text>

  <!-- Audio Input -->
  <rect x="20" y="80" width="130" height="100" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="85" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">음성 입력</text>
  <text x="85" y="135" text-anchor="middle" font-size="11" fill="#1D4ED8">회의 녹음</text>
  <text x="85" y="152" text-anchor="middle" font-size="11" fill="#1D4ED8">MP3 / WAV</text>
  <text x="85" y="169" text-anchor="middle" font-size="11" fill="#1D4ED8">M4A / OGG</text>

  <line x1="150" y1="130" x2="185" y2="130" stroke="#6B7280" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Whisper STT -->
  <rect x="185" y="80" width="155" height="100" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="262" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">Whisper STT</text>
  <text x="262" y="130" text-anchor="middle" font-size="11" fill="#047857">음성 → 텍스트 변환</text>
  <text x="262" y="148" text-anchor="middle" font-size="11" fill="#047857">타임스탬프 포함</text>
  <text x="262" y="166" text-anchor="middle" font-size="11" fill="#047857">다국어 지원</text>

  <line x1="340" y1="130" x2="375" y2="130" stroke="#6B7280" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- LLM Summary -->
  <rect x="375" y="80" width="155" height="100" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="452" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">LLM 요약</text>
  <text x="452" y="130" text-anchor="middle" font-size="11" fill="#B45309">핵심 내용 추출</text>
  <text x="452" y="148" text-anchor="middle" font-size="11" fill="#B45309">액션 아이템 정리</text>
  <text x="452" y="166" text-anchor="middle" font-size="11" fill="#B45309">화자별 발언 분류</text>

  <line x1="530" y1="130" x2="565" y2="130" stroke="#6B7280" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Output -->
  <rect x="565" y="80" width="155" height="100" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="642" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#4C1D95">회의록 출력</text>
  <text x="642" y="130" text-anchor="middle" font-size="11" fill="#6D28D9">Markdown 문서</text>
  <text x="642" y="148" text-anchor="middle" font-size="11" fill="#6D28D9">Notion 연동</text>
  <text x="642" y="166" text-anchor="middle" font-size="11" fill="#6D28D9">Slack 공유</text>

  <!-- Code Block -->
  <rect x="20" y="210" width="370" height="210" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="40" y="235" font-size="13" font-weight="bold" fill="#94A3B8"># Whisper 설치 및 기본 사용</text>
  <text x="40" y="258" font-size="12" fill="#10B981">pip install openai-whisper</text>
  <text x="40" y="278" font-size="12" fill="#64748B">import whisper</text>
  <text x="40" y="298" font-size="12" fill="#64748B">model = whisper.load_model(<tspan fill="#FCD34D">"large-v3"</tspan>)</text>
  <text x="40" y="318" font-size="12" fill="#64748B">result = model.transcribe(</text>
  <text x="40" y="338" font-size="12" fill="#64748B">    <tspan fill="#FCD34D">"meeting.mp3"</tspan>, language=<tspan fill="#FCD34D">"ko"</tspan></text>
  <text x="40" y="358" font-size="12" fill="#64748B">)</text>
  <text x="40" y="378" font-size="12" fill="#64748B">print(result[<tspan fill="#FCD34D">"text"</tspan>])</text>
  <text x="40" y="398" font-size="12" fill="#94A3B8"># segments로 타임스탬프 접근 가능</text>

  <!-- Model Comparison -->
  <rect x="410" y="210" width="370" height="210" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="595" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">모델별 성능 비교</text>
  <rect x="425" y="248" width="340" height="28" rx="4" fill="#F3F4F6" stroke="#E2E8F0"/>
  <text x="510" y="267" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">모델</text>
  <text x="630" y="267" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">속도</text>
  <text x="730" y="267" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">정확도</text>
  <rect x="425" y="280" width="340" height="26" rx="4" fill="#DBEAFE"/>
  <text x="510" y="297" text-anchor="middle" font-size="11" fill="#1E40AF">tiny</text>
  <text x="630" y="297" text-anchor="middle" font-size="11" fill="#1E40AF">매우 빠름</text>
  <text x="730" y="297" text-anchor="middle" font-size="11" fill="#1E40AF">보통</text>
  <rect x="425" y="310" width="340" height="26" rx="4" fill="#D1FAE5"/>
  <text x="510" y="327" text-anchor="middle" font-size="11" fill="#065F46">base / small</text>
  <text x="630" y="327" text-anchor="middle" font-size="11" fill="#065F46">빠름</text>
  <text x="730" y="327" text-anchor="middle" font-size="11" fill="#065F46">양호</text>
  <rect x="425" y="340" width="340" height="26" rx="4" fill="#FEF3C7"/>
  <text x="510" y="357" text-anchor="middle" font-size="11" fill="#92400E">medium</text>
  <text x="630" y="357" text-anchor="middle" font-size="11" fill="#92400E">보통</text>
  <text x="730" y="357" text-anchor="middle" font-size="11" fill="#92400E">우수</text>
  <rect x="425" y="370" width="340" height="26" rx="4" fill="#EDE9FE"/>
  <text x="510" y="387" text-anchor="middle" font-size="11" fill="#4C1D95">large-v3</text>
  <text x="630" y="387" text-anchor="middle" font-size="11" fill="#4C1D95">느림</text>
  <text x="730" y="387" text-anchor="middle" font-size="11" fill="#4C1D95">최고</text>

  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
  </defs>
</svg>
