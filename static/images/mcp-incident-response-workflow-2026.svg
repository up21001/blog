<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#081120"/>
      <stop offset="100%" stop-color="#102a43"/>
    </linearGradient>
    <style>
      .t{font:700 34px Arial, sans-serif; fill:#f8fafc}
      .s{font:500 18px Arial, sans-serif; fill:#cbd5e1}
      .b{fill:#0f172a; stroke:#7dd3fc; stroke-width:2}
      .w{fill:#ffffff; font:600 18px Arial, sans-serif}
      .a{fill:none; stroke:#f8fafc; stroke-width:3; marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f8fafc"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="72" class="t">MCP Incident Response Workflow</text>
  <text x="60" y="108" class="s">detect -> isolate -> recover -> replay -> postmortem</text>
  <rect x="70" y="180" width="180" height="92" rx="18" class="b"/><text x="160" y="235" text-anchor="middle" class="w">Detect</text>
  <rect x="300" y="180" width="180" height="92" rx="18" class="b"/><text x="390" y="235" text-anchor="middle" class="w">Triage</text>
  <rect x="530" y="180" width="180" height="92" rx="18" class="b"/><text x="620" y="235" text-anchor="middle" class="w">Isolate</text>
  <rect x="760" y="180" width="180" height="92" rx="18" class="b"/><text x="850" y="235" text-anchor="middle" class="w">Recover</text>
  <rect x="990" y="180" width="150" height="92" rx="18" class="b"/><text x="1065" y="235" text-anchor="middle" class="w">Replay</text>
  <path d="M250 226 L300 226" class="a"/><path d="M480 226 L530 226" class="a"/><path d="M710 226 L760 226" class="a"/><path d="M940 226 L990 226" class="a"/>
  <rect x="220" y="360" width="320" height="120" rx="22" fill="#1d4ed8"/><text x="380" y="408" text-anchor="middle" class="w">Alert + Scope + Runbook</text><text x="380" y="438" text-anchor="middle" class="s">push the incident into a controlled path</text>
  <rect x="620" y="360" width="420" height="120" rx="22" fill="#0f766e"/><text x="830" y="408" text-anchor="middle" class="w">Postmortem + Policy Update</text><text x="830" y="438" text-anchor="middle" class="s">capture why the same failure should not recur</text>
</svg>
