<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Deepgram Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when Deepgram is a good fit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d4ed8" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Should You Use Deepgram?</text>
  <rect x="435" y="120" width="330" height="90" rx="22" fill="#fff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
  <text x="490" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Building voice AI?</text>
  <rect x="110" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="165" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">No</text>
  <text x="148" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">A text-only AI stack may be enough</text>
  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="491" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Need STT and</text>
  <text x="523" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">TTS too?</text>
  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="823" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Need self-hosted or</text>
  <text x="853" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">intelligence?</text>
  <rect x="445" y="500" width="330" height="110" rx="26" fill="#1e3a8a" filter="url(#shadow)"/>
  <text x="515" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#eff6ff">Use Deepgram</text>
  <text x="476" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#bfdbfe">Strong fit for end-to-end voice stacks</text>
  <path d="M600 210 L600 285" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <path d="M450 340 L410 340" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <path d="M750 340 L790 340" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <path d="M600 395 L600 500" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
</svg>
