<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Cerebras Choice Flow 2026</title>
  <desc id="desc">Decision flow for when to use Cerebras inference platform.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1e3a8a" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1e3a8a"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Should You Use Cerebras?</text>
  <rect x="430" y="120" rx="22" ry="22" width="340" height="90" fill="#fff" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow2)"/>
  <text x="466" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Need ultra-fast inference?</text>
  <rect x="120" y="285" rx="24" ry="24" width="300" height="110" fill="#fff" stroke="#94a3b8" filter="url(#shadow2)"/>
  <text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">No</text>
  <text x="136" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">A standard model API may be enough</text>
  <rect x="450" y="285" rx="24" ry="24" width="300" height="110" fill="#fff" stroke="#94a3b8" filter="url(#shadow2)"/>
  <text x="496" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Need OpenAI</text>
  <text x="500" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">compatibility?</text>
  <rect x="790" y="285" rx="24" ry="24" width="300" height="110" fill="#fff" stroke="#94a3b8" filter="url(#shadow2)"/>
  <text x="832" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Need reasoning and</text>
  <text x="859" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">metrics too?</text>
  <rect x="445" y="500" rx="26" ry="26" width="320" height="110" fill="#1e3a8a" filter="url(#shadow2)"/>
  <text x="520" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#f8fafc">Use Cerebras</text>
  <text x="482" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#cbd5e1">Best for speed-critical inference</text>
  <path d="M600 210 L600 285" fill="none" stroke="#1e3a8a" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M450 340 L420 340" fill="none" stroke="#1e3a8a" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M750 340 L790 340" fill="none" stroke="#1e3a8a" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M600 395 L600 500" fill="none" stroke="#1e3a8a" stroke-width="4" marker-end="url(#arrow2)"/>
</svg>
