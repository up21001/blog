<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AnythingLLM Workflow 2026</title>
  <desc id="desc">Workflow diagram for AnythingLLM desktop, workspace, documents, agents, and API usage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1e3a8a" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4338ca"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">AnythingLLM Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">Desktop first workspace for docs, agents, and local knowledge chat</text>

  <rect x="80" y="190" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#a5b4fc" filter="url(#shadow)"/>
  <text x="126" y="245" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Desktop</text>
  <text x="105" y="278" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">Local private app</text>

  <rect x="360" y="140" rx="28" ry="28" width="480" height="360" fill="#fff" stroke="#818cf8" stroke-width="2" filter="url(#shadow)"/>
  <text x="515" y="196" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">AnythingLLM</text>

  <rect x="405" y="228" rx="18" ry="18" width="160" height="90" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="434" y="280" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Documents</text>

  <rect x="615" y="228" rx="18" ry="18" width="160" height="90" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="657" y="268" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Agents</text>
  <text x="650" y="296" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">skills/flows</text>

  <rect x="405" y="350" rx="18" ry="18" width="160" height="90" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="451" y="390" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">LLM</text>
  <text x="437" y="418" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">local/cloud</text>

  <rect x="615" y="350" rx="18" ry="18" width="160" height="90" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="652" y="390" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">API</text>
  <text x="635" y="418" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">integration</text>

  <rect x="920" y="190" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#a5b4fc" filter="url(#shadow)"/>
  <text x="981" y="246" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Docs</text>
  <text x="955" y="276" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">knowledge chat</text>

  <path d="M290 250 C325 250, 330 250, 360 250" fill="none" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M840 250 C875 250, 890 250, 920 250" fill="none" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M485 318 C485 328, 485 338, 485 350" fill="none" stroke="#4338ca" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M695 318 C695 328, 695 338, 695 350" fill="none" stroke="#4338ca" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
