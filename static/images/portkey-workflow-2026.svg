<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Portkey Workflow 2026</title>
  <desc id="desc">AI gateway workflow showing unified API, routing, guardrails, observability, and access control.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#155e75" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Portkey Workflow</text>
  <rect x="70" y="220" width="220" height="110" rx="24" fill="#fff" stroke="#67e8f9" filter="url(#shadow)"/>
  <text x="124" y="276" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#155e75">App</text>
  <text x="107" y="306" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#155e75">LLM requests</text>
  <rect x="360" y="150" width="480" height="360" rx="28" fill="#fff" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
  <text x="530" y="205" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Portkey</text>
  <rect x="415" y="250" width="160" height="82" rx="18" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="456" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Routing</text>
  <rect x="625" y="250" width="160" height="82" rx="18" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="649" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Guardrails</text>
  <rect x="415" y="370" width="160" height="82" rx="18" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="426" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Observability</text>
  <text x="455" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">traces</text>
  <rect x="625" y="370" width="160" height="82" rx="18" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="646" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Access</text>
  <text x="633" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">control</text>
  <rect x="900" y="220" width="220" height="110" rx="24" fill="#fff" stroke="#67e8f9" filter="url(#shadow)"/>
  <text x="964" y="276" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#155e75">Models</text>
  <text x="938" y="306" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#155e75">OpenAI, Anthropic,</text>
  <text x="945" y="330" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#155e75">Mistral, more</text>
  <path d="M290 275 C325 275, 330 275, 360 275" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M840 275 C875 275, 880 275, 900 275" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
