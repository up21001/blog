<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4eef6"/>
      <stop offset="100%" stop-color="#e4d7ea"/>
    </linearGradient>
    <style>
      .title{font:700 42px Arial,sans-serif;fill:#211a28}
      .box{fill:#fff8ff;stroke:#8a6ba0;stroke-width:3;rx:18;ry:18}
      .label{font:700 22px Arial,sans-serif;fill:#2a2130}
      .small{font:400 18px Arial,sans-serif;fill:#5a4c67}
      .arrow{stroke:#8a6ba0;stroke-width:5;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#8a6ba0"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="title">Voice UI Evaluation Choice Flow</text>
  <rect class="box" x="70" y="170" width="220" height="100"/><text x="180" y="210" text-anchor="middle" class="label">Latency OK?</text><text x="180" y="240" text-anchor="middle" class="small">end-to-end budget</text>
  <rect class="box" x="330" y="170" width="220" height="100"/><text x="440" y="210" text-anchor="middle" class="label">Turn-taking OK?</text><text x="440" y="240" text-anchor="middle" class="small">barge-in / pause / overlap</text>
  <rect class="box" x="590" y="170" width="220" height="100"/><text x="700" y="210" text-anchor="middle" class="label">Task complete?</text><text x="700" y="240" text-anchor="middle" class="small">goal reached or not</text>
  <rect class="box" x="850" y="170" width="250" height="100"/><text x="975" y="210" text-anchor="middle" class="label">Gate</text><text x="975" y="240" text-anchor="middle" class="small">ship, tune, or review</text>
  <path class="arrow" d="M290 220 H325"/><path class="arrow" d="M550 220 H585"/><path class="arrow" d="M810 220 H845"/>
  <rect class="box" x="110" y="360" width="280" height="120"/><text x="250" y="400" text-anchor="middle" class="label">Text metrics</text><text x="250" y="430" text-anchor="middle" class="small">STT accuracy, intent, entity</text>
  <rect class="box" x="460" y="360" width="280" height="120"/><text x="600" y="400" text-anchor="middle" class="label">Interaction metrics</text><text x="600" y="430" text-anchor="middle" class="small">interruptions, pauses, retries</text>
  <rect class="box" x="810" y="360" width="280" height="120"/><text x="950" y="400" text-anchor="middle" class="label">Outcome metrics</text><text x="950" y="430" text-anchor="middle" class="small">completion, recovery, satisfaction</text>
</svg>
