<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F2937">AI 단위 테스트 자동 생성 워크플로우</text>

  <!-- Step 1: Source Code -->
  <rect x="40" y="70" width="140" height="70" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="110" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">소스 코드</text>
  <text x="110" y="120" text-anchor="middle" font-size="11" fill="#1E40AF">함수 / 클래스</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="105" x2="218" y2="105" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: AI Analysis -->
  <rect x="220" y="70" width="140" height="70" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="290" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#5B21B6">AI 분석</text>
  <text x="290" y="120" text-anchor="middle" font-size="11" fill="#5B21B6">Claude / Copilot</text>

  <!-- Arrow 2 -->
  <line x1="360" y1="105" x2="398" y2="105" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Test Draft -->
  <rect x="400" y="70" width="140" height="70" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="470" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">테스트 초안</text>
  <text x="470" y="120" text-anchor="middle" font-size="11" fill="#92400E">pytest 코드 생성</text>

  <!-- Arrow 3 -->
  <line x1="540" y1="105" x2="578" y2="105" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Review -->
  <rect x="580" y="70" width="140" height="70" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="650" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">검토 및 실행</text>
  <text x="650" y="120" text-anchor="middle" font-size="11" fill="#065F46">커버리지 확인</text>

  <!-- Coverage Section -->
  <rect x="40" y="180" width="340" height="120" rx="10" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="210" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">Coverage 목표</text>
  <!-- Bar: Line Coverage -->
  <text x="60" y="228" font-size="11" fill="#374151">라인 커버리지</text>
  <rect x="160" y="216" width="180" height="14" rx="4" fill="#E5E7EB"/>
  <rect x="160" y="216" width="158" height="14" rx="4" fill="#3B82F6"/>
  <text x="348" y="228" font-size="11" fill="#1E40AF">88%</text>
  <!-- Bar: Branch Coverage -->
  <text x="60" y="252" font-size="11" fill="#374151">브랜치 커버리지</text>
  <rect x="160" y="240" width="180" height="14" rx="4" fill="#E5E7EB"/>
  <rect x="160" y="240" width="135" height="14" rx="4" fill="#8B5CF6"/>
  <text x="348" y="252" font-size="11" fill="#5B21B6">75%</text>
  <!-- Bar: Function Coverage -->
  <text x="60" y="276" font-size="11" fill="#374151">함수 커버리지</text>
  <rect x="160" y="264" width="180" height="14" rx="4" fill="#E5E7EB"/>
  <rect x="160" y="264" width="171" height="14" rx="4" fill="#10B981"/>
  <text x="348" y="276" font-size="11" fill="#065F46">95%</text>

  <!-- Test Types -->
  <rect x="420" y="180" width="340" height="120" rx="10" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="590" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">AI가 생성하는 테스트 유형</text>
  <rect x="435" y="215" width="90" height="28" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="480" y="234" text-anchor="middle" font-size="11" fill="#1E40AF">정상 케이스</text>
  <rect x="535" y="215" width="90" height="28" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="580" y="234" text-anchor="middle" font-size="11" fill="#92400E">엣지 케이스</text>
  <rect x="635" y="215" width="110" height="28" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="690" y="234" text-anchor="middle" font-size="11" fill="#5B21B6">예외 처리 케이스</text>
  <rect x="435" y="254" width="90" height="28" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="480" y="273" text-anchor="middle" font-size="11" fill="#065F46">파라미터화</text>
  <rect x="535" y="254" width="90" height="28" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="580" y="273" text-anchor="middle" font-size="11" fill="#374151">Mock 테스트</text>
  <rect x="635" y="254" width="110" height="28" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="690" y="273" text-anchor="middle" font-size="11" fill="#92400E">픽스처 패턴</text>

  <!-- Bottom workflow -->
  <rect x="40" y="330" width="720" height="90" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="400" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">TDD + AI 통합 사이클</text>
  <!-- Cycle -->
  <rect x="60" y="368" width="100" height="36" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="110" y="391" text-anchor="middle" font-size="12" fill="#92400E">RED: 실패 테스트</text>
  <line x1="160" y1="386" x2="198" y2="386" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="200" y="368" width="120" height="36" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="260" y="391" text-anchor="middle" font-size="12" fill="#065F46">GREEN: 코드 작성</text>
  <line x1="320" y1="386" x2="358" y2="386" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="360" y="368" width="110" height="36" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="415" y="391" text-anchor="middle" font-size="12" fill="#5B21B6">REFACTOR: 개선</text>
  <line x1="470" y1="386" x2="508" y2="386" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="510" y="368" width="120" height="36" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="570" y="391" text-anchor="middle" font-size="12" fill="#1E40AF">AI: 추가 케이스</text>
  <line x1="630" y1="386" x2="668" y2="386" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="670" y="368" width="70" height="36" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="705" y="391" text-anchor="middle" font-size="12" fill="#374151">반복</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
  </defs>
</svg>
