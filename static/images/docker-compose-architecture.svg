<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="600" height="400" fill="#1a1a2e" rx="12"/>

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">Docker Compose Architecture</text>

  <!-- Docker Compose Box -->
  <rect x="20" y="60" width="560" height="310" fill="none" stroke="#0db7ed" stroke-width="2" rx="8" stroke-dasharray="8,4"/>
  <text x="40" y="85" fill="#0db7ed" font-size="13" font-weight="bold">docker-compose.yml</text>

  <!-- Node.js Container -->
  <rect x="60" y="100" width="200" height="180" fill="#2d4a22" stroke="#68a063" stroke-width="2" rx="8"/>
  <text x="160" y="125" text-anchor="middle" fill="#68a063" font-size="14" font-weight="bold">Node.js App</text>
  <text x="160" y="148" text-anchor="middle" fill="#a0c080" font-size="11">image: node:18-alpine</text>
  <text x="160" y="168" text-anchor="middle" fill="#a0c080" font-size="11">port: 3000</text>
  <rect x="90" y="185" width="140" height="24" fill="#1a3010" rx="4"/>
  <text x="160" y="201" text-anchor="middle" fill="#80ff60" font-size="11">depends_on: postgres</text>
  <rect x="90" y="220" width="140" height="24" fill="#1a3010" rx="4"/>
  <text x="160" y="236" text-anchor="middle" fill="#80ff60" font-size="11">volume: ./src:/app</text>

  <!-- PostgreSQL Container -->
  <rect x="340" y="100" width="200" height="180" fill="#1a2a4a" stroke="#336791" stroke-width="2" rx="8"/>
  <text x="440" y="125" text-anchor="middle" fill="#336791" font-size="14" font-weight="bold">PostgreSQL</text>
  <text x="440" y="148" text-anchor="middle" fill="#6090c0" font-size="11">image: postgres:15</text>
  <text x="440" y="168" text-anchor="middle" fill="#6090c0" font-size="11">port: 5432</text>
  <rect x="370" y="185" width="140" height="24" fill="#101a30" rx="4"/>
  <text x="440" y="201" text-anchor="middle" fill="#60a0ff" font-size="11">POSTGRES_DB: mydb</text>
  <rect x="370" y="220" width="140" height="24" fill="#101a30" rx="4"/>
  <text x="440" y="236" text-anchor="middle" fill="#60a0ff" font-size="11">volume: pgdata:/var/lib</text>

  <!-- Arrow between containers -->
  <line x1="260" y1="190" x2="340" y2="190" stroke="#ffaa00" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffaa00"/>
    </marker>
  </defs>
  <text x="300" y="183" text-anchor="middle" fill="#ffaa00" font-size="10">connect</text>

  <!-- Network label -->
  <text x="300" y="320" text-anchor="middle" fill="#888" font-size="12">app-network (bridge)</text>
  <line x1="100" y1="310" x2="500" y2="310" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bottom label -->
  <text x="300" y="385" text-anchor="middle" fill="#666" font-size="11">© blog-8ye.pages.dev</text>
</svg>
