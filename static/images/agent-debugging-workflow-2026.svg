<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Agent debugging workflow">
  <rect width="1200" height="630" fill="#0b1020"/>
  <text x="80" y="90" fill="#f8fafc" font-size="42" font-family="Arial, sans-serif" font-weight="700">Agent Debugging Workflow</text>
  <text x="80" y="128" fill="#94a3b8" font-size="22" font-family="Arial, sans-serif">Reproduce -&gt; Inspect -&gt; Isolate -&gt; Fix</text>
  <rect x="75" y="220" width="230" height="135" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
  <text x="190" y="266" fill="#fff" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" font-weight="700">Reproduce</text>
  <text x="190" y="298" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif" text-anchor="middle">same input, same trace</text>
  <rect x="405" y="220" width="230" height="135" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <text x="520" y="266" fill="#fff" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" font-weight="700">Inspect</text>
  <text x="520" y="298" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif" text-anchor="middle">tool, prompt, memory</text>
  <rect x="735" y="220" width="230" height="135" rx="22" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  <text x="850" y="266" fill="#fff" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" font-weight="700">Isolate</text>
  <text x="850" y="298" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif" text-anchor="middle">prompt, tool, model</text>
  <path d="M305 287 H395" stroke="#f59e0b" stroke-width="6" fill="none"/>
  <polygon points="395,287 379,277 379,297" fill="#f59e0b"/>
  <path d="M635 287 H725" stroke="#38bdf8" stroke-width="6" fill="none"/>
  <polygon points="725,287 709,277 709,297" fill="#38bdf8"/>
  <rect x="230" y="425" width="740" height="105" rx="20" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="600" y="468" fill="#fff" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" font-weight="700">Patch one variable at a time and rerun the same trace</text>
  <text x="600" y="498" fill="#94a3b8" font-size="17" font-family="Arial, sans-serif" text-anchor="middle">this is the fastest way to remove guesswork</text>
</svg>
