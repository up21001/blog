<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Cohere Choice Flow 2026</title>
  <desc id="desc">Decision flow for when to use Cohere.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0369a1"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Should You Use Cohere?</text>

  <rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
  <text x="482" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Need search quality?</text>

  <rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#7dd3fc" filter="url(#shadow)"/>
  <text x="187" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0369a1">No</text>
  <text x="148" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0369a1">A general LLM provider may be enough</text>

  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#7dd3fc" filter="url(#shadow)"/>
  <text x="488" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0369a1">Need embed +</text>
  <text x="510" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0369a1">rerank?</text>

  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#7dd3fc" filter="url(#shadow)"/>
  <text x="831" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0369a1">Need enterprise</text>
  <text x="854" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0369a1">deployment?</text>

  <rect x="445" y="500" width="320" height="110" rx="26" fill="#0f172a" filter="url(#shadow)"/>
  <text x="535" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#f8fafc">Use Cohere</text>
  <text x="480" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#cbd5e1">Strong fit for RAG and enterprise search</text>
</svg>
