<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <style>
      .title { font: 700 54px Arial, sans-serif; fill: #f8fafc; }
      .sub { font: 400 24px Arial, sans-serif; fill: #cbd5e1; }
      .box { fill: rgba(15, 23, 42, 0.78); stroke: #38bdf8; stroke-width: 2; rx: 18; }
      .box2 { fill: rgba(30, 41, 59, 0.95); stroke: #60a5fa; stroke-width: 2; rx: 18; }
      .lbl { font: 700 24px Arial, sans-serif; fill: #e2e8f0; }
      .txt { font: 400 18px Arial, sans-serif; fill: #cbd5e1; }
      .arrow { stroke: #94a3b8; stroke-width: 5; fill: none; marker-end: url(#m); }
      .pill { fill: #0ea5e9; }
      .pilltxt { font: 700 16px Arial, sans-serif; fill: white; }
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="110" r="140" fill="#0ea5e922"/>
  <circle cx="220" cy="540" r="180" fill="#1d4ed822"/>
  <rect x="80" y="70" width="220" height="38" rx="19" class="pill"/>
  <text x="190" y="95" text-anchor="middle" class="pilltxt">RAG EVALUATION</text>
  <text x="80" y="185" class="title">RAG Evaluation Workflow</text>
  <text x="80" y="225" class="sub">Search, rerank, generate, and measure separately</text>

  <rect x="80" y="300" width="200" height="150" class="box"/>
  <text x="180" y="345" text-anchor="middle" class="lbl">Dataset</text>
  <text x="180" y="378" text-anchor="middle" class="txt">Questions</text>
  <text x="180" y="404" text-anchor="middle" class="txt">Ground truth</text>

  <rect x="330" y="300" width="200" height="150" class="box2"/>
  <text x="430" y="345" text-anchor="middle" class="lbl">Retrieval</text>
  <text x="430" y="378" text-anchor="middle" class="txt">Recall@K</text>
  <text x="430" y="404" text-anchor="middle" class="txt">MRR / nDCG</text>

  <rect x="580" y="300" width="200" height="150" class="box2"/>
  <text x="680" y="345" text-anchor="middle" class="lbl">Generation</text>
  <text x="680" y="378" text-anchor="middle" class="txt">Groundedness</text>
  <text x="680" y="404" text-anchor="middle" class="txt">Correctness</text>

  <rect x="830" y="300" width="290" height="150" class="box"/>
  <text x="975" y="345" text-anchor="middle" class="lbl">Feedback Loop</text>
  <text x="975" y="378" text-anchor="middle" class="txt">Fix chunking, reranking, prompts</text>
  <text x="975" y="404" text-anchor="middle" class="txt">Then rerun the eval</text>

  <path class="arrow" d="M 280 375 L 320 375"/>
  <path class="arrow" d="M 530 375 L 570 375"/>
  <path class="arrow" d="M 780 375 L 820 375"/>
</svg>

