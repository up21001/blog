<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AnythingLLM Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when AnythingLLM is a good fit.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1e3a8a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4338ca"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Should You Use AnythingLLM?</text>

  <rect x="435" y="120" width="330" height="90" rx="22" fill="#fff" stroke="#818cf8" stroke-width="2" filter="url(#shadow2)"/>
  <text x="488" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Need local workspace?</text>

  <rect x="110" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#a5b4fc" filter="url(#shadow2)"/>
  <text x="177" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">No</text>
  <text x="138" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">A hosted chat app may be enough</text>

  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#a5b4fc" filter="url(#shadow2)"/>
  <text x="494" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Need docs and</text>
  <text x="521" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">agents?</text>

  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#a5b4fc" filter="url(#shadow2)"/>
  <text x="846" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Need desktop and</text>
  <text x="856" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">self-hosted?</text>

  <rect x="445" y="500" width="320" height="110" rx="26" fill="#1e3a8a" filter="url(#shadow2)"/>
  <text x="487" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#eef2ff">Use AnythingLLM</text>
  <text x="476" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c7d2fe">Great for local knowledge workflows</text>

  <path d="M600 210 L600 285" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M450 340 L410 340" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M750 340 L790 340" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M600 395 L600 500" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
</svg>
