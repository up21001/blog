<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">LlamaParse Workflow 2026</title>
  <desc id="desc">Document parsing workflow for LlamaParse with OCR, multimodal parsing, structured output, and LlamaCloud context.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#92400e" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg3)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#92400e">LlamaParse Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#b45309">Document parsing for LLM apps</text>
  <rect x="70" y="220" width="210" height="110" rx="24" fill="#fff" stroke="#fbbf24" filter="url(#shadow3)"/>
  <text x="121" y="280" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#92400e">Docs</text>
  <text x="99" y="310" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#b45309">PDF, scans, images</text>
  <rect x="350" y="150" width="480" height="360" rx="28" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow3)"/>
  <text x="510" y="200" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#92400e">LlamaParse</text>
  <rect x="405" y="250" width="160" height="82" rx="18" fill="#fffbeb" stroke="#fbbf24"/>
  <text x="432" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">OCR</text>
  <rect x="625" y="250" width="160" height="82" rx="18" fill="#fffbeb" stroke="#fbbf24"/>
  <text x="643" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">Multimodal</text>
  <rect x="405" y="370" width="160" height="82" rx="18" fill="#fffbeb" stroke="#fbbf24"/>
  <text x="417" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">Structured</text>
  <text x="436" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#b45309">output</text>
  <rect x="625" y="370" width="160" height="82" rx="18" fill="#fffbeb" stroke="#fbbf24"/>
  <text x="645" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">LlamaCloud</text>
  <text x="646" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#b45309">parse/index</text>
  <rect x="900" y="220" width="210" height="110" rx="24" fill="#fff" stroke="#fbbf24" filter="url(#shadow3)"/>
  <text x="938" y="280" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#92400e">LLM Ready</text>
  <path d="M280 275 C320 275, 330 275, 350 275" fill="none" stroke="#b45309" stroke-width="4" marker-end="url(#arrow3)"/>
  <path d="M830 275 C865 275, 875 275, 900 275" fill="none" stroke="#b45309" stroke-width="4" marker-end="url(#arrow3)"/>
  <path d="M565 291 C590 291, 600 291, 625 291" fill="none" stroke="#b45309" stroke-width="3" marker-end="url(#arrow3)"/>
  <path d="M485 332 C485 342, 485 352, 485 370" fill="none" stroke="#b45309" stroke-width="3" marker-end="url(#arrow3)"/>
  <path d="M705 332 C705 342, 705 352, 705 370" fill="none" stroke="#b45309" stroke-width="3" marker-end="url(#arrow3)"/>
</svg>
