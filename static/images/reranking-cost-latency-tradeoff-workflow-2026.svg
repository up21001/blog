<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f8fafc"/>
  <text x="70" y="90" fill="#111827" font-family="Arial, sans-serif" font-size="42" font-weight="700">Cost / Latency Tradeoff</text>
  <rect x="75" y="190" width="210" height="100" rx="18" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="180" y="232" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="20">Search candidates</text>
  <rect x="335" y="190" width="210" height="100" rx="18" fill="#fde68a" stroke="#f59e0b"/>
  <text x="440" y="232" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="20">Rerank cost</text>
  <rect x="595" y="190" width="210" height="100" rx="18" fill="#c7d2fe" stroke="#6366f1"/>
  <text x="700" y="232" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="20">Latency budget</text>
  <rect x="855" y="190" width="270" height="100" rx="18" fill="#dcfce7" stroke="#22c55e"/>
  <text x="990" y="232" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="20">Quality improvement</text>
  <line x1="285" y1="240" x2="335" y2="240" stroke="#111827" stroke-width="4"/>
  <line x1="545" y1="240" x2="595" y2="240" stroke="#111827" stroke-width="4"/>
  <line x1="805" y1="240" x2="855" y2="240" stroke="#111827" stroke-width="4"/>
  <rect x="70" y="350" width="1060" height="170" rx="22" fill="#111827"/>
  <text x="100" y="395" fill="#f8fafc" font-family="Arial, sans-serif" font-size="22" font-weight="700">Operational rule</text>
  <text x="100" y="435" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">increase rerank depth only until quality gain plateaus</text>
  <text x="100" y="465" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">use query routing and cache to reduce rerank calls</text>
</svg>

