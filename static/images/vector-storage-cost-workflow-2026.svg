<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Vector Storage Cost Workflow</title>
  <desc id="desc">Workflow diagram for reducing vector storage costs in Qdrant and pgvector style systems.</desc>
  <defs>
    <style>
      .bg{fill:#111827}
      .box{fill:#1f2937; stroke:#334155; stroke-width:2}
      .title{font:700 42px Arial,sans-serif; fill:#f8fafc}
      .sub{font:400 20px Arial,sans-serif; fill:#cbd5e1}
      .h{font:700 22px Arial,sans-serif; fill:#e2e8f0}
      .t{font:400 17px Arial,sans-serif; fill:#cbd5e1}
      .arrow{stroke:#38bdf8; stroke-width:4; fill:none; marker-end:url(#m)}
      .tag{font:700 14px Arial,sans-serif; fill:#93c5fd; letter-spacing:1px}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" class="bg"/>
  <text x="64" y="74" class="tag">VECTOR STORAGE COST</text>
  <text x="64" y="122" class="title">Lower storage spend before it becomes infrastructure debt</text>
  <text x="64" y="160" class="sub">Vectors, indexes, metadata, backups, and memory all count.</text>

  <rect x="72" y="230" rx="20" ry="20" width="180" height="120" class="box"/>
  <text x="96" y="270" class="h">Raw docs</text>
  <text x="96" y="300" class="t">keep source clean</text>

  <rect x="282" y="230" rx="20" ry="20" width="180" height="120" class="box"/>
  <text x="306" y="270" class="h">Chunk store</text>
  <text x="306" y="300" class="t">remove duplicates</text>

  <rect x="492" y="230" rx="20" ry="20" width="180" height="120" class="box"/>
  <text x="516" y="270" class="h">Vector index</text>
  <text x="516" y="300" class="t">control dimension</text>

  <rect x="702" y="230" rx="20" ry="20" width="180" height="120" class="box"/>
  <text x="726" y="270" class="h">Replication</text>
  <text x="726" y="300" class="t">only where needed</text>

  <rect x="912" y="230" rx="20" ry="20" width="180" height="120" class="box"/>
  <text x="936" y="270" class="h">Backups</text>
  <text x="936" y="300" class="t">retention policy</text>

  <path class="arrow" d="M 252 290 L 277 290"/>
  <path class="arrow" d="M 462 290 L 487 290"/>
  <path class="arrow" d="M 672 290 L 697 290"/>
  <path class="arrow" d="M 882 290 L 907 290"/>

  <rect x="72" y="410" rx="18" ry="18" width="1050" height="120" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="96" y="452" class="h">Cost lever</text>
  <text x="96" y="486" class="t">Reduce vector count, dimension, retention, and replication before buying more capacity.</text>
</svg>

