<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">LlamaParse Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when to use LlamaParse for document parsing.</desc>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#92400e" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg4)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#92400e">Should You Use LlamaParse?</text>
  <rect x="430" y="120" width="350" height="90" rx="22" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow4)"/>
  <text x="474" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#92400e">Need document parsing?</text>
  <rect x="100" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fbbf24" filter="url(#shadow4)"/>
  <text x="180" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">No</text>
  <text x="136" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#b45309">A lighter text extractor may be enough</text>
  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fbbf24" filter="url(#shadow4)"/>
  <text x="482" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">Need OCR and</text>
  <text x="523" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">multimodal?</text>
  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fbbf24" filter="url(#shadow4)"/>
  <text x="827" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">Need structured</text>
  <text x="856" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">output too?</text>
  <rect x="440" y="500" width="320" height="110" rx="26" fill="#92400e" filter="url(#shadow4)"/>
  <text x="498" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fffbeb">Use LlamaParse</text>
  <text x="487" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#fde68a">Strong fit for parsed LLM documents</text>
  <path d="M605 210 L605 285" stroke="#b45309" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
  <path d="M450 340 L400 340" stroke="#b45309" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
  <path d="M750 340 L790 340" stroke="#b45309" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
  <path d="M605 395 L605 500" stroke="#b45309" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
</svg>
