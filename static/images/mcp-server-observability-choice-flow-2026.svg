<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MCP Server Observability Choice Flow</title>
  <desc id="desc">Choice flow for observability priorities: trace, audit, replay, alert.</desc>
  <rect width="1200" height="630" rx="36" fill="#f1f8fb"/>
  <text x="64" y="86" fill="#133042" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700">Observability Choice Flow</text>
  <text x="64" y="122" fill="#4d6a7e" font-family="Inter, Arial, sans-serif" font-size="20">Pick the signal that helps you recover fastest</text>
  <g fill="#ffffff" stroke="#13778f" stroke-width="2">
    <rect x="90" y="220" width="220" height="110" rx="22"/>
    <rect x="350" y="220" width="220" height="110" rx="22"/>
    <rect x="610" y="220" width="220" height="110" rx="22"/>
    <rect x="870" y="220" width="220" height="110" rx="22"/>
  </g>
  <g fill="#133042" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">
    <text x="136" y="262">Trace</text>
    <text x="404" y="262">Audit</text>
    <text x="646" y="262">Replay</text>
    <text x="938" y="262">Alert</text>
  </g>
  <g stroke="#13778f" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M310 275 H340"/>
    <path d="M570 275 H600"/>
    <path d="M830 275 H860"/>
  </g>
  <g fill="#4d6a7e" font-family="Inter, Arial, sans-serif" font-size="18">
    <text x="96" y="302">See the path</text>
    <text x="364" y="302">See the actor</text>
    <text x="628" y="302">See the input</text>
    <text x="914" y="302">See the risk</text>
  </g>
</svg>
