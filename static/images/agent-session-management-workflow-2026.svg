<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4f7cff"/>
    </marker>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #17324f; }
      .sub { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #5f7489; }
      .label { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #12324d; }
      .small { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #39526a; }
      .card { fill: #ffffff; stroke: #cfe0ff; stroke-width: 2; }
      .accent { fill: #4f7cff; }
      .line { stroke: #4f7cff; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="80" class="title">Agent Session Management</text>
  <text x="70" y="114" class="sub">session id, state isolation, snapshot, resume, cleanup</text>
  <rect x="70" y="215" width="180" height="110" rx="22" class="card"/>
  <text x="118" y="260" class="label">Input</text>
  <text x="102" y="290" class="small">user / task / device</text>
  <rect x="300" y="195" width="210" height="150" rx="24" class="card"/>
  <text x="340" y="240" class="label">Session ID</text>
  <text x="330" y="272" class="small">auth / ttl / scope</text>
  <text x="325" y="298" class="small">one task container</text>
  <rect x="565" y="180" width="260" height="180" rx="26" fill="#eef5ff" stroke="#aac4ff" stroke-width="2"/>
  <text x="623" y="229" class="label">State Store</text>
  <text x="610" y="260" class="small">snapshot / log / retry</text>
  <text x="594" y="286" class="small">tool output / preferences</text>
  <text x="632" y="312" class="small">resume / cleanup</text>
  <rect x="885" y="205" width="180" height="130" rx="22" class="card"/>
  <text x="930" y="252" class="label">Resume</text>
  <text x="920" y="282" class="small">continue safely</text>
  <path d="M250 270 L300 270" class="line"/>
  <path d="M510 270 L565 270" class="line"/>
  <path d="M825 270 L885 270" class="line"/>
</svg>
