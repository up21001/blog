<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <rect width="800" height="450" fill="white"/>

  <text x="400" y="35" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="18" font-weight="bold" fill="#1F2937">Hugo + Cloudflare Pages 자동 배포 흐름</text>

  <!-- Step 1 -->
  <rect x="20" y="65" width="130" height="90" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="85" y="92" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="12" font-weight="bold" fill="#5B21B6">1. 로컬 작업</text>
  <text x="85" y="112" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#6D28D9">Hugo 프로젝트</text>
  <text x="85" y="130" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#6D28D9">포스트 작성</text>
  <text x="85" y="148" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="10" fill="#7C3AED">content/posts/</text>

  <!-- Step 2 -->
  <rect x="195" y="65" width="130" height="90" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="260" y="92" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="12" font-weight="bold" fill="#374151">2. git push</text>
  <text x="260" y="112" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#4B5563">git add .</text>
  <text x="260" y="130" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#4B5563">git commit</text>
  <text x="260" y="148" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#4B5563">git push origin main</text>

  <!-- Step 3 -->
  <rect x="370" y="65" width="130" height="90" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="435" y="92" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="12" font-weight="bold" fill="#374151">3. GitHub</text>
  <text x="435" y="112" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#4B5563">main 브랜치</text>
  <text x="435" y="130" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#4B5563">webhook 트리거</text>
  <text x="435" y="148" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="10" fill="#6B7280">up21001/blog</text>

  <!-- Step 4 -->
  <rect x="545" y="65" width="130" height="90" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="610" y="92" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="12" font-weight="bold" fill="#92400E">4. CF Build</text>
  <text x="610" y="112" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#B45309">hugo --minify</text>
  <text x="610" y="130" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#B45309">정적 파일 생성</text>
  <text x="610" y="148" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="10" fill="#D97706">~30초 빌드</text>

  <!-- Step 5 -->
  <rect x="545" y="200" width="130" height="90" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="610" y="227" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="12" font-weight="bold" fill="#065F46">5. CDN 배포</text>
  <text x="610" y="247" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#047857">글로벌 엣지 서버</text>
  <text x="610" y="265" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#047857">전 세계 배포</text>
  <text x="610" y="283" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="10" fill="#059669">blog-8ye.pages.dev</text>

  <!-- Arrows -->
  <line x1="150" y1="110" x2="193" y2="110" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="325" y1="110" x2="368" y2="110" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="110" x2="543" y2="110" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="610" y1="155" x2="610" y2="198" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Hugo Config Box -->
  <rect x="20" y="210" width="290" height="110" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="165" y="233" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="13" font-weight="bold" fill="#1D4ED8">Cloudflare Pages 빌드 설정</text>
  <text x="35" y="255" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#1E40AF">프레임워크: Hugo</text>
  <text x="35" y="273" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#1E40AF">빌드 명령어: hugo --minify</text>
  <text x="35" y="291" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#1E40AF">출력 디렉토리: public</text>
  <text x="35" y="309" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#1E40AF">환경변수: HUGO_VERSION=0.145.0</text>

  <!-- Blowfish theme box -->
  <rect x="370" y="210" width="130" height="90" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="435" y="235" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="12" font-weight="bold" fill="#1D4ED8">Blowfish 테마</text>
  <text x="435" y="255" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#2563EB">hugo.toml 설정</text>
  <text x="435" y="273" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#2563EB">테마 커스터마이즈</text>
  <text x="435" y="291" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="10" fill="#3B82F6">다크모드 지원</text>

  <!-- Bottom summary -->
  <rect x="20" y="355" width="760" height="75" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="400" y="378" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="13" font-weight="bold" fill="#374151">배포 타임라인</text>
  <text x="130" y="400" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#6B7280">git push</text>
  <text x="130" y="416" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" font-weight="bold" fill="#374151">0초</text>
  <text x="310" y="400" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#6B7280">Cloudflare 빌드 시작</text>
  <text x="310" y="416" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" font-weight="bold" fill="#374151">~5초</text>
  <text x="490" y="400" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#6B7280">Hugo 빌드 완료</text>
  <text x="490" y="416" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" font-weight="bold" fill="#374151">~35초</text>
  <text x="670" y="400" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#6B7280">전 세계 라이브</text>
  <text x="670" y="416" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="11" font-weight="bold" fill="#10B981">~60초</text>
</svg>
