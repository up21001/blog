<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F2937">SQLite 서버리스 생태계 2026</text>

  <!-- 중앙 SQLite -->
  <ellipse cx="400" cy="200" rx="80" ry="50" fill="#DBEAFE" stroke="#3B82F6" stroke-width="3"/>
  <text x="400" y="196" text-anchor="middle" font-size="15" font-weight="bold" fill="#1D4ED8">SQLite</text>
  <text x="400" y="214" text-anchor="middle" font-size="11" fill="#3B82F6">경량 임베디드 DB</text>

  <!-- Cloudflare D1 -->
  <rect x="40" y="80" width="160" height="70" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" rx="10"/>
  <text x="120" y="107" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400E">Cloudflare D1</text>
  <text x="120" y="123" text-anchor="middle" font-size="11" fill="#78350F">Workers 엣지 DB</text>
  <text x="120" y="139" text-anchor="middle" font-size="10" fill="#92400E">글로벌 복제 지원</text>
  <line x1="200" y1="115" x2="320" y2="185" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Turso -->
  <rect x="40" y="230" width="160" height="70" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2" rx="10"/>
  <text x="120" y="257" text-anchor="middle" font-size="14" font-weight="bold" fill="#5B21B6">Turso</text>
  <text x="120" y="273" text-anchor="middle" font-size="11" fill="#4C1D95">libSQL 기반 분산 DB</text>
  <text x="120" y="289" text-anchor="middle" font-size="10" fill="#5B21B6">멀티 리전 복제</text>
  <line x1="200" y1="265" x2="320" y2="215" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Litestream -->
  <rect x="600" y="80" width="160" height="70" fill="#D1FAE5" stroke="#10B981" stroke-width="2" rx="10"/>
  <text x="680" y="107" text-anchor="middle" font-size="14" font-weight="bold" fill="#065F46">Litestream</text>
  <text x="680" y="123" text-anchor="middle" font-size="11" fill="#064E3B">S3 스트리밍 복제</text>
  <text x="680" y="139" text-anchor="middle" font-size="10" fill="#065F46">단일 서버 백업</text>
  <line x1="600" y1="115" x2="480" y2="185" stroke="#10B981" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- fly.io SQLite -->
  <rect x="600" y="230" width="160" height="70" fill="#F3F4F6" stroke="#6B7280" stroke-width="2" rx="10"/>
  <text x="680" y="257" text-anchor="middle" font-size="14" font-weight="bold" fill="#374151">Fly.io SQLite</text>
  <text x="680" y="273" text-anchor="middle" font-size="11" fill="#4B5563">LiteFS 볼륨 복제</text>
  <text x="680" y="289" text-anchor="middle" font-size="10" fill="#374151">엣지 컨테이너 DB</text>
  <line x1="600" y1="265" x2="480" y2="215" stroke="#6B7280" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- 특징 박스 -->
  <rect x="160" y="320" width="480" height="110" fill="white" stroke="#E5E7EB" stroke-width="1" rx="10"/>
  <text x="400" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">SQLite가 다시 주목받는 이유</text>

  <rect x="180" y="358" width="130" height="56" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1" rx="6"/>
  <text x="245" y="378" text-anchor="middle" font-size="11" font-weight="bold" fill="#1D4ED8">제로 운영 비용</text>
  <text x="245" y="395" text-anchor="middle" font-size="10" fill="#3B82F6">서버 불필요</text>
  <text x="245" y="408" text-anchor="middle" font-size="10" fill="#3B82F6">단일 파일</text>

  <rect x="335" y="358" width="130" height="56" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1" rx="6"/>
  <text x="400" y="378" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">엣지 배포</text>
  <text x="400" y="395" text-anchor="middle" font-size="10" fill="#10B981">지연 시간 최소화</text>
  <text x="400" y="408" text-anchor="middle" font-size="10" fill="#10B981">글로벌 분산</text>

  <rect x="490" y="358" width="130" height="56" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1" rx="6"/>
  <text x="555" y="378" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">WASM 호환</text>
  <text x="555" y="395" text-anchor="middle" font-size="10" fill="#F59E0B">브라우저 실행</text>
  <text x="555" y="408" text-anchor="middle" font-size="10" fill="#F59E0B">Workers 통합</text>
</svg>
