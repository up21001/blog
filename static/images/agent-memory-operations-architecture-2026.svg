<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0b1020"/>
  <text x="70" y="88" fill="#f8fafc" font-size="40" font-family="sans-serif" font-weight="700">Memory Operations Architecture</text>
  <text x="70" y="128" fill="#cbd5e1" font-size="18" font-family="sans-serif">운영 계층을 분리하면 메모리가 시스템이 됩니다</text>
  <rect x="70" y="190" width="180" height="110" rx="18" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <text x="110" y="234" fill="#e2e8f0" font-size="22" font-family="sans-serif" font-weight="700">Input</text>
  <text x="95" y="265" fill="#cbd5e1" font-size="17" font-family="sans-serif">conversation</text>
  <rect x="285" y="190" width="180" height="110" rx="18" fill="#111827" stroke="#34d399" stroke-width="2"/>
  <text x="328" y="234" fill="#e2e8f0" font-size="22" font-family="sans-serif" font-weight="700">Policy</text>
  <text x="312" y="265" fill="#cbd5e1" font-size="17" font-family="sans-serif">write/read/TTL</text>
  <rect x="500" y="190" width="180" height="110" rx="18" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="234" fill="#e2e8f0" font-size="22" font-family="sans-serif" font-weight="700">Memory</text>
  <text x="522" y="265" fill="#cbd5e1" font-size="17" font-family="sans-serif">profile + session</text>
  <rect x="715" y="190" width="180" height="110" rx="18" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
  <text x="757" y="234" fill="#e2e8f0" font-size="22" font-family="sans-serif" font-weight="700">Pruner</text>
  <text x="743" y="265" fill="#cbd5e1" font-size="17" font-family="sans-serif">compress / archive</text>
  <rect x="930" y="190" width="200" height="110" rx="18" fill="#111827" stroke="#fb7185" stroke-width="2"/>
  <text x="985" y="234" fill="#e2e8f0" font-size="22" font-family="sans-serif" font-weight="700">Retrieval</text>
  <text x="956" y="265" fill="#cbd5e1" font-size="17" font-family="sans-serif">quality + cost</text>
  <path d="M250 245 L285 245" stroke="#f59e0b" stroke-width="5" fill="none"/>
  <path d="M465 245 L500 245" stroke="#f59e0b" stroke-width="5" fill="none"/>
  <path d="M680 245 L715 245" stroke="#f59e0b" stroke-width="5" fill="none"/>
  <path d="M895 245 L930 245" stroke="#f59e0b" stroke-width="5" fill="none"/>
  <rect x="70" y="360" width="1060" height="170" rx="18" fill="#101826" stroke="#334155" stroke-width="2"/>
  <text x="100" y="408" fill="#f8fafc" font-size="22" font-family="sans-serif" font-weight="700">핵심 설계 포인트</text>
  <text x="100" y="446" fill="#cbd5e1" font-size="18" font-family="sans-serif">정책, 보존, 정리, 조회를 분리해야 메모리가 커져도 품질이 유지됩니다.</text>
  <text x="100" y="480" fill="#cbd5e1" font-size="18" font-family="sans-serif">Mem0, LangGraph, Semantic Cache는 각 계층에 맞춰 붙이는 편이 안전합니다.</text>
</svg>
