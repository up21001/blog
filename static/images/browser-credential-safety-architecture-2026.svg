<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .bg { fill:#090f1f; }
      .title { fill:#fff; font:700 38px Arial, sans-serif; }
      .sub { fill:#fecaca; font:400 18px Arial, sans-serif; }
      .box { fill:#f8fafc; stroke:#94a3b8; stroke-width:2; rx:18; }
      .accent { fill:#ffe4e6; stroke:#fb7185; stroke-width:2; rx:18; }
      .label { fill:#0f172a; font:700 19px Arial, sans-serif; }
      .small { fill:#475569; font:400 14px Arial, sans-serif; }
      .line { stroke:#fb7185; stroke-width:4; fill:none; marker-end:url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fb7185"/>
    </marker>
  </defs>
  <rect width="1200" height="630" class="bg"/>
  <text x="84" y="110" class="title">Browser Credential Safety Architecture</text>
  <text x="84" y="146" class="sub">Vault, browser runtime, approval UI, and log filter are separated by design</text>
  <rect x="80" y="222" width="188" height="110" class="accent"/>
  <text x="110" y="264" class="label">Browser Agent</text>
  <text x="110" y="294" class="small">requests secret access</text>
  <rect x="324" y="222" width="188" height="110" class="box"/>
  <text x="354" y="264" class="label">Secret Vault</text>
  <text x="354" y="294" class="small">keys, cookies, tokens</text>
  <rect x="568" y="222" width="188" height="110" class="box"/>
  <text x="598" y="264" class="label">Approval UI</text>
  <text x="598" y="294" class="small">explicit sensitive step</text>
  <rect x="812" y="222" width="188" height="110" class="accent"/>
  <text x="842" y="264" class="label">Log Filter</text>
  <text x="842" y="294" class="small">mask output</text>
  <path d="M268 277 L324 277" class="line"/>
  <path d="M512 277 L568 277" class="line"/>
  <path d="M756 277 L812 277" class="line"/>
  <rect x="210" y="404" width="780" height="92" class="box"/>
  <text x="244" y="442" class="label">Secrets are never owned by the agent process; they are borrowed from the vault on demand</text>
  <text x="244" y="472" class="small">this keeps credentials short-lived, auditable, and revocable</text>
</svg>
