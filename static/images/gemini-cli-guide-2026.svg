<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">Gemini CLI — 주요 명령어 흐름</text>

  <!-- Terminal block -->
  <rect x="40" y="70" width="720" height="60" rx="8" fill="#1E293B"/>
  <text x="60" y="97" font-size="13" fill="#86EFAC" font-family="'Courier New', monospace">$</text>
  <text x="78" y="97" font-size="13" fill="#F8FAFC" font-family="'Courier New', monospace">gemini "현재 디렉토리 코드를 리뷰해줘"</text>
  <text x="60" y="118" font-size="12" fill="#94A3B8" font-family="'Courier New', monospace">→ Google Gemini 2.5 Pro가 파일을 분석하고 피드백을 반환합니다</text>

  <!-- Flow: 4 steps -->
  <!-- Step 1 -->
  <rect x="40" y="160" width="155" height="80" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="117" y="193" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">1. 설치</text>
  <text x="117" y="213" text-anchor="middle" font-size="12" fill="#1E40AF">npm install -g</text>
  <text x="117" y="230" text-anchor="middle" font-size="12" fill="#1E40AF">@google/gemini-cli</text>

  <!-- Arrow -->
  <line x1="195" y1="200" x2="225" y2="200" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="225" y="160" width="155" height="80" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="302" y="193" text-anchor="middle" font-size="14" font-weight="bold" fill="#065F46">2. 인증</text>
  <text x="302" y="213" text-anchor="middle" font-size="12" fill="#047857">gemini auth login</text>
  <text x="302" y="230" text-anchor="middle" font-size="12" fill="#047857">Google 계정 연동</text>

  <!-- Arrow -->
  <line x1="380" y1="200" x2="410" y2="200" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="410" y="160" width="155" height="80" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="487" y="193" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400E">3. 질의</text>
  <text x="487" y="213" text-anchor="middle" font-size="12" fill="#B45309">gemini "질문"</text>
  <text x="487" y="230" text-anchor="middle" font-size="12" fill="#B45309">파이프 입력 가능</text>

  <!-- Arrow -->
  <line x1="565" y1="200" x2="595" y2="200" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="595" y="160" width="155" height="80" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="672" y="193" text-anchor="middle" font-size="14" font-weight="bold" fill="#5B21B6">4. 자동화</text>
  <text x="672" y="213" text-anchor="middle" font-size="12" fill="#6D28D9">스크립트 통합</text>
  <text x="672" y="230" text-anchor="middle" font-size="12" fill="#6D28D9">CI/CD 연결</text>

  <!-- Comparison table header -->
  <text x="400" y="285" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E293B">Gemini CLI vs Claude Code 비교</text>

  <!-- Table -->
  <rect x="40" y="298" width="720" height="36" rx="4" fill="#E2E8F0"/>
  <text x="130" y="321" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">항목</text>
  <text x="340" y="321" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Gemini CLI</text>
  <text x="580" y="321" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Claude Code</text>

  <rect x="40" y="334" width="720" height="32" rx="0" fill="#FFFFFF"/>
  <text x="130" y="355" text-anchor="middle" font-size="12" fill="#475569">기반 모델</text>
  <text x="340" y="355" text-anchor="middle" font-size="12" fill="#475569">Gemini 2.5 Pro</text>
  <text x="580" y="355" text-anchor="middle" font-size="12" fill="#475569">Claude Sonnet/Opus</text>

  <rect x="40" y="366" width="720" height="32" rx="0" fill="#F8FAFC"/>
  <text x="130" y="387" text-anchor="middle" font-size="12" fill="#475569">무료 한도</text>
  <text x="340" y="387" text-anchor="middle" font-size="12" fill="#10B981">월 60회 무료</text>
  <text x="580" y="387" text-anchor="middle" font-size="12" fill="#F59E0B">Pro 구독 필요</text>

  <rect x="40" y="398" width="720" height="32" rx="0" fill="#FFFFFF"/>
  <text x="130" y="419" text-anchor="middle" font-size="12" fill="#475569">코드베이스 인식</text>
  <text x="340" y="419" text-anchor="middle" font-size="12" fill="#10B981">100만 토큰 컨텍스트</text>
  <text x="580" y="419" text-anchor="middle" font-size="12" fill="#10B981">프로젝트 전체 탐색</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Footer -->
  <text x="400" y="443" text-anchor="middle" font-size="11" fill="#94A3B8">gemini.google.com/cli  |  2026년 3월 기준</text>
</svg>
