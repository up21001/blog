<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#12395a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17324d"/>
      <stop offset="100%" stop-color="#0f2033"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7fd3ff"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="110" r="180" fill="#1d77c3" opacity="0.12"/>
  <circle cx="160" cy="520" r="220" fill="#54c8ff" opacity="0.08"/>
  <text x="70" y="90" fill="#d9f3ff" font-size="40" font-weight="700" font-family="Inter, Arial, sans-serif">Cloudflare MCPAgent Workflow</text>
  <text x="70" y="125" fill="#91b9d6" font-size="20" font-family="Inter, Arial, sans-serif">Agents + Durable Objects + Remote MCP</text>
  <g>
    <rect x="70" y="180" rx="24" ry="24" width="210" height="140" fill="url(#card)" stroke="#2e5f84"/>
    <text x="175" y="230" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700" font-family="Inter, Arial, sans-serif">User</text>
    <text x="175" y="264" text-anchor="middle" fill="#9ec8df" font-size="18" font-family="Inter, Arial, sans-serif">chat / request</text>
  </g>
  <g>
    <rect x="330" y="180" rx="24" ry="24" width="250" height="140" fill="url(#card)" stroke="#2e5f84"/>
    <text x="455" y="225" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700" font-family="Inter, Arial, sans-serif">Cloudflare Worker</text>
    <text x="455" y="260" text-anchor="middle" fill="#9ec8df" font-size="18" font-family="Inter, Arial, sans-serif">router / policy / tool selection</text>
  </g>
  <g>
    <rect x="640" y="180" rx="24" ry="24" width="230" height="140" fill="url(#card)" stroke="#2e5f84"/>
    <text x="755" y="225" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700" font-family="Inter, Arial, sans-serif">Durable Object</text>
    <text x="755" y="260" text-anchor="middle" fill="#9ec8df" font-size="18" font-family="Inter, Arial, sans-serif">session state / approvals</text>
  </g>
  <g>
    <rect x="920" y="180" rx="24" ry="24" width="210" height="140" fill="url(#card)" stroke="#2e5f84"/>
    <text x="1025" y="225" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700" font-family="Inter, Arial, sans-serif">Remote MCP</text>
    <text x="1025" y="260" text-anchor="middle" fill="#9ec8df" font-size="18" font-family="Inter, Arial, sans-serif">external tools / connectors</text>
  </g>
  <line x1="280" y1="250" x2="330" y2="250" stroke="#7fd3ff" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="580" y1="250" x2="640" y2="250" stroke="#7fd3ff" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="870" y1="250" x2="920" y2="250" stroke="#7fd3ff" stroke-width="5" marker-end="url(#arrow)"/>
  <g>
    <rect x="260" y="385" rx="22" ry="22" width="680" height="150" fill="#0f1f31" stroke="#2e5f84"/>
    <text x="600" y="430" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700" font-family="Inter, Arial, sans-serif">Checklist</text>
    <text x="600" y="467" text-anchor="middle" fill="#9ec8df" font-size="18" font-family="Inter, Arial, sans-serif">allowlist tools, keep state in DO, require approval for sensitive actions</text>
    <text x="600" y="500" text-anchor="middle" fill="#9ec8df" font-size="18" font-family="Inter, Arial, sans-serif">log every tool call and split read vs write paths</text>
  </g>
  <line x1="755" y1="320" x2="755" y2="385" stroke="#7fd3ff" stroke-width="5" marker-end="url(#arrow)"/>
</svg>
