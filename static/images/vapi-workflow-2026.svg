<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Vapi Workflow 2026</title>
  <desc id="desc">Workflow diagram for Vapi showing assistants, phone numbers, tools, and inbound/outbound calls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#c2410c" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2410c"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="86" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Vapi Workflow</text>
  <text x="70" y="122" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">Assistant configuration, phone numbers, tools, and live call automation</text>
  <rect x="70" y="210" width="200" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="115" y="262" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Assistant</text>
  <text x="122" y="292" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">prompt, tools</text>
  <rect x="340" y="160" width="500" height="330" rx="28" fill="#fff" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <text x="570" y="212" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Vapi</text>
  <rect x="390" y="246" width="160" height="84" rx="18" fill="#fff7ed" stroke="#fdba74"/>
  <text x="416" y="296" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Phone</text>
  <rect x="600" y="246" width="160" height="84" rx="18" fill="#fff7ed" stroke="#fdba74"/>
  <text x="642" y="296" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Tools</text>
  <rect x="390" y="360" width="160" height="84" rx="18" fill="#fff7ed" stroke="#fdba74"/>
  <text x="426" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Inbound</text>
  <rect x="600" y="360" width="160" height="84" rx="18" fill="#fff7ed" stroke="#fdba74"/>
  <text x="636" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Outbound</text>
  <rect x="900" y="210" width="220" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="978" y="262" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Calls</text>
  <text x="953" y="292" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">phone conversations</text>
  <path d="M270 265 C310 265, 320 265, 340 265" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M550 288 C575 288, 580 288, 600 288" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M760 288 C820 288, 850 288, 900 266" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M760 402 C820 402, 850 392, 900 302" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
