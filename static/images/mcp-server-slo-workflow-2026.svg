<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MCP server SLO workflow</title>
  <desc id="desc">Flow from request to SLO definition, measurement, and release decision.</desc>
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <style>
      .title { font: 700 36px Arial, sans-serif; fill: #fff; }
      .sub { font: 400 18px Arial, sans-serif; fill: #dbeafe; }
      .box { fill: rgba(255,255,255,0.08); stroke: rgba(255,255,255,0.45); stroke-width: 2; rx: 22; }
      .box2 { fill: #e0f2fe; stroke: #38bdf8; stroke-width: 2; rx: 18; }
      .text { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 16px Arial, sans-serif; fill: #0f172a; }
      .arrow { stroke: #fff; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#fff"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <circle cx="1020" cy="110" r="110" fill="rgba(255,255,255,0.08)"/>
  <circle cx="180" cy="540" r="130" fill="rgba(255,255,255,0.06)"/>
  <text x="60" y="78" class="title">MCP Server SLO Workflow</text>
  <text x="60" y="112" class="sub">Define budget, measure latency, decide release</text>
  <rect x="70" y="180" width="190" height="120" class="box"/>
  <rect x="320" y="180" width="190" height="120" class="box2"/>
  <rect x="570" y="180" width="190" height="120" class="box2"/>
  <rect x="820" y="180" width="190" height="120" class="box2"/>
  <rect x="1040" y="170" width="110" height="140" class="box"/>
  <text x="1058" y="228" class="text">Ship?</text>
  <text x="1058" y="255" class="small">yes / no</text>
  <text x="105" y="225" class="text">Request</text>
  <text x="95" y="252" class="small">tool call start</text>
  <text x="345" y="225" class="text">SLO</text>
  <text x="340" y="252" class="small">latency + success</text>
  <text x="590" y="225" class="text">Measure</text>
  <text x="582" y="252" class="small">p95, p99, timeout</text>
  <text x="840" y="225" class="text">Decision</text>
  <text x="838" y="252" class="small">budget healthy?</text>
  <path class="arrow" d="M260 240 L320 240"/>
  <path class="arrow" d="M510 240 L570 240"/>
  <path class="arrow" d="M760 240 L820 240"/>
  <path class="arrow" d="M1010 240 L1040 240"/>
  <rect x="120" y="380" width="960" height="130" class="box"/>
  <text x="150" y="430" class="text" fill="#fff">Release rule</text>
  <text x="150" y="460" class="sub">budget healthy = continue, budget exhausted = stop deployment and fix reliability</text>
</svg>

