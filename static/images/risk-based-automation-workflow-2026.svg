<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f7ff"/>
      <stop offset="100%" stop-color="#eef9f3"/>
    </linearGradient>
    <style>
      .title{font:700 42px Arial,sans-serif;fill:#182033}
      .sub{font:400 22px Arial,sans-serif;fill:#455066}
      .box{fill:#fff;stroke:#182033;stroke-width:3;rx:18;ry:18}
      .label{font:700 22px Arial,sans-serif;fill:#182033}
      .small{font:400 18px Arial,sans-serif;fill:#4b5563}
      .arrow{stroke:#182033;stroke-width:4;fill:none;marker-end:url(#m)}
      .pill{fill:#182033;rx:999;ry:999}
      .pillText{font:700 18px Arial,sans-serif;fill:#fff}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#182033"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="70" class="title">Risk-Based Automation</text>
  <text x="60" y="110" class="sub">Route work based on impact, reversibility, and sensitivity</text>
  <rect x="60" y="140" width="180" height="40" class="pill"/>
  <text x="85" y="167" class="pillText">workflow</text>
  <rect class="box" x="80" y="230" width="170" height="110"/>
  <text x="110" y="275" class="label">Trigger</text>
  <text x="98" y="305" class="small">Agent request</text>
  <rect class="box" x="350" y="230" width="190" height="110"/>
  <text x="392" y="275" class="label">Risk Score</text>
  <text x="378" y="305" class="small">Policy engine</text>
  <rect class="box" x="650" y="190" width="190" height="110"/>
  <text x="686" y="235" class="label">Auto Run</text>
  <text x="673" y="265" class="small">Low risk</text>
  <rect class="box" x="650" y="330" width="190" height="110"/>
  <text x="686" y="375" class="label">Approve</text>
  <text x="665" y="405" class="small">Medium / high</text>
  <rect class="box" x="930" y="260" width="180" height="110"/>
  <text x="961" y="305" class="label">Record</text>
  <text x="953" y="335" class="small">Audit trail</text>
  <path class="arrow" d="M250 285 L350 285"/>
  <path class="arrow" d="M540 285 L650 245"/>
  <path class="arrow" d="M540 285 L650 385"/>
  <path class="arrow" d="M840 245 L930 315"/>
  <path class="arrow" d="M840 385 L930 315"/>
</svg>
