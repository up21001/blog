<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Qdrant workflow 2026</title>
  <desc id="desc">Workflow diagram showing embeddings flowing into Qdrant for filtered similarity search and RAG retrieval.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07131f"/>
      <stop offset="100%" stop-color="#1c2a4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <style>
      .title { font: 700 40px/1.2 'Segoe UI', Arial, sans-serif; fill: #f8fbff; }
      .sub { font: 400 18px/1.5 'Segoe UI', Arial, sans-serif; fill: #c7d4e6; }
      .label { font: 700 20px/1.2 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .text { font: 400 16px/1.5 'Segoe UI', Arial, sans-serif; fill: #d6e1ef; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="95" r="110" fill="#ef4444" opacity="0.12"/>
  <circle cx="165" cy="520" r="150" fill="#22c55e" opacity="0.12"/>
  <text x="70" y="82" class="title">Qdrant workflow</text>
  <text x="70" y="118" class="sub">Embeddings, metadata filters, and retrieval for production RAG</text>

  <rect x="70" y="210" width="170" height="94" rx="20" fill="#0f4c81" filter="url(#shadow)"/>
  <text x="118" y="255" class="label">Sources</text>
  <text x="96" y="282" class="text">docs, pages, faq</text>

  <rect x="290" y="182" width="190" height="150" rx="24" fill="#1f8a70" filter="url(#shadow)"/>
  <text x="343" y="228" class="label">Embedding</text>
  <text x="322" y="258" class="text">chunk + vectorize</text>
  <text x="329" y="285" class="text">metadata attached</text>

  <rect x="540" y="160" width="220" height="194" rx="26" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="603" y="214" class="label">Qdrant</text>
  <text x="577" y="246" class="text">HNSW index</text>
  <text x="574" y="274" class="text">payload filters</text>
  <text x="564" y="302" class="text">collection / shard</text>

  <rect x="820" y="170" width="180" height="84" rx="20" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="866" y="220" class="label">Search</text>

  <rect x="820" y="280" width="180" height="84" rx="20" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="852" y="330" class="label">RAG Answer</text>

  <path d="M240 257 L290 257" stroke="#9fb2c8" stroke-width="7" stroke-linecap="round"/>
  <path d="M480 257 L540 257" stroke="#9fb2c8" stroke-width="7" stroke-linecap="round"/>
  <path d="M760 230 L820 212" stroke="#9fb2c8" stroke-width="7" stroke-linecap="round"/>
  <path d="M760 290 L820 322" stroke="#9fb2c8" stroke-width="7" stroke-linecap="round"/>

  <rect x="70" y="382" width="1050" height="10" rx="5" fill="url(#accent)" opacity="0.85"/>
  <text x="70" y="460" class="sub">Use Qdrant when search quality, metadata filtering, and product-grade retrieval matter more than keeping everything inside Postgres.</text>
</svg>
