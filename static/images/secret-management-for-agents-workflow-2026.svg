<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" rx="36" fill="#0f172a"/>
  <text x="70" y="92" fill="#e2e8f0" font-size="40" font-family="Arial" font-weight="700">Secret Management for Agents</text>
  <text x="70" y="130" fill="#94a3b8" font-size="20" font-family="Arial">short-lived tokens, scoped access, rotation</text>
  <rect x="70" y="220" width="220" height="110" rx="18" fill="#111827" stroke="#334155"/>
  <text x="180" y="262" fill="#f8fafc" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700">Vault</text>
  <text x="180" y="294" fill="#cbd5e1" text-anchor="middle" font-size="18" font-family="Arial">source of truth</text>
  <rect x="340" y="220" width="220" height="110" rx="18" fill="#111827" stroke="#38bdf8"/>
  <text x="450" y="262" fill="#f8fafc" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700">Broker</text>
  <text x="450" y="294" fill="#cbd5e1" text-anchor="middle" font-size="18" font-family="Arial">exchange to token</text>
  <rect x="610" y="220" width="220" height="110" rx="18" fill="#111827" stroke="#334155"/>
  <text x="720" y="262" fill="#f8fafc" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700">Agent</text>
  <text x="720" y="294" fill="#cbd5e1" text-anchor="middle" font-size="18" font-family="Arial">never sees raw key</text>
  <rect x="880" y="220" width="220" height="110" rx="18" fill="#111827" stroke="#22c55e"/>
  <text x="990" y="262" fill="#f8fafc" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700">Rotate</text>
  <text x="990" y="294" fill="#cbd5e1" text-anchor="middle" font-size="18" font-family="Arial">expire and renew</text>
  <path d="M290 275 L330 275" stroke="#38bdf8" stroke-width="6" stroke-linecap="round"/>
  <path d="M560 275 L600 275" stroke="#38bdf8" stroke-width="6" stroke-linecap="round"/>
  <path d="M830 275 L870 275" stroke="#38bdf8" stroke-width="6" stroke-linecap="round"/>
  <rect x="140" y="390" width="920" height="150" rx="24" fill="#111827" stroke="#334155"/>
  <text x="600" y="438" fill="#f8fafc" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700">The agent gets access, not ownership</text>
  <text x="600" y="476" fill="#cbd5e1" text-anchor="middle" font-size="20" font-family="Arial">least privilege plus short lifetime plus rotation</text>
  <text x="600" y="512" fill="#38bdf8" text-anchor="middle" font-size="18" font-family="Arial">keep secrets out of prompts and out of logs</text>
</svg>

