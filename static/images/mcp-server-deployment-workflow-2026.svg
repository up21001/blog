<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MCP Server Deployment Workflow</title>
  <desc id="desc">Workflow for local, remote, and gateway deployment decisions.</desc>
  <rect width="1200" height="630" rx="36" fill="#09141f"/>
  <text x="64" y="88" fill="#f5f7fb" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700">MCP Server Deployment</text>
  <text x="64" y="124" fill="#9bb2d2" font-family="Inter, Arial, sans-serif" font-size="20">Workflow: local -> remote -> gateway -> rollout</text>
  <g fill="#11253c" stroke="#ffb86b" stroke-width="2">
    <rect x="70" y="210" width="220" height="120" rx="22"/>
    <rect x="340" y="210" width="220" height="120" rx="22"/>
    <rect x="610" y="210" width="220" height="120" rx="22"/>
    <rect x="880" y="210" width="250" height="120" rx="22"/>
  </g>
  <g fill="#f5f7fb" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">
    <text x="116" y="258">Local</text>
    <text x="384" y="258">Remote</text>
    <text x="635" y="258">Gateway</text>
    <text x="930" y="258">Rollout</text>
  </g>
  <g stroke="#ffb86b" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M290 270 H330"/>
    <path d="M560 270 H600"/>
    <path d="M830 270 H870"/>
  </g>
  <g fill="#9bb2d2" font-family="Inter, Arial, sans-serif" font-size="18">
    <text x="92" y="304">Single team or lab</text>
    <text x="362" y="304">Shared service</text>
    <text x="632" y="304">Policy boundary</text>
    <text x="920" y="304">Versioned release</text>
  </g>
</svg>
