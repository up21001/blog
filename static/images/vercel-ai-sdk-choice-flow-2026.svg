<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Vercel AI SDK Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when Vercel AI SDK is a good fit.</desc>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#312e81" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4338ca"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg4)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">Should You Use Vercel AI SDK?</text>
  <rect x="435" y="120" width="330" height="90" rx="22" fill="#fff" stroke="#818cf8" stroke-width="2" filter="url(#shadow4)"/>
  <text x="488" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">Building AI UI?</text>
  <rect x="110" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#a5b4fc" filter="url(#shadow4)"/>
  <text x="176" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Backend only</text>
  <text x="146" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">A lighter server SDK may be enough</text>
  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#a5b4fc" filter="url(#shadow4)"/>
  <text x="500" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Need streaming</text>
  <text x="522" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">and tools?</text>
  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#a5b4fc" filter="url(#shadow4)"/>
  <text x="846" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">React / Next.js</text>
  <text x="858" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">first team?</text>
  <rect x="440" y="500" width="330" height="110" rx="26" fill="#312e81" filter="url(#shadow4)"/>
  <text x="488" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#eef2ff">Use AI SDK</text>
  <text x="476" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c7d2fe">Great for streaming generative UX</text>
  <path d="M600 210 L600 285" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
  <path d="M450 340 L410 340" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
  <path d="M750 340 L790 340" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
  <path d="M600 395 L600 500" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
</svg>
