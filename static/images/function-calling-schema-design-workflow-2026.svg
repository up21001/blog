<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Function Calling Schema Design Workflow 2026</title>
  <desc id="desc">Schema design flow from intent to validation and execution</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">Function Calling Schema Design</text>
  <text x="70" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#475569">intent -> fields -> constraints -> validation -> tool call</text>
  <rect x="70" y="230" width="190" height="120" rx="22" fill="#0f766e" filter="url(#shadow)"/>
  <text x="165" y="274" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Intent</text>
  <text x="165" y="304" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ccfbf1">user goal</text>
  <rect x="320" y="210" width="220" height="160" rx="24" fill="#2563eb" filter="url(#shadow)"/>
  <text x="430" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Fields</text>
  <text x="430" y="286" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#dbeafe">required / optional</text>
  <text x="430" y="316" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#dbeafe">names / enums</text>
  <rect x="590" y="210" width="220" height="160" rx="24" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="700" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Constraints</text>
  <text x="700" y="286" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#fff7ed">type / range / pattern</text>
  <text x="700" y="316" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#fff7ed">min / max / enum</text>
  <rect x="860" y="210" width="210" height="160" rx="24" fill="#334155" filter="url(#shadow)"/>
  <text x="965" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Validate</text>
  <text x="965" y="286" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#e2e8f0">reject bad args</text>
  <text x="965" y="316" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#e2e8f0">trace failures</text>
  <line x1="260" y1="290" x2="320" y2="290" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="540" y1="290" x2="590" y2="290" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="810" y1="290" x2="860" y2="290" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
  <rect x="110" y="430" width="980" height="100" rx="22" fill="#ffffff" filter="url(#shadow)"/>
  <text x="150" y="470" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Rule</text>
  <text x="240" y="470" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#475569">Make the schema easier for the model than the fallback path.</text>
</svg>
