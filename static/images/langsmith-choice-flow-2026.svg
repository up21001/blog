<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#faf5ff"/><text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4c1d95">Should You Use LangSmith?</text><rect x="430" y="120" width="340" height="90" rx="22" fill="#fff" stroke="#a78bfa"/><text x="466" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4c1d95">Need LLM observability?</text><rect x="110" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#c4b5fd"/><text x="186" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">No</text><text x="140" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#6d28d9">A lighter logging tool may be enough</text><rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#c4b5fd"/><text x="495" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">Need evals and</text><text x="503" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">prompt testing?</text><rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#c4b5fd"/><text x="835" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">Need agent builder</text><text x="856" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">and deployment?</text><rect x="445" y="500" width="320" height="110" rx="26" fill="#4c1d95"/><text x="516" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#faf5ff">Use LangSmith</text><text x="485" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#ddd6fe">Strong fit for production LLM ops</text></svg>
