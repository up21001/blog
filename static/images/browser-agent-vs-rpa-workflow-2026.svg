<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#07111f"/>
  <text x="80" y="86" fill="#f8fafc" font-size="42" font-family="Arial, sans-serif" font-weight="700">Browser Agent vs RPA</text>
  <text x="80" y="126" fill="#94a3b8" font-size="20" font-family="Arial, sans-serif">Choose by variability, policy, and review cost</text>
  <rect x="90" y="180" width="420" height="250" rx="26" fill="#111827" stroke="#334155"/>
  <rect x="620" y="180" width="490" height="250" rx="26" fill="#111827" stroke="#334155"/>
  <text x="130" y="235" fill="#38bdf8" font-size="32" font-family="Arial, sans-serif" font-weight="700">RPA</text>
  <text x="130" y="280" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">fixed flows</text>
  <text x="130" y="318" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">stable UI</text>
  <text x="130" y="356" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">low variance</text>
  <text x="660" y="235" fill="#22c55e" font-size="32" font-family="Arial, sans-serif" font-weight="700">Browser Agent</text>
  <text x="660" y="280" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">changing UI</text>
  <text x="660" y="318" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">policy gates</text>
  <text x="660" y="356" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">replay and traces</text>
  <rect x="90" y="470" width="1020" height="90" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="120" y="525" fill="#e5e7eb" font-size="24" font-family="Arial, sans-serif">Rule of thumb: fixed and repeatable -> RPA, variable and exception-heavy -> Browser Agent</text>
</svg>
