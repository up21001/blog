<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <style>
      .title { font: 700 42px sans-serif; fill: #0f172a; }
      .sub { font: 400 20px sans-serif; fill: #475569; }
      .boxTitle { font: 700 22px sans-serif; fill: #0f172a; }
      .boxText { font: 400 18px sans-serif; fill: #334155; }
      .card { rx: 22; ry: 22; stroke: #cbd5e1; stroke-width: 2; }
    </style>
    <marker id="arrow8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg8)"/>
  <text x="70" y="78" class="title">Hit Rate Decision Flow</text>
  <text x="70" y="114" class="sub">무엇을 분모로 계산하고 어떻게 해석할까</text>

  <rect x="70" y="170" width="180" height="110" class="card" fill="#dbeafe"/>
  <text x="160" y="215" text-anchor="middle" class="boxTitle">Exact / Semantic</text>
  <text x="160" y="245" text-anchor="middle" class="boxText">분리 집계</text>

  <rect x="300" y="170" width="180" height="110" class="card" fill="#e0f2fe"/>
  <text x="390" y="215" text-anchor="middle" class="boxTitle">Latency Saved?</text>
  <text x="390" y="245" text-anchor="middle" class="boxText">시간 절감</text>

  <rect x="530" y="170" width="180" height="110" class="card" fill="#dcfce7"/>
  <text x="620" y="215" text-anchor="middle" class="boxTitle">Cost Saved?</text>
  <text x="620" y="245" text-anchor="middle" class="boxText">토큰 절감</text>

  <rect x="760" y="170" width="180" height="110" class="card" fill="#fef9c3"/>
  <text x="850" y="215" text-anchor="middle" class="boxTitle">Quality OK?</text>
  <text x="850" y="245" text-anchor="middle" class="boxText">정확도 유지</text>

  <rect x="990" y="170" width="140" height="110" class="card" fill="#ffe4e6"/>
  <text x="1060" y="215" text-anchor="middle" class="boxTitle">Keep</text>
  <text x="1060" y="245" text-anchor="middle" class="boxText">유지 / 조정</text>

  <line x1="250" y1="225" x2="300" y2="225" stroke="#64748b" stroke-width="4" marker-end="url(#arrow8)"/>
  <line x1="480" y1="225" x2="530" y2="225" stroke="#64748b" stroke-width="4" marker-end="url(#arrow8)"/>
  <line x1="710" y1="225" x2="760" y2="225" stroke="#64748b" stroke-width="4" marker-end="url(#arrow8)"/>
  <line x1="940" y1="225" x2="990" y2="225" stroke="#64748b" stroke-width="4" marker-end="url(#arrow8)"/>

  <rect x="70" y="350" width="1060" height="190" class="card" fill="#ffffff"/>
  <text x="100" y="392" class="boxTitle">해석 기준</text>
  <text x="100" y="432" class="boxText">hit rate가 높아도 품질이 흔들리면 cache policy를 다시 봐야 한다.</text>
  <text x="100" y="470" class="boxText">비용 절감과 latency 개선이 동시에 나타나는지, 그리고 false hit은 얼마나 되는지 확인한다.</text>
  <text x="100" y="508" class="boxText">적중률은 출발점이고, 운영 판단은 quality와 cost를 함께 봐야 한다.</text>
</svg>
