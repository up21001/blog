  <rect x="320" y="185" width="240" height="100" rx="18" fill="#7c3aed"/>
  <text x="440" y="227" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="20">Reranker</text>
  <rect x="610" y="185" width="240" height="100" rx="18" fill="#0ea5e9"/>
  <text x="730" y="227" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="20">Routing / Cache</text>
  <rect x="900" y="185" width="230" height="100" rx="18" fill="#22c55e"/>
