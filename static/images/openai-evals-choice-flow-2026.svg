<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d1625"/>
      <stop offset="100%" stop-color="#17253a"/>
    </linearGradient>
    <style>
      .t { fill: #eef5ff; font-family: Arial, sans-serif; }
      .s { fill: #aabdd8; font-family: Arial, sans-serif; }
      .b { fill: #22344f; stroke: #54739f; stroke-width: 2; }
      .l { stroke: #92b8e9; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#92b8e9"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="96" class="t" font-size="42" font-weight="700">Evals Decision Flow</text>
  <rect x="70" y="180" width="260" height="120" rx="18" class="b"/>
  <rect x="400" y="180" width="260" height="120" rx="18" class="b"/>
  <rect x="730" y="180" width="400" height="120" rx="18" class="b"/>
  <text x="106" y="228" class="t" font-size="26" font-weight="700">What changed?</text>
  <text x="106" y="262" class="s" font-size="20">prompt / model / tools</text>
  <text x="434" y="228" class="t" font-size="26" font-weight="700">Run eval suite</text>
  <text x="434" y="262" class="s" font-size="20">grading rules + samples</text>
  <text x="768" y="228" class="t" font-size="26" font-weight="700">Compare score trend</text>
  <text x="768" y="262" class="s" font-size="20">pass, regress, inspect</text>
  <path d="M330 240 L400 240" class="l"/>
  <path d="M660 240 L730 240" class="l"/>
  <text x="110" y="390" class="s" font-size="21">Use evals whenever output quality can drift</text>
  <text x="110" y="438" class="s" font-size="21">Keep manual review only for ambiguous cases</text>
  <text x="110" y="486" class="s" font-size="21">Store failing samples as regression data</text>
</svg>
