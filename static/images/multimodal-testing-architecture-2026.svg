<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f3ee"/>
      <stop offset="100%" stop-color="#eadfd1"/>
    </linearGradient>
    <style>
      .title{font:700 42px Arial,sans-serif;fill:#1e1a16}
      .box{fill:#fff7f0;stroke:#8c6f55;stroke-width:3;rx:18;ry:18}
      .label{font:700 21px Arial,sans-serif;fill:#2c231d}
      .small{font:400 17px Arial,sans-serif;fill:#53463c}
      .arrow{stroke:#8c6f55;stroke-width:5;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#8c6f55"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="title">Multimodal Testing Architecture</text>
  <rect class="box" x="70" y="170" width="200" height="120"/><text x="170" y="212" text-anchor="middle" class="label">Input Store</text><text x="170" y="242" text-anchor="middle" class="small">images / audio / screen</text>
  <rect class="box" x="320" y="170" width="200" height="120"/><text x="420" y="212" text-anchor="middle" class="label">Normalizer</text><text x="420" y="242" text-anchor="middle" class="small">resize / OCR / STT</text>
  <rect class="box" x="570" y="170" width="200" height="120"/><text x="670" y="212" text-anchor="middle" class="label">Replay Engine</text><text x="670" y="242" text-anchor="middle" class="small">prompt / model / tool matrix</text>
  <rect class="box" x="820" y="170" width="250" height="120"/><text x="945" y="212" text-anchor="middle" class="label">Scoring Layer</text><text x="945" y="242" text-anchor="middle" class="small">quality / latency / schema</text>
  <path class="arrow" d="M270 230 H315"/><path class="arrow" d="M520 230 H565"/><path class="arrow" d="M770 230 H815"/>
  <rect class="box" x="120" y="370" width="260" height="130"/><text x="250" y="412" text-anchor="middle" class="label">Trace Metadata</text><text x="250" y="442" text-anchor="middle" class="small">trace id, scenario, labels</text><text x="250" y="468" text-anchor="middle" class="small">golden / synthetic / live</text>
  <rect class="box" x="450" y="370" width="260" height="130"/><text x="580" y="412" text-anchor="middle" class="label">Decision Log</text><text x="580" y="442" text-anchor="middle" class="small">model, prompt, tool, state</text><text x="580" y="468" text-anchor="middle" class="small">pass / fail / review</text>
  <rect class="box" x="780" y="370" width="300" height="130"/><text x="930" y="412" text-anchor="middle" class="label">Dashboard</text><text x="930" y="442" text-anchor="middle" class="small">diff, regression gate, alerts</text><text x="930" y="468" text-anchor="middle" class="small">human review queue</text>
  <path class="arrow" d="M380 435 H445"/><path class="arrow" d="M710 435 H775"/>
</svg>
