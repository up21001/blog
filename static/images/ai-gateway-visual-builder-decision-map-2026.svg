<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI Gateway Visual Builder Decision Map 2026</title>
  <desc id="desc">Decision map for choosing LiteLLM, Langflow, Flowise, or Exa.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#312e81" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">Which Layer Do You Need?</text>
  <rect x="435" y="115" width="330" height="90" rx="22" fill="#fff" stroke="#c7d2fe" filter="url(#shadow)"/>
  <text x="478" y="170" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">Need a model gateway?</text>

  <rect x="90" y="280" width="250" height="120" rx="22" fill="#fff" stroke="#c7d2fe" filter="url(#shadow)"/>
  <text x="160" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Yes</text>
  <text x="126" y="360" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">Use LiteLLM</text>

  <rect x="360" y="280" width="250" height="120" rx="22" fill="#fff" stroke="#c7d2fe" filter="url(#shadow)"/>
  <text x="400" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Need visual flows?</text>
  <text x="410" y="360" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">Langflow or Flowise</text>

  <rect x="630" y="280" width="250" height="120" rx="22" fill="#fff" stroke="#c7d2fe" filter="url(#shadow)"/>
  <text x="666" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Need agent ops?</text>
  <text x="656" y="360" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">Langflow / Flowise</text>

  <rect x="900" y="280" width="220" height="120" rx="22" fill="#fff" stroke="#c7d2fe" filter="url(#shadow)"/>
  <text x="959" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Need search?</text>
  <text x="978" y="360" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">Use Exa</text>

  <rect x="430" y="500" width="340" height="110" rx="26" fill="#312e81" filter="url(#shadow)"/>
  <text x="486" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#eef2ff">Pick the layer first</text>
  <text x="474" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c7d2fe">Gateway, builder, or search infra</text>
</svg>
