<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">OpenAI Responses Streaming Choice Flow 2026</title>
  <desc id="desc">Decision flow for using streaming in OpenAI Responses</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8ee"/>
      <stop offset="100%" stop-color="#eef7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#465865" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#1f3040">Responses Streaming Choice Flow</text>
  <text x="70" y="122" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#5c7182">스트리밍이 필요한지 빠르게 판단하는 기준</text>

  <rect x="90" y="220" width="230" height="120" rx="24" fill="#0f4c81" filter="url(#shadow)"/>
  <text x="131" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">Start</text>
  <text x="112" y="306" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#d7e8ff">응답 길이 / UX 확인</text>

  <polygon points="430,165 530,225 430,285 330,225" fill="#1f8a70" filter="url(#shadow)"/>
  <text x="360" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">긴 답변인가?</text>

  <rect x="630" y="100" width="210" height="90" rx="20" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="675" y="154" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Stream</text>

  <rect x="630" y="235" width="210" height="90" rx="20" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="664" y="289" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Maybe later</text>

  <rect x="630" y="370" width="210" height="90" rx="20" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="688" y="424" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">No stream</text>

  <rect x="890" y="235" width="220" height="140" rx="24" fill="#24415a" filter="url(#shadow)"/>
  <text x="949" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">UI</text>
  <text x="913" y="323" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#d8ebff">progressive render</text>
  <text x="918" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#d8ebff">final commit</text>

  <path d="M320 225 L330 225" stroke="#506675" stroke-width="7" fill="none"/>
  <path d="M530 225 L630 145" stroke="#506675" stroke-width="7" fill="none"/>
  <path d="M530 225 L630 280" stroke="#506675" stroke-width="7" fill="none"/>
  <path d="M530 225 L630 415" stroke="#506675" stroke-width="7" fill="none"/>
  <path d="M840 145 L890 290" stroke="#506675" stroke-width="7" fill="none"/>
</svg>
