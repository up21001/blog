<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06111e"/>
      <stop offset="100%" stop-color="#102a43"/>
    </linearGradient>
    <style>
      .title{font:700 42px system-ui,Segoe UI,sans-serif;fill:#fff}
      .sub{font:500 20px system-ui,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#38bdf8;stroke-width:2;rx:18}
      .box2{fill:#0f172a;stroke:#8b5cf6;stroke-width:2;rx:18}
      .text{font:600 18px system-ui,sans-serif;fill:#e5e7eb}
      .small{font:500 15px system-ui,sans-serif;fill:#94a3b8}
      .arrow{stroke:#38bdf8;stroke-width:4;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="82" class="title">Agent Event Schema Architecture</text>
  <text x="60" y="118" class="sub">앱 이벤트를 표준화하고 분석 파이프라인으로 보낸다</text>
  <rect x="65" y="185" width="180" height="115" class="box"/>
  <text x="95" y="228" class="text">Agent App</text>
  <text x="95" y="255" class="small">emit events</text>
  <rect x="285" y="185" width="180" height="115" class="box2"/>
  <text x="315" y="228" class="text">Schema Layer</text>
  <text x="315" y="255" class="small">validate / redact</text>
  <rect x="505" y="185" width="180" height="115" class="box"/>
  <text x="535" y="228" class="text">Event Store</text>
  <text x="535" y="255" class="small">logs / traces</text>
  <rect x="725" y="185" width="180" height="115" class="box2"/>
  <text x="755" y="228" class="text">Analyzer</text>
  <text x="755" y="255" class="small">queries / dashboards</text>
  <rect x="945" y="185" width="180" height="115" class="box"/>
  <text x="972" y="228" class="text">Consumer</text>
  <text x="972" y="255" class="small">audit / eval / alert</text>
  <path d="M245 243 H285" class="arrow"/>
  <path d="M465 243 H505" class="arrow"/>
  <path d="M685 243 H725" class="arrow"/>
  <path d="M905 243 H945" class="arrow"/>
  <rect x="135" y="350" width="930" height="165" class="box"/>
  <text x="175" y="395" class="text">설계 포인트</text>
  <text x="175" y="428" class="small">schema는 작게 시작하고, incident, audit, evaluation 용 필드를 분리한다.</text>
  <text x="175" y="455" class="small">이벤트를 표준화하면 AI Tracing, AI Audit Log, RAG Monitoring이 같은 데이터 소스를 쓴다.</text>
</svg>
