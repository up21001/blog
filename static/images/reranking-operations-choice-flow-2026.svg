<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f8fafc"/>
  <text x="70" y="90" fill="#111827" font-family="Arial, sans-serif" font-size="42" font-weight="700">Reranking Choice Flow</text>
  <rect x="70" y="180" width="240" height="90" rx="16" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="190" y="235" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="20">Need higher precision?</text>
  <polygon points="430,180 560,225 430,270 300,225" fill="#fde68a" stroke="#f59e0b"/>
  <text x="430" y="228" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="20">Yes</text>
  <rect x="620" y="160" width="220" height="120" rx="16" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="730" y="214" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="20">Cross-encoder</text>
  <text x="730" y="244" text-anchor="middle" fill="#334155" font-family="Arial, sans-serif" font-size="16">rerank top-k</text>
  <rect x="900" y="160" width="220" height="120" rx="16" fill="#dcfce7" stroke="#34d399"/>
  <text x="1010" y="214" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="20">LLM context</text>
  <text x="1010" y="244" text-anchor="middle" fill="#334155" font-family="Arial, sans-serif" font-size="16">final answer</text>
  <line x1="310" y1="225" x2="300" y2="225" stroke="#111827" stroke-width="4"/>
  <line x1="560" y1="225" x2="620" y2="225" stroke="#111827" stroke-width="4"/>
  <line x1="840" y1="225" x2="900" y2="225" stroke="#111827" stroke-width="4"/>
  <rect x="70" y="340" width="1050" height="190" rx="22" fill="#0f172a"/>
  <text x="100" y="385" fill="#f8fafc" font-family="Arial, sans-serif" font-size="22" font-weight="700">Decision rules</text>
  <text x="100" y="425" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">small corpus or simple queries -> skip rerank</text>
  <text x="100" y="455" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">large corpus or ambiguous queries -> rerank</text>
  <text x="100" y="485" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">quality gain must exceed added latency and cost</text>
</svg>

