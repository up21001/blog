<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Firecrawl Choice Flow 2026</title>
  <desc id="desc">Decision map showing when to choose Firecrawl.</desc>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#9a3412" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2410c"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg4)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Should You Use Firecrawl?</text>

  <rect x="430" y="120" width="340" height="90" rx="22" fill="#fff" stroke="#fb923c" stroke-width="2" filter="url(#shadow4)"/>
  <text x="478" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Need web data for agents?</text>

  <rect x="110" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow4)"/>
  <text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">No</text>
  <text x="143" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">A simple HTTP fetch may be enough</text>

  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow4)"/>
  <text x="497" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Need markdown,</text>
  <text x="512" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">crawl, search?</text>

  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow4)"/>
  <text x="844" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Need browser sandbox</text>
  <text x="852" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">or MCP?</text>

  <rect x="445" y="500" width="320" height="110" rx="26" fill="#7c2d12" filter="url(#shadow4)"/>
  <text x="514" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fff7ed">Use Firecrawl</text>
  <text x="482" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#fed7aa">Best for LLM-ready web extraction</text>

  <path d="M600 210 L600 285" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
  <path d="M450 340 L410 340" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
  <path d="M750 340 L790 340" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
  <path d="M600 395 L600 500" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
</svg>
