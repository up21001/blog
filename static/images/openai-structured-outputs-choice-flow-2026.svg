<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">OpenAI Structured Outputs Choice Flow 2026</title>
  <desc id="desc">Decision flow for OpenAI Structured Outputs</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8ef"/>
      <stop offset="100%" stop-color="#eef8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#4b5660" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#1d2f3f">Structured Outputs Decision Flow</text>
  <text x="70" y="122" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#5b7182">JSON 안정성이 필요한지 빠르게 판단하는 기준</text>

  <rect x="90" y="220" width="230" height="120" rx="24" fill="#0f4c81" filter="url(#shadow)"/>
  <text x="135" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">Start</text>
  <text x="110" y="306" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#d7e8ff">앱이 JSON을 읽는가</text>

  <polygon points="430,165 530,225 430,285 330,225" fill="#1f8a70" filter="url(#shadow)"/>
  <text x="356" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">파싱 실패가 치명적인가?</text>

  <rect x="630" y="100" width="210" height="90" rx="20" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="656" y="154" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Use schema</text>

  <rect x="630" y="235" width="210" height="90" rx="20" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="667" y="289" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Maybe prompt</text>

  <rect x="630" y="370" width="210" height="90" rx="20" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="675" y="424" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Text only</text>

  <rect x="890" y="235" width="220" height="140" rx="24" fill="#24415a" filter="url(#shadow)"/>
  <text x="942" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">App</text>
  <text x="914" y="323" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#d8ebff">stable fields</text>
  <text x="914" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#d8ebff">safe automation</text>

  <path d="M320 225 L330 225" stroke="#506675" stroke-width="7" fill="none"/>
  <path d="M530 225 L630 145" stroke="#506675" stroke-width="7" fill="none"/>
  <path d="M530 225 L630 280" stroke="#506675" stroke-width="7" fill="none"/>
  <path d="M530 225 L630 415" stroke="#506675" stroke-width="7" fill="none"/>
  <path d="M840 145 L890 290" stroke="#506675" stroke-width="7" fill="none"/>
</svg>
