<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">pgvector workflow 2026</title>
  <desc id="desc">Workflow diagram for storing embeddings in PostgreSQL with pgvector and using SQL similarity search.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101b"/>
      <stop offset="100%" stop-color="#1a2440"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 42px/1.2 'Segoe UI', Arial, sans-serif; fill: #f7fbff; }
      .sub { font: 400 20px/1.5 'Segoe UI', Arial, sans-serif; fill: #c8d4e5; }
      .label { font: 700 22px/1.2 'Segoe UI', Arial, sans-serif; fill: #f6f9ff; }
      .text { font: 400 18px/1.5 'Segoe UI', Arial, sans-serif; fill: #d5e0ee; }
      .small { font: 600 16px/1.2 'Segoe UI', Arial, sans-serif; fill: #c4b5fd; letter-spacing: .08em; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#c4b5fd"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="140" r="190" fill="#8b5cf6" opacity=".12"/>
  <circle cx="230" cy="760" r="230" fill="#22c55e" opacity=".08"/>
  <text x="90" y="110" class="title">pgvector workflow</text>
  <text x="90" y="150" class="sub">Store embeddings in PostgreSQL and query them with SQL</text>
  <text x="90" y="198" class="small">POSTGRESQL EXTENSION · EMBEDDINGS · SIMILARITY SEARCH · SQL</text>

  <rect x="85" y="260" width="360" height="250" rx="28" fill="#14213a" stroke="#3b4d73" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="318" class="label">1. Add the extension</text>
  <text x="120" y="360" class="text">Enable pgvector in PostgreSQL and</text>
  <text x="120" y="392" class="text">store embeddings in a dedicated column.</text>
  <text x="120" y="430" class="text">Keep relational data and vectors together.</text>

  <rect x="510" y="260" width="450" height="250" rx="28" fill="#172845" stroke="#3b4d73" stroke-width="2" filter="url(#shadow)"/>
  <text x="545" y="318" class="label">2. Build indexes</text>
  <text x="545" y="360" class="text">Use HNSW or IVFFlat depending on data</text>
  <text x="545" y="392" class="text">size, write load, and latency target.</text>
  <text x="545" y="430" class="text">Tune for similarity search at scale.</text>

  <rect x="1020" y="260" width="495" height="250" rx="28" fill="#142742" stroke="#3b4d73" stroke-width="2" filter="url(#shadow)"/>
  <text x="1055" y="318" class="label">3. Query with SQL</text>
  <text x="1055" y="360" class="text">Filter by tenant, status, or metadata,</text>
  <text x="1055" y="392" class="text">then rank nearest vectors in one query.</text>
  <text x="1055" y="430" class="text">This keeps AI and app data in one place.</text>

  <rect x="300" y="610" width="1000" height="150" rx="28" fill="#101a2c" stroke="url(#accent)" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="670" class="label">4. Keep the stack simple</text>
  <text x="350" y="710" class="text">One database for CRUD, joins, permissions, and vector search. That is the real appeal of pgvector.</text>

  <line x1="445" y1="385" x2="510" y2="385" stroke="#c4b5fd" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="960" y1="385" x2="1020" y2="385" stroke="#c4b5fd" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1260" y1="510" x2="1260" y2="610" stroke="#c4b5fd" stroke-width="5" marker-end="url(#arrow)"/>
</svg>
