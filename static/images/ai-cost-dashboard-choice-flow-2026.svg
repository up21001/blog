<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f8fafc"/>
  <text x="60" y="76" fill="#0f172a" font-family="Arial, sans-serif" font-size="38" font-weight="700">AI Cost Dashboard Choice Flow</text>
  <text x="60" y="112" fill="#475569" font-family="Arial, sans-serif" font-size="20">Start with total cost, then drill into model, user, and endpoint</text>
  <g fill="#fff" stroke="#0f172a" stroke-width="2">
    <rect x="70" y="180" width="190" height="80" rx="18"/><rect x="320" y="180" width="190" height="80" rx="18"/><rect x="570" y="180" width="190" height="80" rx="18"/><rect x="820" y="180" width="190" height="80" rx="18"/>
  </g>
  <g fill="#0f172a" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">
    <text x="165" y="228">Total Cost</text><text x="415" y="228">Model Split</text><text x="665" y="228">User Split</text><text x="915" y="228">Alert / Act</text>
  </g>
  <g stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#a)"><path d="M260 220 L320 220"/><path d="M510 220 L570 220"/><path d="M760 220 L820 220"/></g>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker></defs>
  <rect x="80" y="320" width="1040" height="190" rx="24" fill="#e2e8f0"/>
  <text x="120" y="372" fill="#0f172a" font-family="Arial, sans-serif" font-size="22" font-weight="700">Decision rules</text>
  <text x="120" y="410" fill="#334155" font-family="Arial, sans-serif" font-size="18">If cost spike is model-based, route to cheaper model.</text>
  <text x="120" y="444" fill="#334155" font-family="Arial, sans-serif" font-size="18">If retry spike is visible, inspect gateway and prompt failures.</text>
  <text x="120" y="478" fill="#334155" font-family="Arial, sans-serif" font-size="18">If monthly threshold is near, trigger budget alert and freeze noncritical jobs.</text>
</svg>

