<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#16324f"/>
    </linearGradient>
    <style>
      .h1 { font: 700 42px Arial, sans-serif; fill: #ffffff; }
      .h2 { font: 400 18px Arial, sans-serif; fill: #c2d8ee; }
      .node { fill: #183a5a; stroke: #74c0fc; stroke-width: 3; }
      .node2 { fill: #124b57; stroke: #7bdff2; stroke-width: 3; }
      .node3 { fill: #3c2f5c; stroke: #d0bfff; stroke-width: 3; }
      .t1 { font: 700 21px Arial, sans-serif; fill: #ffffff; }
      .t2 { font: 400 16px Arial, sans-serif; fill: #dbeafe; }
      .box { fill: #e9f5ff; }
      .boxText { font: 700 18px Arial, sans-serif; fill: #10304b; }
      .small { font: 400 15px Arial, sans-serif; fill: #244966; }
    </style>
    <marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#8ad4ff"/>
    </marker>
  </defs>
  <rect width="1400" height="820" fill="url(#bg2)"/>
  <text x="70" y="90" class="h1">SambaNova choice flow</text>
  <text x="70" y="126" class="h2">Pick SambaNova when enterprise deployment matters more than a simple model marketplace</text>

  <rect x="70" y="190" rx="28" ry="28" width="285" height="160" class="node"/>
  <text x="106" y="235" class="t1">Need OpenAI compatibility?</text>
  <text x="106" y="270" class="t2">Keep the client layer stable</text>
  <text x="106" y="300" class="t2">Start quickly with existing code</text>

  <rect x="395" y="190" rx="28" ry="28" width="285" height="160" class="node2"/>
  <text x="430" y="235" class="t1">Need enterprise controls?</text>
  <text x="430" y="270" class="t2">SambaCloud or SambaStack</text>
  <text x="430" y="300" class="t2">Choose based on deployment model</text>

  <rect x="720" y="190" rx="28" ry="28" width="285" height="160" class="node3"/>
  <text x="755" y="235" class="t1">Need RAG or agents?</text>
  <text x="755" y="270" class="t2">Use starter kits and integrations</text>
  <text x="755" y="300" class="t2">Add reasoning and custom flow</text>

  <rect x="1045" y="190" rx="28" ry="28" width="285" height="160" class="node"/>
  <text x="1080" y="235" class="t1">Need finetuned checkpoints?</text>
  <text x="1080" y="270" class="t2">Run custom checkpoints</text>
  <text x="1080" y="300" class="t2">Keep the platform consistent</text>

  <path d="M 355 270 L 385 270" stroke="#8ad4ff" stroke-width="6" fill="none" marker-end="url(#a)"/>
  <path d="M 680 270 L 710 270" stroke="#8ad4ff" stroke-width="6" fill="none" marker-end="url(#a)"/>
  <path d="M 1005 270 L 1035 270" stroke="#8ad4ff" stroke-width="6" fill="none" marker-end="url(#a)"/>

  <rect x="80" y="430" rx="24" ry="24" width="1240" height="280" class="box"/>
  <text x="110" y="482" class="boxText">Decision summary</text>
  <text x="110" y="524" class="small">1. API compatibility first: if you want the shortest migration path, start with OpenAI-compatible client calls.</text>
  <text x="110" y="560" class="small">2. Deployment shape second: decide between cloud-first and stack-first operations.</text>
  <text x="110" y="596" class="small">3. Platform depth third: check whether you need RAG, agents, reasoning, embeddings, or custom checkpoints.</text>
  <text x="110" y="632" class="small">4. Treat SambaNova as a platform choice, not only a model choice.</text>

  <rect x="1040" y="500" rx="18" ry="18" width="210" height="76" fill="#ffd166"/>
  <text x="1075" y="538" class="boxText">Fast onboarding</text>
  <text x="1075" y="562" class="small">OpenAI compatible</text>
  <rect x="1040" y="595" rx="18" ry="18" width="210" height="76" fill="#7bdff2"/>
  <text x="1072" y="633" class="boxText">Enterprise depth</text>
  <text x="1072" y="657" class="small">custom checkpoints</text>
</svg>
