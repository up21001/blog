<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#17324d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <style>
      .title{font:700 42px system-ui,Segoe UI,sans-serif;fill:#fff}
      .sub{font:500 20px system-ui,Segoe UI,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#a855f7;stroke-width:2;rx:18}
      .box2{fill:#0f172a;stroke:#38bdf8;stroke-width:2;rx:18}
      .text{font:600 18px system-ui,Segoe UI,sans-serif;fill:#e5e7eb}
      .small{font:500 15px system-ui,Segoe UI,sans-serif;fill:#94a3b8}
      .arrow{stroke:url(#accent);stroke-width:4;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="82" class="title">Agent Event Schema</text>
  <text x="60" y="118" class="sub">이벤트 수집 → 구조화 → 저장 → 분석</text>
  <rect x="70" y="185" width="220" height="110" class="box"/>
  <text x="102" y="228" class="text">Emit</text>
  <text x="102" y="255" class="small">agent / tool / state</text>
  <rect x="335" y="185" width="220" height="110" class="box2"/>
  <text x="365" y="228" class="text">Schema</text>
  <text x="365" y="255" class="small">field contract</text>
  <rect x="600" y="185" width="220" height="110" class="box"/>
  <text x="630" y="228" class="text">Store</text>
  <text x="630" y="255" class="small">trace / audit / logs</text>
  <rect x="865" y="185" width="250" height="110" class="box2"/>
  <text x="895" y="228" class="text">Analyze</text>
  <text x="895" y="255" class="small">debug / eval / alert</text>
  <path d="M290 240 H335" class="arrow"/>
  <path d="M555 240 H600" class="arrow"/>
  <path d="M820 240 H865" class="arrow"/>
  <rect x="145" y="350" width="900" height="160" class="box2"/>
  <text x="185" y="396" class="text">핵심 필드</text>
  <text x="185" y="428" class="small">trace_id, session_id, step_id, event_name, severity, duration_ms, error_code, tenant_id</text>
  <text x="185" y="458" class="small">필드를 고정하면 대시보드, 감사, 회고, 데이터셋 생성이 한 번에 연결된다.</text>
</svg>
