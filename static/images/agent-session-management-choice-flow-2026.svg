<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4f7cff"/>
    </marker>
    <style>
      .title { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #16324d; }
      .sub { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #60758a; }
      .box { fill: #fff; stroke: #cddfff; stroke-width: 2; }
      .box2 { fill: #eef5ff; stroke: #9ebcff; stroke-width: 2; }
      .label { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #14324d; }
      .small { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #3e5871; }
      .line { stroke: #4f7cff; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="78" class="title">Session Design Choice Flow</text>
  <text x="70" y="112" class="sub">short session, resumable session, long task session</text>
  <rect x="70" y="225" width="185" height="110" rx="22" class="box"/>
  <text x="105" y="270" class="label">Short Task</text>
  <text x="94" y="298" class="small">no resume needed</text>
  <rect x="310" y="205" width="220" height="150" rx="24" class="box2"/>
  <text x="350" y="250" class="label">Simple Session</text>
  <text x="339" y="282" class="small">TTL + basic state</text>
  <rect x="590" y="180" width="220" height="190" rx="24" class="box2"/>
  <text x="636" y="228" class="label">Resumable</text>
  <text x="622" y="260" class="small">snapshot + retry</text>
  <text x="618" y="286" class="small">tool outputs</text>
  <text x="625" y="312" class="small">work queue</text>
  <rect x="870" y="205" width="240" height="150" rx="24" class="box"/>
  <text x="915" y="250" class="label">Long Workflow</text>
  <text x="906" y="282" class="small">audit + recovery</text>
  <path d="M255 280 L310 280" class="line"/>
  <path d="M530 280 L590 280" class="line"/>
  <path d="M810 280 L870 280" class="line"/>
</svg>
