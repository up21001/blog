<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Groq vs Together AI vs Replicate vs fal</title>
  <desc id="desc">Fast inference platforms comparison diagram</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 800 42px Inter, Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 20px Inter, Arial, sans-serif; fill: #cbd5e1; }
      .name { font: 800 30px Inter, Arial, sans-serif; fill: #0f172a; }
      .copy { font: 500 18px Inter, Arial, sans-serif; fill: #334155; }
      .badge { font: 700 14px Inter, Arial, sans-serif; fill: #0f172a; letter-spacing: 0.05em; }
    </style>
  </defs>
  <rect width="1200" height="675" rx="32" fill="url(#bg3)"/>
  <rect x="56" y="52" width="1088" height="116" rx="28" fill="#111827" opacity="0.92"/>
  <rect x="56" y="52" width="1088" height="12" rx="6" fill="url(#glow)"/>
  <text x="96" y="112" class="title">Fast Inference Platforms</text>
  <text x="96" y="146" class="subtitle">Groq for ultra-low latency, Together AI for open models, Replicate and fal for media-heavy workflows</text>

  <g filter="url(#shadow2)">
    <rect x="56" y="208" width="260" height="322" rx="28" fill="#e0f2fe"/>
    <rect x="336" y="208" width="260" height="322" rx="28" fill="#dcfce7"/>
    <rect x="616" y="208" width="260" height="322" rx="28" fill="#fef3c7"/>
    <rect x="896" y="208" width="248" height="322" rx="28" fill="#ede9fe"/>
  </g>

  <rect x="84" y="236" width="80" height="34" rx="17" fill="#ffffff" opacity="0.7"/>
  <text x="124" y="259" text-anchor="middle" class="badge">LOW LATENCY</text>
  <text x="186" y="320" text-anchor="middle" class="name">Groq</text>
  <text x="186" y="360" text-anchor="middle" class="copy">ultra-fast text inference</text>
  <text x="186" y="392" text-anchor="middle" class="copy">great for agents and chat UX</text>
  <text x="186" y="424" text-anchor="middle" class="copy">limited model selection</text>

  <rect x="364" y="236" width="100" height="34" rx="17" fill="#ffffff" opacity="0.7"/>
  <text x="414" y="259" text-anchor="middle" class="badge">OPEN MODELS</text>
  <text x="466" y="320" text-anchor="middle" class="name">Together AI</text>
  <text x="466" y="360" text-anchor="middle" class="copy">OpenAI-compatible inference</text>
  <text x="466" y="392" text-anchor="middle" class="copy">fine-tuning and endpoints</text>
  <text x="466" y="424" text-anchor="middle" class="copy">balanced production choice</text>

  <rect x="644" y="236" width="86" height="34" rx="17" fill="#ffffff" opacity="0.7"/>
  <text x="687" y="259" text-anchor="middle" class="badge">MARKETPLACE</text>
  <text x="746" y="320" text-anchor="middle" class="name">Replicate</text>
  <text x="746" y="360" text-anchor="middle" class="copy">community and custom models</text>
  <text x="746" y="392" text-anchor="middle" class="copy">image / video / audio APIs</text>
  <text x="746" y="424" text-anchor="middle" class="copy">webhook-friendly workflows</text>

  <rect x="926" y="236" width="74" height="34" rx="17" fill="#ffffff" opacity="0.7"/>
  <text x="963" y="259" text-anchor="middle" class="badge">MEDIA</text>
  <text x="1020" y="320" text-anchor="middle" class="name">fal</text>
  <text x="1020" y="360" text-anchor="middle" class="copy">fast serverless media inference</text>
  <text x="1020" y="392" text-anchor="middle" class="copy">strong for image and video</text>
  <text x="1020" y="424" text-anchor="middle" class="copy">optimized for creative apps</text>

  <path d="M316 370 L330 370" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round"/>
  <path d="M330 370 L320 364 L320 376 Z" fill="#cbd5e1"/>
  <path d="M596 370 L610 370" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round"/>
  <path d="M610 370 L600 364 L600 376 Z" fill="#cbd5e1"/>
  <path d="M876 370 L890 370" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round"/>
  <path d="M890 370 L880 364 L880 376 Z" fill="#cbd5e1"/>

  <text x="600" y="600" text-anchor="middle" class="subtitle">Choose by latency, model breadth, or media workflow specialization</text>
</svg>
