<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">LocalAI Choice Flow 2026</title>
  <desc id="desc">Decision flow for when to use LocalAI in local and self-hosted AI setups.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf5"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#7c2d12" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Should You Use LocalAI?</text>

  <rect x="430" y="120" width="340" height="92" rx="22" fill="#fff" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <text x="460" y="176" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Need full local AI stack?</text>

  <rect x="110" y="290" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="190" y="340" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">No</text>
  <text x="146" y="370" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">A smaller local model server may be enough</text>

  <rect x="450" y="290" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="484" y="340" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need OpenAI</text>
  <text x="516" y="370" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">compatibility?</text>

  <rect x="790" y="290" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="836" y="340" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need privacy and</text>
  <text x="848" y="370" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">MCP too?</text>

  <rect x="445" y="500" width="320" height="108" rx="26" fill="#7c2d12" filter="url(#shadow)"/>
  <text x="519" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fff7ed">Use LocalAI</text>
  <text x="477" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#fed7aa">Best for complete private AI stacks</text>
</svg>
