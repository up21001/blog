<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F2937">CrewAI 구조 — Crew · Agent · Task · Tool</text>

  <!-- Crew outer box -->
  <rect x="30" y="55" width="740" height="340" rx="14" fill="none" stroke="#8B5CF6" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="60" y="80" font-size="13" font-weight="bold" fill="#5B21B6">Crew (오케스트레이터)</text>

  <!-- Agent 1 -->
  <rect x="55" y="95" width="200" height="110" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="155" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">Research Agent</text>
  <text x="155" y="136" text-anchor="middle" font-size="11" fill="#1E40AF">role: 시장 조사 전문가</text>
  <text x="155" y="152" text-anchor="middle" font-size="11" fill="#1E40AF">goal: 최신 트렌드 수집</text>
  <text x="155" y="168" text-anchor="middle" font-size="11" fill="#1E40AF">backstory: 10년 경력 분석가</text>
  <text x="155" y="184" text-anchor="middle" font-size="11" fill="#3B82F6">tools: [웹검색, 크롤러]</text>
  <text x="155" y="198" text-anchor="middle" font-size="10" fill="#1D4ED8">llm: gpt-4o</text>

  <!-- Agent 2 -->
  <rect x="300" y="95" width="200" height="110" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="400" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">Writer Agent</text>
  <text x="400" y="136" text-anchor="middle" font-size="11" fill="#065F46">role: 기술 문서 작성가</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#065F46">goal: 보고서 초안 작성</text>
  <text x="400" y="168" text-anchor="middle" font-size="11" fill="#065F46">backstory: 테크라이터</text>
  <text x="400" y="184" text-anchor="middle" font-size="11" fill="#10B981">tools: [파일쓰기, 템플릿]</text>
  <text x="400" y="198" text-anchor="middle" font-size="10" fill="#047857">llm: claude-3-5-sonnet</text>

  <!-- Agent 3 -->
  <rect x="545" y="95" width="200" height="110" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="645" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">Reviewer Agent</text>
  <text x="645" y="136" text-anchor="middle" font-size="11" fill="#92400E">role: 품질 검토 전문가</text>
  <text x="645" y="152" text-anchor="middle" font-size="11" fill="#92400E">goal: 오류 교정·완성도</text>
  <text x="645" y="168" text-anchor="middle" font-size="11" fill="#92400E">backstory: 시니어 에디터</text>
  <text x="645" y="184" text-anchor="middle" font-size="11" fill="#F59E0B">tools: [문법검사, 검색]</text>
  <text x="645" y="198" text-anchor="middle" font-size="10" fill="#B45309">llm: gpt-4o-mini</text>

  <!-- Task flow -->
  <rect x="55" y="240" width="200" height="55" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="155" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="#5B21B6">Task 1: 데이터 수집</text>
  <text x="155" y="280" text-anchor="middle" font-size="11" fill="#5B21B6">agent: Research Agent</text>
  <text x="155" y="294" text-anchor="middle" font-size="10" fill="#7C3AED">output: 조사 보고서</text>

  <rect x="300" y="240" width="200" height="55" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="400" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="#5B21B6">Task 2: 초안 작성</text>
  <text x="400" y="280" text-anchor="middle" font-size="11" fill="#5B21B6">agent: Writer Agent</text>
  <text x="400" y="294" text-anchor="middle" font-size="10" fill="#7C3AED">context: [Task 1]</text>

  <rect x="545" y="240" width="200" height="55" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="645" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="#5B21B6">Task 3: 최종 검토</text>
  <text x="645" y="280" text-anchor="middle" font-size="11" fill="#5B21B6">agent: Reviewer Agent</text>
  <text x="645" y="294" text-anchor="middle" font-size="10" fill="#7C3AED">context: [Task 2]</text>

  <!-- Arrows agent → task -->
  <line x1="155" y1="205" x2="155" y2="238" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="400" y1="205" x2="400" y2="238" stroke="#10B981" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="645" y1="205" x2="645" y2="238" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Arrows task → task -->
  <line x1="255" y1="267" x2="298" y2="267" stroke="#8B5CF6" stroke-width="2" marker-end="url(#a4)"/>
  <line x1="500" y1="267" x2="543" y2="267" stroke="#8B5CF6" stroke-width="2" marker-end="url(#a4)"/>

  <!-- Final output -->
  <rect x="270" y="330" width="260" height="50" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="400" y="352" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">최종 결과물 (Crew Output)</text>
  <text x="400" y="370" text-anchor="middle" font-size="11" fill="#374151">완성된 시장 조사 보고서</text>

  <line x1="645" y1="295" x2="490" y2="328" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a5)"/>

  <defs>
    <marker id="a1" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#3B82F6"/></marker>
    <marker id="a2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#10B981"/></marker>
    <marker id="a3" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#F59E0B"/></marker>
    <marker id="a4" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#8B5CF6"/></marker>
    <marker id="a5" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#6B7280"/></marker>
  </defs>
</svg>
