<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F2937">Raspberry Pi 5 홈 서버 아키텍처</text>

  <!-- 인터넷 -->
  <rect x="330" y="60" width="140" height="44" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="400" y="87" text-anchor="middle" font-size="14" fill="#1E40AF">🌐 인터넷</text>

  <!-- 화살표 아래 -->
  <line x1="400" y1="104" x2="400" y2="130" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 라우터 -->
  <rect x="310" y="130" width="180" height="44" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="157" text-anchor="middle" font-size="14" fill="#92400E">🔀 공유기 / 라우터</text>

  <!-- 화살표 아래 -->
  <line x1="400" y1="174" x2="400" y2="200" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Raspberry Pi 5 중앙 박스 -->
  <rect x="270" y="200" width="260" height="60" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2.5"/>
  <text x="400" y="225" text-anchor="middle" font-size="15" font-weight="bold" fill="#5B21B6">🍓 Raspberry Pi 5</text>
  <text x="400" y="246" text-anchor="middle" font-size="11" fill="#7C3AED">8GB RAM · NVMe SSD · Ubuntu 24.04</text>

  <!-- 왼쪽 서비스들 -->
  <rect x="40" y="308" width="150" height="44" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="115" y="335" text-anchor="middle" font-size="13" fill="#065F46">📁 Samba NAS</text>

  <rect x="40" y="370" width="150" height="44" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="115" y="397" text-anchor="middle" font-size="13" fill="#065F46">🎬 Jellyfin 미디어</text>

  <!-- 오른쪽 서비스들 -->
  <rect x="610" y="308" width="150" height="44" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="685" y="335" text-anchor="middle" font-size="13" fill="#991B1B">🚫 Pi-hole DNS</text>

  <rect x="610" y="370" width="150" height="44" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="685" y="397" text-anchor="middle" font-size="13" fill="#991B1B">🔒 WireGuard VPN</text>

  <!-- 중앙 하단 서비스들 -->
  <rect x="240" y="308" width="150" height="44" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="315" y="335" text-anchor="middle" font-size="13" fill="#1E40AF">⚙️ Portainer</text>

  <rect x="410" y="308" width="150" height="44" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="485" y="335" text-anchor="middle" font-size="13" fill="#1E40AF">📊 Grafana 모니터링</text>

  <!-- 연결선 -->
  <line x1="300" y1="260" x2="190" y2="308" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="340" y1="260" x2="315" y2="308" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="460" y1="260" x2="485" y2="308" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="500" y1="260" x2="610" y2="308" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="190" y1="352" x2="190" y2="370" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="660" y1="352" x2="660" y2="370" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 화살표 마커 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
  </defs>
</svg>
