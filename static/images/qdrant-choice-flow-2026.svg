<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Qdrant choice flow 2026</title>
  <desc id="desc">Decision flow diagram for choosing Qdrant versus pgvector or a managed setup.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1726"/>
      <stop offset="100%" stop-color="#262b46"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 40px/1.2 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .sub { font: 400 18px/1.5 'Segoe UI', Arial, sans-serif; fill: #cad4e5; }
      .box { font: 700 20px/1.2 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .small { font: 400 16px/1.4 'Segoe UI', Arial, sans-serif; fill: #e6edf8; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="84" class="title">Qdrant decision flow</text>
  <text x="70" y="118" class="sub">Choose the retrieval layer based on scale, filtering, and ops burden</text>

  <rect x="70" y="210" width="240" height="92" rx="22" fill="#0f4c81" filter="url(#shadow)"/>
  <text x="124" y="248" class="box">Need vector search?</text>
  <text x="118" y="277" class="small">semantic retrieval / RAG</text>

  <rect x="370" y="210" width="240" height="92" rx="22" fill="#1f8a70" filter="url(#shadow)"/>
  <text x="416" y="248" class="box">Need filters?</text>
  <text x="407" y="277" class="small">metadata / payload rules</text>

  <rect x="670" y="170" width="210" height="92" rx="22" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="718" y="208" class="box">Use Qdrant</text>
  <text x="708" y="237" class="small">search-first design</text>

  <rect x="670" y="290" width="210" height="92" rx="22" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="718" y="328" class="box">Use pgvector</text>
  <text x="694" y="357" class="small">keep it inside Postgres</text>

  <rect x="930" y="170" width="200" height="92" rx="22" fill="#ef4444" filter="url(#shadow)"/>
  <text x="972" y="208" class="box">Managed?</text>
  <text x="948" y="237" class="small">Qdrant Cloud</text>

  <path d="M310 256 L370 256" stroke="#9fb2c8" stroke-width="7" stroke-linecap="round"/>
  <path d="M610 256 L670 216" stroke="#9fb2c8" stroke-width="7" stroke-linecap="round"/>
  <path d="M610 256 L670 336" stroke="#9fb2c8" stroke-width="7" stroke-linecap="round"/>
  <path d="M880 216 L930 216" stroke="#9fb2c8" stroke-width="7" stroke-linecap="round"/>

  <text x="70" y="450" class="sub">If you need fast production adoption, Qdrant Cloud reduces ops. If you want minimal moving parts, pgvector is simpler.</text>
</svg>
