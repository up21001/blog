<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Chroma Workflow 2026</title>
  <desc id="desc">Chroma architecture from app to collections and Chroma Cloud or local deployment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0369a1" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0c4a6e">Chroma Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#0369a1">AI application database from local prototyping to Chroma Cloud</text>
  <rect x="70" y="200" width="220" height="120" rx="24" fill="#fff" stroke="#7dd3fc" filter="url(#shadow)"/>
  <text x="118" y="250" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0c4a6e">App / Agent</text>
  <text x="107" y="282" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0369a1">RAG, search, sync</text>
  <rect x="360" y="140" width="470" height="380" rx="28" fill="#fff" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
  <text x="545" y="192" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0c4a6e">Chroma</text>
  <rect x="405" y="232" width="160" height="86" rx="18" fill="#f0f9ff" stroke="#7dd3fc"/>
  <text x="441" y="282" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0369a1">Collections</text>
  <rect x="615" y="232" width="160" height="86" rx="18" fill="#f0f9ff" stroke="#7dd3fc"/>
  <text x="652" y="282" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0369a1">Tenants</text>
  <rect x="405" y="352" width="160" height="86" rx="18" fill="#f0f9ff" stroke="#7dd3fc"/>
  <text x="446" y="402" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0369a1">Local</text>
  <text x="433" y="429" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0369a1">single-node</text>
  <rect x="615" y="352" width="160" height="86" rx="18" fill="#f0f9ff" stroke="#7dd3fc"/>
  <text x="647" y="402" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0369a1">Cloud</text>
  <text x="643" y="429" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0369a1">distributed</text>
  <rect x="900" y="200" width="210" height="120" rx="24" fill="#fff" stroke="#7dd3fc" filter="url(#shadow)"/>
  <text x="953" y="252" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0c4a6e">Search</text>
  <text x="934" y="284" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0369a1">vector + metadata</text>
  <text x="953" y="308" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0369a1">+ sync</text>
  <path d="M290 260 C330 260, 340 260, 360 260" fill="none" stroke="#0284c7" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M835 260 C870 260, 885 260, 900 260" fill="none" stroke="#0284c7" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
