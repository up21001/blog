<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <rect width="800" height="450" fill="#FAFAFA" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">Hugging Face Transformers 파이프라인 아키텍처</text>

  <!-- Input -->
  <rect x="30" y="180" width="110" height="80" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" rx="8"/>
  <text x="85" y="208" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">입력 텍스트</text>
  <text x="85" y="226" text-anchor="middle" font-size="10" fill="#B45309">"안녕하세요</text>
  <text x="85" y="242" text-anchor="middle" font-size="10" fill="#B45309">반갑습니다"</text>

  <!-- Arrow -->
  <line x1="142" y1="220" x2="172" y2="220" stroke="#F59E0B" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Tokenizer -->
  <rect x="174" y="165" width="120" height="110" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" rx="8"/>
  <text x="234" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">Tokenizer</text>
  <text x="234" y="208" text-anchor="middle" font-size="10" fill="#1D4ED8">텍스트 → 토큰</text>
  <text x="234" y="224" text-anchor="middle" font-size="10" fill="#3B82F6">[101, 2572,</text>
  <text x="234" y="240" text-anchor="middle" font-size="10" fill="#3B82F6">3247, 102]</text>
  <text x="234" y="257" text-anchor="middle" font-size="9" fill="#60A5FA">AutoTokenizer</text>

  <!-- Arrow -->
  <line x1="296" y1="220" x2="326" y2="220" stroke="#3B82F6" stroke-width="2" marker-end="url(#a2)"/>

  <!-- Model -->
  <rect x="328" y="145" width="140" height="150" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2" rx="8"/>
  <text x="398" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#5B21B6">사전학습 모델</text>
  <text x="398" y="192" text-anchor="middle" font-size="10" fill="#6D28D9">BERT / GPT / T5</text>
  <text x="398" y="210" text-anchor="middle" font-size="10" fill="#7C3AED">Attention Layers</text>
  <text x="398" y="228" text-anchor="middle" font-size="10" fill="#8B5CF6">Feed Forward</text>
  <text x="398" y="246" text-anchor="middle" font-size="10" fill="#8B5CF6">Layer Norm</text>
  <text x="398" y="264" text-anchor="middle" font-size="9" fill="#A78BFA">from_pretrained()</text>
  <text x="398" y="281" text-anchor="middle" font-size="9" fill="#A78BFA">AutoModel</text>

  <!-- Arrow -->
  <line x1="470" y1="220" x2="500" y2="220" stroke="#8B5CF6" stroke-width="2" marker-end="url(#a3)"/>

  <!-- Post-process -->
  <rect x="502" y="165" width="120" height="110" fill="#D1FAE5" stroke="#10B981" stroke-width="2" rx="8"/>
  <text x="562" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">후처리</text>
  <text x="562" y="208" text-anchor="middle" font-size="10" fill="#047857">로짓 → 결과</text>
  <text x="562" y="224" text-anchor="middle" font-size="10" fill="#10B981">Softmax</text>
  <text x="562" y="240" text-anchor="middle" font-size="10" fill="#10B981">Decode</text>
  <text x="562" y="257" text-anchor="middle" font-size="9" fill="#34D399">argmax / top-k</text>

  <!-- Arrow -->
  <line x1="624" y1="220" x2="654" y2="220" stroke="#10B981" stroke-width="2" marker-end="url(#a4)"/>

  <!-- Output -->
  <rect x="656" y="175" width="110" height="90" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" rx="8"/>
  <text x="711" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">결과 출력</text>
  <text x="711" y="218" text-anchor="middle" font-size="10" fill="#B45309">label: POSITIVE</text>
  <text x="711" y="234" text-anchor="middle" font-size="10" fill="#B45309">score: 0.997</text>
  <text x="711" y="250" text-anchor="middle" font-size="9" fill="#D97706">generated_text</text>

  <!-- Pipeline API box -->
  <rect x="60" y="330" width="680" height="50" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5" rx="8" stroke-dasharray="6,3"/>
  <text x="400" y="351" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">pipeline() — 위 모든 단계를 한 줄로</text>
  <text x="400" y="369" text-anchor="middle" font-size="11" fill="#4B5563" font-style="italic">classifier = pipeline("sentiment-analysis", model="snunlp/KR-FinBert-SC")</text>

  <!-- Use case tags -->
  <rect x="60" y="395" width="148" height="38" fill="#DBEAFE" stroke="#3B82F6" rx="6"/>
  <text x="134" y="410" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">텍스트 분류</text>
  <text x="134" y="426" text-anchor="middle" font-size="10" fill="#1D4ED8">감성 분석 / 카테고리</text>

  <rect x="218" y="395" width="148" height="38" fill="#D1FAE5" stroke="#10B981" rx="6"/>
  <text x="292" y="410" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">텍스트 생성</text>
  <text x="292" y="426" text-anchor="middle" font-size="10" fill="#047857">GPT / LLaMA 계열</text>

  <rect x="376" y="395" width="148" height="38" fill="#EDE9FE" stroke="#8B5CF6" rx="6"/>
  <text x="450" y="410" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">번역 / 요약</text>
  <text x="450" y="426" text-anchor="middle" font-size="10" fill="#6D28D9">Helsinki-NLP 등</text>

  <rect x="534" y="395" width="206" height="38" fill="#FEF3C7" stroke="#F59E0B" rx="6"/>
  <text x="637" y="410" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">QA / NER / 토큰 분류</text>
  <text x="637" y="426" text-anchor="middle" font-size="10" fill="#B45309">다양한 NLP 태스크</text>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F59E0B"/>
    </marker>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8B5CF6"/>
    </marker>
    <marker id="a4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10B981"/>
    </marker>
  </defs>
</svg>
