<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#f8fbff"/><text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Should You Use Turso?</text><rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#60a5fa"/><text x="488" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Need simple data?</text><rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd"/><text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">No</text><text x="150" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">A larger relational stack may fit better</text><rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd"/><text x="491" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Want SQLite with</text><text x="512" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">cloud ops?</text><rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd"/><text x="857" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Edge or AI</text><text x="855" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">friendly app?</text><rect x="445" y="500" width="320" height="110" rx="26" fill="#1e3a8a"/><text x="534" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#eff6ff">Use Turso</text><text x="486" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#bfdbfe">Great for lightweight modern data layers</text></svg>
