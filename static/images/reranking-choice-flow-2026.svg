<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11131f"/>
      <stop offset="1" stop-color="#2a3555"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <text x="80" y="110" fill="#f5fbff" font-family="Arial" font-size="50" font-weight="700">Reranking Decision Flow</text>
  <g filter="url(#shadow)">
    <rect x="80" y="180" width="240" height="110" rx="22" fill="#15213a" stroke="#6a8ecb" stroke-width="2"/>
    <rect x="370" y="180" width="240" height="110" rx="22" fill="#15213a" stroke="#6a8ecb" stroke-width="2"/>
    <rect x="660" y="180" width="240" height="110" rx="22" fill="#15213a" stroke="#6a8ecb" stroke-width="2"/>
    <rect x="950" y="180" width="170" height="110" rx="22" fill="#17344b" stroke="#4fd1c5" stroke-width="2"/>
  </g>
  <text x="200" y="225" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Many candidates?</text>
  <text x="490" y="225" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Quality matters?</text>
  <text x="780" y="225" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Latency budget?</text>
  <text x="1035" y="225" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Use rerank</text>
  <path d="M320 235 H360" stroke="#90cdf4" stroke-width="5" stroke-linecap="round"/>
  <path d="M610 235 H650" stroke="#90cdf4" stroke-width="5" stroke-linecap="round"/>
  <path d="M900 235 H940" stroke="#90cdf4" stroke-width="5" stroke-linecap="round"/>
  <text x="200" y="320" text-anchor="middle" fill="#b6c7e0" font-family="Arial" font-size="18">yes -> rerank is worth it</text>
  <text x="490" y="320" text-anchor="middle" fill="#b6c7e0" font-family="Arial" font-size="18">yes -> do it now</text>
  <text x="780" y="320" text-anchor="middle" fill="#b6c7e0" font-family="Arial" font-size="18">tight -> fewer candidates</text>
  <text x="1035" y="320" text-anchor="middle" fill="#b6c7e0" font-family="Arial" font-size="18">best final order</text>
  <text x="80" y="430" fill="#d9f0ff" font-family="Arial" font-size="28" font-weight="700">Use reranking when the first-stage retrieval is good but not precise enough.</text>
  <text x="80" y="474" fill="#d9f0ff" font-family="Arial" font-size="28" font-weight="700">Skip it only when latency or cost is more important than ranking quality.</text>
</svg>
