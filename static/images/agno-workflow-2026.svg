<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Agno Workflow 2026</title>
  <desc id="desc">Agno architecture showing agents, teams, workflows, AgentOS, database, and control plane.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#166534" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Agno Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#15803d">SDK agents and teams served through AgentOS control plane and APIs</text>
  <rect x="70" y="180" width="220" height="120" rx="24" fill="#fff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="140" y="232" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Agents</text>
  <text x="112" y="266" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#15803d">tools, memory,</text>
  <text x="123" y="290" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#15803d">knowledge</text>
  <rect x="350" y="140" width="470" height="360" rx="28" fill="#fff" stroke="#4ade80" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="196" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">AgentOS</text>
  <rect x="395" y="228" width="170" height="90" rx="18" fill="#f0fdf4" stroke="#86efac"/>
  <text x="447" y="279" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">API</text>
  <rect x="595" y="228" width="170" height="90" rx="18" fill="#f0fdf4" stroke="#86efac"/>
  <text x="620" y="268" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">Control</text>
  <text x="629" y="296" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">Plane</text>
  <rect x="395" y="350" width="170" height="90" rx="18" fill="#f0fdf4" stroke="#86efac"/>
  <text x="433" y="391" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">Database</text>
  <text x="435" y="418" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#15803d">sessions</text>
  <rect x="595" y="350" width="170" height="90" rx="18" fill="#f0fdf4" stroke="#86efac"/>
  <text x="648" y="391" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">Teams</text>
  <text x="634" y="418" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#15803d">workflows</text>
  <rect x="900" y="180" width="220" height="120" rx="24" fill="#fff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="958" y="232" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Control Plane</text>
  <text x="936" y="266" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#15803d">monitor, chat,</text>
  <text x="947" y="290" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#15803d">debug, manage</text>
  <path d="M290 240 C320 240, 330 240, 350 240" fill="none" stroke="#16a34a" stroke-width="4"/>
  <path d="M820 240 C860 240, 870 240, 900 240" fill="none" stroke="#16a34a" stroke-width="4"/>
</svg>
