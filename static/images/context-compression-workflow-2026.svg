<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Context Compression Workflow</title>
  <desc id="desc">Workflow diagram for compressing long context into minimal useful memory.</desc>
  <defs>
    <style>
      .bg{fill:#0f172a}
      .box{fill:#111827; stroke:#334155; stroke-width:2}
      .title{font:700 42px Arial,sans-serif; fill:#f8fafc}
      .sub{font:400 20px Arial,sans-serif; fill:#cbd5e1}
      .h{font:700 22px Arial,sans-serif; fill:#e2e8f0}
      .t{font:400 17px Arial,sans-serif; fill:#cbd5e1}
      .arrow{stroke:#38bdf8; stroke-width:4; fill:none; marker-end:url(#m)}
      .tag{font:700 14px Arial,sans-serif; fill:#93c5fd; letter-spacing:1px}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" class="bg"/>
  <text x="64" y="74" class="tag">CONTEXT COMPRESSION</text>
  <text x="64" y="122" class="title">Keep only the facts needed for the next decision</text>
  <text x="64" y="160" class="sub">Compress history, tool output, and memory into a smaller working set.</text>

  <rect x="70" y="230" rx="20" ry="20" width="180" height="120" class="box"/>
  <text x="94" y="270" class="h">Raw context</text>
  <text x="94" y="300" class="t">chat, docs, logs</text>

  <rect x="280" y="230" rx="20" ry="20" width="180" height="120" class="box"/>
  <text x="304" y="270" class="h">Noise removal</text>
  <text x="304" y="300" class="t">dedupe, trim, filter</text>

  <rect x="490" y="230" rx="20" ry="20" width="180" height="120" class="box"/>
  <text x="514" y="270" class="h">Summarize</text>
  <text x="514" y="300" class="t">turn history into facts</text>

  <rect x="700" y="230" rx="20" ry="20" width="180" height="120" class="box"/>
  <text x="724" y="270" class="h">Store memory</text>
  <text x="724" y="300" class="t">state, notes, cache</text>

  <rect x="910" y="230" rx="20" ry="20" width="180" height="120" class="box"/>
  <text x="934" y="270" class="h">Rebuild prompt</text>
  <text x="934" y="300" class="t">minimal context</text>

  <path class="arrow" d="M 250 290 L 275 290"/>
  <path class="arrow" d="M 460 290 L 485 290"/>
  <path class="arrow" d="M 670 290 L 695 290"/>
  <path class="arrow" d="M 880 290 L 905 290"/>

  <rect x="70" y="420" rx="20" ry="20" width="1060" height="120" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="94" y="462" class="h">Compression rule</text>
  <text x="94" y="496" class="t">Remove everything except what the next step actually needs.</text>
</svg>

