<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Ollama choice flow diagram">
  <rect width="1200" height="630" fill="#07111f"/>
  <rect x="60" y="60" width="1080" height="510" rx="32" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="100" y="130" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="44" font-weight="700">Choose Ollama when...</text>
  <text x="100" y="170" fill="#94a3b8" font-family="Arial, sans-serif" font-size="22">Simple local deployment, fast iteration, model switching, API compatibility</text>

  <rect x="110" y="240" width="260" height="150" rx="24" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  <text x="240" y="292" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700">Need local LLM now</text>
  <text x="240" y="330" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">low setup cost</text>

  <rect x="470" y="240" width="260" height="150" rx="24" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <text x="600" y="292" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700">Need API compatibility</text>
  <text x="600" y="330" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">reuse existing code</text>

  <rect x="830" y="240" width="260" height="150" rx="24" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
  <text x="960" y="292" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700">Need easy ops</text>
  <text x="960" y="330" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">simple developer workflow</text>

  <path d="M370 315 H470" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M730 315 H830" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="100" y="470" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="22">If you need high-throughput serving, compare with vLLM.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
