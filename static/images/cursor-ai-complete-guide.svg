<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- 배경 -->
  <rect width="800" height="450" fill="#F8FAFC" rx="12"/>
  <!-- 제목 -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Cursor AI 핵심 기능 워크플로우</text>

  <!-- Tab Completion -->
  <rect x="30" y="70" width="160" height="100" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="110" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4ED8">Tab 자동완성</text>
  <text x="110" y="120" text-anchor="middle" font-size="11" fill="#1E40AF">다음 코드 예측</text>
  <text x="110" y="136" text-anchor="middle" font-size="11" fill="#1E40AF">인라인 완성</text>
  <text x="110" y="152" text-anchor="middle" font-size="11" fill="#1E40AF">멀티라인 제안</text>

  <!-- Chat -->
  <rect x="220" y="70" width="160" height="100" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="300" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">Chat 패널</text>
  <text x="300" y="120" text-anchor="middle" font-size="11" fill="#065F46">코드 질문/설명</text>
  <text x="300" y="136" text-anchor="middle" font-size="11" fill="#065F46">@파일 참조</text>
  <text x="300" y="152" text-anchor="middle" font-size="11" fill="#065F46">컨텍스트 기반</text>

  <!-- Composer -->
  <rect x="410" y="70" width="160" height="100" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="490" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#4C1D95">Composer</text>
  <text x="490" y="120" text-anchor="middle" font-size="11" fill="#4C1D95">멀티파일 편집</text>
  <text x="490" y="136" text-anchor="middle" font-size="11" fill="#4C1D95">에이전트 모드</text>
  <text x="490" y="152" text-anchor="middle" font-size="11" fill="#4C1D95">자율 실행</text>

  <!-- cursorrules -->
  <rect x="600" y="70" width="170" height="100" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="685" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">.cursorrules</text>
  <text x="685" y="120" text-anchor="middle" font-size="11" fill="#92400E">프로젝트 규칙</text>
  <text x="685" y="136" text-anchor="middle" font-size="11" fill="#92400E">언어/스타일 지정</text>
  <text x="685" y="152" text-anchor="middle" font-size="11" fill="#92400E">AI 행동 제어</text>

  <!-- 화살표: 흐름 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748B"/>
    </marker>
  </defs>
  <line x1="190" y1="120" x2="218" y2="120" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="120" x2="408" y2="120" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="120" x2="598" y2="120" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 단축키 섹션 -->
  <text x="400" y="210" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">주요 단축키</text>
  <!-- 단축키 박스들 -->
  <rect x="30" y="225" width="170" height="50" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="115" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Ctrl+K</text>
  <text x="115" y="263" text-anchor="middle" font-size="11" fill="#4B5563">인라인 편집 요청</text>

  <rect x="215" y="225" width="170" height="50" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="300" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Ctrl+L</text>
  <text x="300" y="263" text-anchor="middle" font-size="11" fill="#4B5563">Chat 패널 열기</text>

  <rect x="400" y="225" width="170" height="50" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="485" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Ctrl+Shift+I</text>
  <text x="485" y="263" text-anchor="middle" font-size="11" fill="#4B5563">Composer 열기</text>

  <rect x="585" y="225" width="185" height="50" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="677" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Tab / Esc</text>
  <text x="677" y="263" text-anchor="middle" font-size="11" fill="#4B5563">제안 수락 / 거절</text>

  <!-- 생산성 향상 섹션 -->
  <rect x="30" y="300" width="740" height="130" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="400" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">개발 생산성 향상 효과 (13년 차 엔지니어 경험 기준)</text>

  <rect x="55" y="340" width="160" height="70" rx="8" fill="white" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="135" y="363" text-anchor="middle" font-size="22" font-weight="bold" fill="#1D4ED8">3x</text>
  <text x="135" y="382" text-anchor="middle" font-size="11" fill="#1E40AF">반복 코드 작성</text>
  <text x="135" y="397" text-anchor="middle" font-size="11" fill="#1E40AF">속도 향상</text>

  <rect x="240" y="340" width="160" height="70" rx="8" fill="white" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="320" y="363" text-anchor="middle" font-size="22" font-weight="bold" fill="#10B981">50%</text>
  <text x="320" y="382" text-anchor="middle" font-size="11" fill="#065F46">디버깅 시간</text>
  <text x="320" y="397" text-anchor="middle" font-size="11" fill="#065F46">단축</text>

  <rect x="425" y="340" width="160" height="70" rx="8" fill="white" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="505" y="363" text-anchor="middle" font-size="22" font-weight="bold" fill="#8B5CF6">2x</text>
  <text x="505" y="382" text-anchor="middle" font-size="11" fill="#4C1D95">코드 리뷰</text>
  <text x="505" y="397" text-anchor="middle" font-size="11" fill="#4C1D95">처리 속도</text>

  <rect x="610" y="340" width="135" height="70" rx="8" fill="white" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="677" y="363" text-anchor="middle" font-size="22" font-weight="bold" fill="#F59E0B">70%</text>
  <text x="677" y="382" text-anchor="middle" font-size="11" fill="#92400E">보일러플레이트</text>
  <text x="677" y="397" text-anchor="middle" font-size="11" fill="#92400E">코드 자동화</text>

  <!-- 하단 출처 -->
  <text x="400" y="442" text-anchor="middle" font-size="10" fill="#94A3B8">* 개인 경험 기반 추정치 | Cursor AI 완전 정복 가이드</text>
</svg>
