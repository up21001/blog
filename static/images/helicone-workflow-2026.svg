<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Helicone Workflow 2026</title>
  <desc id="desc">LLM observability workflow showing requests, tracing, sessions, analytics, and monitoring.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#92400e" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#92400e">Helicone Workflow</text>
  <rect x="70" y="220" width="220" height="110" rx="24" fill="#fff" stroke="#fcd34d" filter="url(#shadow)"/>
  <text x="122" y="276" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#92400e">App</text>
  <text x="106" y="306" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#92400e">LLM requests</text>
  <rect x="360" y="150" width="480" height="360" rx="28" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="527" y="205" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#92400e">Helicone</text>
  <rect x="415" y="250" width="160" height="82" rx="18" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="460" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">Tracing</text>
  <rect x="625" y="250" width="160" height="82" rx="18" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="661" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">Sessions</text>
  <rect x="415" y="370" width="160" height="82" rx="18" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="446" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">Analytics</text>
  <text x="454" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#b45309">costs</text>
  <rect x="625" y="370" width="160" height="82" rx="18" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="633" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">Monitoring</text>
  <text x="644" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#b45309">providers</text>
  <rect x="900" y="220" width="220" height="110" rx="24" fill="#fff" stroke="#fcd34d" filter="url(#shadow)"/>
  <text x="956" y="276" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#92400e">Teams</text>
  <text x="931" y="306" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#92400e">sessions, agents,</text>
  <text x="952" y="330" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#92400e">cost tracking</text>
</svg>
