<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">LiveKit Agents Workflow 2026</title>
  <desc id="desc">Workflow diagram for LiveKit Agents showing room, AgentSession, STT, LLM, TTS and multimodal outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f766e" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="86" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#115e59">LiveKit Agents Workflow</text>
  <text x="70" y="122" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">Realtime participants, AgentSession orchestration, and multimodal voice pipelines</text>
  <rect x="70" y="210" width="200" height="110" rx="24" fill="#fff" stroke="#5eead4" filter="url(#shadow)"/>
  <text x="118" y="262" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#115e59">LiveKit Room</text>
  <text x="104" y="292" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">browser, phone, app</text>
  <rect x="340" y="160" width="500" height="330" rx="28" fill="#fff" stroke="#2dd4bf" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="212" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#115e59">AgentSession</text>
  <rect x="390" y="246" width="160" height="84" rx="18" fill="#f0fdfa" stroke="#5eead4"/>
  <text x="440" y="296" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">STT</text>
  <rect x="600" y="246" width="160" height="84" rx="18" fill="#f0fdfa" stroke="#5eead4"/>
  <text x="648" y="296" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">LLM</text>
  <rect x="390" y="360" width="160" height="84" rx="18" fill="#f0fdfa" stroke="#5eead4"/>
  <text x="440" y="410" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">TTS</text>
  <rect x="600" y="360" width="160" height="84" rx="18" fill="#f0fdfa" stroke="#5eead4"/>
  <text x="630" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Tools</text>
  <rect x="900" y="210" width="220" height="110" rx="24" fill="#fff" stroke="#5eead4" filter="url(#shadow)"/>
  <text x="978" y="262" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#115e59">Outputs</text>
  <text x="946" y="292" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">speech, text, video</text>
  <path d="M270 265 C310 265, 320 265, 340 265" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M550 288 C575 288, 580 288, 600 288" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M500 330 C500 342, 500 350, 500 360" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M760 288 C820 288, 850 288, 900 266" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M760 402 C820 402, 850 388, 900 302" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
