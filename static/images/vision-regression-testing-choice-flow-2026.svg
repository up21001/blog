<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4fb"/>
      <stop offset="100%" stop-color="#dce8f5"/>
    </linearGradient>
    <style>
      .title{font:700 42px Arial,sans-serif;fill:#17212b}
      .box{fill:#f8fbff;stroke:#6d89a8;stroke-width:3;rx:18;ry:18}
      .label{font:700 22px Arial,sans-serif;fill:#1f2a35}
      .small{font:400 18px Arial,sans-serif;fill:#4b5d6c}
      .arrow{stroke:#6d89a8;stroke-width:5;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#6d89a8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="title">Vision Regression Choice Flow</text>
  <rect class="box" x="70" y="170" width="220" height="100"/><text x="180" y="210" text-anchor="middle" class="label">UI screenshot?</text><text x="180" y="240" text-anchor="middle" class="small">screen understanding path</text>
  <rect class="box" x="330" y="170" width="220" height="100"/><text x="440" y="210" text-anchor="middle" class="label">Document image?</text><text x="440" y="240" text-anchor="middle" class="small">OCR + extraction path</text>
  <rect class="box" x="590" y="170" width="220" height="100"/><text x="700" y="210" text-anchor="middle" class="label">Photo / chart?</text><text x="700" y="240" text-anchor="middle" class="small">caption + grounding path</text>
  <rect class="box" x="850" y="170" width="250" height="100"/><text x="975" y="210" text-anchor="middle" class="label">Gate</text><text x="975" y="240" text-anchor="middle" class="small">release or review</text>
  <path class="arrow" d="M290 220 H325"/><path class="arrow" d="M550 220 H585"/><path class="arrow" d="M810 220 H845"/>
  <rect class="box" x="100" y="360" width="300" height="120"/><text x="250" y="400" text-anchor="middle" class="label">Text diff</text><text x="250" y="430" text-anchor="middle" class="small">field values and schema</text>
  <rect class="box" x="450" y="360" width="300" height="120"/><text x="600" y="400" text-anchor="middle" class="label">Visual diff</text><text x="600" y="430" text-anchor="middle" class="small">caption, box, match score</text>
  <rect class="box" x="800" y="360" width="300" height="120"/><text x="950" y="400" text-anchor="middle" class="label">Human review</text><text x="950" y="430" text-anchor="middle" class="small">ambiguous cases</text>
</svg>
