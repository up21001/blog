<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Embedding Storage Design Choice Flow</title>
  <desc id="desc">Decision flow for choosing embedding storage patterns.</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <text x="64" y="76" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Storage Choice Flow</text>
  <text x="64" y="112" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Choose the storage boundary before the reindex bill arrives.</text>
  <rect x="60" y="190" width="200" height="300" rx="24" fill="#eff6ff" stroke="#93c5fd"/>
  <rect x="280" y="190" width="200" height="300" rx="24" fill="#ecfdf5" stroke="#86efac"/>
  <rect x="500" y="190" width="200" height="300" rx="24" fill="#fff7ed" stroke="#fdba74"/>
  <rect x="720" y="190" width="200" height="300" rx="24" fill="#fef2f2" stroke="#fca5a5"/>
  <rect x="940" y="190" width="200" height="300" rx="24" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="96" y="238" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Document</text>
  <text x="96" y="270" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">source of truth</text>
  <text x="96" y="302" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">keep outside DB</text>
  <text x="316" y="238" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Chunk</text>
  <text x="316" y="270" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">stable granularity</text>
  <text x="316" y="302" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">avoid churn</text>
  <text x="536" y="238" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Vector</text>
  <text x="536" y="270" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">versioned embeddings</text>
  <text x="536" y="302" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">hot path only</text>
  <text x="756" y="238" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Metadata</text>
  <text x="756" y="270" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">minimal filter set</text>
  <text x="756" y="302" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">keep cardinality low</text>
  <text x="976" y="238" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Reindex</text>
  <text x="976" y="270" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">incremental first</text>
  <text x="976" y="302" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">cold data later</text>
</svg>
