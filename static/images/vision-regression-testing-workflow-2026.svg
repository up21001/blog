<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4fb"/>
      <stop offset="100%" stop-color="#dce8f5"/>
    </linearGradient>
    <style>
      .title{font:700 44px Arial,sans-serif;fill:#17212b}
      .sub{font:400 20px Arial,sans-serif;fill:#4a5b6b}
      .box{fill:#f8fbff;stroke:#6d89a8;stroke-width:3;rx:18;ry:18}
      .label{font:700 22px Arial,sans-serif;fill:#1f2a35}
      .small{font:400 18px Arial,sans-serif;fill:#4b5d6c}
      .arrow{stroke:#6d89a8;stroke-width:5;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#6d89a8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="title">Vision Regression Workflow</text>
  <text x="60" y="115" class="sub">Detect image-understanding regressions before they ship</text>
  <rect class="box" x="70" y="170" width="170" height="110"/><text x="155" y="214" text-anchor="middle" class="label">Sample</text><text x="155" y="244" text-anchor="middle" class="small">image set</text>
  <rect class="box" x="280" y="170" width="170" height="110"/><text x="365" y="214" text-anchor="middle" class="label">Annotate</text><text x="365" y="244" text-anchor="middle" class="small">ground truth</text>
  <rect class="box" x="490" y="170" width="170" height="110"/><text x="575" y="214" text-anchor="middle" class="label">Replay</text><text x="575" y="244" text-anchor="middle" class="small">model / prompt</text>
  <rect class="box" x="700" y="170" width="170" height="110"/><text x="785" y="214" text-anchor="middle" class="label">Compare</text><text x="785" y="244" text-anchor="middle" class="small">field diff</text>
  <rect class="box" x="910" y="170" width="220" height="110"/><text x="1020" y="214" text-anchor="middle" class="label">Gate</text><text x="1020" y="244" text-anchor="middle" class="small">pass / fail / review</text>
  <path class="arrow" d="M240 225 H275"/><path class="arrow" d="M450 225 H485"/><path class="arrow" d="M660 225 H695"/><path class="arrow" d="M870 225 H905"/>
  <rect class="box" x="120" y="360" width="260" height="140"/><text x="250" y="405" text-anchor="middle" class="label">Case Library</text><text x="250" y="435" text-anchor="middle" class="small">UI, document, photo, chart</text><text x="250" y="462" text-anchor="middle" class="small">edge cases + goldens</text>
  <rect class="box" x="440" y="360" width="260" height="140"/><text x="570" y="405" text-anchor="middle" class="label">Metrics</text><text x="570" y="435" text-anchor="middle" class="small">OCR, grounding, schema</text><text x="570" y="462" text-anchor="middle" class="small">latency, cost, confidence</text>
  <rect class="box" x="760" y="360" width="300" height="140"/><text x="910" y="405" text-anchor="middle" class="label">Output</text><text x="910" y="435" text-anchor="middle" class="small">dashboard, diff, alert</text><text x="910" y="462" text-anchor="middle" class="small">manual review queue</text>
  <path class="arrow" d="M380 430 H435"/><path class="arrow" d="M700 430 H755"/>
</svg>
