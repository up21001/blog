<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F2937">Flutter 3.x 크로스플랫폼 개발 흐름</text>

  <!-- 단일 코드베이스 -->
  <rect x="300" y="60" width="200" height="56" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="400" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E40AF">Dart 단일 코드베이스</text>
  <text x="400" y="104" text-anchor="middle" font-size="11" fill="#3B82F6">Flutter 3.x SDK</text>

  <!-- 화살표들 -->
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- 왼쪽: iOS -->
  <line x1="310" y1="116" x2="150" y2="200" stroke="#6B7280" stroke-width="1.8" marker-end="url(#arr2)"/>
  <rect x="50" y="200" width="190" height="60" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="145" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">iOS</text>
  <text x="145" y="244" text-anchor="middle" font-size="11" fill="#065F46">iPhone / iPad</text>

  <!-- 중앙: Android -->
  <line x1="400" y1="116" x2="400" y2="200" stroke="#6B7280" stroke-width="1.8" marker-end="url(#arr2)"/>
  <rect x="305" y="200" width="190" height="60" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="400" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">Android</text>
  <text x="400" y="244" text-anchor="middle" font-size="11" fill="#065F46">Phone / Tablet</text>

  <!-- 오른쪽: Web -->
  <line x1="490" y1="116" x2="650" y2="200" stroke="#6B7280" stroke-width="1.8" marker-end="url(#arr2)"/>
  <rect x="560" y="200" width="190" height="60" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="655" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">Web / Desktop</text>
  <text x="655" y="244" text-anchor="middle" font-size="11" fill="#065F46">Chrome / Windows</text>

  <!-- Flutter 렌더링 엔진 -->
  <rect x="200" y="310" width="400" height="60" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="400" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#5B21B6">Impeller 렌더링 엔진</text>
  <text x="400" y="354" text-anchor="middle" font-size="11" fill="#7C3AED">플랫폼 무관 픽셀 직접 렌더링 · 60/120fps</text>

  <line x1="145" y1="260" x2="300" y2="310" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="400" y1="260" x2="400" y2="310" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="655" y1="260" x2="500" y2="310" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- 개발 도구 -->
  <rect x="50" y="395" width="160" height="40" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="130" y="420" text-anchor="middle" font-size="12" fill="#92400E">Hot Reload</text>

  <rect x="230" y="395" width="160" height="40" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="310" y="420" text-anchor="middle" font-size="12" fill="#92400E">DevTools</text>

  <rect x="410" y="395" width="160" height="40" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="490" y="420" text-anchor="middle" font-size="12" fill="#92400E">pub.dev 패키지</text>

  <rect x="590" y="395" width="160" height="40" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="670" y="420" text-anchor="middle" font-size="12" fill="#92400E">Riverpod 상태관리</text>
</svg>
