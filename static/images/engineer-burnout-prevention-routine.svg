<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F2937">번아웃 없는 엔지니어의 하루 루틴</text>

  <!-- Time blocks - left column AM -->
  <rect x="30" y="60" width="340" height="36" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="50" y="83" font-size="12" font-weight="bold" fill="#1D4ED8">06:30 — 기상 + 운동 (30분)</text>
  <text x="310" y="83" font-size="11" fill="#6B7280">신체 에너지 확보</text>

  <rect x="30" y="103" width="340" height="36" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="50" y="126" font-size="12" font-weight="bold" fill="#1D4ED8">07:30 — 딥 워크 블록 1 (90분)</text>
  <text x="310" y="126" font-size="11" fill="#6B7280">핵심 기술 작업</text>

  <rect x="30" y="146" width="340" height="36" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="50" y="169" font-size="12" fill="#374151">09:00 — 이메일 / 슬랙 확인 (30분)</text>
  <text x="310" y="169" font-size="11" fill="#6B7280">반응적 작업</text>

  <rect x="30" y="189" width="340" height="36" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="50" y="212" font-size="12" font-weight="bold" fill="#1D4ED8">09:30 — 딥 워크 블록 2 (90분)</text>
  <text x="310" y="212" font-size="11" fill="#6B7280">코드 리뷰 / 설계</text>

  <rect x="30" y="232" width="340" height="36" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="50" y="255" font-size="12" fill="#065F46">11:00 — 팀 미팅 (필요시, 최대 60분)</text>
  <text x="310" y="255" font-size="11" fill="#6B7280">협업 시간</text>

  <rect x="30" y="275" width="340" height="36" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="50" y="298" font-size="12" fill="#92400E">12:00 — 점심 + 산책 (60분)</text>
  <text x="310" y="298" font-size="11" fill="#6B7280">완전한 휴식</text>

  <!-- Time blocks - right column PM -->
  <rect x="430" y="60" width="340" height="36" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="450" y="83" font-size="12" font-weight="bold" fill="#1D4ED8">13:00 — 딥 워크 블록 3 (90분)</text>
  <text x="710" y="83" font-size="11" fill="#6B7280">오후 집중 시간</text>

  <rect x="430" y="103" width="340" height="36" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="450" y="126" font-size="12" fill="#374151">14:30 — 문서화 / 보고 (60분)</text>
  <text x="710" y="126" font-size="11" fill="#6B7280">기록 습관</text>

  <rect x="430" y="146" width="340" height="36" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="450" y="169" font-size="12" fill="#4C1D95">15:30 — 멘토링 / 1:1 (필요시)</text>
  <text x="710" y="169" font-size="11" fill="#6B7280">팀 성장 투자</text>

  <rect x="430" y="189" width="340" height="36" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="450" y="212" font-size="12" fill="#065F46">17:00 — 마감 루틴 (15분)</text>
  <text x="710" y="212" font-size="11" fill="#6B7280">내일 Top 3 작성</text>

  <rect x="430" y="232" width="340" height="36" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="450" y="255" font-size="12" fill="#6B7280">17:15 — 업무 종료 (강제)</text>
  <text x="710" y="255" font-size="11" fill="#6B7280">경계선 유지</text>

  <rect x="430" y="275" width="340" height="36" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="450" y="298" font-size="12" fill="#92400E">저녁 — 학습 or 취미 (자율)</text>
  <text x="710" y="298" font-size="11" fill="#6B7280">에너지 재충전</text>

  <!-- Weekly rhythm -->
  <rect x="30" y="335" width="740" height="80" rx="8" fill="#374151" stroke="#1F2937" stroke-width="1.5"/>
  <text x="400" y="358" text-anchor="middle" font-size="13" font-weight="bold" fill="white">주간 리듬 (번아웃 방지 핵심)</text>
  <text x="100" y="380" text-anchor="middle" font-size="11" fill="#DBEAFE">월~목</text>
  <text x="100" y="396" text-anchor="middle" font-size="10" fill="#9CA3AF">딥 워크 집중</text>
  <text x="240" y="380" text-anchor="middle" font-size="11" fill="#D1FAE5">금요일</text>
  <text x="240" y="396" text-anchor="middle" font-size="10" fill="#9CA3AF">정리 + 회고</text>
  <text x="400" y="380" text-anchor="middle" font-size="11" fill="#FEF3C7">토요일</text>
  <text x="400" y="396" text-anchor="middle" font-size="10" fill="#9CA3AF">사이드 프로젝트</text>
  <text x="560" y="380" text-anchor="middle" font-size="11" fill="#EDE9FE">일요일</text>
  <text x="560" y="396" text-anchor="middle" font-size="10" fill="#9CA3AF">완전 휴식 + 주간 계획</text>
  <text x="700" y="380" text-anchor="middle" font-size="11" fill="#D1FAE5">분기마다</text>
  <text x="700" y="396" text-anchor="middle" font-size="10" fill="#9CA3AF">커리어 점검</text>

  <!-- Separator line -->
  <line x1="400" y1="60" x2="400" y2="320" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="415" y="58" font-size="11" fill="#6B7280">PM →</text>
  <text x="350" y="58" font-size="11" fill="#6B7280">← AM</text>
</svg>
