<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MCP Server Operations Architecture</title>
  <desc id="desc">Architecture showing agent, policy, MCP server, and observability layers.</desc>
  <rect width="1200" height="630" rx="36" fill="#0c1626"/>
  <text x="64" y="88" fill="#f4f7fb" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">MCP Server Operations Architecture</text>
  <text x="64" y="124" fill="#90a6c4" font-family="Inter, Arial, sans-serif" font-size="19">Agent -> Policy -> MCP server -> Observability</text>
  <g fill="#13253f" stroke="#7cc8ff" stroke-width="2">
    <rect x="70" y="210" width="210" height="140" rx="20"/>
    <rect x="335" y="210" width="210" height="140" rx="20"/>
    <rect x="600" y="210" width="210" height="140" rx="20"/>
    <rect x="865" y="210" width="260" height="140" rx="20"/>
  </g>
  <g fill="#eaf2ff" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="600">
    <text x="117" y="252">Agent</text>
    <text x="360" y="252">Policy Layer</text>
    <text x="635" y="252">MCP Server</text>
    <text x="908" y="252">Observability</text>
  </g>
  <g fill="#90a6c4" font-family="Inter, Arial, sans-serif" font-size="17">
    <text x="96" y="286">Requests and context</text>
    <text x="356" y="286">Allowlist and schema</text>
    <text x="628" y="286">Tools and resources</text>
    <text x="902" y="286">Trace, audit, replay</text>
  </g>
  <g stroke="#7cc8ff" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M280 280 H325"/>
    <path d="M545 280 H590"/>
    <path d="M810 280 H855"/>
  </g>
</svg>
