<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Vector Index Tuning Choice Flow</title>
  <desc id="desc">Decision flow for choosing vector index tuning strategy.</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <text x="64" y="76" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Tuning Decision Flow</text>
  <text x="64" y="112" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Start from workload, then choose the least risky knob.</text>
  <rect x="60" y="190" width="180" height="300" rx="24" fill="#eff6ff" stroke="#93c5fd"/>
  <rect x="260" y="190" width="180" height="300" rx="24" fill="#ecfeff" stroke="#67e8f9"/>
  <rect x="460" y="190" width="180" height="300" rx="24" fill="#fef3c7" stroke="#fcd34d"/>
  <rect x="660" y="190" width="180" height="300" rx="24" fill="#fce7f3" stroke="#f9a8d4"/>
  <rect x="860" y="190" width="280" height="300" rx="24" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="96" y="238" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Measure</text>
  <text x="96" y="272" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">baseline</text>
  <text x="96" y="304" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">recall / latency</text>
  <text x="296" y="238" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Change one</text>
  <text x="296" y="272" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">ef_search</text>
  <text x="296" y="304" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">then re-test</text>
  <text x="496" y="238" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Compress</text>
  <text x="496" y="272" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">quantization</text>
  <text x="496" y="304" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">watch recall loss</text>
  <text x="696" y="238" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Filter</text>
  <text x="696" y="272" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">payload selectivity</text>
  <text x="696" y="304" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">split query types</text>
  <text x="892" y="238" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Validate</text>
  <text x="892" y="272" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">prod sample + eval</text>
  <text x="892" y="304" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#334155">pick safest gain</text>
</svg>
