<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AssemblyAI Choice Flow 2026</title>
  <desc id="desc">Decision flow for when AssemblyAI is the right speech AI platform.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d4ed8" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Should You Use AssemblyAI?</text>

  <rect x="445" y="120" width="310" height="90" rx="22" fill="#fff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow2)"/>
  <text x="486" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Need speech AI?</text>

  <rect x="120" y="280" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow2)"/>
  <text x="190" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">No</text>
  <text x="142" y="360" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">A text-only LLM stack may be enough</text>

  <rect x="450" y="280" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow2)"/>
  <text x="490" y="327" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Need streaming</text>
  <text x="516" y="358" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">transcription?</text>

  <rect x="790" y="280" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow2)"/>
  <text x="842" y="327" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Need audio</text>
  <text x="850" y="358" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">intelligence?</text>

  <rect x="445" y="500" width="320" height="110" rx="26" fill="#1e3a8a" filter="url(#shadow2)"/>
  <text x="494" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#eff6ff">Use AssemblyAI</text>
  <text x="477" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#bfdbfe">Great fit for speech analytics and transcription</text>

  <path d="M600 210 L600 280" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M450 335 L420 335" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M750 335 L790 335" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M600 390 L600 500" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
</svg>
