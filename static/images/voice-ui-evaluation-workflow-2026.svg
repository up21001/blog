<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4eef6"/>
      <stop offset="100%" stop-color="#e4d7ea"/>
    </linearGradient>
    <style>
      .title{font:700 44px Arial,sans-serif;fill:#211a28}
      .sub{font:400 20px Arial,sans-serif;fill:#5a4c67}
      .box{fill:#fff8ff;stroke:#8a6ba0;stroke-width:3;rx:18;ry:18}
      .label{font:700 22px Arial,sans-serif;fill:#2a2130}
      .small{font:400 18px Arial,sans-serif;fill:#5a4c67}
      .arrow{stroke:#8a6ba0;stroke-width:5;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#8a6ba0"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="title">Voice UI Evaluation Workflow</text>
  <text x="60" y="115" class="sub">Measure latency, turn-taking, interruption handling, and completion</text>
  <rect class="box" x="70" y="170" width="180" height="110"/><text x="160" y="214" text-anchor="middle" class="label">Audio Input</text><text x="160" y="244" text-anchor="middle" class="small">live / synthetic</text>
  <rect class="box" x="290" y="170" width="180" height="110"/><text x="380" y="214" text-anchor="middle" class="label">STT</text><text x="380" y="244" text-anchor="middle" class="small">text + confidence</text>
  <rect class="box" x="510" y="170" width="180" height="110"/><text x="600" y="214" text-anchor="middle" class="label">Dialog</text><text x="600" y="244" text-anchor="middle" class="small">turn + state</text>
  <rect class="box" x="730" y="170" width="180" height="110"/><text x="820" y="214" text-anchor="middle" class="label">Tools</text><text x="820" y="244" text-anchor="middle" class="small">API calls</text>
  <rect class="box" x="950" y="170" width="180" height="110"/><text x="1040" y="214" text-anchor="middle" class="label">Score</text><text x="1040" y="244" text-anchor="middle" class="small">latency / completion</text>
  <path class="arrow" d="M250 225 H285"/><path class="arrow" d="M470 225 H505"/><path class="arrow" d="M690 225 H725"/><path class="arrow" d="M910 225 H945"/>
  <rect class="box" x="110" y="360" width="290" height="130"/><text x="255" y="404" text-anchor="middle" class="label">Metrics</text><text x="255" y="434" text-anchor="middle" class="small">latency, interruption, success</text><text x="255" y="462" text-anchor="middle" class="small">recovery, user frustration</text>
  <rect class="box" x="450" y="360" width="290" height="130"/><text x="595" y="404" text-anchor="middle" class="label">Review</text><text x="595" y="434" text-anchor="middle" class="small">call transcripts + trace</text><text x="595" y="462" text-anchor="middle" class="small">human review for edge cases</text>
  <rect class="box" x="790" y="360" width="300" height="130"/><text x="940" y="404" text-anchor="middle" class="label">Dashboard</text><text x="940" y="434" text-anchor="middle" class="small">trend, regression, gate</text><text x="940" y="462" text-anchor="middle" class="small">release decision</text>
  <path class="arrow" d="M400 425 H445"/><path class="arrow" d="M740 425 H785"/>
</svg>
