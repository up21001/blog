  <text x="266" y="282" font-size="10" fill="#4C1D95">주요 모듈, 의존성, 주의사항</text>

  <rect x="250" y="302" width="290" height="48" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
