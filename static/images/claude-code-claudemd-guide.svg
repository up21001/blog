<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">CLAUDE.md 구조 — 프로젝트별 AI 맞춤 설정</text>

  <!-- Left: file structure tree -->
  <rect x="30" y="52" width="200" height="230" rx="10" fill="#1E293B"/>
