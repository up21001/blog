  <text x="270" y="68" font-size="13" font-weight="bold" fill="#1E293B">CLAUDE.md 핵심 섹션</text>

  <rect x="250" y="78" width="290" height="48" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="266" y="97" font-size="12" font-weight="bold" fill="#1D4ED8">## 프로젝트 개요</text>
  <text x="266" y="114" font-size="10" fill="#1E40AF">기술 스택, 목적, 아키텍처 요약</text>

