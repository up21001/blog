  <text x="576" y="110" font-size="10" fill="#BE123C">• 다른 컨벤션으로 코드 작성</text>
  <text x="576" y="126" font-size="10" fill="#BE123C">• 금지 파일 수정 위험</text>
  <text x="576" y="142" font-size="10" fill="#BE123C">• 명령어 매번 물어봐야 함</text>
  <text x="576" y="158" font-size="10" fill="#BE123C">• 프로젝트 컨텍스트 부족</text>

  <rect x="560" y="190" width="210" height="120" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="665" y="209" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">CLAUDE.md 있을 때</text>
  <text x="576" y="229" font-size="10" fill="#047857">• 첫 세션부터 컨텍스트 파악</text>
  <text x="576" y="245" font-size="10" fill="#047857">• 팀 컨벤션 자동 준수</text>
  <text x="576" y="261" font-size="10" fill="#047857">• 금지 파일 자동 회피</text>
  <text x="576" y="277" font-size="10" fill="#047857">• 명령어 즉시 실행 가능</text>
  <text x="576" y="293" font-size="10" fill="#047857">• 일관된 코드 품질 유지</text>

  <!-- Arrow between before/after -->
  <text x="665" y="184" text-anchor="middle" font-size="18" fill="#10B981">↓</text>

  <!-- Best practices at bottom -->
  <rect x="30" y="300" width="210" height="130" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="135" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#1D4ED8">작성 팁</text>
  <text x="46" y="340" font-size="10" fill="#1E40AF">• 500 단어 이내로 간결하게</text>
  <text x="46" y="358" font-size="10" fill="#1E40AF">• 명령어는 코드블록으로 기재</text>
  <text x="46" y="376" font-size="10" fill="#1E40AF">• 서브 디렉터리별 분리 관리</text>
  <text x="46" y="394" font-size="10" fill="#1E40AF">• 금지사항은 명확히 명시</text>
  <text x="46" y="412" font-size="10" fill="#1E40AF">• 팀원과 함께 유지보수</text>

  <!-- Bottom bar -->
  <rect x="250" y="366" width="510" height="64" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="505" y="386" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">CLAUDE.md = AI를 위한 팀 온보딩 문서</text>
  <text x="505" y="404" text-anchor="middle" font-size="11" fill="#78350F">새 팀원에게 주는 프로젝트 가이드처럼, Claude에게도 같은 문서를 주면 됩니다.</text>
  <text x="505" y="420" text-anchor="middle" font-size="11" fill="#78350F">한 번 작성하면 모든 세션에서 일관된 품질을 얻을 수 있습니다.</text>
