  <text x="54" y="154" font-size="11" fill="#94A3B8" font-family="monospace">├── tests/</text>
  <text x="54" y="172" font-size="11" fill="#94A3B8" font-family="monospace">├── package.json</text>
  <text x="54" y="190" font-size="11" fill="#94A3B8" font-family="monospace">└── .claude/</text>
  <text x="62" y="208" font-size="11" fill="#D1FAE5" font-family="monospace">    └── settings.json</text>
  <text x="46" y="234" font-size="10" fill="#6B7280" font-family="monospace">// 서브디렉터리도 가능</text>
  <text x="46" y="250" font-size="10" fill="#6B7280" font-family="monospace">// src/CLAUDE.md</text>
  <text x="46" y="266" font-size="10" fill="#6B7280" font-family="monospace">// tests/CLAUDE.md</text>

