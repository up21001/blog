  <text x="266" y="226" font-size="10" fill="#78350F">네이밍, 포맷, 에러 처리 규칙</text>

  <rect x="250" y="246" width="290" height="48" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
