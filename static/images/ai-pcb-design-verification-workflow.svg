<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <rect width="800" height="450" fill="#F8FAFC"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">AI 기반 PCB 설계 검증 워크플로우</text>

  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="30" y="75" width="140" height="70" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="100" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">① 회로도 설계</text>
  <text x="100" y="121" text-anchor="middle" font-size="11" fill="#1E40AF">KiCad Schematic</text>
  <text x="100" y="137" text-anchor="middle" font-size="11" fill="#1E40AF">네트리스트 생성</text>

  <line x1="170" y1="110" x2="200" y2="110" stroke="#6B7280" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Step 2 -->
  <rect x="200" y="75" width="140" height="70" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="270" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">② AI 1차 검토</text>
  <text x="270" y="121" text-anchor="middle" font-size="11" fill="#065F46">ChatGPT/Claude</text>
  <text x="270" y="137" text-anchor="middle" font-size="11" fill="#065F46">회로 논리 검증</text>

  <line x1="340" y1="110" x2="370" y2="110" stroke="#6B7280" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Step 3 -->
  <rect x="370" y="75" width="140" height="70" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="440" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">③ PCB 레이아웃</text>
  <text x="440" y="121" text-anchor="middle" font-size="11" fill="#92400E">배선·배치 설계</text>
  <text x="440" y="137" text-anchor="middle" font-size="11" fill="#92400E">층 스택업 정의</text>

  <line x1="510" y1="110" x2="540" y2="110" stroke="#6B7280" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Step 4 -->
  <rect x="540" y="75" width="140" height="70" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="610" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#4C1D95">④ AI DRC 분석</text>
  <text x="610" y="121" text-anchor="middle" font-size="11" fill="#4C1D95">신호 무결성</text>
  <text x="610" y="137" text-anchor="middle" font-size="11" fill="#4C1D95">EMC 예측</text>

  <line x1="680" y1="110" x2="710" y2="110" stroke="#6B7280" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Step 5 -->
  <rect x="710" y="75" width="70" height="70" rx="10" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="745" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">⑤ 제조</text>
  <text x="745" y="121" text-anchor="middle" font-size="11" fill="#374151">거버 파일</text>
  <text x="745" y="137" text-anchor="middle" font-size="11" fill="#374151">출력</text>

  <!-- AI Checks Detail -->
  <rect x="30" y="185" width="360" height="230" rx="12" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="210" y="210" text-anchor="middle" font-size="14" font-weight="bold" fill="#374151">AI가 검출하는 주요 오류 유형</text>
  <line x1="50" y1="220" x2="370" y2="220" stroke="#D1D5DB" stroke-width="1"/>

  <circle cx="65" cy="245" r="8" fill="#EF4444"/>
  <text x="85" y="250" font-size="12" fill="#374151">디커플링 커패시터 누락 (전원 핀 근처)</text>
  <circle cx="65" cy="275" r="8" fill="#F59E0B"/>
  <text x="85" y="280" font-size="12" fill="#374151">임피던스 미매칭 (고속 신호선)</text>
  <circle cx="65" cy="305" r="8" fill="#10B981"/>
  <text x="85" y="310" font-size="12" fill="#374151">풀업/풀다운 저항 방향 오류</text>
  <circle cx="65" cy="335" r="8" fill="#3B82F6"/>
  <text x="85" y="340" font-size="12" fill="#374151">크리스탈 부하 커패시턴스 계산 오류</text>
  <circle cx="65" cy="365" r="8" fill="#8B5CF6"/>
  <text x="85" y="370" font-size="12" fill="#374151">전류 경로 루프 면적 과대 (EMI)</text>
  <circle cx="65" cy="395" r="8" fill="#6B7280"/>
  <text x="85" y="400" font-size="12" fill="#374151">열 방출 패드 Via 부족</text>

  <!-- KiCad Integration -->
  <rect x="420" y="185" width="360" height="230" rx="12" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="600" y="210" text-anchor="middle" font-size="14" font-weight="bold" fill="#374151">KiCad + AI 연동 방법</text>
  <line x1="440" y1="220" x2="760" y2="220" stroke="#D1D5DB" stroke-width="1"/>

  <rect x="440" y="232" width="320" height="42" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="600" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">KiCad Python Scripting Console</text>
  <text x="600" y="266" text-anchor="middle" font-size="11" fill="#1E40AF">netlist 추출 → JSON 변환 → LLM 전송</text>

  <rect x="440" y="284" width="320" height="42" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="600" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">KiCad REST API (v7+)</text>
  <text x="600" y="318" text-anchor="middle" font-size="11" fill="#065F46">외부 앱에서 실시간 보드 정보 조회</text>

  <rect x="440" y="336" width="320" height="42" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="600" y="354" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">Gerber + AI Vision 분석</text>
  <text x="600" y="370" text-anchor="middle" font-size="11" fill="#92400E">이미지 인식으로 레이아웃 패턴 검증</text>

  <text x="600" y="402" text-anchor="middle" font-size="11" fill="#6B7280">Claude API / GPT-4o Vision 활용</text>

  <text x="400" y="435" text-anchor="middle" font-size="12" fill="#6B7280">AI 검증 도입 시 설계 오류 조기 발견율 평균 60% 향상 (자체 측정)</text>
</svg>
