<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#f9fafb"/><text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">Should You Use Polar?</text><rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#9ca3af"/><text x="474" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">Need billing infra?</text><rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#d1d5db"/><text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#374151">No</text><text x="154" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#374151">A payment button may be enough</text><rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#d1d5db"/><text x="497" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#374151">Need usage-based</text><text x="532" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#374151">billing?</text><rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#d1d5db"/><text x="820" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#374151">Need merchant of</text><text x="856" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#374151">record?</text><rect x="445" y="500" width="320" height="110" rx="26" fill="#111827"/><text x="537" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#f9fafb">Use Polar</text><text x="483" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#d1d5db">Strong fit for developer billing systems</text></svg>
