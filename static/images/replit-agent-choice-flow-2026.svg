<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Replit Agent Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when Replit Agent is a good fit.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#7c3aed" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#5b21b6">Should You Use Replit Agent?</text>

  <rect x="425" y="120" width="350" height="90" rx="22" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow2)"/>
  <text x="471" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#5b21b6">Need natural language app build?</text>

  <rect x="110" y="285" width="300" height="110" rx="24" fill="#ffffff" stroke="#c4b5fd" filter="url(#shadow2)"/>
  <text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">No</text>
  <text x="150" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#6d28d9">A normal IDE or hosting stack may be enough</text>

  <rect x="450" y="285" width="300" height="110" rx="24" fill="#ffffff" stroke="#c4b5fd" filter="url(#shadow2)"/>
  <text x="484" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">Need build, test,</text>
  <text x="525" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">deploy?</text>

  <rect x="790" y="285" width="300" height="110" rx="24" fill="#ffffff" stroke="#c4b5fd" filter="url(#shadow2)"/>
  <text x="835" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">Need workspace and</text>
  <text x="848" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">database integration?</text>

  <rect x="445" y="500" width="330" height="110" rx="26" fill="#5b21b6" filter="url(#shadow2)"/>
  <text x="505" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#f5f3ff">Use Replit Agent</text>
  <text x="470" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#ddd6fe">Great for fast app creation loops</text>

  <path d="M600 210 L600 285" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M450 340 L410 340" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M750 340 L790 340" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M600 395 L600 500" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
</svg>
