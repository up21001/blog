<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">uv Command Map 2026</title>
  <desc id="desc">Command map for uv commands grouped by purpose</desc>
  <defs>
    <linearGradient id="uvbg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf2"/>
      <stop offset="100%" stop-color="#eef7ff"/>
    </linearGradient>
    <filter id="uvshadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#4d6272" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#uvbg2)"/>
  <text x="70" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#243a4c">uv 명령 맵</text>
  <text x="70" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#5b7388">어떤 작업을 어떤 명령으로 처리하는지 한눈에 정리</text>

  <rect x="470" y="90" width="260" height="92" rx="24" fill="#1f8a70" filter="url(#uvshadow2)"/>
  <text x="575" y="147" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#fff">uv</text>

  <rect x="120" y="250" width="250" height="160" rx="24" fill="#0f4c81" filter="url(#uvshadow2)"/>
  <text x="170" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">Python 관리</text>
  <text x="155" y="345" font-family="Consolas, monospace" font-size="18" fill="#dcebff">uv python install</text>
  <text x="155" y="377" font-family="Consolas, monospace" font-size="18" fill="#dcebff">uv python pin</text>

  <rect x="475" y="250" width="250" height="160" rx="24" fill="#2166a5" filter="url(#uvshadow2)"/>
  <text x="530" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">프로젝트</text>
  <text x="510" y="345" font-family="Consolas, monospace" font-size="18" fill="#e6f3ff">uv init</text>
  <text x="510" y="377" font-family="Consolas, monospace" font-size="18" fill="#e6f3ff">uv sync</text>

  <rect x="830" y="250" width="250" height="160" rx="24" fill="#cc6b2c" filter="url(#uvshadow2)"/>
  <text x="905" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">의존성</text>
  <text x="865" y="345" font-family="Consolas, monospace" font-size="18" fill="#fff2e8">uv add</text>
  <text x="865" y="377" font-family="Consolas, monospace" font-size="18" fill="#fff2e8">uv remove</text>

  <rect x="290" y="470" width="250" height="160" rx="24" fill="#865dff" opacity="0.82" filter="url(#uvshadow2)"/>
  <text x="360" y="525" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">실행</text>
  <text x="325" y="565" font-family="Consolas, monospace" font-size="18" fill="#f5efff">uv run</text>
  <text x="325" y="597" font-family="Consolas, monospace" font-size="18" fill="#f5efff">uvx</text>

  <rect x="660" y="470" width="250" height="160" rx="24" fill="#6a994e" filter="url(#uvshadow2)"/>
  <text x="730" y="525" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">패키징</text>
  <text x="695" y="565" font-family="Consolas, monospace" font-size="18" fill="#eefbe4">uv build</text>
  <text x="695" y="597" font-family="Consolas, monospace" font-size="18" fill="#eefbe4">uv publish</text>
</svg>
