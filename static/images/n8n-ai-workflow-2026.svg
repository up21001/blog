<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">n8n AI Workflow 2026</title>
  <desc id="desc">Workflow diagram for n8n AI with agent node, tools, chat trigger, and workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f766e" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#155e75">n8n AI Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">Agent nodes, tools, triggers, and reusable workflows</text>
  <rect x="70" y="190" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#67e8f9" filter="url(#shadow)"/>
  <text x="126" y="240" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#155e75">Trigger</text>
  <text x="104" y="274" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">Webhook, chat, app</text>
  <rect x="360" y="150" rx="28" ry="28" width="470" height="340" fill="#fff" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
  <text x="540" y="200" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#155e75">n8n AI</text>
  <rect x="405" y="230" rx="18" ry="18" width="160" height="84" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="443" y="280" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">AI Agent</text>
  <rect x="625" y="230" rx="18" ry="18" width="160" height="84" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="675" y="280" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Tools</text>
  <rect x="405" y="350" rx="18" ry="18" width="160" height="84" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="438" y="400" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Nodes</text>
  <rect x="625" y="350" rx="18" ry="18" width="160" height="84" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="656" y="400" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Memory</text>
  <rect x="900" y="190" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#67e8f9" filter="url(#shadow)"/>
  <text x="976" y="240" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#155e75">Apps</text>
  <text x="936" y="274" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">Cloud or self-hosted</text>
  <path d="M280 250 C325 250, 335 250, 360 250" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M565 272 C590 272, 600 272, 625 272" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M565 392 C590 392, 600 392, 625 392" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M785 272 C860 272, 870 240, 900 240" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M785 392 C860 392, 870 300, 900 300" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
