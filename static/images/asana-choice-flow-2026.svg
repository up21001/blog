<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720"><rect width="1200" height="720" fill="#fffaf2"/><text x="70" y="88" font-family="Segoe UI, Arial" font-size="38" font-weight="700" fill="#21384c">Asana 도입 판단 흐름도</text><text x="70" y="126" font-family="Segoe UI, Arial" font-size="20" fill="#5b7388">개발 외 직무까지 함께 협업하는지, 일정 시각화가 중요한지 먼저 보면 판단이 쉬워집니다.</text><rect x="430" y="110" width="340" height="90" rx="24" fill="#1f8a70"/><text x="510" y="166" font-family="Segoe UI, Arial" font-size="30" font-weight="700" fill="#fff">협업 구조</text><polygon points="470,270 730,270 810,340 730,410 470,410 390,340" fill="#0f4c81"/><text x="445" y="345" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#fff">여러 직무가 일정과 의존 관계를 함께 보나요?</text><rect x="150" y="500" width="260" height="100" rx="22" fill="#2166a5"/><text x="225" y="558" font-family="Segoe UI, Arial" font-size="28" font-weight="700" fill="#fff">Asana 적합</text><rect x="790" y="500" width="260" height="100" rx="22" fill="#cc6b2c"/><text x="840" y="558" font-family="Segoe UI, Arial" font-size="28" font-weight="700" fill="#fff">개발 중심 도구</text><path d="M600 200 L600 270" stroke="#4d6676" stroke-width="8"/><path d="M390 340 L280 500" stroke="#4d6676" stroke-width="8"/><path d="M810 340 L920 500" stroke="#4d6676" stroke-width="8"/></svg>
