<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AgentQL Workflow 2026</title>
  <desc id="desc">AgentQL browser automation workflow with natural language query, Playwright SDK, debugger, remote browser, and extracted data.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#c2410c" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2410c"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">AgentQL Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">Natural language selectors for web extraction and automation</text>

  <rect x="70" y="180" rx="24" ry="24" width="220" height="120" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="116" y="232" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Query</text>
  <text x="98" y="265" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">Natural language intent</text>

  <rect x="360" y="140" rx="28" ry="28" width="470" height="360" fill="#ffffff" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <text x="505" y="194" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">AgentQL</text>
  <rect x="405" y="228" rx="18" ry="18" width="170" height="90" fill="#fff7ed" stroke="#fdba74"/>
  <text x="433" y="280" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Query Lang</text>
  <rect x="615" y="228" rx="18" ry="18" width="170" height="90" fill="#fff7ed" stroke="#fdba74"/>
  <text x="653" y="268" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Playwright</text>
  <text x="646" y="296" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">SDK / browser</text>

  <rect x="405" y="348" rx="18" ry="18" width="170" height="90" fill="#fff7ed" stroke="#fdba74"/>
  <text x="438" y="388" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Debugger</text>
  <text x="437" y="415" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">extension</text>

  <rect x="615" y="348" rx="18" ry="18" width="170" height="90" fill="#fff7ed" stroke="#fdba74"/>
  <text x="633" y="388" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Remote</text>
  <text x="650" y="415" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">browser</text>

  <rect x="920" y="170" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="976" y="218" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Web</text>
  <text x="952" y="252" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">data / actions</text>
  <text x="948" y="276" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">extracted data</text>

  <rect x="920" y="345" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="965" y="392" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Tests</text>
  <text x="948" y="425" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">automation checks</text>

  <path d="M290 240 C320 240, 330 240, 360 240" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M830 240 C870 240, 885 240, 920 240" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M830 405 C875 405, 885 405, 920 405" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M575 273 C595 273, 600 273, 615 273" fill="none" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M490 318 C490 328, 490 337, 490 348" fill="none" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M700 318 C700 328, 700 337, 700 348" fill="none" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
