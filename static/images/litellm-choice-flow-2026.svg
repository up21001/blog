<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">LiteLLM Choice Flow 2026</title>
  <desc id="desc">Decision flow for when to use LiteLLM.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Should You Use LiteLLM?</text>

  <rect x="445" y="120" width="310" height="90" rx="22" fill="#fff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow2)"/>
  <text x="494" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Need model gateway?</text>

  <rect x="120" y="280" width="300" height="110" rx="24" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow2)"/>
  <text x="183" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">No</text>
  <text x="146" y="360" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">A direct SDK may be enough</text>

  <rect x="450" y="280" width="300" height="110" rx="24" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow2)"/>
  <text x="504" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Need routing and</text>
  <text x="522" y="360" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">fallback?</text>

  <rect x="790" y="280" width="300" height="110" rx="24" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow2)"/>
  <text x="848" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Need budgets and</text>
  <text x="853" y="360" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">spend tracking?</text>

  <rect x="445" y="500" width="320" height="110" rx="26" fill="#0f172a" filter="url(#shadow2)"/>
  <text x="536" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#f8fafc">Use LiteLLM</text>
  <text x="485" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#cbd5e1">Strong fit for shared LLM operations</text>

  <path d="M600 210 L600 280" stroke="#334155" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M420 335 L450 335" stroke="#334155" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M750 335 L790 335" stroke="#334155" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M600 390 L600 500" stroke="#334155" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
</svg>
