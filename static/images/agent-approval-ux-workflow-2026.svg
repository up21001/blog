<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f3eb"/>
      <stop offset="100%" stop-color="#e8eef8"/>
    </linearGradient>
    <style>
      .title{font:700 40px Arial,sans-serif;fill:#172033}
      .sub{font:400 22px Arial,sans-serif;fill:#49566e}
      .box{fill:#fff;stroke:#243247;stroke-width:3;rx:18;ry:18}
      .label{font:700 22px Arial,sans-serif;fill:#172033}
      .small{font:400 18px Arial,sans-serif;fill:#4a5568}
      .arrow{stroke:#243247;stroke-width:4;fill:none;marker-end:url(#m)}
      .pill{fill:#172033;rx:999;ry:999}
      .pillText{font:700 18px Arial,sans-serif;fill:#fff}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#243247"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="68" class="title">Agent Approval UX</text>
  <text x="60" y="106" class="sub">Information first, decision second, audit third</text>
  <rect x="60" y="140" width="150" height="38" class="pill"/>
  <text x="90" y="166" class="pillText">workflow</text>

  <rect class="box" x="70" y="230" width="180" height="110"/>
  <text x="115" y="274" class="label">Agent</text>
  <text x="98" y="304" class="small">Creates request</text>
  <rect class="box" x="320" y="230" width="220" height="110"/>
  <text x="368" y="274" class="label">Policy Engine</text>
  <text x="350" y="304" class="small">Classify risk + route</text>
  <rect class="box" x="615" y="190" width="210" height="110"/>
  <text x="662" y="234" class="label">Approval UI</text>
  <text x="640" y="264" class="small">Show impact + action</text>
  <rect class="box" x="615" y="340" width="210" height="110"/>
  <text x="663" y="384" class="label">Decision</text>
  <text x="655" y="414" class="small">Approve or reject</text>
  <rect class="box" x="915" y="260" width="180" height="110"/>
  <text x="947" y="304" class="label">Audit Log</text>
  <text x="937" y="334" class="small">Persist outcome</text>
  <path class="arrow" d="M250 285 L320 285"/>
  <path class="arrow" d="M540 285 L615 245"/>
  <path class="arrow" d="M720 300 L720 340"/>
  <path class="arrow" d="M825 295 L915 315"/>
</svg>
