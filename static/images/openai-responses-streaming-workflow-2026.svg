<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">OpenAI Responses Streaming Workflow 2026</title>
  <desc id="desc">Workflow diagram for OpenAI Responses streaming</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef7ff"/>
      <stop offset="100%" stop-color="#f1fbf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#405462" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4a6270"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#173247">OpenAI Responses Streaming</text>
  <text x="70" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#5a7182">이벤트를 순서대로 받아 UI에 실시간 반영하는 기본 흐름</text>

  <rect x="80" y="220" width="210" height="120" rx="22" fill="#0f4c81" filter="url(#shadow)"/>
  <text x="123" y="273" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">Request</text>
  <text x="107" y="307" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#d7e8ff">stream enabled</text>

  <rect x="360" y="190" width="250" height="180" rx="28" fill="#1f8a70" filter="url(#shadow)"/>
  <text x="424" y="242" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#fff">Event loop</text>
  <text x="400" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#e8fff8">text deltas</text>
  <text x="399" y="310" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#e8fff8">tool updates</text>
  <text x="397" y="342" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#e8fff8">final completion</text>

  <rect x="690" y="120" width="180" height="90" rx="20" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="722" y="174" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Buffer</text>

  <rect x="690" y="245" width="180" height="90" rx="20" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="720" y="299" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Render</text>

  <rect x="690" y="370" width="180" height="90" rx="20" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="715" y="424" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Complete</text>

  <rect x="940" y="235" width="180" height="130" rx="24" fill="#24415a" filter="url(#shadow)"/>
  <text x="985" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">UI</text>
  <text x="972" y="322" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#d8ebff">live response</text>

  <path d="M290 280 L360 280" stroke="#4a6270" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <path d="M610 240 L690 165" stroke="#4a6270" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <path d="M610 280 L690 290" stroke="#4a6270" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <path d="M610 320 L690 415" stroke="#4a6270" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <path d="M870 290 L940 300" stroke="#4a6270" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
</svg>
