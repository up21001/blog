  <text x="110" y="296" text-anchor="middle" font-size="11" fill="#1E40AF">ESP32 커스텀 센서</text>
  <line x1="190" y1="280" x2="290" y2="240" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr4)"/>

  <!-- Right: AI Layer -->
  <rect x="610" y="80" width="160" height="60" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="690" y="106" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">LLM 연동</text>
