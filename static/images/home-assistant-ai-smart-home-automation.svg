  <rect x="30" y="345" width="740" height="85" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="368" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">AI 자동화 레시피 예시</text>
  <rect x="50" y="378" width="170" height="38" rx="6" fill="#ffffff" stroke="#F59E0B" stroke-width="1"/>
  <text x="135" y="393" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">귀가 감지 → 자동 점등</text>
  <text x="135" y="408" text-anchor="middle" font-size="10" fill="#92400E">GPS + 현관 도어센서</text>
  <rect x="235" y="378" width="170" height="38" rx="6" fill="#ffffff" stroke="#F59E0B" stroke-width="1"/>
  <text x="320" y="393" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">취침 모드 자동 실행</text>
  <text x="320" y="408" text-anchor="middle" font-size="10" fill="#92400E">취침 패턴 학습 기반</text>
  <rect x="420" y="378" width="170" height="38" rx="6" fill="#ffffff" stroke="#F59E0B" stroke-width="1"/>
  <text x="505" y="393" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">이상 소비 전력 알림</text>
  <text x="505" y="408" text-anchor="middle" font-size="10" fill="#92400E">ML 이상치 탐지</text>
  <rect x="605" y="378" width="150" height="38" rx="6" fill="#ffffff" stroke="#F59E0B" stroke-width="1"/>
  <text x="680" y="393" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">음성 자연어 제어</text>
  <text x="680" y="408" text-anchor="middle" font-size="10" fill="#92400E">LLM 의도 파악</text>
</svg>
