<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <rect width="800" height="450" fill="#F8FAFC"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">Home Assistant + AI 스마트홈 아키텍처</text>

  <defs>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Center: HA Core -->
  <rect x="290" y="155" width="220" height="130" rx="14" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="3"/>
  <text x="400" y="185" text-anchor="middle" font-size="15" font-weight="bold" fill="#4C1D95">Home Assistant Core</text>
  <text x="400" y="207" text-anchor="middle" font-size="12" fill="#4C1D95">Raspberry Pi 5 / x86</text>
  <text x="400" y="227" text-anchor="middle" font-size="12" fill="#4C1D95">State Machine + Automations</text>
  <text x="400" y="247" text-anchor="middle" font-size="12" fill="#4C1D95">MQTT / Zigbee2MQTT</text>
  <text x="400" y="267" text-anchor="middle" font-size="12" fill="#4C1D95">Add-on: ESPHome, Node-RED</text>

  <!-- Left: Devices -->
  <rect x="30" y="80" width="160" height="60" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
