  <line x1="510" y1="200" x2="610" y2="110" stroke="#10B981" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr4)"/>

  <rect x="610" y="165" width="160" height="60" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="690" y="191" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">AI 음성 비서</text>
  <text x="690" y="211" text-anchor="middle" font-size="11" fill="#065F46">Assist + Whisper STT</text>
  <line x1="510" y1="215" x2="610" y2="210" stroke="#10B981" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr4)"/>

  <rect x="610" y="250" width="160" height="60" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="690" y="276" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">AI 에너지 분석</text>
  <text x="690" y="296" text-anchor="middle" font-size="11" fill="#065F46">소비 패턴 예측·절감</text>
  <line x1="510" y1="230" x2="610" y2="270" stroke="#10B981" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr4)"/>

