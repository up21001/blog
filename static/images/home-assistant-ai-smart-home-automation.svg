  <text x="110" y="126" text-anchor="middle" font-size="11" fill="#1E40AF">조명 · 도어센서 · 플러그</text>
  <line x1="190" y1="110" x2="290" y2="200" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr4)"/>

  <rect x="30" y="165" width="160" height="60" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="110" y="191" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">Wi-Fi / Matter</text>
  <text x="110" y="211" text-anchor="middle" font-size="11" fill="#1E40AF">스위치 · 온습도 · CCTV</text>
  <line x1="190" y1="195" x2="290" y2="210" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr4)"/>

  <rect x="30" y="250" width="160" height="60" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
