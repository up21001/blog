<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf4"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <style>
      .title{font:700 42px Arial,sans-serif;fill:#172033}
      .sub{font:400 22px Arial,sans-serif;fill:#4b5563}
      .box{fill:#fff;stroke:#172033;stroke-width:3;rx:18;ry:18}
      .label{font:700 22px Arial,sans-serif;fill:#172033}
      .small{font:400 18px Arial,sans-serif;fill:#4b5563}
      .arrow{stroke:#172033;stroke-width:4;fill:none;marker-end:url(#m)}
      .pill{fill:#172033;rx:999;ry:999}
      .pillText{font:700 18px Arial,sans-serif;fill:#fff}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#172033"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="70" class="title">Approval UI Decision Flow</text>
  <text x="60" y="110" class="sub">Keep the decision small, obvious, and reversible</text>
  <rect x="60" y="140" width="180" height="40" class="pill"/>
  <text x="85" y="167" class="pillText">choice flow</text>
  <rect class="box" x="80" y="230" width="170" height="110"/>
  <text x="111" y="275" class="label">Review</text>
  <text x="98" y="305" class="small">Understand</text>
  <rect class="box" x="350" y="230" width="170" height="110"/>
  <text x="391" y="275" class="label">Approve</text>
  <text x="372" y="305" class="small">Proceed</text>
  <rect class="box" x="620" y="230" width="170" height="110"/>
  <text x="667" y="275" class="label">Reject</text>
  <text x="648" y="305" class="small">Stop safely</text>
  <rect class="box" x="890" y="230" width="170" height="110"/>
  <text x="922" y="275" class="label">Rework</text>
  <text x="905" y="305" class="small">Request update</text>
  <path class="arrow" d="M250 285 L350 285"/>
  <path class="arrow" d="M520 285 L620 285"/>
  <path class="arrow" d="M790 285 L890 285"/>
</svg>
