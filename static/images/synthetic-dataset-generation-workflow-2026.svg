<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 52px Arial, sans-serif; fill: #f8fafc; }
      .sub { font: 400 22px Arial, sans-serif; fill: #cbd5e1; }
      .box { fill: rgba(15, 23, 42, 0.82); stroke: #f59e0b; stroke-width: 2; rx: 18; }
      .box2 { fill: rgba(30, 41, 59, 0.95); stroke: #fbbf24; stroke-width: 2; rx: 18; }
      .lbl { font: 700 22px Arial, sans-serif; fill: #e2e8f0; }
      .txt { font: 400 17px Arial, sans-serif; fill: #cbd5e1; }
      .arrow { stroke: #94a3b8; stroke-width: 5; fill: none; marker-end: url(#m); }
      .pill { fill: #f59e0b; }
      .pilltxt { font: 700 16px Arial, sans-serif; fill: white; }
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1020" cy="120" r="140" fill="#f59e0b22"/>
  <circle cx="190" cy="530" r="180" fill="#fbbf2422"/>
  <rect x="80" y="70" width="320" height="38" rx="19" class="pill"/>
  <text x="240" y="95" text-anchor="middle" class="pilltxt">SYNTHETIC DATASET</text>
  <text x="80" y="180" class="title">Synthetic Dataset Generation</text>
  <text x="80" y="220" class="sub">Build evaluation data from real logs, then verify it</text>

  <rect x="80" y="300" width="180" height="140" class="box"/>
  <text x="170" y="348" text-anchor="middle" class="lbl">Real logs</text>
  <text x="170" y="378" text-anchor="middle" class="txt">Questions from users</text>

  <rect x="310" y="300" width="180" height="140" class="box2"/>
  <text x="400" y="348" text-anchor="middle" class="lbl">Seed set</text>
  <text x="400" y="378" text-anchor="middle" class="txt">Representative tasks</text>

  <rect x="540" y="300" width="180" height="140" class="box2"/>
  <text x="630" y="348" text-anchor="middle" class="lbl">LLM generation</text>
  <text x="630" y="378" text-anchor="middle" class="txt">Variants and answers</text>

  <rect x="770" y="300" width="350" height="140" class="box"/>
  <text x="945" y="348" text-anchor="middle" class="lbl">Validation</text>
  <text x="945" y="378" text-anchor="middle" class="txt">Human review, labels, versioning</text>

  <path class="arrow" d="M 260 370 L 300 370"/>
  <path class="arrow" d="M 490 370 L 530 370"/>
  <path class="arrow" d="M 720 370 L 760 370"/>
</svg>

