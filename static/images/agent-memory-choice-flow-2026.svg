<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#fffaf5"/>
  <text x="70" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#9a3412">Agent Memory Choice Flow</text>
  <text x="70" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#7c2d12">what to store, what to summarize, what to forget</text>

  <rect x="70" y="245" width="180" height="100" rx="22" fill="#ffffff" stroke="#fdba74" stroke-width="2"/>
  <text x="110" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#c2410c">Event</text>
  <text x="100" y="314" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ea580c">new info arrives</text>

  <rect x="305" y="210" width="220" height="170" rx="24" fill="#ffedd5" stroke="#fdba74" stroke-width="2"/>
  <text x="364" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#9a3412">Decision</text>
  <text x="336" y="290" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#b45309">important?</text>
  <text x="332" y="318" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#b45309">reusable?</text>
  <text x="330" y="346" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#b45309">sensitive?</text>

  <rect x="590" y="150" width="220" height="120" rx="22" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="633" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#166534">Store</text>
  <text x="612" y="230" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#15803d">profile / preference</text>

  <rect x="590" y="310" width="220" height="120" rx="22" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
  <text x="622" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#1d4ed8">Summarize</text>
  <text x="615" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#2563eb">compress context</text>

  <rect x="590" y="470" width="220" height="90" rx="22" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="645" y="522" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#991b1b">Forget</text>

  <rect x="880" y="245" width="250" height="100" rx="22" fill="#111827"/>
  <text x="925" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Reuse Later</text>
  <text x="908" y="314" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#d1d5db">retrieval / policy checks</text>

  <path d="M250 295 L305 295" stroke="#7c2d12" stroke-width="8" stroke-linecap="round"/>
  <path d="M525 295 L590 210" stroke="#7c2d12" stroke-width="8" stroke-linecap="round"/>
  <path d="M525 295 L590 370" stroke="#7c2d12" stroke-width="8" stroke-linecap="round"/>
  <path d="M525 295 L590 515" stroke="#7c2d12" stroke-width="8" stroke-linecap="round"/>
  <path d="M810 210 L880 295" stroke="#7c2d12" stroke-width="8" stroke-linecap="round"/>
  <path d="M810 370 L880 295" stroke="#7c2d12" stroke-width="8" stroke-linecap="round"/>
</svg>
