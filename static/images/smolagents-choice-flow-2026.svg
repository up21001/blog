<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">smolagents Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when smolagents is a good fit.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f766e" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Should You Use smolagents?</text>

  <rect x="435" y="120" width="330" height="90" rx="22" fill="#fff" stroke="#14b8a6" stroke-width="2" filter="url(#shadow2)"/>
  <text x="492" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Need lightweight agents?</text>

  <rect x="110" y="285" width="300" height="110" rx="24" fill="#ffffff" stroke="#5eead4" filter="url(#shadow2)"/>
  <text x="186" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#115e59">No</text>
  <text x="146" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#115e59">A heavier orchestration stack may fit better</text>

  <rect x="450" y="285" width="300" height="110" rx="24" fill="#ffffff" stroke="#5eead4" filter="url(#shadow2)"/>
  <text x="490" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#115e59">Need code agents</text>
  <text x="525" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#115e59">or tool calling?</text>

  <rect x="790" y="285" width="300" height="110" rx="24" fill="#ffffff" stroke="#5eead4" filter="url(#shadow2)"/>
  <text x="849" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#115e59">Need sandbox</text>
  <text x="853" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#115e59">and telemetry?</text>

  <rect x="445" y="500" width="320" height="110" rx="26" fill="#0f766e" filter="url(#shadow2)"/>
  <text x="525" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ecfeff">Use smolagents</text>
  <text x="476" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#ccfbf1">Great for small Python agent apps</text>

  <path d="M600 210 L600 285" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M450 340 L410 340" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M750 340 L790 340" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M600 395 L600 500" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
</svg>
