<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Exa Workflow 2026</title>
  <desc id="desc">Exa search, answer, research, and websets flow for AI applications.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d4ed8" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Exa Workflow</text>
  <rect x="70" y="180" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="132" y="232" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Query</text>
  <text x="108" y="266" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">search / answer / research</text>

  <rect x="360" y="140" rx="28" ry="28" width="480" height="360" fill="#fff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
  <text x="545" y="192" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Exa</text>
  <rect x="405" y="230" rx="18" ry="18" width="160" height="82" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="447" y="280" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Search</text>
  <rect x="625" y="230" rx="18" ry="18" width="160" height="82" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="649" y="280" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Contents</text>
  <rect x="405" y="350" rx="18" ry="18" width="160" height="82" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="434" y="392" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Answer</text>
  <text x="441" y="419" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">citations</text>
  <rect x="625" y="350" rx="18" ry="18" width="160" height="82" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="647" y="392" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Research</text>
  <text x="653" y="419" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">Websets</text>

  <rect x="900" y="180" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="956" y="232" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Agents</text>
  <text x="942" y="266" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">RAG, research, sourcing</text>

  <path d="M280 240 C320 240, 330 240, 360 240" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M845 240 C875 240, 885 240, 900 240" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M565 271 C590 271, 600 271, 625 271" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M485 312 C485 330, 485 340, 485 350" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M705 312 C705 330, 705 340, 705 350" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
