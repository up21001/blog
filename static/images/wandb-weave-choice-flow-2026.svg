<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">W&B Weave Choice Flow 2026</title>
  <desc id="desc">Decision flow for using W&B Weave for observability and evaluation.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#4338ca" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4338ca"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">Should You Use W&B Weave?</text>
  <rect x="440" y="120" width="330" height="90" rx="22" fill="#fff" stroke="#818cf8" stroke-width="2" filter="url(#shadow2)"/>
  <text x="490" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">Need LLM evals?</text>
  <rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#c7d2fe" filter="url(#shadow2)"/>
  <text x="193" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">No</text>
  <text x="136" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">A simple logging stack may be enough</text>
  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#c7d2fe" filter="url(#shadow2)"/>
  <text x="504" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Need tracing and</text>
  <text x="519" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">judges?</text>
  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#c7d2fe" filter="url(#shadow2)"/>
  <text x="839" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Need datasets and</text>
  <text x="856" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">experiments?</text>
  <rect x="445" y="500" width="330" height="110" rx="26" fill="#312e81" filter="url(#shadow2)"/>
  <text x="506" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#eef2ff">Use W&B Weave</text>
  <text x="472" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c7d2fe">Strong fit for evaluation loops</text>
  <path d="M605 210 L605 285" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M450 340 L420 340" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M750 340 L790 340" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M605 395 L605 500" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
</svg>
