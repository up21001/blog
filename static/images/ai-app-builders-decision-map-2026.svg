<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#fff7ed"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">AI App Builder Decision Map</text>
  <rect x="450" y="120" width="300" height="90" rx="22" fill="#fff" stroke="#fdba74"/>
  <text x="490" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Need code ownership?</text>
  <rect x="110" y="285" width="260" height="110" rx="24" fill="#fff" stroke="#fdba74"/>
  <text x="160" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">No</text>
  <text x="137" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">Prefer fastest generation path</text>
  <rect x="420" y="285" width="260" height="110" rx="24" fill="#fff" stroke="#fdba74"/>
  <text x="494" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Yes</text>
  <text x="448" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">Need GitHub / repo workflow</text>
  <rect x="730" y="285" width="340" height="110" rx="24" fill="#fff" stroke="#fdba74"/>
  <text x="820" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need hosted infra?</text>
  <text x="835" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">Bolt Cloud and connectors matter</text>
  <rect x="450" y="500" width="300" height="110" rx="26" fill="#7c2d12"/>
  <text x="522" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fff7ed">Choose by workflow</text>
  <text x="495" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#fed7aa">v0, Lovable, Bolt.new are adjacent, not identical</text>
</svg>
