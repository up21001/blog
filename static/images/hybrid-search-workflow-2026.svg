<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset="1" stop-color="#102b3c"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="120" x2="1020" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4fd1c5"/>
      <stop offset="1" stop-color="#63b3ed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <circle cx="1040" cy="110" r="160" fill="#4fd1c5" fill-opacity="0.10"/>
  <circle cx="180" cy="540" r="180" fill="#63b3ed" fill-opacity="0.10"/>
  <text x="80" y="112" fill="#e6f7ff" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700">Hybrid Search</text>
  <text x="80" y="158" fill="#b8d7e8" font-family="Arial, Helvetica, sans-serif" font-size="24">keyword + vector + rerank</text>
  <g filter="url(#shadow)">
    <rect x="70" y="220" width="200" height="120" rx="22" fill="#0f2233" stroke="#2f5f7e" stroke-width="2"/>
    <rect x="300" y="220" width="200" height="120" rx="22" fill="#0f2233" stroke="#2f5f7e" stroke-width="2"/>
    <rect x="530" y="220" width="200" height="120" rx="22" fill="#0f2233" stroke="#2f5f7e" stroke-width="2"/>
    <rect x="760" y="220" width="200" height="120" rx="22" fill="#0f2233" stroke="#2f5f7e" stroke-width="2"/>
    <rect x="990" y="220" width="140" height="120" rx="22" fill="#16344b" stroke="#4fd1c5" stroke-width="2"/>
  </g>
  <text x="170" y="268" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="28" font-weight="700">Query</text>
  <text x="400" y="260" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="26" font-weight="700">Keyword</text>
  <text x="400" y="292" text-anchor="middle" fill="#b8d7e8" font-family="Arial" font-size="18">BM25 / lexical</text>
  <text x="630" y="260" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="26" font-weight="700">Vector</text>
  <text x="630" y="292" text-anchor="middle" fill="#b8d7e8" font-family="Arial" font-size="18">embeddings</text>
  <text x="860" y="260" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="26" font-weight="700">Merge</text>
  <text x="860" y="292" text-anchor="middle" fill="#b8d7e8" font-family="Arial" font-size="18">candidate set</text>
  <text x="1060" y="260" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="22" font-weight="700">Rerank</text>
  <text x="1060" y="292" text-anchor="middle" fill="#b8d7e8" font-family="Arial" font-size="16">top-k</text>
  <path d="M270 280 H292" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M500 280 H522" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M730 280 H752" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M960 280 H982" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <text x="80" y="430" fill="#d5ebf8" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Use when exact terms and semantic meaning both matter</text>
  <text x="80" y="475" fill="#b8d7e8" font-family="Arial, Helvetica, sans-serif" font-size="20">Best for docs search, RAG, knowledge bases, and mixed-language queries</text>
</svg>
