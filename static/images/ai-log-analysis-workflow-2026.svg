<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#132d46"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <style>
      .title{font:700 46px system-ui,Segoe UI,sans-serif;fill:#f8fafc}
      .sub{font:500 22px system-ui,Segoe UI,sans-serif;fill:#cbd5e1}
      .box{fill:#0f172a;stroke:#38bdf8;stroke-width:2;rx:18}
      .box2{fill:#111827;stroke:#22c55e;stroke-width:2;rx:18}
      .label{font:600 20px system-ui,Segoe UI,sans-serif;fill:#e2e8f0}
      .small{font:500 16px system-ui,Segoe UI,sans-serif;fill:#94a3b8}
      .arrow{stroke:url(#accent);stroke-width:5;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="110" r="140" fill="#0f766e" opacity="0.18"/>
  <circle cx="160" cy="560" r="180" fill="#2563eb" opacity="0.12"/>
  <text x="70" y="92" class="title">AI Log Analysis</text>
  <text x="70" y="128" class="sub">관측성 흐름: 수집 → 정규화 → 분석 → 알림</text>
  <rect x="70" y="190" width="190" height="110" class="box"/>
  <text x="100" y="232" class="label">Collect</text>
  <text x="100" y="260" class="small">app logs / traces</text>
  <rect x="320" y="190" width="190" height="110" class="box2"/>
  <text x="350" y="232" class="label">Normalize</text>
  <text x="350" y="260" class="small">schema + enrich</text>
  <rect x="570" y="190" width="220" height="110" class="box"/>
  <text x="600" y="232" class="label">Analyze</text>
  <text x="600" y="260" class="small">pattern / anomaly / cost</text>
  <rect x="850" y="190" width="230" height="110" class="box2"/>
  <text x="880" y="232" class="label">Alert & Triage</text>
  <text x="880" y="260" class="small">severity / owner / runbook</text>
  <path d="M260 245 H320" class="arrow"/>
  <path d="M510 245 H570" class="arrow"/>
  <path d="M790 245 H850" class="arrow"/>
  <rect x="145" y="360" width="900" height="150" class="box" opacity="0.92"/>
  <text x="185" y="405" class="label">핵심 키</text>
  <text x="185" y="438" class="small">trace_id, session_id, model_version, tool_status, latency_ms, error_code, cost_usd</text>
  <text x="185" y="470" class="small">이 키로 요청별 실패 패턴과 모델 버전별 회귀를 빠르게 찾는다.</text>
</svg>
