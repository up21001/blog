<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4fbf8"/>
      <stop offset="100%" stop-color="#e8f7ef"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#0f9d58"/>
    </marker>
    <style>
      .title { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #123a2d; }
      .sub { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #57746a; }
      .box { fill: #fff; stroke: #bfead5; stroke-width: 2; }
      .box2 { fill: #edf9f3; stroke: #8bd6b0; stroke-width: 2; }
      .label { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #12503a; }
      .small { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #4f6d61; }
      .line { stroke: #0f9d58; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="78" class="title">Context Choice Flow</text>
  <text x="70" y="112" class="sub">keep all, summarize, compress, re-inject</text>
  <rect x="70" y="220" width="180" height="120" rx="22" class="box"/>
  <text x="110" y="268" class="label">Keep All</text>
  <text x="98" y="298" class="small">small task only</text>
  <rect x="305" y="200" width="210" height="160" rx="24" class="box2"/>
  <text x="357" y="248" class="label">Summarize</text>
  <text x="342" y="280" class="small">keep decisions</text>
  <rect x="575" y="185" width="220" height="190" rx="24" class="box2"/>
  <text x="622" y="232" class="label">Compress</text>
  <text x="612" y="264" class="small">token budget</text>
  <text x="618" y="290" class="small">prune details</text>
  <rect x="860" y="215" width="205" height="130" rx="22" class="box"/>
  <text x="895" y="260" class="label">Re-inject</text>
  <text x="888" y="290" class="small">fresh context pack</text>
  <path d="M250 280 L305 280" class="line"/>
  <path d="M515 280 L575 280" class="line"/>
  <path d="M795 280 L860 280" class="line"/>
</svg>
