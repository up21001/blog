<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F2937">WPT Qi 무선 충전 시스템 회로 구성</text>

  <!-- TX Side -->
  <rect x="20" y="60" width="340" height="300" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="190" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">송신부 (Transmitter)</text>

  <rect x="40" y="95" width="130" height="55" rx="6" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="105" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">AC-DC 정류</text>
  <text x="105" y="136" text-anchor="middle" font-size="11" fill="#6B7280">220V → 12V DC</text>

  <rect x="200" y="95" width="130" height="55" rx="6" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="265" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">풀브리지 인버터</text>
  <text x="265" y="136" text-anchor="middle" font-size="11" fill="#6B7280">MOSFET H-Bridge</text>

  <rect x="40" y="185" width="130" height="55" rx="6" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="105" y="208" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">공진 회로</text>
  <text x="105" y="226" text-anchor="middle" font-size="11" fill="#6B7280">Ls + Cs (직렬)</text>

  <rect x="200" y="185" width="130" height="55" rx="6" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="265" y="208" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">TX 코일</text>
  <text x="265" y="226" text-anchor="middle" font-size="11" fill="#6B7280">평면 나선형 코일</text>

  <rect x="40" y="275" width="290" height="55" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="185" y="298" text-anchor="middle" font-size="12" font-weight="bold" fill="#4C1D95">Qi 2.2 제어 MCU</text>
  <text x="185" y="316" text-anchor="middle" font-size="11" fill="#374151">FOD 검출 · 전력 제어 · 통신(ASK/FSK) · 25W MPP</text>

  <!-- Gap / Coupling -->
  <rect x="370" y="160" width="60" height="130" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">자기</text>
  <text x="400" y="228" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">결합</text>
  <text x="400" y="248" text-anchor="middle" font-size="10" fill="#92400E">k≈0.5</text>
  <text x="400" y="265" text-anchor="middle" font-size="10" fill="#92400E">~5mm</text>
  <!-- magnetic field lines -->
  <path d="M 362 190 Q 340 225 362 260" stroke="#F59E0B" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <path d="M 438 190 Q 460 225 438 260" stroke="#F59E0B" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>

  <!-- RX Side -->
  <rect x="440" y="60" width="340" height="300" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="610" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#065F46">수신부 (Receiver)</text>

  <rect x="460" y="95" width="130" height="55" rx="6" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <text x="525" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">RX 코일</text>
  <text x="525" y="136" text-anchor="middle" font-size="11" fill="#6B7280">수신 코일 (Lr)</text>

  <rect x="620" y="95" width="130" height="55" rx="6" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <text x="685" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">공진 + 정류</text>
  <text x="685" y="136" text-anchor="middle" font-size="11" fill="#6B7280">Cr + 동기정류</text>

  <rect x="460" y="185" width="130" height="55" rx="6" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <text x="525" y="208" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">전압 조정기</text>
  <text x="525" y="226" text-anchor="middle" font-size="11" fill="#6B7280">Buck Converter</text>

  <rect x="620" y="185" width="130" height="55" rx="6" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <text x="685" y="208" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">배터리 충전 IC</text>
  <text x="685" y="226" text-anchor="middle" font-size="11" fill="#6B7280">CC/CV 제어</text>

  <rect x="460" y="275" width="290" height="55" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="605" y="298" text-anchor="middle" font-size="12" font-weight="bold" fill="#4C1D95">Qi 수신 제어 IC</text>
  <text x="605" y="316" text-anchor="middle" font-size="11" fill="#374151">전력 수신 제어 · 온도 보호 · 통신 응답</text>

  <!-- Arrows inside TX -->
  <line x1="170" y1="122" x2="198" y2="122" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="265" y1="150" x2="185" y2="183" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="212" x2="198" y2="212" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="265" y1="240" x2="265" y2="273" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="265" y1="183" x2="265" y2="152" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrows inside RX -->
  <line x1="590" y1="122" x2="618" y2="122" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="525" y1="150" x2="605" y2="183" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="212" x2="618" y2="212" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Efficiency note -->
  <text x="400" y="400" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">공진 주파수: 100~205kHz (Qi 기본) / 360kHz (MPP)</text>
  <text x="400" y="420" text-anchor="middle" font-size="12" fill="#6B7280">전송 효율 목표: 85% 이상 (코일 정렬 시)</text>
</svg>
