<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720"><rect width="1200" height="720" fill="#fffaf2"/><text x="70" y="88" font-family="Segoe UI, Arial" font-size="38" font-weight="700" fill="#21384c">Remote MCP 보안 체크리스트</text><text x="70" y="126" font-family="Segoe UI, Arial" font-size="20" fill="#5b7388">신뢰할 서버만 연결하고, 도구와 승인 범위를 최소화하는 것이 핵심입니다.</text><rect x="250" y="200" width="700" height="360" rx="28" fill="#0f4c81"/><text x="320" y="265" font-family="Segoe UI, Arial" font-size="26" font-weight="700" fill="#fff">점검 항목</text><text x="320" y="315" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- 공식 서버 또는 신뢰 가능한 운영 주체인가</text><text x="320" y="355" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- allowed_tools로 도구를 최소화했는가</text><text x="320" y="395" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- require_approval 정책을 정했는가</text><text x="320" y="435" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- 인증과 로그 정책이 있는가</text><text x="320" y="475" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- 프롬프트 인젝션 위험을 검토했는가</text></svg>
