<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Mistral Choice Flow 2026</title>
  <desc id="desc">Decision flow for when to use Mistral AI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#312e81" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6d28d9"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">Should You Use Mistral?</text>

  <rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
  <text x="486" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">Need model variety?</text>

  <rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#c4b5fd" filter="url(#shadow)"/>
  <text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">No</text>
  <text x="138" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#6d28d9">A narrower model/provider stack may be enough</text>

  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#c4b5fd" filter="url(#shadow)"/>
  <text x="496" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">Need agents or</text>
  <text x="516" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">document AI?</text>

  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#c4b5fd" filter="url(#shadow)"/>
  <text x="832" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">Need open-weight</text>
  <text x="845" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">and enterprise API?</text>

  <rect x="445" y="500" width="320" height="110" rx="26" fill="#312e81" filter="url(#shadow)"/>
  <text x="515" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#faf5ff">Use Mistral</text>
  <text x="476" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#ddd6fe">Great fit for broad AI application needs</text>
</svg>
