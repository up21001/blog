<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Replicate Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when to use Replicate.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8f1"/>
      <stop offset="100%" stop-color="#ffe4c7"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#7c2d12" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2410c"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Should You Use Replicate?</text>
  <rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#fb923c" stroke-width="2" filter="url(#shadow2)"/>
  <text x="486" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Need model API?</text>
  <rect x="110" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow2)"/>
  <text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">No</text>
  <text x="140" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">A sandbox or GPU infra product may fit better</text>
  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow2)"/>
  <text x="492" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need official</text>
  <text x="523" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">models?</text>
  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow2)"/>
  <text x="843" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need webhooks or</text>
  <text x="866" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">custom deploy?</text>
  <rect x="445" y="500" width="320" height="110" rx="26" fill="#7c2d12" filter="url(#shadow2)"/>
  <text x="526" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fff7ed">Use Replicate</text>
  <text x="486" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#fed7aa">Strong fit for cloud model execution</text>
  <path d="M600 210 L600 285" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M450 340 L410 340" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M750 340 L790 340" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M600 395 L600 500" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
</svg>
