<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1320"/>
      <stop offset="1" stop-color="#1b2f4a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <text x="80" y="110" fill="#f2fbff" font-family="Arial" font-size="50" font-weight="700">Hybrid Search Decision Flow</text>
  <g filter="url(#shadow)">
    <rect x="80" y="180" width="220" height="110" rx="22" fill="#14253a" stroke="#6aa6c9" stroke-width="2"/>
    <rect x="340" y="180" width="220" height="110" rx="22" fill="#14253a" stroke="#6aa6c9" stroke-width="2"/>
    <rect x="600" y="180" width="220" height="110" rx="22" fill="#14253a" stroke="#6aa6c9" stroke-width="2"/>
    <rect x="860" y="180" width="260" height="110" rx="22" fill="#17324a" stroke="#4fd1c5" stroke-width="2"/>
  </g>
  <text x="190" y="225" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Exact terms?</text>
  <text x="450" y="225" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Semantic match?</text>
  <text x="710" y="225" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Need top quality?</text>
  <text x="990" y="225" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Hybrid + rerank</text>
  <path d="M300 235 H330" stroke="#90cdf4" stroke-width="5" stroke-linecap="round"/>
  <path d="M560 235 H590" stroke="#90cdf4" stroke-width="5" stroke-linecap="round"/>
  <path d="M820 235 H850" stroke="#90cdf4" stroke-width="5" stroke-linecap="round"/>
  <text x="190" y="320" text-anchor="middle" fill="#b8d7e8" font-family="Arial" font-size="18">yes -> lexical bias</text>
  <text x="450" y="320" text-anchor="middle" fill="#b8d7e8" font-family="Arial" font-size="18">yes -> vector bias</text>
  <text x="710" y="320" text-anchor="middle" fill="#b8d7e8" font-family="Arial" font-size="18">yes -> reranking</text>
  <text x="990" y="320" text-anchor="middle" fill="#b8d7e8" font-family="Arial" font-size="18">best quality path</text>
  <text x="80" y="430" fill="#d9f2ff" font-family="Arial" font-size="28" font-weight="700">Choose keyword-only when terminology is strict.</text>
  <text x="80" y="474" fill="#d9f2ff" font-family="Arial" font-size="28" font-weight="700">Choose vector-heavy when intent is fuzzy.</text>
  <text x="80" y="518" fill="#d9f2ff" font-family="Arial" font-size="28" font-weight="700">Choose hybrid when you cannot afford misses.</text>
</svg>
