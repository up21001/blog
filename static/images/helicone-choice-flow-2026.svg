<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Helicone Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when Helicone is a good fit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#92400e" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#92400e">Should You Use Helicone?</text>
  <rect x="445" y="120" width="310" height="90" rx="22" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="470" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#92400e">Need LLM observability?</text>
  <rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fcd34d" filter="url(#shadow)"/>
  <text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">No</text>
  <text x="138" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#b45309">A basic logger may be enough</text>
  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fcd34d" filter="url(#shadow)"/>
  <text x="497" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">Need sessions and</text>
  <text x="533" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">analytics?</text>
  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fcd34d" filter="url(#shadow)"/>
  <text x="817" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">Need provider and</text>
  <text x="856" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">agents monitoring?</text>
  <rect x="445" y="500" width="320" height="110" rx="26" fill="#92400e" filter="url(#shadow)"/>
  <text x="527" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fffbeb">Use Helicone</text>
  <text x="480" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#fde68a">Great for LLM analytics and tracing</text>
</svg>
