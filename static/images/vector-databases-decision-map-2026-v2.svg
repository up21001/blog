<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Vector Databases Decision Map 2026 v2</title>
  <desc id="desc">Decision map helping choose between Chroma, Qdrant, and Weaviate.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Which Vector DB Should You Use?</text>
  <rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#94a3b8"/>
  <text x="487" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Need quick start?</text>
  <rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#cbd5e1"/>
  <text x="184" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">No</text>
  <text x="147" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Choose a production-first DB</text>
  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#cbd5e1"/>
  <text x="489" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Need filtering</text>
  <text x="517" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">and scale?</text>
  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#cbd5e1"/>
  <text x="825" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Need hybrid search</text>
  <text x="861" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">and search UX?</text>
  <rect x="445" y="500" width="320" height="110" rx="26" fill="#0f172a"/>
  <text x="508" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#f8fafc">Chroma / Qdrant / Weaviate</text>
  <text x="497" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#cbd5e1">Match the DB to your operational shape</text>
</svg>
