<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MCP server SLO choice flow</title>
  <desc id="desc">Decision flow for choosing latency, availability, or error budget priorities.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #fff; }
      .sub { font: 400 18px Arial, sans-serif; fill: #e5e7eb; }
      .diamond { fill: #fde68a; stroke: #f59e0b; stroke-width: 2; }
      .pill { fill: #dbeafe; stroke: #60a5fa; stroke-width: 2; rx: 18; }
      .text { font: 700 20px Arial, sans-serif; fill: #111827; }
      .small { font: 400 15px Arial, sans-serif; fill: #111827; }
      .arrow { stroke: #fff; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#fff"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <text x="60" y="78" class="title">MCP Server SLO Choice Flow</text>
  <text x="60" y="112" class="sub">What should we optimize first?</text>
  <rect x="80" y="180" width="220" height="110" class="pill"/>
  <text x="110" y="225" class="text">Need faster UX?</text>
  <text x="110" y="252" class="small">focus on latency budget</text>
  <polygon points="410,185 490,240 410,295 330,240" class="diamond"/>
  <text x="372" y="236" class="text">tradeoff?</text>
  <rect x="570" y="180" width="230" height="110" class="pill"/>
  <text x="600" y="225" class="text">Need stability?</text>
  <text x="600" y="252" class="small">focus on availability + error</text>
  <rect x="870" y="180" width="250" height="110" class="pill"/>
  <text x="895" y="225" class="text">Need cost control?</text>
  <text x="895" y="252" class="small">watch retry + budget burn</text>
  <path class="arrow" d="M300 235 L330 235"/>
  <path class="arrow" d="M490 235 L570 235"/>
  <path class="arrow" d="M800 235 L870 235"/>
  <rect x="120" y="380" width="960" height="130" fill="#ecfeff" stroke="#67e8f9" stroke-width="2" rx="22"/>
  <text x="150" y="430" class="text">Rule of thumb</text>
  <text x="150" y="460" class="small">If one metric improves while others collapse, your SLO is wrong. Tune the budget, not only the code.</text>
</svg>

