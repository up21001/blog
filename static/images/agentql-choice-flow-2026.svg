<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AgentQL Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when AgentQL is a good fit.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8f1"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#c2410c" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2410c"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Should You Use AgentQL?</text>

  <rect x="430" y="120" width="340" height="90" rx="22" fill="#fff" stroke="#fb923c" stroke-width="2" filter="url(#shadow2)"/>
  <text x="465" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Need browser data extraction?</text>

  <rect x="110" y="285" width="300" height="110" rx="24" fill="#ffffff" stroke="#fdba74" filter="url(#shadow2)"/>
  <text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">No</text>
  <text x="145" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">A generic scraping stack may be enough</text>

  <rect x="450" y="285" width="300" height="110" rx="24" fill="#ffffff" stroke="#fdba74" filter="url(#shadow2)"/>
  <text x="490" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need natural language</text>
  <text x="522" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">selectors?</text>

  <rect x="790" y="285" width="300" height="110" rx="24" fill="#ffffff" stroke="#fdba74" filter="url(#shadow2)"/>
  <text x="846" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need stealth and</text>
  <text x="856" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">remote browser?</text>

  <rect x="445" y="500" width="320" height="110" rx="26" fill="#9a3412" filter="url(#shadow2)"/>
  <text x="525" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fff7ed">Use AgentQL</text>
  <text x="484" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#fed7aa">Great for resilient web extraction</text>

  <path d="M600 210 L600 285" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M450 340 L410 340" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M750 340 L790 340" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M600 395 L600 500" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
</svg>
