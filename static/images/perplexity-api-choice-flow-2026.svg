<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Perplexity API Choice Flow 2026</title>
  <desc id="desc">Decision flow for when to use Perplexity Search API, Agentic Research API, Sonar, or Embeddings.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Should You Use Perplexity API?</text>
  <rect x="430" y="120" rx="22" ry="22" width="340" height="90" fill="#fff" stroke="#64748b" stroke-width="2" filter="url(#shadow2)"/>
  <text x="476" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Need web-grounded output?</text>
  <rect x="120" y="285" rx="24" ry="24" width="300" height="110" fill="#fff" stroke="#94a3b8" filter="url(#shadow2)"/>
  <text x="185" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">No</text>
  <text x="154" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Use a model-only API instead</text>
  <rect x="450" y="285" rx="24" ry="24" width="300" height="110" fill="#fff" stroke="#94a3b8" filter="url(#shadow2)"/>
  <text x="497" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Need ranked</text>
  <text x="512" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">search results?</text>
  <rect x="790" y="285" rx="24" ry="24" width="300" height="110" fill="#fff" stroke="#94a3b8" filter="url(#shadow2)"/>
  <text x="847" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Need cited</text>
  <text x="847" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">answers/research?</text>
  <rect x="445" y="500" rx="26" ry="26" width="320" height="110" fill="#0f172a" filter="url(#shadow2)"/>
  <text x="486" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#f8fafc">Use Perplexity API</text>
  <text x="477" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#cbd5e1">Best for search and research apps</text>
  <path d="M600 210 L600 285" fill="none" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M450 340 L420 340" fill="none" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M750 340 L790 340" fill="none" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M600 395 L600 500" fill="none" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow2)"/>
</svg>
