<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">NeMo Guardrails Workflow 2026</title>
  <desc id="desc">Conversational AI safety workflow with input rails, dialog flows, output rails, and policy decision points.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 18; }
      .box2 { fill: #ecfdf5; stroke: #22c55e; stroke-width: 2; rx: 18; }
      .box3 { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 18; }
      .warn { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 18; }
      .title { font-size: 34px; font-weight: 800; }
      .label { font-size: 20px; font-weight: 700; }
      .small { font-size: 16px; fill: #334155; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.5; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect x="40" y="36" width="1120" height="84" rx="24" fill="url(#accent)"/>
  <text x="70" y="88" class="title" fill="#ffffff">NeMo Guardrails Workflow 2026</text>

  <rect x="70" y="190" width="180" height="88" class="box"/>
  <text x="160" y="225" text-anchor="middle" class="label">User Message</text>
  <text x="160" y="250" text-anchor="middle" class="small">chat / prompt</text>

  <rect x="310" y="182" width="220" height="104" class="box2"/>
  <text x="420" y="220" text-anchor="middle" class="label">Input Rails</text>
  <text x="420" y="246" text-anchor="middle" class="small">filter, route, block, allow</text>

  <rect x="580" y="182" width="220" height="104" class="box3"/>
  <text x="690" y="220" text-anchor="middle" class="label">Dialog Flow</text>
  <text x="690" y="246" text-anchor="middle" class="small">policy-based conversation path</text>

  <rect x="850" y="182" width="260" height="104" class="box2"/>
  <text x="980" y="220" text-anchor="middle" class="label">Output Rails</text>
  <text x="980" y="246" text-anchor="middle" class="small">safety, style, escalation</text>

  <path d="M250 234 L310 234" class="line"/>
  <path d="M530 234 L580 234" class="line"/>
  <path d="M800 234 L850 234" class="line"/>

  <rect x="325" y="390" width="220" height="90" class="warn"/>
  <text x="435" y="425" text-anchor="middle" class="label">Policy Triggered</text>
  <text x="435" y="450" text-anchor="middle" class="small">handoff / safe reply / refuse</text>

  <rect x="620" y="390" width="240" height="90" class="box"/>
  <text x="740" y="425" text-anchor="middle" class="label">Approved Response</text>
  <text x="740" y="450" text-anchor="middle" class="small">return answer + audit log</text>

  <path d="M690 286 C690 338, 520 348, 435 390" class="dash"/>
  <path d="M980 286 C980 338, 835 348, 740 390" class="line"/>

  <rect x="110" y="560" width="980" height="72" rx="18" fill="#e2e8f0"/>
  <text x="600" y="603" text-anchor="middle" class="label">핵심: 모델이 아니라 정책이 대화의 허용 경로를 결정한다</text>
</svg>
