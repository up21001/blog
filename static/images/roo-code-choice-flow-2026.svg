<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"><title id="title">Roo Code Choice Flow 2026</title><desc id="desc">Decision flow for when Roo Code is a good fit.</desc><rect width="1200" height="675" fill="#fff7ed"/><text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Should You Use Roo Code?</text><rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#fb923c"/><text x="476" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Need local and cloud agents?</text><rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74"/><text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">No</text><text x="146" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">A single-editor agent may be enough</text><rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74"/><text x="499" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need roles and</text><text x="525" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">modes?</text><rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74"/><text x="835" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need MCP and</text><text x="851" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">model choice?</text><rect x="445" y="500" width="320" height="110" rx="26" fill="#7c2d12"/><text x="510" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fff7ed">Use Roo Code</text><text x="475" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#fed7aa">Strong fit for autonomous coding teams</text></svg>
