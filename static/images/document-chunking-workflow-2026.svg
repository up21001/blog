  <text x="70" y="400" fill="#dbeafe" font-family="Arial" font-size="26" font-weight="700">Chunking is about preserving meaning, not just shortening text.</text>
  <text x="70" y="442" fill="#cbd5e1" font-family="Arial" font-size="18">Good splits keep titles, sections, and code blocks aligned with retrieval boundaries.</text>
