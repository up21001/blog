<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .bg { fill:#111827; }
      .title { fill:#fff; font:700 38px Arial, sans-serif; }
      .sub { fill:#fecaca; font:400 18px Arial, sans-serif; }
      .box { fill:#f8fafc; stroke:#94a3b8; stroke-width:2; rx:18; }
      .yes { fill:#dcfce7; stroke:#22c55e; stroke-width:2; rx:18; }
      .warn { fill:#fee2e2; stroke:#ef4444; stroke-width:2; rx:18; }
      .label { fill:#0f172a; font:700 20px Arial, sans-serif; }
      .small { fill:#475569; font:400 15px Arial, sans-serif; }
      .line { stroke:#cbd5e1; stroke-width:4; fill:none; marker-end:url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#cbd5e1"/>
    </marker>
  </defs>
  <rect width="1200" height="630" class="bg"/>
  <text x="84" y="110" class="title">Browser Credential Safety Choice Flow</text>
  <text x="84" y="146" class="sub">Decide whether a secret can be accessed automatically or must be approved</text>
  <rect x="78" y="220" width="220" height="112" class="box"/>
  <text x="106" y="260" class="label">Can secret stay masked?</text>
  <text x="106" y="292" class="small">safe for automation</text>
  <rect x="338" y="220" width="220" height="112" class="yes"/>
  <text x="366" y="260" class="label">Proceed</text>
  <text x="366" y="292" class="small">vault reference only</text>
  <rect x="598" y="220" width="220" height="112" class="box"/>
  <text x="626" y="260" class="label">Needs raw value?</text>
  <text x="626" y="292" class="small">password / OTP / token</text>
  <rect x="858" y="220" width="220" height="112" class="warn"/>
  <text x="886" y="260" class="label">Require approval</text>
  <text x="886" y="292" class="small">human-in-the-loop</text>
  <path d="M298 276 L338 276" class="line"/>
  <path d="M558 276 L598 276" class="line"/>
  <path d="M818 276 L858 276" class="line"/>
  <rect x="162" y="402" width="876" height="96" class="box"/>
  <text x="198" y="440" class="label">Rule of thumb: never let the agent print, store, or transmit secrets unless policy says so</text>
  <text x="198" y="472" class="small">prefer short-lived credentials and explicit approval for sensitive access</text>
</svg>
