<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#f8fafc"/><text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Should You Use Tiptap?</text><rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#94a3b8"/><text x="471" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Need custom editing?</text><rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#cbd5e1"/><text x="179" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">No</text><text x="135" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">A simpler editor may be enough</text><rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#cbd5e1"/><text x="501" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Need schema and</text><text x="526" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">extensions?</text><rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#cbd5e1"/><text x="822" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Need collaboration</text><text x="850" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">or AI?</text><rect x="445" y="500" width="320" height="110" rx="26" fill="#0f172a"/><text x="531" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#f8fafc">Use Tiptap</text><text x="490" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#cbd5e1">Strong fit for modern product editors</text></svg>
