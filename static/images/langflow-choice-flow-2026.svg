<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Langflow Choice Flow 2026</title>
  <desc id="desc">Decision flow for when to use Langflow.</desc>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#92400e" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg4)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Should You Use Langflow?</text>

  <rect x="435" y="120" width="330" height="90" rx="22" fill="#fff" stroke="#fdba74" stroke-width="2" filter="url(#shadow4)"/>
  <text x="480" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Need visual flow builder?</text>

  <rect x="110" y="280" width="300" height="110" rx="24" fill="#ffffff" stroke="#fed7aa" filter="url(#shadow4)"/>
  <text x="179" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">No</text>
  <text x="142" y="360" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">A code-first SDK may fit better</text>

  <rect x="450" y="280" width="300" height="110" rx="24" fill="#ffffff" stroke="#fed7aa" filter="url(#shadow4)"/>
  <text x="490" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need playground and</text>
  <text x="524" y="360" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">components?</text>

  <rect x="790" y="280" width="300" height="110" rx="24" fill="#ffffff" stroke="#fed7aa" filter="url(#shadow4)"/>
  <text x="835" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need deployable</text>
  <text x="859" y="360" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">flows too?</text>

  <rect x="445" y="500" width="320" height="110" rx="26" fill="#7c2d12" filter="url(#shadow4)"/>
  <text x="524" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fff7ed">Use Langflow</text>
  <text x="486" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#fed7aa">Strong fit for visual AI app assembly</text>

  <path d="M600 210 L600 280" stroke="#b45309" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
  <path d="M420 335 L450 335" stroke="#b45309" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
  <path d="M750 335 L790 335" stroke="#b45309" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
  <path d="M600 390 L600 500" stroke="#b45309" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
</svg>
