<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Agent Workload Balancing Architecture</title>
  <desc id="desc">Architecture with load balancer, queue depth metrics, agent pool, and observability.</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #e5e7eb; }
      .title { font-size: 38px; font-weight: 700; }
      .small { font-size: 18px; fill: #cbd5e1; }
      .box { rx: 18; ry: 18; stroke: #22c55e; stroke-width: 2.5; fill: rgba(15, 23, 42, 0.78); }
      .line { stroke: #86efac; stroke-width: 4; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#86efac"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="#07111f"/>
  <text x="60" y="82" class="title">Agent Workload Balancing Architecture</text>
  <text x="60" y="120" class="small">Load balancer, agent pool, metrics, and handoff policy</text>
  <rect x="55" y="205" width="170" height="120" class="box"/>
  <text x="140" y="246" text-anchor="middle" font-size="22" font-weight="700">Task Intake</text>
  <text x="140" y="274" text-anchor="middle" class="small">Requests</text>
  <rect x="280" y="185" width="180" height="150" class="box"/>
  <text x="370" y="228" text-anchor="middle" font-size="22" font-weight="700">Load Balancer</text>
  <text x="370" y="256" text-anchor="middle" class="small">Policy / weights</text>
  <text x="370" y="284" text-anchor="middle" class="small">Queue depth</text>
  <rect x="520" y="170" width="160" height="170" class="box"/>
  <text x="600" y="214" text-anchor="middle" font-size="22" font-weight="700">Agent A</text>
  <text x="600" y="242" text-anchor="middle" class="small">Generalist</text>
  <text x="600" y="270" text-anchor="middle" class="small">Fast lane</text>
  <text x="600" y="298" text-anchor="middle" class="small">Low cost</text>
  <rect x="710" y="170" width="160" height="170" class="box"/>
  <text x="790" y="214" text-anchor="middle" font-size="22" font-weight="700">Agent B</text>
  <text x="790" y="242" text-anchor="middle" class="small">Specialist</text>
  <text x="790" y="270" text-anchor="middle" class="small">Premium</text>
  <text x="790" y="298" text-anchor="middle" class="small">Quality</text>
  <rect x="900" y="170" width="180" height="170" class="box"/>
  <text x="990" y="214" text-anchor="middle" font-size="22" font-weight="700">Observability</text>
  <text x="990" y="242" text-anchor="middle" class="small">Metrics</text>
  <text x="990" y="270" text-anchor="middle" class="small">Trace</text>
  <text x="990" y="298" text-anchor="middle" class="small">Alerts</text>
  <line x1="225" y1="265" x2="280" y2="265" class="line"/>
  <line x1="460" y1="265" x2="520" y2="265" class="line"/>
  <line x1="680" y1="265" x2="710" y2="265" class="line"/>
  <line x1="870" y1="265" x2="900" y2="265" class="line"/>
</svg>
