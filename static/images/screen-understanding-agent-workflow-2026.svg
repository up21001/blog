<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1010" cy="110" r="140" fill="#f59e0b" opacity="0.12"/>
  <circle cx="160" cy="530" r="160" fill="#38bdf8" opacity="0.10"/>
  <text x="80" y="92" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="48" font-weight="700">Screen Understanding Workflow</text>
  <text x="80" y="132" fill="#94a3b8" font-family="Arial, sans-serif" font-size="22">Capture, interpret, act, and verify</text>
  <rect x="70" y="200" width="190" height="112" rx="22" fill="url(#card)" stroke="#334155"/>
  <rect x="290" y="200" width="190" height="112" rx="22" fill="url(#card)" stroke="#334155"/>
  <rect x="510" y="200" width="190" height="112" rx="22" fill="url(#card)" stroke="#334155"/>
  <rect x="730" y="200" width="190" height="112" rx="22" fill="url(#card)" stroke="#334155"/>
  <rect x="950" y="200" width="180" height="112" rx="22" fill="url(#card)" stroke="#334155"/>
  <text x="165" y="238" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">Capture</text>
  <text x="165" y="266" fill="#94a3b8" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">screen / DOM</text>
  <text x="385" y="238" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">Interpret</text>
  <text x="385" y="266" fill="#94a3b8" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">vision / OCR</text>
  <text x="605" y="238" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">Plan</text>
  <text x="605" y="266" fill="#94a3b8" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">choose action</text>
  <text x="825" y="238" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">Act</text>
  <text x="825" y="266" fill="#94a3b8" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">click / type</text>
  <text x="1038" y="238" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">Verify</text>
  <line x1="260" y1="256" x2="290" y2="256" stroke="#60a5fa" stroke-width="6"/>
  <line x1="480" y1="256" x2="510" y2="256" stroke="#60a5fa" stroke-width="6"/>
  <line x1="700" y1="256" x2="730" y2="256" stroke="#60a5fa" stroke-width="6"/>
  <line x1="920" y1="256" x2="950" y2="256" stroke="#60a5fa" stroke-width="6"/>
  <rect x="170" y="390" width="860" height="122" rx="24" fill="#050816" stroke="#334155"/>
  <text x="600" y="438" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700">Read the screen, decide the next action, and confirm the result before moving on</text>
  <text x="600" y="475" fill="#94a3b8" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">This loop is the safe alternative to blind clicking</text>
</svg>
