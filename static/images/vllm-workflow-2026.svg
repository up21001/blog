<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="vLLM workflow diagram">
  <rect width="1200" height="630" fill="#08101d"/>
  <circle cx="1030" cy="120" r="130" fill="#f97316" opacity="0.12"/>
  <circle cx="150" cy="500" r="150" fill="#60a5fa" opacity="0.10"/>
  <rect x="70" y="70" width="1060" height="490" rx="34" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="110" y="140" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="46" font-weight="700">vLLM Workflow</text>
  <text x="110" y="180" fill="#94a3b8" font-family="Arial, sans-serif" font-size="24">High-throughput serving, batching, cache, API integration</text>

  <rect x="120" y="250" width="180" height="120" rx="22" fill="#111827" stroke="#60a5fa" stroke-width="2"/>
  <text x="210" y="305" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700">Load</text>
  <text x="210" y="338" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">model weights</text>

  <rect x="360" y="250" width="180" height="120" rx="22" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="305" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700">Batch</text>
  <text x="450" y="338" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">group requests</text>

  <rect x="600" y="250" width="180" height="120" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
  <text x="690" y="305" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700">Cache</text>
  <text x="690" y="338" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">KV reuse</text>

  <rect x="840" y="250" width="180" height="120" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
  <text x="930" y="305" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700">Serve</text>
  <text x="930" y="338" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">OpenAI-style API</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <path d="M300 310 H360" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M540 310 H600" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M780 310 H840" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="110" y="470" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="22">Use for products that need sustained throughput and predictable latency.</text>
</svg>
