<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#f5f3ff"/><text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">Should You Use Inngest?</text><rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#818cf8"/><text x="478" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">Need durable workflows?</text><rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#a5b4fc"/><text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">No</text><text x="147" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">Simple jobs may be enough</text><rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#a5b4fc"/><text x="484" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Need event-driven</text><text x="534" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">steps?</text><rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#a5b4fc"/><text x="843" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Need retries and</text><text x="856" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">scheduling?</text><rect x="445" y="500" width="320" height="110" rx="26" fill="#312e81"/><text x="530" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#eef2ff">Use Inngest</text><text x="482" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c7d2fe">Strong fit for event-driven durable jobs</text></svg>
