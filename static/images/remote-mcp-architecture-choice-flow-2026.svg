<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08101b"/>
      <stop offset="100%" stop-color="#173e63"/>
    </linearGradient>
    <marker id="arrow6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7ee0ff"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg6)"/>
  <text x="70" y="88" fill="#e8f7ff" font-size="38" font-weight="700" font-family="Inter, Arial, sans-serif">Remote MCP architecture choice map</text>
  <text x="70" y="122" fill="#9cbad1" font-size="20" font-family="Inter, Arial, sans-serif">keep the system small first, then split by responsibility</text>
  <rect x="70" y="190" width="240" height="120" rx="24" fill="#0f2234" stroke="#3d6b92"/>
  <text x="190" y="236" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">One server?</text>
  <text x="190" y="270" text-anchor="middle" fill="#a8c7de" font-size="18" font-family="Inter, Arial, sans-serif">small prototype only</text>
  <rect x="370" y="150" width="230" height="120" rx="24" fill="#143049" stroke="#3d6b92"/>
  <text x="485" y="196" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">Yes</text>
  <text x="485" y="230" text-anchor="middle" fill="#a8c7de" font-size="18" font-family="Inter, Arial, sans-serif">fast start</text>
  <rect x="370" y="320" width="230" height="120" rx="24" fill="#143049" stroke="#3d6b92"/>
  <text x="485" y="366" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">No</text>
  <text x="485" y="400" text-anchor="middle" fill="#a8c7de" font-size="18" font-family="Inter, Arial, sans-serif">split by role</text>
  <rect x="670" y="190" width="240" height="120" rx="24" fill="#10243a" stroke="#3d6b92"/>
  <text x="790" y="236" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">Need approval?</text>
  <text x="790" y="270" text-anchor="middle" fill="#a8c7de" font-size="18" font-family="Inter, Arial, sans-serif">writes, deletion, send</text>
  <rect x="980" y="150" width="140" height="120" rx="24" fill="#18314c" stroke="#3d6b92"/>
  <text x="1050" y="196" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700" font-family="Inter, Arial, sans-serif">Gateway</text>
  <text x="1050" y="230" text-anchor="middle" fill="#a8c7de" font-size="16" font-family="Inter, Arial, sans-serif">policy</text>
  <rect x="980" y="320" width="140" height="120" rx="24" fill="#18314c" stroke="#3d6b92"/>
  <text x="1050" y="366" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700" font-family="Inter, Arial, sans-serif">State</text>
  <text x="1050" y="400" text-anchor="middle" fill="#a8c7de" font-size="16" font-family="Inter, Arial, sans-serif">memory</text>
  <line x1="310" y1="240" x2="370" y2="210" stroke="#7ee0ff" stroke-width="5" marker-end="url(#arrow6)"/>
  <line x1="310" y1="240" x2="370" y2="380" stroke="#7ee0ff" stroke-width="5" marker-end="url(#arrow6)"/>
  <line x1="600" y1="210" x2="670" y2="240" stroke="#7ee0ff" stroke-width="5" marker-end="url(#arrow6)"/>
  <line x1="600" y1="380" x2="980" y2="380" stroke="#7ee0ff" stroke-width="5" marker-end="url(#arrow6)"/>
  <line x1="910" y1="240" x2="980" y2="210" stroke="#7ee0ff" stroke-width="5" marker-end="url(#arrow6)"/>
  <line x1="910" y1="260" x2="980" y2="380" stroke="#7ee0ff" stroke-width="5" marker-end="url(#arrow6)"/>
  <rect x="70" y="500" width="1060" height="80" rx="20" fill="#0f2234" stroke="#3d6b92"/>
  <text x="600" y="548" text-anchor="middle" fill="#e8f7ff" font-size="20" font-family="Inter, Arial, sans-serif">Prototype small, then split execution, policy, state, and observability as soon as usage grows</text>
</svg>
