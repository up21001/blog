<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI Sandbox and Inference Platforms Decision Map 2026</title>
  <desc id="desc">Decision map for choosing between E2B, Daytona, Modal, Together AI, and Replicate.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="70" y="84" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Which platform should you choose?</text>
  <rect x="430" y="110" width="340" height="90" rx="22" fill="#fff" stroke="#cbd5e1"/>
  <text x="475" y="164" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Need safe code execution?</text>
  <rect x="100" y="275" width="280" height="110" rx="24" fill="#fff" stroke="#fed7aa"/>
  <text x="166" y="324" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">No</text>
  <text x="140" y="354" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">You may need model inference instead</text>
  <rect x="430" y="275" width="280" height="110" rx="24" fill="#fff" stroke="#fed7aa"/>
  <text x="468" y="324" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Need sandbox</text>
  <text x="486" y="354" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">or VM?</text>
  <rect x="760" y="275" width="280" height="110" rx="24" fill="#fff" stroke="#fed7aa"/>
  <text x="818" y="324" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Need GPU or</text>
  <text x="826" y="354" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">model hosting?</text>
  <rect x="430" y="460" width="340" height="110" rx="26" fill="#7c2d12"/>
  <text x="468" y="512" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fff7ed">Pick a different layer</text>
  <text x="465" y="542" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#fed7aa">Sandbox vs inference vs model API are distinct</text>
</svg>
