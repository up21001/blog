<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Cloudflare Workers 아키텍처</text>
  <text x="400" y="60" text-anchor="middle" font-size="13" fill="#64748B">엣지 네트워크에서 서버리스 API 처리 흐름</text>

  <!-- User -->
  <rect x="30" y="180" width="110" height="60" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="85" y="207" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">사용자</text>
  <text x="85" y="226" text-anchor="middle" font-size="11" fill="#3B82F6">HTTP 요청</text>

  <!-- Arrow 1 -->
  <line x1="142" y1="210" x2="185" y2="210" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Cloudflare Edge -->
  <rect x="187" y="130" width="160" height="160" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="267" y="158" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">Cloudflare Edge</text>
  <text x="267" y="177" text-anchor="middle" font-size="11" fill="#B45309">300+ PoP 위치</text>
  <rect x="207" y="188" width="120" height="32" rx="6" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="267" y="209" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">Workers Runtime</text>
  <rect x="207" y="228" width="120" height="32" rx="6" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="267" y="249" text-anchor="middle" font-size="11" fill="#92400E">V8 Isolate</text>

  <!-- Arrow 2 -->
  <line x1="349" y1="210" x2="390" y2="210" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Workers Logic -->
  <rect x="392" y="130" width="160" height="160" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="472" y="158" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">Workers 로직</text>
  <rect x="410" y="168" width="124" height="28" rx="6" fill="#A7F3D0" stroke="#10B981" stroke-width="1.5"/>
  <text x="472" y="187" text-anchor="middle" font-size="11" fill="#065F46">Hono 라우터</text>
  <rect x="410" y="202" width="124" height="28" rx="6" fill="#A7F3D0" stroke="#10B981" stroke-width="1.5"/>
  <text x="472" y="221" text-anchor="middle" font-size="11" fill="#065F46">미들웨어 체인</text>
  <rect x="410" y="236" width="124" height="28" rx="6" fill="#A7F3D0" stroke="#10B981" stroke-width="1.5"/>
  <text x="472" y="255" text-anchor="middle" font-size="11" fill="#065F46">핸들러 함수</text>

  <!-- Arrow 3 -->
  <line x1="554" y1="210" x2="595" y2="210" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Storage -->
  <rect x="597" y="90" width="155" height="60" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="674" y="116" text-anchor="middle" font-size="12" font-weight="bold" fill="#4C1D95">KV Store</text>
  <text x="674" y="134" text-anchor="middle" font-size="11" fill="#7C3AED">키-값 스토리지</text>

  <rect x="597" y="165" width="155" height="60" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="674" y="191" text-anchor="middle" font-size="12" font-weight="bold" fill="#4C1D95">D1 Database</text>
  <text x="674" y="209" text-anchor="middle" font-size="11" fill="#7C3AED">SQLite 기반 DB</text>

  <rect x="597" y="240" width="155" height="60" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="674" y="266" text-anchor="middle" font-size="12" font-weight="bold" fill="#4C1D95">R2 Storage</text>
  <text x="674" y="284" text-anchor="middle" font-size="11" fill="#7C3AED">오브젝트 스토리지</text>

  <!-- Bottom info boxes -->
  <rect x="30" y="360" width="170" height="60" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="115" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Cold Start 없음</text>
  <text x="115" y="404" text-anchor="middle" font-size="11" fill="#6B7280">V8 Isolate 즉시 실행</text>

  <rect x="220" y="360" width="170" height="60" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="305" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">무료 10만 요청/일</text>
  <text x="305" y="404" text-anchor="middle" font-size="11" fill="#6B7280">Workers 무료 플랜</text>

  <rect x="410" y="360" width="170" height="60" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="495" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">전 세계 &lt;50ms</text>
  <text x="495" y="404" text-anchor="middle" font-size="11" fill="#6B7280">엣지 근접 실행</text>

  <rect x="600" y="360" width="170" height="60" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="685" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">TypeScript 지원</text>
  <text x="685" y="404" text-anchor="middle" font-size="11" fill="#6B7280">Wrangler CLI 배포</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/>
    </marker>
  </defs>
</svg>
