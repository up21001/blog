<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <style>
      .title { fill:#fff; font:700 40px Arial, sans-serif; }
      .sub { fill:#fed7aa; font:400 18px Arial, sans-serif; }
      .box { fill:#f8fafc; stroke:#fed7aa; stroke-width:2; rx:18; }
      .accent { fill:#ffedd5; stroke:#fb923c; stroke-width:2; rx:18; }
      .label { fill:#0f172a; font:700 20px Arial, sans-serif; }
      .small { fill:#475569; font:400 14px Arial, sans-serif; }
      .line { stroke:#fed7aa; stroke-width:4; fill:none; marker-end:url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fed7aa"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="84" y="112" class="title">Browser Credential Safety Workflow</text>
  <text x="84" y="148" class="sub">Protect passwords, cookies, OAuth tokens, and session secrets across browser actions</text>
  <rect x="86" y="228" width="186" height="104" class="accent"/>
  <text x="114" y="268" class="label">Need Secret?</text>
  <text x="114" y="296" class="small">password / token / cookie</text>
  <rect x="328" y="228" width="186" height="104" class="box"/>
  <text x="356" y="268" class="label">Fetch from Vault</text>
  <text x="356" y="296" class="small">never in prompt text</text>
  <rect x="570" y="228" width="186" height="104" class="box"/>
  <text x="598" y="268" class="label">Mask Output</text>
  <text x="598" y="296" class="small">logs and screenshots</text>
  <rect x="812" y="228" width="186" height="104" class="accent"/>
  <text x="838" y="268" class="label">Use Secret</text>
  <text x="838" y="296" class="small">short-lived only</text>
  <path d="M272 280 L328 280" class="line"/>
  <path d="M514 280 L570 280" class="line"/>
  <path d="M756 280 L812 280" class="line"/>
  <rect x="204" y="404" width="792" height="92" class="box"/>
  <text x="240" y="442" class="label">Outcome: secrets are referenced, not exposed, and automatically masked where possible</text>
  <text x="240" y="472" class="small">vault + approval gate + log filtering keep credentials out of the control loop</text>
</svg>
