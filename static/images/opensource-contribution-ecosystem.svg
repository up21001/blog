<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F2937">오픈소스 생태계 — 기여 vs 소비의 순환</text>

  <defs>
    <marker id="a5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
    <marker id="a6" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10B981"/>
    </marker>
  </defs>

  <!-- 중앙 오픈소스 -->
  <circle cx="400" cy="220" r="70" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="3"/>
  <text x="400" y="212" text-anchor="middle" font-size="14" font-weight="bold" fill="#5B21B6">오픈소스</text>
  <text x="400" y="230" text-anchor="middle" font-size="12" fill="#7C3AED">프로젝트</text>
  <text x="400" y="248" text-anchor="middle" font-size="10" fill="#374151">GitHub, npm, PyPI</text>

  <!-- 소비자 그룹 -->
  <rect x="30" y="160" width="150" height="120" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="105" y="188" text-anchor="middle" font-size="13" font-weight="bold" fill="#991B1B">무료 소비자</text>
  <text x="105" y="210" text-anchor="middle" font-size="10" fill="#374151">기업 · 개인</text>
  <text x="105" y="228" text-anchor="middle" font-size="10" fill="#374151">라이브러리 사용</text>
  <text x="105" y="246" text-anchor="middle" font-size="10" fill="#374151">이슈 보고 안 함</text>
  <text x="105" y="264" text-anchor="middle" font-size="10" fill="#374151">기여 없음</text>

  <!-- 기여자 그룹 -->
  <rect x="620" y="160" width="150" height="120" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="695" y="188" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">기여자</text>
  <text x="695" y="210" text-anchor="middle" font-size="10" fill="#374151">버그 리포트</text>
  <text x="695" y="228" text-anchor="middle" font-size="10" fill="#374151">PR · 코드 기여</text>
  <text x="695" y="246" text-anchor="middle" font-size="10" fill="#374151">문서 번역</text>
  <text x="695" y="264" text-anchor="middle" font-size="10" fill="#374151">후원 (Sponsor)</text>

  <!-- 화살표: 소비자 → 오픈소스 (가져감) -->
  <line x1="180" y1="210" x2="328" y2="215" stroke="#EF4444" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#a5)"/>
  <text x="254" y="203" text-anchor="middle" font-size="10" fill="#EF4444">무료 사용</text>

  <!-- 화살표: 오픈소스 → 기여자 (혜택) -->
  <line x1="472" y1="215" x2="618" y2="215" stroke="#10B981" stroke-width="2" marker-end="url(#a6)"/>
  <text x="545" y="203" text-anchor="middle" font-size="10" fill="#065F46">기여 혜택</text>

  <!-- 위기 박스 -->
  <rect x="160" y="65" width="200" height="70" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="260" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#991B1B">⚠️ 지속 가능성 위기</text>
  <text x="260" y="108" text-anchor="middle" font-size="10" fill="#374151">메인테이너 번아웃</text>
  <text x="260" y="123" text-anchor="middle" font-size="10" fill="#374151">Log4j 사태 (2021)</text>

  <line x1="260" y1="135" x2="370" y2="155" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 해결책 박스 -->
  <rect x="440" y="65" width="200" height="70" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="540" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">✅ 지속 가능한 방법</text>
  <text x="540" y="108" text-anchor="middle" font-size="10" fill="#374151">GitHub Sponsors</text>
  <text x="540" y="123" text-anchor="middle" font-size="10" fill="#374151">OpenCollective · 기여</text>

  <line x1="540" y1="135" x2="430" y2="155" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 하단 행동 지침 -->
  <rect x="30" y="310" width="740" height="120" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="400" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F2937">오늘부터 시작하는 기여 5단계</text>

  <text x="60" y="360" font-size="11" fill="#374151">① 사용 중인 프로젝트에 ⭐ Star 누르기</text>
  <text x="60" y="378" font-size="11" fill="#374151">② 버그 발견 시 Issue 등록하기 (재현 코드 포함)</text>
  <text x="400" y="360" font-size="11" fill="#374151">③ 문서 오타 · 번역 PR 올리기</text>
  <text x="400" y="378" font-size="11" fill="#374151">④ 월 $1~5 GitHub Sponsors 후원</text>
  <text x="230" y="408" font-size="11" fill="#374151">⑤ 사용법 블로그 포스팅으로 생태계 기여</text>
</svg>
