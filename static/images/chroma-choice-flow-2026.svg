<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Chroma Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when to use Chroma.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fcff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0369a1" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0c4a6e">Should You Use Chroma?</text>
  <rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#38bdf8" stroke-width="2" filter="url(#shadow2)"/>
  <text x="479" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0c4a6e">Need fast RAG start?</text>
  <rect x="110" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#7dd3fc" filter="url(#shadow2)"/>
  <text x="184" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0369a1">No</text>
  <text x="144" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0369a1">A heavier production DB may fit better</text>
  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#7dd3fc" filter="url(#shadow2)"/>
  <text x="501" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0369a1">Need local</text>
  <text x="523" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0369a1">prototyping?</text>
  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#7dd3fc" filter="url(#shadow2)"/>
  <text x="836" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0369a1">Need cloud sync</text>
  <text x="850" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0369a1">and low ops?</text>
  <rect x="445" y="500" width="320" height="110" rx="26" fill="#0c4a6e" filter="url(#shadow2)"/>
  <text x="526" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#eff6ff">Use Chroma</text>
  <text x="482" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#bae6fd">Great for AI app databases</text>
  <path d="M600 210 L600 285" stroke="#0284c7" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M450 340 L410 340" stroke="#0284c7" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M750 340 L790 340" stroke="#0284c7" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M600 395 L600 500" stroke="#0284c7" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
</svg>
