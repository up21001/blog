  <text x="160" y="207" font-size="11" fill="#6C7086">blame · 히스토리 · 코드 변경 추적</text>

  <rect x="20" y="226" width="360" height="34" fill="#181825" stroke="#A6E3A1" stroke-width="1.5" rx="5"/>
