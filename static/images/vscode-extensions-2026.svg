<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <rect width="800" height="450" fill="#1E1E2E" rx="12"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#CDD6F4">2026년 개발자 필수 VS Code 익스텐션 TOP 10</text>

