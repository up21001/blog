  <rect x="420" y="232" width="360" height="176" fill="#181825" stroke="#313244" stroke-width="1.5" rx="6"/>
  <text x="600" y="255" text-anchor="middle" font-size="12" font-weight="bold" fill="#CDD6F4">설치 우선순위 가이드</text>
  <text x="435" y="278" font-size="11" fill="#A6ADC8">1순위 (즉시 설치): GitLens, Error Lens</text>
  <text x="435" y="298" font-size="11" fill="#A6ADC8">2순위 (언어별): ESLint + Prettier</text>
