  <text x="435" y="338" font-size="11" fill="#A6ADC8">4순위 (백엔드): Docker + REST Client</text>
  <text x="435" y="358" font-size="11" fill="#6C7086">※ 총 10-15개 이하 유지 권장</text>
  <text x="435" y="378" font-size="11" fill="#6C7086">※ 검증된 퍼블리셔 확인 필수</text>
  <text x="435" y="398" font-size="11" fill="#6C7086">※ 과도한 익스텐션 → 에디터 속도 저하</text>

  <text x="400" y="430" text-anchor="middle" font-size="10" fill="#585B70">※ 2026년 3월 기준 | VS Code 1.96+ 기준</text>
