<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI Audit Log Architecture</title>
  <desc id="desc">Layered architecture for request capture, redaction, storage, and replay.</desc>
  <rect width="1200" height="630" fill="#102338"/>
  <text x="70" y="88" fill="#f1f6ff" font-size="34" font-weight="700">Audit Log Architecture</text>
  <text x="70" y="124" fill="#a8bed4" font-size="18">Capture, redact, store, search, and replay</text>
  <g fill="#12304c" stroke="#6d87a6" stroke-width="2">
    <rect x="90" y="175" rx="16" width="1020" height="78"/>
    <rect x="90" y="272" rx="16" width="1020" height="78"/>
    <rect x="90" y="369" rx="16" width="1020" height="78"/>
    <rect x="90" y="466" rx="16" width="1020" height="78"/>
  </g>
  <g fill="#f1f6ff" font-size="21" font-weight="700">
    <text x="130" y="220">Capture</text>
    <text x="320" y="220">Request, session, policy, tool call</text>
    <text x="130" y="317">Redact</text>
    <text x="320" y="317">Mask secrets, PII, internal tokens</text>
    <text x="130" y="414">Store</text>
    <text x="320" y="414">Structured logs, traces, evidence store</text>
    <text x="130" y="511">Replay</text>
    <text x="320" y="511">Search, audit, debug, and compliance review</text>
  </g>
</svg>
