<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Unstructured Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when Unstructured is the right choice for document ETL.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Should You Use Unstructured?</text>
  <rect x="430" y="120" width="340" height="90" rx="22" fill="#fff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow2)"/>
  <text x="488" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Need document ETL?</text>
  <rect x="100" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#cbd5e1" filter="url(#shadow2)"/>
  <text x="182" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">No</text>
  <text x="140" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">A simpler parser may be enough</text>
  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#cbd5e1" filter="url(#shadow2)"/>
  <text x="488" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Need partition</text>
  <text x="523" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">and chunk?</text>
  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#cbd5e1" filter="url(#shadow2)"/>
  <text x="838" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Need connectors</text>
  <text x="851" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">and pipelines?</text>
  <rect x="440" y="500" width="320" height="110" rx="26" fill="#0f172a" filter="url(#shadow2)"/>
  <text x="503" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#f8fafc">Use Unstructured</text>
  <text x="474" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#cbd5e1">Strong fit for AI data prep workflows</text>
  <path d="M600 210 L600 285" stroke="#334155" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M430 340 L400 340" stroke="#334155" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M750 340 L790 340" stroke="#334155" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M600 395 L600 500" stroke="#334155" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
</svg>
