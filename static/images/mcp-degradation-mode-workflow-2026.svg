<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#07131f"/>
  <text x="60" y="68" fill="#f8fafc" font-family="Arial" font-size="34" font-weight="700">MCP Degradation Mode Workflow</text>
  <text x="60" y="104" fill="#cbd5e1" font-family="Arial" font-size="18">normal mode -> restricted mode -> safe recovery</text>
  <g font-family="Arial" font-size="18" font-weight="600" fill="#fff">
    <rect x="70" y="180" width="200" height="90" rx="18" fill="#1d4ed8"/><text x="170" y="233" text-anchor="middle">Normal</text>
    <rect x="330" y="180" width="200" height="90" rx="18" fill="#7c3aed"/><text x="430" y="233" text-anchor="middle">Detect Issue</text>
    <rect x="590" y="180" width="200" height="90" rx="18" fill="#0f766e"/><text x="690" y="233" text-anchor="middle">Restrict</text>
    <rect x="850" y="180" width="200" height="90" rx="18" fill="#b45309"/><text x="950" y="233" text-anchor="middle">Recover</text>
  </g>
  <path d="M270 225 L330 225" stroke="#f8fafc" stroke-width="3"/>
  <path d="M530 225 L590 225" stroke="#f8fafc" stroke-width="3"/>
  <path d="M790 225 L850 225" stroke="#f8fafc" stroke-width="3"/>
  <rect x="145" y="350" width="280" height="120" rx="20" fill="#111827" stroke="#60a5fa" stroke-width="2"/>
  <text x="285" y="398" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="18" font-weight="600">Core Features Only</text>
  <text x="285" y="426" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="15">disable risky tools</text>
  <rect x="470" y="350" width="280" height="120" rx="20" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
  <text x="610" y="398" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="18" font-weight="600">Read-only / Summary</text>
  <text x="610" y="426" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="15">keep service usable</text>
  <rect x="795" y="350" width="280" height="120" rx="20" fill="#111827" stroke="#fca5a5" stroke-width="2"/>
  <text x="935" y="398" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="18" font-weight="600">Restore Gradually</text>
  <text x="935" y="426" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="15">verify before full mode</text>
</svg>
