<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Responses API Tooling Flow 2026</title>
  <desc id="desc">Decision flow for choosing file search, web search, functions, or remote MCP</desc>
  <defs>
    <linearGradient id="oabg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf2"/>
      <stop offset="100%" stop-color="#eef7ff"/>
    </linearGradient>
    <filter id="oashadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#4f6578" flood-opacity="0.16"/>
    </filter>
    <marker id="oaarrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4b6175"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#oabg2)"/>
  <text x="80" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#20384c">Responses API 도구 선택 흐름</text>
  <text x="80" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#557088">질문의 성격에 따라 도구를 분리하면 응답 품질이 안정됩니다.</text>

  <rect x="420" y="90" width="360" height="92" rx="26" fill="#1f8a70" filter="url(#oashadow2)"/>
  <text x="510" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#fff">사용자 질문</text>

  <polygon points="470,240 730,240 810,310 730,380 470,380 390,310" fill="#0f4c81" filter="url(#oashadow2)"/>
  <text x="457" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">최신 웹 정보가 필요한가요?</text>
  <text x="525" y="336" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#dbeeff">뉴스, 가격, 오늘 정보</text>

  <rect x="80" y="470" width="220" height="110" rx="22" fill="#cc6b2c" filter="url(#oashadow2)"/>
  <text x="125" y="532" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">Web Search</text>

  <rect x="340" y="470" width="220" height="110" rx="22" fill="#2166a5" filter="url(#oashadow2)"/>
  <text x="390" y="532" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">File Search</text>

  <rect x="600" y="470" width="220" height="110" rx="22" fill="#6a994e" filter="url(#oashadow2)"/>
  <text x="652" y="532" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">Functions</text>

  <rect x="860" y="470" width="220" height="110" rx="22" fill="#865dff" opacity="0.82" filter="url(#oashadow2)"/>
  <text x="905" y="532" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">Remote MCP</text>

  <path d="M390 310 L190 470" stroke="#4b6175" stroke-width="8" fill="none" marker-end="url(#oaarrow2)"/>
  <path d="M500 380 L450 470" stroke="#4b6175" stroke-width="8" fill="none" marker-end="url(#oaarrow2)"/>
  <path d="M620 380 L710 470" stroke="#4b6175" stroke-width="8" fill="none" marker-end="url(#oaarrow2)"/>
  <path d="M810 310 L970 470" stroke="#4b6175" stroke-width="8" fill="none" marker-end="url(#oaarrow2)"/>

  <text x="215" y="432" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#cc6b2c">예</text>
  <text x="450" y="438" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#2166a5">내부 문서면 파일 검색</text>
  <text x="680" y="438" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#6a994e">내부 액션이면 함수 호출</text>
  <text x="930" y="438" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#865dff">외부 도구 계층이면 MCP</text>
</svg>
