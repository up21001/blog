<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="vLLM choice flow diagram">
  <rect width="1200" height="630" fill="#08101d"/>
  <rect x="60" y="60" width="1080" height="510" rx="32" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="100" y="130" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="44" font-weight="700">Choose vLLM when...</text>
  <text x="100" y="170" fill="#94a3b8" font-family="Arial, sans-serif" font-size="22">Serving traffic, optimizing latency, and managing GPU efficiency matter</text>

  <rect x="110" y="240" width="260" height="150" rx="24" fill="#111827" stroke="#60a5fa" stroke-width="2"/>
  <text x="240" y="292" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700">High concurrency</text>
  <text x="240" y="330" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">many requests</text>

  <rect x="470" y="240" width="260" height="150" rx="24" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="292" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700">Need batching</text>
  <text x="600" y="330" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">raise throughput</text>

  <rect x="830" y="240" width="260" height="150" rx="24" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
  <text x="960" y="292" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700">Need service ops</text>
  <text x="960" y="330" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">metrics and scaling</text>

  <path d="M370 315 H470" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M730 315 H830" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="100" y="470" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="22">If the task is just local tinkering, Ollama is usually simpler.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
