<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Replicate Workflow 2026</title>
  <desc id="desc">Workflow diagram for Replicate with models, official models, custom deploy, and webhooks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#9a3412" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2410c"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Replicate Workflow</text>
  <rect x="70" y="190" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="126" y="242" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">App</text>
  <text x="102" y="275" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">Node, Python, API</text>
  <rect x="360" y="140" rx="28" ry="28" width="470" height="360" fill="#fffaf5" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <text x="535" y="196" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Replicate</text>
  <rect x="405" y="228" rx="18" ry="18" width="170" height="90" fill="#fff" stroke="#fdba74"/>
  <text x="445" y="280" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Models</text>
  <rect x="615" y="228" rx="18" ry="18" width="170" height="90" fill="#fff" stroke="#fdba74"/>
  <text x="634" y="268" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Official</text>
  <text x="654" y="296" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">models</text>
  <rect x="405" y="348" rx="18" ry="18" width="170" height="90" fill="#fff" stroke="#fdba74"/>
  <text x="445" y="388" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Deploy</text>
  <text x="426" y="415" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">custom models</text>
  <rect x="615" y="348" rx="18" ry="18" width="170" height="90" fill="#fff" stroke="#fdba74"/>
  <text x="652" y="388" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Webhooks</text>
  <text x="655" y="415" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">predictions</text>
  <rect x="920" y="190" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="975" y="242" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Output</text>
  <text x="950" y="275" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">Image, video, text</text>
  <path d="M280 250 C320 250, 330 250, 360 250" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M575 273 C595 273, 600 273, 615 273" fill="none" stroke="#c2410c" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M490 318 C490 328, 490 337, 490 348" fill="none" stroke="#c2410c" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M700 318 C700 328, 700 337, 700 348" fill="none" stroke="#c2410c" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M830 250 C875 250, 885 250, 920 250" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
