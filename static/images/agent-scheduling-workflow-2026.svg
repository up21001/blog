<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Agent Scheduling Workflow</title>
  <desc id="desc">Workflow for scheduling immediate, delayed, and approval-gated agent jobs.</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #e5e7eb; }
      .title { font-size: 38px; font-weight: 700; }
      .small { font-size: 18px; fill: #cbd5e1; }
      .box { rx: 18; ry: 18; stroke: #f472b6; stroke-width: 2.5; fill: rgba(17, 24, 39, 0.72); }
      .line { stroke: #f9a8d4; stroke-width: 4; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#f9a8d4"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="#111827"/>
  <text x="60" y="82" class="title">Agent Scheduling Workflow</text>
  <text x="60" y="120" class="small">Immediate, delayed, and gated execution paths</text>
  <rect x="70" y="225" width="180" height="95" class="box"/>
  <text x="160" y="262" text-anchor="middle" font-size="22" font-weight="700">Trigger</text>
  <text x="160" y="289" text-anchor="middle" class="small">Event / cron</text>
  <rect x="320" y="205" width="200" height="135" class="box"/>
  <text x="420" y="245" text-anchor="middle" font-size="22" font-weight="700">Scheduler</text>
  <text x="420" y="273" text-anchor="middle" class="small">Timing policy</text>
  <text x="420" y="301" text-anchor="middle" class="small">Delay / window</text>
  <rect x="585" y="190" width="180" height="165" class="box"/>
  <text x="675" y="232" text-anchor="middle" font-size="22" font-weight="700">Queue</text>
  <text x="675" y="260" text-anchor="middle" class="small">Ordered tasks</text>
  <text x="675" y="288" text-anchor="middle" class="small">Priority</text>
  <text x="675" y="316" text-anchor="middle" class="small">Backoff</text>
  <rect x="825" y="190" width="180" height="165" class="box"/>
  <text x="915" y="232" text-anchor="middle" font-size="22" font-weight="700">Worker</text>
  <text x="915" y="260" text-anchor="middle" class="small">Execute task</text>
  <text x="915" y="288" text-anchor="middle" class="small">Retry policy</text>
  <text x="915" y="316" text-anchor="middle" class="small">Trace</text>
  <rect x="1030" y="220" width="120" height="110" class="box"/>
  <text x="1090" y="260" text-anchor="middle" font-size="22" font-weight="700">Done</text>
  <text x="1090" y="287" text-anchor="middle" class="small">Audit</text>
  <line x1="250" y1="272" x2="320" y2="272" class="line"/>
  <line x1="520" y1="272" x2="585" y2="272" class="line"/>
  <line x1="765" y1="272" x2="825" y2="272" class="line"/>
  <line x1="1005" y1="272" x2="1030" y2="272" class="line"/>
</svg>
