<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Groq Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when Groq is a good fit.</desc>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#166534" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg4)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#166534">Should You Use Groq?</text>

  <rect x="435" y="120" width="330" height="90" rx="22" fill="#fff" stroke="#22c55e" stroke-width="2" filter="url(#shadow4)"/>
  <text x="477" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#166534">Need very low latency?</text>

  <rect x="110" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#86efac" filter="url(#shadow4)"/>
  <text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#16a34a">No</text>
  <text x="135" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#16a34a">A general inference API may be enough</text>

  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#86efac" filter="url(#shadow4)"/>
  <text x="496" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#16a34a">Need OpenAI</text>
  <text x="514" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#16a34a">compatibility?</text>

  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#86efac" filter="url(#shadow4)"/>
  <text x="844" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#16a34a">Need production</text>
  <text x="854" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#16a34a">metrics too?</text>

  <rect x="445" y="500" width="320" height="110" rx="26" fill="#166534" filter="url(#shadow4)"/>
  <text x="536" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#f0fdf4">Use Groq</text>
  <text x="477" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#bbf7d0">Strong fit for fast inference products</text>
</svg>
