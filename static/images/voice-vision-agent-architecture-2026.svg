<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="80" y="92" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="48" font-weight="700">Voice Vision Agent Architecture</text>
  <text x="80" y="132" fill="#94a3b8" font-family="Arial, sans-serif" font-size="22">Streaming audio, vision, memory, and tool execution</text>
  <rect x="60" y="210" width="180" height="112" rx="22" fill="url(#card)" stroke="#334155"/>
  <rect x="265" y="210" width="180" height="112" rx="22" fill="url(#card)" stroke="#334155"/>
  <rect x="470" y="210" width="180" height="112" rx="22" fill="url(#card)" stroke="#334155"/>
  <rect x="675" y="210" width="180" height="112" rx="22" fill="url(#card)" stroke="#334155"/>
  <rect x="880" y="210" width="260" height="112" rx="22" fill="url(#card)" stroke="#334155"/>
  <text x="150" y="248" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">Audio</text>
  <text x="150" y="276" fill="#94a3b8" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">STT stream</text>
  <text x="355" y="248" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">Vision</text>
  <text x="355" y="276" fill="#94a3b8" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">image / screen</text>
  <text x="560" y="248" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">Session</text>
  <text x="560" y="276" fill="#94a3b8" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">shared state</text>
  <text x="765" y="248" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">Planner</text>
  <text x="765" y="276" fill="#94a3b8" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">next response</text>
  <text x="1010" y="248" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">Tools</text>
  <text x="1010" y="276" fill="#94a3b8" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">apis / browser</text>
  <line x1="240" y1="266" x2="265" y2="266" stroke="#38bdf8" stroke-width="6"/>
  <line x1="445" y1="266" x2="470" y2="266" stroke="#38bdf8" stroke-width="6"/>
  <line x1="650" y1="266" x2="675" y2="266" stroke="#38bdf8" stroke-width="6"/>
  <line x1="855" y1="266" x2="880" y2="266" stroke="#38bdf8" stroke-width="6"/>
  <rect x="150" y="390" width="900" height="130" rx="24" fill="#050816" stroke="#334155"/>
  <text x="600" y="438" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700">Stream speech and vision into one session, then respond with tool-backed actions</text>
  <text x="600" y="475" fill="#94a3b8" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">This is the pattern behind practical assistant UX</text>
