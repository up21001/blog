<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">LiveKit Agents Choice Flow 2026</title>
  <desc id="desc">Decision flow for LiveKit Agents showing when to choose STT-LLM-TTS or realtime model and when it fits voice products.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#115e59" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="86" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#115e59">Should You Use LiveKit Agents?</text>
  <rect x="430" y="120" width="340" height="90" rx="22" fill="#fff" stroke="#5eead4" stroke-width="2" filter="url(#shadow)"/>
  <text x="478" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#115e59">Need realtime voice agent?</text>
  <rect x="110" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#5eead4" filter="url(#shadow)"/>
  <text x="176" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">No</text>
  <text x="144" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">A plain chat or batch API may be enough</text>
  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#5eead4" filter="url(#shadow)"/>
  <text x="500" y="334" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Need browser,</text>
  <text x="508" y="364" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">phone, app?</text>
  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#5eead4" filter="url(#shadow)"/>
  <text x="839" y="334" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Need multimodal</text>
  <text x="854" y="364" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">workflows?</text>
  <rect x="445" y="500" width="320" height="110" rx="26" fill="#115e59" filter="url(#shadow)"/>
  <text x="507" y="552" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ecfeff">Use LiveKit Agents</text>
  <text x="482" y="582" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#bff7ef">Strong fit for production voice experiences</text>
  <path d="M600 210 L600 285" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M410 340 L430 340" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M750 340 L790 340" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M600 395 L600 500" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
