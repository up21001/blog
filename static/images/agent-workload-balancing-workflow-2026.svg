<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Agent Workload Balancing Workflow</title>
  <desc id="desc">Workflow for distributing tasks across agents based on load, capability, and cost.</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #e5e7eb; }
      .title { font-size: 38px; font-weight: 700; }
      .small { font-size: 18px; fill: #cbd5e1; }
      .box { rx: 18; ry: 18; stroke: #22c55e; stroke-width: 2.5; fill: rgba(15, 23, 42, 0.74); }
      .line { stroke: #86efac; stroke-width: 4; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#86efac"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="#07111f"/>
  <text x="60" y="82" class="title">Agent Workload Balancing Workflow</text>
  <text x="60" y="120" class="small">Distribute work by load, capability, and cost</text>
  <rect x="65" y="205" width="160" height="115" class="box"/>
  <text x="145" y="245" text-anchor="middle" font-size="22" font-weight="700">Task</text>
  <text x="145" y="273" text-anchor="middle" class="small">Incoming work</text>
  <rect x="275" y="185" width="190" height="155" class="box"/>
  <text x="370" y="228" text-anchor="middle" font-size="22" font-weight="700">Balancer</text>
  <text x="370" y="256" text-anchor="middle" class="small">Load / cost / skill</text>
  <text x="370" y="284" text-anchor="middle" class="small">Policy engine</text>
  <rect x="520" y="170" width="180" height="170" class="box"/>
  <text x="610" y="214" text-anchor="middle" font-size="22" font-weight="700">Agent A</text>
  <text x="610" y="242" text-anchor="middle" class="small">Fast</text>
  <text x="610" y="270" text-anchor="middle" class="small">Cheap</text>
  <text x="610" y="298" text-anchor="middle" class="small">General</text>
  <rect x="750" y="170" width="180" height="170" class="box"/>
  <text x="840" y="214" text-anchor="middle" font-size="22" font-weight="700">Agent B</text>
  <text x="840" y="242" text-anchor="middle" class="small">Specialist</text>
  <text x="840" y="270" text-anchor="middle" class="small">Premium</text>
  <text x="840" y="298" text-anchor="middle" class="small">High quality</text>
  <rect x="980" y="190" width="140" height="130" class="box"/>
  <text x="1050" y="232" text-anchor="middle" font-size="22" font-weight="700">Trace</text>
  <text x="1050" y="260" text-anchor="middle" class="small">Metrics</text>
  <line x1="225" y1="262" x2="275" y2="262" class="line"/>
  <line x1="465" y1="262" x2="520" y2="262" class="line"/>
  <line x1="700" y1="262" x2="750" y2="262" class="line"/>
  <line x1="930" y1="262" x2="980" y2="262" class="line"/>
</svg>
