<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Daytona Workflow 2026</title>
  <desc id="desc">Daytona sandbox workflow showing SDK, CLI, API, sandbox lifecycle, and resources.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1e3a8a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1d4ed8"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg3)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Daytona Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">Composable sandboxes and lifecycle management for AI-generated code</text>
  <rect x="70" y="180" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#93c5fd" filter="url(#shadow3)"/>
  <text x="128" y="235" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">SDK / CLI / API</text>
  <text x="108" y="268" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">Manage sandboxes</text>
  <rect x="350" y="150" rx="28" ry="28" width="500" height="360" fill="#fff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow3)"/>
  <text x="524" y="205" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Daytona</text>
  <rect x="395" y="240" rx="18" ry="18" width="170" height="90" fill="#f8fafc" stroke="#93c5fd"/>
  <text x="438" y="292" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Create</text>
  <rect x="620" y="240" rx="18" ry="18" width="170" height="90" fill="#f8fafc" stroke="#93c5fd"/>
  <text x="667" y="292" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Start</text>
  <rect x="395" y="360" rx="18" ry="18" width="170" height="90" fill="#f8fafc" stroke="#93c5fd"/>
  <text x="443" y="402" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Sandbox</text>
  <text x="435" y="430" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">resources</text>
  <rect x="620" y="360" rx="18" ry="18" width="170" height="90" fill="#f8fafc" stroke="#93c5fd"/>
  <text x="651" y="402" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Archive</text>
  <text x="640" y="430" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">Recover</text>
  <rect x="920" y="180" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#93c5fd" filter="url(#shadow3)"/>
  <text x="983" y="235" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Code</text>
  <text x="950" y="268" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">isolated execution</text>
  <path d="M280 240 C320 240, 330 240, 350 240" fill="none" stroke="#1d4ed8" stroke-width="4" marker-end="url(#arrow3)"/>
  <path d="M565 285 C590 285, 600 285, 620 285" fill="none" stroke="#1d4ed8" stroke-width="4" marker-end="url(#arrow3)"/>
  <path d="M565 405 C590 405, 600 405, 620 405" fill="none" stroke="#1d4ed8" stroke-width="4" marker-end="url(#arrow3)"/>
  <path d="M790 405 C840 405, 870 405, 920 240" fill="none" stroke="#1d4ed8" stroke-width="4" marker-end="url(#arrow3)"/>
</svg>
