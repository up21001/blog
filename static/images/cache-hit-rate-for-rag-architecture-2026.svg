<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <style>
      .title { font: 700 42px sans-serif; fill: #7c2d12; }
      .sub { font: 400 20px sans-serif; fill: #9a3412; }
      .boxTitle { font: 700 22px sans-serif; fill: #7c2d12; }
      .boxText { font: 400 18px sans-serif; fill: #334155; }
      .card { rx: 22; ry: 22; stroke: #fdba74; stroke-width: 2; }
    </style>
    <marker id="arrow9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg9)"/>
  <text x="70" y="78" class="title">Hit Rate Architecture</text>
  <text x="70" y="114" class="sub">cache store, metrics, alerting, RAG path</text>

  <rect x="70" y="170" width="180" height="120" class="card" fill="#ffffff"/>
  <text x="160" y="218" text-anchor="middle" class="boxTitle">Cache</text>
  <text x="160" y="250" text-anchor="middle" class="boxText">저장소</text>

  <rect x="290" y="170" width="180" height="120" class="card" fill="#dbeafe"/>
  <text x="380" y="218" text-anchor="middle" class="boxTitle">Hit Metrics</text>
  <text x="380" y="250" text-anchor="middle" class="boxText">적중률</text>

  <rect x="510" y="170" width="180" height="120" class="card" fill="#dcfce7"/>
  <text x="600" y="218" text-anchor="middle" class="boxTitle">Latency</text>
  <text x="600" y="250" text-anchor="middle" class="boxText">지연시간</text>

  <rect x="730" y="170" width="180" height="120" class="card" fill="#fef9c3"/>
  <text x="820" y="218" text-anchor="middle" class="boxTitle">Cost / Quality</text>
  <text x="820" y="250" text-anchor="middle" class="boxText">비용 / 품질</text>

  <rect x="950" y="170" width="180" height="120" class="card" fill="#ffe4e6"/>
  <text x="1040" y="218" text-anchor="middle" class="boxTitle">Alert</text>
  <text x="1040" y="250" text-anchor="middle" class="boxText">이상 감지</text>

  <line x1="250" y1="230" x2="290" y2="230" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow9)"/>
  <line x1="470" y1="230" x2="510" y2="230" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow9)"/>
  <line x1="690" y1="230" x2="730" y2="230" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow9)"/>
  <line x1="910" y1="230" x2="950" y2="230" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow9)"/>

  <rect x="70" y="360" width="1060" height="170" class="card" fill="#ffffff"/>
  <text x="100" y="402" class="boxTitle">대시보드 원칙</text>
  <text x="100" y="442" class="boxText">캐시 적중률은 단독 그래프가 아니라 latency, cost, quality와 함께 봐야 한다.</text>
  <text x="100" y="482" class="boxText">알림은 hit rate보다 false hit, stale answer, 비용 급증 같은 운영 이상에 걸어야 한다.</text>
</svg>
