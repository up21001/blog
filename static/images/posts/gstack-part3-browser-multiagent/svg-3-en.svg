<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="560" fill="#F8F9FF" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#1E1B4B">Multi-Agent Parallel Execution — Conductor Architecture</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#6B7280">Conductor orchestrates 10–15 specialized agents simultaneously</text>

  <!-- Conductor -->
  <g transform="translate(325, 90)">
    <rect x="0" y="0" width="250" height="80" rx="14" fill="#4F46E5" stroke="#3730A3" stroke-width="2"/>
    <text x="125" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="white">CONDUCTOR</text>
    <text x="125" y="48" text-anchor="middle" font-size="11" fill="#C7D2FE">Orchestration Engine</text>
    <text x="125" y="65" text-anchor="middle" font-size="11" fill="#A5B4FC">Up to 10–15 agents concurrently</text>
  </g>

  <!-- Connector lines -->
  <line x1="370" y1="170" x2="100" y2="240" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="390" y1="170" x2="220" y2="240" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="410" y1="170" x2="340" y2="240" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="450" y1="170" x2="450" y2="240" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="490" y1="170" x2="560" y2="240" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="510" y1="170" x2="680" y2="240" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="530" y1="170" x2="800" y2="240" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- Agent 1: CEO -->
  <g transform="translate(30, 240)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="70" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#4F46E5">CEO Agent</text>
    <text x="70" y="40" text-anchor="middle" font-size="10" fill="#6B7280">Strategy decisions</text>
    <text x="70" y="56" text-anchor="middle" font-size="10" fill="#6B7280">Skips infra reviews</text>
    <rect x="10" y="64" width="120" height="10" rx="3" fill="#C7D2FE"/>
  </g>

  <!-- Agent 2: Backend -->
  <g transform="translate(185, 240)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
    <text x="70" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">Backend Agent</text>
    <text x="70" y="40" text-anchor="middle" font-size="10" fill="#6B7280">API implementation</text>
    <text x="70" y="56" text-anchor="middle" font-size="10" fill="#6B7280">DB schema</text>
    <rect x="10" y="64" width="120" height="10" rx="3" fill="#A7F3D0"/>
  </g>

  <!-- Agent 3: Frontend -->
  <g transform="translate(340, 240)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="70" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#D97706">Frontend Agent</text>
    <text x="70" y="40" text-anchor="middle" font-size="10" fill="#6B7280">UI components</text>
    <text x="70" y="56" text-anchor="middle" font-size="10" fill="#6B7280">Skips design</text>
    <rect x="10" y="64" width="120" height="10" rx="3" fill="#FDE68A"/>
  </g>

  <!-- Agent 4: Design -->
  <g transform="translate(495, 240)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#FDF4FF" stroke="#A855F7" stroke-width="1.5"/>
    <text x="70" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#9333EA">Design Agent</text>
    <text x="70" y="40" text-anchor="middle" font-size="10" fill="#6B7280">CSS / styling</text>
    <text x="70" y="56" text-anchor="middle" font-size="10" fill="#6B7280">Skips backend</text>
    <rect x="10" y="64" width="120" height="10" rx="3" fill="#E9D5FF"/>
  </g>

  <!-- Agent 5: Test -->
  <g transform="translate(650, 240)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#FFF1F2" stroke="#EF4444" stroke-width="1.5"/>
    <text x="70" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">Test Agent</text>
    <text x="70" y="40" text-anchor="middle" font-size="10" fill="#6B7280">QA / Verification</text>
    <text x="70" y="56" text-anchor="middle" font-size="10" fill="#6B7280">Automated review</text>
    <rect x="10" y="64" width="120" height="10" rx="3" fill="#FECACA"/>
  </g>

  <!-- More agents indicator -->
  <g transform="translate(390, 345)">
    <text x="60" y="14" text-anchor="middle" font-size="11" fill="#6B7280">... up to 15 agents concurrently ...</text>
  </g>

  <!-- Special features -->
  <g transform="translate(30, 390)">
    <rect x="0" y="0" width="200" height="100" rx="10" fill="white" stroke="#6366F1" stroke-width="1.5"/>
    <text x="100" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#4F46E5">/codex</text>
    <text x="100" y="44" text-anchor="middle" font-size="11" fill="#374151">Cross-model review</text>
    <text x="100" y="62" text-anchor="middle" font-size="10" fill="#6B7280">Claude + Codex cross-check</text>
    <text x="100" y="80" text-anchor="middle" font-size="10" fill="#6B7280">Code quality assurance</text>
  </g>

  <g transform="translate(260, 390)">
    <rect x="0" y="0" width="200" height="100" rx="10" fill="white" stroke="#10B981" stroke-width="1.5"/>
    <text x="100" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">Sidebar Agent</text>
    <text x="100" y="44" text-anchor="middle" font-size="11" fill="#374151">Chrome Side Panel ext.</text>
    <text x="100" y="62" text-anchor="middle" font-size="10" fill="#6B7280">5-minute task limit</text>
    <text x="100" y="80" text-anchor="middle" font-size="10" fill="#6B7280">Live browser monitoring</text>
  </g>

  <g transform="translate(490, 390)">
    <rect x="0" y="0" width="200" height="100" rx="10" fill="white" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="100" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#D97706">Smart Routing</text>
    <text x="100" y="44" text-anchor="middle" font-size="11" fill="#374151">Role-based review routing</text>
    <text x="100" y="62" text-anchor="middle" font-size="10" fill="#6B7280">CEO: skips infra</text>
    <text x="100" y="80" text-anchor="middle" font-size="10" fill="#6B7280">Design: skips backend</text>
  </g>

  <g transform="translate(720, 390)">
    <rect x="0" y="0" width="150" height="100" rx="10" fill="white" stroke="#EF4444" stroke-width="1.5"/>
    <text x="75" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#DC2626">Log Buffers</text>
    <text x="75" y="44" text-anchor="middle" font-size="10" fill="#374151">3 ring buffers</text>
    <text x="75" y="60" text-anchor="middle" font-size="10" fill="#6B7280">50,000 entries each</text>
    <text x="75" y="76" text-anchor="middle" font-size="10" fill="#6B7280">O(1) push performance</text>
    <text x="75" y="92" text-anchor="middle" font-size="10" fill="#6B7280">1s async flush</text>
  </g>

  <!-- Bottom stat bar -->
  <g transform="translate(30, 510)">
    <rect x="0" y="0" width="840" height="30" rx="8" fill="#EEF2FF"/>
    <text x="140" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#4F46E5">Concurrent agents: 10–15</text>
    <line x1="280" y1="5" x2="280" y2="25" stroke="#C7D2FE" stroke-width="1"/>
    <text x="420" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">Max log loss: 1s (on crash)</text>
    <line x1="560" y1="5" x2="560" y2="25" stroke="#C7D2FE" stroke-width="1"/>
    <text x="700" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#D97706">Task limit: 5min (Sidebar)</text>
  </g>
</svg>
