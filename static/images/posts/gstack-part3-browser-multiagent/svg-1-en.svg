<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="540" fill="#F8F9FF" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#1E1B4B">Three-Tier Browser Daemon Architecture</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#6B7280">CLI → HTTP Server → Chromium control pipeline</text>

  <!-- Layer 1: CLI -->
  <g transform="translate(60, 120)">
    <rect x="0" y="0" width="200" height="130" rx="12" fill="#4F46E5" opacity="0.1" stroke="#4F46E5" stroke-width="2"/>
    <rect x="0" y="0" width="200" height="36" rx="12" fill="#4F46E5"/>
    <rect x="0" y="24" width="200" height="12" fill="#4F46E5"/>
    <text x="100" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="white">LAYER 1 — CLI</text>
    <text x="100" y="58" text-anchor="middle" font-size="20">🖥️</text>
    <text x="100" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#4F46E5">Bun Binary</text>
    <text x="100" y="102" text-anchor="middle" font-size="11" fill="#6B7280">/browse, /connect-chrome</text>
    <text x="100" y="118" text-anchor="middle" font-size="11" fill="#6B7280">/setup-browser-cookies</text>
  </g>

  <!-- Arrow 1→2 with latency -->
  <g transform="translate(270, 155)">
    <line x1="0" y1="30" x2="70" y2="30" stroke="#4F46E5" stroke-width="2.5" marker-end="url(#arrow-indigo-en)"/>
    <rect x="5" y="8" width="60" height="18" rx="4" fill="#4F46E5"/>
    <text x="35" y="21" text-anchor="middle" font-size="10" font-weight="700" fill="white">HTTP Req</text>
    <text x="35" y="52" text-anchor="middle" font-size="10" fill="#6B7280">Bearer token</text>
  </g>

  <!-- Layer 2: HTTP Server -->
  <g transform="translate(340, 100)">
    <rect x="0" y="0" width="220" height="170" rx="12" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="36" rx="12" fill="#10B981"/>
    <rect x="0" y="24" width="220" height="12" fill="#10B981"/>
    <text x="110" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="white">LAYER 2 — HTTP SERVER</text>
    <text x="110" y="60" text-anchor="middle" font-size="18">⚡</text>
    <text x="110" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">localhost: random port</text>
    <text x="110" y="102" text-anchor="middle" font-size="11" fill="#6B7280">Port range: 10,000–60,000</text>
    <rect x="20" y="112" width="180" height="22" rx="6" fill="#D1FAE5"/>
    <text x="110" y="127" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">First start: ~3 seconds</text>
    <rect x="20" y="138" width="180" height="22" rx="6" fill="#A7F3D0"/>
    <text x="110" y="153" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">Subsequent: ~100–200ms</text>
  </g>

  <!-- Arrow 2→3 -->
  <g transform="translate(570, 155)">
    <line x1="0" y1="30" x2="70" y2="30" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrow-emerald-en)"/>
    <rect x="5" y="8" width="60" height="18" rx="4" fill="#10B981"/>
    <text x="35" y="21" text-anchor="middle" font-size="10" font-weight="700" fill="white">DevTools</text>
    <text x="35" y="52" text-anchor="middle" font-size="10" fill="#6B7280">Protocol</text>
  </g>

  <!-- Layer 3: Chromium -->
  <g transform="translate(640, 120)">
    <rect x="0" y="0" width="200" height="130" rx="12" fill="#F59E0B" opacity="0.1" stroke="#F59E0B" stroke-width="2"/>
    <rect x="0" y="0" width="200" height="36" rx="12" fill="#F59E0B"/>
    <rect x="0" y="24" width="200" height="12" fill="#F59E0B"/>
    <text x="100" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="white">LAYER 3 — CHROMIUM</text>
    <text x="100" y="58" text-anchor="middle" font-size="20">🌐</text>
    <text x="100" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#D97706">Real Browser Engine</text>
    <text x="100" y="102" text-anchor="middle" font-size="11" fill="#6B7280">Playwright control</text>
    <text x="100" y="118" text-anchor="middle" font-size="11" fill="#6B7280">Headless / Headed mode</text>
  </g>

  <!-- State file section -->
  <g transform="translate(100, 310)">
    <rect x="0" y="0" width="700" height="80" rx="10" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="350" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#4338CA">State File: .gstack/browse.json</text>
    <g transform="translate(40, 38)">
      <rect x="0" y="0" width="130" height="24" rx="5" fill="#C7D2FE"/>
      <text x="65" y="16" text-anchor="middle" font-size="10" fill="#3730A3">pid (process ID)</text>
    </g>
    <g transform="translate(185, 38)">
      <rect x="0" y="0" width="130" height="24" rx="5" fill="#C7D2FE"/>
      <text x="65" y="16" text-anchor="middle" font-size="10" fill="#3730A3">port (random port)</text>
    </g>
    <g transform="translate(330, 38)">
      <rect x="0" y="0" width="130" height="24" rx="5" fill="#C7D2FE"/>
      <text x="65" y="16" text-anchor="middle" font-size="10" fill="#3730A3">token (Bearer)</text>
    </g>
    <g transform="translate(475, 38)">
      <rect x="0" y="0" width="185" height="24" rx="5" fill="#C7D2FE"/>
      <text x="92" y="16" text-anchor="middle" font-size="10" fill="#3730A3">binaryVersion (auto-restart)</text>
    </g>
  </g>

  <!-- Badges -->
  <g transform="translate(100, 420)">
    <rect x="0" y="0" width="200" height="50" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">Idle Timeout</text>
    <text x="100" y="38" text-anchor="middle" font-size="14" font-weight="700" fill="#D97706">30-min auto-shutdown</text>
  </g>

  <g transform="translate(340, 420)">
    <rect x="0" y="0" width="220" height="50" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
    <text x="110" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#7F1D1D">Version Mismatch</text>
    <text x="110" y="38" text-anchor="middle" font-size="12" font-weight="700" fill="#DC2626">Auto-restart on binary change</text>
  </g>

  <g transform="translate(600, 420)">
    <rect x="0" y="0" width="200" height="50" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
    <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#064E3B">Security</text>
    <text x="100" y="38" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">127.0.0.1 only</text>
  </g>

  <defs>
    <marker id="arrow-indigo-en" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4F46E5"/>
    </marker>
    <marker id="arrow-emerald-en" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10B981"/>
    </marker>
  </defs>
</svg>
