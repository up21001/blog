<svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title-text {
      font-family: "Arial, sans-serif";
      font-size: 28px;
      font-weight: bold;
      fill: #ffffff;
    }
    .header-text {
      font-family: "Arial, sans-serif";
      font-size: 18px;
      font-weight: bold;
      fill: #ffffff;
    }
    .feature-label {
      font-family: "Arial, sans-serif";
      font-size: 16px;
      font-weight: bold;
      fill: #2D3748;
    }
    .cell-text {
      font-family: "Arial, sans-serif";
      font-size: 15px;
      fill: #2D3748;
    }
    .conclusion-text {
      font-family: "Arial, sans-serif";
      font-size: 16px;
      font-weight: bold;
      fill: #FF6B6B; /* Red for emphasis on risk */
    }
    .column-header-bg-left {
      fill: #4A90D9;
    }
    .column-header-bg-right {
      fill: #50C878;
      stroke: #FF6B6B; /* Highlight border for problematic column */
      stroke-width: 3;
    }
    .row-bg-even {
      fill: #f8f9fa;
    }
    .row-bg-odd {
      fill: #ffffff;
    }
    .indicator-good {
      fill: #50C878; /* Green */
    }
    .indicator-bad {
      fill: #FF6B6B; /* Red */
    }
  </style>

  <!-- Title Row -->
  <rect x="0" y="0" width="800" height="60" fill="#2D3748"/>
  <text x="400" y="38" text-anchor="middle" class="title-text">Orion Spacecraft Heat Shield Abrasion Comparison</text>

  <!-- Header Row -->
  <rect x="0" y="60" width="800" height="50" fill="#e0e0e0"/> <!-- Background for the whole header row -->

  <!-- Feature Name Header -->
  <text x="120" y="90" text-anchor="middle" class="header-text" fill="#2D3748">Comparison Item</text>

  <!-- NASA Expectation Column Header -->
  <rect x="240" y="60" width="280" height="50" class="column-header-bg-left"/>
  <text x="380" y="90" text-anchor="middle" class="header-text">NASA's Initial Expectation</text>

  <!-- Artemis 1 Result Column Header (Highlighted) -->
  <rect x="520" y="60" width="280" height="50" class="column-header-bg-right"/>
  <text x="660" y="90" text-anchor="middle" class="header-text">Artemis 1 Actual Results</text>

  <!-- Feature Rows -->
  <!-- Row 1: 마모 형태 -->
  <g>
    <rect x="0" y="110" width="800" height="100" class="row-bg-even"/>
    <text x="120" y="160" text-anchor="middle" class="feature-label">Abrasion Pattern</text>

    <!-- Column 1: NASA Expectation -->
    <text x="380" y="150" text-anchor="middle" class="cell-text">Uniform</text>
    <circle cx="380" cy="180" r="12" class="indicator-good"/>

    <!-- Column 2: Artemis 1 Result -->
    <text x="660" y="150" text-anchor="middle" class="cell-text">Chunk Detachment</text>
    <circle cx="660" cy="180" r="12" class="indicator-bad"/>
  </g>

  <!-- Row 2: 마모 깊이 -->
  <g>
    <rect x="0" y="210" width="800" height="100" class="row-bg-odd"/>
    <text x="120" y="260" text-anchor="middle" class="feature-label">Abrasion Depth</text>

    <!-- Column 1: NASA Expectation -->
    <text x="380" y="250" text-anchor="middle" class="cell-text">Matches Expectation</text>
    <circle cx="380" cy="280" r="12" class="indicator-good"/>

    <!-- Column 2: Artemis 1 Result -->
    <text x="660" y="250" text-anchor="middle" class="cell-text">Deep Cracks</text>
    <circle cx="660" cy="280" r="12" class="indicator-bad"/>
  </g>

  <!-- Row 3: 잔해물 발생 -->
  <g>
    <rect x="0" y="310" width="800" height="100" class="row-bg-even"/>
    <text x="120" y="360" text-anchor="middle" class="feature-label">Debris Generation</text>

    <!-- Column 1: NASA Expectation -->
    <text x="380" y="350" text-anchor="middle" class="cell-text">Fine Particles</text>
    <circle cx="380" cy="380" r="12" class="indicator-good"/>

    <!-- Column 2: Artemis 1 Result -->
    <text x="660" y="350" text-anchor="middle" class="cell-text">Large Fragments</text>
    <circle cx="660" cy="380" r="12" class="indicator-bad"/>
  </g>

  <!-- Risk Emphasis / Conclusion -->
  <rect x="0" y="410" width="800" height="100" fill="#FF6B6B" opacity="0.1"/>
  <text x="400" y="450" text-anchor="middle" class="conclusion-text">
    <tspan x="400" dy="0">Artemis 1 results show more severe abrasion and</tspan>
    <tspan x="400" dy="25">generation of large fragments than initially expected, indicating the need for further risk assessment.</tspan>
  </text>
</svg>