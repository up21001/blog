<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="2" dy="2" result="shadow"/>
            <feMerge>
                <feMergeNode in="shadow"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <marker id="arrowheadBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#4A90D9"/>
        </marker>
        <marker id="arrowheadRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#FF6B6B"/>
        </marker>
    </defs>

    <style>
        .title { font-family: "Arial, sans-serif"; font-size: 28px; font-weight: bold; fill: #333; text-anchor: middle; }
        .component-box { fill: #4A90D9; stroke: #3A7BBF; stroke-width: 1; rx: 8; filter: url(#dropshadow); }
        .defect-box { fill: #FF6B6B; stroke: #D9534F; stroke-width: 1; rx: 8; filter: url(#dropshadow); }
        .impact-box { fill: #FF6B6B; stroke: #D9534F; stroke-width: 1; rx: 8; filter: url(#dropshadow); }
        .label-text { font-family: "Arial, sans-serif"; font-size: 18px; fill: #fff; text-anchor: middle; dominant-baseline: middle; }
        .arrow-label-text { font-family: "Arial, sans-serif"; font-size: 13px; fill: #333; text-anchor: middle; dominant-baseline: middle; }
        .arrow-label-bg { fill: white; rx: 3; }
        .arrow-blue { stroke: #4A90D9; stroke-width: 2; fill: none; marker-end: url(#arrowheadBlue); }
        .arrow-red { stroke: #FF6B6B; stroke-width: 2; fill: none; marker-end: url(#arrowheadRed); }
        .container-box { fill: #f0f0f0; stroke: #ccc; stroke-width: 1; rx: 10; }
        .container-text { font-family: "Arial, sans-serif"; font-size: 20px; fill: #666; text-anchor: middle; font-weight: bold; }
    </style>

    <!-- Overall Title -->
    <text x="400" y="30" class="title">Orion Spacecraft Key Safety Controversy</text>
    <text x="400" y="55" class="title">Components and Defect Analysis</text>

    <!-- Orion Spacecraft Container (Conceptual) -->
    <rect x="50" y="80" width="700" height="480" class="container-box"/>
    <text x="400" y="105" class="container-text">Orion Spacecraft</text>

    <!-- Components, Defects, and Impacts -->

    <!-- Row 1: Heat Shield -->
    <rect x="80" y="140" width="180" height="100" class="component-box"/>
    <text x="170" y="190" class="label-text">Heat Shield</text>

    <rect x="310" y="150" width="180" height="80" class="defect-box"/>
    <text x="400" y="190" class="label-text">Heat Shield Damage</text>

    <rect x="540" y="140" width="200" height="100" class="impact-box"/>
    <text x="640" y="152.5" class="label-text">
        <tspan x="640" dy="0">Overheating during</tspan>
        <tspan x="640" dy="25">reentry,</tspan>
        <tspan x="640" dy="25">Threat to</tspan>
        <tspan x="640" dy="25">astronaut lives</tspan>
    </text>

    <!-- Row 2: ECLSS -->
    <rect x="80" y="280" width="180" height="100" class="component-box"/>
    <text x="170" y="292.5" class="label-text">
        <tspan x="170" dy="0">Environmental</tspan>
        <tspan x="170" dy="25">Control and</tspan>
        <tspan x="170" dy="25">Life Support System</tspan>
        <tspan x="170" dy="25">(ECLSS)</tspan>
    </text>

    <rect x="310" y="290" width="180" height="80" class="defect-box"/>
    <text x="400" y="330" class="label-text">ECLSS Valve Defect</text>

    <rect x="540" y="280" width="200" height="100" class="impact-box"/>
    <text x="640" y="292.5" class="label-text">
        <tspan x="640" dy="0">Oxygen supply and</tspan>
        <tspan x="640" dy="25">Carbon dioxide</tspan>
        <tspan x="640" dy="25">removal failure,</tspan>
        <tspan x="640" dy="25">Risk of suffocation</tspan>
    </text>

    <!-- Row 3: Emergency Batteries -->
    <rect x="80" y="420" width="180" height="100" class="component-box"/>
    <text x="170" y="470" class="label-text">Emergency Battery</text>

    <rect x="310" y="430" width="180" height="80" class="defect-box"/>
    <text x="400" y="457.5" class="label-text">
        <tspan x="400" dy="0">Emergency Battery</tspan>
        <tspan x="400" dy="25">Circuit Issue</tspan>
    </text>

    <rect x="540" y="420" width="200" height="100" class="impact-box"/>
    <text x="640" y="445" class="label-text">
        <tspan x="640" dy="0">Emergency power</tspan>
        <tspan x="640" dy="25">supply interruption,</tspan>
        <tspan x="640" dy="25">Core system paralysis</tspan>
    </text>

    <!-- Arrows and their labels -->

    <!-- Row 1 Arrows -->
    <rect x="260" y="177.5" width="50" height="25" class="arrow-label-bg"/>
    <text x="285" y="190" class="arrow-label-text">Includes</text>
    <line x1="260" y1="190" x2="310" y2="190" class="arrow-blue"/>

    <rect x="490" y="177.5" width="50" height="25" class="arrow-label-bg"/>
    <text x="515" y="190" class="arrow-label-text">Impacts</text>
    <line x1="490" y1="190" x2="540" y2="190" class="arrow-red"/>

    <!-- Row 2 Arrows -->
    <rect x="260" y="317.5" width="50" height="25" class="arrow-label-bg"/>
    <text x="285" y="330" class="arrow-label-text">Includes</text>
    <line x1="260" y1="330" x2="310" y2="330" class="arrow-blue"/>

    <rect x="490" y="317.5" width="50" height="25" class="arrow-label-bg"/>
    <text x="515" y="330" class="arrow-label-text">Impacts</text>
    <line x1="490" y1="330" x2="540" y2="330" class="arrow-red"/>

    <!-- Row 3 Arrows -->
    <rect x="260" y="457.5" width="50" height="25" class="arrow-label-bg"/>
    <text x="285" y="470" class="arrow-label-text">Includes</text>
    <line x1="260" y1="470" x2="310" y2="470" class="arrow-blue"/>

    <rect x="490" y="457.5" width="50" height="25" class="arrow-label-bg"/>
    <text x="515" y="470" class="arrow-label-text">Impacts</text>
    <line x1="490" y1="470" x2="540" y2="470" class="arrow-red"/>
</svg>