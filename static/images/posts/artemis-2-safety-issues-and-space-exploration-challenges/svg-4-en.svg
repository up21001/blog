<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
    <style>
        .title {
            font-size: 36px;
            font-weight: bold;
            fill: #333333;
            text-anchor: middle;
        }
        .section-rect {
            rx: 15;
            ry: 15;
            stroke: #ddd;
            stroke-width: 1;
        }
        .challenge-title {
            font-size: 28px;
            font-weight: bold;
            fill: #333333;
            text-anchor: middle;
        }
        .description {
            font-size: 20px;
            fill: #555555;
            text-anchor: middle;
        }
        .icon-fill-blue { fill: #007BFF; }
        .icon-fill-green { fill: #28A745; }
        .icon-fill-orange { fill: #FF8C00; }
        .icon-stroke { stroke: #333333; stroke-width: 2; fill: none; }
        .icon-white-fill { fill: white; }
        .icon-dark-fill { fill: #333333; }
    </style>

    <!-- Main Title -->
    <text x="400" y="70" class="title">Key Challenges for Successful Deep Space Exploration</text>

    <!-- Challenge 1: 극한 환경 신소재 및 열 보호 시스템 개발 -->
    <rect x="50" y="120" width="700" height="250" class="section-rect" fill="#E6F7FF"/>
    <g transform="translate(400, 190)">
        <!-- Icon 1: Heat Shield -->
        <path d="M-40,0 L0,-60 L40,0 L40,40 L0,60 L-40,40 Z" class="icon-fill-blue"/>
        <path d="M-25,-10 C-15,-20,15,-20,25,-10 M-25,5 C-15,-5,15,-5,25,5 M-25,20 C-15,10,15,10,25,20" stroke="white" stroke-width="3" fill="none"/>
        <path d="M-40,0 L0,-60 L40,0 L40,40 L0,60 L-40,40 Z" class="icon-stroke"/>
    </g>
    <text x="400" y="290" class="challenge-title">Development of New Materials and Thermal Protection Systems for Extreme Environments</text>
    <text x="400" y="320" class="description">Developing innovative materials and efficient thermal management systems</text>
    <text x="400" y="348" class="description">to withstand extreme space environments (cryogenic, high temp, vacuum, micrometeoroids) is essential.</text>

    <!-- Challenge 2: 우주 방사선 노출 방어 및 장기 생명 유지 -->
    <rect x="50" y="400" width="700" height="250" class="section-rect" fill="#E6FFE6"/>
    <g transform="translate(400, 470)">
        <!-- Icon 2: Human in protective bubble -->
        <circle cx="0" cy="0" r="45" class="icon-fill-green" opacity="0.8"/>
        <circle cx="0" cy="-20" r="15" class="icon-white-fill"/> <!-- Head -->
        <rect x="-15" y="-5" width="30" height="40" class="icon-white-fill"/> <!-- Body -->
        <path d="M-15,-5 L-25,10 M15,-5 L25,10 M-15,35 L-25,50 M15,35 L25,50" stroke="#333333" stroke-width="3" fill="none"/> <!-- Arms and Legs -->
        <circle cx="0" cy="0" r="45" class="icon-stroke"/>
        <circle cx="0" cy="-20" r="15" class="icon-stroke"/>
        <rect x="-15" y="-5" width="30" height="40" class="icon-stroke"/>
    </g>
    <text x="400" y="570" class="challenge-title">Protection Against Space Radiation Exposure and Long-term Life Support</text>
    <text x="400" y="600" class="description">Protecting crew from deadly space radiation,</text>
    <text x="400" y="628" class="description">and securing technologies for closed-loop life support systems and psychological stability are crucial.</text>

    <!-- Challenge 3: 막대한 예산 확보와 지속 가능한 정치적 리더십 -->
    <rect x="50" y="680" width="700" height="250" class="section-rect" fill="#FFF0E6"/>
    <g transform="translate(400, 750)">
        <!-- Icon 3: Coin stack and upward arrow -->
        <circle cx="0" cy="20" r="25" class="icon-fill-orange"/>
        <circle cx="0" cy="5" r="25" class="icon-fill-orange"/>
        <circle cx="0" cy="-10" r="25" class="icon-fill-orange"/>
        <path d="M-15,-20 L0,-45 L15,-20 M0,-45 L0,20" stroke="white" stroke-width="5" fill="none"/>
        <path d="M-15,-20 L0,-45 L15,-20 M0,-45 L0,20" class="icon-stroke"/>
        <circle cx="0" cy="20" r="25" class="icon-stroke"/>
        <circle cx="0" cy="5" r="25" class="icon-stroke"/>
        <circle cx="0" cy="-10" r="25" class="icon-stroke"/>
    </g>
    <text x="400" y="850" class="challenge-title">Securing Massive Budgets and Sustainable Political Leadership</text>
    <text x="400" y="880" class="description">Securing massive budgets for deep space exploration projects that take decades,</text>
    <text x="400" y="908" class="description">and long-term, consistent political leadership capable of fostering international cooperation are required.</text>

</svg>