    <text x="400" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Tesla Optimus</text>
    <text x="400" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fadbd8">Tesla · USA</text>

    <circle cx="400" cy="190" r="16" fill="#c0392b"/>
    <rect x="382" y="208" width="36" height="50" rx="5" fill="#c0392b"/>
    <rect x="368" y="212" width="14" height="35" rx="4" fill="#c0392b"/>
    <rect x="418" y="212" width="14" height="35" rx="4" fill="#c0392b"/>
    <rect x="386" y="262" width="12" height="40" rx="3" fill="#c0392b"/>
    <rect x="402" y="262" width="12" height="40" rx="3" fill="#c0392b"/>

