    <text x="630" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Universities · startups</text>
    <text x="630" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">≈$16,000</text>
    <text x="630" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60" font-weight="bold">≈130cm · 35kg</text>
  </g>

  <text x="400" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">The first generation to actually walk into factories</text>
  <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">Public data as of April 2026 — some figures are estimates</text>
