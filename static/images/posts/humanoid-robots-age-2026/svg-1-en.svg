    <text x="170" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d6eaf8">Figure AI · USA</text>

    <circle cx="170" cy="190" r="16" fill="#2980b9"/>
    <rect x="152" y="208" width="36" height="50" rx="5" fill="#2980b9"/>
    <rect x="138" y="212" width="14" height="35" rx="4" fill="#2980b9"/>
    <rect x="188" y="212" width="14" height="35" rx="4" fill="#2980b9"/>
    <rect x="156" y="262" width="12" height="40" rx="3" fill="#2980b9"/>
    <rect x="172" y="262" width="12" height="40" rx="3" fill="#2980b9"/>

    <text x="170" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">First to paid pilots</text>
    <text x="170" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">BMW · Mercedes lines</text>
    <text x="170" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">VLA model "Helix"</text>
    <text x="170" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2980b9" font-weight="bold">≈170cm · 70kg</text>
  </g>

  <g>
    <rect x="300" y="100" width="200" height="310" rx="14" fill="#ffffff" stroke="#c0392b" stroke-width="2"/>
