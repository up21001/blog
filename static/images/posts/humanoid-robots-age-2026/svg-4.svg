<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#2c3e50">양산 로드맵과 산업별 영향</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">어디부터, 얼마나 빨리 들어오는가</text>

  <!-- Timeline -->
  <line x1="100" y1="170" x2="720" y2="170" stroke="#2c3e50" stroke-width="2"/>
  <polygon points="720,170 712,166 712,174" fill="#2c3e50"/>

  <g font-family="Arial, sans-serif">
    <circle cx="150" cy="170" r="8" fill="#2980b9"/>
    <text x="150" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">2024-2025</text>
    <text x="150" y="195" text-anchor="middle" font-size="11" fill="#7f8c8d">시제품</text>
    <text x="150" y="212" text-anchor="middle" font-size="11" fill="#7f8c8d">시연</text>

    <circle cx="290" cy="170" r="8" fill="#c0392b"/>
    <text x="290" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">2026</text>
    <text x="290" y="195" text-anchor="middle" font-size="11" fill="#7f8c8d">유료 파일럿</text>
    <text x="290" y="212" text-anchor="middle" font-size="11" fill="#7f8c8d">수백-수천 대</text>

    <circle cx="430" cy="170" r="10" fill="#8e44ad"/>
    <text x="430" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">2027-2028</text>
    <text x="430" y="195" text-anchor="middle" font-size="11" fill="#7f8c8d">공장 스케일</text>
    <text x="430" y="212" text-anchor="middle" font-size="11" fill="#7f8c8d">연 1-5만 대</text>

    <circle cx="580" cy="170" r="10" fill="#27ae60"/>
    <text x="580" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">2029-2030</text>
    <text x="580" y="195" text-anchor="middle" font-size="11" fill="#7f8c8d">물류·소매 진입</text>
    <text x="580" y="212" text-anchor="middle" font-size="11" fill="#7f8c8d">연 10만+</text>

    <circle cx="700" cy="170" r="10" fill="#e67e22"/>
    <text x="700" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">2030+</text>
    <text x="700" y="195" text-anchor="middle" font-size="11" fill="#7f8c8d">대중화 구간</text>
  </g>

  <!-- Industry boxes -->
  <rect x="60" y="250" width="220" height="200" rx="10" fill="#ffffff" stroke="#e74c3c" stroke-width="2"/>
  <text x="170" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">가장 먼저</text>
  <text x="170" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">반복·표준화 육체 노동</text>
  <text x="80" y="325" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 물류센터 피킹·이송</text>
  <text x="80" y="350" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 공장 단순 조립</text>
  <text x="80" y="375" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 야간 재고 정리</text>
  <text x="80" y="400" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 설거지·조리 준비</text>
  <text x="80" y="425" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 위험 환경 점검</text>

  <rect x="290" y="250" width="220" height="200" rx="10" fill="#ffffff" stroke="#f39c12" stroke-width="2"/>
  <text x="400" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f39c12">중기</text>
  <text x="400" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">손기술 + 판단 결합</text>
  <text x="310" y="325" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 소매점 응대·판매</text>
  <text x="310" y="350" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 물류 복합 분류</text>
  <text x="310" y="375" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 호텔 청소·서비스</text>
  <text x="310" y="400" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 일반 가정용 가사</text>
  <text x="310" y="425" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 경비·순찰</text>

  <rect x="520" y="250" width="220" height="200" rx="10" fill="#ffffff" stroke="#27ae60" stroke-width="2"/>
  <text x="630" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#27ae60">장기·보수적</text>
  <text x="630" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">정교함·공감 필요</text>
  <text x="540" y="325" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 간호·돌봄 보조</text>
  <text x="540" y="350" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 건설 현장 다목적</text>
  <text x="540" y="375" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 정밀 수리·정비</text>
  <text x="540" y="400" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 의료 보조</text>
  <text x="540" y="425" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 교육·돌봄 상호작용</text>

  <text x="400" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">구간별 진입 속도는 기술·규제·사회 수용성 조합에 따라 달라진다</text>
</svg>
