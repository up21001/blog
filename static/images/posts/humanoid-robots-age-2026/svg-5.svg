<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#2c3e50">휴머노이드 시대의 윤리·안전·규제</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">기술만큼 중요한 세 가지 축</text>

  <!-- Safety & Liability -->
  <g>
    <rect x="50" y="95" width="230" height="340" rx="14" fill="#ffffff" stroke="#e74c3c" stroke-width="2"/>
    <rect x="50" y="95" width="230" height="50" rx="14" fill="#e74c3c"/>
    <rect x="50" y="130" width="230" height="15" fill="#e74c3c"/>
    <text x="165" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">⚖ 안전·책임</text>
    <text x="165" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e74c3c">사고 발생 시 책임</text>
    <text x="70" y="195" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 제조사 vs 운영사 vs 사용자</text>
    <text x="70" y="220" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 보험 제도 설계 필요</text>
    <text x="70" y="245" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 산업안전보건 기준 재작성</text>

    <text x="165" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e74c3c">위험 영역</text>
    <text x="70" y="310" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 양손 도구 사용 로봇</text>
    <text x="70" y="335" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 불규칙 환경 이동</text>
    <text x="70" y="360" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 사람 근접 협업</text>

    <rect x="70" y="385" width="190" height="35" rx="8" fill="#fdecea" stroke="#e74c3c" stroke-width="1"/>
    <text x="165" y="407" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c0392b">새로운 인증 체계 필요</text>
  </g>

  <!-- Data & Privacy -->
  <g>
    <rect x="290" y="95" width="230" height="340" rx="14" fill="#ffffff" stroke="#8e44ad" stroke-width="2"/>
    <rect x="290" y="95" width="230" height="50" rx="14" fill="#8e44ad"/>
    <rect x="290" y="130" width="230" height="15" fill="#8e44ad"/>
    <text x="405" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">🔒 데이터·프라이버시</text>
    <text x="405" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#8e44ad">감시 문제</text>
    <text x="310" y="195" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 24시간 카메라·마이크</text>
    <text x="310" y="220" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 공장·매장·가정 녹화</text>
    <text x="310" y="245" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 작업자 동의 범위</text>

    <text x="405" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#8e44ad">학습 데이터</text>
    <text x="310" y="310" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 영상 데이터 소유권</text>
    <text x="310" y="335" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 재훈련 활용 투명성</text>
    <text x="310" y="360" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 보관 기간 기준</text>

    <rect x="310" y="385" width="190" height="35" rx="8" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1"/>
    <text x="405" y="407" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c3483">투명한 데이터 거버넌스</text>
  </g>

  <!-- Social acceptance -->
  <g>
    <rect x="530" y="95" width="230" height="340" rx="14" fill="#ffffff" stroke="#2980b9" stroke-width="2"/>
    <rect x="530" y="95" width="230" height="50" rx="14" fill="#2980b9"/>
    <rect x="530" y="130" width="230" height="15" fill="#2980b9"/>
    <text x="645" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">🌏 사회적 수용성</text>
    <text x="645" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2980b9">문화권별 속도 차</text>
    <text x="550" y="195" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 한국·일본: 호의적</text>
    <text x="550" y="220" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 유럽: 노동 보호 중시</text>
    <text x="550" y="245" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 미국: 기업 주도</text>

    <text x="645" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2980b9">일자리 충격</text>
    <text x="550" y="310" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 재교육 제도 속도</text>
    <text x="550" y="335" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 저출생·고령화 맥락</text>
    <text x="550" y="360" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 소득 분배 구조</text>

    <rect x="550" y="385" width="190" height="35" rx="8" fill="#ebf5fb" stroke="#2980b9" stroke-width="1"/>
    <text x="645" y="407" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1f618d">제도가 기술을 따라가야</text>
  </g>

  <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">도입 속도 · 재교육 속도 · 규제 속도 — 세 속도의 경주</text>
</svg>
