<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#2c3e50">Humanoid Robot Spec Comparison</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">Height · Weight · DOF · Price</text>

  <rect x="40" y="85" width="180" height="38" fill="#2c3e50"/>
  <text x="60" y="109" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Attribute</text>

  <rect x="220" y="85" width="190" height="38" fill="#2980b9"/>
  <text x="315" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Figure 02</text>

  <rect x="410" y="85" width="190" height="38" fill="#c0392b"/>
  <text x="505" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Tesla Optimus</text>

  <rect x="600" y="85" width="160" height="38" fill="#27ae60"/>
  <text x="680" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Unitree G1</text>

  <g font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">
    <rect x="40" y="123" width="720" height="40" fill="#ffffff" stroke="#ecf0f1"/>
    <text x="60" y="148" font-weight="bold">Height</text>
    <text x="315" y="148" text-anchor="middle">~170 cm</text>
    <text x="505" y="148" text-anchor="middle">~173 cm</text>
    <text x="680" y="148" text-anchor="middle">~127-132 cm</text>

    <rect x="40" y="163" width="720" height="40" fill="#f8f9fa" stroke="#ecf0f1"/>
    <text x="60" y="188" font-weight="bold">Weight</text>
    <text x="315" y="188" text-anchor="middle">~70 kg</text>
    <text x="505" y="188" text-anchor="middle">~57 kg</text>
    <text x="680" y="188" text-anchor="middle">~35 kg</text>

    <rect x="40" y="203" width="720" height="40" fill="#ffffff" stroke="#ecf0f1"/>
    <text x="60" y="228" font-weight="bold">Degrees of freedom</text>
    <text x="315" y="228" text-anchor="middle">40+ whole body</text>
    <text x="505" y="228" text-anchor="middle">28-30 whole body</text>
    <text x="680" y="228" text-anchor="middle">23-43 whole body</text>

    <rect x="40" y="243" width="720" height="40" fill="#f8f9fa" stroke="#ecf0f1"/>
    <text x="60" y="268" font-weight="bold">Battery life</text>
    <text x="315" y="268" text-anchor="middle">5+ hrs</text>
    <text x="505" y="268" text-anchor="middle">task-dependent</text>
    <text x="680" y="268" text-anchor="middle">~2 hrs</text>

    <rect x="40" y="283" width="720" height="40" fill="#ffffff" stroke="#ecf0f1"/>
    <text x="60" y="308" font-weight="bold">AI model</text>
    <text x="315" y="308" text-anchor="middle">In-house VLA "Helix"</text>
    <text x="505" y="308" text-anchor="middle">FSD-derived stack</text>
    <text x="680" y="308" text-anchor="middle">Open SDK · external</text>

    <rect x="40" y="323" width="720" height="40" fill="#f8f9fa" stroke="#ecf0f1"/>
    <text x="60" y="348" font-weight="bold">Primary deployment</text>
    <text x="315" y="348" text-anchor="middle">BMW · Mercedes</text>
    <text x="505" y="348" text-anchor="middle">Tesla internal</text>
    <text x="680" y="348" text-anchor="middle">Universities · startups</text>

    <rect x="40" y="363" width="720" height="40" fill="#ffffff" stroke="#ecf0f1"/>
    <text x="60" y="388" font-weight="bold">Price (public/est.)</text>
    <text x="315" y="388" text-anchor="middle" fill="#2980b9" font-weight="bold">Undisclosed · lease</text>
    <text x="505" y="388" text-anchor="middle" fill="#c0392b" font-weight="bold">$20-30k target</text>
    <text x="680" y="388" text-anchor="middle" fill="#27ae60" font-weight="bold">~$16,000</text>

    <rect x="40" y="403" width="720" height="40" fill="#f8f9fa" stroke="#ecf0f1"/>
    <text x="60" y="428" font-weight="bold">Commercial stage</text>
    <text x="315" y="428" text-anchor="middle">Paid pilots</text>
    <text x="505" y="428" text-anchor="middle">Internal trials</text>
    <text x="680" y="428" text-anchor="middle">Public sales</text>
  </g>

  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">Public announcements · estimates — subject to revision</text>
</svg>
