<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#2c3e50">Humanoid Robot Core Technology Stack</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">Four pillars must mature together</text>

  <g>
    <rect x="60" y="95" width="330" height="170" rx="14" fill="#ffffff" stroke="#2980b9" stroke-width="2"/>
    <rect x="60" y="95" width="330" height="45" rx="14" fill="#2980b9"/>
    <rect x="60" y="125" width="330" height="15" fill="#2980b9"/>
    <text x="225" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">🔩 Hardware</text>
    <text x="80" y="165" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Joint actuator torque &amp; response</text>
    <text x="80" y="187" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Battery density &amp; endurance</text>
    <text x="80" y="209" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Hand DOF (multi-finger)</text>
    <text x="80" y="231" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Visual + tactile sensor fusion</text>
    <text x="80" y="253" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Vertical integration drives cost &amp; reliability</text>
  </g>

  <g>
    <rect x="410" y="95" width="330" height="170" rx="14" fill="#ffffff" stroke="#c0392b" stroke-width="2"/>
    <rect x="410" y="95" width="330" height="45" rx="14" fill="#c0392b"/>
    <rect x="410" y="125" width="330" height="15" fill="#c0392b"/>
    <text x="575" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">👁 Perception</text>
    <text x="430" y="165" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 3D pose &amp; orientation estimation</text>
    <text x="430" y="187" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Material, friction, weight inference</text>
    <text x="430" y="209" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Tactile feedback (force sensing)</text>
    <text x="430" y="231" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Dynamic environment adaptation</text>
    <text x="430" y="253" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Cameras + force sensors — multimodal</text>
  </g>

  <g>
    <rect x="60" y="285" width="330" height="170" rx="14" fill="#ffffff" stroke="#8e44ad" stroke-width="2"/>
    <rect x="60" y="285" width="330" height="45" rx="14" fill="#8e44ad"/>
    <rect x="60" y="315" width="330" height="15" fill="#8e44ad"/>
    <text x="225" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">🧠 VLA Models</text>
    <text x="80" y="355" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Vision + Language + Action</text>
    <text x="80" y="377" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Natural language → limb trajectories</text>
    <text x="80" y="399" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Figure Helix · Google RT family</text>
    <text x="80" y="421" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• End-to-end learned policy</text>
    <text x="80" y="443" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">"The robot's brain"</text>
  </g>

  <g>
    <rect x="410" y="285" width="330" height="170" rx="14" fill="#ffffff" stroke="#27ae60" stroke-width="2"/>
    <rect x="410" y="285" width="330" height="45" rx="14" fill="#27ae60"/>
    <rect x="410" y="315" width="330" height="15" fill="#27ae60"/>
    <text x="575" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">📊 Data &amp; Training</text>
    <text x="430" y="355" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Human video · teleoperation logs</text>
    <text x="430" y="377" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Large-scale physics simulation</text>
    <text x="430" y="399" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Imitation + reinforcement learning</text>
    <text x="430" y="421" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Sim-to-real transfer</text>
    <text x="430" y="443" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">The real moat: the data pipeline</text>
  </g>

  <text x="400" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">If any pillar is weak, the result is a "demo robot" that cannot actually work</text>
</svg>
