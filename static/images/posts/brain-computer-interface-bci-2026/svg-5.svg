<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#2c3e50">BCI 윤리·프라이버시·규제 이슈</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">기술 로드맵보다 어려운 사회적 합의</text>

  <!-- Identity -->
  <g>
    <rect x="40" y="90" width="355" height="160" rx="12" fill="#ffffff" stroke="#e74c3c" stroke-width="2"/>
    <rect x="40" y="90" width="355" height="40" rx="12" fill="#e74c3c"/>
    <rect x="40" y="120" width="355" height="10" fill="#e74c3c"/>
    <text x="217" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">🧩 사고와 정체성</text>
    <text x="60" y="155" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• BCI 신호 = 단순 의도 + 감정·주의·선호</text>
    <text x="60" y="178" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 데이터가 기업 서버·학습셋에 저장됨</text>
    <text x="60" y="201" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• "내면은 누구의 소유인가?"</text>
    <text x="60" y="224" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">→ 개인 신경 데이터 권리 필요</text>
  </g>

  <!-- Cognitive privacy -->
  <g>
    <rect x="405" y="90" width="355" height="160" rx="12" fill="#ffffff" stroke="#8e44ad" stroke-width="2"/>
    <rect x="405" y="90" width="355" height="40" rx="12" fill="#8e44ad"/>
    <rect x="405" y="120" width="355" height="10" fill="#8e44ad"/>
    <text x="582" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">🔐 인지 프라이버시</text>
    <text x="425" y="155" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 신경권(Neurorights) 개념 등장</text>
    <text x="425" y="178" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 칠레 2021년 헌법 명문화 (세계 최초)</text>
    <text x="425" y="201" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• EU·미국 일부 주 입법 논의 중</text>
    <text x="425" y="224" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">→ 국제 표준 합의 필요</text>
  </g>

  <!-- Equity -->
  <g>
    <rect x="40" y="270" width="355" height="160" rx="12" fill="#ffffff" stroke="#2980b9" stroke-width="2"/>
    <rect x="40" y="270" width="355" height="40" rx="12" fill="#2980b9"/>
    <rect x="40" y="300" width="355" height="10" fill="#2980b9"/>
    <text x="217" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">⚖ 공평성</text>
    <text x="60" y="335" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 초기 BCI는 필연적으로 고가</text>
    <text x="60" y="358" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 의료 영역에서도 접근성 불균등</text>
    <text x="60" y="381" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 증강 단계 = 인지 격차 확대 위험</text>
    <text x="60" y="404" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">→ 공공 지원·보험 설계 필요</text>
  </g>

  <!-- Disability-first -->
  <g>
    <rect x="405" y="270" width="355" height="160" rx="12" fill="#ffffff" stroke="#16a085" stroke-width="2"/>
    <rect x="405" y="270" width="355" height="40" rx="12" fill="#16a085"/>
    <rect x="405" y="300" width="355" height="10" fill="#16a085"/>
    <text x="582" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">♿ 장애인 중심 설계</text>
    <text x="425" y="335" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• BCI 최대 가치 = 잃은 능력 회복</text>
    <text x="425" y="358" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 업계가 증강 서사로 기울지 않게</text>
    <text x="425" y="381" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 커뮤니티 목소리가 우선순위</text>
    <text x="425" y="404" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">→ 당사자 참여형 연구 설계</text>
  </g>

  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">기술 진전 속도 vs 윤리·규제 속도</text>
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">균형이 다가올 10년 BCI의 모습을 결정한다</text>
</svg>
