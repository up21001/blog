<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#2c3e50">BCI Diffusion Roadmap</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">Medical → Specialized → Augmentation</text>

  <rect x="50" y="100" width="220" height="340" rx="14" fill="#ffffff" stroke="#2980b9" stroke-width="2"/>
  <rect x="50" y="100" width="220" height="55" rx="14" fill="#2980b9"/>
  <rect x="50" y="138" width="220" height="17" fill="#2980b9"/>
  <text x="160" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Phase 1 · Medical</text>
  <text x="160" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#d6eaf8">through early 2030s</text>
  <text x="160" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2980b9">Indication expansion</text>
  <text x="70" y="210" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">✓ ALS</text>
  <text x="70" y="235" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">✓ Spinal cord injury</text>
  <text x="70" y="260" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">✓ Post-stroke deficits</text>
  <text x="70" y="285" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">✓ Severe epilepsy</text>
  <text x="70" y="310" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">✓ Vision / hearing loss</text>
  <rect x="70" y="330" width="180" height="30" rx="6" fill="#ebf5fb" stroke="#2980b9" stroke-width="1"/>
  <text x="160" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1f618d">Reach: thousands-10,000s</text>
  <text x="160" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Likelihood: High</text>
  <text x="160" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Already underway</text>
  <text x="160" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">FDA Breakthrough track</text>

  <rect x="290" y="100" width="220" height="340" rx="14" fill="#ffffff" stroke="#8e44ad" stroke-width="2"/>
  <rect x="290" y="100" width="220" height="55" rx="14" fill="#8e44ad"/>
  <rect x="290" y="138" width="220" height="17" fill="#8e44ad"/>
  <text x="400" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Phase 2 · Specialized</text>
  <text x="400" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f4ecf7">2030-2035 (est.)</text>
  <text x="400" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#8e44ad">Niche professional use</text>
  <text x="310" y="210" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">○ Extreme-env tele-ops</text>
  <text x="310" y="235" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">○ Underwater · space</text>
  <text x="310" y="260" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">○ Industrial precision</text>
  <text x="310" y="285" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">○ Specialized diagnostics</text>
  <text x="310" y="310" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">○ Surgical assistance</text>
  <rect x="310" y="330" width="180" height="30" rx="6" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1"/>
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c3483">Reach: 10,000s-100,000s</text>
  <text x="400" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Likelihood: Medium</text>
  <text x="400" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Regulatory + ROI TBD</text>
  <text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Surgical risk acceptance</text>

  <rect x="530" y="100" width="220" height="340" rx="14" fill="#ffffff" stroke="#e67e22" stroke-width="2"/>
  <rect x="530" y="100" width="220" height="55" rx="14" fill="#e67e22"/>
  <rect x="530" y="138" width="220" height="17" fill="#e67e22"/>
  <text x="640" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Phase 3 · Augmentation</text>
  <text x="640" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fef5e7">2035+ (est.)</text>
  <text x="640" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e67e22">Healthy consumers</text>
  <text x="550" y="210" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">? Typing replacement</text>
  <text x="550" y="235" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">? Direct machine control</text>
  <text x="550" y="260" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">? Memory augmentation</text>
  <text x="550" y="285" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">? Sensory expansion</text>
  <text x="550" y="310" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">? Brain-to-brain comms</text>
  <rect x="550" y="330" width="180" height="30" rx="6" fill="#fef5e7" stroke="#e67e22" stroke-width="1"/>
  <text x="640" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ba4a00">Reach: uncertain</text>
  <text x="640" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Likelihood: Low</text>
  <text x="640" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Requires ~0 surgical risk</text>
  <text x="640" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Non-invasive maturity first</text>

  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">Consensus view: mainstream consumer BCI no earlier than late 2030s</text>
</svg>
