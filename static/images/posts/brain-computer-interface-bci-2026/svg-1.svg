<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#2c3e50">뇌-컴퓨터 인터페이스 2026</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">Neuralink · Synchron · Precision Neuroscience</text>

  <!-- Brain illustration -->
  <ellipse cx="400" cy="255" rx="130" ry="100" fill="#fdebd3" stroke="#d35400" stroke-width="2"/>
  <path d="M 300 230 Q 340 200 380 220 Q 420 195 460 215 Q 500 205 500 250 Q 510 290 460 310 Q 420 325 380 305 Q 340 320 300 295 Q 280 270 300 230 Z" fill="none" stroke="#d35400" stroke-width="1.5" opacity="0.6"/>
  <path d="M 320 260 Q 360 245 400 260 Q 440 250 480 265" fill="none" stroke="#d35400" stroke-width="1" opacity="0.5"/>
  <text x="400" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#d35400">Brain</text>

  <!-- Neuralink -->
  <g>
    <rect x="40" y="100" width="200" height="95" rx="12" fill="#ffffff" stroke="#2980b9" stroke-width="2"/>
    <rect x="40" y="100" width="200" height="28" rx="12" fill="#2980b9"/>
    <rect x="40" y="118" width="200" height="10" fill="#2980b9"/>
    <text x="140" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Neuralink</text>
    <text x="140" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">침습형 (Invasive)</text>
    <text x="140" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">1,000+ 전극 삽입</text>
    <text x="140" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2980b9" font-weight="bold">"Telepathy"</text>
  </g>
  <line x1="240" y1="160" x2="280" y2="220" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Synchron -->
  <g>
    <rect x="560" y="100" width="200" height="95" rx="12" fill="#ffffff" stroke="#16a085" stroke-width="2"/>
    <rect x="560" y="100" width="200" height="28" rx="12" fill="#16a085"/>
    <rect x="560" y="118" width="200" height="10" fill="#16a085"/>
    <text x="660" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Synchron</text>
    <text x="660" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">반침습형 (Endovascular)</text>
    <text x="660" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">혈관 경유 · 수술 불필요</text>
    <text x="660" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#16a085" font-weight="bold">"Stentrode"</text>
  </g>
  <line x1="560" y1="160" x2="520" y2="220" stroke="#16a085" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Precision -->
  <g>
    <rect x="300" y="380" width="200" height="95" rx="12" fill="#ffffff" stroke="#8e44ad" stroke-width="2"/>
    <rect x="300" y="380" width="200" height="28" rx="12" fill="#8e44ad"/>
    <rect x="300" y="398" width="200" height="10" fill="#8e44ad"/>
    <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Precision</text>
    <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">극저침습 (표면형)</text>
    <text x="400" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">뇌 표면 박막 전극</text>
    <text x="400" y="467" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8e44ad" font-weight="bold">"Layer 7"</text>
  </g>
  <line x1="400" y1="380" x2="400" y2="355" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <text x="400" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">2026년 기준 임상 트랙 선두 3사</text>
</svg>
