<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#2c3e50">BCI Ethics, Privacy, and Regulation</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">Social consensus is harder than the technology roadmap</text>

  <g>
    <rect x="40" y="90" width="355" height="160" rx="12" fill="#ffffff" stroke="#e74c3c" stroke-width="2"/>
    <rect x="40" y="90" width="355" height="40" rx="12" fill="#e74c3c"/>
    <rect x="40" y="120" width="355" height="10" fill="#e74c3c"/>
    <text x="217" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">🧩 Thought &amp; Identity</text>
    <text x="60" y="155" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• BCI signals carry intent + emotion · attention · preference</text>
    <text x="60" y="178" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Data ends up on corporate servers, in training sets</text>
    <text x="60" y="201" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• "Who owns the inner life?"</text>
    <text x="60" y="224" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">→ Personal neural-data rights required</text>
  </g>

  <g>
    <rect x="405" y="90" width="355" height="160" rx="12" fill="#ffffff" stroke="#8e44ad" stroke-width="2"/>
    <rect x="405" y="90" width="355" height="40" rx="12" fill="#8e44ad"/>
    <rect x="405" y="120" width="355" height="10" fill="#8e44ad"/>
    <text x="582" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">🔐 Cognitive Privacy</text>
    <text x="425" y="155" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• "Neurorights" concept is emerging in law</text>
    <text x="425" y="178" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Chile 2021: world-first constitutional clause</text>
    <text x="425" y="201" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• EU and several US states in active discussion</text>
    <text x="425" y="224" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">→ International standards needed</text>
  </g>

  <g>
    <rect x="40" y="270" width="355" height="160" rx="12" fill="#ffffff" stroke="#2980b9" stroke-width="2"/>
    <rect x="40" y="270" width="355" height="40" rx="12" fill="#2980b9"/>
    <rect x="40" y="300" width="355" height="10" fill="#2980b9"/>
    <text x="217" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">⚖ Equity</text>
    <text x="60" y="335" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Early BCIs will be expensive for years</text>
    <text x="60" y="358" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Access is uneven even within medical use</text>
    <text x="60" y="381" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Augmentation phase risks cognitive divide</text>
    <text x="60" y="404" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">→ Public support + insurance design</text>
  </g>

  <g>
    <rect x="405" y="270" width="355" height="160" rx="12" fill="#ffffff" stroke="#16a085" stroke-width="2"/>
    <rect x="405" y="270" width="355" height="40" rx="12" fill="#16a085"/>
    <rect x="405" y="300" width="355" height="10" fill="#16a085"/>
    <text x="582" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">♿ Disability-First Design</text>
    <text x="425" y="335" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• BCI's greatest value: restoring lost capability</text>
    <text x="425" y="358" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Don't let augmentation narratives dominate</text>
    <text x="425" y="381" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Community voices must lead priorities</text>
    <text x="425" y="404" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">→ Participatory research design</text>
  </g>

  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">Speed of technology vs. speed of ethics and regulation</text>
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">The balance decides the next decade of BCI</text>
</svg>
