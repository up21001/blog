<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#8e44ad"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#27ae60"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">How Chain-of-Thought Works</text>

  <!-- Input box -->
  <rect x="275" y="55" width="250" height="44" rx="10" fill="#2980b9"/>
  <text x="400" y="82" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle">Problem Input</text>

  <line x1="400" y1="99" x2="400" y2="118" stroke="#8e44ad" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Internal reasoning begins -->
  <rect x="250" y="118" width="300" height="38" rx="8" fill="#f0e6fa" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="400" y="142" font-family="Arial, sans-serif" font-size="13" fill="#6c3483" text-anchor="middle">Internal Reasoning Begins</text>

  <line x1="400" y1="156" x2="400" y2="173" stroke="#8e44ad" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Step 1 -->
  <rect x="230" y="173" width="340" height="44" rx="8" fill="#e8d5f5" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="400" y="192" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6c3483" text-anchor="middle">Step 1: Decompose the Problem</text>
  <text x="400" y="209" font-family="Arial, sans-serif" font-size="11" fill="#7d3c98" text-anchor="middle">Break into sub-goals and components</text>

  <line x1="400" y1="217" x2="400" y2="234" stroke="#8e44ad" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Step 2 -->
  <rect x="230" y="234" width="340" height="44" rx="8" fill="#e8d5f5" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="400" y="253" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6c3483" text-anchor="middle">Step 2: Form Hypothesis</text>
  <text x="400" y="270" font-family="Arial, sans-serif" font-size="11" fill="#7d3c98" text-anchor="middle">Develop approach for each sub-goal</text>

  <line x1="400" y1="278" x2="400" y2="295" stroke="#8e44ad" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Step 3 -->
  <rect x="230" y="295" width="340" height="44" rx="8" fill="#e8d5f5" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="400" y="314" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6c3483" text-anchor="middle">Step 3: Verify</text>
  <text x="400" y="331" font-family="Arial, sans-serif" font-size="11" fill="#7d3c98" text-anchor="middle">Check logical consistency and accuracy</text>

  <line x1="400" y1="339" x2="400" y2="356" stroke="#8e44ad" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Step 4 -->
  <rect x="230" y="356" width="340" height="44" rx="8" fill="#e8d5f5" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="400" y="375" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6c3483" text-anchor="middle">Step 4: Iterate &amp; Refine</text>
  <text x="400" y="392" font-family="Arial, sans-serif" font-size="11" fill="#7d3c98" text-anchor="middle">Backtrack and correct when errors found</text>

  <line x1="400" y1="400" x2="400" y2="416" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Final answer -->
  <rect x="275" y="416" width="250" height="44" rx="10" fill="#27ae60"/>
  <text x="400" y="443" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle">Final Answer</text>

  <!-- Note -->
  <rect x="560" y="270" width="215" height="44" rx="6" fill="#fef9e7" stroke="#e67e22" stroke-width="1.5"/>
  <text x="667" y="287" font-family="Arial, sans-serif" font-size="10" fill="#e67e22" text-anchor="middle">Thinking tokens are billed</text>
  <text x="667" y="303" font-family="Arial, sans-serif" font-size="10" fill="#e67e22" text-anchor="middle">separately from output tokens</text>
</svg>
