<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <!-- Arrowhead marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>

    <!-- Drop shadow filter -->
    <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Lock icon path (from Material Design Icons, 'lock') -->
    <g id="lock-icon" fill="#FF6B6B">
      <path d="M12 17H8v-2h4v2zm-1-9V6c0-2.21-1.79-4-4-4S3 3.79 3 6v2H2c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-1 0h-4V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2z"/>
    </g>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>

  <!-- Main Arc<Mutex<T>> structure -->
  <g transform="translate(250, 180)">
    <!-- Arc container -->
    <rect x="0" y="0" width="300" height="240" rx="15" ry="15" fill="#6C5CE7" filter="url(#dropshadow)"/>
    <text x="150" y="30" font-size="20" fill="#fff" text-anchor="middle" font-weight="bold">Arc&lt;Mutex&lt;T&gt;&gt;</text>
    <text x="150" y="55" font-size="16" fill="#fff" text-anchor="middle">참조 카운팅 포인터</text>

    <!-- Mutex container (inside Arc) -->
    <rect x="50" y="80" width="200" height="130" rx="10" ry="10" fill="#FFD93D" filter="url(#dropshadow)"/>
    <text x="150" y="105" font-size="18" fill="#333" text-anchor="middle" font-weight="bold">Mutex&lt;T&gt;</text>
    <text x="150" y="128" font-size="14" fill="#333" text-anchor="middle">상호 배타적 잠금</text>

    <!-- Lock icon (positioned over Mutex, centered) -->
    <g transform="translate(132, 127) scale(1.5)">
      <use href="#lock-icon"/>
    </g>

    <!-- Shared Data (inside Mutex) -->
    <rect x="75" y="150" width="150" height="40" rx="8" ry="8" fill="#50C878" filter="url(#dropshadow)"/>
    <text x="150" y="175" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">counter: i32</text>
    <text x="150" y="195" font-size="12" fill="#fff" text-anchor="middle">공유 데이터</text>
  </g>

  <!-- Threads -->
  <g>
    <!-- Thread 1 -->
    <rect x="100" y="80" width="100" height="50" rx="10" ry="10" fill="#4A90D9" filter="url(#dropshadow)"/>
    <text x="150" y="110" font-size="16" fill="#fff" text-anchor="middle">스레드 1</text>
    <line x1="150" y1="130" x2="320" y2="180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Thread 2 -->
    <rect x="600" y="80" width="100" height="50" rx="10" ry="10" fill="#4A90D9" filter="url(#dropshadow)"/>
    <text x="650" y="110" font-size="16" fill="#fff" text-anchor="middle">스레드 2</text>
    <line x1="650" y1="130" x2="480" y2="180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Thread 3 -->
    <rect x="100" y="470" width="100" height="50" rx="10" ry="10" fill="#4A90D9" filter="url(#dropshadow)"/>
    <text x="150" y="500" font-size="16" fill="#fff" text-anchor="middle">스레드 3</text>
    <line x1="150" y1="470" x2="320" y2="420" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Thread 4 -->
    <rect x="600" y="470" width="100" height="50" rx="10" ry="10" fill="#4A90D9" filter="url(#dropshadow)"/>
    <text x="650" y="500" font-size="16" fill="#fff" text-anchor="middle">스레드 4</text>
    <line x1="650" y1="470" x2="480" y2="420" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
</svg>