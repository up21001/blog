<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrowhead marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2" result="shadowOffset"/>
      <feMerge>
        <feMergeNode in="shadowOffset"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>

  <!-- Global text style -->
  <style>
    text {
      font-family: "Arial, sans-serif";
      fill: #333;
      font-size: 16px;
    }
    .code {
      font-size: 14px;
      font-weight: bold;
    }
    .title {
      font-size: 20px;
      font-weight: bold;
    }
    .status {
      font-size: 14px;
      fill: #555;
    }
  </style>

  <!-- Section 1: 소유권 이동 전 (Before Ownership Move) -->
  <text x="170" y="50" text-anchor="middle" class="title">소유권 이동 전</text>
  <text x="100" y="90" class="code">let s1 = String::from("hello");</text>

  <!-- s1 variable box (initial) -->
  <rect x="100" y="150" width="140" height="60" rx="8" ry="8" fill="white" stroke="#333" filter="url(#shadow)"/>
  <text x="170" y="185" text-anchor="middle">s1</text>
  <text x="170" y="225" text-anchor="middle" class="status">유효함</text>

  <!-- "hello" data box (initial) -->
  <rect x="100" y="250" width="140" height="60" rx="8" ry="8" fill="white" stroke="#333" filter="url(#shadow)"/>
  <text x="170" y="285" text-anchor="middle">hello</text>

  <!-- Arrow: s1 owns "hello" -->
  <path d="M170,210 V250" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Section 2: Ownership Move Operation -->
  <text x="320" y="200" class="code">let s2 = s1;</text>
  <path d="M280,200 H480" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Section 3: 소유권 이동 후 (After Ownership Move) -->
  <text x="630" y="50" text-anchor="middle" class="title">소유권 이동 후</text>

  <!-- s1 variable box (invalidated) -->
  <rect x="560" y="150" width="140" height="60" rx="8" ry="8" fill="white" stroke="#333" filter="url(#shadow)"/>
  <text x="630" y="185" text-anchor="middle">s1</text>
  <!-- X mark for invalidation -->
  <line x1="570" y1="160" x2="690" y2="200" stroke="#333" stroke-width="3"/>
  <line x1="570" y1="200" x2="690" y2="160" stroke="#333" stroke-width="3"/>
  <text x="630" y="225" text-anchor="middle" class="status">유효하지 않음</text>

  <!-- s2 variable box (new owner) -->
  <rect x="560" y="250" width="140" height="60" rx="8" ry="8" fill="white" stroke="#333" filter="url(#shadow)"/>
  <text x="630" y="285" text-anchor="middle">s2</text>
  <text x="630" y="325" text-anchor="middle" class="status">유효함</text>

  <!-- "hello" data box (now owned by s2) -->
  <rect x="560" y="350" width="140" height="60" rx="8" ry="8" fill="white" stroke="#333" filter="url(#shadow)"/>
  <text x="630" y="385" text-anchor="middle">hello</text>

  <!-- Arrow: s2 owns "hello" -->
  <path d="M630,310 V350" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

</svg>