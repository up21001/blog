<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#2D3748" text-anchor="middle" font-weight="bold">
    Canonical Huffman Tree Structure and Decoding Principle
  </text>

  <!-- Left Panel: Huffman Tree Diagram -->
  <text x="220" y="80" font-family="Arial, sans-serif" font-size="18" fill="#2D3748" text-anchor="middle" font-weight="bold">
    Huffman Decoding Tree
  </text>

  <!-- Tree Nodes and Branches -->
  <!-- Root Node -->
  <circle cx="200" cy="100" r="10" fill="#4A90D9"/>
  <text x="200" y="95" font-family="Courier New, monospace" font-size="12" fill="#f8f9fa" text-anchor="middle">Root</text>

  <!-- Level 1 Nodes -->
  <line x1="200" y1="110" x2="120" y2="160" stroke="#2D3748" stroke-width="2"/>
  <text x="150" y="140" font-family="Courier New, monospace" font-size="16" fill="#2D3748">0</text>
  <circle cx="120" cy="160" r="10" fill="#4A90D9"/>

  <line x1="200" y1="110" x2="280" y2="160" stroke="#2D3748" stroke-width="2"/>
  <text x="250" y="140" font-family="Courier New, monospace" font-size="16" fill="#2D3748">1</text>
  <circle cx="280" cy="160" r="10" fill="#4A90D9"/>

  <!-- Level 2 Nodes -->
  <!-- Branch 00 (Leaf L1) -->
  <line x1="120" y1="170" x2="80" y2="220" stroke="#2D3748" stroke-width="2"/>
  <text x="100" y="200" font-family="Courier New, monospace" font-size="16" fill="#2D3748">0</text>
  <rect x="30" y="210" width="100" height="40" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
  <text x="80" y="228" font-family="Courier New, monospace" font-size="14" fill="#2D3748" text-anchor="middle">L1 (Code: 00)</text>
  <text x="80" y="243" font-family="Courier New, monospace" font-size="12" fill="#2D3748" text-anchor="middle">Len: 2</text>

  <!-- Branch 01 (Leaf L2) -->
  <line x1="120" y1="170" x2="160" y2="220" stroke="#2D3748" stroke-width="2"/>
  <text x="140" y="200" font-family="Courier New, monospace" font-size="16" fill="#2D3748">1</text>
  <rect x="110" y="210" width="100" height="40" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="228" font-family="Courier New, monospace" font-size="14" fill="#2D3748" text-anchor="middle">L2 (Code: 01)</text>
  <text x="160" y="243" font-family="Courier New, monospace" font-size="12" fill="#2D3748" text-anchor="middle">Len: 2</text>

  <!-- Branch 10 (Internal Node) -->
  <line x1="280" y1="170" x2="240" y2="220" stroke="#2D3748" stroke-width="2"/>
  <text x="260" y="200" font-family="Courier New, monospace" font-size="16" fill="#2D3748">0</text>
  <circle cx="240" cy="220" r="10" fill="#4A90D9"/>

  <!-- Branch 11 (Internal Node) -->
  <line x1="280" y1="170" x2="320" y2="220" stroke="#2D3748" stroke-width="2"/>
  <text x="300" y="200" font-family="Courier New, monospace" font-size="16" fill="#2D3748">1</text>
  <circle cx="320" cy="220" r="10" fill="#4A90D9"/>

  <!-- Level 3 Nodes -->
  <!-- Branch 100 (Leaf L3) -->
  <line x1="240" y1="230" x2="200" y2="280" stroke="#2D3748" stroke-width="2"/>
  <text x="220" y="260" font-family="Courier New, monospace" font-size="16" fill="#2D3748">0</text>
  <rect x="150" y="270" width="100" height="40" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="288" font-family="Courier New, monospace" font-size="14" fill="#2D3748" text-anchor="middle">L3 (Code: 100)</text>
  <text x="200" y="303" font-family="Courier New, monospace" font-size="12" fill="#2D3748" text-anchor="middle">Len: 3</text>

  <!-- Branch 101 (Leaf D1) -->
  <line x1="240" y1="230" x2="280" y2="280" stroke="#2D3748" stroke-width="2"/>
  <text x="260" y="260" font-family="Courier New, monospace" font-size="16" fill="#2D3748">1</text>
  <rect x="230" y="270" width="100" height="40" fill="#FFD93D" stroke="#e2e8f0" stroke-width="1"/>
  <text x="280" y="288" font-family="Courier New, monospace" font-size="14" fill="#2D3748" text-anchor="middle">D1 (Code: 101)</text>
  <text x="280" y="303" font-family="Courier New, monospace" font-size="12" fill="#2D3748" text-anchor="middle">Len: 3</text>

  <!-- Branch 110 (Internal Node) -->
  <line x1="320" y1="230" x2="300" y2="280" stroke="#2D3748" stroke-width="2"/>
  <text x="290" y="260" font-family="Courier New, monospace" font-size="16" fill="#2D3748">0</text>
  <circle cx="300" cy="280" r="10" fill="#4A90D9"/>

  <!-- Branch 111 (Internal Node) -->
  <line x1="320" y1="230" x2="380" y2="280" stroke="#2D3748" stroke-width="2"/>
  <text x="350" y="260" font-family="Courier New, monospace" font-size="16" fill="#2D3748">1</text>
  <circle cx="380" cy="280" r="10" fill="#4A90D9"/>

  <!-- Level 4 Nodes -->
  <!-- Branch 1100 (Leaf L4) -->
  <line x1="300" y1="290" x2="260" y2="340" stroke="#2D3748" stroke-width="2"/>
  <text x="280" y="320" font-family="Courier New, monospace" font-size="16" fill="#2D3748">0</text>
  <rect x="210" y="330" width="100" height="40" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
  <text x="260" y="348" font-family="Courier New, monospace" font-size="14" fill="#2D3748" text-anchor="middle">L4 (Code: 1100)</text>
  <text x="260" y="363" font-family="Courier New, monospace" font-size="12" fill="#2D3748" text-anchor="middle">Len: 4</text>

  <!-- Branch 1101 (Leaf D2) -->
  <line x1="300" y1="290" x2="340" y2="340" stroke="#2D3748" stroke-width="2"/>
  <text x="320" y="320" font-family="Courier New, monospace" font-size="16" fill="#2D3748">1</text>
  <rect x="290" y="330" width="100" height="40" fill="#FFD93D" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="348" font-family="Courier New, monospace" font-size="14" fill="#2D3748" text-anchor="middle">D2 (Code: 1101)</text>
  <text x="340" y="363" font-family="Courier New, monospace" font-size="12" fill="#2D3748" text-anchor="middle">Len: 4</text>

  <!-- Right Panel: Canonical Code Generation -->
  <text x="590" y="80" font-family="Arial, sans-serif" font-size="18" fill="#2D3748" text-anchor="middle" font-weight="bold">
    Canonical Code Generation Steps
  </text>

  <rect x="420" y="100" width="340" height="280" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="1"/>

  <text x="430" y="125" font-family="Arial, sans-serif" font-size="16" fill="#2D3748" font-weight="bold">
    1. Count Code Length Frequencies:
  </text>
  <text x="440" y="145" font-family="Courier New, monospace" font-size="14" fill="#2D3748">  Length 2: 2 symbols (L1, L2)</text>
  <text x="440" y="165" font-family="Courier New, monospace" font-size="14" fill="#2D3748">  Length 3: 2 symbols (L3, D1)</text>
  <text x="440" y="185" font-family="Courier New, monospace" font-size="14" fill="#2D3748">  Length 4: 2 symbols (L4, D2)</text>

  <text x="430" y="215" font-family="Arial, sans-serif" font-size="16" fill="#2D3748" font-weight="bold">
    2. Sort Symbols by Length, then Value:
  </text>
  <text x="440" y="235" font-family="Courier New, monospace" font-size="14" fill="#2D3748">  L1, L2, L3, D1, L4, D2</text>

  <text x="430" y="265" font-family="Arial, sans-serif" font-size="16" fill="#2D3748" font-weight="bold">
    3. Assign Canonical Codes:
  </text>

  <!-- Table for Canonical Codes -->
  <rect x="430" y="280" width="320" height="100" fill="none" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="430" y1="305" x2="750" y2="305" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="530" y1="280" x2="530" y2="380" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="640" y1="280" x2="640" y2="380" stroke="#e2e8f0" stroke-width="1"/>

  <text x="480" y="298" font-family="Arial, sans-serif" font-size="14" fill="#2D3748" text-anchor="middle" font-weight="bold">Code Length</text>
  <text x="585" y="298" font-family="Arial, sans-serif" font-size="14" fill="#2D3748" text-anchor="middle" font-weight="bold">Smallest Code</text>
  <text x="695" y="298" font-family="Arial, sans-serif" font-size="14" fill="#2D3748" text-anchor="middle" font-weight="bold">Symbols</text>

  <text x="480" y="325" font-family="Courier New, monospace" font-size="14" fill="#2D3748" text-anchor="middle">2</text>
  <text x="585" y="325" font-family="Courier New, monospace" font-size="14" fill="#2D3748" text-anchor="middle">00</text>
  <text x="695" y="325" font-family="Courier New, monospace" font-size="14" fill="#2D3748" text-anchor="middle">L1, L2</text>

  <text x="480" y="345" font-family="Courier New, monospace" font-size="14" fill="#2D3748" text-anchor="middle">3</text>
  <text x="585" y="345" font-family="Courier New, monospace" font-size="14" fill="#2D3748" text-anchor="middle">100</text>
  <text x="695" y="345" font-family="Courier New, monospace" font-size="14" fill="#2D3748" text-anchor="middle">L3, D1</text>

  <text x="480" y="365" font-family="Courier New, monospace" font-size="14" fill="#2D3748" text-anchor="middle">4</text>
  <text x="585" y="365" font-family="Courier New, monospace" font-size="14" fill="#2D3748" text-anchor="middle">1100</text>
  <text x="695" y="365" font-family="Courier New, monospace" font-size="14" fill="#2D3748" text-anchor="middle">L4, D2</text>

  <!-- Decoding Principle Text -->
  <text x="420" y="400" font-family="Arial, sans-serif" font-size="16" fill="#2D3748" font-weight="bold">
    Decoding Principle:
  </text>
  <text x="430" y="425" font-family="Arial, sans-serif" font-size="14" fill="#2D3748">
    Start at the root. For each incoming bit (0 or 1),
  </text>
  <text x="430" y="445" font-family="Arial, sans-serif" font-size="14" fill="#2D3748">
    traverse the tree left for '0' and right for '1'.
  </text>
  <text x="430" y="465" font-family="Arial, sans-serif" font-size="14" fill="#2D3748">
    When a leaf node is reached, the symbol is decoded.
  </text>
  <text x="430" y="485" font-family="Arial, sans-serif" font-size="14" fill="#2D3748">
    Restart from the root for the next symbol.
  </text>

  <!-- Legend -->
  <text x="40" y="450" font-family="Arial, sans-serif" font-size="18" fill="#2D3748" font-weight="bold">Legend</text>
  <rect x="40" y="470" width="20" height="20" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
  <text x="70" y="485" font-family="Arial, sans-serif" font-size="14" fill="#2D3748">Literal / Length Symbol</text>

  <rect x="40" y="500" width="20" height="20" fill="#FFD93D" stroke="#e2e8f0" stroke-width="1"/>
  <text x="70" y="515" font-family="Arial, sans-serif" font-size="14" fill="#2D3748">Distance Symbol</text>

  <circle cx="50" cy="540" r="10" fill="#4A90D9"/>
  <text x="70" y="545" font-family="Arial, sans-serif" font-size="14" fill="#2D3748">Internal Node</text>

  <text x="40" y="565" font-family="Arial, sans-serif" font-size="14" fill="#D9534F">Decoding Path Example</text>

  <!-- Arrows for decoding example (101 -> D1) -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D9534F" />
    </marker>
  </defs>

  <!-- Path for "101" (D1) -->
  <!-- Root (200,100) -> Node 1 (280,160) -> Node 10 (240,220) -> Leaf D1 (280,270) -->
  <path d="M200 110 L280 150" stroke="#D9534F" stroke-width="3" marker-end="url(#arrowhead)"/>
  <path d="M280 170 L240 210" stroke="#D9534F" stroke-width="3" marker-end="url(#arrowhead)"/>
  <path d="M240 230 L280 255" stroke="#D9534F" stroke-width="3" marker-end="url(#arrowhead)"/>

</svg>