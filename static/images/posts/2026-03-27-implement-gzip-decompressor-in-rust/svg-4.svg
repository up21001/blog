<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2D3748">
    Canonical Huffman Tree Structure and Decoding Principle
  </text>

  <!-- Section 1: Canonical Code Assignment Explanation -->
  <text x="40" y="380" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2D3748">
    1. Canonical Code Assignment
  </text>
  <text x="40" y="410" font-family="Arial, sans-serif" font-size="14" fill="#2D3748">
    <tspan x="40" dy="0">Canonical Huffman codes are generated by a specific process to ensure a unique and compact</tspan>
    <tspan x="40" dy="18">representation of the Huffman tree:</tspan>
    <tspan x="40" dy="28">• First, a standard Huffman algorithm determines bit lengths for each symbol.</tspan>
    <tspan x="40" dy="18">• Symbols are sorted: primarily by code length (shortest first), then by symbol value.</tspan>
    <tspan x="40" dy="18">• Codes are assigned sequentially: the first symbol gets all zeros. Subsequent codes</tspan>
    <tspan x="40" dy="18">  increment the previous code. If length increases, the code is left-shifted.</tspan>
  </text>

  <!-- Example Table for Canonical Codes -->
  <text x="40" y="530" font-family="Arial, sans-serif" font-size="14" fill="#2D3748">
    <tspan x="40" dy="0" font-weight="bold">Example Codes:</tspan>
    <tspan x="40" dy="18">D0 (len 1): 0</tspan>
    <tspan x="140" dy="0">L0 (len 2): 10</tspan>
    <tspan x="240" dy="0">L1 (len 2): 11</tspan>
    <tspan x="340" dy="0">L2 (len 3): 1000</tspan>
    <tspan x="440" dy="0">D1 (len 3): 1001</tspan>
  </text>

  <!-- Section 2: Decoding Principle Explanation -->
  <text x="420" y="380" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2D3748">
    2. Decoding Principle
  </text>
  <text x="420" y="410" font-family="Arial, sans-serif" font-size="14" fill="#2D3748">
    <tspan x="420" dy="0">To decode a bitstream using a Canonical Huffman tree:</tspan>
    <tspan x="420" dy="28">• Start at the root of the Huffman tree.</tspan>
    <tspan x="420" dy="18">• Read one bit from the input stream.</tspan>
    <tspan x="420" dy="18">• Traverse the tree: '0' for left child, '1' for right child.</tspan>
    <tspan x="420" dy="18">• If the current node is a leaf, the corresponding symbol is found.</tspan>
    <tspan x="420" dy="18">  Output the symbol and return to the root for the next decoding cycle.</tspan>
    <tspan x="420" dy="18">• If the current node is an internal node, continue reading bits.</tspan>
  </text>

  <!-- Tree Nodes (Rectangles and Circles) -->
  <!-- Internal Nodes -->
  <circle cx="400" cy="100" r="10" fill="#4A90D9"/> <!-- Root -->
  <circle cx="500" cy="150" r="10" fill="#4A90D9"/> <!-- Node 1 -->
  <circle cx="400" cy="200" r="10" fill="#4A90D9"/> <!-- Node 10 -->
  <circle cx="600" cy="200" r="10" fill="#4A90D9"/> <!-- Node 11 -->
  <circle cx="300" cy="250" r="10" fill="#4A90D9"/> <!-- Node 100 -->

  <!-- Leaf Nodes (Symbols) -->
  <!-- D0 (0) -->
  <rect x="270" y="140" width="60" height="30" rx="5" ry="5" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="158" font-family="Courier New, monospace" font-size="14" text-anchor="middle" fill="#2D3748">D0 (0)</text>

  <!-- L0 (10) -->
  <rect x="470" y="240" width="60" height="30" rx="5" ry="5" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="258" font-family="Courier New, monospace" font-size="14" text-anchor="middle" fill="#2D3748">L0 (10)</text>

  <!-- L1 (11) -->
  <rect x="670" y="240" width="60" height="30" rx="5" ry="5" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
  <text x="700" y="258" font-family="Courier New, monospace" font-size="14" text-anchor="middle" fill="#2D3748">L1 (11)</text>

  <!-- L2 (1000) -->
  <rect x="170" y="290" width="60" height="30" rx="5" ry="5" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="308" font-family="Courier New, monospace" font-size="14" text-anchor="middle" fill="#2D3748">L2 (1000)</text>

  <!-- D1 (1001) -->
  <rect x="370" y="290" width="60" height="30" rx="5" ry="5" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="308" font-family="Courier New, monospace" font-size="14" text-anchor="middle" fill="#2D3748">D1 (1001)</text>

  <!-- Bit labels -->
  <text x="340" y="130" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0</text>
  <text x="460" y="130" font-family="Courier New, monospace" font-size="14" fill="#2D3748">1</text>

  <text x="440" y="180" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0</text>
  <text x="560" y="180" font-family="Courier New, monospace" font-size="14" fill="#2D3748">1</text>

  <text x="340" y="230" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0</text>
  <text x="540" y="230" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0</text>
  <text x="740" y="230" font-family="Courier New, monospace" font-size="14" fill="#2D3748">1</text>

  <text x="240" y="280" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0</text>
  <text x="340" y="280" font-family="Courier New, monospace" font-size="14" fill="#2D3748">1</text>

  <!-- Arrows (drawn last) -->
  <!-- Root (400,100) to D0 (300,140) -->
  <line x1="390" y1="105" x2="300" y2="125" stroke="#2D3748" stroke-width="1.5"/>
  <!-- Root (400,100) to Node 1 (500,150) -->
  <line x1="410" y1="105" x2="490" y2="145" stroke="#2D3748" stroke-width="1.5"/>

  <!-- Node 1 (500,150) to Node 10 (400,200) -->
  <line x1="490" y1="155" x2="410" y2="195" stroke="#2D3748" stroke-width="1.5"/>
  <!-- Node 1 (500,150) to Node 11 (600,200) -->
  <line x1="510" y1="155" x2="590" y2="195" stroke="#2D3748" stroke-width="1.5"/>

  <!-- Node 10 (400,200) to Node 100 (300,250) -->
  <line x1="390" y1="205" x2="310" y2="245" stroke="#2D3748" stroke-width="1.5"/>

  <!-- Node 11 (600,200) to L0 (500,240) -->
  <line x1="590" y1="205" x2="500" y2="225" stroke="#2D3748" stroke-width="1.5"/>
  <!-- Node 11 (600,200) to L1 (700,240) -->
  <line x1="610" y1="205" x2="700" y2="225" stroke="#2D3748" stroke-width="1.5"/>

  <!-- Node 100 (300,250) to L2 (200,290) -->
  <line x1="290" y1="255" x2="200" y2="275" stroke="#2D3748" stroke-width="1.5"/>
  <!-- Node 100 (300,250) to D1 (400,290) -->
  <line x1="310" y1="255" x2="400" y2="275" stroke="#2D3748" stroke-width="1.5"/>

</svg>