<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">AI Deep Research 작동 원리</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">자율 에이전트가 수십 개 소스를 탐색하여 보고서를 생성하는 과정</text>

  <!-- Step 1 -->
  <rect x="30" y="80" width="148" height="80" rx="10" fill="#6366f1"/>
  <text x="104" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">1단계</text>
  <text x="104" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#c7d2fe">사용자 질문</text>
  <text x="104" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c7d2fe">의도 분석</text>
  <line x1="178" y1="120" x2="200" y2="120" stroke="#6366f1" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <rect x="200" y="80" width="148" height="80" rx="10" fill="#4285f4"/>
  <text x="274" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">2단계</text>
  <text x="274" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bfdbfe">탐색 계획 수립</text>
  <text x="274" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bfdbfe">검색어 생성</text>
  <line x1="348" y1="120" x2="370" y2="120" stroke="#4285f4" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 3 -->
  <rect x="370" y="80" width="148" height="80" rx="10" fill="#10a37f"/>
  <text x="444" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">3단계</text>
  <text x="444" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a7f3d0">웹 자율 탐색</text>
  <text x="444" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a7f3d0">소스 수집</text>
  <line x1="518" y1="120" x2="540" y2="120" stroke="#10a37f" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 4 -->
  <rect x="540" y="80" width="148" height="80" rx="10" fill="#f39c12"/>
  <text x="614" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">4단계</text>
  <text x="614" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fef3c7">정보 추출</text>
  <text x="614" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fef3c7">신뢰도 검증</text>

  <!-- Arrows down -->
  <line x1="104" y1="160" x2="104" y2="185" stroke="#6366f1" stroke-width="2" marker-end="url(#a)"/>
  <line x1="614" y1="160" x2="614" y2="185" stroke="#f39c12" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 5: Synthesis (center) -->
  <rect x="200" y="185" width="400" height="85" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
  <text x="400" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6366f1">5단계 — 통합 분석 및 보고서 작성</text>
  <text x="400" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">수집된 정보 교차 검증 → 모순 해결 → 구조화</text>
  <text x="400" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">인용 첨부 → 최종 보고서 생성</text>
  <line x1="104" y1="185" x2="200" y2="228" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="614" y1="185" x2="600" y2="228" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Arrow to output -->
  <line x1="400" y1="270" x2="400" y2="295" stroke="#6366f1" stroke-width="2" marker-end="url(#a)"/>

  <!-- Output -->
  <rect x="100" y="295" width="600" height="90" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6366f1">최종 출력: 구조화된 심층 보고서</text>
  <text x="220" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">📋 목차 포함</text>
  <text x="340" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">📎 출처 인용</text>
  <text x="460" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">📊 데이터 분석</text>
  <text x="580" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">✅ 검증 완료</text>
  <text x="220" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">섹션별 정리</text>
  <text x="340" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">URL 링크 포함</text>
  <text x="460" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">차트·그래프</text>
  <text x="580" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">팩트체크됨</text>

  <!-- Timeline -->
  <rect x="100" y="405" width="600" height="40" rx="8" fill="#fff" stroke="#bdc3c7" stroke-width="1"/>
  <text x="400" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">전체 소요 시간: 약 3~15분</text>
  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Perplexity 가장 빠름 · Gemini 가장 광범위 · ChatGPT 데이터 분석 강점</text>

  <text x="400" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">자율 에이전트가 인간 리서처처럼 스스로 탐색 경로를 결정</text>
</svg>
