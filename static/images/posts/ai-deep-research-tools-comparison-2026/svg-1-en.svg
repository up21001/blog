  <text x="585" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">analysis → Full report generation</text>

  <text x="595" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">Research Depth</text>
