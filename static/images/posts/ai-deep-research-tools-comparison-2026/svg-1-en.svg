  <rect x="450" y="438" width="270" height="22" rx="11" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="585" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6366f1">Complex research · Competitor analysis</text>

  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">Perplexity · Gemini · ChatGPT · Claude all offer Deep Research features</text>
