<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <rect width="820" height="480" fill="#FFFFFF"/>
  <rect x="0" y="0" width="820" height="60" fill="#F0FDF4" rx="0"/>
  <text x="410" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#14532D">Traditional Coding vs Vibe Coding</text>
  <text x="410" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">The Fundamental Difference Between Two Development Approaches</text>

  <!-- Headers -->
  <rect x="30" y="80" width="220" height="44" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="140" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#475569">Category</text>

  <rect x="270" y="80" width="240" height="44" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="390" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8">🖥️ Traditional Coding</text>

  <rect x="530" y="80" width="260" height="44" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="660" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803D">✨ Vibe Coding</text>

  <!-- Row 1 -->
  <rect x="30" y="138" width="220" height="52" rx="0" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="140" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#334155">How Code Is Written</text>

  <rect x="270" y="138" width="240" height="52" rx="0" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1"/>
  <text x="390" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Manually type every line</text>
  <text x="390" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Syntax mastery required</text>

  <rect x="530" y="138" width="260" height="52" rx="0" fill="#F0FDF4" stroke="#E2E8F0" stroke-width="1"/>
  <text x="660" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">Describe in natural language</text>
  <text x="660" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">AI translates to code</text>

  <!-- Row 2 -->
  <rect x="30" y="190" width="220" height="52" rx="0" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="140" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#334155">Prior Knowledge Needed</text>

  <rect x="270" y="190" width="240" height="52" rx="0" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1"/>
  <text x="390" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Deep language syntax knowledge</text>
  <text x="390" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">API documentation reading</text>

  <rect x="530" y="190" width="260" height="52" rx="0" fill="#F0FDF4" stroke="#E2E8F0" stroke-width="1"/>
  <text x="660" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">Clear problem definition skills</text>
  <text x="660" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">No syntax memorization needed</text>

  <!-- Row 3 -->
  <rect x="30" y="242" width="220" height="52" rx="0" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="140" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#334155">Development Speed</text>

  <rect x="270" y="242" width="240" height="52" rx="0" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1"/>
  <text x="390" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">MVP takes days to weeks</text>
  <text x="390" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Debugging consumes much time</text>

  <rect x="530" y="242" width="260" height="52" rx="0" fill="#F0FDF4" stroke="#E2E8F0" stroke-width="1"/>
  <text x="660" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">MVP in hours</text>
  <text x="660" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">Fast iteration cycles</text>

  <!-- Row 4 -->
  <rect x="30" y="294" width="220" height="52" rx="0" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="140" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#334155">Developer's Role</text>

  <rect x="270" y="294" width="240" height="52" rx="0" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1"/>
  <text x="390" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Handles both design and impl.</text>
  <text x="390" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Writing code is core work</text>

  <rect x="530" y="294" width="260" height="52" rx="0" fill="#F0FDF4" stroke="#E2E8F0" stroke-width="1"/>
  <text x="660" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">Design, review, direction</text>
  <text x="660" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">AI handles implementation</text>

  <!-- Row 5 -->
  <rect x="30" y="346" width="220" height="52" rx="0" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="140" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#334155">Best Suited For</text>

  <rect x="270" y="346" width="240" height="52" rx="0" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1"/>
  <text x="390" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Experienced developers</text>
  <text x="390" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Complex system architecture</text>

  <rect x="530" y="346" width="260" height="52" rx="0" fill="#F0FDF4" stroke="#E2E8F0" stroke-width="1"/>
  <text x="660" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">Developers + non-developers</text>
  <text x="660" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">Prototyping, automation</text>

  <text x="410" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Traditional Coding vs Vibe Coding · 2026</text>
</svg>
