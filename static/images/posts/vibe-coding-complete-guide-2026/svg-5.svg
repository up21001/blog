<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <rect width="820" height="480" fill="#FFFFFF"/>
  <rect x="0" y="0" width="820" height="60" fill="#F0FDF4" rx="0"/>
  <text x="410" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#14532D">바이브 코딩 베스트 프랙티스 5가지</text>
  <text x="410" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">좋은 결과를 얻기 위한 핵심 원칙</text>

  <!-- Practice 1 -->
  <rect x="30" y="80" width="760" height="70" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="30" y="80" width="56" height="70" rx="10" fill="#3B82F6"/>
  <text x="58" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">01</text>
  <text x="120" y="108" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8">구체적이고 명확한 프롬프트 작성</text>
  <text x="120" y="132" font-family="Arial, sans-serif" font-size="12" fill="#475569">기술 스택, 기능 범위, 제약 조건을 명시할수록 결과물의 품질이 높아집니다. "앱 만들어줘" → "Next.js + Prisma + PostgreSQL으로 로그인·게시판 앱 만들어줘"</text>

  <!-- Practice 2 -->
  <rect x="30" y="165" width="760" height="70" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <rect x="30" y="165" width="56" height="70" rx="10" fill="#22C55E"/>
  <text x="58" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">02</text>
  <text x="120" y="193" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803D">작은 단위로 나눠서 요청하기</text>
  <text x="120" y="217" font-family="Arial, sans-serif" font-size="12" fill="#475569">한 번에 전체 시스템을 요청하면 실패 확률이 높습니다. DB 스키마 → API → 프론트엔드 순으로 단계적으로 진행하세요.</text>

  <!-- Practice 3 -->
  <rect x="30" y="250" width="760" height="70" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="30" y="250" width="56" height="70" rx="10" fill="#F59E0B"/>
  <text x="58" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">03</text>
  <text x="120" y="278" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#B45309">생성된 코드 반드시 이해하고 검토</text>
  <text x="120" y="302" font-family="Arial, sans-serif" font-size="12" fill="#475569">AI 코드를 무조건 실행하지 마세요. "이 코드 설명해줘"로 동작 원리를 파악하고, 보안 취약점·로직 오류를 직접 확인합니다.</text>

  <!-- Practice 4 -->
  <rect x="30" y="335" width="760" height="70" rx="10" fill="#FDF4FF" stroke="#A855F7" stroke-width="1.5"/>
  <rect x="30" y="335" width="56" height="70" rx="10" fill="#A855F7"/>
  <text x="58" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">04</text>
  <text x="120" y="363" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7E22CE">Git 커밋으로 단계별 버전 관리</text>
  <text x="120" y="387" font-family="Arial, sans-serif" font-size="12" fill="#475569">AI 수정 후 예상치 못한 변경이 생길 수 있습니다. 각 기능 완성 시 즉시 커밋하여 문제 발생 시 롤백할 수 있게 합니다.</text>

  <!-- Practice 5 -->
  <rect x="30" y="420" width="760" height="38" rx="10" fill="#FFF1F2" stroke="#F43F5E" stroke-width="1.5"/>
  <rect x="30" y="420" width="56" height="38" rx="10" fill="#F43F5E"/>
  <text x="58" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">05</text>
  <text x="120" y="436" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#BE123C">보안·인증 코드는 반드시 직접 검토</text>
  <text x="440" y="450" font-family="Arial, sans-serif" font-size="12" fill="#475569">인증·권한·입력 검증 등 보안 관련 코드는 사람이 최종 확인합니다.</text>
</svg>
