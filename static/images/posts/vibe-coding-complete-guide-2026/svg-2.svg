<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <rect width="820" height="480" fill="#FFFFFF"/>
  <rect x="0" y="0" width="820" height="60" fill="#F0FDF4" rx="0"/>
  <text x="410" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#14532D">전통 코딩 vs 바이브 코딩</text>
  <text x="410" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">두 가지 개발 방식의 근본적인 차이</text>

  <!-- Headers -->
  <rect x="30" y="80" width="220" height="44" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="140" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#475569">비교 항목</text>

  <rect x="270" y="80" width="240" height="44" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="390" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8">🖥️ 전통 코딩</text>

  <rect x="530" y="80" width="260" height="44" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="660" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803D">✨ 바이브 코딩</text>

  <!-- Row 1 -->
  <rect x="30" y="138" width="220" height="52" rx="0" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="140" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#334155">코드 작성 방법</text>

  <rect x="270" y="138" width="240" height="52" rx="0" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1"/>
  <text x="390" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">문법을 직접 타이핑</text>
  <text x="390" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">줄 단위로 작성</text>

  <rect x="530" y="138" width="260" height="52" rx="0" fill="#F0FDF4" stroke="#E2E8F0" stroke-width="1"/>
  <text x="660" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">자연어로 설명</text>
  <text x="660" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">AI가 코드로 변환</text>

  <!-- Row 2 -->
  <rect x="30" y="190" width="220" height="52" rx="0" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="140" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#334155">필요한 사전 지식</text>

  <rect x="270" y="190" width="240" height="52" rx="0" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1"/>
  <text x="390" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">언어 문법 숙달 필수</text>
  <text x="390" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">API 문서 독해 능력</text>

  <rect x="530" y="190" width="260" height="52" rx="0" fill="#F0FDF4" stroke="#E2E8F0" stroke-width="1"/>
  <text x="660" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">문제 정의 능력 중요</text>
  <text x="660" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">문법 암기 불필요</text>

  <!-- Row 3 -->
  <rect x="30" y="242" width="220" height="52" rx="0" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="140" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#334155">개발 속도</text>

  <rect x="270" y="242" width="240" height="52" rx="0" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1"/>
  <text x="390" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">MVP 제작에 수일~수주</text>
  <text x="390" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">디버깅에 많은 시간 소요</text>

  <rect x="530" y="242" width="260" height="52" rx="0" fill="#F0FDF4" stroke="#E2E8F0" stroke-width="1"/>
  <text x="660" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">MVP를 수 시간 내 완성</text>
  <text x="660" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">반복·수정이 빠름</text>

  <!-- Row 4 -->
  <rect x="30" y="294" width="220" height="52" rx="0" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="140" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#334155">개발자의 역할</text>

  <rect x="270" y="294" width="240" height="52" rx="0" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1"/>
  <text x="390" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">설계 + 구현 모두 담당</text>
  <text x="390" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">코드 작성이 핵심 업무</text>

  <rect x="530" y="294" width="260" height="52" rx="0" fill="#F0FDF4" stroke="#E2E8F0" stroke-width="1"/>
  <text x="660" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">설계·검토·방향 설정</text>
  <text x="660" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">AI가 구현 담당</text>

  <!-- Row 5 -->
  <rect x="30" y="346" width="220" height="52" rx="0" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="140" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#334155">최적 사용 대상</text>

  <rect x="270" y="346" width="240" height="52" rx="0" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1"/>
  <text x="390" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">숙련 개발자</text>
  <text x="390" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">복잡한 시스템 구축 시</text>

  <rect x="530" y="346" width="260" height="52" rx="0" fill="#F0FDF4" stroke="#E2E8F0" stroke-width="1"/>
  <text x="660" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">개발자 + 비개발자 모두</text>
  <text x="660" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">프로토타이핑, 자동화</text>

  <text x="410" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">전통 코딩 vs 바이브 코딩 비교 · 2026</text>
</svg>
