<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" width="820" height="460">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="820" height="460" fill="#FFFFFF"/>
  <rect x="0" y="0" width="820" height="60" fill="#F0F9FF" rx="0"/>
  <text x="410" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0C4A6E">Vibe Coding Workflow</text>
  <text x="410" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">From Idea to Working Code — 5-Step Process</text>

  <!-- Step 1 -->
  <rect x="30" y="100" width="130" height="80" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="95" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">💡</text>
  <text x="95" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1D4ED8">Idea</text>
  <text x="95" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3B82F6">What to build</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="140" x2="192" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2 -->
  <rect x="195" y="100" width="130" height="80" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="260" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">✍️</text>
  <text x="260" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6D28D9">Prompt</text>
  <text x="260" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8B5CF6">Describe in plain language</text>

  <!-- Arrow 2 -->
  <line x1="325" y1="140" x2="357" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3 -->
  <rect x="360" y="100" width="130" height="80" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="425" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">🤖</text>
  <text x="425" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#15803D">AI Generation</text>
  <text x="425" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#22C55E">Instant code draft</text>

  <!-- Arrow 3 -->
  <line x1="490" y1="140" x2="522" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4 -->
  <rect x="525" y="100" width="130" height="80" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="590" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">🔍</text>
  <text x="590" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#B45309">Review &amp; Refine</text>
  <text x="590" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#F59E0B">Code review &amp; improve</text>

  <!-- Arrow 4 -->
  <line x1="655" y1="140" x2="687" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 5 -->
  <rect x="690" y="100" width="105" height="80" rx="12" fill="#FFF1F2" stroke="#F43F5E" stroke-width="2"/>
  <text x="742" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">🚀</text>
  <text x="742" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#BE123C">Deploy</text>
  <text x="742" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#F43F5E">Ship it</text>

  <!-- Benefits Section -->
  <rect x="30" y="220" width="760" height="220" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="410" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E293B">Core Benefits of Vibe Coding</text>

  <!-- Benefit 1 -->
  <rect x="55" y="262" width="160" height="90" rx="10" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="135" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">⚡</text>
  <text x="135" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1D4ED8">5–10x Speed</text>
  <text x="135" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Prototypes in hours, not weeks</text>

  <!-- Benefit 2 -->
  <rect x="240" y="262" width="160" height="90" rx="10" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <text x="320" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🎯</text>
  <text x="320" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6D28D9">Stay in Flow</text>
  <text x="320" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Logic focus, AI handles syntax</text>

  <!-- Benefit 3 -->
  <rect x="425" y="262" width="160" height="90" rx="10" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="505" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🌱</text>
  <text x="505" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#15803D">Low Barrier</text>
  <text x="505" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Non-devs can build apps</text>

  <!-- Benefit 4 -->
  <rect x="610" y="262" width="150" height="90" rx="10" fill="#FFFFFF" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="685" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">💰</text>
  <text x="685" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#C2410C">Lower Cost</text>
  <text x="685" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Small teams, bigger output</text>

  <text x="410" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Vibe Coding Workflow · 2026</text>
</svg>
