<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <rect width="820" height="480" fill="#FFFFFF"/>
  <rect x="0" y="0" width="820" height="60" fill="#FFF7ED" rx="0"/>
  <text x="410" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#7C2D12">바이브 코딩 실전 활용 분야</text>
  <text x="410" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">지금 바로 바이브 코딩을 적용할 수 있는 6가지 핵심 영역</text>

  <!-- Card 1: 웹 프로토타이핑 -->
  <rect x="30" y="80" width="240" height="160" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="150" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="30">🌐</text>
  <text x="150" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8">웹 프로토타이핑</text>
  <text x="150" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">아이디어를 수 시간 내</text>
  <text x="150" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">동작하는 앱으로 구현</text>
  <text x="150" y="203" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3B82F6">React / Next.js / Svelte</text>
  <text x="150" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">✓ 스타트업 MVP 개발</text>

  <!-- Card 2: 데이터 분석 -->
  <rect x="290" y="80" width="240" height="160" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="410" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="30">📊</text>
  <text x="410" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803D">데이터 분석 자동화</text>
  <text x="410" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">비개발자도 Python으로</text>
  <text x="410" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">데이터 처리·시각화</text>
  <text x="410" y="203" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#22C55E">pandas / matplotlib / seaborn</text>
  <text x="410" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">✓ 마케팅·분석 팀 활용</text>

  <!-- Card 3: API 연동 -->
  <rect x="550" y="80" width="240" height="160" rx="12" fill="#FDF4FF" stroke="#A855F7" stroke-width="1.5"/>
  <text x="670" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="30">🔌</text>
  <text x="670" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7E22CE">API 연동 백엔드</text>
  <text x="670" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">REST API, DB 연결</text>
  <text x="670" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">서버 로직 빠르게 구현</text>
  <text x="670" y="203" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#A855F7">FastAPI / Express / Supabase</text>
  <text x="670" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">✓ 백엔드 반복 작업 자동화</text>

  <!-- Card 4: 자동화 스크립트 -->
  <rect x="30" y="260" width="240" height="160" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="150" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="30">⚙️</text>
  <text x="150" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#B45309">업무 자동화 스크립트</text>
  <text x="150" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">반복 작업, 파일 처리</text>
  <text x="150" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">웹 스크래핑 자동화</text>
  <text x="150" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#F59E0B">Python / Bash / PowerShell</text>
  <text x="150" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">✓ 운영·DevOps 팀 활용</text>

  <!-- Card 5: UI 컴포넌트 -->
  <rect x="290" y="260" width="240" height="160" rx="12" fill="#FFF1F2" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="410" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="30">🎨</text>
  <text x="410" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#BE123C">UI 컴포넌트 생성</text>
  <text x="410" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">디자인 → 코드 변환</text>
  <text x="410" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">반응형 레이아웃 즉시</text>
  <text x="410" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#F43F5E">Tailwind / shadcn/ui</text>
  <text x="410" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">✓ 디자이너·퍼블리셔 활용</text>

  <!-- Card 6: 테스트 코드 -->
  <rect x="550" y="260" width="240" height="160" rx="12" fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="670" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="30">🧪</text>
  <text x="670" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0369A1">테스트 코드 자동 생성</text>
  <text x="670" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">기존 코드 → 단위 테스트</text>
  <text x="670" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">커버리지 빠르게 향상</text>
  <text x="670" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0EA5E9">Jest / pytest / Vitest</text>
  <text x="670" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">✓ QA·개발팀 생산성 향상</text>

  <text x="410" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">바이브 코딩 활용 분야 · 2026</text>
</svg>
