<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="45" text-anchor="middle" font-family="Segoe UI" font-size="24" font-weight="bold" fill="#ffffff">딥페이크 탐지 포인트 체크리스트</text>
  <line x1="270" y1="58" x2="630" y2="58" stroke="#e040fb" stroke-width="2"/>
  <!-- Left column: Visual -->
  <text x="230" y="95" text-anchor="middle" font-family="Segoe UI" font-size="17" font-weight="bold" fill="#e040fb">영상·이미지 탐지</text>
  <rect x="50" y="110" width="360" height="52" rx="8" fill="#1a1a3e" stroke="#e040fb" stroke-width="1"/>
  <text x="80" y="132" font-family="Segoe UI" font-size="18" fill="#69f0ae">✓</text>
  <text x="105" y="132" font-family="Segoe UI" font-size="13" fill="#e0e0e0">눈 깜빡임 빈도가 비정상적으로 낮은가?</text>
  <text x="105" y="150" font-family="Segoe UI" font-size="10" fill="#8888bb">딥페이크 영상은 눈 깜빡임 패턴이 불규칙합니다</text>
  <rect x="50" y="170" width="360" height="52" rx="8" fill="#1a1a3e" stroke="#e040fb" stroke-width="1"/>
  <text x="80" y="192" font-family="Segoe UI" font-size="18" fill="#69f0ae">✓</text>
  <text x="105" y="192" font-family="Segoe UI" font-size="13" fill="#e0e0e0">얼굴 윤곽과 배경 경계가 흐릿한가?</text>
  <text x="105" y="210" font-family="Segoe UI" font-size="10" fill="#8888bb">합성 경계면에서 블러링 현상이 발생합니다</text>
  <rect x="50" y="230" width="360" height="52" rx="8" fill="#1a1a3e" stroke="#e040fb" stroke-width="1"/>
  <text x="80" y="252" font-family="Segoe UI" font-size="18" fill="#69f0ae">✓</text>
  <text x="105" y="252" font-family="Segoe UI" font-size="13" fill="#e0e0e0">피부 질감·조명이 일관되지 않는가?</text>
  <text x="105" y="270" font-family="Segoe UI" font-size="10" fill="#8888bb">합성 부위와 원본의 조명 방향 차이 확인</text>
  <rect x="50" y="290" width="360" height="52" rx="8" fill="#1a1a3e" stroke="#e040fb" stroke-width="1"/>
  <text x="80" y="312" font-family="Segoe UI" font-size="18" fill="#69f0ae">✓</text>
  <text x="105" y="312" font-family="Segoe UI" font-size="13" fill="#e0e0e0">입 모양과 음성이 어긋나는가?</text>
  <text x="105" y="330" font-family="Segoe UI" font-size="10" fill="#8888bb">립싱크 불일치는 딥페이크의 대표적 단서</text>
  <!-- Right column: Audio & Meta -->
  <text x="670" y="95" text-anchor="middle" font-family="Segoe UI" font-size="17" font-weight="bold" fill="#4facfe">음성·메타데이터 탐지</text>
  <rect x="490" y="110" width="360" height="52" rx="8" fill="#1a1a3e" stroke="#4facfe" stroke-width="1"/>
  <text x="520" y="132" font-family="Segoe UI" font-size="18" fill="#69f0ae">✓</text>
  <text x="545" y="132" font-family="Segoe UI" font-size="13" fill="#e0e0e0">음성에 기계적 잡음이 섞여 있는가?</text>
  <text x="545" y="150" font-family="Segoe UI" font-size="10" fill="#8888bb">AI 합성 음성은 미세한 금속성 울림이 있습니다</text>
  <rect x="490" y="170" width="360" height="52" rx="8" fill="#1a1a3e" stroke="#4facfe" stroke-width="1"/>
  <text x="520" y="192" font-family="Segoe UI" font-size="18" fill="#69f0ae">✓</text>
  <text x="545" y="192" font-family="Segoe UI" font-size="13" fill="#e0e0e0">감정 표현이 단조롭거나 부자연스러운가?</text>
  <text x="545" y="210" font-family="Segoe UI" font-size="10" fill="#8888bb">AI는 미묘한 감정 변화를 완벽히 재현하기 어렵습니다</text>
  <rect x="490" y="230" width="360" height="52" rx="8" fill="#1a1a3e" stroke="#4facfe" stroke-width="1"/>
  <text x="520" y="252" font-family="Segoe UI" font-size="18" fill="#69f0ae">✓</text>
  <text x="545" y="252" font-family="Segoe UI" font-size="13" fill="#e0e0e0">영상 메타데이터가 제거되었는가?</text>
  <text x="545" y="270" font-family="Segoe UI" font-size="10" fill="#8888bb">원본 출처를 숨기기 위해 EXIF 데이터를 삭제합니다</text>
  <rect x="490" y="290" width="360" height="52" rx="8" fill="#1a1a3e" stroke="#4facfe" stroke-width="1"/>
  <text x="520" y="312" font-family="Segoe UI" font-size="18" fill="#69f0ae">✓</text>
  <text x="545" y="312" font-family="Segoe UI" font-size="13" fill="#e0e0e0">출처가 불분명하거나 검증 불가능한가?</text>
  <text x="545" y="330" font-family="Segoe UI" font-size="10" fill="#8888bb">공식 채널이 아닌 경로로 유포된 영상 주의</text>
  <!-- Tool recommendations -->
  <rect x="50" y="365" width="800" height="55" rx="10" fill="#1a1a3e" stroke="#69f0ae" stroke-width="1.2"/>
  <text x="450" y="388" text-anchor="middle" font-family="Segoe UI" font-size="14" font-weight="bold" fill="#69f0ae">추천 탐지 도구</text>
  <text x="450" y="410" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#b0b0d0">Microsoft Video Authenticator  |  Sensity AI  |  Deepware Scanner  |  FakeCatcher (Intel)  |  Google Reverse Image Search</text>
  <!-- Bottom note -->
  <text x="450" y="460" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#6666aa">※ 2개 이상 항목에 해당하면 딥페이크 가능성이 높습니다. 반드시 교차 검증하세요.</text>
  <rect x="50" y="472" width="800" height="20" rx="5" fill="none"/>
  <text x="450" y="488" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#555580">AI 기술의 발전으로 탐지가 점점 어려워지고 있으므로, 도구와 육안 확인을 병행해야 합니다</text>
</svg>