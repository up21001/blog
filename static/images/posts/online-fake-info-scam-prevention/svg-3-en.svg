<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="45" text-anchor="middle" font-family="Segoe UI" font-size="24" font-weight="bold" fill="#ffffff">Deepfake Detection Checklist</text>
  <line x1="270" y1="58" x2="630" y2="58" stroke="#e040fb" stroke-width="2"/>
  <text x="230" y="95" text-anchor="middle" font-family="Segoe UI" font-size="17" font-weight="bold" fill="#e040fb">Visual Detection</text>
  <rect x="50" y="110" width="360" height="52" rx="8" fill="#1a1a3e" stroke="#e040fb" stroke-width="1"/>
  <text x="80" y="132" font-family="Segoe UI" font-size="18" fill="#69f0ae">✓</text>
  <text x="105" y="132" font-family="Segoe UI" font-size="13" fill="#e0e0e0">Abnormally low blink frequency?</text>
  <text x="105" y="150" font-family="Segoe UI" font-size="10" fill="#8888bb">Deepfake videos often have irregular blink patterns</text>
  <rect x="50" y="170" width="360" height="52" rx="8" fill="#1a1a3e" stroke="#e040fb" stroke-width="1"/>
  <text x="80" y="192" font-family="Segoe UI" font-size="18" fill="#69f0ae">✓</text>
  <text x="105" y="192" font-family="Segoe UI" font-size="13" fill="#e0e0e0">Blurry face-background boundary?</text>
  <text x="105" y="210" font-family="Segoe UI" font-size="10" fill="#8888bb">Blurring occurs at synthesis boundaries</text>
  <rect x="50" y="230" width="360" height="52" rx="8" fill="#1a1a3e" stroke="#e040fb" stroke-width="1"/>
  <text x="80" y="252" font-family="Segoe UI" font-size="18" fill="#69f0ae">✓</text>
  <text x="105" y="252" font-family="Segoe UI" font-size="13" fill="#e0e0e0">Inconsistent skin texture or lighting?</text>
  <text x="105" y="270" font-family="Segoe UI" font-size="10" fill="#8888bb">Check lighting direction between synthesized and original areas</text>
  <rect x="50" y="290" width="360" height="52" rx="8" fill="#1a1a3e" stroke="#e040fb" stroke-width="1"/>
  <text x="80" y="312" font-family="Segoe UI" font-size="18" fill="#69f0ae">✓</text>
  <text x="105" y="312" font-family="Segoe UI" font-size="13" fill="#e0e0e0">Lip movement mismatched with audio?</text>
  <text x="105" y="330" font-family="Segoe UI" font-size="10" fill="#8888bb">Lip-sync mismatch is a classic deepfake indicator</text>
  <text x="670" y="95" text-anchor="middle" font-family="Segoe UI" font-size="17" font-weight="bold" fill="#4facfe">Audio &amp; Metadata Detection</text>
  <rect x="490" y="110" width="360" height="52" rx="8" fill="#1a1a3e" stroke="#4facfe" stroke-width="1"/>
  <text x="520" y="132" font-family="Segoe UI" font-size="18" fill="#69f0ae">✓</text>
  <text x="545" y="132" font-family="Segoe UI" font-size="13" fill="#e0e0e0">Mechanical noise in the audio?</text>
  <text x="545" y="150" font-family="Segoe UI" font-size="10" fill="#8888bb">AI-synthesized voices often have subtle metallic resonance</text>
  <rect x="490" y="170" width="360" height="52" rx="8" fill="#1a1a3e" stroke="#4facfe" stroke-width="1"/>
  <text x="520" y="192" font-family="Segoe UI" font-size="18" fill="#69f0ae">✓</text>
  <text x="545" y="192" font-family="Segoe UI" font-size="13" fill="#e0e0e0">Flat or unnatural emotional expression?</text>
  <text x="545" y="210" font-family="Segoe UI" font-size="10" fill="#8888bb">AI struggles to perfectly reproduce subtle emotions</text>
  <rect x="490" y="230" width="360" height="52" rx="8" fill="#1a1a3e" stroke="#4facfe" stroke-width="1"/>
  <text x="520" y="252" font-family="Segoe UI" font-size="18" fill="#69f0ae">✓</text>
  <text x="545" y="252" font-family="Segoe UI" font-size="13" fill="#e0e0e0">Video metadata stripped?</text>
  <text x="545" y="270" font-family="Segoe UI" font-size="10" fill="#8888bb">EXIF data is often deleted to hide the original source</text>
  <rect x="490" y="290" width="360" height="52" rx="8" fill="#1a1a3e" stroke="#4facfe" stroke-width="1"/>
  <text x="520" y="312" font-family="Segoe UI" font-size="18" fill="#69f0ae">✓</text>
  <text x="545" y="312" font-family="Segoe UI" font-size="13" fill="#e0e0e0">Unverifiable or unclear source?</text>
  <text x="545" y="330" font-family="Segoe UI" font-size="10" fill="#8888bb">Be cautious of videos distributed through unofficial channels</text>
  <rect x="50" y="365" width="800" height="55" rx="10" fill="#1a1a3e" stroke="#69f0ae" stroke-width="1.2"/>
  <text x="450" y="388" text-anchor="middle" font-family="Segoe UI" font-size="14" font-weight="bold" fill="#69f0ae">Recommended Detection Tools</text>
  <text x="450" y="410" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#b0b0d0">Microsoft Video Authenticator  |  Sensity AI  |  Deepware Scanner  |  FakeCatcher (Intel)  |  Google Reverse Image Search</text>
  <text x="450" y="460" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#6666aa">* If 2 or more items apply, deepfake probability is high. Always cross-verify.</text>
  <text x="450" y="488" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#555580">As AI advances, detection grows harder — combine tools with manual verification</text>
</svg>