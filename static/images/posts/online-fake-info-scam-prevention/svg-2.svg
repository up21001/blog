<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="timeline-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff416c"/>
      <stop offset="50%" style="stop-color:#e040fb"/>
      <stop offset="100%" style="stop-color:#4facfe"/>
    </linearGradient>
  </defs>
  <rect width="900" height="450" fill="url(#bg)"/>
  <text x="450" y="40" text-anchor="middle" font-family="Segoe UI" font-size="24" font-weight="bold" fill="#ffffff">온라인 사기 수법 진화 타임라인</text>
  <line x1="250" y1="55" x2="650" y2="55" stroke="#e040fb" stroke-width="2"/>
  <!-- Timeline line -->
  <line x1="80" y1="230" x2="820" y2="230" stroke="url(#timeline-grad)" stroke-width="3" stroke-linecap="round"/>
  <!-- Era 1: Email -->
  <circle cx="140" cy="230" r="12" fill="#ff416c"/>
  <text x="140" y="235" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="bold" fill="#fff">1</text>
  <rect x="65" y="90" width="150" height="110" rx="10" fill="#1a1a3e" stroke="#ff416c" stroke-width="1.2"/>
  <text x="140" y="115" text-anchor="middle" font-family="Segoe UI" font-size="14" font-weight="bold" fill="#ff416c">이메일 피싱</text>
  <text x="140" y="135" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#b0b0d0">2000년대 초반</text>
  <text x="140" y="158" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#8888bb">나이지리아 왕자 사기</text>
  <text x="140" y="175" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#8888bb">은행 사칭 메일</text>
  <text x="140" y="192" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#8888bb">악성 첨부파일</text>
  <line x1="140" y1="200" x2="140" y2="218" stroke="#ff416c" stroke-width="1" stroke-dasharray="4"/>
  <!-- Era 2: SMS/Voice -->
  <circle cx="340" cy="230" r="12" fill="#ffab40"/>
  <text x="340" y="235" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="bold" fill="#fff">2</text>
  <rect x="265" y="260" width="150" height="110" rx="10" fill="#1a1a3e" stroke="#ffab40" stroke-width="1.2"/>
  <text x="340" y="285" text-anchor="middle" font-family="Segoe UI" font-size="14" font-weight="bold" fill="#ffab40">SMS·보이스피싱</text>
  <text x="340" y="305" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#b0b0d0">2010년대</text>
  <text x="340" y="328" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#8888bb">택배 사칭 문자</text>
  <text x="340" y="345" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#8888bb">검찰·은행 사칭 전화</text>
  <text x="340" y="362" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#8888bb">악성 앱 설치 유도</text>
  <line x1="340" y1="242" x2="340" y2="260" stroke="#ffab40" stroke-width="1" stroke-dasharray="4"/>
  <!-- Era 3: SNS -->
  <circle cx="540" cy="230" r="12" fill="#69f0ae"/>
  <text x="540" y="235" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="bold" fill="#1a1a3e">3</text>
  <rect x="465" y="90" width="150" height="110" rx="10" fill="#1a1a3e" stroke="#69f0ae" stroke-width="1.2"/>
  <text x="540" y="115" text-anchor="middle" font-family="Segoe UI" font-size="14" font-weight="bold" fill="#69f0ae">SNS 기반 사기</text>
  <text x="540" y="135" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#b0b0d0">2015~2020년</text>
  <text x="540" y="158" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#8888bb">가짜 이벤트·경품</text>
  <text x="540" y="175" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#8888bb">로맨스 스캠</text>
  <text x="540" y="192" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#8888bb">인플루언서 사칭</text>
  <line x1="540" y1="200" x2="540" y2="218" stroke="#69f0ae" stroke-width="1" stroke-dasharray="4"/>
  <!-- Era 4: AI -->
  <circle cx="740" cy="230" r="12" fill="#4facfe"/>
  <text x="740" y="235" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="bold" fill="#1a1a3e">4</text>
  <rect x="665" y="260" width="150" height="110" rx="10" fill="#1a1a3e" stroke="#4facfe" stroke-width="1.2"/>
  <text x="740" y="285" text-anchor="middle" font-family="Segoe UI" font-size="14" font-weight="bold" fill="#4facfe">AI 기반 사기</text>
  <text x="740" y="305" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#b0b0d0">2023년~현재</text>
  <text x="740" y="328" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#8888bb">딥페이크 화상통화</text>
  <text x="740" y="345" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#8888bb">AI 음성 클로닝</text>
  <text x="740" y="362" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#8888bb">자동화된 스피어피싱</text>
  <line x1="740" y1="242" x2="740" y2="260" stroke="#4facfe" stroke-width="1" stroke-dasharray="4"/>
  <!-- Arrow -->
  <text x="450" y="425" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#8888bb">단순 대량 발송 → 표적화·개인화 → AI 자동화·실시간 적응</text>
  <text x="830" y="230" font-family="Segoe UI" font-size="16" fill="#4facfe">→</text>
</svg>