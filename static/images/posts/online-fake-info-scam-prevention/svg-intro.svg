<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="red-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff416c"/>
      <stop offset="100%" style="stop-color:#ff4b2b"/>
    </linearGradient>
    <linearGradient id="blue-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <!-- Title -->
  <text x="450" y="60" text-anchor="middle" font-family="Segoe UI" font-size="28" font-weight="bold" fill="#ffffff" filter="url(#glow)">온라인 가짜 정보 &amp; 사기 위협 지형도</text>
  <line x1="250" y1="75" x2="650" y2="75" stroke="url(#red-glow)" stroke-width="2"/>
  <!-- Center icon - shield with warning -->
  <circle cx="450" cy="250" r="70" fill="none" stroke="url(#red-glow)" stroke-width="3" opacity="0.8"/>
  <circle cx="450" cy="250" r="55" fill="none" stroke="url(#blue-glow)" stroke-width="2" opacity="0.5"/>
  <text x="450" y="245" text-anchor="middle" font-family="Segoe UI" font-size="40" fill="#ff416c">⚠</text>
  <text x="450" y="275" text-anchor="middle" font-family="Segoe UI" font-size="13" fill="#e0e0e0">디지털 위협</text>
  <!-- Threat nodes around center -->
  <!-- Top left: Fake News -->
  <rect x="60" y="100" width="160" height="70" rx="12" fill="#1a1a3e" stroke="#ff416c" stroke-width="1.5" opacity="0.9"/>
  <text x="140" y="130" text-anchor="middle" font-family="Segoe UI" font-size="15" font-weight="bold" fill="#ff416c">허위 뉴스</text>
  <text x="140" y="152" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#b0b0d0">조작된 기사·제목 낚시</text>
  <line x1="220" y1="140" x2="380" y2="220" stroke="#ff416c" stroke-width="1" opacity="0.4"/>
  <!-- Top right: Deepfake -->
  <rect x="680" y="100" width="160" height="70" rx="12" fill="#1a1a3e" stroke="#e040fb" stroke-width="1.5" opacity="0.9"/>
  <text x="760" y="130" text-anchor="middle" font-family="Segoe UI" font-size="15" font-weight="bold" fill="#e040fb">딥페이크</text>
  <text x="760" y="152" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#b0b0d0">AI 합성 영상·음성</text>
  <line x1="680" y1="140" x2="520" y2="220" stroke="#e040fb" stroke-width="1" opacity="0.4"/>
  <!-- Left: Phishing -->
  <rect x="40" y="240" width="160" height="70" rx="12" fill="#1a1a3e" stroke="#ffab40" stroke-width="1.5" opacity="0.9"/>
  <text x="120" y="270" text-anchor="middle" font-family="Segoe UI" font-size="15" font-weight="bold" fill="#ffab40">피싱 사기</text>
  <text x="120" y="292" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#b0b0d0">이메일·SMS 사칭</text>
  <line x1="200" y1="275" x2="380" y2="255" stroke="#ffab40" stroke-width="1" opacity="0.4"/>
  <!-- Right: Social Engineering -->
  <rect x="700" y="240" width="160" height="70" rx="12" fill="#1a1a3e" stroke="#4facfe" stroke-width="1.5" opacity="0.9"/>
  <text x="780" y="270" text-anchor="middle" font-family="Segoe UI" font-size="15" font-weight="bold" fill="#4facfe">소셜 엔지니어링</text>
  <text x="780" y="292" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#b0b0d0">심리 조작·신뢰 악용</text>
  <line x1="700" y1="275" x2="520" y2="255" stroke="#4facfe" stroke-width="1" opacity="0.4"/>
  <!-- Bottom left: SNS Misinfo -->
  <rect x="100" y="370" width="160" height="70" rx="12" fill="#1a1a3e" stroke="#69f0ae" stroke-width="1.5" opacity="0.9"/>
  <text x="180" y="400" text-anchor="middle" font-family="Segoe UI" font-size="15" font-weight="bold" fill="#69f0ae">SNS 허위정보</text>
  <text x="180" y="422" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#b0b0d0">바이럴 확산·에코챔버</text>
  <line x1="260" y1="395" x2="400" y2="300" stroke="#69f0ae" stroke-width="1" opacity="0.4"/>
  <!-- Bottom right: Investment Scam -->
  <rect x="640" y="370" width="160" height="70" rx="12" fill="#1a1a3e" stroke="#ffd740" stroke-width="1.5" opacity="0.9"/>
  <text x="720" y="400" text-anchor="middle" font-family="Segoe UI" font-size="15" font-weight="bold" fill="#ffd740">투자 사기</text>
  <text x="720" y="422" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#b0b0d0">암호화폐·폰지 스킴</text>
  <line x1="640" y1="395" x2="500" y2="300" stroke="#ffd740" stroke-width="1" opacity="0.4"/>
  <!-- Bottom stats bar -->
  <rect x="50" y="465" width="800" height="25" rx="5" fill="#1a1a3e" opacity="0.7"/>
  <text x="450" y="483" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#8888bb">2024년 글로벌 온라인 사기 피해액: 약 1조 달러 이상 | 딥페이크 콘텐츠 연 900% 증가</text>
</svg>