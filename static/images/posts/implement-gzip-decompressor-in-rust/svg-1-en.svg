<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#2D3748">Gzip File Structure</text>

  <!-- Gzip Header Section -->
  <rect x="100" y="60" width="600" height="280" fill="#4A90D9" stroke="#2D3748" stroke-width="1" opacity="0.1"/>
  <text x="400" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#2D3748">Gzip Header</text>

    <!-- ID1 -->
    <rect x="150" y="90" width="500" height="30" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="110" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0x00</text>
    <text x="160" y="110" font-family="Courier New, monospace" font-size="14" fill="#2D3748">ID1 (0x1F)</text>
    <text x="590" y="110" font-family="Arial, sans-serif" font-size="12" fill="#2D3748" text-anchor="end">Magic Number Byte 1</text>

    <!-- ID2 -->
    <rect x="150" y="120" width="500" height="30" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="140" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0x01</text>
    <text x="160" y="140" font-family="Courier New, monospace" font-size="14" fill="#2D3748">ID2 (0x8B)</text>
    <text x="590" y="140" font-family="Arial, sans-serif" font-size="12" fill="#2D3748" text-anchor="end">Magic Number Byte 2</text>

    <!-- CM -->
    <rect x="150" y="150" width="500" height="30" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="170" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0x02</text>
    <text x="160" y="170" font-family="Courier New, monospace" font-size="14" fill="#2D3748">CM (0x08)</text>
    <text x="590" y="170" font-family="Arial, sans-serif" font-size="12" fill="#2D3748" text-anchor="end">Compression Method (DEFLATE)</text>

    <!-- FLG -->
    <rect x="150" y="180" width="500" height="30" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="200" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0x03</text>
    <text x="160" y="200" font-family="Courier New, monospace" font-size="14" fill="#2D3748">FLG</text>
    <text x="590" y="200" font-family="Arial, sans-serif" font-size="12" fill="#2D3748" text-anchor="end">Flags</text>

    <!-- MTIME -->
    <rect x="150" y="210" width="500" height="30" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="230" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0x04-0x07</text>
    <text x="160" y="230" font-family="Courier New, monospace" font-size="14" fill="#2D3748">MTIME</text>
    <text x="590" y="230" font-family="Arial, sans-serif" font-size="12" fill="#2D3748" text-anchor="end">Modification Time (4 bytes)</text>

    <!-- XFL -->
    <rect x="150" y="240" width="500" height="30" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="260" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0x08</text>
    <text x="160" y="260" font-family="Courier New, monospace" font-size="14" fill="#2D3748">XFL</text>
    <text x="590" y="260" font-family="Arial, sans-serif" font-size="12" fill="#2D3748" text-anchor="end">Extra Flags</text>

    <!-- OS -->
    <rect x="150" y="270" width="500" height="30" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="290" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0x09</text>
    <text x="160" y="290" font-family="Courier New, monospace" font-size="14" fill="#2D3748">OS</text>
    <text x="590" y="290" font-family="Arial, sans-serif" font-size="12" fill="#2D3748" text-anchor="end">Operating System</text>

    <!-- Optional Header Fields -->
    <rect x="150" y="300" width="500" height="30" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="320" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0x0A+</text>
    <text x="160" y="320" font-family="Courier New, monospace" font-size="14" fill="#2D3748">Optional Header Fields</text>
    <text x="590" y="320" font-family="Arial, sans-serif" font-size="12" fill="#2D3748" text-anchor="end">Variable Length (if FLG bits set)</text>


  <!-- DEFLATE Compressed Data Section -->
  <rect x="100" y="360" width="600" height="80" fill="#4A90D9" stroke="#2D3748" stroke-width="1" opacity="0.1"/>
  <text x="400" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#2D3748">DEFLATE Compressed Data Blocks</text>

    <!-- Data Block -->
    <rect x="150" y="390" width="500" height="40" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="415" font-family="Courier New, monospace" font-size="14" fill="#2D3748">Variable</text>
    <text x="400" y="415" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#2D3748">Compressed Data</text>
    <text x="590" y="415" font-family="Arial, sans-serif" font-size="12" fill="#2D3748" text-anchor="end">Variable Length</text>


  <!-- Gzip Footer Section -->
  <rect x="100" y="460" width="600" height="100" fill="#4A90D9" stroke="#2D3748" stroke-width="1" opacity="0.1"/>
  <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#2D3748">Gzip Footer</text>

    <!-- CRC32 -->
    <rect x="150" y="490" width="500" height="30" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="510" font-family="Courier New, monospace" font-size="14" fill="#2D3748">Offset-8</text>
    <text x="160" y="510" font-family="Courier New, monospace" font-size="14" fill="#2D3748">CRC32</text>
    <text x="590" y="510" font-family="Arial, sans-serif" font-size="12" fill="#2D3748" text-anchor="end">Checksum of Uncompressed Data (4 bytes)</text>

    <!-- ISIZE -->
    <rect x="150" y="520" width="500" height="30" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="540" font-family="Courier New, monospace" font-size="14" fill="#2D3748">Offset-4</text>
    <text x="160" y="540" font-family="Courier New, monospace" font-size="14" fill="#2D3748">ISIZE</text>
    <text x="590" y="540" font-family="Arial, sans-serif" font-size="12" fill="#2D3748" text-anchor="end">Size of Uncompressed Data (4 bytes)</text>

  <!-- Legend -->
  <g class="legend">
    <rect x="680" y="40" width="100" height="20" fill="#4A90D9" opacity="0.1" stroke="#2D3748" stroke-width="1"/>
    <text x="730" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2D3748">Section</text>
    <rect x="680" y="70" width="100" height="20" fill="#50C878" stroke="#e2e8f0" stroke-width="1"/>
    <text x="730" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2D3748">Field</text>
  </g>
</svg>