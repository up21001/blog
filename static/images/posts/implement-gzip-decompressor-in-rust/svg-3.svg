<svg viewBox="0 0 800 920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 26px Arial, sans-serif; fill: #1e293b; }
      .label { font: 600 14px Arial, sans-serif; fill: #1e293b; }
      .small { font: 12px Arial, sans-serif; fill: #334155; }
      .node { stroke: #cbd5e1; stroke-width: 2; }
      .process { fill: #dbeafe; }
      .decision { fill: #fde68a; }
      .io { fill: #dcfce7; }
      .terminal { fill: #bfdbfe; }
      .flow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="800" height="920" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" class="title">DEFLATE 압축 해제 흐름</text>
  <ellipse cx="400" cy="92" rx="120" ry="34" class="node terminal"/>
  <text x="400" y="98" text-anchor="middle" class="label">압축 입력 스트림 읽기</text>
  <rect x="280" y="150" width="240" height="56" rx="12" class="node process"/>
  <text x="400" y="184" text-anchor="middle" class="label">블록 헤더 읽기</text>
  <polygon points="400,236 500,286 400,336 300,286" class="node decision"/>
  <text x="400" y="282" text-anchor="middle" class="label">마지막 블록인가?</text>
  <text x="400" y="300" text-anchor="middle" class="small">BFINAL 플래그</text>
  <rect x="280" y="376" width="240" height="56" rx="12" class="node process"/>
  <text x="400" y="410" text-anchor="middle" class="label">블록 타입 해석</text>
  <polygon points="400,462 520,512 400,562 280,512" class="node decision"/>
  <text x="400" y="508" text-anchor="middle" class="label">비압축 블록인가?</text>
  <text x="400" y="526" text-anchor="middle" class="small">BTYPE = 00</text>
  <polygon points="170,592 350,592 325,648 145,648" class="node io"/>
  <text x="248" y="620" text-anchor="middle" class="label">LEN / NLEN 읽기</text>
  <text x="248" y="638" text-anchor="middle" class="small">리터럴 바이트를 그대로 복사</text>
  <rect x="490" y="586" width="190" height="62" rx="12" class="node process"/>
  <text x="585" y="614" text-anchor="middle" class="label">허프만 테이블 구성</text>
  <text x="585" y="632" text-anchor="middle" class="small">고정 또는 동적 트리</text>
  <rect x="490" y="688" width="190" height="62" rx="12" class="node process"/>
  <text x="585" y="716" text-anchor="middle" class="label">다음 심볼 디코딩</text>
  <text x="585" y="734" text-anchor="middle" class="small">literal / length / end</text>
  <polygon points="585,778 685,828 585,878 485,828" class="node decision"/>
  <text x="585" y="824" text-anchor="middle" class="label">블록 끝인가?</text>
  <text x="585" y="842" text-anchor="middle" class="small">256 마커</text>
  <rect x="110" y="712" width="240" height="62" rx="12" class="node io"/>
  <text x="230" y="740" text-anchor="middle" class="label">출력 바이트 기록</text>
  <text x="230" y="758" text-anchor="middle" class="small">리터럴 추가 또는 역참조 복사</text>
  <ellipse cx="230" cy="842" rx="130" ry="36" class="node terminal"/>
  <text x="230" y="848" text-anchor="middle" class="label">복원된 데이터 반환</text>
  <path d="M400 126 L400 150" class="flow"/>
  <path d="M400 206 L400 236" class="flow"/>
  <path d="M400 336 L400 376" class="flow"/>
  <text x="418" y="360" class="small">아니오</text>
  <path d="M400 432 L400 462" class="flow"/>
  <path d="M280 512 L248 512 L248 592" class="flow"/>
  <text x="218" y="500" class="small">예</text>
  <path d="M520 512 L585 512 L585 586" class="flow"/>
  <text x="536" y="500" class="small">아니오</text>
  <path d="M248 648 L248 712" class="flow"/>
  <path d="M585 648 L585 688" class="flow"/>
  <path d="M490 719 L350 719" class="flow"/>
  <path d="M350 719 L350 743" class="flow"/>
  <text x="412" y="708" class="small">리터럴 또는 길이-거리</text>
  <path d="M585 750 L585 778" class="flow"/>
  <path d="M485 828 L370 828 L370 743" class="flow"/>
  <text x="438" y="814" class="small">아니오, 계속 디코딩</text>
  <path d="M230 774 L230 806" class="flow"/>
  <path d="M585 878 L585 896 L230 896 L230 878" class="flow"/>
  <text x="432" y="886" class="small">예, 블록 종료</text>
  <path d="M520 286 L730 286 L730 842 L360 842" class="flow"/>
  <text x="646" y="272" class="small">예, 최종 블록 완료</text>
</svg>
