<svg viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="700" fill="#f8f9fa"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#2D3748">Gzip 파일 구조</text>
  <g transform="translate(590, 52)">
    <rect x="0" y="0" width="15" height="15" fill="#4A90D9" stroke="#e2e8f0"/>
    <text x="22" y="12" font-family="Arial, sans-serif" font-size="14" fill="#2D3748">Gzip 헤더</text>
    <rect x="0" y="25" width="15" height="15" fill="#50C878" stroke="#e2e8f0"/>
    <text x="22" y="37" font-family="Arial, sans-serif" font-size="14" fill="#2D3748">DEFLATE 데이터</text>
    <rect x="0" y="50" width="15" height="15" fill="#FFD93D" stroke="#e2e8f0"/>
    <text x="22" y="62" font-family="Arial, sans-serif" font-size="14" fill="#2D3748">Gzip 푸터</text>
  </g>
  <rect x="100" y="70" width="600" height="40" fill="#4A90D9" stroke="#e2e8f0"/>
  <text x="40" y="95" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0x00</text>
  <text x="110" y="95" font-family="Arial, sans-serif" font-size="16" fill="#f8f9fa">ID1, ID2 (매직 바이트)</text>
  <rect x="100" y="110" width="600" height="20" fill="#4A90D9" stroke="#e2e8f0"/>
  <text x="40" y="125" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0x02</text>
  <text x="110" y="125" font-family="Arial, sans-serif" font-size="16" fill="#f8f9fa">CM (압축 방식)</text>
  <rect x="100" y="130" width="600" height="20" fill="#4A90D9" stroke="#e2e8f0"/>
  <text x="40" y="145" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0x03</text>
  <text x="110" y="145" font-family="Arial, sans-serif" font-size="16" fill="#f8f9fa">FLG (플래그)</text>
  <rect x="100" y="150" width="600" height="80" fill="#4A90D9" stroke="#e2e8f0"/>
  <text x="40" y="195" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0x04</text>
  <text x="110" y="195" font-family="Arial, sans-serif" font-size="16" fill="#f8f9fa">MTIME (수정 시간)</text>
  <rect x="100" y="230" width="600" height="20" fill="#4A90D9" stroke="#e2e8f0"/>
  <text x="40" y="245" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0x08</text>
  <text x="110" y="245" font-family="Arial, sans-serif" font-size="16" fill="#f8f9fa">XFL (추가 플래그)</text>
  <rect x="100" y="250" width="600" height="20" fill="#4A90D9" stroke="#e2e8f0"/>
  <text x="40" y="265" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0x09</text>
  <text x="110" y="265" font-family="Arial, sans-serif" font-size="16" fill="#f8f9fa">OS (운영체제)</text>
  <rect x="100" y="270" width="600" height="60" fill="#4A90D9" stroke="#e2e8f0"/>
  <text x="40" y="305" font-family="Courier New, monospace" font-size="14" fill="#2D3748">0x0A</text>
  <text x="110" y="295" font-family="Arial, sans-serif" font-size="16" fill="#f8f9fa">선택 헤더 필드</text>
  <text x="110" y="315" font-family="Arial, sans-serif" font-size="14" fill="#f8f9fa">(FEXTRA, FNAME, FCOMMENT, FHCRC)</text>
  <rect x="100" y="350" width="600" height="160" fill="#50C878" stroke="#e2e8f0"/>
  <text x="40" y="430" font-family="Courier New, monospace" font-size="14" fill="#2D3748">...</text>
  <text x="400" y="440" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#f8f9fa">DEFLATE 압축 데이터 블록</text>
  <rect x="100" y="530" width="600" height="80" fill="#FFD93D" stroke="#e2e8f0"/>
  <text x="40" y="575" font-family="Courier New, monospace" font-size="14" fill="#2D3748">...</text>
  <text x="110" y="575" font-family="Arial, sans-serif" font-size="16" fill="#2D3748">CRC32 (원본 데이터 체크섬)</text>
  <rect x="100" y="610" width="600" height="80" fill="#FFD93D" stroke="#e2e8f0"/>
  <text x="40" y="655" font-family="Courier New, monospace" font-size="14" fill="#2D3748">...</text>
  <text x="110" y="655" font-family="Arial, sans-serif" font-size="16" fill="#2D3748">ISIZE (원본 데이터 크기)</text>
</svg>
