<svg viewBox="0 0 800 650" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <style>
    .header-text { font-weight: bold; font-size: 18px; fill: #2D3748; }
    .column-header-text { font-weight: bold; font-size: 16px; fill: #ffffff; }
    .feature-text { font-weight: bold; font-size: 14px; fill: #2D3748; }
    .description-text { font-size: 14px; fill: #2D3748; }
    .title { font-size: 24px; font-weight: bold; fill: #2D3748; text-anchor: middle; }
    .before-bg { fill: #4A90D9; } /* Blue for Before */
    .after-bg { fill: #50C878; } /* Green for After */
    .row-bg-even { fill: #f8f9fa; }
    .row-bg-odd { fill: #ffffff; }
    .highlight-border { stroke: #50C878; stroke-width: 3; fill: none; } /* Highlight for After column */
  </style>

  <!-- Title -->
  <text x="400" y="40" class="title">Document Processing Comparison</text>

  <!-- Column Headers -->
  <rect x="20" y="70" width="210" height="40" class="before-bg"/>
  <text x="125" y="95" class="column-header-text" text-anchor="middle">Feature</text>

  <rect x="240" y="70" width="260" height="40" class="before-bg"/>
  <text x="370" y="95" class="column-header-text" text-anchor="middle">Before Technology Adoption</text>

  <rect x="510" y="70" width="270" height="40" class="after-bg"/>
  <text x="645" y="95" class="column-header-text" text-anchor="middle">After Technology Adoption</text>

  <!-- Highlight border for "After" column -->
  <rect x="510" y="70" width="270" height="300" class="highlight-border"/>

  <!-- Row 1: Process -->
  <rect x="20" y="120" width="760" height="50" class="row-bg-even"/>
  <text x="30" y="150" class="feature-text">Process</text>
  <text x="370" y="150" class="description-text" text-anchor="middle">Manual, Paper-based</text>
  <text x="645" y="150" class="description-text" text-anchor="middle">Automated, Digital</text>

  <!-- Row 2: Complexity -->
  <rect x="20" y="170" width="760" height="50" class="row-bg-odd"/>
  <text x="30" y="200" class="feature-text">Complexity</text>
  <text x="370" y="200" class="description-text" text-anchor="middle">High, Error-prone</text>
  <text x="645" y="200" class="description-text" text-anchor="middle">Low, Streamlined</text>

  <!-- Row 3: Time Consumed -->
  <rect x="20" y="220" width="760" height="50" class="row-bg-even"/>
  <text x="30" y="250" class="feature-text">Time Consumed</text>
  <text x="370" y="250" class="description-text" text-anchor="middle">Significant</text>
  <text x="645" y="250" class="description-text" text-anchor="middle">Minimal</text>

  <!-- Row 4: Efficiency -->
  <rect x="20" y="270" width="760" height="50" class="row-bg-odd"/>
  <text x="30" y="300" class="feature-text">Efficiency</text>
  <text x="370" y="300" class="description-text" text-anchor="middle">Low, Tedious</text>
  <text x="645" y="300" class="description-text" text-anchor="middle">High, Productive</text>

  <!-- Row 5: Outcome -->
  <rect x="20" y="320" width="760" height="50" class="row-bg-even"/>
  <text x="30" y="350" class="feature-text">Outcome</text>
  <text x="370" y="350" class="description-text" text-anchor="middle">Stress, Delays</text>
  <text x="645" y="350" class="description-text" text-anchor="middle">Ease, Speed</text>

  <!-- Visual Representations Label -->
  <text x="400" y="410" class="header-text" text-anchor="middle">Visual Representation</text>

  <!-- Before Visuals (Piles of paper, tired person) -->
  <g transform="translate(280, 450)">
    <!-- Paper Piles -->
    <rect x="-40" y="50" width="80" height="10" fill="#fdfdcb" stroke="#ccc" stroke-width="1"/>
    <rect x="-30" y="40" width="80" height="10" fill="#fdfdcb" stroke="#ccc" stroke-width="1"/>
    <rect x="-50" y="60" width="80" height="10" fill="#fdfdcb" stroke="#ccc" stroke-width="1"/>
    <rect x="-20" y="30" width="80" height="10" fill="#fdfdcb" stroke="#ccc" stroke-width="1"/>
    <rect x="-40" y="20" width="80" height="10" fill="#fdfdcb" stroke="#ccc" stroke-width="1"/>
    <rect x="-30" y="10" width="80" height="10" fill="#fdfdcb" stroke="#ccc" stroke-width="1"/>
    <text x="0" y="80" font-size="12" fill="#2D3748" text-anchor="middle">Piles of Paper</text>

    <!-- Tired Person -->
    <circle cx="100" cy="20" r="15" fill="#FFDAB9" stroke="#2D3748" stroke-width="1"/> <!-- Head -->
    <rect x="90" y="35" width="20" height="40" fill="#6A5ACD" stroke="#2D3748" stroke-width="1"/> <!-- Body -->
    <line x1="90" y1="40" x2="70" y2="60" stroke="#2D3748" stroke-width="2"/> <!-- Left Arm -->
    <line x1="110" y1="40" x2="130" y2="60" stroke="#2D3748" stroke-width="2"/> <!-- Right Arm -->
    <line x1="95" y1="75" x2="80" y2="100" stroke="#2D3748" stroke-width="2"/> <!-- Left Leg -->
    <line x1="105" y1="75" x2="120" y2="100" stroke="#2D3748" stroke-width="2"/> <!-- Right Leg -->
    <!-- Slumped posture, tired expression -->
    <path d="M95 25 C97 27, 103 27, 105 25" stroke="#2D3748" stroke-width="1" fill="none"/> <!-- Frown -->
    <line x1="97" y1="20" x2="99" y2="22" stroke="#2D3748" stroke-width="1"/> <!-- Left Eye -->
    <line x1="101" y1="20" x2="103" y2="22" stroke="#2D3748" stroke-width="1"/> <!-- Right Eye -->
    <text x="100" y="120" font-size="12" fill="#2D3748" text-anchor="middle">Stressed Person</text>
  </g>

  <!-- After Visuals (Clean digital processing, relaxed person) -->
  <g transform="translate(550, 450)">
    <!-- Computer Screen -->
    <rect x="-60" y="10" width="120" height="80" rx="5" ry="5" fill="#cccccc" stroke="#2D3748" stroke-width="1"/> <!-- Monitor frame -->
    <rect x="-55" y="15" width="110" height="70" fill="#333333"/> <!-- Screen -->
    <line x1="-40" y1="30" x2="40" y2="30" stroke="#87CEEB" stroke-width="2"/>
    <line x1="-40" y1="45" x2="40" y2="45" stroke="#87CEEB" stroke-width="2"/>
    <line x1="-40" y1="60" x2="40" y2="60" stroke="#87CEEB" stroke-width="2"/>
    <path d="M-30 75 L-20 65 L-10 75 L0 65 L10 75 L20 65 L30 75" fill="none" stroke="#87CEEB" stroke-width="2"/> <!-- Data flow -->
    <text x="0" y="100" font-size="12" fill="#2D3748" text-anchor="middle">Digital Workflow</text>

    <!-- Relaxed Person -->
    <circle cx="100" cy="20" r="15" fill="#FFDAB9" stroke="#2D3748" stroke-width="1"/> <!-- Head -->
    <rect x="90" y="35" width="20" height="40" fill="#6A5ACD" stroke="#2D3748" stroke-width="1"/> <!-- Body -->
    <line x1="90" y1="40" x2="70" y2="50" stroke="#2D3748" stroke-width="2"/> <!-- Left Arm -->
    <line x1="110" y1="40" x2="130" y2="50" stroke="#2D3748" stroke-width="2"/> <!-- Right Arm -->
    <line x1="95" y1="75" x2="90" y2="100" stroke="#2D3748" stroke-width="2"/> <!-- Left Leg -->
    <line x1="105" y1="75" x2="110" y2="100" stroke="#2D3748" stroke-width="2"/> <!-- Right Leg -->
    <!-- Relaxed posture, smiling expression -->
    <path d="M95 25 C97 23, 103 23, 105 25" stroke="#2D3748" stroke-width="1" fill="none"/> <!-- Smile -->
    <circle cx="98" cy="20" r="1" fill="#2D3748"/> <!-- Left Eye -->
    <circle cx="102" cy="20" r="1" fill="#2D3748"/> <!-- Right Eye -->
    <text x="100" y="120" font-size="12" fill="#2D3748" text-anchor="middle">Relaxed Person</text>
  </g>

</svg>