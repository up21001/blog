<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#f8f9fa"/>

  <!-- Define arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D3748" />
    </marker>
  </defs>

  <!-- Stage 1: Customer Data (Source) -->
  <g class="pipeline-stage">
    <rect x="20" y="150" width="160" height="130" rx="10" ry="10" fill="#4A90D9"/>
    <rect x="20" y="150" width="160" height="40" fill="rgba(255,255,255,0.2)"/> <!-- Icon area -->
    <text x="100" y="178" font-size="24px" font-weight="bold" text-anchor="middle" fill="#ffffff">X</text>
    <text x="100" y="220" font-size="16px" font-weight="bold" text-anchor="middle" fill="#ffffff">Customer Data</text>
    <text x="100" y="240" font-size="12px" text-anchor="middle" fill="#ffffff">customers.xlsx</text>
  </g>

  <!-- Stage 2: Python Script (Processing) -->
  <g class="pipeline-stage">
    <rect x="240" y="150" width="160" height="130" rx="10" ry="10" fill="#50C878"/>
    <rect x="240" y="150" width="160" height="40" fill="rgba(255,255,255,0.2)"/> <!-- Icon area -->
    <text x="320" y="178" font-size="24px" font-weight="bold" text-anchor="middle" fill="#ffffff">P</text>
    <text x="320" y="220" font-size="16px" font-weight="bold" text-anchor="middle" fill="#ffffff">Python Script</text>
    <text x="320" y="240" font-size="12px" text-anchor="middle" fill="#ffffff">pandas, python-docx</text>
  </g>

  <!-- Stage 3: Data Insertion (Processing) -->
  <g class="pipeline-stage">
    <rect x="460" y="150" width="160" height="130" rx="10" ry="10" fill="#6C5CE7"/>
    <rect x="460" y="150" width="160" height="40" fill="rgba(255,255,255,0.2)"/> <!-- Icon area -->
    <text x="540" y="178" font-size="24px" font-weight="bold" text-anchor="middle" fill="#ffffff">W</text>
    <text x="540" y="220" font-size="16px" font-weight="bold" text-anchor="middle" fill="#ffffff">Data Insertion</text>
    <text x="540" y="240" font-size="12px" text-anchor="middle" fill="#ffffff">invoice_template.docx</text>
  </g>

  <!-- Stage 4: Individual Invoices (Output) -->
  <g class="pipeline-stage">
    <rect x="680" y="150" width="160" height="130" rx="10" ry="10" fill="#3A7BBF"/>
    <rect x="680" y="150" width="160" height="40" fill="rgba(255,255,255,0.2)"/> <!-- Icon area -->
    <!-- Stack of documents icon, centered -->
    <rect x="735" y="160" width="30" height="25" fill="#ffffff" opacity="0.7" rx="3" ry="3"/>
    <rect x="745" y="165" width="30" height="25" fill="#ffffff" opacity="0.85" rx="3" ry="3"/>
    <rect x="755" y="170" width="30" height="25" fill="#ffffff" rx="3" ry="3"/>
    <text x="760" y="220" font-size="16px" font-weight="bold" text-anchor="middle" fill="#ffffff">Individual Invoices</text>
    <text x="760" y="240" font-size="12px" text-anchor="middle" fill="#ffffff">docx/pdf</text>
  </g>

  <!-- Progress Indicators -->
  <g class="progress-indicators">
    <circle cx="100" cy="120" r="15" fill="#2D3748"/>
    <text x="100" y="125" font-size="16px" font-weight="bold" text-anchor="middle" fill="#ffffff">1</text>

    <circle cx="320" cy="120" r="15" fill="#2D3748"/>
    <text x="320" y="125" font-size="16px" font-weight="bold" text-anchor="middle" fill="#ffffff">2</text>

    <circle cx="540" cy="120" r="15" fill="#2D3748"/>
    <text x="540" y="125" font-size="16px" font-weight="bold" text-anchor="middle" fill="#ffffff">3</text>

    <circle cx="760" cy="120" r="15" fill="#2D3748"/>
    <text x="760" y="125" font-size="16px" font-weight="bold" text-anchor="middle" fill="#ffffff">4</text>
  </g>

  <!-- Arrows and Labels (MUST BE LAST) -->
  <g class="data-flow-arrows">
    <!-- Arrow 1: Stage 1 to Stage 2 -->
    <line x1="180" y1="215" x2="240" y2="215" stroke="#2D3748" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="210" y="205" font-size="12px" text-anchor="middle" fill="#2D3748">Raw Excel Data</text>

    <!-- Arrow 2: Stage 2 to Stage 3 -->
    <line x1="400" y1="215" x2="460" y2="215" stroke="#2D3748" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="430" y="205" font-size="12px" text-anchor="middle" fill="#2D3748">Processed Customer Records</text>

    <!-- Arrow 3: Stage 3 to Stage 4 -->
    <line x1="620" y1="215" x2="680" y2="215" stroke="#2D3748" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="650" y="205" font-size="12px" text-anchor="middle" fill="#2D3748">Populated Word Docs</text>
  </g>

</svg>