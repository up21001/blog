<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
    <style>
        .title {
            font-family: "Arial, sans-serif";
            font-size: 20px;
            font-weight: bold;
            text-anchor: middle;
            fill: #333;
        }
        .shape-text {
            font-family: "Arial, sans-serif";
            font-size: 14px;
            text-anchor: middle;
            fill: #333;
        }
        .start-end {
            fill: #50C878; /* Green */
            stroke: #333;
            stroke-width: 1;
        }
        .process {
            fill: #4A90D9; /* Blue */
            stroke: #333;
            stroke-width: 1;
        }
        .arrow {
            stroke: #333;
            stroke-width: 2;
            fill: none;
            marker-end: url(#arrowhead);
        }
    </style>

    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
        </marker>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="800" height="800" fill="#f8f9fa"/>

    <!-- Title -->
    <text x="400" y="40" class="title">Freelancer Contract &amp; Onboarding Automation Process</text>
    <text x="400" y="65" class="title">(using Make No-Code Tool)</text>

    <!-- Shapes -->
    <!-- Start Oval -->
    <ellipse cx="400" cy="120" rx="80" ry="40" class="start-end"/>
    <text x="400" y="125" class="shape-text">Start</text>

    <!-- Process 1: Google Forms Submission (Trigger) -->
    <rect x="300" y="200" width="200" height="80" rx="10" ry="10" class="process"/>
    <text x="400" y="230" class="shape-text">Google Forms Submission</text>
    <text x="400" y="250" class="shape-text">(Trigger)</text>

    <!-- Process 2: Google Docs Document Creation -->
    <rect x="300" y="340" width="200" height="80" rx="10" ry="10" class="process"/>
    <text x="400" y="370" class="shape-text">Generate Google Docs</text>
    <text x="400" y="390" class="shape-text">Contract Document</text>

    <!-- Process 3: PDF Conversion &amp; E-Signature Request -->
    <rect x="300" y="480" width="200" height="80" rx="10" ry="10" class="process"/>
    <text x="400" y="510" class="shape-text">Convert to PDF</text>
    <text x="400" y="530" class="shape-text">&amp; Request E-Signature</text>

    <!-- Process 4: Slack Notification -->
    <rect x="300" y="620" width="200" height="80" rx="10" ry="10" class="process"/>
    <text x="400" y="650" class="shape-text">Send Slack Notification</text>
    <text x="400" y="670" class="shape-text">to Team</text>

    <!-- End Oval -->
    <ellipse cx="400" cy="760" rx="80" ry="40" class="start-end"/>
    <text x="400" y="765" class="shape-text">End</text>

    <!-- Arrows -->
    <!-- Start to Process 1 -->
    <path d="M400,160 L400,185" class="arrow"/>
    <!-- Process 1 to Process 2 -->
    <path d="M400,280 L400,325" class="arrow"/>
    <!-- Process 2 to Process 3 -->
    <path d="M400,420 L400,465" class="arrow"/>
    <!-- Process 3 to Process 4 -->
    <path d="M400,560 L400,605" class="arrow"/>
    <!-- Process 4 to End -->
    <path d="M400,700 L400,745" class="arrow"/>

</svg>