<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#f8f9fa"/>

  <!-- Define common styles -->
  <defs>
    <style>
      .stage-box {
        fill: #ffffff;
        stroke: #e0e0e0;
        stroke-width: 1;
        rx: 8;
        ry: 8;
        filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1));
      }
      .stage-label {
        font-family: "Arial, sans-serif";
        font-size: 14px;
        font-weight: bold;
        fill: #2D3748;
        text-anchor: middle;
      }
      .stage-annotation {
        font-family: "Arial, sans-serif";
        font-size: 11px;
        fill: #555;
        text-anchor: middle;
      }
      .arrow-label {
        font-family: "Arial, sans-serif";
        font-size: 12px;
        fill: #2D3748;
        text-anchor: middle;
      }
      .stage-number {
        font-family: "Arial, sans-serif";
        font-size: 12px;
        font-weight: bold;
        fill: #ffffff;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .arrow {
        stroke: #2D3748;
        stroke-width: 2;
        fill: none;
        marker-end: url(#arrowhead);
      }
    </style>

    <!-- Arrowhead marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D3748" />
    </marker>
  </defs>

  <!-- Stage 1: Customer Data (customers.xlsx) -->
  <g transform="translate(50, 180)">
    <rect class="stage-box" width="160" height="120"/>
    <rect x="0" y="0" width="160" height="30" fill="#4A90D9" rx="8" ry="8"/>
    <circle cx="15" cy="15" r="10" fill="#2D3748"/>
    <text x="15" y="15" class="stage-number">1</text>
    <text x="80" y="55" class="stage-label">Customer Data</text>
    <text x="80" y="75" class="stage-annotation">(customers.xlsx)</text>
    <text x="80" y="95" class="stage-annotation">Source System</text>
  </g>

  <!-- Stage 2: Python Script (pandas, python-docx) -->
  <g transform="translate(240, 180)">
    <rect class="stage-box" width="160" height="120"/>
    <rect x="0" y="0" width="160" height="30" fill="#50C878" rx="8" ry="8"/>
    <circle cx="15" cy="15" r="10" fill="#2D3748"/>
    <text x="15" y="15" class="stage-number">2</text>
    <text x="80" y="55" class="stage-label">Python Script</text>
    <text x="80" y="75" class="stage-annotation">(pandas, python-docx)</text>
    <text x="80" y="95" class="stage-annotation">Data Transformation</text>
  </g>

  <!-- Stage 3: Data Insertion into Word Template (invoice_template.docx) -->
  <g transform="translate(430, 180)">
    <rect class="stage-box" width="160" height="120"/>
    <rect x="0" y="0" width="160" height="30" fill="#6C5CE7" rx="8" ry="8"/>
    <circle cx="15" cy="15" r="10" fill="#2D3748"/>
    <text x="15" y="15" class="stage-number">3</text>
    <text x="80" y="55" class="stage-label">Template Integration</text>
    <text x="80" y="75" class="stage-annotation">(invoice_template.docx)</text>
    <text x="80" y="95" class="stage-annotation">Populate Template</text>
  </g>

  <!-- Stage 4: Generate Individual Invoices (docx/pdf) -->
  <g transform="translate(620, 180)">
    <rect class="stage-box" width="160" height="120"/>
    <rect x="0" y="0" width="160" height="30" fill="#4A90D9" rx="8" ry="8"/>
    <circle cx="15" cy="15" r="10" fill="#2D3748"/>
    <text x="15" y="15" class="stage-number">4</text>
    <text x="80" y="55" class="stage-label">Output Invoices</text>
    <text x="80" y="75" class="stage-annotation">(docx/pdf)</text>
    <text x="80" y="95" class="stage-annotation">Final Documents</text>
  </g>

  <!-- Arrows and Labels (MUST BE LAST for correct rendering order) -->

  <!-- Arrow 1 to 2 -->
  <path d="M210 240 H240" class="arrow"/>
  <text x="225" y="230" class="arrow-label">Raw Excel Data</text>

  <!-- Arrow 2 to 3 -->
  <path d="M400 240 H430" class="arrow"/>
  <text x="415" y="230" class="arrow-label">Processed Data</text>

  <!-- Arrow 3 to 4 -->
  <path d="M590 240 H620" class="arrow"/>
  <text x="605" y="230" class="arrow-label">Populated Templates</text>

</svg>