<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* General Styles */
    .title { font-family: "Arial, sans-serif"; font-size: 40px; font-weight: bold; text-anchor: middle; fill: #333; }
    .section-number { font-family: "Arial, sans-serif"; font-size: 80px; font-weight: bold; fill: #555; }
    .section-title { font-family: "Arial, sans-serif"; font-size: 28px; font-weight: bold; fill: #333; }
    .section-desc { font-family: "Arial, sans-serif"; font-size: 18px; fill: #666; }
    /* Icon Styles */
    .icon-stroke { stroke: #333; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .icon-fill { fill: #333; }
    /* Container Styles */
    .container-rect { fill: #f8f8f8; stroke: #ddd; stroke-width: 1; rx: 10; ry: 10; }
  </style>

  <!-- Main Title -->
  <text x="400" y="80" class="title">3 Key Considerations for Automation Adoption</text>

  <!-- Section 1: Personal &amp; Sensitive Data (PII) Handling -->
  <g transform="translate(0, 150)">
    <rect x="50" y="0" width="700" height="250" class="container-rect"/>
    <text x="100" y="100" class="section-number">1</text>
    <!-- Icon: Lock for PII Handling -->
    <g transform="translate(250, 50)">
      <rect x="0" y="20" width="60" height="60" rx="8" ry="8" class="icon-stroke"/>
      <path d="M 15 20 V 0 C 15 0 15 0 45 0 C 45 0 45 0 45 20" class="icon-stroke"/>
      <circle cx="30" cy="50" r="10" class="icon-stroke"/>
      <line x1="30" y1="40" x2="30" y2="60" class="icon-stroke"/>
    </g>
    <text x="350" y="80" class="section-title">Personal &amp; Sensitive Data (PII) Handling</text>
    <text x="350" y="120" class="section-desc">
      <tspan x="350" dy="0">Ensure robust protocols for data privacy, compliance,</tspan>
      <tspan x="350" dy="25">and secure processing of personal and sensitive information.</tspan>
    </text>
  </g>

  <!-- Section 2: Exception Handling &amp; Logging -->
  <g transform="translate(0, 420)">
    <rect x="50" y="0" width="700" height="250" class="container-rect"/>
    <text x="100" y="100" class="section-number">2</text>
    <!-- Icon: Warning Triangle for Exception Handling -->
    <g transform="translate(250, 50)">
      <path d="M 30 0 L 0 80 L 60 80 Z" class="icon-stroke"/>
      <line x1="30" y1="20" x2="30" y2="60" class="icon-stroke"/>
      <circle cx="30" cy="70" r="4" class="icon-fill"/>
    </g>
    <text x="350" y="80" class="section-title">Exception Handling &amp; Logging</text>
    <text x="350" y="120" class="section-desc">
      <tspan x="350" dy="0">Implement comprehensive error management and detailed</tspan>
      <tspan x="350" dy="25">logging for traceability, debugging, and continuous improvement.</tspan>
    </text>
  </g>

  <!-- Section 3: Human-in-the-Loop (HITL) Implementation -->
  <g transform="translate(0, 690)">
    <rect x="50" y="0" width="700" height="250" class="container-rect"/>
    <text x="100" y="100" class="section-number">3</text>
    <!-- Icon: Human-in-the-Loop (Person + Gear) -->
    <g transform="translate(250, 50)">
      <!-- Person icon -->
      <circle cx="30" cy="20" r="15" class="icon-stroke"/>
      <path d="M 10 70 C 10 50 50 50 50 70 Z" class="icon-stroke"/>
      <line x1="30" y1="35" x2="30" y2="50" class="icon-stroke"/>
      <!-- Gear icon -->
      <circle cx="60" cy="60" r="15" class="icon-stroke"/>
      <circle cx="60" cy="60" r="5" class="icon-stroke"/>
      <line x1="60" y1="45" x2="60" y2="75" class="icon-stroke"/>
      <line x1="45" y1="60" x2="75" y2="60" class="icon-stroke"/>
      <line x1="49.39" y1="49.39" x2="70.61" y2="70.61" class="icon-stroke"/>
      <line x1="49.39" y1="70.61" x2="70.61" y2="49.39" class="icon-stroke"/>
    </g>
    <text x="350" y="80" class="section-title">Human-in-the-Loop (HITL) Implementation</text>
    <text x="350" y="120" class="section-desc">
      <tspan x="350" dy="0">Integrate human oversight for complex decisions, anomaly</tspan>
      <tspan x="350" dy="25">detection, and ethical considerations to maintain control and quality.</tspan>
    </text>
  </g>

</svg>