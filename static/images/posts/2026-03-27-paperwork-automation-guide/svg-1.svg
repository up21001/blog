<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="2" dy="2" result="shadow"/>
            <feMerge>
                <feMergeNode in="shadow"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#333"/>
        </marker>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>

    <!-- Title -->
    <text x="400" y="50" font-family="Arial, sans-serif" font-size="28" fill="#333" text-anchor="middle" font-weight="bold">
        Document Automation Pipeline
    </text>

    <!-- Main Flow Boxes -->
    <!-- Box 1: Input Sources -->
    <rect x="40" y="150" width="150" height="80" rx="10" fill="#FF6B6B" filter="url(#dropshadow)"/>
    <text x="115" y="195" font-family="Arial, sans-serif" font-size="18" fill="#fff" text-anchor="middle" font-weight="bold">Input Sources</text>
    <text x="115" y="250" font-family="Arial, sans-serif" font-size="13" fill="#333" text-anchor="middle">Various formats</text>

    <!-- Box 2: Analysis Engine -->
    <rect x="230" y="150" width="150" height="80" rx="10" fill="#FFD93D" filter="url(#dropshadow)"/>
    <text x="305" y="195" font-family="Arial, sans-serif" font-size="18" fill="#333" text-anchor="middle" font-weight="bold">Analysis Engine</text>
    <text x="305" y="250" font-family="Arial, sans-serif" font-size="13" fill="#333" text-anchor="middle">Extracts structured</text>
    <text x="305" y="265" font-family="Arial, sans-serif" font-size="13" fill="#333" text-anchor="middle">and unstructured data</text>

    <!-- Box 3: Processing &amp; Actions -->
    <rect x="420" y="150" width="150" height="80" rx="10" fill="#FFD93D" filter="url(#dropshadow)"/>
    <text x="495" y="185" font-family="Arial, sans-serif" font-size="18" fill="#333" text-anchor="middle" font-weight="bold">Processing &amp;</text>
    <text x="495" y="208" font-family="Arial, sans-serif" font-size="18" fill="#333" text-anchor="middle" font-weight="bold">Actions</text>
    <text x="495" y="250" font-family="Arial, sans-serif" font-size="13" fill="#333" text-anchor="middle">Automates tasks</text>
    <text x="495" y="265" font-family="Arial, sans-serif" font-size="13" fill="#333" text-anchor="middle">based on extracted data</text>

    <!-- Box 4: Output &amp; Storage -->
    <rect x="610" y="150" width="150" height="80" rx="10" fill="#50C878" filter="url(#dropshadow)"/>
    <text x="685" y="185" font-family="Arial, sans-serif" font-size="18" fill="#fff" text-anchor="middle" font-weight="bold">Output &amp;</text>
    <text x="685" y="208" font-family="Arial, sans-serif" font-size="18" fill="#fff" text-anchor="middle" font-weight="bold">Storage</text>
    <text x="685" y="250" font-family="Arial, sans-serif" font-size="13" fill="#333" text-anchor="middle">Databases, APIs,</text>
    <text x="685" y="265" font-family="Arial, sans-serif" font-size="13" fill="#333" text-anchor="middle">documents</text>

    <!-- Technology Boxes -->
    <!-- OCR Box -->
    <rect x="245" y="300" width="120" height="60" rx="8" fill="#6C5CE7" filter="url(#dropshadow)"/>
    <text x="305" y="335" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">OCR</text>

    <!-- NLP/AI Box -->
    <rect x="245" y="370" width="120" height="60" rx="8" fill="#6C5CE7" filter="url(#dropshadow)"/>
    <text x="305" y="405" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">NLP / AI</text>

    <!-- RPA/Script Box -->
    <rect x="435" y="300" width="120" height="60" rx="8" fill="#6C5CE7" filter="url(#dropshadow)"/>
    <text x="495" y="335" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">RPA / Script</text>

    <!-- Arrows -->
    <!-- Input Sources -> Analysis Engine -->
    <path d="M 190 190 H 215" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="202.5" y="180" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">Ingestion</text>

    <!-- Analysis Engine -> Processing &amp; Actions -->
    <path d="M 380 190 H 405" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="392.5" y="180" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">Data Flow</text>

    <!-- Processing &amp; Actions -> Output &amp; Storage -->
    <path d="M 570 190 H 595" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="582.5" y="180" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">Results</text>

    <!-- Analysis Engine -> OCR -->
    <path d="M 285 230 V 285" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="295" y="255" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="start">OCR</text>

    <!-- Analysis Engine -> NLP/AI -->
    <path d="M 325 230 V 355" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="335" y="290" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="start">NLP / AI</text>

    <!-- Processing &amp; Actions -> RPA/Script -->
    <path d="M 495 230 V 285" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="505" y="255" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="start">Executes</text>

</svg>