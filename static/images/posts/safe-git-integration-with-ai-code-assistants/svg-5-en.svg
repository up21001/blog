<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    .shape {
      stroke: #333;
      stroke-width: 2;
      fill: #f8f9fa; /* Background color */
    }
    .process { fill: #4A90D9; } /* Blue */
    .decision { fill: #FFD93D; } /* Yellow */
    .start-end { fill: #50C878; } /* Green */
    .error { fill: #FF6B6B; } /* Red */
    .text {
      font-family: "Arial", sans-serif; /* Corrected font-family syntax */
      font-size: 14px;
      fill: #333;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .arrow {
      stroke: #333;
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrowhead);
    }
    .label {
      font-family: "Arial", sans-serif; /* Corrected font-family syntax */
      font-size: 12px;
      fill: #333;
      text-anchor: middle;
      dominant-baseline: middle;
    }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Shapes and Text -->

  <!-- Start -->
  <ellipse class="shape start-end" cx="400" cy="80" rx="80" ry="30" />
  <text class="text" x="400" y="80">Start</text>

  <!-- Developer writes or AI generates commit message -->
  <rect class="shape process" x="260" y="155" width="280" height="70" rx="5" ry="5" />
  <text class="text" x="400" y="180">Developer writes or</text>
  <text class="text" x="400" y="200">AI generates commit message</text>

  <!-- commit-msg hook triggered -->
  <rect class="shape process" x="300" y="295" width="200" height="50" rx="5" ry="5" />
  <!-- Wrapped text into two lines to fit the container -->
  <text class="text" x="400" y="310">commit-msg hook</text>
  <text class="text" x="400" y="330">triggered</text>

  <!-- Does message comply with Conventional Commits rules? -->
  <polygon class="shape decision" points="400,400 540,450 400,500 260,450" />
  <text class="text" x="400" y="440">Complies with</text>
  <text class="text" x="400" y="460">Conventional Commits rules?</text>

  <!-- Commit accepted -->
  <rect class="shape process" x="160" y="575" width="180" height="50" rx="5" ry="5" />
  <text class="text" x="250" y="600">Commit accepted</text>

  <!-- Reject commit -->
  <rect class="shape error" x="460" y="575" width="180" height="50" rx="5" ry="5" />
  <text class="text" x="550" y="600">Reject commit</text>

  <!-- End -->
  <ellipse class="shape start-end" cx="400" cy="730" rx="80" ry="30" />
  <text class="text" x="400" y="730">End</text>

  <!-- Arrows -->

  <!-- Start to Developer writes/AI generates -->
  <path class="arrow" d="M 400 110 L 400 155" />

  <!-- Developer writes/AI generates to commit-msg hook -->
  <path class="arrow" d="M 400 225 L 400 295" />

  <!-- commit-msg hook to Decision -->
  <path class="arrow" d="M 400 345 L 400 395" />

  <!-- Decision (Yes) to Commit accepted -->
  <path class="arrow" d="M 400 500 L 250 500 L 250 560" />
  <text class="label" x="325" y="490">Yes</text>

  <!-- Decision (No) to Reject commit -->
  <path class="arrow" d="M 400 500 L 550 500 L 550 560" />
  <text class="label" x="475" y="490">No</text>

  <!-- Commit accepted to End -->
  <path class="arrow" d="M 250 625 L 250 680 L 400 680 L 400 685" />

  <!-- Reject commit to End -->
  <path class="arrow" d="M 550 625 L 550 680 L 400 680 L 400 685" />

</svg>