<svg viewBox="0 0 800 750" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="750" fill="#f8f9fa"/>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D3748"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <style>
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2D3748; text-anchor: middle; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #fff; text-anchor: middle; dominant-baseline: middle; }
    .label-dark { font-family: Arial, sans-serif; font-size: 14px; fill: #2D3748; text-anchor: middle; dominant-baseline: middle; }
    .branch-label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2D3748; }
    .arrow { stroke: #2D3748; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  </style>

  <!-- 제목 -->
  <text x="400" y="40" class="title">Pre-commit 훅 동작 흐름</text>

  <!-- 1. 개발자 git commit 시도 (시작) -->
  <ellipse cx="400" cy="90" rx="130" ry="28" fill="#50C878" filter="url(#shadow)"/>
  <text x="400" y="90" class="label">개발자 git commit 시도</text>

  <!-- 화살표: 시작 → pre-commit -->
  <path class="arrow" d="M 400 118 L 400 155"/>

  <!-- 2. pre-commit 훅 작동 -->
  <rect x="290" y="155" width="220" height="55" rx="8" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="400" y="183" class="label">pre-commit 훅 작동</text>

  <!-- 화살표: pre-commit → 스테이징 검사 -->
  <path class="arrow" d="M 400 210 L 400 245"/>

  <!-- 3. 스테이징된 파일 검사 -->
  <rect x="290" y="245" width="220" height="55" rx="8" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="400" y="273" class="label">스테이징된 파일 검사</text>

  <!-- 화살표: 스테이징 검사 → 판단 -->
  <path class="arrow" d="M 400 300 L 400 345"/>

  <!-- 4. 민감 정보 패턴 발견? (다이아몬드) -->
  <polygon points="400,345 510,410 400,475 290,410" fill="#FFD93D" stroke="#e6c235" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="403" class="label-dark" font-size="13">민감 정보</text>
  <text x="400" y="420" class="label-dark" font-size="13">패턴 발견?</text>

  <!-- 분기: 아니오 (오른쪽) -->
  <path class="arrow" d="M 510 410 L 570 410"/>
  <text x="540" y="398" class="branch-label">아니오</text>

  <!-- 5a. 커밋 진행 -->
  <rect x="570" y="383" width="180" height="55" rx="8" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="660" y="411" class="label">커밋 진행</text>

  <!-- 화살표: 커밋 진행 → 커밋 성공 -->
  <path class="arrow" d="M 660 438 L 660 480"/>

  <!-- 6a. 커밋 성공 (종료) -->
  <ellipse cx="660" cy="510" rx="110" ry="28" fill="#50C878" filter="url(#shadow)"/>
  <text x="660" y="510" class="label">커밋 성공</text>

  <!-- 분기: 예 (아래) -->
  <path class="arrow" d="M 400 475 L 400 520"/>
  <text x="418" y="500" class="branch-label">예</text>

  <!-- 5b. 커밋 중단 + 경고 -->
  <rect x="290" y="520" width="220" height="55" rx="8" fill="#FF6B6B" filter="url(#shadow)"/>
  <text x="400" y="548" class="label">커밋 중단 + 경고 출력</text>

  <!-- 화살표: 경고 → 개발자 수정 -->
  <path class="arrow" d="M 400 575 L 400 615"/>

  <!-- 6b. 개발자 민감 정보 제거 -->
  <rect x="280" y="615" width="240" height="55" rx="8" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="400" y="643" class="label">개발자: 민감 정보 제거</text>

  <!-- 화살표: 수정 → 재시도 (위로 되돌림) -->
  <path class="arrow" d="M 280 643 L 200 643 L 200 90 L 270 90"/>
  <text x="188" y="400" class="branch-label" text-anchor="end">재시도</text>
</svg>
