<svg viewBox="0 0 800 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="800" height="650" fill="#f8f9fa"/>

  <!-- Main Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="28" fill="#333" text-anchor="middle" font-weight="bold">
    Secure AI-Git Integration Workflow
  </text>

  <!-- Local Environment Container -->
  <rect x="40" y="80" width="350" height="550" rx="15" ry="15" fill="#E0F2F7" stroke="#4A90D9" stroke-width="2"/>
  <text x="215" y="105" font-family="Arial, sans-serif" font-size="22" fill="#4A90D9" text-anchor="middle" font-weight="bold">
    Local Environment
  </text>

  <!-- Remote Repository Container -->
  <rect x="410" y="80" width="350" height="550" rx="15" ry="15" fill="#F0FFF0" stroke="#50C878" stroke-width="2"/>
  <text x="585" y="105" font-family="Arial, sans-serif" font-size="22" fill="#50C878" text-anchor="middle" font-weight="bold">
    Remote Repository
  </text>

  <!-- Local Environment Components -->
  <rect x="70" y="140" width="290" height="100" rx="10" ry="10" fill="#FFFFFF" stroke="#4A90D9" stroke-width="1" filter="url(#dropshadow)"/>
  <text x="215" y="170" font-family="Arial, sans-serif" font-size="18" fill="#333" text-anchor="middle" font-weight="bold">AI Assistant</text>
  <text x="215" y="195" font-family="Arial, sans-serif" font-size="14" fill="#555" text-anchor="middle">Code generation, suggestions,</text>
  <text x="215" y="215" font-family="Arial, sans-serif" font-size="14" fill="#555" text-anchor="middle">refactoring</text>

  <rect x="70" y="280" width="290" height="100" rx="10" ry="10" fill="#FFFFFF" stroke="#4A90D9" stroke-width="1" filter="url(#dropshadow)"/>
  <text x="215" y="310" font-family="Arial, sans-serif" font-size="18" fill="#333" text-anchor="middle" font-weight="bold">Developer Review</text>
  <text x="215" y="335" font-family="Arial, sans-serif" font-size="14" fill="#555" text-anchor="middle">Human oversight,</text>
  <text x="215" y="355" font-family="Arial, sans-serif" font-size="14" fill="#555" text-anchor="middle">manual validation</text>

  <rect x="70" y="420" width="290" height="100" rx="10" ry="10" fill="#FFFFFF" stroke="#4A90D9" stroke-width="1" filter="url(#dropshadow)"/>
  <text x="215" y="450" font-family="Arial, sans-serif" font-size="18" fill="#333" text-anchor="middle" font-weight="bold">Git Hooks</text>
  <text x="215" y="475" font-family="Arial, sans-serif" font-size="14" fill="#555" text-anchor="middle">Pre-commit/push checks,</text>
  <text x="215" y="495" font-family="Arial, sans-serif" font-size="14" fill="#555" text-anchor="middle">AI analysis</text>

  <!-- Remote Repository Components -->
  <rect x="440" y="140" width="290" height="100" rx="10" ry="10" fill="#FFFFFF" stroke="#50C878" stroke-width="1" filter="url(#dropshadow)"/>
  <text x="585" y="170" font-family="Arial, sans-serif" font-size="18" fill="#333" text-anchor="middle" font-weight="bold">Remote Repository</text>
  <text x="585" y="195" font-family="Arial, sans-serif" font-size="14" fill="#555" text-anchor="middle">(GitHub/GitLab)</text>
  <text x="585" y="215" font-family="Arial, sans-serif" font-size="14" fill="#555" text-anchor="middle">Centralized code storage</text>

  <rect x="440" y="280" width="290" height="100" rx="10" ry="10" fill="#FFFFFF" stroke="#50C878" stroke-width="1" filter="url(#dropshadow)"/>
  <text x="585" y="310" font-family="Arial, sans-serif" font-size="18" fill="#333" text-anchor="middle" font-weight="bold">CI/CD Pipeline</text>
  <text x="585" y="335" font-family="Arial, sans-serif" font-size="14" fill="#555" text-anchor="middle">Automated build, test,</text>
  <text x="585" y="355" font-family="Arial, sans-serif" font-size="14" fill="#555" text-anchor="middle">deploy</text>

  <rect x="440" y="420" width="290" height="100" rx="10" ry="10" fill="#FFFFFF" stroke="#50C878" stroke-width="1" filter="url(#dropshadow)"/>
  <text x="585" y="450" font-family="Arial, sans-serif" font-size="18" fill="#333" text-anchor="middle" font-weight="bold">PR Review</text>
  <text x="585" y="475" font-family="Arial, sans-serif" font-size="14" fill="#555" text-anchor="middle">Code review,</text>
  <text x="585" y="495" font-family="Arial, sans-serif" font-size="14" fill="#555" text-anchor="middle">merge validation</text>


  <!-- Arrows (must be last) -->
  <!-- AI Assistant -> Developer Review -->
  <line x1="215" y1="240" x2="215" y2="280" stroke="#6C5CE7" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="225" y="260" font-family="Arial, sans-serif" font-size="13" fill="#6C5CE7">Suggests Code</text>

  <!-- Developer Review -> Git Hooks -->
  <line x1="215" y1="380" x2="215" y2="420" stroke="#6C5CE7" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="225" y="400" font-family="Arial, sans-serif" font-size="13" fill="#6C5CE7">Commits Changes</text>

  <!-- Git Hooks -> Developer Review (Validation Feedback) -->
  <polyline points="70 470, 50 470, 50 330, 70 330" fill="none" stroke="#FF6B6B" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="55" y="400" font-family="Arial, sans-serif" font-size="13" fill="#FF6B6B" transform="rotate(-90 55 400)">Validation Feedback</text>

  <!-- Git Hooks -> Remote Repository (Pushes Code) -->
  <polyline points="360 470, 440 470" fill="none" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="390" y="460" font-family="Arial, sans-serif" font-size="13" fill="#4A90D9">Pushes Code</text>

  <!-- Remote Repository -> CI/CD (Triggers Pipeline) -->
  <line x1="585" y1="240" x2="585" y2="280" stroke="#6C5CE7" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="595" y="260" font-family="Arial, sans-serif" font-size="13" fill="#6C5CE7">Triggers Pipeline</text>

  <!-- CI/CD -> PR Review (Reports Status) -->
  <line x1="585" y1="380" x2="585" y2="420" stroke="#6C5CE7" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="595" y="400" font-family="Arial, sans-serif" font-size="13" fill="#6C5CE7">Reports Status</text>

  <!-- PR Review -> Remote Repository (Merge/Reject) -->
  <polyline points="730 470, 750 470, 750 190, 730 190" fill="none" stroke="#50C878" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="755" y="330" font-family="Arial, sans-serif" font-size="13" fill="#50C878" transform="rotate(90 755 330)">Merge/Reject</text>

  <!-- PR Review -> Developer Review (Review Feedback) -->
  <polyline points="440 470, 410 470, 410 550, 215 550, 215 380" fill="none" stroke="#FFD93D" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="320" y="540" font-family="Arial, sans-serif" font-size="13" fill="#FFD93D">Review Feedback</text>

</svg>