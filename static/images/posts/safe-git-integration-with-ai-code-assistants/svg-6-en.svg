<svg width="800" height="700" viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="800" height="700" fill="#f8f9fa"/>

    <style>
        .node {
            fill: #ffffff;
            stroke: #ccc;
            stroke-width: 1;
            rx: 8;
            ry: 8;
        }
        .text {
            font-family: "Arial, sans-serif";
            font-size: 14px;
            fill: #333;
            text-anchor: middle;
            dominant-baseline: central;
        }
        .level1 { fill: #4A90D9; } /* Blue */
        .level2 { fill: #50C878; } /* Green */
        .level3 { fill: #6C5CE7; } /* Purple */
        .level4 { fill: #FFD93D; } /* Yellow */
        .bold { font-weight: bold; }
        .connector {
            stroke: #666;
            stroke-width: 2;
            fill: none;
        }
    </style>

    <!-- Nodes and Text - Rendered First -->

    <!-- Level 1: Main Branch -->
    <rect x="300" y="50" width="200" height="60" class="node level1"/>
    <text x="400" y="80" class="text bold">Main Branch</text>

    <!-- Level 2: feature/* Branch -->
    <rect x="300" y="190" width="200" height="60" class="node level2"/>
    <text x="400" y="220" class="text bold">`feature/*` Branch</text>

    <!-- Level 3: ai-draft/* Branch -->
    <rect x="300" y="330" width="200" height="60" class="node level3"/>
    <text x="400" y="360" class="text bold">`ai-draft/*` Branch</text>

    <!-- Level 4: AI Code Experimentation -->
    <rect x="125" y="470" width="250" height="60" class="node level4"/>
    <text x="250" y="500" class="text">AI Code Experimentation</text>

    <!-- Level 4: Squash Merge to feature/* -->
    <rect x="425" y="470" width="250" height="60" class="node level4"/>
    <text x="550" y="490" class="text bold">Squash Merge</text>
    <text x="550" y="510" class="text bold">to `feature/*`</text>

    <!-- Connectors - Rendered Last -->

    <!-- Main Branch to feature/* Branch -->
    <path d="M 400 110 L 400 190" class="connector"/>

    <!-- feature/* Branch to ai-draft/* Branch -->
    <path d="M 400 250 L 400 330" class="connector"/>

    <!-- ai-draft/* Branch to AI Code Experimentation (Elbow) -->
    <path d="M 400 390 L 400 430 L 250 430 L 250 470" class="connector"/>

    <!-- ai-draft/* Branch to Squash Merge (Elbow) -->
    <path d="M 400 390 L 400 430 L 550 430 L 550 470" class="connector"/>

</svg>