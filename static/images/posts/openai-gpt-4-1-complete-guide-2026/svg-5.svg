<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7f8c8d"/>
    </marker>
    <marker id="b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#10a37f"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">GPT-4.1 API 빠른 시작 가이드</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">OpenAI API를 이용한 GPT-4.1 통합 단계별 가이드</text>

  <!-- Step 1 -->
  <rect x="40" y="78" width="720" height="62" rx="10" fill="#fff" stroke="#10a37f" stroke-width="1.5"/>
  <rect x="40" y="78" width="75" height="62" rx="10" fill="#10a37f"/>
  <rect x="103" y="78" width="12" height="62" fill="#10a37f"/>
  <text x="78" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff">1</text>
  <text x="78" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#d5f5e3">단계</text>
  <text x="430" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10a37f">OpenAI 계정 생성 및 API 키 발급</text>
  <text x="430" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">platform.openai.com → API Keys → 새 키 생성 → 환경변수 OPENAI_API_KEY에 저장</text>
  <line x1="400" y1="140" x2="400" y2="155" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <rect x="40" y="155" width="720" height="62" rx="10" fill="#fff" stroke="#3498db" stroke-width="1.5"/>
  <rect x="40" y="155" width="75" height="62" rx="10" fill="#3498db"/>
  <rect x="103" y="155" width="12" height="62" fill="#3498db"/>
  <text x="78" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff">2</text>
  <text x="78" y="203" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#d6eaf8">단계</text>
  <text x="430" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3498db">SDK 설치</text>
  <text x="430" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">pip install openai  (Python)  또는  npm install openai  (Node.js)</text>
  <line x1="400" y1="217" x2="400" y2="232" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 3: Basic code -->
  <rect x="40" y="232" width="720" height="100" rx="10" fill="#f0fdf4" stroke="#10a37f" stroke-width="1.5"/>
  <rect x="40" y="232" width="75" height="100" rx="10" fill="#10a37f"/>
  <rect x="103" y="232" width="12" height="100" fill="#10a37f"/>
  <text x="78" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff">3</text>
  <text x="78" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#d5f5e3">기본 코드</text>
  <text x="125" y="258" font-family="Courier New, monospace" font-size="11" fill="#2c3e50">from openai import OpenAI</text>
  <text x="125" y="276" font-family="Courier New, monospace" font-size="11" fill="#2c3e50">client = OpenAI()</text>
  <text x="125" y="294" font-family="Courier New, monospace" font-size="11" fill="#2c3e50">response = client.chat.completions.create(</text>
  <text x="125" y="312" font-family="Courier New, monospace" font-size="11" fill="#2c3e50">    model="gpt-4.1",  messages=[{"role":"user","content":"안녕!"}]</text>
  <text x="125" y="325" font-family="Courier New, monospace" font-size="11" fill="#2c3e50">)</text>
  <line x1="400" y1="332" x2="400" y2="347" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 4: Model selection -->
  <rect x="40" y="347" width="720" height="80" rx="10" fill="#fff" stroke="#9b59b6" stroke-width="1.5"/>
  <rect x="40" y="347" width="75" height="80" rx="10" fill="#9b59b6"/>
  <rect x="103" y="347" width="12" height="80" fill="#9b59b6"/>
  <text x="78" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff">4</text>
  <text x="78" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e8daef">모델 선택</text>
  <text x="430" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9b59b6">용도에 맞게 model 파라미터 변경</text>
  <text x="280" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">"gpt-4.1" — 고성능</text>
  <text x="280" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">복잡한 과제용</text>
  <text x="470" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">"gpt-4.1-mini" — 균형</text>
  <text x="470" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">일반 애플리케이션</text>
  <text x="660" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">"gpt-4.1-nano" — 초절전</text>
  <text x="660" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">대량처리 · 분류</text>

  <rect x="40" y="443" width="720" height="38" rx="8" fill="#10a37f"/>
  <text x="400" y="467" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">✅ 완료! Responses API로 에이전트 구현도 지원</text>
</svg>
