<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="460" fill="#f5f3ff" rx="16"/>
  <rect x="1" y="1" width="798" height="458" fill="none" stroke="#c4b5fd" stroke-width="2" rx="16"/>

  <text x="400" y="38" text-anchor="middle" fill="#3b0764" font-size="20" font-weight="700">싱글모드 vs 멀티모드 광섬유 비교</text>
  <text x="400" y="58" text-anchor="middle" fill="#64748b" font-size="13">용도에 따라 싱글모드(SMF)와 멀티모드(MMF) 중 적합한 규격을 선택합니다</text>

  <!-- Divider -->
  <line x1="400" y1="75" x2="400" y2="430" stroke="#e9d5ff" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- SMF side header -->
  <rect x="30" y="75" width="355" height="44" rx="8" fill="#7c3aed" fill-opacity="0.15" stroke="#7c3aed" stroke-width="2"/>
  <text x="207" y="100" text-anchor="middle" fill="#6d28d9" font-size="16" font-weight="700">싱글모드 (SMF)</text>
  <text x="207" y="114" text-anchor="middle" fill="#7c3aed" font-size="11">Single-Mode Fiber</text>

  <!-- MMF side header -->
  <rect x="415" y="75" width="355" height="44" rx="8" fill="#0891b2" fill-opacity="0.15" stroke="#0891b2" stroke-width="2"/>
  <text x="592" y="100" text-anchor="middle" fill="#0e7490" font-size="16" font-weight="700">멀티모드 (MMF)</text>
  <text x="592" y="114" text-anchor="middle" fill="#0891b2" font-size="11">Multi-Mode Fiber</text>

  <!-- SMF fiber diagram -->
  <rect x="60" y="135" width="295" height="50" rx="25" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="60" y="154" width="295" height="12" rx="6" fill="#7c3aed" fill-opacity="0.5" stroke="#6d28d9" stroke-width="1"/>
  <!-- Single light ray -->
  <line x1="75" y1="160" x2="340" y2="160" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="207" y="177" text-anchor="middle" fill="#6d28d9" font-size="11">코어 직경: 9μm — 단일 경로</text>

  <!-- MMF fiber diagram -->
  <rect x="445" y="135" width="295" height="50" rx="25" fill="#e0f2fe" stroke="#0891b2" stroke-width="1.5"/>
  <rect x="445" y="147" width="295" height="28" rx="14" fill="#0891b2" fill-opacity="0.3" stroke="#0e7490" stroke-width="1"/>
  <!-- Multiple light rays -->
  <line x1="460" y1="154" x2="725" y2="154" stroke="#f59e0b" stroke-width="1.5"/>
  <polyline points="460,161 510,154 560,161 610,154 660,161 710,154 725,157" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <polyline points="460,167 510,161 560,167 610,161 660,167 710,161 725,164" fill="none" stroke="#fde68a" stroke-width="1.5"/>
  <text x="592" y="177" text-anchor="middle" fill="#0e7490" font-size="11">코어 직경: 50/62.5μm — 다중 경로</text>

  <!-- Comparison table -->
  <!-- Headers -->
  <rect x="30" y="200" width="740" height="32" rx="4" fill="#f3e8ff"/>
  <text x="207" y="221" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="600">싱글모드</text>
  <text x="592" y="221" text-anchor="middle" fill="#0e7490" font-size="12" font-weight="600">멀티모드</text>
  <text x="400" y="221" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">항목</text>

  <!-- Row data -->
  <rect x="30" y="234" width="740" height="30" rx="0" fill="white"/>
  <text x="400" y="253" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">전송 거리</text>
  <text x="207" y="253" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="700">최대 80km+ (장거리)</text>
  <text x="592" y="253" text-anchor="middle" fill="#0e7490" font-size="12">최대 550m (단거리)</text>

  <rect x="30" y="264" width="740" height="30" rx="0" fill="#fafafa"/>
  <text x="400" y="283" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">전송 대역폭</text>
  <text x="207" y="283" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="700">매우 높음 (무제한에 가까움)</text>
  <text x="592" y="283" text-anchor="middle" fill="#0e7490" font-size="12">높음 (최대 100Gbps)</text>

  <rect x="30" y="294" width="740" height="30" rx="0" fill="white"/>
  <text x="400" y="313" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">광원</text>
  <text x="207" y="313" text-anchor="middle" fill="#6d28d9" font-size="12">레이저 다이오드 (LD)</text>
  <text x="592" y="313" text-anchor="middle" fill="#0e7490" font-size="12">LED / VCSEL</text>

  <rect x="30" y="324" width="740" height="30" rx="0" fill="#fafafa"/>
  <text x="400" y="343" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">색상 코딩</text>
  <text x="207" y="343" text-anchor="middle" fill="#6d28d9" font-size="12">노란색 (Yellow)</text>
  <text x="592" y="343" text-anchor="middle" fill="#0e7490" font-size="12">주황색/아쿠아색</text>

  <rect x="30" y="354" width="740" height="30" rx="0" fill="white"/>
  <text x="400" y="373" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">비용</text>
  <text x="207" y="373" text-anchor="middle" fill="#6d28d9" font-size="12">높음 (정밀 제조)</text>
  <text x="592" y="373" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">낮음 (경제적)</text>

  <rect x="30" y="384" width="740" height="30" rx="0" fill="#fafafa"/>
  <text x="400" y="403" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">주요 용도</text>
  <text x="207" y="403" text-anchor="middle" fill="#6d28d9" font-size="12">통신사 백본, 해저 케이블</text>
  <text x="592" y="403" text-anchor="middle" fill="#0e7490" font-size="12">데이터센터 내부, LAN</text>

  <!-- Bottom border line for table -->
  <rect x="30" y="234" width="740" height="180" fill="none" stroke="#e9d5ff" stroke-width="1.5" rx="4"/>
  <!-- Vertical dividers -->
  <line x1="310" y1="234" x2="310" y2="414" stroke="#e9d5ff" stroke-width="1"/>
  <line x1="490" y1="234" x2="490" y2="414" stroke="#e9d5ff" stroke-width="1"/>

  <text x="400" y="442" text-anchor="middle" fill="#94a3b8" font-size="11">OS1/OS2 = 싱글모드 표준 · OM1~OM5 = 멀티모드 표준 (OM5가 최신, 100G 이상 지원)</text>
</svg>
