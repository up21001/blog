<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="460" fill="#f0fdfa" rx="16"/>
  <rect x="1" y="1" width="798" height="458" fill="none" stroke="#99f6e4" stroke-width="2" rx="16"/>

  <text x="400" y="38" text-anchor="middle" fill="#134e4a" font-size="20" font-weight="700">광통신 vs 구리선 — 성능 비교</text>
  <text x="400" y="58" text-anchor="middle" fill="#64748b" font-size="13">5가지 핵심 지표로 광섬유와 구리 케이블을 직접 비교합니다</text>

  <!-- Bar chart -->
  <!-- Y axis label -->
  <text x="60" y="80" text-anchor="middle" fill="#64748b" font-size="11">100%</text>
  <text x="60" y="160" text-anchor="middle" fill="#64748b" font-size="11">75%</text>
  <text x="60" y="240" text-anchor="middle" fill="#64748b" font-size="11">50%</text>
  <text x="60" y="320" text-anchor="middle" fill="#64748b" font-size="11">25%</text>

  <!-- Grid lines -->
  <line x1="80" y1="78" x2="760" y2="78" stroke="#ccfbf1" stroke-width="1"/>
  <line x1="80" y1="158" x2="760" y2="158" stroke="#ccfbf1" stroke-width="1"/>
  <line x1="80" y1="238" x2="760" y2="238" stroke="#ccfbf1" stroke-width="1"/>
  <line x1="80" y1="318" x2="760" y2="318" stroke="#ccfbf1" stroke-width="1"/>
  <line x1="80" y1="350" x2="760" y2="350" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Category: 전송 속도 -->
  <!-- Fiber bar -->
  <rect x="105" y="78" width="60" height="272" rx="4" fill="#0d9488" fill-opacity="0.85"/>
  <text x="135" y="73" text-anchor="middle" fill="#0d9488" font-size="11" font-weight="700">100%</text>
  <!-- Copper bar -->
  <rect x="175" y="296" width="60" height="54" rx="4" fill="#94a3b8" fill-opacity="0.7"/>
  <text x="205" y="291" text-anchor="middle" fill="#64748b" font-size="11">20%</text>
  <text x="170" y="375" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">전송 속도</text>
  <text x="170" y="389" text-anchor="middle" fill="#64748b" font-size="10">Tbps vs Gbps</text>

  <!-- Category: 전송 거리 -->
  <rect x="255" y="78" width="60" height="272" rx="4" fill="#0d9488" fill-opacity="0.85"/>
  <text x="285" y="73" text-anchor="middle" fill="#0d9488" font-size="11" font-weight="700">100%</text>
  <rect x="325" y="316" width="60" height="34" rx="4" fill="#94a3b8" fill-opacity="0.7"/>
  <text x="355" y="311" text-anchor="middle" fill="#64748b" font-size="11">12%</text>
  <text x="320" y="375" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">전송 거리</text>
  <text x="320" y="389" text-anchor="middle" fill="#64748b" font-size="10">80km+ vs 100m</text>

  <!-- Category: 신호 손실 (낮을수록 좋음 — 광섬유가 낮음) -->
  <rect x="405" y="78" width="60" height="272" rx="4" fill="#0d9488" fill-opacity="0.85"/>
  <text x="435" y="73" text-anchor="middle" fill="#0d9488" font-size="11" font-weight="700">극소</text>
  <rect x="475" y="152" width="60" height="198" rx="4" fill="#94a3b8" fill-opacity="0.7"/>
  <text x="505" y="147" text-anchor="middle" fill="#64748b" font-size="11">높음</text>
  <text x="470" y="375" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">전자기 간섭</text>
  <text x="470" y="389" text-anchor="middle" fill="#64748b" font-size="10">(낮을수록 좋음)</text>

  <!-- Category: 무게/유연성 -->
  <rect x="555" y="158" width="60" height="192" rx="4" fill="#0d9488" fill-opacity="0.85"/>
  <text x="585" y="153" text-anchor="middle" fill="#0d9488" font-size="11" font-weight="700">가벼움</text>
  <rect x="625" y="238" width="60" height="112" rx="4" fill="#94a3b8" fill-opacity="0.7"/>
  <text x="655" y="233" text-anchor="middle" fill="#64748b" font-size="11">무거움</text>
  <text x="620" y="375" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">무게</text>
  <text x="620" y="389" text-anchor="middle" fill="#64748b" font-size="10">(가벼울수록 좋음)</text>

  <!-- Category: 비용 (구리선이 저렴) -->
  <rect x="690" y="198" width="60" height="152" rx="4" fill="#f97316" fill-opacity="0.7"/>
  <text x="720" y="193" text-anchor="middle" fill="#ea580c" font-size="11" font-weight="700">높음</text>
  <rect x="690" y="78" width="60" height="272" rx="4" fill="#94a3b8" fill-opacity="0.85"/>
  <!-- Overlap fix: show copper as lower cost -->
  <rect x="690" y="310" width="60" height="40" rx="4" fill="#22c55e" fill-opacity="0.7"/>
  <text x="720" y="375" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">설치 비용</text>
  <text x="720" y="389" text-anchor="middle" fill="#64748b" font-size="10">(낮을수록 유리)</text>

  <!-- Legend -->
  <rect x="80" y="408" width="300" height="38" rx="8" fill="white" stroke="#99f6e4" stroke-width="1.5"/>
  <rect x="100" y="420" width="16" height="16" rx="3" fill="#0d9488" fill-opacity="0.85"/>
  <text x="122" y="432" fill="#0f766e" font-size="12" font-weight="600">광섬유 (Fiber Optic)</text>
  <rect x="210" y="420" width="16" height="16" rx="3" fill="#94a3b8" fill-opacity="0.7"/>
  <text x="232" y="432" fill="#64748b" font-size="12">구리 케이블 (Copper)</text>

  <rect x="420" y="408" width="350" height="38" rx="8" fill="white" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="595" y="424" text-anchor="middle" fill="#374151" font-size="11" font-weight="600">종합 결론</text>
  <text x="595" y="439" text-anchor="middle" fill="#64748b" font-size="11">광통신 우세 (속도·거리·간섭) · 구리선 우세 (비용·설치 용이성)</text>
</svg>
