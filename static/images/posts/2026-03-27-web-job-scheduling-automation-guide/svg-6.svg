<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#4A90D9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Error Handling and Notification System</title>

  <!-- Main Warning Symbol (Triangle with Exclamation Mark) -->
