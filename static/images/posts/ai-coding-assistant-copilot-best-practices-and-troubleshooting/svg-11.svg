<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <style>
      .title {
        font-size: 38px;
        font-weight: bold;
        fill: #2C3E50;
        text-anchor: middle;
      }
      .subtitle {
        font-size: 24px;
        fill: #34495E;
        text-anchor: middle;
      }
      .cockpit-base {
        fill: #2C3E50;
        stroke: #34495E;
        stroke-width: 3;
      }
      .dashboard-screen {
        fill: #34495E;
        stroke: #5D6D7E;
        stroke-width: 2;
        rx: 8;
        ry: 8;
      }
      .dashboard-text {
        font-size: 18px;
        fill: #ECF0F1;
        text-anchor: middle;
      }
      .ai-screen {
        fill: #2ECC71;
        stroke: #28B463;
        stroke-width: 3;
        rx: 10;
        ry: 10;
      }
      .ai-text {
        font-size: 22px;
        font-weight: bold;
        fill: #FFFFFF;
        text-anchor: middle;
      }
      .pilot-body {
        fill: #3498DB;
      }
      .pilot-head {
        fill: #ECF0F1;
      }
      .yoke {
        fill: #BDC3C7;
        stroke: #95A5A6;
        stroke-width: 2;
      }
      .message-box {
        fill: #AED6F1;
        stroke: #3498DB;
        stroke-width: 2;
        rx: 10;
        ry: 10;
      }
      .message-text {
        font-size: 20px;
        font-weight: bold;
        fill: #2C3E50;
        text-anchor: middle;
      }
      .message-box.green { fill: #D1F2EB; stroke: #2ECC71; }
      .message-box.yellow { fill: #FCF3CF; stroke: #F1C40F; }
      .message-box.orange { fill: #FADBD8; stroke: #E67E22; }
      .message-box.blue { fill: #EBF5FB; stroke: #3498DB; }
      .connector-line {
        stroke: #7F8C8D;
        stroke-width: 2;
        stroke-dasharray: 5 5;
        fill: none;
      }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="70" class="title">AI Coding Assistant: The Future Controlled by Developers</text>
  <text x="400" y="105" class="subtitle">AI is a powerful tool, but final control rests with developers!</text>

  <!-- Cockpit Base -->
  <rect x="100" y="150" width="600" height="450" rx="30" ry="30" class="cockpit-base"/>

  <!-- Dashboard Screens -->
  <rect x="150" y="190" width="120" height="80" class="dashboard-screen"/>
  <text x="210" y="235" class="dashboard-text">Code Analysis</text>

  <rect x="300" y="190" width="120" height="80" class="dashboard-screen"/>
  <text x="360" y="235" class="dashboard-text">Performance Monitor</text>

  <rect x="450" y="190" width="120" height="80" class="dashboard-screen"/>
  <text x="510" y="235" class="dashboard-text">Project Status</text>
  
  <rect x="600" y="190" width="120" height="80" class="dashboard-screen"/>
  <text x="660" y="235" class="dashboard-text">Version Control</text>

  <!-- Prominent AI Autopilot Screen -->
  <rect x="250" y="300" width="300" height="150" class="ai-screen"/>
  <text x="400" y="360" class="ai-text">Autopilot (AI)</text>
  <text x="400" y="395" class="ai-text" font-size="18px">Active: Under Developer Supervision</text>

  <!-- Pilot Figure -->
  <g transform="translate(400, 500)">
    <!-- Body -->
    <rect x="-70" y="0" width="140" height="100" rx="20" ry="20" class="pilot-body"/>
    <!-- Head -->
    <circle cx="0" cy="-30" r="40" class="pilot-head"/>
    <!-- Neck -->
    <rect x="-20" y="-10" width="40" height="20" fill="#BDC3C7"/>
  </g>

  <!-- Control Yoke -->
  <g transform="translate(400, 580)">
    <rect x="-100" y="-20" width="200" height="40" rx="10" ry="10" class="yoke"/>
    <circle cx="-70" cy="0" r="15" fill="#95A5A6"/>
    <circle cx="70" cy="0" r="15" fill="#95A5A6"/>
    <rect x="-10" y="20" width="20" height="40" fill="#BDC3C7"/>
  </g>

  <!-- Key Messages -->
  <rect x="50" y="680" width="160" height="80" class="message-box blue"/>
  <text x="130" y="710" class="message-text">Final responsibility</text>
  <text x="130" y="735" class="message-text">rests with developers</text>

  <rect x="220" y="680" width="180" height="80" class="message-box green"/>
  <text x="310" y="710" class="message-text">AI is just a tool,</text>
  <text x="310" y="735" class="message-text">I hold the controls</text>

  <rect x="410" y="680" width="180" height="80" class="message-box yellow"/>
  <text x="500" y="710" class="message-text">Code review and</text>
  <text x="500" y="735" class="message-text">debugging essential</text>

  <rect x="600" y="680" width="160" height="80" class="message-box orange"/>
  <text x="680" y="710" class="message-text">Strategic</text>
  <text x="680" y="735" class="message-text">decision-making leadership</text>

  <rect x="250" y="800" width="300" height="80" class="message-box blue"/>
  <text x="400" y="830" class="message-text">AI utilization = Developer's core competency</text>
  
  <!-- Connectors from Key Messages to Cockpit -->
  <line x1="130" y1="680" x2="250" y2="450" class="connector-line"/>
  <line x1="310" y1="680" x2="350" y2="450" class="connector-line"/>
  <line x1="500" y1="680" x2="450" y2="450" class="connector-line"/>
  <line x1="680" y1="680" x2="550" y2="450" class="connector-line"/>
  <line x1="400" y1="800" x2="400" y2="450" class="connector-line"/>

</svg>