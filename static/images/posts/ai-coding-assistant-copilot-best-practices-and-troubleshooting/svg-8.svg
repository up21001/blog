<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2D3748"/>
    </marker>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>
  <style>
    .box { stroke-width:1; rx:10; filter:url(#sh); }
    .lbl { font-family:Arial,sans-serif; font-size:15px; font-weight:bold; fill:#fff; text-anchor:middle; dominant-baseline:middle; }
    .lbl-d { font-family:Arial,sans-serif; font-size:15px; font-weight:bold; fill:#2D3748; text-anchor:middle; dominant-baseline:middle; }
    .al { font-family:Arial,sans-serif; font-size:11px; fill:#2D3748; text-anchor:middle; }
    .ar { stroke:#2D3748; stroke-width:2; fill:none; marker-end:url(#arr); }
  </style>

  <rect width="800" height="520" fill="#f8f9fa"/>

  <!-- 사용자/클라이언트 -->
  <rect x="40" y="30" width="140" height="50" class="box" fill="#4A90D9"/>
  <text x="110" y="55" class="lbl">클라이언트</text>

  <!-- 프론트엔드 -->
  <rect x="40" y="140" width="140" height="55" class="box" fill="#50C878"/>
  <text x="110" y="162" class="lbl">프론트엔드</text>
  <text x="110" y="180" class="lbl" font-size="11">웹/모바일</text>

  <!-- API 게이트웨이 -->
  <rect x="280" y="140" width="160" height="55" class="box" fill="#FFD93D"/>
  <text x="360" y="168" class="lbl-d">API 게이트웨이</text>

  <!-- 서비스들 -->
  <rect x="560" y="40" width="160" height="50" class="box" fill="#6C5CE7"/>
  <text x="640" y="65" class="lbl">사용자 서비스</text>

  <rect x="560" y="140" width="160" height="50" class="box" fill="#6C5CE7"/>
  <text x="640" y="165" class="lbl">제품 서비스</text>

  <rect x="560" y="240" width="160" height="50" class="box" fill="#6C5CE7"/>
  <text x="640" y="265" class="lbl">주문 서비스</text>

  <!-- DB -->
  <rect x="560" y="370" width="160" height="55" class="box" fill="#FF6B6B"/>
  <text x="640" y="398" class="lbl">데이터베이스</text>

  <!-- 외부 서비스 -->
  <rect x="40" y="370" width="140" height="55" class="box" fill="#4A90D9"/>
  <text x="110" y="392" class="lbl">외부 서비스</text>
  <text x="110" y="410" class="lbl" font-size="11">연동</text>

  <!-- 화살표 -->
  <!-- 클라이언트 → 프론트엔드 -->
  <path class="ar" d="M 110 80 L 110 140"/>
  <rect x="80" y="100" width="35" height="16" fill="#f8f9fa" rx="3"/>
  <text x="98" y="111" class="al">요청</text>

  <!-- 프론트엔드 → 게이트웨이 -->
  <path class="ar" d="M 180 168 L 280 168"/>
  <rect x="208" y="152" width="50" height="16" fill="#f8f9fa" rx="3"/>
  <text x="233" y="163" class="al">API 요청</text>

  <!-- 게이트웨이 → 사용자서비스 -->
  <path class="ar" d="M 440 155 L 500 155 L 500 65 L 560 65"/>
  <rect x="475" y="98" width="55" height="16" fill="#f8f9fa" rx="3"/>
  <text x="503" y="109" class="al">라우팅</text>

  <!-- 게이트웨이 → 제품서비스 -->
  <path class="ar" d="M 440 168 L 560 168"/>
  <rect x="478" y="152" width="55" height="16" fill="#f8f9fa" rx="3"/>
  <text x="506" y="163" class="al">라우팅</text>

  <!-- 게이트웨이 → 주문서비스 -->
  <path class="ar" d="M 440 180 L 500 180 L 500 265 L 560 265"/>
  <rect x="475" y="215" width="55" height="16" fill="#f8f9fa" rx="3"/>
  <text x="503" y="226" class="al">라우팅</text>

  <!-- 서비스 → DB (각각 독립 경로) -->
  <path class="ar" d="M 640 90 L 640 370"/>
  <rect x="645" y="200" width="75" height="16" fill="#f8f9fa" rx="3"/>
  <text x="683" y="211" class="al">데이터 조회</text>

  <path class="ar" d="M 680 190 L 680 370"/>
  <rect x="685" y="280" width="75" height="16" fill="#f8f9fa" rx="3"/>
  <text x="723" y="291" class="al">데이터 저장</text>

  <path class="ar" d="M 620 290 L 620 370"/>
  <rect x="570" y="325" width="60" height="16" fill="#f8f9fa" rx="3"/>
  <text x="600" y="336" class="al">주문 처리</text>

  <!-- 프론트엔드 → 외부서비스 -->
  <path class="ar" d="M 110 195 L 110 370"/>
  <rect x="60" y="275" width="70" height="16" fill="#f8f9fa" rx="3"/>
  <text x="95" y="286" class="al">외부 연동</text>
</svg>
