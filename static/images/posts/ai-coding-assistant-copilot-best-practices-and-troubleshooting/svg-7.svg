<svg viewBox="0 0 800 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2D3748"/>
    </marker>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>
  <style>
    .box { stroke-width:1; rx:10; filter:url(#sh); }
    .lbl { font-family:Arial,sans-serif; font-size:18px; font-weight:bold; fill:#fff; text-anchor:middle; dominant-baseline:middle; }
    .lbl-d { font-family:Arial,sans-serif; font-size:18px; font-weight:bold; fill:#2D3748; text-anchor:middle; dominant-baseline:middle; }
    .al { font-family:Arial,sans-serif; font-size:11px; fill:#2D3748; text-anchor:middle; }
    .ar { stroke:#2D3748; stroke-width:2; fill:none; marker-end:url(#arr); }
  </style>

  <rect width="800" height="580" fill="#f8f9fa"/>

  <!-- 클라이언트 -->
  <rect x="300" y="20" width="180" height="50" class="box" fill="#4A90D9"/>
  <text x="390" y="45" class="lbl">클라이언트</text>

  <!-- 로드 밸런서 -->
  <rect x="300" y="120" width="180" height="55" class="box" fill="#FFD93D"/>
  <text x="390" y="148" class="lbl-d">로드 밸런서</text>

  <!-- 웹서버 1 -->
  <rect x="120" y="230" width="170" height="55" class="box" fill="#4A90D9"/>
  <text x="205" y="258" class="lbl">웹 서버 1</text>

  <!-- 웹서버 2 -->
  <rect x="480" y="230" width="170" height="55" class="box" fill="#4A90D9"/>
  <text x="565" y="258" class="lbl">웹 서버 2</text>

  <!-- 앱 서버 -->
  <rect x="280" y="350" width="220" height="55" class="box" fill="#50C878"/>
  <text x="390" y="373" class="lbl">애플리케이션 서버</text>

  <!-- DB -->
  <rect x="300" y="470" width="180" height="55" class="box" fill="#FF6B6B"/>
  <text x="390" y="498" class="lbl">데이터베이스</text>

  <!-- 요청 화살표 -->
  <!-- 클라이언트 → 로드밸런서 -->
  <path class="ar" d="M 370 70 L 370 120"/>
  <rect x="320" y="85" width="40" height="16" fill="#f8f9fa" rx="3"/>
  <text x="340" y="96" class="al">요청</text>

  <!-- 로드밸런서 → 웹서버1 -->
  <path class="ar" d="M 330 175 L 240 230"/>
  <rect x="248" y="190" width="55" height="16" fill="#f8f9fa" rx="3"/>
  <text x="276" y="201" class="al">분산 요청</text>

  <!-- 로드밸런서 → 웹서버2 -->
  <path class="ar" d="M 450 175 L 530 230"/>
  <rect x="468" y="190" width="55" height="16" fill="#f8f9fa" rx="3"/>
  <text x="496" y="201" class="al">분산 요청</text>

  <!-- 웹서버1 → 앱서버 -->
  <path class="ar" d="M 240 285 L 330 350"/>
  <rect x="252" y="307" width="55" height="16" fill="#f8f9fa" rx="3"/>
  <text x="280" y="318" class="al">처리 요청</text>

  <!-- 웹서버2 → 앱서버 -->
  <path class="ar" d="M 530 285 L 450 350"/>
  <rect x="468" y="307" width="55" height="16" fill="#f8f9fa" rx="3"/>
  <text x="496" y="318" class="al">처리 요청</text>

  <!-- 앱서버 → DB -->
  <path class="ar" d="M 370 405 L 370 470"/>
  <rect x="315" y="428" width="60" height="16" fill="#f8f9fa" rx="3"/>
  <text x="345" y="439" class="al">데이터 질의</text>

  <!-- 응답 화살표 (오른쪽 오프셋) -->
  <!-- DB → 앱서버 -->
  <path class="ar" d="M 420 470 L 420 405"/>
  <rect x="423" y="428" width="55" height="16" fill="#f8f9fa" rx="3"/>
  <text x="451" y="439" class="al">데이터 응답</text>

  <!-- 로드밸런서 → 클라이언트 (응답) -->
  <path class="ar" d="M 420 120 L 420 70"/>
  <rect x="423" y="85" width="35" height="16" fill="#f8f9fa" rx="3"/>
  <text x="441" y="96" class="al">응답</text>
</svg>
