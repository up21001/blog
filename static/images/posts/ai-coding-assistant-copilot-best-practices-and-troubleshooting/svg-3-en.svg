<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>
  <style>
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2D3748; text-anchor: middle; }
    .box { rx: 10; filter: url(#sh); }
    .lbl { font-family: Arial, sans-serif; font-size: 15px; font-weight: bold; fill: #fff; text-anchor: middle; dominant-baseline: middle; }
    .desc { font-family: Arial, sans-serif; font-size: 12px; fill: #555; text-anchor: middle; }
    .warn { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #FF6B6B; text-anchor: middle; }
    .ok { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #50C878; text-anchor: middle; }
  </style>

  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="35" class="title">AI Coding Assistant Hallucination</text>

  <rect x="290" y="60" width="220" height="50" class="box" fill="#4A90D9"/>
  <text x="400" y="85" class="lbl">AI Coding Assistant</text>

  <line x1="340" y1="110" x2="340" y2="150" stroke="#2D3748" stroke-width="2"/>
  <polygon points="340,155 335,145 345,145" fill="#2D3748"/>
  <line x1="460" y1="110" x2="460" y2="150" stroke="#2D3748" stroke-width="2"/>
  <polygon points="460,155 455,145 465,145" fill="#2D3748"/>

  <rect x="60" y="155" width="280" height="300" rx="12" fill="#FFF0F0" stroke="#FF6B6B" stroke-width="2"/>
  <text x="200" y="185" class="warn">Hallucinated Code</text>

  <rect x="80" y="200" width="240" height="55" class="box" fill="#FF6B6B"/>
  <text x="200" y="222" class="lbl">Non-existent API calls</text>
  <text x="200" y="240" class="lbl" font-size="11">db.query.optimized()</text>

  <rect x="80" y="270" width="240" height="55" class="box" fill="#FF6B6B"/>
  <text x="200" y="292" class="lbl">Hardcoded credentials</text>
  <text x="200" y="310" class="lbl" font-size="11">password="admin123"</text>

  <rect x="80" y="340" width="240" height="55" class="box" fill="#FF6B6B"/>
  <text x="200" y="362" class="lbl">Outdated anti-patterns</text>
  <text x="200" y="380" class="lbl" font-size="11">SQL string concatenation</text>

  <text x="200" y="425" class="desc">AI reproduces bad patterns from</text>
  <text x="200" y="442" class="desc">training data without judgment.</text>

  <rect x="460" y="155" width="280" height="300" rx="12" fill="#F0FFF4" stroke="#50C878" stroke-width="2"/>
  <text x="600" y="185" class="ok">Verified Safe Code</text>

  <rect x="480" y="200" width="240" height="55" class="box" fill="#50C878"/>
  <text x="600" y="222" class="lbl">Documented API usage</text>
  <text x="600" y="240" class="lbl" font-size="11">db.execute(query)</text>

  <rect x="480" y="270" width="240" height="55" class="box" fill="#50C878"/>
  <text x="600" y="292" class="lbl">Environment variables</text>
  <text x="600" y="310" class="lbl" font-size="11">os.environ["DB_PASS"]</text>

  <rect x="480" y="340" width="240" height="55" class="box" fill="#50C878"/>
  <text x="600" y="362" class="lbl">Parameterized queries</text>
  <text x="600" y="380" class="lbl" font-size="11">cursor.execute(sql, params)</text>

  <text x="600" y="425" class="desc">Developers must review and</text>
  <text x="600" y="442" class="desc">replace with safe patterns.</text>
</svg>
