<svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2D3748"/>
    </marker>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>
  <style>
    .box { stroke-width:1; rx:8; filter:url(#sh); }
    .lbl { font-family:Arial,sans-serif; font-size:16px; font-weight:bold; fill:#fff; text-anchor:middle; dominant-baseline:middle; }
    .lbl-d { font-family:Arial,sans-serif; font-size:16px; font-weight:bold; fill:#2D3748; text-anchor:middle; dominant-baseline:middle; }
    .al { font-family:Arial,sans-serif; font-size:12px; fill:#2D3748; text-anchor:middle; }
    .ar { stroke:#2D3748; stroke-width:2; fill:none; marker-end:url(#arr); }
  </style>

  <rect width="800" height="550" fill="#f8f9fa"/>

  <!-- 사용자 -->
  <rect x="310" y="20" width="180" height="50" class="box" fill="#6C5CE7"/>
  <text x="400" y="45" class="lbl">사용자</text>

  <!-- 클라이언트 -->
  <rect x="280" y="120" width="240" height="55" class="box" fill="#4A90D9"/>
  <text x="400" y="148" class="lbl">웹/모바일 클라이언트</text>

  <!-- 로드 밸런서 -->
  <rect x="310" y="225" width="180" height="55" class="box" fill="#FFD93D"/>
  <text x="400" y="253" class="lbl-d">로드 밸런서</text>

  <!-- 앱 서버 -->
  <rect x="280" y="340" width="200" height="55" class="box" fill="#4A90D9"/>
  <text x="380" y="368" class="lbl">애플리케이션 서버</text>

  <!-- DB -->
  <rect x="280" y="455" width="140" height="55" class="box" fill="#50C878"/>
  <text x="350" y="483" class="lbl">데이터베이스</text>

  <!-- 외부 서비스 -->
  <rect x="560" y="280" width="140" height="55" class="box" fill="#FFD93D"/>
  <text x="630" y="308" class="lbl-d">외부 서비스</text>

  <!-- 화살표 (요청 = 왼쪽, 응답 = 오른쪽에 분리) -->
  <!-- 사용자 → 클라이언트 -->
  <path class="ar" d="M 380 70 L 380 120"/>
  <rect x="330" y="85" width="35" height="18" fill="#f8f9fa" rx="3"/>
  <text x="348" y="97" class="al">요청</text>

  <!-- 클라이언트 → 로드밸런서 -->
  <path class="ar" d="M 380 175 L 380 225"/>
  <rect x="322" y="190" width="50" height="18" fill="#f8f9fa" rx="3"/>
  <text x="347" y="202" class="al">HTTPS</text>

  <!-- 로드밸런서 → 앱서버 -->
  <path class="ar" d="M 380 280 L 380 340"/>
  <rect x="322" y="300" width="60" height="18" fill="#f8f9fa" rx="3"/>
  <text x="352" y="312" class="al">트래픽 분배</text>

  <!-- 앱서버 → DB -->
  <path class="ar" d="M 350 395 L 350 455"/>
  <rect x="295" y="415" width="65" height="18" fill="#f8f9fa" rx="3"/>
  <text x="328" y="427" class="al">데이터 질의</text>

  <!-- 앱서버 → 외부 서비스 -->
  <path class="ar" d="M 480 355 L 560 315"/>
  <rect x="495" y="320" width="60" height="18" fill="#f8f9fa" rx="3"/>
  <text x="525" y="332" class="al">API 호출</text>

  <!-- 응답 (오른쪽 경로) -->
  <!-- DB → 앱서버 -->
  <path class="ar" d="M 420 475 L 450 475 L 450 395"/>
  <rect x="453" y="425" width="60" height="18" fill="#f8f9fa" rx="3"/>
  <text x="483" y="437" class="al">결과 반환</text>

  <!-- 외부 → 앱서버 -->
  <path class="ar" d="M 560 325 L 480 375"/>
  <rect x="505" y="350" width="35" height="18" fill="#f8f9fa" rx="3"/>
  <text x="523" y="362" class="al">응답</text>

  <!-- 앱서버 → 로드밸런서 (응답) -->
  <path class="ar" d="M 430 340 L 430 280"/>
  <rect x="433" y="300" width="35" height="18" fill="#f8f9fa" rx="3"/>
  <text x="451" y="312" class="al">응답</text>

  <!-- 로드밸런서 → 클라이언트 (응답) -->
  <path class="ar" d="M 430 225 L 430 175"/>
  <rect x="433" y="190" width="35" height="18" fill="#f8f9fa" rx="3"/>
  <text x="451" y="202" class="al">응답</text>

  <!-- 클라이언트 → 사용자 (화면표시) -->
  <path class="ar" d="M 430 120 L 430 70"/>
  <rect x="433" y="85" width="55" height="18" fill="#f8f9fa" rx="3"/>
  <text x="461" y="97" class="al">화면 표시</text>
</svg>
