<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2D3748"/>
    </marker>
  </defs>
  <style>
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2D3748; text-anchor: middle; }
    .box { rx: 10; filter: url(#sh); }
    .lbl { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; text-anchor: middle; dominant-baseline: middle; }
    .al { font-family: Arial, sans-serif; font-size: 11px; fill: #2D3748; text-anchor: middle; }
    .ar { stroke: #2D3748; stroke-width: 2; fill: none; marker-end: url(#arr); }
  </style>

  <rect width="800" height="480" fill="#f8f9fa"/>
  <text x="400" y="35" class="title">Security Vulnerabilities AI Can Introduce</text>

  <rect x="280" y="55" width="240" height="50" class="box" fill="#4A90D9"/>
  <text x="400" y="80" class="lbl">AI Generated Code</text>

  <path class="ar" d="M 160 105 L 160 150"/>
  <path class="ar" d="M 400 105 L 400 150"/>
  <path class="ar" d="M 640 105 L 640 150"/>

  <rect x="60" y="150" width="200" height="70" class="box" fill="#FF6B6B"/>
  <text x="160" y="180" class="lbl">Hardcoded</text>
  <text x="160" y="198" class="lbl">Credentials</text>

  <rect x="300" y="150" width="200" height="70" class="box" fill="#FF6B6B"/>
  <text x="400" y="180" class="lbl">SQL Injection</text>
  <text x="400" y="198" class="lbl">Vulnerability</text>

  <rect x="540" y="150" width="200" height="70" class="box" fill="#FF6B6B"/>
  <text x="640" y="180" class="lbl">XSS Cross-Site</text>
  <text x="640" y="198" class="lbl">Scripting</text>

  <path class="ar" d="M 160 220 L 160 265"/>
  <path class="ar" d="M 400 220 L 400 265"/>
  <path class="ar" d="M 640 220 L 640 265"/>

  <rect x="120" y="237" width="80" height="16" fill="#f8f9fa" rx="3"/>
  <text x="160" y="248" class="al">Replace with</text>
  <rect x="360" y="237" width="80" height="16" fill="#f8f9fa" rx="3"/>
  <text x="400" y="248" class="al">Replace with</text>
  <rect x="600" y="237" width="80" height="16" fill="#f8f9fa" rx="3"/>
  <text x="640" y="248" class="al">Replace with</text>

  <rect x="60" y="265" width="200" height="70" class="box" fill="#50C878"/>
  <text x="160" y="295" class="lbl">Environment</text>
  <text x="160" y="313" class="lbl">Variables</text>

  <rect x="300" y="265" width="200" height="70" class="box" fill="#50C878"/>
  <text x="400" y="295" class="lbl">Parameterized</text>
  <text x="400" y="313" class="lbl">Queries</text>

  <rect x="540" y="265" width="200" height="70" class="box" fill="#50C878"/>
  <text x="640" y="295" class="lbl">Input Sanitization</text>
  <text x="640" y="313" class="lbl">&amp; Escaping</text>

  <path class="ar" d="M 400 335 L 400 385"/>

  <rect x="150" y="385" width="500" height="55" class="box" fill="#6C5CE7"/>
  <text x="400" y="407" class="lbl">Developer Security Review Required</text>
  <text x="400" y="427" class="lbl" font-size="12">Static analysis + Code review + Penetration testing</text>
</svg>
