<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title {
      font-family: "Arial, sans-serif";
      font-size: 32px;
      font-weight: bold;
      fill: #333;
      text-anchor: middle;
    }
    .section-title {
      font-family: "Arial, sans-serif";
      font-size: 24px;
      font-weight: bold;
      fill: #333;
      text-anchor: middle;
    }
    .description {
      font-family: "Arial, sans-serif";
      font-size: 18px;
      fill: #333;
      text-anchor: middle;
    }
    .icon-stroke {
      stroke: #333;
      stroke-width: 4;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .icon-fill {
      fill: #333;
    }
  </style>

  <!-- Title -->
  <text x="400" y="80" class="title">Three Fundamental Limitations of AI Coding Assistants</text>

  <!-- Section 1: 의미론적 이해 부재 -->
  <g transform="translate(0, 180)">
    <!-- Icon: Brain with X -->
    <g transform="translate(400, 0)">
      <!-- Brain outline -->
      <path class="icon-stroke" d="M-50,0 C-70,-60 -30,-80 0,-70 C30,-80 70,-60 50,0 C60,40 30,70 0,60 C-30,70 -60,40 -50,0 Z"/>
      <path class="icon-stroke" d="M-10,-50 C-25,-40 -25,20 -10,30"/>
      <path class="icon-stroke" d="M10,-50 C25,-40 25,20 10,30"/>
      <!-- X mark -->
      <line class="icon-stroke" x1="-30" y1="-30" x2="30" y2="30"/>
      <line class="icon-stroke" x1="30" y1="-30" x2="-30" y2="30"/>
    </g>
    <text x="400" y="120" class="section-title">1. Lack of Semantic Understanding</text>
    <text x="400" y="160" class="description">Code may be syntactically correct,</text>
    <text x="400" y="185" class="description">but it lacks deep understanding of actual intent or context.</text>
  </g>

  <!-- Section 2: 과거 데이터 의존성 -->
  <g transform="translate(0, 420)">
    <!-- Icon: Old Calendar -->
    <g transform="translate(400, 0)">
      <!-- Calendar body -->
      <rect class="icon-stroke" x="-40" y="-50" width="80" height="100" rx="8" ry="8"/>
      <!-- Top bar -->
      <rect class="icon-fill" x="-40" y="-50" width="80" height="20" rx="8" ry="8"/>
      <!-- Calendar month text (e.g., "OCT") -->
      <text x="0" y="-35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">OCT</text>
      <!-- Date number (e.g., "24") -->
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#333" text-anchor="middle">24</text>
      <!-- Folded corner -->
      <path class="icon-fill" d="M40,-50 L10,-50 L40,-20 Z"/>
    </g>
    <text x="400" y="120" class="section-title">2. Dependence on Past Data</text>
    <text x="400" y="160" class="description">Generates code based on learned past data,</text>
    <text x="400" y="185" class="description">weak in adopting latest technologies or innovative solutions.</text>
  </g>

  <!-- Section 3: 제한된 컨텍스트 윈도우 -->
  <g transform="translate(0, 660)">
    <!-- Icon: Magnifying glass showing only a part -->
    <g transform="translate(400, 0)">
      <!-- Full context rectangle -->
      <rect x="-60" y="-40" width="120" height="80" fill="#EEE" stroke="#333" stroke-width="2" rx="5" ry="5"/>
      <!-- Magnifying glass lens -->
      <circle class="icon-stroke" cx="0" cy="0" r="35"/>
      <!-- Magnifying glass handle -->
      <line class="icon-stroke" x1="25" y1="25" x2="55" y2="55"/>
      <!-- Highlighted part inside the lens -->
      <rect x="-20" y="-15" width="40" height="30" fill="#333" opacity="0.1"/>
      <!-- Small text/pattern inside the context -->
      <text x="-40" y="-20" font-family="Arial, sans-serif" font-size="10" fill="#666">Code Block 1</text>
      <text x="-40" y="0" font-family="Arial, sans-serif" font-size="10" fill="#666">Code Block 2</text>
      <text x="-40" y="20" font-family="Arial, sans-serif" font-size="10" fill="#666">Code Block 3</text>
      <text x="20" y="-20" font-family="Arial, sans-serif" font-size="10" fill="#666">...</text>
      <text x="20" y="0" font-family="Arial, sans-serif" font-size="10" fill="#666">...</text>
      <text x="20" y="20" font-family="Arial, sans-serif" font-size="10" fill="#666">...</text>
    </g>
    <text x="400" y="120" class="section-title">3. Limited Context Window</text>
    <text x="400" y="160" class="description">Due to a limited amount of code it can process,</text>
    <text x="400" y="185" class="description">it struggles to grasp complex interactions in large projects.</text>
  </g>

</svg>