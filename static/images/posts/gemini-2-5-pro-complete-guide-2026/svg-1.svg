<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#2c3e50">Google Gemini 2.5 Pro 핵심 기능 한눈에 보기</text>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">2026년 3월 출시 — Google 최고 성능 AI 모델</text>

  <!-- Center circle -->
  <circle cx="400" cy="260" r="70" fill="#4285f4" stroke="#ffffff" stroke-width="4"/>
  <text x="400" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Gemini</text>
  <text x="400" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">2.5 Pro</text>
  <text x="400" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bbdefb">Google DeepMind</text>

  <!-- Feature bubbles -->
  <!-- 1M Context -->
  <circle cx="180" cy="140" r="58" fill="#ffffff" stroke="#4285f4" stroke-width="2"/>
  <text x="180" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#4285f4">1M</text>
  <text x="180" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">토큰 컨텍스트</text>
  <text x="180" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">업계 최장</text>

  <!-- Thinking Mode -->
  <circle cx="400" cy="100" r="58" fill="#ffffff" stroke="#ea4335" stroke-width="2"/>
  <text x="400" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ea4335">🧠 사고 모드</text>
  <text x="400" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Thinking Mode</text>
  <text x="400" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">단계별 추론</text>

  <!-- Multimodal -->
  <circle cx="620" cy="140" r="58" fill="#ffffff" stroke="#34a853" stroke-width="2"/>
  <text x="620" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#34a853">🎨 멀티모달</text>
  <text x="620" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">텍스트+이미지</text>
  <text x="620" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">+오디오+비디오</text>

  <!-- Code -->
  <circle cx="160" cy="360" r="58" fill="#ffffff" stroke="#fbbc04" stroke-width="2"/>
  <text x="160" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f39c12">⚡ 코딩</text>
  <text x="160" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">코드 생성</text>
  <text x="160" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">디버깅·분석</text>

  <!-- Grounding -->
  <circle cx="400" cy="410" r="58" fill="#ffffff" stroke="#9b59b6" stroke-width="2"/>
  <text x="400" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9b59b6">🌐 실시간 검색</text>
  <text x="400" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Google 검색</text>
  <text x="400" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">그라운딩 지원</text>

  <!-- Benchmark -->
  <circle cx="640" cy="360" r="58" fill="#ffffff" stroke="#1abc9c" stroke-width="2"/>
  <text x="640" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1abc9c">🏆 No.1</text>
  <text x="640" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">LMSYS Chatbot</text>
  <text x="640" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Arena 1위</text>

  <!-- Connection lines -->
  <line x1="230" y1="165" x2="342" y2="215" stroke="#4285f4" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="400" y1="158" x2="400" y2="190" stroke="#ea4335" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="570" y1="165" x2="458" y2="215" stroke="#34a853" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="213" y1="330" x2="342" y2="305" stroke="#fbbc04" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="400" y1="352" x2="400" y2="330" stroke="#9b59b6" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="587" y1="330" x2="458" y2="305" stroke="#1abc9c" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">Google AI Studio · Vertex AI · Gemini API 통해 이용 가능</text>
</svg>
