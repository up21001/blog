<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">Gemini 2.5 Pro — Standard vs Thinking Mode</text>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">Choose the right mode for your use case</text>

  <!-- Left: Standard Mode -->
  <rect x="30" y="80" width="355" height="390" rx="12" fill="#ffffff" stroke="#4285f4" stroke-width="2"/>
  <rect x="30" y="80" width="355" height="55" rx="12" fill="#4285f4"/>
  <rect x="30" y="123" width="355" height="12" fill="#4285f4"/>
  <text x="207" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#fff">⚡ Standard Mode</text>

  <text x="207" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4285f4">Input → Immediate Response</text>

  <defs>
    <marker id="b1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#4285f4"/>
    </marker>
    <marker id="b2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#ea4335"/>
    </marker>
  </defs>

  <rect x="80" y="175" width="255" height="40" rx="8" fill="#ebf5fb" stroke="#4285f4" stroke-width="1"/>
  <text x="207" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Receive User Input</text>
  <line x1="207" y1="215" x2="207" y2="230" stroke="#4285f4" stroke-width="1.5" marker-end="url(#b1)"/>
  <rect x="80" y="230" width="255" height="40" rx="8" fill="#ebf5fb" stroke="#4285f4" stroke-width="1"/>
  <text x="207" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Pattern Matching &amp; Knowledge Retrieval</text>
  <line x1="207" y1="270" x2="207" y2="285" stroke="#4285f4" stroke-width="1.5" marker-end="url(#b1)"/>
  <rect x="80" y="285" width="255" height="40" rx="8" fill="#4285f4"/>
  <text x="207" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Generate Fast Response</text>

  <text x="207" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Best For</text>
  <text x="207" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• General Q&amp;A · Translation</text>
  <text x="207" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Text summarization · Creative writing</text>
  <text x="207" y="411" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Simple code snippets</text>
  <rect x="70" y="430" width="275" height="28" rx="14" fill="#ebf5fb" stroke="#4285f4" stroke-width="1"/>
  <text x="207" y="449" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4285f4">Speed: ⚡ Fast · Cost: 💰 Low</text>

  <!-- Right: Thinking Mode -->
  <rect x="415" y="80" width="355" height="390" rx="12" fill="#ffffff" stroke="#ea4335" stroke-width="2"/>
  <rect x="415" y="80" width="355" height="55" rx="12" fill="#ea4335"/>
  <rect x="415" y="123" width="355" height="12" fill="#ea4335"/>
  <text x="592" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#fff">🧠 Thinking Mode</text>

  <text x="592" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ea4335">Input → Internal Reasoning → Response</text>

  <rect x="465" y="175" width="255" height="40" rx="8" fill="#fdf2f2" stroke="#ea4335" stroke-width="1"/>
  <text x="592" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Receive User Input</text>
  <line x1="592" y1="215" x2="592" y2="230" stroke="#ea4335" stroke-width="1.5" marker-end="url(#b2)"/>
  <rect x="465" y="230" width="255" height="40" rx="8" fill="#fdf2f2" stroke="#ea4335" stroke-width="1.5"/>
  <text x="592" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ea4335">🔄 Internal Thought Process</text>
  <text x="592" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">(Hidden from user)</text>
  <line x1="592" y1="270" x2="592" y2="285" stroke="#ea4335" stroke-width="1.5" marker-end="url(#b2)"/>
  <rect x="465" y="285" width="255" height="40" rx="8" fill="#ea4335"/>
  <text x="592" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Output Verified Final Answer</text>

  <text x="592" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Best For</text>
  <text x="592" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Complex math &amp; science problems</text>
  <text x="592" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Multi-step coding &amp; algorithms</text>
  <text x="592" y="411" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Logical reasoning &amp; planning</text>
  <rect x="455" y="430" width="275" height="28" rx="14" fill="#fdf2f2" stroke="#ea4335" stroke-width="1"/>
  <text x="592" y="449" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ea4335">Speed: 🐢 Slower · Cost: 💰💰 Higher</text>

  <text x="400" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">API: control thinking tokens via thinking_budget parameter</text>
</svg>
