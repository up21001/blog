<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#4285f4"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2c3e50"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">Gemini 2.5 Pro Multimodal Processing Flow</text>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">Native multimodal AI that processes diverse input types in a unified context</text>

  <!-- Input Column -->
  <text x="100" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Input</text>
  <rect x="30" y="100" width="140" height="45" rx="8" fill="#ebf5fb" stroke="#4285f4" stroke-width="1.5"/>
  <text x="100" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4285f4">📝 Text</text>
  <rect x="30" y="158" width="140" height="45" rx="8" fill="#fdf2f2" stroke="#ea4335" stroke-width="1.5"/>
  <text x="100" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ea4335">🖼️ Image</text>
  <rect x="30" y="216" width="140" height="45" rx="8" fill="#fef9e7" stroke="#fbbc04" stroke-width="1.5"/>
  <text x="100" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#f39c12">🎬 Video</text>
  <rect x="30" y="274" width="140" height="45" rx="8" fill="#eafaf1" stroke="#34a853" stroke-width="1.5"/>
  <text x="100" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#34a853">🎵 Audio</text>
  <rect x="30" y="332" width="140" height="45" rx="8" fill="#f9f0ff" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="100" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9b59b6">📊 PDF · Docs</text>
  <rect x="30" y="390" width="140" height="45" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="100" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#e67e22">💻 Code</text>

  <!-- Arrows to center -->
  <line x1="170" y1="122" x2="280" y2="240" stroke="#4285f4" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="170" y1="180" x2="280" y2="245" stroke="#ea4335" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="170" y1="239" x2="280" y2="250" stroke="#fbbc04" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="170" y1="297" x2="280" y2="255" stroke="#34a853" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="170" y1="354" x2="280" y2="260" stroke="#9b59b6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="170" y1="412" x2="280" y2="265" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Center Processing -->
  <rect x="280" y="160" width="240" height="190" rx="14" fill="#4285f4" stroke="#1a73e8" stroke-width="2"/>
  <text x="400" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#fff">Gemini 2.5 Pro</text>
  <text x="400" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#bbdefb">Unified Processing Engine</text>
  <line x1="310" y1="235" x2="490" y2="235" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <text x="400" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e8f0fe">1M Token Context Window</text>
  <text x="400" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e8f0fe">Native Multimodal</text>
  <text x="400" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e8f0fe">Thinking Mode Support</text>
  <text x="400" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e8f0fe">Google Search Grounding</text>
  <text x="400" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e8f0fe">Function Calling</text>

  <!-- Arrows from center -->
  <line x1="520" y1="240" x2="620" y2="175" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="520" y1="250" x2="620" y2="255" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="520" y1="260" x2="620" y2="335" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Output Column -->
  <text x="700" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Output</text>
  <rect x="620" y="100" width="150" height="120" rx="8" fill="#eafaf1" stroke="#34a853" stroke-width="1.5"/>
  <text x="695" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34a853">📄 Analysis</text>
  <text x="695" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Image descriptions</text>
  <text x="695" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Video summaries</text>
  <text x="695" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Document insights</text>
  <text x="695" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Audio transcription</text>

  <rect x="620" y="230" width="150" height="90" rx="8" fill="#ebf5fb" stroke="#4285f4" stroke-width="1.5"/>
  <text x="695" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4285f4">💻 Code Output</text>
  <text x="695" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Complete app code</text>
  <text x="695" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Debugging hints</text>
  <text x="695" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Optimization tips</text>

  <rect x="620" y="330" width="150" height="75" rx="8" fill="#fdf2f2" stroke="#ea4335" stroke-width="1.5"/>
  <text x="695" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ea4335">🔍 Reasoning</text>
  <text x="695" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Math solutions</text>
  <text x="695" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Logical analysis</text>

  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">Mix text, image, and audio in the same prompt — truly native multimodal</text>
</svg>
