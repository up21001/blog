<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#4285f4"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">Gemini 2.5 Pro 멀티모달 처리 흐름</text>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">다양한 형식의 입력을 통합 처리하는 네이티브 멀티모달 AI</text>

  <!-- Input Column -->
  <text x="100" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">입력 (Input)</text>

  <rect x="30" y="100" width="140" height="45" rx="8" fill="#ebf5fb" stroke="#4285f4" stroke-width="1.5"/>
  <text x="100" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4285f4">📝 텍스트</text>

  <rect x="30" y="158" width="140" height="45" rx="8" fill="#fdf2f2" stroke="#ea4335" stroke-width="1.5"/>
  <text x="100" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ea4335">🖼️ 이미지</text>

  <rect x="30" y="216" width="140" height="45" rx="8" fill="#fef9e7" stroke="#fbbc04" stroke-width="1.5"/>
  <text x="100" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#f39c12">🎬 동영상</text>

  <rect x="30" y="274" width="140" height="45" rx="8" fill="#eafaf1" stroke="#34a853" stroke-width="1.5"/>
  <text x="100" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#34a853">🎵 오디오</text>

  <rect x="30" y="332" width="140" height="45" rx="8" fill="#f9f0ff" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="100" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9b59b6">📊 PDF·문서</text>

  <rect x="30" y="390" width="140" height="45" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="100" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#e67e22">💻 코드</text>

  <!-- Arrows to center -->
  <line x1="170" y1="122" x2="280" y2="240" stroke="#4285f4" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="170" y1="180" x2="280" y2="245" stroke="#ea4335" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="170" y1="239" x2="280" y2="250" stroke="#fbbc04" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="170" y1="297" x2="280" y2="255" stroke="#34a853" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="170" y1="354" x2="280" y2="260" stroke="#9b59b6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="170" y1="412" x2="280" y2="265" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Center Processing -->
  <rect x="280" y="160" width="240" height="190" rx="14" fill="#4285f4" stroke="#1a73e8" stroke-width="2"/>
  <text x="400" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#fff">Gemini 2.5 Pro</text>
  <text x="400" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#bbdefb">통합 처리 엔진</text>
  <line x1="310" y1="235" x2="490" y2="235" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <text x="400" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e8f0fe">1M 토큰 컨텍스트</text>
  <text x="400" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e8f0fe">네이티브 멀티모달</text>
  <text x="400" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e8f0fe">사고 모드 지원</text>
  <text x="400" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e8f0fe">Google 검색 그라운딩</text>
  <text x="400" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e8f0fe">도구 호출(Function Call)</text>

  <!-- Arrows from center to output -->
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2c3e50"/>
    </marker>
  </defs>
  <line x1="520" y1="240" x2="620" y2="175" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="520" y1="250" x2="620" y2="255" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="520" y1="260" x2="620" y2="335" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Output Column -->
  <text x="700" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">출력 (Output)</text>

  <rect x="620" y="100" width="150" height="120" rx="8" fill="#eafaf1" stroke="#34a853" stroke-width="1.5"/>
  <text x="695" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34a853">📄 분석 · 설명</text>
  <text x="695" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">이미지 설명</text>
  <text x="695" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">동영상 요약</text>
  <text x="695" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">문서 인사이트</text>
  <text x="695" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">음성 전사</text>

  <rect x="620" y="230" width="150" height="90" rx="8" fill="#ebf5fb" stroke="#4285f4" stroke-width="1.5"/>
  <text x="695" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4285f4">💻 코드 생성</text>
  <text x="695" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">완성된 앱 코드</text>
  <text x="695" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">디버깅 제안</text>
  <text x="695" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">성능 최적화</text>

  <rect x="620" y="330" width="150" height="75" rx="8" fill="#fdf2f2" stroke="#ea4335" stroke-width="1.5"/>
  <text x="695" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ea4335">🔍 추론 결과</text>
  <text x="695" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">복잡한 수학 풀이</text>
  <text x="695" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">논리적 분석</text>

  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">동일 입력에 텍스트·이미지·오디오 혼합 사용 가능 — 진정한 네이티브 멀티모달</text>
</svg>
