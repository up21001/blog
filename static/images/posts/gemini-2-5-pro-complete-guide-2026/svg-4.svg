<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">Gemini 2.5 Pro vs 경쟁 모델 성능 비교</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">주요 벤치마크 점수 비교 (2026년 4월 기준)</text>

  <!-- Y axis -->
  <line x1="80" y1="80" x2="80" y2="400" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="80" y1="400" x2="760" y2="400" stroke="#bdc3c7" stroke-width="1.5"/>

  <text x="70" y="404" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">0</text>
  <text x="70" y="364" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">20</text>
  <text x="70" y="324" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">40</text>
  <text x="70" y="284" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">60</text>
  <text x="70" y="244" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">70</text>
  <text x="70" y="204" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">80</text>
  <text x="70" y="164" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">85</text>
  <text x="70" y="124" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">90</text>
  <text x="70" y="84" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">95</text>

  <line x1="80" y1="200" x2="760" y2="200" stroke="#ecf0f1" stroke-width="1"/>
  <line x1="80" y1="160" x2="760" y2="160" stroke="#ecf0f1" stroke-width="1"/>
  <line x1="80" y1="120" x2="760" y2="120" stroke="#ecf0f1" stroke-width="1"/>
  <line x1="80" y1="280" x2="760" y2="280" stroke="#ecf0f1" stroke-width="1"/>

  <!-- GPQA Group (Graduate-Level) -->
  <text x="185" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">GPQA Diamond</text>
  <!-- Gemini 2.5 Pro: 84.0 → y=400-((84-0)/95)*320=400-283=117 -->
  <rect x="105" y="120" width="32" height="280" rx="3" fill="#4285f4"/>
  <text x="121" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4285f4">84.0</text>
  <!-- GPT-4.1: 79.0 -->
  <rect x="145" y="134" width="32" height="266" rx="3" fill="#f39c12"/>
  <text x="161" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f39c12">79.0</text>
  <!-- Claude 3.7: 80.5 -->
  <rect x="185" y="129" width="32" height="271" rx="3" fill="#e74c3c"/>
  <text x="201" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">80.5</text>
  <!-- Llama 4 Maverick: 69.0 -->
  <rect x="225" y="166" width="32" height="234" rx="3" fill="#9b59b6"/>
  <text x="241" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9b59b6">69.0</text>

  <!-- Aider Polyglot (Coding) -->
  <text x="385" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">코딩 (Aider)</text>
  <!-- Gemini 2.5 Pro: 72.0 -->
  <rect x="305" y="158" width="32" height="242" rx="3" fill="#4285f4"/>
  <text x="321" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4285f4">72.0</text>
  <!-- GPT-4.1: 67.0 -->
  <rect x="345" y="174" width="32" height="226" rx="3" fill="#f39c12"/>
  <text x="361" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f39c12">67.0</text>
  <!-- Claude 3.7: 70.0 -->
  <rect x="385" y="163" width="32" height="237" rx="3" fill="#e74c3c"/>
  <text x="401" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">70.0</text>
  <!-- Llama 4 Maverick: 58.0 -->
  <rect x="425" y="195" width="32" height="205" rx="3" fill="#9b59b6"/>
  <text x="441" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9b59b6">58.0</text>

  <!-- MMLU Pro -->
  <text x="575" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">MMLU Pro</text>
  <!-- Gemini 2.5 Pro: 86.7 -->
  <rect x="505" y="106" width="32" height="294" rx="3" fill="#4285f4"/>
  <text x="521" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4285f4">86.7</text>
  <!-- GPT-4.1: 83.0 -->
  <rect x="545" y="116" width="32" height="284" rx="3" fill="#f39c12"/>
  <text x="561" y="111" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f39c12">83.0</text>
  <!-- Claude 3.7: 84.5 -->
  <rect x="585" y="110" width="32" height="290" rx="3" fill="#e74c3c"/>
  <text x="601" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">84.5</text>
  <!-- Llama 4 Maverick: 80.5 -->
  <rect x="625" y="122" width="32" height="278" rx="3" fill="#9b59b6"/>
  <text x="641" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9b59b6">80.5</text>

  <!-- Legend -->
  <rect x="80" y="445" width="14" height="14" rx="2" fill="#4285f4"/>
  <text x="98" y="457" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Gemini 2.5 Pro</text>
  <rect x="200" y="445" width="14" height="14" rx="2" fill="#f39c12"/>
  <text x="218" y="457" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">GPT-4.1</text>
  <rect x="280" y="445" width="14" height="14" rx="2" fill="#e74c3c"/>
  <text x="298" y="457" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Claude 3.7 Sonnet</text>
  <rect x="430" y="445" width="14" height="14" rx="2" fill="#9b59b6"/>
  <text x="448" y="457" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Llama 4 Maverick</text>

  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">Gemini 2.5 Pro Thinking 모드 적용 시 더욱 향상된 성능 기대</text>
</svg>
