<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">Quality vs Speed vs Cost Tradeoff</text>
  <line x1="60" y1="50" x2="740" y2="50" stroke="#dee2e6" stroke-width="1"/>

  <!-- Axes -->
  <line x1="120" y1="60" x2="120" y2="400" stroke="#adb5bd" stroke-width="2"/>
  <line x1="120" y1="400" x2="720" y2="400" stroke="#adb5bd" stroke-width="2"/>

  <!-- Y axis label -->
  <text x="30" y="235" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50" font-weight="bold" transform="rotate(-90, 30, 235)">Quality</text>
  <text x="30" y="250" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50" font-weight="bold" transform="rotate(-90, 30, 250)">▲</text>

  <!-- X axis label -->
  <text x="400" y="440" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50" font-weight="bold" text-anchor="middle">Generation Speed →</text>

  <!-- Y axis ticks -->
  <text x="110" y="80" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" text-anchor="end">High</text>
  <text x="110" y="230" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" text-anchor="end">Mid</text>
  <text x="110" y="400" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" text-anchor="end">Low</text>

  <!-- X axis ticks -->
  <text x="120" y="420" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" text-anchor="middle">Slow</text>
  <text x="420" y="420" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" text-anchor="middle">Medium</text>
  <text x="720" y="420" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" text-anchor="middle">Fast</text>

  <!-- Grid lines -->
  <line x1="120" y1="230" x2="720" y2="230" stroke="#dee2e6" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="420" y1="60" x2="420" y2="400" stroke="#dee2e6" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Sora bubble: high quality, slow, expensive -->
  <circle cx="185" cy="100" r="55" fill="#2980b9" opacity="0.75"/>
  <text x="185" y="96" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Sora</text>
  <text x="185" y="113" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">$20–$200/mo</text>

  <!-- Runway bubble: balanced -->
  <circle cx="360" cy="155" r="42" fill="#8e44ad" opacity="0.75"/>
  <text x="360" y="151" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Runway</text>
  <text x="360" y="167" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">$15–$95/mo</text>

  <!-- Kling bubble: good quality, fast, medium cost -->
  <circle cx="540" cy="175" r="38" fill="#e67e22" opacity="0.75"/>
  <text x="540" y="171" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Kling</text>
  <text x="540" y="187" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">$9–$66/mo</text>

  <!-- Pika bubble: fast, cheap, moderate quality -->
  <circle cx="660" cy="265" r="28" fill="#27ae60" opacity="0.75"/>
  <text x="660" y="261" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Pika</text>
  <text x="660" y="277" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Free–$35</text>

  <!-- Legend -->
  <rect x="120" y="455" width="565" height="32" rx="6" fill="#ffffff" stroke="#dee2e6" stroke-width="1"/>
  <text x="400" y="467" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">Bubble size = max plan cost | Higher = better quality | Farther right = faster generation</text>
  <text x="400" y="481" font-family="Arial, sans-serif" font-size="10" fill="#adb5bd" text-anchor="middle">As of April 2026 · Actual performance varies by prompt and settings</text>
</svg>
