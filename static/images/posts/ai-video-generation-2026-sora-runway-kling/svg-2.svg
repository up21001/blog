<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">플랫폼별 기술 스펙 비교</text>
  <line x1="60" y1="52" x2="740" y2="52" stroke="#dee2e6" stroke-width="1"/>

  <!-- Legend -->
  <rect x="60" y="62" width="14" height="14" fill="#2980b9"/>
  <text x="79" y="74" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Sora</text>
  <rect x="140" y="62" width="14" height="14" fill="#8e44ad"/>
  <text x="159" y="74" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Runway Gen-4</text>
  <rect x="270" y="62" width="14" height="14" fill="#e67e22"/>
  <text x="289" y="74" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Kling 2.0</text>
  <rect x="370" y="62" width="14" height="14" fill="#27ae60"/>
  <text x="389" y="74" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Pika 2.0</text>

  <!-- Row labels -->
  <text x="55" y="130" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50" font-weight="bold">최대 해상도</text>
  <text x="55" y="230" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50" font-weight="bold">최대 영상 길이</text>
  <text x="55" y="330" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50" font-weight="bold">생성 속도</text>
  <text x="55" y="430" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50" font-weight="bold">가격 (월)</text>

  <!-- Row 1: Max Resolution -->
  <!-- Sora: 1080p = 54% -->
  <rect x="185" y="108" width="162" height="28" rx="4" fill="#2980b9"/>
  <text x="370" y="127" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">1080p</text>
  <!-- Runway: 4K = 100% -->
  <rect x="185" y="138" width="300" height="28" rx="4" fill="#8e44ad"/>
  <text x="490" y="157" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">4K</text>
  <!-- Kling: 1080p = 54% -->
  <rect x="185" y="168" width="162" height="14" rx="4" fill="#e67e22"/>
  <!-- Pika: 1080p = 54% -->
  <rect x="185" y="184" width="162" height="14" rx="4" fill="#27ae60"/>
  <text x="370" y="195" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Kling/Pika: 1080p</text>

  <!-- Row 2: Max Duration -->
  <!-- Sora: 20s -->
  <rect x="185" y="208" width="100" height="28" rx="4" fill="#2980b9"/>
  <text x="290" y="227" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">20초</text>
  <!-- Runway: 60s -->
  <rect x="185" y="238" width="180" height="28" rx="4" fill="#8e44ad"/>
  <text x="370" y="257" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">60초</text>
  <!-- Kling: 120s -->
  <rect x="185" y="268" width="300" height="14" rx="4" fill="#e67e22"/>
  <text x="490" y="279" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Kling: 120초</text>
  <!-- Pika: 15s -->
  <rect x="185" y="284" width="75" height="14" rx="4" fill="#27ae60"/>
  <text x="265" y="295" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Pika: 15초</text>

  <!-- Row 3: Generation Speed -->
  <text x="185" y="340" font-family="Arial, sans-serif" font-size="12" fill="#2980b9">Sora: ●●○○○ (느림, 고품질)</text>
  <text x="185" y="360" font-family="Arial, sans-serif" font-size="12" fill="#8e44ad">Runway: ●●●○○ (중간)</text>
  <text x="185" y="380" font-family="Arial, sans-serif" font-size="12" fill="#e67e22">Kling: ●●●●○ (빠름)</text>
  <text x="185" y="400" font-family="Arial, sans-serif" font-size="12" fill="#27ae60">Pika: ●●●●● (매우 빠름)</text>

  <!-- Row 4: Price -->
  <!-- Sora: $20~$200 -->
  <rect x="185" y="408" width="200" height="28" rx="4" fill="#2980b9" opacity="0.85"/>
  <text x="390" y="427" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">$20~$200</text>
  <!-- Runway: $15~$95 -->
  <rect x="185" y="438" width="150" height="14" rx="4" fill="#8e44ad" opacity="0.85"/>
  <text x="340" y="449" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Runway: $15~$95</text>
  <!-- Kling: $9~$66 -->
  <rect x="185" y="454" width="110" height="14" rx="4" fill="#e67e22" opacity="0.85"/>
  <text x="300" y="465" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Kling: $9~$66</text>
  <!-- Pika: free~$35 -->
  <rect x="185" y="470" width="70" height="14" rx="4" fill="#27ae60" opacity="0.85"/>
  <text x="260" y="481" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Pika: 무료~$35</text>

  <text x="400" y="498" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" text-anchor="middle">2026년 4월 기준</text>
</svg>
