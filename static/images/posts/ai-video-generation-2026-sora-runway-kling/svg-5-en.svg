<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">AI Video Generation Roadmap 2026–2028</text>
  <line x1="60" y1="50" x2="740" y2="50" stroke="#dee2e6" stroke-width="1"/>

  <!-- Timeline spine -->
  <line x1="100" y1="230" x2="700" y2="230" stroke="#adb5bd" stroke-width="3"/>

  <!-- Phase dots -->
  <circle cx="200" cy="230" r="18" fill="#2980b9"/>
  <text x="200" y="235" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">Now</text>

  <circle cx="440" cy="230" r="18" fill="#8e44ad"/>
  <text x="440" y="235" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">Soon</text>

  <circle cx="660" cy="230" r="18" fill="#e74c3c"/>
  <text x="660" y="235" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">Future</text>

  <!-- Phase year labels -->
  <text x="200" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2980b9" text-anchor="middle">2026 Today</text>
  <text x="440" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8e44ad" text-anchor="middle">2027 Expected</text>
  <text x="660" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c" text-anchor="middle">2028 Vision</text>

  <!-- Phase 1: 2026 -->
  <rect x="70" y="75" width="265" height="130" rx="10" fill="#ebf5fb" stroke="#2980b9" stroke-width="2"/>
  <text x="202" y="100" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2980b9" text-anchor="middle">Text→Video Quality Leap</text>
  <text x="85" y="122" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Videos up to 1–2 minutes</text>
  <text x="85" y="142" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 1080p/4K standard support</text>
  <text x="85" y="162" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Improved physics understanding</text>
  <text x="85" y="182" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Face &amp; object consistency</text>
  <line x1="202" y1="205" x2="200" y2="212" stroke="#2980b9" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- Phase 2: 2027 -->
  <rect x="308" y="75" width="265" height="130" rx="10" fill="#f5eef8" stroke="#8e44ad" stroke-width="2"/>
  <text x="440" y="100" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#8e44ad" text-anchor="middle">Video Editing Automation</text>
  <text x="323" y="122" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Real-time video generation</text>
  <text x="323" y="142" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• AI auto-editing &amp; subtitles</text>
  <text x="323" y="162" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Multilingual auto-dubbing</text>
  <text x="323" y="182" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Brand template AI application</text>
  <line x1="440" y1="205" x2="440" y2="212" stroke="#8e44ad" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- Phase 3: 2028 -->
  <rect x="548" y="75" width="185" height="130" rx="10" fill="#fdf2f8" stroke="#e74c3c" stroke-width="2"/>
  <text x="640" y="100" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e74c3c" text-anchor="middle">Full Automated Film</text>
  <text x="560" y="122" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• Personalized AI director</text>
  <text x="560" y="142" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• Script→finished film</text>
  <text x="560" y="162" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• Solo filmmaking possible</text>
  <text x="560" y="182" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• Hologram/XR integration</text>
  <line x1="660" y1="205" x2="660" y2="212" stroke="#e74c3c" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- Bottom milestones -->
  <rect x="70" y="285" width="265" height="90" rx="8" fill="#ffffff" stroke="#dee2e6" stroke-width="1"/>
  <text x="202" y="307" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2980b9" text-anchor="middle">Current Platforms</text>
  <text x="85" y="327" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Sora / Runway Gen-4</text>
  <text x="85" y="345" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Kling 2.0 / Pika 2.0</text>
  <text x="85" y="363" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Stable Video / Luma Dream</text>

  <rect x="308" y="285" width="265" height="90" rx="8" fill="#ffffff" stroke="#dee2e6" stroke-width="1"/>
  <text x="440" y="307" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8e44ad" text-anchor="middle">Expected Developments</text>
  <text x="323" y="327" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Real-time collaborative editing</text>
  <text x="323" y="345" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Auto music &amp; SFX generation</text>
  <text x="323" y="363" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Personal style learning model</text>

  <rect x="548" y="285" width="185" height="90" rx="8" fill="#ffffff" stroke="#dee2e6" stroke-width="1"/>
  <text x="640" y="307" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e74c3c" text-anchor="middle">Long-term Vision</text>
  <text x="560" y="327" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">AI co-creation era</text>
  <text x="560" y="345" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Copyright frameworks</text>
  <text x="560" y="363" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Video democratization</text>

  <text x="400" y="492" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" text-anchor="middle">Predictions based on current trends; actual pace may vary</text>
</svg>
