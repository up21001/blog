<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">Use Case Recommendations by Scenario</text>
  <line x1="60" y1="50" x2="740" y2="50" stroke="#dee2e6" stroke-width="1"/>

  <!-- Card 1: Marketing Ads -->
  <rect x="55" y="65" width="210" height="110" rx="10" fill="#f5eef8" stroke="#8e44ad" stroke-width="2"/>
  <rect x="55" y="65" width="210" height="36" rx="10" fill="#8e44ad"/>
  <rect x="55" y="89" width="210" height="12" fill="#8e44ad"/>
  <text x="160" y="88" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Marketing Ads</text>
  <text x="160" y="118" font-family="Arial, sans-serif" font-size="13" fill="#8e44ad" text-anchor="middle" font-weight="bold">→ Runway Gen-4</text>
  <text x="160" y="137" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">4K quality, brand consistency</text>
  <text x="160" y="155" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">Pro editing capabilities</text>

  <!-- Card 2: Social Media -->
  <rect x="295" y="65" width="210" height="110" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <rect x="295" y="65" width="210" height="36" rx="10" fill="#27ae60"/>
  <rect x="295" y="89" width="210" height="12" fill="#27ae60"/>
  <text x="400" y="88" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Social Media</text>
  <text x="400" y="118" font-family="Arial, sans-serif" font-size="13" fill="#27ae60" text-anchor="middle" font-weight="bold">→ Pika 2.0</text>
  <text x="400" y="137" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">Fast generation, short-form</text>
  <text x="400" y="155" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">Reels/TikTok format support</text>

  <!-- Card 3: Film & Drama -->
  <rect x="535" y="65" width="210" height="110" rx="10" fill="#ebf5fb" stroke="#2980b9" stroke-width="2"/>
  <rect x="535" y="65" width="210" height="36" rx="10" fill="#2980b9"/>
  <rect x="535" y="89" width="210" height="12" fill="#2980b9"/>
  <text x="640" y="88" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Film &amp; Drama</text>
  <text x="640" y="118" font-family="Arial, sans-serif" font-size="13" fill="#2980b9" text-anchor="middle" font-weight="bold">→ Sora</text>
  <text x="640" y="137" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">Physics simulation, high quality</text>
  <text x="640" y="155" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">Cinematic scene direction</text>

  <!-- Card 4: Educational -->
  <rect x="55" y="200" width="210" height="110" rx="10" fill="#fef9e7" stroke="#e67e22" stroke-width="2"/>
  <rect x="55" y="200" width="210" height="36" rx="10" fill="#e67e22"/>
  <rect x="55" y="224" width="210" height="12" fill="#e67e22"/>
  <text x="160" y="223" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Educational Content</text>
  <text x="160" y="253" font-family="Arial, sans-serif" font-size="13" fill="#e67e22" text-anchor="middle" font-weight="bold">→ Kling 2.0</text>
  <text x="160" y="272" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">Long videos, natural pacing</text>
  <text x="160" y="290" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">Asian language subtitle support</text>

  <!-- Card 5: Product Demo -->
  <rect x="295" y="200" width="210" height="110" rx="10" fill="#f5eef8" stroke="#8e44ad" stroke-width="2"/>
  <rect x="295" y="200" width="210" height="36" rx="10" fill="#8e44ad"/>
  <rect x="295" y="224" width="210" height="12" fill="#8e44ad"/>
  <text x="400" y="223" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Product Demo</text>
  <text x="400" y="253" font-family="Arial, sans-serif" font-size="13" fill="#8e44ad" text-anchor="middle" font-weight="bold">→ Runway Gen-4</text>
  <text x="400" y="272" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">Precise editing, brand colors</text>
  <text x="400" y="290" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">Product close-up optimized</text>

  <!-- Card 6: Personal Creation -->
  <rect x="535" y="200" width="210" height="110" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <rect x="535" y="200" width="210" height="36" rx="10" fill="#27ae60"/>
  <rect x="535" y="224" width="210" height="12" fill="#27ae60"/>
  <text x="640" y="223" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Personal Creation</text>
  <text x="640" y="253" font-family="Arial, sans-serif" font-size="13" fill="#27ae60" text-anchor="middle" font-weight="bold">→ Pika / Kling</text>
  <text x="640" y="272" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">Free/low-cost plans available</text>
  <text x="640" y="290" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">Easy-to-use interface</text>

  <!-- Summary -->
  <rect x="55" y="328" width="690" height="140" rx="8" fill="#ffffff" stroke="#dee2e6" stroke-width="1"/>
  <text x="400" y="350" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50" text-anchor="middle">Selection Guide Summary</text>
  <text x="75" y="372" font-family="Arial, sans-serif" font-size="12" fill="#2980b9">● Highest quality needed</text>
  <text x="270" y="372" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">→ Sora (but higher cost)</text>
  <text x="75" y="392" font-family="Arial, sans-serif" font-size="12" fill="#8e44ad">● Professional production</text>
  <text x="270" y="392" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">→ Runway Gen-4</text>
  <text x="75" y="412" font-family="Arial, sans-serif" font-size="12" fill="#e67e22">● Long videos, Asian content</text>
  <text x="270" y="412" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">→ Kling 2.0</text>
  <text x="75" y="432" font-family="Arial, sans-serif" font-size="12" fill="#27ae60">● Fast creation, social media</text>
  <text x="270" y="432" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">→ Pika 2.0 (free plan available)</text>
  <text x="400" y="458" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" text-anchor="middle">As of April 2026</text>
</svg>
