<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <!-- Title -->
  <text x="400" y="45" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" text-anchor="middle">AI 영상 생성 시장 2026</text>
  <text x="400" y="70" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d" text-anchor="middle">4대 주요 플랫폼 한눈에 보기</text>
  <line x1="100" y1="80" x2="700" y2="80" stroke="#dee2e6" stroke-width="1"/>

  <!-- Sora Card (top-left) -->
  <rect x="60" y="100" width="320" height="170" rx="12" fill="#ebf5fb" stroke="#2980b9" stroke-width="2"/>
  <rect x="60" y="100" width="320" height="42" rx="12" fill="#2980b9"/>
  <rect x="60" y="130" width="320" height="12" rx="0" fill="#2980b9"/>
  <text x="220" y="127" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Sora (OpenAI)</text>
  <text x="80" y="165" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• 텍스트→영상, 최대 20초</text>
  <text x="80" y="187" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• 해상도: 최대 1080p</text>
  <text x="80" y="209" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• 물리 법칙 기반 시뮬레이션</text>
  <text x="80" y="231" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• ChatGPT Plus/Pro 포함</text>
  <text x="80" y="253" font-family="Arial, sans-serif" font-size="13" fill="#2980b9" font-weight="bold">월 $20~$200</text>

  <!-- Runway Card (top-right) -->
  <rect x="420" y="100" width="320" height="170" rx="12" fill="#f5eef8" stroke="#8e44ad" stroke-width="2"/>
  <rect x="420" y="100" width="320" height="42" rx="12" fill="#8e44ad"/>
  <rect x="420" y="130" width="320" height="12" rx="0" fill="#8e44ad"/>
  <text x="580" y="127" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Runway Gen-4</text>
  <text x="440" y="165" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• 전문가 영상편집 특화</text>
  <text x="440" y="187" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• 해상도: 최대 4K</text>
  <text x="440" y="209" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• 멀티모달 편집 지원</text>
  <text x="440" y="231" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• 영상→영상 변환 강점</text>
  <text x="440" y="253" font-family="Arial, sans-serif" font-size="13" fill="#8e44ad" font-weight="bold">월 $15~$95</text>

  <!-- Kling Card (bottom-left) -->
  <rect x="60" y="295" width="320" height="170" rx="12" fill="#fef9e7" stroke="#e67e22" stroke-width="2"/>
  <rect x="60" y="295" width="320" height="42" rx="12" fill="#e67e22"/>
  <rect x="60" y="325" width="320" height="12" rx="0" fill="#e67e22"/>
  <text x="220" y="322" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Kling 2.0 (Kuaishou)</text>
  <text x="80" y="360" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• 한국·중국 특화, 실사 품질</text>
  <text x="80" y="382" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• 최대 2분 영상 생성</text>
  <text x="80" y="404" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• 얼굴 일관성 유지 우수</text>
  <text x="80" y="426" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• 아시아 콘텐츠 최적화</text>
  <text x="80" y="448" font-family="Arial, sans-serif" font-size="13" fill="#e67e22" font-weight="bold">월 $9~$66</text>

  <!-- Pika Card (bottom-right) -->
  <rect x="420" y="295" width="320" height="170" rx="12" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <rect x="420" y="295" width="320" height="42" rx="12" fill="#27ae60"/>
  <rect x="420" y="325" width="320" height="12" rx="0" fill="#27ae60"/>
  <text x="580" y="322" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Pika 2.0</text>
  <text x="440" y="360" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• 빠른 생성·간편 편집</text>
  <text x="440" y="382" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• 초보자 친화적 UI</text>
  <text x="440" y="404" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• 이미지→영상 변환 강점</text>
  <text x="440" y="426" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• SNS 최적화 형식 지원</text>
  <text x="440" y="448" font-family="Arial, sans-serif" font-size="13" fill="#27ae60" font-weight="bold">무료~월 $35</text>

  <!-- Footer -->
  <text x="400" y="490" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">2026년 4월 기준 정보</text>
</svg>
