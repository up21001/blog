<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">Platform Technical Specs Comparison</text>
  <line x1="60" y1="52" x2="740" y2="52" stroke="#dee2e6" stroke-width="1"/>

  <!-- Legend -->
  <rect x="60" y="62" width="14" height="14" fill="#2980b9"/>
  <text x="79" y="74" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Sora</text>
  <rect x="130" y="62" width="14" height="14" fill="#8e44ad"/>
  <text x="149" y="74" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Runway Gen-4</text>
  <rect x="265" y="62" width="14" height="14" fill="#e67e22"/>
  <text x="284" y="74" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Kling 2.0</text>
  <rect x="365" y="62" width="14" height="14" fill="#27ae60"/>
  <text x="384" y="74" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Pika 2.0</text>

  <!-- Row labels -->
  <text x="55" y="130" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50" font-weight="bold">Max Resolution</text>
  <text x="55" y="230" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50" font-weight="bold">Max Duration</text>
  <text x="55" y="330" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50" font-weight="bold">Gen Speed</text>
  <text x="55" y="420" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50" font-weight="bold">Price/Month</text>

  <!-- Row 1: Max Resolution -->
  <rect x="195" y="108" width="162" height="28" rx="4" fill="#2980b9"/>
  <text x="362" y="127" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">1080p</text>
  <rect x="195" y="138" width="300" height="28" rx="4" fill="#8e44ad"/>
  <text x="500" y="157" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">4K</text>
  <rect x="195" y="168" width="162" height="14" rx="4" fill="#e67e22"/>
  <rect x="195" y="184" width="162" height="14" rx="4" fill="#27ae60"/>
  <text x="362" y="207" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Kling/Pika: 1080p</text>

  <!-- Row 2: Max Duration -->
  <rect x="195" y="215" width="100" height="28" rx="4" fill="#2980b9"/>
  <text x="300" y="234" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">20s</text>
  <rect x="195" y="245" width="180" height="28" rx="4" fill="#8e44ad"/>
  <text x="380" y="264" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">60s</text>
  <rect x="195" y="275" width="300" height="14" rx="4" fill="#e67e22"/>
  <text x="500" y="286" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Kling: 120s</text>
  <rect x="195" y="291" width="75" height="14" rx="4" fill="#27ae60"/>
  <text x="275" y="302" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Pika: 15s</text>

  <!-- Row 3: Generation Speed -->
  <text x="195" y="332" font-family="Arial, sans-serif" font-size="12" fill="#2980b9">Sora:   ●●○○○  Slow (high quality)</text>
  <text x="195" y="352" font-family="Arial, sans-serif" font-size="12" fill="#8e44ad">Runway: ●●●○○  Medium</text>
  <text x="195" y="372" font-family="Arial, sans-serif" font-size="12" fill="#e67e22">Kling:  ●●●●○  Fast</text>
  <text x="195" y="392" font-family="Arial, sans-serif" font-size="12" fill="#27ae60">Pika:   ●●●●●  Very Fast</text>

  <!-- Row 4: Price -->
  <rect x="195" y="408" width="200" height="22" rx="4" fill="#2980b9" opacity="0.85"/>
  <text x="400" y="423" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Sora: $20–$200</text>
  <rect x="195" y="432" width="150" height="14" rx="4" fill="#8e44ad" opacity="0.85"/>
  <text x="350" y="443" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Runway: $15–$95</text>
  <rect x="195" y="448" width="110" height="14" rx="4" fill="#e67e22" opacity="0.85"/>
  <text x="310" y="459" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Kling: $9–$66</text>
  <rect x="195" y="464" width="70" height="14" rx="4" fill="#27ae60" opacity="0.85"/>
  <text x="270" y="475" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Pika: Free–$35</text>

  <text x="400" y="495" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" text-anchor="middle">As of April 2026</text>
</svg>
