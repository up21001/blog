<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#495057"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" fill="#f8f9fa"/>

  <!-- Title -->
  <rect x="40" y="16" width="720" height="44" rx="8" fill="#343a40" filter="url(#shadow)"/>
  <text x="400" y="43" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="white">EDID Parsing Pipeline</text>

  <!-- Step 1: Raw bytes from NVAPI -->
  <rect x="260" y="76" width="280" height="56" rx="10" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="400" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">NvEdid.ReadEDID()</text>
  <text x="400" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#d0e8ff">Receive raw byte array from NVAPI</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="132" x2="400" y2="157" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Header validation -->
  <rect x="260" y="158" width="280" height="56" rx="10" fill="#50C878" filter="url(#shadow)"/>
  <text x="400" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">ValidateHeader()</text>
  <text x="400" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Verify 00 FF FF FF FF FF FF 00</text>

  <!-- Fail branch from header -->
  <rect x="580" y="158" width="160" height="56" rx="10" fill="#FF6B6B" filter="url(#shadow)"/>
  <text x="660" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">IsValid = false</text>
  <text x="660" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Abort Parsing</text>
  <line x1="540" y1="186" x2="580" y2="186" stroke="#FF6B6B" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,3"/>
  <text x="560" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FF6B6B">Fail</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="214" x2="400" y2="239" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Checksum validation -->
  <rect x="260" y="240" width="280" height="56" rx="10" fill="#50C878" filter="url(#shadow)"/>
  <text x="400" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">ValidateChecksum()</text>
  <text x="400" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">sum(0..127) mod 256 == 0</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="296" x2="400" y2="321" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Manufacturer / Product -->
  <rect x="260" y="322" width="280" height="56" rx="10" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="400" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Extract Manufacturer / Product Info</text>
  <text x="400" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">DecodeManufacturerId(), ProductCode, Serial</text>

  <!-- Arrow 4 -->
  <line x1="400" y1="378" x2="400" y2="403" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 5: Display properties -->
  <rect x="260" y="404" width="280" height="56" rx="10" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="400" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Extract Display Characteristics</text>
  <text x="400" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Bit Depth, Screen Size, Gamma, Chromaticity</text>

  <!-- Arrow 5 -->
  <line x1="400" y1="460" x2="400" y2="485" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 6: Timings -->
  <rect x="260" y="486" width="280" height="56" rx="10" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="400" y="509" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Parse Timings</text>
  <text x="400" y="529" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#d5ccff">Established / Standard / 4 DTDs</text>

  <!-- Arrow 6 -->
  <line x1="400" y1="542" x2="400" y2="567" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 7: Result -->
  <rect x="220" y="568" width="360" height="40" rx="10" fill="#343a40" filter="url(#shadow)"/>
  <text x="400" y="593" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Return EdidBaseBlock Object</text>

  <!-- Side notes -->
  <rect x="40" y="322" width="190" height="56" rx="8" fill="white" stroke="#dee2e6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="135" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#495057" font-weight="bold">ParseDescriptor()</text>
  <text x="135" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6c757d">DTD vs Descriptor distinction:</text>
  <text x="135" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6c757d">byte[0,1] != 0 → DTD</text>
  <line x1="230" y1="350" x2="260" y2="350" stroke="#adb5bd" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="570" y="404" width="190" height="56" rx="8" fill="white" stroke="#dee2e6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="665" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#495057" font-weight="bold">Extension Block Processing</text>
  <text x="665" y="443" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6c757d">byte[126] = Extension Block Count</text>
  <text x="665" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6c757d">→ Call ParseCta861()</text>
  <line x1="540" y1="432" x2="570" y2="432" stroke="#adb5bd" stroke-width="1.5" marker-end="url(#arrowhead)"/>
</svg>
