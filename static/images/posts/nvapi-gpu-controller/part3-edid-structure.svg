<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="920" fill="#f8f9fa"/>

  <!-- Title -->
  <rect x="40" y="16" width="720" height="48" rx="8" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="400" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">EDID 128바이트 베이스 블록 구조</text>

  <!-- Column headers -->
  <rect x="40" y="74" width="120" height="32" rx="4" fill="#343a40"/>
  <text x="100" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">오프셋</text>
  <rect x="164" y="74" width="100" height="32" rx="4" fill="#343a40"/>
  <text x="214" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">크기</text>
  <rect x="268" y="74" width="240" height="32" rx="4" fill="#343a40"/>
  <text x="388" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">필드명</text>
  <rect x="512" y="74" width="248" height="32" rx="4" fill="#343a40"/>
  <text x="636" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">값 / 설명</text>

  <!-- Row 1: Header -->
  <rect x="40" y="110" width="720" height="36" rx="4" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="100" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x00–07</text>
  <text x="214" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">8바이트</text>
  <text x="388" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">헤더 (Header Magic)</text>
  <text x="636" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">00 FF FF FF FF FF FF 00</text>

  <!-- Row 2: Manufacturer -->
  <rect x="40" y="150" width="720" height="36" rx="4" fill="#50C878" filter="url(#shadow)"/>
  <text x="100" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x08–09</text>
  <text x="214" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">2바이트</text>
  <text x="388" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">제조사 ID (Manufacturer ID)</text>
  <text x="636" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">예: SAM = 0x4C2D</text>

  <!-- Row 3: Product Code -->
  <rect x="40" y="190" width="720" height="36" rx="4" fill="#50C878" filter="url(#shadow)"/>
  <text x="100" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x0A–0B</text>
  <text x="214" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">2바이트</text>
  <text x="388" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">제품 코드 (Product Code)</text>
  <text x="636" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">리틀 엔디언</text>

  <!-- Row 4: Serial Number -->
  <rect x="40" y="230" width="720" height="36" rx="4" fill="#50C878" filter="url(#shadow)"/>
  <text x="100" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x0C–0F</text>
  <text x="214" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">4바이트</text>
  <text x="388" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">시리얼 번호 (Serial Number)</text>
  <text x="636" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">리틀 엔디언 uint32</text>

  <!-- Row 5: Manufacture Date -->
  <rect x="40" y="270" width="720" height="36" rx="4" fill="#50C878" filter="url(#shadow)"/>
  <text x="100" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x10–11</text>
  <text x="214" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">2바이트</text>
  <text x="388" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">제조 날짜 (주차 / 연도-1990)</text>
  <text x="636" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">week, year+1990</text>

  <!-- Row 6: EDID Version -->
  <rect x="40" y="310" width="720" height="36" rx="4" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="100" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x12–13</text>
  <text x="214" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">2바이트</text>
  <text x="388" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">EDID 버전 (Major / Minor)</text>
  <text x="636" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">일반적으로 01 04</text>

  <!-- Row 7: Video Input -->
  <rect x="40" y="350" width="720" height="36" rx="4" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="100" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">0x14</text>
  <text x="214" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">1바이트</text>
  <text x="388" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">비디오 입력 파라미터</text>
  <text x="636" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">bit7=디지털, bit[6:4]=비트심도</text>

  <!-- Row 8: Screen Size -->
  <rect x="40" y="390" width="720" height="36" rx="4" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="100" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">0x15–16</text>
  <text x="214" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">2바이트</text>
  <text x="388" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">화면 크기 (H cm / V cm)</text>
  <text x="636" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">예: 60, 34 → 60×34cm</text>

  <!-- Row 9: Gamma -->
  <rect x="40" y="430" width="720" height="36" rx="4" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="100" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">0x17</text>
  <text x="214" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">1바이트</text>
  <text x="388" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">감마 (Gamma)</text>
  <text x="636" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">(값+100)/100 → 예: 120 → 2.20</text>

  <!-- Row 10: Feature Support -->
  <rect x="40" y="470" width="720" height="36" rx="4" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="100" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">0x18</text>
  <text x="214" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">1바이트</text>
  <text x="388" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">기능 지원 비트맵</text>
  <text x="636" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">DPMS, 색공간 등</text>

  <!-- Row 11: Chromaticity -->
  <rect x="40" y="510" width="720" height="36" rx="4" fill="#FF6B6B" filter="url(#shadow)"/>
  <text x="100" y="533" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x19–22</text>
  <text x="214" y="533" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">10바이트</text>
  <text x="388" y="533" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">색도 좌표 (Chromaticity)</text>
  <text x="636" y="533" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Rx,Ry,Gx,Gy,Bx,By,Wx,Wy</text>

  <!-- Row 12: Established Timings -->
  <rect x="40" y="550" width="720" height="36" rx="4" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="100" y="573" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x23–25</text>
  <text x="214" y="573" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">3바이트</text>
  <text x="388" y="573" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">기본 타이밍 (Established Timings)</text>
  <text x="636" y="573" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">비트맵: 720x400@70 등</text>

  <!-- Row 13: Standard Timings -->
  <rect x="40" y="590" width="720" height="36" rx="4" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="100" y="613" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x26–35</text>
  <text x="214" y="613" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">16바이트</text>
  <text x="388" y="613" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">표준 타이밍 (Standard Timings)</text>
  <text x="636" y="613" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">8개 × 2바이트 (H픽셀, 종횡비+주사율)</text>

  <!-- Row 14: DTD 1 -->
  <rect x="40" y="630" width="720" height="36" rx="4" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="100" y="653" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x36–47</text>
  <text x="214" y="653" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">18바이트</text>
  <text x="388" y="653" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">상세 타이밍 #1 (DTD)</text>
  <text x="636" y="653" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">픽셀클럭, H/V Active/Blanking 등</text>

  <!-- Row 15: DTD 2 -->
  <rect x="40" y="670" width="720" height="36" rx="4" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="100" y="693" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x48–59</text>
  <text x="214" y="693" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">18바이트</text>
  <text x="388" y="693" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">디스플레이 디스크립터 #2</text>
  <text x="636" y="693" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">모니터 이름, 시리얼, 범위 제한 등</text>

  <!-- Row 16: DTD 3 -->
  <rect x="40" y="710" width="720" height="36" rx="4" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="100" y="733" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x5A–6B</text>
  <text x="214" y="733" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">18바이트</text>
  <text x="388" y="733" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">디스플레이 디스크립터 #3</text>
  <text x="636" y="733" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">태그 바이트로 유형 식별</text>

  <!-- Row 17: DTD 4 -->
  <rect x="40" y="750" width="720" height="36" rx="4" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="100" y="773" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x6C–7D</text>
  <text x="214" y="773" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">18바이트</text>
  <text x="388" y="773" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">디스플레이 디스크립터 #4</text>
  <text x="636" y="773" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">0xFC=이름, 0xFD=범위, 0xFF=시리얼</text>

  <!-- Row 18: Extension count -->
  <rect x="40" y="790" width="720" height="36" rx="4" fill="#FF6B6B" filter="url(#shadow)"/>
  <text x="100" y="813" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x7E</text>
  <text x="214" y="813" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">1바이트</text>
  <text x="388" y="813" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">확장 블록 수</text>
  <text x="636" y="813" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">뒤따르는 128B 블록 개수</text>

  <!-- Row 19: Checksum -->
  <rect x="40" y="830" width="720" height="36" rx="4" fill="#FF6B6B" filter="url(#shadow)"/>
  <text x="100" y="853" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x7F</text>
  <text x="214" y="853" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">1바이트</text>
  <text x="388" y="853" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">체크섬 (Checksum)</text>
  <text x="636" y="853" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">모든 128바이트 합 mod 256 = 0</text>

  <!-- Legend -->
  <rect x="40" y="878" width="16" height="16" rx="3" fill="#4A90D9"/>
  <text x="62" y="891" font-family="Arial, sans-serif" font-size="11" fill="#333">헤더/식별</text>
  <rect x="150" y="878" width="16" height="16" rx="3" fill="#50C878"/>
  <text x="172" y="891" font-family="Arial, sans-serif" font-size="11" fill="#333">제조사 정보</text>
  <rect x="280" y="878" width="16" height="16" rx="3" fill="#FFD93D"/>
  <text x="302" y="891" font-family="Arial, sans-serif" font-size="11" fill="#333">디스플레이 특성</text>
  <rect x="430" y="878" width="16" height="16" rx="3" fill="#6C5CE7"/>
  <text x="452" y="891" font-family="Arial, sans-serif" font-size="11" fill="#333">타이밍 정보</text>
  <rect x="560" y="878" width="16" height="16" rx="3" fill="#FF6B6B"/>
  <text x="582" y="891" font-family="Arial, sans-serif" font-size="11" fill="#333">검증/확장</text>
</svg>
