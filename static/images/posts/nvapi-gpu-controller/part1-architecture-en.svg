<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3436">NvGpuController — Layered Architecture</text>

  <!-- Layer 1: UI Layer -->
  <rect x="60" y="70" width="680" height="100" rx="10" ry="10" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#fff">UI Layer (WinForms)</text>
  <rect x="90" y="115" width="180" height="40" rx="6" ry="6" fill="#ffffff33"/>
  <text x="180" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">MainForm</text>
  <rect x="310" y="115" width="180" height="40" rx="6" ry="6" fill="#ffffff33"/>
  <text x="400" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">GpuInfoPanel</text>
  <rect x="530" y="115" width="180" height="40" rx="6" ry="6" fill="#ffffff33"/>
  <text x="620" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">LogViewer</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="172" x2="400" y2="198" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 2: Business Logic Layer -->
  <rect x="60" y="200" width="680" height="100" rx="10" ry="10" fill="#50C878" filter="url(#shadow)"/>
  <text x="400" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#fff">Business Logic Layer</text>
  <rect x="90" y="245" width="170" height="40" rx="6" ry="6" fill="#ffffff33"/>
  <text x="175" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">GpuController</text>
  <rect x="285" y="245" width="170" height="40" rx="6" ry="6" fill="#ffffff33"/>
  <text x="370" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">EdidManager</text>
  <rect x="480" y="245" width="230" height="40" rx="6" ry="6" fill="#ffffff33"/>
  <text x="595" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">CustomDisplayManager</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="302" x2="400" y2="328" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 3: Core / Infra Layer -->
  <rect x="60" y="330" width="680" height="100" rx="10" ry="10" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="400" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#fff">Core / Infra Layer</text>
  <rect x="90" y="375" width="200" height="40" rx="6" ry="6" fill="#ffffff33"/>
  <text x="190" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">Logger (ConcurrentQueue)</text>
  <rect x="315" y="375" width="180" height="40" rx="6" ry="6" fill="#ffffff33"/>
  <text x="405" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">NvApiWrapper</text>
  <rect x="520" y="375" width="200" height="40" rx="6" ry="6" fill="#ffffff33"/>
  <text x="620" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">NvApiTypes (Structs/Enums)</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="432" x2="400" y2="458" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 4: P/Invoke Layer -->
  <rect x="60" y="460" width="680" height="80" rx="10" ry="10" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="400" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2d3436">P/Invoke Layer (Marshal / DllImport)</text>
  <text x="400" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">nvapi_QueryInterface → GetDelegateForFunctionPointer → Cdecl Delegate</text>

  <!-- Arrow 4 -->
  <line x1="400" y1="542" x2="400" y2="568" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 5: NVAPI DLL -->
  <rect x="60" y="570" width="680" height="38" rx="10" ry="10" fill="#FF6B6B" filter="url(#shadow)"/>
  <text x="400" y="595" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">nvapi64.dll / nvapi.dll (NVIDIA Driver Runtime)</text>
</svg>
