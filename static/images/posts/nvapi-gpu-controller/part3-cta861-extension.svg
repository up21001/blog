<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#495057"/>
    </marker>
  </defs>

  <rect width="800" height="680" fill="#f8f9fa"/>

  <!-- Title -->
  <rect x="40" y="16" width="720" height="44" rx="8" fill="#343a40" filter="url(#shadow)"/>
  <text x="400" y="43" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="white">CTA-861 확장 블록 구조 (128바이트)</text>

  <!-- Header area -->
  <rect x="40" y="76" width="720" height="60" rx="8" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="400" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">CTA-861 블록 헤더 (4바이트)</text>

  <!-- Header byte breakdown -->
  <rect x="56" y="106" width="80" height="24" rx="4" fill="#1a5276"/>
  <text x="96" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">byte[0]=0x02</text>

  <rect x="148" y="106" width="80" height="24" rx="4" fill="#1a5276"/>
  <text x="188" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">byte[1]=리비전</text>

  <rect x="240" y="106" width="100" height="24" rx="4" fill="#1a5276"/>
  <text x="290" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">byte[2]=DTD오프셋</text>

  <rect x="352" y="106" width="200" height="24" rx="4" fill="#1a5276"/>
  <text x="452" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">byte[3]=플래그(언더스캔/오디오/YCbCr)</text>

  <!-- Data blocks region -->
  <rect x="40" y="152" width="720" height="36" rx="6" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="400" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">데이터 블록 영역 (byte[4] ~ byte[DTDOffset-1])</text>

  <!-- Data block boxes -->
  <!-- VDB -->
  <rect x="40" y="200" width="160" height="100" rx="8" fill="#50C878" filter="url(#shadow)"/>
  <text x="120" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Video DB</text>
  <text x="120" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">태그=2</text>
  <text x="120" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">VIC 코드 목록</text>
  <text x="120" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">byte당 1개 VIC</text>
  <text x="120" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">bit7=네이티브 플래그</text>

  <!-- ADB -->
  <rect x="214" y="200" width="160" height="100" rx="8" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="294" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Audio DB</text>
  <text x="294" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">태그=1</text>
  <text x="294" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">3바이트 디스크립터</text>
  <text x="294" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">포맷코드, 채널수</text>
  <text x="294" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">샘플레이트, 비트심도</text>

  <!-- SADB -->
  <rect x="388" y="200" width="140" height="100" rx="8" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="458" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Speaker DB</text>
  <text x="458" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">태그=4</text>
  <text x="458" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">3바이트 고정</text>
  <text x="458" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">FL/FR, LFE, FC</text>
  <text x="458" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">RL/RR, RC</text>

  <!-- HDMI VSDB -->
  <rect x="542" y="200" width="218" height="100" rx="8" fill="#FF6B6B" filter="url(#shadow)"/>
  <text x="651" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">HDMI VSDB</text>
  <text x="651" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">태그=3, OUI=03-0C-00</text>
  <text x="651" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">DeepColor 30/36/48bit</text>
  <text x="651" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Max TMDS Clock</text>
  <text x="651" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">CEC, ARC 지원 플래그</text>

  <!-- Extended blocks label -->
  <rect x="40" y="316" width="720" height="30" rx="6" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="400" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">확장 데이터 블록 (태그=7) — Extended Tag로 세부 분류</text>

  <!-- Extended block details -->
  <rect x="40" y="358" width="160" height="90" rx="8" fill="#1abc9c" filter="url(#shadow)"/>
  <text x="120" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">HDR 정적 메타데이터</text>
  <text x="120" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">ExtTag=0x06</text>
  <text x="120" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">EOTF 지원 비트맵</text>
  <text x="120" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">SDR/HDR/PQ/HLG</text>
  <text x="120" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">최대/최소 휘도</text>

  <rect x="214" y="358" width="160" height="90" rx="8" fill="#1abc9c" filter="url(#shadow)"/>
  <text x="294" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">색역 (Colorimetry)</text>
  <text x="294" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">ExtTag=0x05</text>
  <text x="294" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">xvYCC601/709</text>
  <text x="294" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">BT.2020 RGB/YCC</text>
  <text x="294" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">AdobeRGB/YCC</text>

  <rect x="388" y="358" width="160" height="90" rx="8" fill="#1abc9c" filter="url(#shadow)"/>
  <text x="468" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">HDMI Forum VSDB</text>
  <text x="468" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">ExtTag=0x0B</text>
  <text x="468" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">VRR, DSC 지원</text>
  <text x="468" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">FRL Rate (9~48Gbps)</text>
  <text x="468" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">HDMI 2.1 기능</text>

  <rect x="562" y="358" width="198" height="90" rx="8" fill="#1abc9c" filter="url(#shadow)"/>
  <text x="661" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">YCbCr 4:2:0 지원</text>
  <text x="661" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">ExtTag=0x0D/0x0E</text>
  <text x="661" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">4K@60Hz YUV420</text>
  <text x="661" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">지원 VIC 비트맵</text>
  <text x="661" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">가능 VIC 목록</text>

  <!-- DTD region -->
  <rect x="40" y="464" width="720" height="36" rx="6" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="400" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">DTD 영역 (byte[DTDOffset] ~ byte[126]) — 18바이트 단위 상세 타이밍</text>

  <!-- Checksum -->
  <rect x="40" y="514" width="720" height="36" rx="6" fill="#FF6B6B" filter="url(#shadow)"/>
  <text x="400" y="537" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">체크섬 (byte[127]) — 확장 블록 내 모든 바이트 합 mod 256 = 0</text>

  <!-- DB Header format explanation -->
  <rect x="40" y="562" width="720" height="94" rx="8" fill="white" stroke="#dee2e6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="582" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#343a40">데이터 블록 헤더 바이트 구조</text>
  <rect x="60" y="592" width="200" height="30" rx="6" fill="#6C5CE7"/>
  <text x="160" y="612" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">bit[7:5] = 태그 코드 (3비트)</text>
  <rect x="272" y="592" width="468" height="30" rx="6" fill="#4A90D9"/>
  <text x="506" y="612" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">bit[4:0] = 페이로드 길이 (5비트, 최대 31바이트)</text>
  <text x="400" y="648" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">예: 0x42 → tag=2(Video), length=2바이트</text>
</svg>
