<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="920" fill="#f8f9fa"/>

  <!-- Title -->
  <rect x="40" y="16" width="720" height="48" rx="8" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="400" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">EDID 128-Byte Base Block Structure</text>

  <!-- Column headers -->
  <rect x="40" y="74" width="120" height="32" rx="4" fill="#343a40"/>
  <text x="100" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Offset</text>
  <rect x="164" y="74" width="100" height="32" rx="4" fill="#343a40"/>
  <text x="214" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Size</text>
  <rect x="268" y="74" width="240" height="32" rx="4" fill="#343a40"/>
  <text x="388" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Field Name</text>
  <rect x="512" y="74" width="248" height="32" rx="4" fill="#343a40"/>
  <text x="636" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Value / Description</text>

  <!-- Row 1: Header -->
  <rect x="40" y="110" width="720" height="36" rx="4" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="100" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x00–07</text>
  <text x="214" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">8 Bytes</text>
  <text x="388" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Header (Header Magic)</text>
  <text x="636" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">00 FF FF FF FF FF FF 00</text>

  <!-- Row 2: Manufacturer -->
  <rect x="40" y="150" width="720" height="36" rx="4" fill="#50C878" filter="url(#shadow)"/>
  <text x="100" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x08–09</text>
  <text x="214" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">2 Bytes</text>
  <text x="388" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Manufacturer ID</text>
  <text x="636" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">e.g. SAM = 0x4C2D</text>

  <!-- Row 3: Product Code -->
  <rect x="40" y="190" width="720" height="36" rx="4" fill="#50C878" filter="url(#shadow)"/>
  <text x="100" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x0A–0B</text>
  <text x="214" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">2 Bytes</text>
  <text x="388" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Product Code</text>
  <text x="636" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Little Endian</text>

  <!-- Row 4: Serial Number -->
  <rect x="40" y="230" width="720" height="36" rx="4" fill="#50C878" filter="url(#shadow)"/>
  <text x="100" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x0C–0F</text>
  <text x="214" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">4 Bytes</text>
  <text x="388" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Serial Number</text>
  <text x="636" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Little Endian uint32</text>

  <!-- Row 5: Manufacture Date -->
  <rect x="40" y="270" width="720" height="36" rx="4" fill="#50C878" filter="url(#shadow)"/>
  <text x="100" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x10–11</text>
  <text x="214" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">2 Bytes</text>
  <text x="388" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Manufacture Date (Week / Year-1990)</text>
  <text x="636" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">week, year+1990</text>

  <!-- Row 6: EDID Version -->
  <rect x="40" y="310" width="720" height="36" rx="4" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="100" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x12–13</text>
  <text x="214" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">2 Bytes</text>
  <text x="388" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">EDID Version (Major / Minor)</text>
  <text x="636" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Typically 01 04</text>

  <!-- Row 7: Video Input -->
  <rect x="40" y="350" width="720" height="36" rx="4" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="100" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">0x14</text>
  <text x="214" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">1 Byte</text>
  <text x="388" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Video Input Parameters</text>
  <text x="636" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">bit7=Digital, bit[6:4]=Bit Depth</text>

  <!-- Row 8: Screen Size -->
  <rect x="40" y="390" width="720" height="36" rx="4" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="100" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">0x15–16</text>
  <text x="214" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">2 Bytes</text>
  <text x="388" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Screen Size (H cm / V cm)</text>
  <text x="636" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">e.g. 60, 34 → 60×34cm</text>

  <!-- Row 9: Gamma -->
  <rect x="40" y="430" width="720" height="36" rx="4" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="100" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">0x17</text>
  <text x="214" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">1 Byte</text>
  <text x="388" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Gamma</text>
  <text x="636" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">(value+100)/100 → e.g. 120 → 2.20</text>

  <!-- Row 10: Feature Support -->
  <rect x="40" y="470" width="720" height="36" rx="4" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="100" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">0x18</text>
  <text x="214" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">1 Byte</text>
  <text x="388" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Feature Support Bitmap</text>
  <text x="636" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">DPMS, Color Space, etc.</text>

  <!-- Row 11: Chromaticity -->
  <rect x="40" y="510" width="720" height="36" rx="4" fill="#FF6B6B" filter="url(#shadow)"/>
  <text x="100" y="533" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x19–22</text>
  <text x="214" y="533" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">10 Bytes</text>
  <text x="388" y="533" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Chromaticity Coordinates</text>
  <text x="636" y="533" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Rx,Ry,Gx,Gy,Bx,By,Wx,Wy</text>

  <!-- Row 12: Established Timings -->
  <rect x="40" y="550" width="720" height="36" rx="4" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="100" y="573" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x23–25</text>
  <text x="214" y="573" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">3 Bytes</text>
  <text x="388" y="573" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Established Timings</text>
  <text x="636" y="573" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Bitmap: 720x400@70, etc.</text>

  <!-- Row 13: Standard Timings -->
  <rect x="40" y="590" width="720" height="36" rx="4" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="100" y="613" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x26–35</text>
  <text x="214" y="613" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">16 Bytes</text>
  <text x="388" y="613" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Standard Timings</text>
  <text x="636" y="613" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">8 × 2 Bytes (H pixels, Aspect+Refresh)</text>

  <!-- Row 14: DTD 1 -->
  <rect x="40" y="630" width="720" height="36" rx="4" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="100" y="653" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x36–47</text>
  <text x="214" y="653" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">18 Bytes</text>
  <text x="388" y="653" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Detailed Timing Descriptor #1 (DTD)</text>
  <text x="636" y="653" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Pixel Clock, H/V Active/Blanking, etc.</text>

  <!-- Row 15: DTD 2 -->
  <rect x="40" y="670" width="720" height="36" rx="4" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="100" y="693" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x48–59</text>
  <text x="214" y="693" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">18 Bytes</text>
  <text x="388" y="693" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Display Descriptor #2</text>
  <text x="636" y="693" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Monitor Name, Serial, Range Limits, etc.</text>

  <!-- Row 16: DTD 3 -->
  <rect x="40" y="710" width="720" height="36" rx="4" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="100" y="733" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x5A–6B</text>
  <text x="214" y="733" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">18 Bytes</text>
  <text x="388" y="733" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Display Descriptor #3</text>
  <text x="636" y="733" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Tag Byte Identifies Type</text>

  <!-- Row 17: DTD 4 -->
  <rect x="40" y="750" width="720" height="36" rx="4" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="100" y="773" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x6C–7D</text>
  <text x="214" y="773" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">18 Bytes</text>
  <text x="388" y="773" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Display Descriptor #4</text>
  <text x="636" y="773" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">0xFC=Name, 0xFD=Range, 0xFF=Serial</text>

  <!-- Row 18: Extension count -->
  <rect x="40" y="790" width="720" height="36" rx="4" fill="#FF6B6B" filter="url(#shadow)"/>
  <text x="100" y="813" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x7E</text>
  <text x="214" y="813" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">1 Byte</text>
  <text x="388" y="813" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Extension Block Count</text>
  <text x="636" y="813" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Number of 128B blocks that follow</text>

  <!-- Row 19: Checksum -->
  <rect x="40" y="830" width="720" height="36" rx="4" fill="#FF6B6B" filter="url(#shadow)"/>
  <text x="100" y="853" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">0x7F</text>
  <text x="214" y="853" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">1 Byte</text>
  <text x="388" y="853" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Checksum</text>
  <text x="636" y="853" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Sum of all 128 bytes mod 256 = 0</text>

  <!-- Legend -->
  <rect x="40" y="878" width="16" height="16" rx="3" fill="#4A90D9"/>
  <text x="62" y="891" font-family="Arial, sans-serif" font-size="11" fill="#333">Header / ID</text>
  <rect x="150" y="878" width="16" height="16" rx="3" fill="#50C878"/>
  <text x="172" y="891" font-family="Arial, sans-serif" font-size="11" fill="#333">Manufacturer Info</text>
  <rect x="280" y="878" width="16" height="16" rx="3" fill="#FFD93D"/>
  <text x="302" y="891" font-family="Arial, sans-serif" font-size="11" fill="#333">Display Characteristics</text>
  <rect x="430" y="878" width="16" height="16" rx="3" fill="#6C5CE7"/>
  <text x="452" y="891" font-family="Arial, sans-serif" font-size="11" fill="#333">Timing Info</text>
  <rect x="560" y="878" width="16" height="16" rx="3" fill="#FF6B6B"/>
  <text x="582" y="891" font-family="Arial, sans-serif" font-size="11" fill="#333">Validation / Extension</text>
</svg>
