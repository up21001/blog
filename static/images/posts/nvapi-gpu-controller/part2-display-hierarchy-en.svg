<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000030"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4A90D9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="580" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d3436" text-anchor="middle">Display Hierarchy and Identifier System</text>

  <!-- GPU (Physical) -->
  <rect x="280" y="60" width="240" height="56" rx="8" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="400" y="83" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Physical GPU</text>
  <text x="400" y="102" font-family="Arial, sans-serif" font-size="11" fill="#d0e8ff" text-anchor="middle">NvPhysicalGpuHandle · GpuInfoData</text>

  <!-- Arrow GPU -> Display -->
  <line x1="400" y1="116" x2="400" y2="148" stroke="#4A90D9" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- NVAPI Display (NvDisplayHandle) -->
  <rect x="240" y="150" width="320" height="56" rx="8" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="400" y="173" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">NVAPI Display</text>
  <text x="400" y="192" font-family="Arial, sans-serif" font-size="11" fill="#d8d0ff" text-anchor="middle">NvDisplayHandle · EnumNvidiaDisplayHandle(i)</text>

  <!-- Two branches from NVAPI Display -->
  <!-- Left branch: OutputId -->
  <line x1="320" y1="206" x2="180" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Right branch: DisplayId -->
  <line x1="480" y1="206" x2="620" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Center branch: DeviceName -->
  <line x1="400" y1="206" x2="400" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- OutputId box -->
  <rect x="60" y="272" width="230" height="60" rx="7" fill="#FF6B6B" filter="url(#shadow)"/>
  <text x="175" y="295" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">OutputId (uint)</text>
  <text x="175" y="313" font-family="Arial, sans-serif" font-size="10" fill="#ffe0e0" text-anchor="middle">EDID Read Key · Bitmask Format</text>
  <text x="175" y="326" font-family="Arial, sans-serif" font-size="10" fill="#ffe0e0" text-anchor="middle">GetAssociatedDisplayOutputId()</text>

  <!-- DeviceName box -->
  <rect x="285" y="272" width="230" height="60" rx="7" fill="#50C878" filter="url(#shadow)"/>
  <text x="400" y="295" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">DeviceName</text>
  <text x="400" y="313" font-family="Arial, sans-serif" font-size="10" fill="#d0ffe0" text-anchor="middle">\\.\DISPLAY1 format</text>
  <text x="400" y="326" font-family="Arial, sans-serif" font-size="10" fill="#d0ffe0" text-anchor="middle">GetAssociatedNvidiaDisplayName()</text>

  <!-- DisplayId box -->
  <rect x="510" y="272" width="230" height="60" rx="7" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="625" y="295" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">DisplayId (uint)</text>
  <text x="625" y="313" font-family="Arial, sans-serif" font-size="10" fill="#665900" text-anchor="middle">Custom Resolution API Key</text>
  <text x="625" y="326" font-family="Arial, sans-serif" font-size="10" fill="#665900" text-anchor="middle">DISP_GetDisplayIdByDisplayName()</text>

  <!-- Arrows to monitor name sources -->
  <!-- OutputId -> EDID -->
  <line x1="175" y1="332" x2="175" y2="400" stroke="#FF6B6B" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- DeviceName -> EnumDisplaySettings -->
  <line x1="400" y1="332" x2="400" y2="400" stroke="#50C878" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- EDID box -->
  <rect x="60" y="402" width="230" height="56" rx="7" fill="#FF6B6B" filter="url(#shadow)" opacity="0.85"/>
  <text x="175" y="424" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">EDID Parsing (Primary)</text>
  <text x="175" y="442" font-family="Arial, sans-serif" font-size="10" fill="#ffe0e0" text-anchor="middle">NvEdid.ReadEDID() → MonitorName</text>
  <text x="175" y="456" font-family="Arial, sans-serif" font-size="9" fill="#ffe0e0" text-anchor="middle">or use ManufacturerId</text>

  <!-- EnumDisplaySettings box -->
  <rect x="285" y="402" width="230" height="56" rx="7" fill="#50C878" filter="url(#shadow)" opacity="0.85"/>
  <text x="400" y="424" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">EnumDisplaySettings (Fallback)</text>
  <text x="400" y="442" font-family="Arial, sans-serif" font-size="10" fill="#d0ffe0" text-anchor="middle">user32.dll · Current Resolution / Hz</text>
  <text x="400" y="456" font-family="Arial, sans-serif" font-size="9" fill="#d0ffe0" text-anchor="middle">DEVMODE struct</text>

  <!-- EnumDisplayDevices box -->
  <rect x="510" y="402" width="230" height="56" rx="7" fill="#50C878" filter="url(#shadow)" opacity="0.75"/>
  <text x="625" y="424" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">EnumDisplayDevices (Fallback)</text>
  <text x="625" y="442" font-family="Arial, sans-serif" font-size="10" fill="#d0ffe0" text-anchor="middle">Monitor Friendly Name</text>
  <text x="625" y="456" font-family="Arial, sans-serif" font-size="9" fill="#d0ffe0" text-anchor="middle">GetMonitorFriendlyName()</text>
  <line x1="625" y1="332" x2="625" y2="400" stroke="#50C878" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- All converge to DisplayInfo -->
  <line x1="175" y1="458" x2="280" y2="510" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="400" y1="458" x2="400" y2="510" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="625" y1="458" x2="520" y2="510" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DisplayInfo final -->
  <rect x="200" y="512" width="400" height="52" rx="8" fill="#2d3436" filter="url(#shadow)"/>
  <text x="400" y="534" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">DisplayInfo Object</text>
  <text x="400" y="552" font-family="Arial, sans-serif" font-size="10" fill="#adb5bd" text-anchor="middle">Handle · DeviceName · MonitorName · OutputId · DisplayId · Resolution</text>
</svg>
