<svg viewBox="0 0 800 580" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="580" fill="#f8f9fa"/>

  <!-- Title -->
  <rect x="0" y="0" width="800" height="50" fill="#2d3436"/>
  <text x="400" y="32" fill="white" font-size="17" font-weight="bold" text-anchor="middle">EDID Edit Workflow</text>

  <!-- Step 1: Read EDID -->
  <rect x="40" y="80" width="160" height="80" rx="10" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="120" y="112" fill="white" font-size="13" font-weight="bold" text-anchor="middle">① Read EDID</text>
  <text x="120" y="130" fill="#e0f0ff" font-size="11" text-anchor="middle">NvEdid.ReadEDID()</text>
  <text x="120" y="146" fill="#e0f0ff" font-size="10" text-anchor="middle">GPU Handle + OutputId</text>

  <!-- Step 2: Parse -->
  <rect x="240" y="80" width="160" height="80" rx="10" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="320" y="112" fill="white" font-size="13" font-weight="bold" text-anchor="middle">② Parse</text>
  <text x="320" y="130" fill="#e8e0ff" font-size="11" text-anchor="middle">EdidParser.Parse()</text>
  <text x="320" y="146" fill="#e8e0ff" font-size="10" text-anchor="middle">Convert to struct</text>

  <!-- Step 3: Edit -->
  <rect x="440" y="80" width="160" height="80" rx="10" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="520" y="112" fill="#333" font-size="13" font-weight="bold" text-anchor="middle">③ Edit</text>
  <text x="520" y="130" fill="#555" font-size="11" text-anchor="middle">EdidEditor Methods</text>
  <text x="520" y="146" fill="#555" font-size="10" text-anchor="middle">Set* calls</text>

  <!-- Step 4: Checksum -->
  <rect x="600" y="80" width="160" height="80" rx="10" fill="#FF6B6B" filter="url(#shadow)"/>
  <text x="680" y="112" fill="white" font-size="13" font-weight="bold" text-anchor="middle">④ Checksum</text>
  <text x="680" y="130" fill="#ffe0e0" font-size="11" text-anchor="middle">UpdateChecksum()</text>
  <text x="680" y="146" fill="#ffe0e0" font-size="10" text-anchor="middle">Byte sum = 0</text>

  <!-- Arrows between steps -->
  <line x1="200" y1="120" x2="238" y2="120" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="400" y1="120" x2="438" y2="120" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="600" y1="120" x2="598" y2="120" stroke="#888" stroke-width="2"/>
  <line x1="598" y1="120" x2="598" y2="120" stroke="#888" stroke-width="2"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4A90D9"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#50C878"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF6B6B"/>
    </marker>
  </defs>

  <!-- EdidEditor API Details -->
  <rect x="40" y="210" width="340" height="310" rx="10" fill="white" stroke="#4A90D9" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="210" width="340" height="36" rx="10" fill="#4A90D9"/>
  <rect x="40" y="232" width="340" height="14" fill="#4A90D9"/>
  <text x="210" y="234" fill="white" font-size="13" font-weight="bold" text-anchor="middle">EdidEditor API</text>

  <text x="60" y="266" fill="#333" font-size="11" font-weight="bold">Basic Info</text>
  <text x="60" y="282" fill="#555" font-size="10">SetManufacturerId(string id)</text>
  <text x="60" y="296" fill="#888" font-size="9">  → 3-char ASCII → 5-bit × 3 → 2-byte encoding</text>
  <text x="60" y="312" fill="#555" font-size="10">SetProductCode(ushort code)</text>
  <text x="60" y="326" fill="#555" font-size="10">SetSerialNumber(uint serial)</text>
  <text x="60" y="340" fill="#555" font-size="10">SetManufactureDate(byte week, int year)</text>

  <line x1="55" y1="352" x2="370" y2="352" stroke="#e0e0e0" stroke-width="1"/>
  <text x="60" y="367" fill="#333" font-size="11" font-weight="bold">Display Parameters</text>
  <text x="60" y="383" fill="#555" font-size="10">SetDigitalInput(bool digital, byte bitDepth)</text>
  <text x="60" y="397" fill="#555" font-size="10">SetScreenSize(byte hCm, byte vCm)</text>
  <text x="60" y="411" fill="#555" font-size="10">SetGamma(double gamma)</text>

  <line x1="55" y1="423" x2="370" y2="423" stroke="#e0e0e0" stroke-width="1"/>
  <text x="60" y="438" fill="#333" font-size="11" font-weight="bold">Descriptors</text>
  <text x="60" y="454" fill="#555" font-size="10">SetMonitorName(string name)  ← max 13 chars</text>
  <text x="60" y="468" fill="#555" font-size="10">SetRangeLimits(minV,maxV,minH,maxH,pclk)</text>
  <text x="60" y="482" fill="#555" font-size="10">SetDetailedTiming(int idx, dtd)</text>
  <text x="60" y="496" fill="#555" font-size="10">SetByte(int offset, byte value)  ← direct edit</text>

  <!-- Manufacturer ID encoding detail -->
  <rect x="420" y="210" width="340" height="180" rx="10" fill="white" stroke="#6C5CE7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="420" y="210" width="340" height="36" rx="10" fill="#6C5CE7"/>
  <rect x="420" y="232" width="340" height="14" fill="#6C5CE7"/>
  <text x="590" y="234" fill="white" font-size="13" font-weight="bold" text-anchor="middle">Manufacturer ID Encoding</text>

  <text x="440" y="265" fill="#333" font-size="11" font-weight="bold">3-char ASCII → 2-byte bit packing</text>
  <text x="440" y="283" fill="#555" font-size="10">Example: "SAM" (Samsung)</text>
  <text x="440" y="299" fill="#4A90D9" font-size="10">'S' = 0x53 → &amp; 0x1F = 19 (10011)</text>
  <text x="440" y="315" fill="#4A90D9" font-size="10">'A' = 0x41 → &amp; 0x1F =  1 (00001)</text>
  <text x="440" y="331" fill="#4A90D9" font-size="10">'M' = 0x4D → &amp; 0x1F = 13 (01101)</text>
  <text x="440" y="352" fill="#FF6B6B" font-size="10" font-weight="bold">byte[8] = (S&lt;&lt;2) | (A&gt;&gt;3) = 0x4C</text>
  <text x="440" y="368" fill="#FF6B6B" font-size="10" font-weight="bold">byte[9] = (A&lt;&lt;5) | M      = 0x2D</text>
  <text x="440" y="384" fill="#888" font-size="9">→ Stored at EDID offset 8-9</text>

  <!-- Checksum detail -->
  <rect x="420" y="410" width="340" height="110" rx="10" fill="white" stroke="#FF6B6B" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="420" y="410" width="340" height="36" rx="10" fill="#FF6B6B"/>
  <rect x="420" y="432" width="340" height="14" fill="#FF6B6B"/>
  <text x="590" y="434" fill="white" font-size="13" font-weight="bold" text-anchor="middle">Checksum Calculation</text>

  <text x="440" y="463" fill="#333" font-size="11">CalculateChecksum(data, offset, 128)</text>
  <text x="440" y="479" fill="#555" font-size="10">byte sum = 0;</text>
  <text x="440" y="493" fill="#555" font-size="10">for each byte in block: sum += byte;</text>
  <text x="440" y="507" fill="#FF6B6B" font-size="10" font-weight="bold">return (byte)(256 - (sum % 256));</text>

  <!-- Write/Override outputs -->
  <rect x="40" y="540" width="220" height="30" rx="8" fill="#50C878" filter="url(#shadow)"/>
  <text x="150" y="560" fill="white" font-size="12" font-weight="bold" text-anchor="middle">WriteEDID → NVAPI Override</text>

  <rect x="280" y="540" width="220" height="30" rx="8" fill="#636e72" filter="url(#shadow)"/>
  <text x="390" y="560" fill="white" font-size="12" font-weight="bold" text-anchor="middle">Export → .bin / .dat / .txt</text>

  <!-- Arrows from step 4 down to outputs -->
  <line x1="680" y1="160" x2="680" y2="185" stroke="#FF6B6B" stroke-width="2" marker-end="url(#arr-red)"/>
  <rect x="600" y="185" width="160" height="24" rx="6" fill="#FF6B6B" opacity="0.15"/>
  <text x="680" y="201" fill="#c0392b" font-size="10" text-anchor="middle">Validation (optional)</text>

  <line x1="150" y1="540" x2="150" y2="520" stroke="#50C878" stroke-width="1.5"/>
  <line x1="390" y1="540" x2="390" y2="520" stroke="#636e72" stroke-width="1.5"/>
  <line x1="150" y1="520" x2="390" y2="520" stroke="#aaa" stroke-width="1.5"/>
  <line x1="270" y1="520" x2="270" y2="510" stroke="#aaa" stroke-width="1.5"/>
  <text x="270" y="508" fill="#555" font-size="10" text-anchor="middle">Choose after editing</text>
</svg>
