<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#495057"/>
    </marker>
  </defs>

  <rect width="800" height="680" fill="#f8f9fa"/>

  <!-- Title -->
  <rect x="40" y="16" width="720" height="44" rx="8" fill="#343a40" filter="url(#shadow)"/>
  <text x="400" y="43" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="white">CTA-861 Extension Block Structure (128 Bytes)</text>

  <!-- Header area -->
  <rect x="40" y="76" width="720" height="60" rx="8" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="400" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">CTA-861 Block Header (4 Bytes)</text>

  <!-- Header byte breakdown -->
  <rect x="56" y="106" width="80" height="24" rx="4" fill="#1a5276"/>
  <text x="96" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">byte[0]=0x02</text>

  <rect x="148" y="106" width="80" height="24" rx="4" fill="#1a5276"/>
  <text x="188" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">byte[1]=Revision</text>

  <rect x="240" y="106" width="100" height="24" rx="4" fill="#1a5276"/>
  <text x="290" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">byte[2]=DTD Offset</text>

  <rect x="352" y="106" width="200" height="24" rx="4" fill="#1a5276"/>
  <text x="452" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">byte[3]=Flags (Underscan/Audio/YCbCr)</text>

  <!-- Data blocks region -->
  <rect x="40" y="152" width="720" height="36" rx="6" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="400" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Data Block Region (byte[4] ~ byte[DTDOffset-1])</text>

  <!-- Data block boxes -->
  <!-- VDB -->
  <rect x="40" y="200" width="160" height="100" rx="8" fill="#50C878" filter="url(#shadow)"/>
  <text x="120" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Video DB</text>
  <text x="120" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Tag=2</text>
  <text x="120" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">List of VIC codes</text>
  <text x="120" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">1 VIC per byte</text>
  <text x="120" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">bit7=Native Flag</text>

  <!-- ADB -->
  <rect x="214" y="200" width="160" height="100" rx="8" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="294" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Audio DB</text>
  <text x="294" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Tag=1</text>
  <text x="294" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">3-Byte Descriptor</text>
  <text x="294" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Format Code, Channels</text>
  <text x="294" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Sample Rate, Bit Depth</text>

  <!-- SADB -->
  <rect x="388" y="200" width="140" height="100" rx="8" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="458" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Speaker DB</text>
  <text x="458" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Tag=4</text>
  <text x="458" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">3 Bytes Fixed</text>
  <text x="458" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">FL/FR, LFE, FC</text>
  <text x="458" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">RL/RR, RC</text>

  <!-- HDMI VSDB -->
  <rect x="542" y="200" width="218" height="100" rx="8" fill="#FF6B6B" filter="url(#shadow)"/>
  <text x="651" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">HDMI VSDB</text>
  <text x="651" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Tag=3, OUI=03-0C-00</text>
  <text x="651" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">DeepColor 30/36/48bit</text>
  <text x="651" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Max TMDS Clock</text>
  <text x="651" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">CEC, ARC Support Flags</text>

  <!-- Extended blocks label -->
  <rect x="40" y="316" width="720" height="30" rx="6" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="400" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Extended Data Blocks (Tag=7) — Sub-classified by Extended Tag</text>

  <!-- Extended block details -->
  <rect x="40" y="358" width="160" height="90" rx="8" fill="#1abc9c" filter="url(#shadow)"/>
  <text x="120" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">HDR Static Metadata</text>
  <text x="120" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">ExtTag=0x06</text>
  <text x="120" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">EOTF Support Bitmap</text>
  <text x="120" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">SDR/HDR/PQ/HLG</text>
  <text x="120" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Max/Min Luminance</text>

  <rect x="214" y="358" width="160" height="90" rx="8" fill="#1abc9c" filter="url(#shadow)"/>
  <text x="294" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Colorimetry</text>
  <text x="294" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">ExtTag=0x05</text>
  <text x="294" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">xvYCC601/709</text>
  <text x="294" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">BT.2020 RGB/YCC</text>
  <text x="294" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">AdobeRGB/YCC</text>

  <rect x="388" y="358" width="160" height="90" rx="8" fill="#1abc9c" filter="url(#shadow)"/>
  <text x="468" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">HDMI Forum VSDB</text>
  <text x="468" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">ExtTag=0x0B</text>
  <text x="468" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">VRR, DSC Support</text>
  <text x="468" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">FRL Rate (9~48Gbps)</text>
  <text x="468" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">HDMI 2.1 Features</text>

  <rect x="562" y="358" width="198" height="90" rx="8" fill="#1abc9c" filter="url(#shadow)"/>
  <text x="661" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">YCbCr 4:2:0 Support</text>
  <text x="661" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">ExtTag=0x0D/0x0E</text>
  <text x="661" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">4K@60Hz YUV420</text>
  <text x="661" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Supported VIC Bitmap</text>
  <text x="661" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Capable VIC List</text>

  <!-- DTD region -->
  <rect x="40" y="464" width="720" height="36" rx="6" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="400" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">DTD Region (byte[DTDOffset] ~ byte[126]) — 18-Byte Detailed Timing Blocks</text>

  <!-- Checksum -->
  <rect x="40" y="514" width="720" height="36" rx="6" fill="#FF6B6B" filter="url(#shadow)"/>
  <text x="400" y="537" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Checksum (byte[127]) — Sum of all bytes in extension block mod 256 = 0</text>

  <!-- DB Header format explanation -->
  <rect x="40" y="562" width="720" height="94" rx="8" fill="white" stroke="#dee2e6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="582" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#343a40">Data Block Header Byte Structure</text>
  <rect x="60" y="592" width="200" height="30" rx="6" fill="#6C5CE7"/>
  <text x="160" y="612" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">bit[7:5] = Tag Code (3 bits)</text>
  <rect x="272" y="592" width="468" height="30" rx="6" fill="#4A90D9"/>
  <text x="506" y="612" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">bit[4:0] = Payload Length (5 bits, max 31 bytes)</text>
  <text x="400" y="648" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">e.g. 0x42 → tag=2 (Video), length=2 bytes</text>
</svg>
