<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="timeline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#4facfe"/>
    </linearGradient>
  </defs>
  <rect width="900" height="480" fill="url(#bg)"/>
  <text x="450" y="40" font-family="Segoe UI" font-weight="bold" font-size="24" fill="#ffffff" text-anchor="middle">Evolution of AI-Powered Phishing</text>
  <text x="450" y="62" font-family="Segoe UI" font-size="13" fill="#a0a0c0" text-anchor="middle">How Generative AI Has Transformed the Phishing Paradigm</text>
  <line x1="80" y1="140" x2="820" y2="140" stroke="url(#timeline)" stroke-width="3" opacity="0.5"/>
  <g>
    <circle cx="120" cy="140" r="8" fill="#a78bfa"/>
    <text x="120" y="125" font-family="Segoe UI" font-weight="bold" font-size="14" fill="#a78bfa" text-anchor="middle">2020</text>
    <rect x="55" y="165" width="130" height="100" rx="8" fill="#1a1a3e" stroke="#a78bfa" stroke-width="1" opacity="0.8"/>
    <text x="120" y="188" font-family="Segoe UI" font-weight="bold" font-size="12" fill="#a78bfa" text-anchor="middle">Template-Based</text>
    <text x="120" y="210" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">Copy-paste level</text>
    <text x="120" y="228" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">Frequent typos</text>
    <text x="120" y="246" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">Easily identifiable</text>
  </g>
  <g>
    <circle cx="305" cy="140" r="8" fill="#7c9bfa"/>
    <text x="305" y="125" font-family="Segoe UI" font-weight="bold" font-size="14" fill="#7c9bfa" text-anchor="middle">2022</text>
    <rect x="240" y="165" width="130" height="100" rx="8" fill="#1a1a3e" stroke="#7c9bfa" stroke-width="1" opacity="0.8"/>
    <text x="305" y="188" font-family="Segoe UI" font-weight="bold" font-size="12" fill="#7c9bfa" text-anchor="middle">ChatGPT Era</text>
    <text x="305" y="210" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">Natural text generation</text>
    <text x="305" y="228" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">Multilingual phishing</text>
    <text x="305" y="246" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">Mass personalization</text>
  </g>
  <g>
    <circle cx="490" cy="140" r="8" fill="#4facfe"/>
    <text x="490" y="125" font-family="Segoe UI" font-weight="bold" font-size="14" fill="#4facfe" text-anchor="middle">2024</text>
    <rect x="425" y="165" width="130" height="100" rx="8" fill="#1a1a3e" stroke="#4facfe" stroke-width="1" opacity="0.8"/>
    <text x="490" y="188" font-family="Segoe UI" font-weight="bold" font-size="12" fill="#4facfe" text-anchor="middle">Deepfake Fusion</text>
    <text x="490" y="210" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">Voice/video forgery</text>
    <text x="490" y="228" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">Real-time conversation</text>
    <text x="490" y="246" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">CEO fraud surges</text>
  </g>
  <g>
    <circle cx="680" cy="140" r="8" fill="#34d399"/>
    <text x="680" y="125" font-family="Segoe UI" font-weight="bold" font-size="14" fill="#34d399" text-anchor="middle">2026</text>
    <rect x="615" y="165" width="130" height="100" rx="8" fill="#1a1a3e" stroke="#34d399" stroke-width="1" opacity="0.8"/>
    <text x="680" y="188" font-family="Segoe UI" font-weight="bold" font-size="12" fill="#34d399" text-anchor="middle">Autonomous AI</text>
    <text x="680" y="210" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">Agent-based attacks</text>
    <text x="680" y="228" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">Social profiling</text>
    <text x="680" y="246" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">Adaptive scenarios</text>
  </g>
  <rect x="50" y="310" width="800" height="145" rx="10" fill="#0d0d2b" opacity="0.6"/>
  <text x="450" y="340" font-family="Segoe UI" font-weight="bold" font-size="15" fill="#fbbf24" text-anchor="middle">Alarming AI Phishing Statistics</text>
  <g>
    <text x="170" y="380" font-family="Segoe UI" font-weight="bold" font-size="32" fill="#ff416c" text-anchor="middle">4,151%</text>
    <text x="170" y="405" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">AI phishing email increase</text>
    <text x="170" y="422" font-family="Segoe UI" font-size="10" fill="#808090" text-anchor="middle">(2022-2025)</text>
  </g>
  <g>
    <text x="450" y="380" font-family="Segoe UI" font-weight="bold" font-size="32" fill="#4facfe" text-anchor="middle">78%</text>
    <text x="450" y="405" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">Humans unable to distinguish</text>
    <text x="450" y="422" font-family="Segoe UI" font-size="10" fill="#808090" text-anchor="middle">(AI-generated vs real email)</text>
  </g>
  <g>
    <text x="730" y="380" font-family="Segoe UI" font-weight="bold" font-size="32" fill="#34d399" text-anchor="middle">$25.6M</text>
    <text x="730" y="405" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">Largest single deepfake fraud</text>
    <text x="730" y="422" font-family="Segoe UI" font-size="10" fill="#808090" text-anchor="middle">(Hong Kong Arup case, 2024)</text>
  </g>
</svg>