<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="timeline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#4facfe"/>
    </linearGradient>
  </defs>
  <rect width="900" height="480" fill="url(#bg)"/>
  <text x="450" y="40" font-family="Segoe UI" font-weight="bold" font-size="24" fill="#ffffff" text-anchor="middle">AI 기반 피싱 공격의 진화</text>
  <text x="450" y="62" font-family="Segoe UI" font-size="13" fill="#a0a0c0" text-anchor="middle">생성형 AI가 바꿔놓은 피싱 공격 패러다임</text>
  <!-- Timeline line -->
  <line x1="80" y1="140" x2="820" y2="140" stroke="url(#timeline)" stroke-width="3" opacity="0.5"/>
  <!-- Era 1: 2020 -->
  <g>
    <circle cx="120" cy="140" r="8" fill="#a78bfa"/>
    <text x="120" y="125" font-family="Segoe UI" font-weight="bold" font-size="14" fill="#a78bfa" text-anchor="middle">2020</text>
    <rect x="55" y="165" width="130" height="100" rx="8" fill="#1a1a3e" stroke="#a78bfa" stroke-width="1" opacity="0.8"/>
    <text x="120" y="188" font-family="Segoe UI" font-weight="bold" font-size="12" fill="#a78bfa" text-anchor="middle">템플릿 기반</text>
    <text x="120" y="210" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">복사/붙여넣기 수준</text>
    <text x="120" y="228" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">문법 오류 빈번</text>
    <text x="120" y="246" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">쉽게 식별 가능</text>
  </g>
  <!-- Era 2: 2022 -->
  <g>
    <circle cx="305" cy="140" r="8" fill="#7c9bfa"/>
    <text x="305" y="125" font-family="Segoe UI" font-weight="bold" font-size="14" fill="#7c9bfa" text-anchor="middle">2022</text>
    <rect x="240" y="165" width="130" height="100" rx="8" fill="#1a1a3e" stroke="#7c9bfa" stroke-width="1" opacity="0.8"/>
    <text x="305" y="188" font-family="Segoe UI" font-weight="bold" font-size="12" fill="#7c9bfa" text-anchor="middle">ChatGPT 등장</text>
    <text x="305" y="210" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">자연스러운 문장 생성</text>
    <text x="305" y="228" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">다국어 피싱 가능</text>
    <text x="305" y="246" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">대량 맞춤화 시작</text>
  </g>
  <!-- Era 3: 2024 -->
  <g>
    <circle cx="490" cy="140" r="8" fill="#4facfe"/>
    <text x="490" y="125" font-family="Segoe UI" font-weight="bold" font-size="14" fill="#4facfe" text-anchor="middle">2024</text>
    <rect x="425" y="165" width="130" height="100" rx="8" fill="#1a1a3e" stroke="#4facfe" stroke-width="1" opacity="0.8"/>
    <text x="490" y="188" font-family="Segoe UI" font-weight="bold" font-size="12" fill="#4facfe" text-anchor="middle">딥페이크 결합</text>
    <text x="490" y="210" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">음성/영상 위조</text>
    <text x="490" y="228" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">실시간 대화 가능</text>
    <text x="490" y="246" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">CEO 사칭 급증</text>
  </g>
  <!-- Era 4: 2026 -->
  <g>
    <circle cx="680" cy="140" r="8" fill="#34d399"/>
    <text x="680" y="125" font-family="Segoe UI" font-weight="bold" font-size="14" fill="#34d399" text-anchor="middle">2026</text>
    <rect x="615" y="165" width="130" height="100" rx="8" fill="#1a1a3e" stroke="#34d399" stroke-width="1" opacity="0.8"/>
    <text x="680" y="188" font-family="Segoe UI" font-weight="bold" font-size="12" fill="#34d399" text-anchor="middle">자율형 AI 피싱</text>
    <text x="680" y="210" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">에이전트 기반 공격</text>
    <text x="680" y="228" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">SNS 프로파일링</text>
    <text x="680" y="246" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">적응형 시나리오</text>
  </g>
  <!-- Impact stats -->
  <rect x="50" y="310" width="800" height="145" rx="10" fill="#0d0d2b" opacity="0.6"/>
  <text x="450" y="340" font-family="Segoe UI" font-weight="bold" font-size="15" fill="#fbbf24" text-anchor="middle">AI 피싱의 충격적 통계</text>
  <g>
    <text x="170" y="380" font-family="Segoe UI" font-weight="bold" font-size="32" fill="#ff416c" text-anchor="middle">4,151%</text>
    <text x="170" y="405" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">AI 피싱 메일 증가율</text>
    <text x="170" y="422" font-family="Segoe UI" font-size="10" fill="#808090" text-anchor="middle">(2022~2025)</text>
  </g>
  <g>
    <text x="450" y="380" font-family="Segoe UI" font-weight="bold" font-size="32" fill="#4facfe" text-anchor="middle">78%</text>
    <text x="450" y="405" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">사람이 구분 못한 비율</text>
    <text x="450" y="422" font-family="Segoe UI" font-size="10" fill="#808090" text-anchor="middle">(AI 생성 vs 실제 메일)</text>
  </g>
  <g>
    <text x="730" y="380" font-family="Segoe UI" font-weight="bold" font-size="32" fill="#34d399" text-anchor="middle">$25.6M</text>
    <text x="730" y="405" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">단일 딥페이크 사기 최대 피해</text>
    <text x="730" y="422" font-family="Segoe UI" font-size="10" fill="#808090" text-anchor="middle">(홍콩 Arup 사건, 2024)</text>
  </g>
</svg>