<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="480" fill="url(#bg)"/>
  <text x="450" y="40" font-family="Segoe UI" font-weight="bold" font-size="24" fill="#ffffff" text-anchor="middle">스피어 피싱 vs 일반 피싱</text>
  <text x="450" y="62" font-family="Segoe UI" font-size="13" fill="#a0a0c0" text-anchor="middle">표적형 공격과 대량 공격의 핵심 차이점</text>
  <!-- Headers -->
  <rect x="50" y="90" width="380" height="45" rx="8" fill="#ff416c" opacity="0.15"/>
  <text x="240" y="118" font-family="Segoe UI" font-weight="bold" font-size="18" fill="#ff416c" text-anchor="middle">일반 피싱 (Mass Phishing)</text>
  <rect x="470" y="90" width="380" height="45" rx="8" fill="#4facfe" opacity="0.15"/>
  <text x="660" y="118" font-family="Segoe UI" font-weight="bold" font-size="18" fill="#4facfe" text-anchor="middle">스피어 피싱 (Spear Phishing)</text>
  <!-- VS divider -->
  <line x1="450" y1="150" x2="450" y2="460" stroke="#ffffff" stroke-width="1" opacity="0.1"/>
  <circle cx="450" cy="155" r="18" fill="#302b63" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="450" y="160" font-family="Segoe UI" font-weight="bold" font-size="12" fill="#fbbf24" text-anchor="middle">VS</text>
  <!-- Row 1: Target -->
  <text x="240" y="200" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff9a44" text-anchor="middle">대상</text>
  <text x="240" y="222" font-family="Segoe UI" font-size="12" fill="#e0e0e0" text-anchor="middle">불특정 다수 (수천~수만 명)</text>
  <text x="660" y="200" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff9a44" text-anchor="middle">대상</text>
  <text x="660" y="222" font-family="Segoe UI" font-size="12" fill="#e0e0e0" text-anchor="middle">특정 개인/조직 (1~수십 명)</text>
  <line x1="80" y1="240" x2="820" y2="240" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>
  <!-- Row 2: Customization -->
  <text x="240" y="265" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff9a44" text-anchor="middle">맞춤도</text>
  <text x="240" y="287" font-family="Segoe UI" font-size="12" fill="#e0e0e0" text-anchor="middle">범용 템플릿 사용</text>
  <text x="660" y="265" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff9a44" text-anchor="middle">맞춤도</text>
  <text x="660" y="287" font-family="Segoe UI" font-size="12" fill="#e0e0e0" text-anchor="middle">타깃의 이름/직책/업무 반영</text>
  <line x1="80" y1="305" x2="820" y2="305" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>
  <!-- Row 3: Success Rate -->
  <text x="240" y="330" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff9a44" text-anchor="middle">성공률</text>
  <text x="240" y="352" font-family="Segoe UI" font-size="12" fill="#e0e0e0" text-anchor="middle">3~5% (낮은 클릭률)</text>
  <text x="660" y="330" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff9a44" text-anchor="middle">성공률</text>
  <text x="660" y="352" font-family="Segoe UI" font-size="12" fill="#e0e0e0" text-anchor="middle">40~70% (매우 높음)</text>
  <line x1="80" y1="370" x2="820" y2="370" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>
  <!-- Row 4: Damage -->
  <text x="240" y="395" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff9a44" text-anchor="middle">피해 규모</text>
  <text x="240" y="417" font-family="Segoe UI" font-size="12" fill="#e0e0e0" text-anchor="middle">개인정보 유출, 소액 금전 피해</text>
  <text x="660" y="395" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff9a44" text-anchor="middle">피해 규모</text>
  <text x="660" y="417" font-family="Segoe UI" font-size="12" fill="#e0e0e0" text-anchor="middle">기업 기밀 유출, 수억 원 피해</text>
  <line x1="80" y1="435" x2="820" y2="435" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>
  <!-- Row 5: Detection -->
  <text x="240" y="458" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff9a44" text-anchor="middle">탐지 난이도</text>
  <rect x="170" y="462" width="140" height="8" rx="4" fill="#1a1a3e"/>
  <rect x="170" y="462" width="50" height="8" rx="4" fill="#34d399"/>
  <text x="320" y="472" font-family="Segoe UI" font-size="10" fill="#808090">쉬움</text>
  <text x="660" y="458" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff9a44" text-anchor="middle">탐지 난이도</text>
  <rect x="590" y="462" width="140" height="8" rx="4" fill="#1a1a3e"/>
  <rect x="590" y="462" width="120" height="8" rx="4" fill="#ff416c"/>
  <text x="740" y="472" font-family="Segoe UI" font-size="10" fill="#808090">어려움</text>
</svg>