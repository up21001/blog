  <text x="240" y="395" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff9a44" text-anchor="middle">Damage Scale</text>
  <text x="240" y="417" font-family="Segoe UI" font-size="12" fill="#e0e0e0" text-anchor="middle">Personal data leak, small losses</text>
  <text x="660" y="395" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff9a44" text-anchor="middle">Damage Scale</text>
