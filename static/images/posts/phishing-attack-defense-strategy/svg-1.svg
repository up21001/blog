<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="480" fill="url(#bg)"/>
  <text x="450" y="45" font-family="Segoe UI" font-weight="bold" font-size="24" fill="#ffffff" text-anchor="middle">피싱 공격 유형 분류</text>
  <line x1="100" y1="60" x2="800" y2="60" stroke="#4facfe" stroke-width="0.5" opacity="0.3"/>
  <!-- Email Phishing -->
  <rect x="50" y="90" width="240" height="160" rx="12" fill="#1a1a3e" stroke="#ff416c" stroke-width="1.2"/>
  <text x="170" y="125" font-family="Segoe UI" font-size="28" fill="#ff416c" text-anchor="middle">&#x2709;</text>
  <text x="170" y="155" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">이메일 피싱</text>
  <text x="170" y="180" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">가장 흔한 공격 벡터</text>
  <text x="170" y="200" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">위조된 발신자, 악성 링크</text>
  <text x="170" y="220" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">첨부파일 기반 멀웨어 배포</text>
  <text x="170" y="242" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff416c" text-anchor="middle">전체 피싱의 96%</text>
  <!-- SMS Phishing -->
  <rect x="330" y="90" width="240" height="160" rx="12" fill="#1a1a3e" stroke="#ff9a44" stroke-width="1.2"/>
  <text x="450" y="125" font-family="Segoe UI" font-size="28" fill="#ff9a44" text-anchor="middle">&#x1F4F1;</text>
  <text x="450" y="155" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">스미싱 (SMS)</text>
  <text x="450" y="180" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">택배/금융 사칭 문자</text>
  <text x="450" y="200" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">단축 URL로 악성사이트 유도</text>
  <text x="450" y="220" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">모바일 특화 공격</text>
  <text x="450" y="242" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff9a44" text-anchor="middle">연간 300% 증가</text>
  <!-- Voice Phishing -->
  <rect x="610" y="90" width="240" height="160" rx="12" fill="#1a1a3e" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="730" y="125" font-family="Segoe UI" font-size="28" fill="#a78bfa" text-anchor="middle">&#x1F4DE;</text>
  <text x="730" y="155" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">보이스피싱</text>
  <text x="730" y="180" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">수사기관/금융기관 사칭</text>
  <text x="730" y="200" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">AI 음성 합성 활용 증가</text>
  <text x="730" y="220" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">심리적 압박 전술</text>
  <text x="730" y="242" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#a78bfa" text-anchor="middle">건당 평균 피해 $4,400</text>
  <!-- QR Phishing -->
  <rect x="140" y="290" width="240" height="160" rx="12" fill="#1a1a3e" stroke="#34d399" stroke-width="1.2"/>
  <text x="260" y="325" font-family="Segoe UI" font-size="28" fill="#34d399" text-anchor="middle">&#x25A3;</text>
  <text x="260" y="355" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">큐싱 (QR 피싱)</text>
  <text x="260" y="380" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">악성 QR 코드로 유도</text>
  <text x="260" y="400" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">오프라인-온라인 연계 공격</text>
  <text x="260" y="420" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">URL 미리보기 불가</text>
  <text x="260" y="442" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#34d399" text-anchor="middle">2025년 587% 급증</text>
  <!-- SNS Phishing -->
  <rect x="520" y="290" width="240" height="160" rx="12" fill="#1a1a3e" stroke="#4facfe" stroke-width="1.2"/>
  <text x="640" y="325" font-family="Segoe UI" font-size="28" fill="#4facfe" text-anchor="middle">&#x1F310;</text>
  <text x="640" y="355" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">SNS/메신저 피싱</text>
  <text x="640" y="380" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">지인 사칭 메시지</text>
  <text x="640" y="400" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">계정 탈취 후 2차 공격</text>
  <text x="640" y="420" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">신뢰 관계 악용</text>
  <text x="640" y="442" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#4facfe" text-anchor="middle">피해자 65%가 20~30대</text>
</svg>