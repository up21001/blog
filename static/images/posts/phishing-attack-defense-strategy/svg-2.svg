<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="chain" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff416c"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  <rect width="900" height="450" fill="url(#bg)"/>
  <text x="450" y="40" font-family="Segoe UI" font-weight="bold" font-size="24" fill="#ffffff" text-anchor="middle">피싱 공격 킬체인</text>
  <text x="450" y="62" font-family="Segoe UI" font-size="13" fill="#a0a0c0" text-anchor="middle">Cyber Kill Chain - 피싱 공격의 7단계 생명주기</text>
  <!-- Chain line -->
  <line x1="65" y1="170" x2="835" y2="170" stroke="url(#chain)" stroke-width="3" opacity="0.4"/>
  <!-- Step 1: Recon -->
  <g>
    <circle cx="65" cy="170" r="28" fill="#1a1a3e" stroke="#ff416c" stroke-width="2"/>
    <text x="65" y="165" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#ff416c" text-anchor="middle">1</text>
    <text x="65" y="182" font-family="Segoe UI" font-size="8" fill="#ffffff" text-anchor="middle">단계</text>
    <text x="65" y="218" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff416c" text-anchor="middle">정찰</text>
    <text x="65" y="238" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">타깃 정보</text>
    <text x="65" y="253" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">수집</text>
  </g>
  <!-- Step 2: Bait -->
  <g>
    <circle cx="193" cy="170" r="28" fill="#1a1a3e" stroke="#ff6b44" stroke-width="2"/>
    <text x="193" y="165" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#ff6b44" text-anchor="middle">2</text>
    <text x="193" y="182" font-family="Segoe UI" font-size="8" fill="#ffffff" text-anchor="middle">단계</text>
    <text x="193" y="218" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff6b44" text-anchor="middle">미끼 제작</text>
    <text x="193" y="238" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">피싱 메일/</text>
    <text x="193" y="253" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">사이트 구축</text>
  </g>
  <!-- Step 3: Delivery -->
  <g>
    <circle cx="321" cy="170" r="28" fill="#1a1a3e" stroke="#fbbf24" stroke-width="2"/>
    <text x="321" y="165" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#fbbf24" text-anchor="middle">3</text>
    <text x="321" y="182" font-family="Segoe UI" font-size="8" fill="#ffffff" text-anchor="middle">단계</text>
    <text x="321" y="218" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#fbbf24" text-anchor="middle">전달</text>
    <text x="321" y="238" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">이메일/SMS</text>
    <text x="321" y="253" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">발송</text>
  </g>
  <!-- Step 4: Exploit -->
  <g>
    <circle cx="449" cy="170" r="28" fill="#1a1a3e" stroke="#a3e635" stroke-width="2"/>
    <text x="449" y="165" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#a3e635" text-anchor="middle">4</text>
    <text x="449" y="182" font-family="Segoe UI" font-size="8" fill="#ffffff" text-anchor="middle">단계</text>
    <text x="449" y="218" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#a3e635" text-anchor="middle">악용</text>
    <text x="449" y="238" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">클릭/실행</text>
    <text x="449" y="253" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">유도</text>
  </g>
  <!-- Step 5: Install -->
  <g>
    <circle cx="577" cy="170" r="28" fill="#1a1a3e" stroke="#34d399" stroke-width="2"/>
    <text x="577" y="165" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#34d399" text-anchor="middle">5</text>
    <text x="577" y="182" font-family="Segoe UI" font-size="8" fill="#ffffff" text-anchor="middle">단계</text>
    <text x="577" y="218" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#34d399" text-anchor="middle">설치</text>
    <text x="577" y="238" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">멀웨어/</text>
    <text x="577" y="253" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">백도어 설치</text>
  </g>
  <!-- Step 6: C2 -->
  <g>
    <circle cx="705" cy="170" r="28" fill="#1a1a3e" stroke="#4facfe" stroke-width="2"/>
    <text x="705" y="165" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#4facfe" text-anchor="middle">6</text>
    <text x="705" y="182" font-family="Segoe UI" font-size="8" fill="#ffffff" text-anchor="middle">단계</text>
    <text x="705" y="218" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#4facfe" text-anchor="middle">C2 통신</text>
    <text x="705" y="238" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">원격 제어</text>
    <text x="705" y="253" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">채널 확보</text>
  </g>
  <!-- Step 7: Objective -->
  <g>
    <circle cx="835" cy="170" r="28" fill="#1a1a3e" stroke="#a78bfa" stroke-width="2"/>
    <text x="835" y="165" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#a78bfa" text-anchor="middle">7</text>
    <text x="835" y="182" font-family="Segoe UI" font-size="8" fill="#ffffff" text-anchor="middle">단계</text>
    <text x="835" y="218" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#a78bfa" text-anchor="middle">목표 달성</text>
    <text x="835" y="238" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">데이터 탈취</text>
    <text x="835" y="253" font-family="Segoe UI" font-size="10" fill="#b0b0d0" text-anchor="middle">금전 요구</text>
  </g>
  <!-- Defense zone -->
  <rect x="50" y="300" width="800" height="120" rx="10" fill="#0d0d2b" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3" opacity="0.8"/>
  <text x="450" y="330" font-family="Segoe UI" font-weight="bold" font-size="15" fill="#34d399" text-anchor="middle">방어 포인트</text>
  <text x="130" y="360" font-family="Segoe UI" font-size="11" fill="#e0e0e0" text-anchor="middle">위협 인텔리전스</text>
  <text x="130" y="380" font-family="Segoe UI" font-size="10" fill="#808090" text-anchor="middle">(1~2단계 차단)</text>
  <text x="320" y="360" font-family="Segoe UI" font-size="11" fill="#e0e0e0" text-anchor="middle">이메일 필터링</text>
  <text x="320" y="380" font-family="Segoe UI" font-size="10" fill="#808090" text-anchor="middle">(3단계 차단)</text>
  <text x="500" y="360" font-family="Segoe UI" font-size="11" fill="#e0e0e0" text-anchor="middle">보안 인식 교육</text>
  <text x="500" y="380" font-family="Segoe UI" font-size="10" fill="#808090" text-anchor="middle">(4단계 차단)</text>
  <text x="670" y="360" font-family="Segoe UI" font-size="11" fill="#e0e0e0" text-anchor="middle">EDR / MFA</text>
  <text x="670" y="380" font-family="Segoe UI" font-size="10" fill="#808090" text-anchor="middle">(5~6단계 차단)</text>
  <text x="800" y="360" font-family="Segoe UI" font-size="11" fill="#e0e0e0" text-anchor="middle">DLP</text>
  <text x="800" y="380" font-family="Segoe UI" font-size="10" fill="#808090" text-anchor="middle">(7단계 차단)</text>
  <!-- Arrows from defense to kill chain -->
  <g stroke="#34d399" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3">
    <line x1="130" y1="300" x2="130" y2="270"/>
    <line x1="320" y1="300" x2="320" y2="270"/>
    <line x1="500" y1="300" x2="449" y2="270"/>
    <line x1="670" y1="300" x2="640" y2="270"/>
    <line x1="800" y1="300" x2="835" y2="270"/>
  </g>
</svg>