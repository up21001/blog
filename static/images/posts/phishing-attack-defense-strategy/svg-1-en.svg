<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="480" fill="url(#bg)"/>
  <text x="450" y="45" font-family="Segoe UI" font-weight="bold" font-size="24" fill="#ffffff" text-anchor="middle">Phishing Attack Type Classification</text>
  <line x1="100" y1="60" x2="800" y2="60" stroke="#4facfe" stroke-width="0.5" opacity="0.3"/>
  <rect x="50" y="90" width="240" height="160" rx="12" fill="#1a1a3e" stroke="#ff416c" stroke-width="1.2"/>
  <text x="170" y="125" font-family="Segoe UI" font-size="28" fill="#ff416c" text-anchor="middle">&#x2709;</text>
  <text x="170" y="155" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">Email Phishing</text>
  <text x="170" y="180" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">Most common attack vector</text>
  <text x="170" y="200" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">Spoofed senders, malicious links</text>
  <text x="170" y="220" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">Attachment-based malware delivery</text>
  <text x="170" y="242" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff416c" text-anchor="middle">96% of all phishing</text>
  <rect x="330" y="90" width="240" height="160" rx="12" fill="#1a1a3e" stroke="#ff9a44" stroke-width="1.2"/>
  <text x="450" y="125" font-family="Segoe UI" font-size="28" fill="#ff9a44" text-anchor="middle">&#x1F4F1;</text>
  <text x="450" y="155" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">Smishing (SMS)</text>
  <text x="450" y="180" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">Delivery/banking impersonation</text>
  <text x="450" y="200" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">Shortened URLs to malicious sites</text>
  <text x="450" y="220" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">Mobile-targeted attacks</text>
  <text x="450" y="242" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#ff9a44" text-anchor="middle">300% annual increase</text>
  <rect x="610" y="90" width="240" height="160" rx="12" fill="#1a1a3e" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="730" y="125" font-family="Segoe UI" font-size="28" fill="#a78bfa" text-anchor="middle">&#x1F4DE;</text>
  <text x="730" y="155" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">Vishing (Voice)</text>
  <text x="730" y="180" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">Law enforcement/bank spoofing</text>
  <text x="730" y="200" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">AI voice synthesis on the rise</text>
  <text x="730" y="220" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">Psychological pressure tactics</text>
  <text x="730" y="242" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#a78bfa" text-anchor="middle">Avg. loss $4,400 per victim</text>
  <rect x="140" y="290" width="240" height="160" rx="12" fill="#1a1a3e" stroke="#34d399" stroke-width="1.2"/>
  <text x="260" y="325" font-family="Segoe UI" font-size="28" fill="#34d399" text-anchor="middle">&#x25A3;</text>
  <text x="260" y="355" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">Quishing (QR)</text>
  <text x="260" y="380" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">Malicious QR code redirection</text>
  <text x="260" y="400" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">Offline-to-online bridge attack</text>
  <text x="260" y="420" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">No URL preview available</text>
  <text x="260" y="442" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#34d399" text-anchor="middle">587% surge in 2025</text>
  <rect x="520" y="290" width="240" height="160" rx="12" fill="#1a1a3e" stroke="#4facfe" stroke-width="1.2"/>
  <text x="640" y="325" font-family="Segoe UI" font-size="28" fill="#4facfe" text-anchor="middle">&#x1F310;</text>
  <text x="640" y="355" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">Social Media Phishing</text>
  <text x="640" y="380" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">Friend/contact impersonation</text>
  <text x="640" y="400" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">Account hijacking for 2nd attacks</text>
  <text x="640" y="420" font-family="Segoe UI" font-size="11" fill="#b0b0d0" text-anchor="middle">Exploiting trust relationships</text>
  <text x="640" y="442" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#4facfe" text-anchor="middle">65% of victims aged 20-30</text>
</svg>