<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" font-family="Segoe UI" font-weight="bold" font-size="24" fill="#ffffff" text-anchor="middle">Email Security Technology Stack</text>
  <text x="450" y="62" font-family="Segoe UI" font-size="13" fill="#a0a0c0" text-anchor="middle">Multi-Layered Defense Architecture Against Phishing</text>
  <rect x="100" y="90" width="700" height="80" rx="10" fill="#1a1a3e" stroke="#ff416c" stroke-width="1.5" opacity="0.9"/>
  <text x="160" y="120" font-family="Segoe UI" font-weight="bold" font-size="20" fill="#ff416c">SPF</text>
  <text x="160" y="145" font-family="Segoe UI" font-size="11" fill="#b0b0d0">Sender Policy Framework</text>
  <text x="500" y="120" font-family="Segoe UI" font-size="12" fill="#e0e0e0">Sender server IP verification</text>
  <text x="500" y="142" font-family="Segoe UI" font-size="11" fill="#808090">Confirms email was sent from authorized mail servers</text>
  <rect x="720" y="108" width="65" height="24" rx="12" fill="#ff416c" opacity="0.2"/>
  <text x="752" y="124" font-family="Segoe UI" font-weight="bold" font-size="11" fill="#ff416c" text-anchor="middle">Layer 1</text>
  <rect x="100" y="185" width="700" height="80" rx="10" fill="#1a1a3e" stroke="#fbbf24" stroke-width="1.5" opacity="0.9"/>
  <text x="160" y="215" font-family="Segoe UI" font-weight="bold" font-size="20" fill="#fbbf24">DKIM</text>
  <text x="160" y="240" font-family="Segoe UI" font-size="11" fill="#b0b0d0">DomainKeys Identified Mail</text>
  <text x="500" y="215" font-family="Segoe UI" font-size="12" fill="#e0e0e0">Email integrity signature verification</text>
  <text x="500" y="237" font-family="Segoe UI" font-size="11" fill="#808090">Cryptographically verifies no tampering in transit</text>
  <rect x="720" y="203" width="65" height="24" rx="12" fill="#fbbf24" opacity="0.2"/>
  <text x="752" y="219" font-family="Segoe UI" font-weight="bold" font-size="11" fill="#fbbf24" text-anchor="middle">Layer 2</text>
  <rect x="100" y="280" width="700" height="80" rx="10" fill="#1a1a3e" stroke="#34d399" stroke-width="1.5" opacity="0.9"/>
  <text x="160" y="310" font-family="Segoe UI" font-weight="bold" font-size="20" fill="#34d399">DMARC</text>
  <text x="160" y="335" font-family="Segoe UI" font-size="11" fill="#b0b0d0">Domain-based Message Authentication</text>
  <text x="500" y="310" font-family="Segoe UI" font-size="12" fill="#e0e0e0">Policy enforcement based on SPF+DKIM</text>
  <text x="500" y="332" font-family="Segoe UI" font-size="11" fill="#808090">Quarantine/reject on failure + reporting</text>
  <rect x="720" y="298" width="65" height="24" rx="12" fill="#34d399" opacity="0.2"/>
  <text x="752" y="314" font-family="Segoe UI" font-weight="bold" font-size="11" fill="#34d399" text-anchor="middle">Layer 3</text>
  <rect x="100" y="375" width="700" height="100" rx="10" fill="#1a1a3e" stroke="#4facfe" stroke-width="1.5" opacity="0.9"/>
  <text x="160" y="408" font-family="Segoe UI" font-weight="bold" font-size="20" fill="#4facfe">Zero Trust</text>
  <text x="160" y="433" font-family="Segoe UI" font-size="11" fill="#b0b0d0">Never Trust, Always Verify</text>
  <text x="500" y="400" font-family="Segoe UI" font-size="12" fill="#e0e0e0">Continuous verification for all access</text>
  <text x="500" y="422" font-family="Segoe UI" font-size="11" fill="#808090">MFA + least privilege + micro-segmentation</text>
  <text x="500" y="444" font-family="Segoe UI" font-size="11" fill="#808090">Blocks lateral movement even after phishing success</text>
  <rect x="720" y="396" width="65" height="24" rx="12" fill="#4facfe" opacity="0.2"/>
  <text x="752" y="412" font-family="Segoe UI" font-weight="bold" font-size="11" fill="#4facfe" text-anchor="middle">Layer 4</text>
  <g fill="#ffffff" opacity="0.3">
    <polygon points="450,172 445,180 455,180"/>
    <polygon points="450,267 445,275 455,275"/>
    <polygon points="450,362 445,370 455,370"/>
  </g>
</svg>