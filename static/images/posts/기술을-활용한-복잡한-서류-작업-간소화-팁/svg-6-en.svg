<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <filter id="sh6e" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
  </defs>

  <rect width="800" height="460" fill="#F5F5F5" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C3E50">Paperwork Automation: Before vs. After</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#7F8C8D">Key metrics comparing manual processing vs. automated workflows</text>

  <!-- BEFORE column -->
  <rect x="30" y="75" width="340" height="350" rx="14" fill="white" filter="url(#sh6e)"/>
  <rect x="30" y="75" width="340" height="56" rx="14" fill="#95A5A6"/>
  <rect x="30" y="103" width="340" height="28" fill="#95A5A6"/>
  <text x="200" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Before (Manual Processing)</text>

  <!-- Metric 1: Time -->
  <rect x="50" y="148" width="300" height="56" rx="8" fill="#F8F9FA"/>
  <text x="80" y="168" font-size="11" fill="#777">Processing time (100 invoices)</text>
  <text x="80" y="190" font-size="22" font-weight="bold" fill="#E74C3C">4 – 6 hours</text>
  <rect x="310" y="155" width="30" height="44" rx="4" fill="#E74C3C" opacity="0.15"/>
  <text x="325" y="181" text-anchor="middle" font-size="18">😰</text>

  <!-- Metric 2: Error rate -->
  <rect x="50" y="216" width="300" height="56" rx="8" fill="#F8F9FA"/>
  <text x="80" y="236" font-size="11" fill="#777">Average error rate</text>
  <text x="80" y="258" font-size="22" font-weight="bold" fill="#E74C3C">3 – 5 %</text>
  <rect x="310" y="223" width="30" height="44" rx="4" fill="#E74C3C" opacity="0.15"/>
  <text x="325" y="249" text-anchor="middle" font-size="18">❌</text>

  <!-- Metric 3: Satisfaction -->
  <rect x="50" y="284" width="300" height="56" rx="8" fill="#F8F9FA"/>
  <text x="80" y="304" font-size="11" fill="#777">Staff job satisfaction</text>
  <text x="80" y="326" font-size="22" font-weight="bold" fill="#E74C3C">Low ★★☆☆☆</text>

  <!-- Metric 4: Scalability -->
  <rect x="50" y="352" width="300" height="56" rx="8" fill="#F8F9FA"/>
  <text x="80" y="372" font-size="11" fill="#777">Throughput scalability</text>
  <text x="80" y="394" font-size="16" font-weight="bold" fill="#E74C3C">Requires more headcount</text>

  <!-- AFTER column -->
  <rect x="430" y="75" width="340" height="350" rx="14" fill="white" filter="url(#sh6e)"/>
  <rect x="430" y="75" width="340" height="56" rx="14" fill="#27AE60"/>
  <rect x="430" y="103" width="340" height="28" fill="#27AE60"/>
  <text x="600" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="white">After (Automated Processing)</text>

  <!-- Metric 1: Time -->
  <rect x="450" y="148" width="300" height="56" rx="8" fill="#F0FBF4"/>
  <text x="480" y="168" font-size="11" fill="#777">Processing time (100 invoices)</text>
  <text x="480" y="190" font-size="22" font-weight="bold" fill="#27AE60">3 – 5 minutes</text>
  <rect x="710" y="155" width="30" height="44" rx="4" fill="#27AE60" opacity="0.15"/>
  <text x="725" y="181" text-anchor="middle" font-size="18">🚀</text>

  <!-- Metric 2: Error rate -->
  <rect x="450" y="216" width="300" height="56" rx="8" fill="#F0FBF4"/>
  <text x="480" y="236" font-size="11" fill="#777">Average error rate</text>
  <text x="480" y="258" font-size="22" font-weight="bold" fill="#27AE60">Under 0.1%</text>
  <rect x="710" y="223" width="30" height="44" rx="4" fill="#27AE60" opacity="0.15"/>
  <text x="725" y="249" text-anchor="middle" font-size="18">✅</text>

  <!-- Metric 3: Satisfaction -->
  <rect x="450" y="284" width="300" height="56" rx="8" fill="#F0FBF4"/>
  <text x="480" y="304" font-size="11" fill="#777">Staff job satisfaction</text>
  <text x="480" y="326" font-size="22" font-weight="bold" fill="#27AE60">High ★★★★★</text>

  <!-- Metric 4: Scalability -->
  <rect x="450" y="352" width="300" height="56" rx="8" fill="#F0FBF4"/>
  <text x="480" y="372" font-size="11" fill="#777">Throughput scalability</text>
  <text x="480" y="394" font-size="16" font-weight="bold" fill="#27AE60">Scales without extra staff</text>

  <!-- VS badge -->
  <circle cx="400" cy="250" r="30" fill="#2C3E50" filter="url(#sh6e)"/>
  <text x="400" y="256" text-anchor="middle" font-size="14" font-weight="bold" fill="white">VS</text>

  <!-- Bottom summary -->
  <text x="400" y="452" text-anchor="middle" font-size="12" fill="#7F8C8D">One-time build: 8–24 hours → Monthly savings: dozens to hundreds of hours</text>
</svg>
