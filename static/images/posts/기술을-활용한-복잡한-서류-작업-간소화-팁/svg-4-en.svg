<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <filter id="sh4e" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <marker id="arr4e" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#50C878"/>
    </marker>
  </defs>

  <rect width="800" height="420" fill="#F0FBF4" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C3E50">Python-Based Excel → Word Automated Document Generation</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#7F8C8D">Customer Data → Python Script → Template → Individual Documents</text>

  <!-- Step 1: Excel Data -->
  <rect x="20" y="88" width="160" height="210" rx="12" fill="#4A90D9" filter="url(#sh4e)"/>
  <text x="100" y="120" text-anchor="middle" font-size="30">📊</text>
  <text x="100" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Customer Data</text>
  <text x="100" y="166" text-anchor="middle" font-size="11" fill="#D6EAF8">customers.xlsx</text>
  <rect x="35" y="178" width="130" height="1" fill="white" opacity="0.4"/>
  <text x="100" y="198" text-anchor="middle" font-size="11" fill="#D6EAF8">Customer name</text>
  <text x="100" y="214" text-anchor="middle" font-size="11" fill="#D6EAF8">Billing amount</text>
  <text x="100" y="230" text-anchor="middle" font-size="11" fill="#D6EAF8">Email address</text>
  <text x="100" y="246" text-anchor="middle" font-size="11" fill="#D6EAF8">Phone number</text>
  <rect x="35" y="262" width="130" height="24" rx="5" fill="white" opacity="0.2"/>
  <text x="100" y="279" text-anchor="middle" font-size="11" fill="white">Read with pandas</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="193" x2="212" y2="193" stroke="#50C878" stroke-width="2.5" marker-end="url(#arr4e)"/>

  <!-- Step 2: Python -->
  <rect x="214" y="88" width="160" height="210" rx="12" fill="#6C5CE7" filter="url(#sh4e)"/>
  <text x="294" y="120" text-anchor="middle" font-size="30">🐍</text>
  <text x="294" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Python Script</text>
  <text x="294" y="166" text-anchor="middle" font-size="11" fill="#DDD8FD">generate_invoices()</text>
  <rect x="229" y="178" width="130" height="1" fill="white" opacity="0.4"/>
  <text x="294" y="198" text-anchor="middle" font-size="11" fill="#DDD8FD">Iterate data rows</text>
  <text x="294" y="214" text-anchor="middle" font-size="11" fill="#DDD8FD">Replace placeholders</text>
  <text x="294" y="230" text-anchor="middle" font-size="11" fill="#DDD8FD">Exception handling</text>
  <text x="294" y="246" text-anchor="middle" font-size="11" fill="#DDD8FD">Progress logging</text>
  <rect x="229" y="262" width="130" height="24" rx="5" fill="white" opacity="0.2"/>
  <text x="294" y="279" text-anchor="middle" font-size="11" fill="white">python-docx</text>

  <!-- Arrow 2 -->
  <line x1="374" y1="193" x2="406" y2="193" stroke="#50C878" stroke-width="2.5" marker-end="url(#arr4e)"/>

  <!-- Step 3: Template -->
  <rect x="408" y="88" width="160" height="210" rx="12" fill="#50C878" filter="url(#sh4e)"/>
  <text x="488" y="120" text-anchor="middle" font-size="30">📝</text>
  <text x="488" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Word Template</text>
  <text x="488" y="166" text-anchor="middle" font-size="11" fill="#D5F5E3">invoice_template.docx</text>
  <rect x="423" y="178" width="130" height="1" fill="white" opacity="0.4"/>
  <text x="488" y="198" text-anchor="middle" font-size="11" fill="#D5F5E3">{{NAME}} tag</text>
  <text x="488" y="214" text-anchor="middle" font-size="11" fill="#D5F5E3">{{AMOUNT}} tag</text>
  <text x="488" y="230" text-anchor="middle" font-size="11" fill="#D5F5E3">{{DATE}} tag</text>
  <text x="488" y="246" text-anchor="middle" font-size="11" fill="#D5F5E3">Company logo</text>
  <rect x="423" y="262" width="130" height="24" rx="5" fill="white" opacity="0.2"/>
  <text x="488" y="279" text-anchor="middle" font-size="11" fill="white">Placeholder pattern</text>

  <!-- Arrow 3 -->
  <line x1="568" y1="193" x2="600" y2="193" stroke="#50C878" stroke-width="2.5" marker-end="url(#arr4e)"/>

  <!-- Step 4: Output -->
  <rect x="602" y="88" width="175" height="210" rx="12" fill="#FF6B6B" filter="url(#sh4e)"/>
  <text x="689" y="120" text-anchor="middle" font-size="30">📋</text>
  <text x="689" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Individual Documents</text>
  <text x="689" y="166" text-anchor="middle" font-size="11" fill="#FDECEA">invoice_john_doe.docx</text>
  <rect x="617" y="178" width="145" height="1" fill="white" opacity="0.4"/>
  <text x="689" y="198" text-anchor="middle" font-size="11" fill="#FDECEA">Personalized content</text>
  <text x="689" y="214" text-anchor="middle" font-size="11" fill="#FDECEA">Auto PDF conversion</text>
  <text x="689" y="230" text-anchor="middle" font-size="11" fill="#FDECEA">Auto email dispatch</text>
  <text x="689" y="246" text-anchor="middle" font-size="11" fill="#FDECEA">Approval system sync</text>
  <rect x="617" y="262" width="145" height="24" rx="5" fill="white" opacity="0.2"/>
  <text x="689" y="279" text-anchor="middle" font-size="11" fill="white">smtplib · docx2pdf</text>

  <!-- Extension box -->
  <rect x="20" y="322" width="755" height="72" rx="10" fill="white" filter="url(#sh4e)"/>
  <text x="400" y="344" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50">Expandable Automation Chain</text>
  <text x="400" y="364" text-anchor="middle" font-size="12" fill="#555">Extract data → Generate doc → <tspan font-weight="bold" fill="#4A90D9">PDF convert</tspan> → <tspan font-weight="bold" fill="#6C5CE7">Send email</tspan> → <tspan font-weight="bold" fill="#50C878">Submit approval</tspan> → <tspan font-weight="bold" fill="#FF6B6B">Notify done</tspan></text>
  <text x="400" y="384" text-anchor="middle" font-size="11" fill="#7F8C8D">100 documents: 6 hours manual → under 5 minutes automated</text>
</svg>
