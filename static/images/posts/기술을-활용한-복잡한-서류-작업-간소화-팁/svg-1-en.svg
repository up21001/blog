<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <filter id="shadow1e" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <marker id="arrow1e" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90D9"/>
    </marker>
  </defs>

  <rect width="800" height="420" fill="#F0F4FA" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C3E50">Automation Pipeline Architecture</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#7F8C8D">Document Input → OCR/AI Analysis → Script Processing → Organized Data Output</text>

  <!-- Step 1: Document Input -->
  <rect x="30" y="100" width="155" height="220" rx="12" fill="#4A90D9" filter="url(#shadow1e)"/>
  <text x="107" y="135" text-anchor="middle" font-size="28">📄</text>
  <text x="107" y="162" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Document Input</text>
  <rect x="45" y="175" width="125" height="1" fill="white" opacity="0.4"/>
  <text x="107" y="198" text-anchor="middle" font-size="11" fill="#D6EAF8">Receipt photos</text>
  <text x="107" y="216" text-anchor="middle" font-size="11" fill="#D6EAF8">Scanned PDFs</text>
  <text x="107" y="234" text-anchor="middle" font-size="11" fill="#D6EAF8">Image contracts</text>
  <text x="107" y="252" text-anchor="middle" font-size="11" fill="#D6EAF8">Excel spreadsheets</text>
  <text x="107" y="270" text-anchor="middle" font-size="11" fill="#D6EAF8">Word documents</text>
  <rect x="45" y="285" width="125" height="24" rx="6" fill="white" opacity="0.2"/>
  <text x="107" y="302" text-anchor="middle" font-size="11" fill="white">Multiple formats</text>

  <!-- Arrow 1 -->
  <line x1="185" y1="210" x2="218" y2="210" stroke="#4A90D9" stroke-width="2.5" marker-end="url(#arrow1e)"/>

  <!-- Step 2: OCR/AI Analysis -->
  <rect x="220" y="100" width="155" height="220" rx="12" fill="#6C5CE7" filter="url(#shadow1e)"/>
  <text x="297" y="135" text-anchor="middle" font-size="28">🔍</text>
  <text x="297" y="162" text-anchor="middle" font-size="14" font-weight="bold" fill="white">OCR / AI Analysis</text>
  <rect x="235" y="175" width="125" height="1" fill="white" opacity="0.4"/>
  <text x="297" y="198" text-anchor="middle" font-size="11" fill="#DDD8FD">Image preprocessing</text>
  <text x="297" y="216" text-anchor="middle" font-size="11" fill="#DDD8FD">Character recognition</text>
  <text x="297" y="234" text-anchor="middle" font-size="11" fill="#DDD8FD">Semantic analysis (LLM)</text>
  <text x="297" y="252" text-anchor="middle" font-size="11" fill="#DDD8FD">Data extraction</text>
  <text x="297" y="270" text-anchor="middle" font-size="11" fill="#DDD8FD">Structure conversion</text>
  <rect x="235" y="285" width="125" height="24" rx="6" fill="white" opacity="0.2"/>
  <text x="297" y="302" text-anchor="middle" font-size="11" fill="white">Tesseract · GPT-4</text>

  <!-- Arrow 2 -->
  <line x1="375" y1="210" x2="408" y2="210" stroke="#4A90D9" stroke-width="2.5" marker-end="url(#arrow1e)"/>

  <!-- Step 3: Script Processing -->
  <rect x="410" y="100" width="155" height="220" rx="12" fill="#50C878" filter="url(#shadow1e)"/>
  <text x="487" y="135" text-anchor="middle" font-size="28">⚙️</text>
  <text x="487" y="162" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Script Processing</text>
  <rect x="425" y="175" width="125" height="1" fill="white" opacity="0.4"/>
  <text x="487" y="198" text-anchor="middle" font-size="11" fill="#D5F5E3">Data validation</text>
  <text x="487" y="216" text-anchor="middle" font-size="11" fill="#D5F5E3">Template application</text>
  <text x="487" y="234" text-anchor="middle" font-size="11" fill="#D5F5E3">Auto doc generation</text>
  <text x="487" y="252" text-anchor="middle" font-size="11" fill="#D5F5E3">Auto email dispatch</text>
  <text x="487" y="270" text-anchor="middle" font-size="11" fill="#D5F5E3">Approval submission</text>
  <rect x="425" y="285" width="125" height="24" rx="6" fill="white" opacity="0.2"/>
  <text x="487" y="302" text-anchor="middle" font-size="11" fill="white">Python · RPA</text>

  <!-- Arrow 3 -->
  <line x1="565" y1="210" x2="598" y2="210" stroke="#4A90D9" stroke-width="2.5" marker-end="url(#arrow1e)"/>

  <!-- Step 4: Output -->
  <rect x="600" y="100" width="165" height="220" rx="12" fill="#FF6B6B" filter="url(#shadow1e)"/>
  <text x="682" y="135" text-anchor="middle" font-size="28">✅</text>
  <text x="682" y="162" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Organized Output</text>
  <rect x="615" y="175" width="135" height="1" fill="white" opacity="0.4"/>
  <text x="682" y="198" text-anchor="middle" font-size="11" fill="#FDECEA">Excel ledger update</text>
  <text x="682" y="216" text-anchor="middle" font-size="11" fill="#FDECEA">PDF storage</text>
  <text x="682" y="234" text-anchor="middle" font-size="11" fill="#FDECEA">ERP/CRM sync</text>
  <text x="682" y="252" text-anchor="middle" font-size="11" fill="#FDECEA">Team notifications</text>
  <text x="682" y="270" text-anchor="middle" font-size="11" fill="#FDECEA">Audit log entry</text>
  <rect x="615" y="285" width="135" height="24" rx="6" fill="white" opacity="0.2"/>
  <text x="682" y="302" text-anchor="middle" font-size="11" fill="white">Automation complete</text>

  <!-- Bottom stats -->
  <rect x="30" y="345" width="225" height="52" rx="8" fill="white" opacity="0.7"/>
  <text x="142" y="366" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C3E50">Processing Time</text>
  <text x="142" y="386" text-anchor="middle" font-size="13" fill="#4A90D9" font-weight="bold">6 hrs manual → 5 min auto</text>

  <rect x="285" y="345" width="225" height="52" rx="8" fill="white" opacity="0.7"/>
  <text x="397" y="366" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C3E50">Error Rate</text>
  <text x="397" y="386" text-anchor="middle" font-size="13" fill="#50C878" font-weight="bold">Human errors cut by 90%</text>

  <rect x="540" y="345" width="225" height="52" rx="8" fill="white" opacity="0.7"/>
  <text x="652" y="366" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C3E50">Operation Mode</text>
  <text x="652" y="386" text-anchor="middle" font-size="13" fill="#FF6B6B" font-weight="bold">24/7 uninterrupted</text>
</svg>
