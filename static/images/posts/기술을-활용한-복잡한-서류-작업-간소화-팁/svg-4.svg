<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans KR', Arial, sans-serif">
  <defs>
    <filter id="sh4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <marker id="arr4" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#50C878"/>
    </marker>
  </defs>

  <rect width="800" height="420" fill="#F0FBF4" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C3E50">Python 기반 엑셀 → 워드 자동 문서 생성</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#7F8C8D">고객 데이터 → Python 스크립트 → 템플릿 → 개별 문서 자동 생성</text>

  <!-- Step 1: Excel Data -->
  <rect x="20" y="88" width="160" height="210" rx="12" fill="#4A90D9" filter="url(#sh4)"/>
  <text x="100" y="120" text-anchor="middle" font-size="30">📊</text>
  <text x="100" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="white">고객 데이터</text>
  <text x="100" y="166" text-anchor="middle" font-size="11" fill="#D6EAF8">customers.xlsx</text>
  <rect x="35" y="178" width="130" height="1" fill="white" opacity="0.4"/>
  <text x="100" y="198" text-anchor="middle" font-size="11" fill="#D6EAF8">고객명</text>
  <text x="100" y="214" text-anchor="middle" font-size="11" fill="#D6EAF8">청구금액</text>
  <text x="100" y="230" text-anchor="middle" font-size="11" fill="#D6EAF8">이메일 주소</text>
  <text x="100" y="246" text-anchor="middle" font-size="11" fill="#D6EAF8">연락처</text>
  <rect x="35" y="262" width="130" height="24" rx="5" fill="white" opacity="0.2"/>
  <text x="100" y="279" text-anchor="middle" font-size="11" fill="white">pandas 로 읽기</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="193" x2="212" y2="193" stroke="#50C878" stroke-width="2.5" marker-end="url(#arr4)"/>

  <!-- Step 2: Python -->
  <rect x="214" y="88" width="160" height="210" rx="12" fill="#6C5CE7" filter="url(#sh4)"/>
  <text x="294" y="120" text-anchor="middle" font-size="30">🐍</text>
  <text x="294" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Python 스크립트</text>
  <text x="294" y="166" text-anchor="middle" font-size="11" fill="#DDD8FD">generate_invoices()</text>
  <rect x="229" y="178" width="130" height="1" fill="white" opacity="0.4"/>
  <text x="294" y="198" text-anchor="middle" font-size="11" fill="#DDD8FD">데이터 행 순회</text>
  <text x="294" y="214" text-anchor="middle" font-size="11" fill="#DDD8FD">태그 치환 처리</text>
  <text x="294" y="230" text-anchor="middle" font-size="11" fill="#DDD8FD">오류 예외 처리</text>
  <text x="294" y="246" text-anchor="middle" font-size="11" fill="#DDD8FD">진행 상황 로깅</text>
  <rect x="229" y="262" width="130" height="24" rx="5" fill="white" opacity="0.2"/>
  <text x="294" y="279" text-anchor="middle" font-size="11" fill="white">python-docx</text>

  <!-- Arrow 2 -->
  <line x1="374" y1="193" x2="406" y2="193" stroke="#50C878" stroke-width="2.5" marker-end="url(#arr4)"/>

  <!-- Step 3: Template -->
  <rect x="408" y="88" width="160" height="210" rx="12" fill="#50C878" filter="url(#sh4)"/>
  <text x="488" y="120" text-anchor="middle" font-size="30">📝</text>
  <text x="488" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="white">워드 템플릿</text>
  <text x="488" y="166" text-anchor="middle" font-size="11" fill="#D5F5E3">invoice_template.docx</text>
  <rect x="423" y="178" width="130" height="1" fill="white" opacity="0.4"/>
  <text x="488" y="198" text-anchor="middle" font-size="11" fill="#D5F5E3">{{NAME}} 태그</text>
  <text x="488" y="214" text-anchor="middle" font-size="11" fill="#D5F5E3">{{AMOUNT}} 태그</text>
  <text x="488" y="230" text-anchor="middle" font-size="11" fill="#D5F5E3">{{DATE}} 태그</text>
  <text x="488" y="246" text-anchor="middle" font-size="11" fill="#D5F5E3">회사 로고 포함</text>
  <rect x="423" y="262" width="130" height="24" rx="5" fill="white" opacity="0.2"/>
  <text x="488" y="279" text-anchor="middle" font-size="11" fill="white">플레이스홀더 방식</text>

  <!-- Arrow 3 -->
  <line x1="568" y1="193" x2="600" y2="193" stroke="#50C878" stroke-width="2.5" marker-end="url(#arr4)"/>

  <!-- Step 4: Output -->
  <rect x="602" y="88" width="175" height="210" rx="12" fill="#FF6B6B" filter="url(#sh4)"/>
  <text x="689" y="120" text-anchor="middle" font-size="30">📋</text>
  <text x="689" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="white">개별 문서 생성</text>
  <text x="689" y="166" text-anchor="middle" font-size="11" fill="#FDECEA">청구서_김철수.docx</text>
  <rect x="617" y="178" width="145" height="1" fill="white" opacity="0.4"/>
  <text x="689" y="198" text-anchor="middle" font-size="11" fill="#FDECEA">고객별 맞춤 내용</text>
  <text x="689" y="214" text-anchor="middle" font-size="11" fill="#FDECEA">PDF 자동 변환</text>
  <text x="689" y="230" text-anchor="middle" font-size="11" fill="#FDECEA">이메일 자동 발송</text>
  <text x="689" y="246" text-anchor="middle" font-size="11" fill="#FDECEA">결재 시스템 연동</text>
  <rect x="617" y="262" width="145" height="24" rx="5" fill="white" opacity="0.2"/>
  <text x="689" y="279" text-anchor="middle" font-size="11" fill="white">smtplib · docx2pdf</text>

  <!-- Extension box -->
  <rect x="20" y="322" width="755" height="72" rx="10" fill="white" filter="url(#sh4)"/>
  <text x="400" y="344" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50">확장 가능한 자동화 체인</text>
  <text x="400" y="364" text-anchor="middle" font-size="12" fill="#555">데이터 추출 → 문서 생성 → <tspan font-weight="bold" fill="#4A90D9">PDF 변환</tspan> → <tspan font-weight="bold" fill="#6C5CE7">이메일 발송</tspan> → <tspan font-weight="bold" fill="#50C878">결재 상신</tspan> → <tspan font-weight="bold" fill="#FF6B6B">완료 알림</tspan></text>
  <text x="400" y="384" text-anchor="middle" font-size="11" fill="#7F8C8D">100건 기준: 수동 6시간 → 자동화 후 5분 이내 완료</text>
</svg>
