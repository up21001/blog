  <line x1="525" y1="346" x2="525" y2="390" stroke="#EEE" stroke-width="1"/>
  <text x="540" y="364" font-size="11" font-weight="bold" fill="#4A90D9">학습 곡선</text>
  <rect x="540" y="372" width="200" height="10" rx="4" fill="#EEE"/>
