  <rect x="545" y="408" width="230" height="56" rx="8" fill="#4A90D9" opacity="0.1" filter="url(#sh5)"/>
  <text x="660" y="428" text-anchor="middle" font-size="11" font-weight="bold" fill="#4A90D9">Office 환경이라면</text>
  <text x="660" y="446" text-anchor="middle" font-size="11" fill="#555">Power Automate 추천</text>
  <text x="660" y="458" text-anchor="middle" font-size="10" fill="#777">Microsoft 365 완벽 통합</text>
