  <rect x="25" y="408" width="230" height="56" rx="8" fill="#FF6B6B" opacity="0.1" filter="url(#sh5)"/>
  <text x="140" y="428" text-anchor="middle" font-size="11" font-weight="bold" fill="#FF6B6B">빠르게 시작하려면</text>
  <text x="140" y="446" text-anchor="middle" font-size="11" fill="#555">Zapier 추천</text>
