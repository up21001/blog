  <rect x="285" y="408" width="230" height="56" rx="8" fill="#FFD93D" opacity="0.15" filter="url(#sh5)"/>
  <text x="400" y="428" text-anchor="middle" font-size="11" font-weight="bold" fill="#B8860B">복잡한 로직이 필요하면</text>
  <text x="400" y="446" text-anchor="middle" font-size="11" fill="#555">Make 추천</text>
