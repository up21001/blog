  <text x="400" y="446" text-anchor="middle" font-size="11" fill="#555">Choose Make</text>
  <text x="400" y="458" text-anchor="middle" font-size="10" fill="#777">Powerful visual editor</text>

  <rect x="545" y="408" width="230" height="56" rx="8" fill="#4A90D9" opacity="0.1" filter="url(#sh5e)"/>
  <text x="660" y="428" text-anchor="middle" font-size="11" font-weight="bold" fill="#4A90D9">In a Microsoft environment</text>
  <text x="660" y="446" text-anchor="middle" font-size="11" fill="#555">Choose Power Automate</text>
  <text x="660" y="458" text-anchor="middle" font-size="10" fill="#777">Seamless Microsoft 365 fit</text>
