<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <marker id="arr6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4facfe"/>
    </marker>
    <marker id="arr6p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f093fb"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="url(#bg6)" rx="16"/>
  <text x="450" y="38" text-anchor="middle" fill="#e0e0ff" font-size="20" font-weight="bold">로컬 LLM 개발 워크플로우 통합 파이프라인</text>

  <!-- Developer -->
  <rect x="50" y="70" width="140" height="80" rx="14" fill="#1a1a2e" stroke="#4facfe" stroke-width="2"/>
  <text x="120" y="100" text-anchor="middle" fill="#4facfe" font-size="24">&#128104;&#8205;&#128187;</text>
  <text x="120" y="130" text-anchor="middle" fill="#80c0ff" font-size="13" font-weight="bold">개발자</text>

  <!-- IDE -->
  <rect x="240" y="70" width="170" height="80" rx="14" fill="#1a1a2e" stroke="#667eea" stroke-width="2"/>
  <text x="325" y="100" text-anchor="middle" fill="#a8b4ff" font-size="14" font-weight="bold">VS Code + IDE</text>
  <text x="325" y="122" text-anchor="middle" fill="#7a88cc" font-size="11">Continue.dev 확장</text>
  <text x="325" y="140" text-anchor="middle" fill="#7a88cc" font-size="11">코드 자동완성</text>

  <line x1="190" y1="110" x2="235" y2="110" stroke="#4facfe" stroke-width="2" marker-end="url(#arr6)"/>

  <!-- Ollama Server -->
  <rect x="460" y="60" width="190" height="100" rx="14" fill="#1a1a2e" stroke="#764ba2" stroke-width="2"/>
  <text x="555" y="90" text-anchor="middle" fill="#c9a8ff" font-size="14" font-weight="bold">Ollama 서버</text>
  <text x="555" y="112" text-anchor="middle" fill="#9a7acc" font-size="11">localhost:11434</text>
  <text x="555" y="130" text-anchor="middle" fill="#9a7acc" font-size="11">OpenAI 호환 API</text>
  <text x="555" y="148" text-anchor="middle" fill="#9a7acc" font-size="11">스트리밍 응답</text>

  <line x1="410" y1="110" x2="455" y2="110" stroke="#4facfe" stroke-width="2" marker-end="url(#arr6)"/>

  <!-- MLX Server -->
  <rect x="700" y="60" width="160" height="100" rx="14" fill="#1a1a2e" stroke="#f093fb" stroke-width="2"/>
  <text x="780" y="90" text-anchor="middle" fill="#f0a0ff" font-size="14" font-weight="bold">MLX 서버</text>
  <text x="780" y="112" text-anchor="middle" fill="#c080d0" font-size="11">최대 성능 추론</text>
  <text x="780" y="130" text-anchor="middle" fill="#c080d0" font-size="11">LoRA 파인튜닝</text>
  <text x="780" y="148" text-anchor="middle" fill="#c080d0" font-size="11">Metal GPU 직접</text>

  <line x1="650" y1="110" x2="695" y2="110" stroke="#f093fb" stroke-width="2" marker-end="url(#arr6p)"/>
  <text x="672" y="102" fill="#9a7acc" font-size="9">또는</text>

  <!-- Use Cases Row -->
  <text x="450" y="200" text-anchor="middle" fill="#8888cc" font-size="14" font-weight="bold">--- 활용 사례 ---</text>

  <!-- Use Case 1: Code Assistant -->
  <rect x="30" y="220" width="195" height="120" rx="12" fill="#1a1a2e" stroke="#4facfe" stroke-width="1.5"/>
  <text x="127" y="248" text-anchor="middle" fill="#80c0ff" font-size="13" font-weight="bold">AI 코딩 어시스턴트</text>
  <text x="127" y="272" text-anchor="middle" fill="#6090cc" font-size="11">코드 자동완성</text>
  <text x="127" y="292" text-anchor="middle" fill="#6090cc" font-size="11">버그 탐지 &amp; 수정</text>
  <text x="127" y="312" text-anchor="middle" fill="#6090cc" font-size="11">리팩토링 제안</text>
  <rect x="45" y="326" width="165" height="6" rx="3" fill="#4facfe" opacity="0.4"/>

  <!-- Use Case 2: RAG -->
  <rect x="240" y="220" width="195" height="120" rx="12" fill="#1a1a2e" stroke="#667eea" stroke-width="1.5"/>
  <text x="337" y="248" text-anchor="middle" fill="#a8b4ff" font-size="13" font-weight="bold">로컬 RAG 파이프라인</text>
  <text x="337" y="272" text-anchor="middle" fill="#7a88cc" font-size="11">사내 문서 검색</text>
  <text x="337" y="292" text-anchor="middle" fill="#7a88cc" font-size="11">Ollama 임베딩</text>
  <text x="337" y="312" text-anchor="middle" fill="#7a88cc" font-size="11">ChromaDB 벡터 저장</text>
  <rect x="255" y="326" width="165" height="6" rx="3" fill="#667eea" opacity="0.4"/>

  <!-- Use Case 3: Chatbot -->
  <rect x="450" y="220" width="195" height="120" rx="12" fill="#1a1a2e" stroke="#764ba2" stroke-width="1.5"/>
  <text x="547" y="248" text-anchor="middle" fill="#c9a8ff" font-size="13" font-weight="bold">커스텀 챗봇</text>
  <text x="547" y="272" text-anchor="middle" fill="#9a7acc" font-size="11">Modelfile 기반</text>
  <text x="547" y="292" text-anchor="middle" fill="#9a7acc" font-size="11">도메인 특화 응답</text>
  <text x="547" y="312" text-anchor="middle" fill="#9a7acc" font-size="11">프라이버시 보장</text>
  <rect x="465" y="326" width="165" height="6" rx="3" fill="#764ba2" opacity="0.4"/>

  <!-- Use Case 4: Fine-tuning -->
  <rect x="660" y="220" width="200" height="120" rx="12" fill="#1a1a2e" stroke="#f093fb" stroke-width="1.5"/>
  <text x="760" y="248" text-anchor="middle" fill="#f0a0ff" font-size="13" font-weight="bold">온디바이스 파인튜닝</text>
  <text x="760" y="272" text-anchor="middle" fill="#c080d0" font-size="11">MLX LoRA/QLoRA</text>
  <text x="760" y="292" text-anchor="middle" fill="#c080d0" font-size="11">자체 데이터 학습</text>
  <text x="760" y="312" text-anchor="middle" fill="#c080d0" font-size="11">클라우드 GPU 불필요</text>
  <rect x="675" y="326" width="170" height="6" rx="3" fill="#f093fb" opacity="0.4"/>

  <!-- Benefits Bar -->
  <rect x="50" y="370" width="800" height="110" rx="14" fill="#1a1a2e" stroke="#f5576c" stroke-width="1.5"/>
  <text x="450" y="398" text-anchor="middle" fill="#ff8090" font-size="15" font-weight="bold">로컬 LLM의 3가지 핵심 이점</text>

  <rect x="80" y="412" width="220" height="50" rx="10" fill="#0f0c29" stroke="#4facfe" stroke-width="1"/>
  <text x="190" y="435" text-anchor="middle" fill="#80c0ff" font-size="13" font-weight="bold">비용 절감</text>
  <text x="190" y="453" text-anchor="middle" fill="#6090cc" font-size="11">API 호출 비용 제로</text>

  <rect x="340" y="412" width="220" height="50" rx="10" fill="#0f0c29" stroke="#764ba2" stroke-width="1"/>
  <text x="450" y="435" text-anchor="middle" fill="#c9a8ff" font-size="13" font-weight="bold">데이터 프라이버시</text>
  <text x="450" y="453" text-anchor="middle" fill="#9a7acc" font-size="11">민감 데이터 외부 전송 없음</text>

  <rect x="600" y="412" width="220" height="50" rx="10" fill="#0f0c29" stroke="#f093fb" stroke-width="1"/>
  <text x="710" y="435" text-anchor="middle" fill="#f0a0ff" font-size="13" font-weight="bold">오프라인 동작</text>
  <text x="710" y="453" text-anchor="middle" fill="#c080d0" font-size="11">인터넷 없이 완전 독립</text>
</svg>