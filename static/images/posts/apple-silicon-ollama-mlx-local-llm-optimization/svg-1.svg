<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="mem" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="520" fill="url(#bg1)" rx="16"/>
  <text x="450" y="45" text-anchor="middle" fill="#e0e0ff" font-size="22" font-weight="bold">Apple Silicon 통합 메모리 아키텍처 &amp; 로컬 LLM 실행</text>

  <!-- Chip Die -->
  <rect x="280" y="75" width="340" height="200" rx="20" fill="url(#chip)" opacity="0.9" filter="url(#glow)"/>
  <text x="450" y="105" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">Apple Silicon SoC</text>

  <!-- CPU -->
  <rect x="300" y="120" width="130" height="65" rx="10" fill="#1a1a2e" stroke="#667eea" stroke-width="1.5"/>
  <text x="365" y="148" text-anchor="middle" fill="#a8b4ff" font-size="13" font-weight="bold">CPU 코어</text>
  <text x="365" y="172" text-anchor="middle" fill="#7a88cc" font-size="11">고효율 + 고성능</text>

  <!-- GPU -->
  <rect x="470" y="120" width="130" height="65" rx="10" fill="#1a1a2e" stroke="#764ba2" stroke-width="1.5"/>
  <text x="535" y="148" text-anchor="middle" fill="#c9a8ff" font-size="13" font-weight="bold">GPU 코어</text>
  <text x="535" y="172" text-anchor="middle" fill="#9a7acc" font-size="11">행렬 연산 최적화</text>

  <!-- Neural Engine -->
  <rect x="300" y="200" width="130" height="55" rx="10" fill="#1a1a2e" stroke="#f093fb" stroke-width="1.5"/>
  <text x="365" y="224" text-anchor="middle" fill="#f0a0ff" font-size="13" font-weight="bold">Neural Engine</text>
  <text x="365" y="244" text-anchor="middle" fill="#c080d0" font-size="11">16코어 추론 가속</text>

  <!-- Media/ISP -->
  <rect x="470" y="200" width="130" height="55" rx="10" fill="#1a1a2e" stroke="#4facfe" stroke-width="1.5"/>
  <text x="535" y="224" text-anchor="middle" fill="#80c0ff" font-size="13" font-weight="bold">Media Engine</text>
  <text x="535" y="244" text-anchor="middle" fill="#6090cc" font-size="11">비디오/이미지 처리</text>

  <!-- Unified Memory Bar -->
  <rect x="100" y="310" width="700" height="70" rx="14" fill="url(#mem)" opacity="0.85" filter="url(#glow)"/>
  <text x="450" y="340" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">Unified Memory (통합 메모리)</text>
  <text x="450" y="362" text-anchor="middle" fill="#ffe0e8" font-size="13">CPU + GPU + Neural Engine 공유 | 최대 192GB | PCIe 병목 없음</text>

  <!-- Arrows from chip to memory -->
  <line x1="365" y1="275" x2="365" y2="310" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="535" y1="275" x2="535" y2="310" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- LLM Models -->
  <rect x="100" y="410" width="200" height="80" rx="12" fill="#1a1a2e" stroke="#4facfe" stroke-width="1.5"/>
  <text x="200" y="440" text-anchor="middle" fill="#80c0ff" font-size="14" font-weight="bold">Ollama (llama.cpp)</text>
  <text x="200" y="462" text-anchor="middle" fill="#6090cc" font-size="11">GGUF 포맷</text>
  <text x="200" y="480" text-anchor="middle" fill="#6090cc" font-size="11">Metal 백엔드 자동 활용</text>

  <rect x="350" y="410" width="200" height="80" rx="12" fill="#1a1a2e" stroke="#764ba2" stroke-width="1.5"/>
  <text x="450" y="440" text-anchor="middle" fill="#c9a8ff" font-size="14" font-weight="bold">MLX Framework</text>
  <text x="450" y="462" text-anchor="middle" fill="#9a7acc" font-size="11">SafeTensors 포맷</text>
  <text x="450" y="480" text-anchor="middle" fill="#9a7acc" font-size="11">Metal GPU 직접 제어</text>

  <rect x="600" y="410" width="200" height="80" rx="12" fill="#1a1a2e" stroke="#f5576c" stroke-width="1.5"/>
  <text x="700" y="440" text-anchor="middle" fill="#ff8090" font-size="14" font-weight="bold">LLM 모델</text>
  <text x="700" y="462" text-anchor="middle" fill="#cc6070" font-size="11">Llama 3.1 / Mistral</text>
  <text x="700" y="480" text-anchor="middle" fill="#cc6070" font-size="11">Qwen / CodeLlama</text>

  <!-- Arrows from memory to models -->
  <line x1="200" y1="380" x2="200" y2="410" stroke="#4facfe" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="450" y1="380" x2="450" y2="410" stroke="#764ba2" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="700" y1="380" x2="700" y2="410" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,3"/>
</svg>