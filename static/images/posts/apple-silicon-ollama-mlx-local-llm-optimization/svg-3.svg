<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4facfe"/>
    </marker>
  </defs>
  <rect width="900" height="450" fill="url(#bg3)" rx="16"/>
  <text x="450" y="38" text-anchor="middle" fill="#e0e0ff" font-size="20" font-weight="bold">Ollama 아키텍처 &amp; 실행 워크플로우</text>

  <!-- Step 1: CLI -->
  <rect x="40" y="70" width="160" height="90" rx="14" fill="#1a1a2e" stroke="#4facfe" stroke-width="2"/>
  <text x="120" y="100" text-anchor="middle" fill="#4facfe" font-size="28">$_</text>
  <text x="120" y="125" text-anchor="middle" fill="#80c0ff" font-size="13" font-weight="bold">CLI 명령어</text>
  <text x="120" y="145" text-anchor="middle" fill="#6090cc" font-size="10">ollama run llama3.1:8b</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="115" x2="245" y2="115" stroke="#4facfe" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Ollama Server -->
  <rect x="250" y="70" width="160" height="90" rx="14" fill="#1a1a2e" stroke="#667eea" stroke-width="2"/>
  <text x="330" y="98" text-anchor="middle" fill="#667eea" font-size="22">&#9881;</text>
  <text x="330" y="120" text-anchor="middle" fill="#a8b4ff" font-size="13" font-weight="bold">Ollama 서버</text>
  <text x="330" y="140" text-anchor="middle" fill="#7a88cc" font-size="10">모델 관리 &amp; API 제공</text>
  <text x="330" y="155" text-anchor="middle" fill="#7a88cc" font-size="10">localhost:11434</text>

  <!-- Arrow 2 -->
  <line x1="410" y1="115" x2="455" y2="115" stroke="#4facfe" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: llama.cpp -->
  <rect x="460" y="70" width="160" height="90" rx="14" fill="#1a1a2e" stroke="#764ba2" stroke-width="2"/>
  <text x="540" y="98" text-anchor="middle" fill="#764ba2" font-size="22">&#9889;</text>
  <text x="540" y="120" text-anchor="middle" fill="#c9a8ff" font-size="13" font-weight="bold">llama.cpp 엔진</text>
  <text x="540" y="140" text-anchor="middle" fill="#9a7acc" font-size="10">GGUF 모델 로드</text>
  <text x="540" y="155" text-anchor="middle" fill="#9a7acc" font-size="10">양자화 추론 실행</text>

  <!-- Arrow 3 -->
  <line x1="620" y1="115" x2="665" y2="115" stroke="#4facfe" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Metal GPU -->
  <rect x="670" y="70" width="190" height="90" rx="14" fill="#1a1a2e" stroke="#f093fb" stroke-width="2"/>
  <text x="765" y="98" text-anchor="middle" fill="#f093fb" font-size="22">&#9670;</text>
  <text x="765" y="120" text-anchor="middle" fill="#f0a0ff" font-size="13" font-weight="bold">Metal GPU 백엔드</text>
  <text x="765" y="140" text-anchor="middle" fill="#c080d0" font-size="10">Apple Silicon GPU 활용</text>
  <text x="765" y="155" text-anchor="middle" fill="#c080d0" font-size="10">행렬 연산 가속</text>

  <!-- Model Registry Section -->
  <rect x="40" y="200" width="380" height="220" rx="14" fill="#1a1a2e" stroke="#4facfe" stroke-width="1.5"/>
  <text x="230" y="228" text-anchor="middle" fill="#80c0ff" font-size="15" font-weight="bold">모델 레지스트리 (~/.ollama/models)</text>

  <rect x="60" y="245" width="160" height="50" rx="8" fill="#0f0c29" stroke="#667eea" stroke-width="1"/>
  <text x="140" y="268" text-anchor="middle" fill="#a8b4ff" font-size="12" font-weight="bold">llama3.1:8b</text>
  <text x="140" y="285" text-anchor="middle" fill="#7a88cc" font-size="10">4.7GB Q4_K_M</text>

  <rect x="240" y="245" width="160" height="50" rx="8" fill="#0f0c29" stroke="#667eea" stroke-width="1"/>
  <text x="320" y="268" text-anchor="middle" fill="#a8b4ff" font-size="12" font-weight="bold">mistral:7b</text>
  <text x="320" y="285" text-anchor="middle" fill="#7a88cc" font-size="10">4.1GB Q4_K_M</text>

  <rect x="60" y="310" width="160" height="50" rx="8" fill="#0f0c29" stroke="#764ba2" stroke-width="1"/>
  <text x="140" y="333" text-anchor="middle" fill="#c9a8ff" font-size="12" font-weight="bold">codellama:34b</text>
  <text x="140" y="350" text-anchor="middle" fill="#9a7acc" font-size="10">19GB Q4_K_M</text>

  <rect x="240" y="310" width="160" height="50" rx="8" fill="#0f0c29" stroke="#764ba2" stroke-width="1"/>
  <text x="320" y="333" text-anchor="middle" fill="#c9a8ff" font-size="12" font-weight="bold">llama3.1:70b</text>
  <text x="320" y="350" text-anchor="middle" fill="#9a7acc" font-size="10">40GB Q4_K_M</text>

  <rect x="60" y="375" width="340" height="30" rx="6" fill="#0f0c29" stroke="#f5576c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="230" y="395" text-anchor="middle" fill="#ff8090" font-size="11">ollama pull &lt;모델명&gt; 으로 추가 다운로드</text>

  <!-- API Section -->
  <rect x="460" y="200" width="400" height="220" rx="14" fill="#1a1a2e" stroke="#764ba2" stroke-width="1.5"/>
  <text x="660" y="228" text-anchor="middle" fill="#c9a8ff" font-size="15" font-weight="bold">OpenAI 호환 API 엔드포인트</text>

  <rect x="480" y="248" width="360" height="38" rx="8" fill="#0f0c29" stroke="#4facfe" stroke-width="1"/>
  <text x="500" y="272" fill="#80c0ff" font-size="12" font-weight="bold">POST</text>
  <text x="550" y="272" fill="#c0c8e0" font-size="12">/api/generate — 텍스트 생성</text>

  <rect x="480" y="296" width="360" height="38" rx="8" fill="#0f0c29" stroke="#4facfe" stroke-width="1"/>
  <text x="500" y="320" fill="#80c0ff" font-size="12" font-weight="bold">POST</text>
  <text x="550" y="320" fill="#c0c8e0" font-size="12">/api/chat — 대화형 채팅</text>

  <rect x="480" y="344" width="360" height="38" rx="8" fill="#0f0c29" stroke="#667eea" stroke-width="1"/>
  <text x="500" y="368" fill="#a8b4ff" font-size="12" font-weight="bold">POST</text>
  <text x="550" y="368" fill="#c0c8e0" font-size="12">/api/embeddings — 임베딩 생성</text>

  <rect x="480" y="392" width="360" height="18" rx="4" fill="none"/>
  <text x="660" y="406" text-anchor="middle" fill="#6090cc" font-size="10">스트리밍 응답 지원 | JSON 형식</text>
</svg>