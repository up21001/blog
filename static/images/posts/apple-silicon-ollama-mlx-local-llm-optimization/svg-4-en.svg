  <line x1="450" y1="250" x2="450" y2="280" stroke="#c9a8ff" stroke-width="2" marker-end="url(#arr4)"/>

  <rect x="50" y="285" width="380" height="140" rx="14" fill="#1a1a2e" stroke="#f093fb" stroke-width="2"/>
