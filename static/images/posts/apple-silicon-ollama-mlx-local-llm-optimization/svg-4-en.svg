      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="mlxgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c9a8ff"/>
    </marker>
  </defs>
  <rect width="900" height="450" fill="url(#bg4)" rx="16"/>
  <text x="450" y="38" text-anchor="middle" fill="#e0e0ff" font-size="20" font-weight="bold">MLX Framework Architecture — Direct Metal GPU Control</text>

  <rect x="50" y="65" width="800" height="80" rx="14" fill="#1a1a2e" stroke="#667eea" stroke-width="1.5"/>
