  <text x="370" y="118" text-anchor="middle" fill="#7a88cc" font-size="12">mlx.nn (Neural Net)</text>
  <text x="550" y="118" text-anchor="middle" fill="#7a88cc" font-size="12">mlx.optimizers</text>
  <text x="730" y="118" text-anchor="middle" fill="#7a88cc" font-size="12">mlx_lm (LLM Tools)</text>

  <line x1="450" y1="145" x2="450" y2="175" stroke="#c9a8ff" stroke-width="2" marker-end="url(#arr4)"/>
