  <text x="100" y="391" text-anchor="middle" fill="#c9a8ff" font-size="13" font-weight="bold">M4 Max</text>
  <text x="220" y="391" text-anchor="middle" fill="#e0d8f0" font-size="12">40코어</text>
  <text x="335" y="391" text-anchor="middle" fill="#e0d8f0" font-size="12">128GB</text>
  <text x="455" y="391" text-anchor="middle" fill="#e0d8f0" font-size="12">546GB/s</text>
  <text x="575" y="391" text-anchor="middle" fill="#e0d8f0" font-size="12">70B Q8</text>
