<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="mlxgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c9a8ff"/>
    </marker>
  </defs>
  <rect width="900" height="450" fill="url(#bg4)" rx="16"/>
  <text x="450" y="38" text-anchor="middle" fill="#e0e0ff" font-size="20" font-weight="bold">MLX 프레임워크 아키텍처 — Metal GPU 직접 제어</text>

  <!-- Python Layer -->
  <rect x="50" y="65" width="800" height="80" rx="14" fill="#1a1a2e" stroke="#667eea" stroke-width="1.5"/>
  <text x="450" y="92" text-anchor="middle" fill="#a8b4ff" font-size="16" font-weight="bold">Python API 레이어</text>
  <text x="170" y="118" text-anchor="middle" fill="#7a88cc" font-size="12">mlx.core (배열 연산)</text>
  <text x="370" y="118" text-anchor="middle" fill="#7a88cc" font-size="12">mlx.nn (신경망)</text>
  <text x="550" y="118" text-anchor="middle" fill="#7a88cc" font-size="12">mlx.optimizers</text>
  <text x="730" y="118" text-anchor="middle" fill="#7a88cc" font-size="12">mlx_lm (LLM 도구)</text>

  <!-- Arrow down -->
  <line x1="450" y1="145" x2="450" y2="175" stroke="#c9a8ff" stroke-width="2" marker-end="url(#arr4)"/>
  <text x="520" y="165" fill="#9a7acc" font-size="11">Lazy Evaluation</text>

  <!-- Computation Graph -->
  <rect x="150" y="180" width="600" height="70" rx="14" fill="url(#mlxgrad)" opacity="0.3" stroke="#764ba2" stroke-width="1.5"/>
  <text x="450" y="208" text-anchor="middle" fill="#f0c0ff" font-size="15" font-weight="bold">연산 그래프 최적화 (Computation Graph)</text>
  <text x="450" y="232" text-anchor="middle" fill="#c9a8ff" font-size="12">지연 평가 → 그래프 융합 → Metal 셰이더 컴파일 → 배치 실행</text>

  <!-- Arrow down -->
  <line x1="450" y1="250" x2="450" y2="280" stroke="#c9a8ff" stroke-width="2" marker-end="url(#arr4)"/>

  <!-- Metal GPU Layer -->
  <rect x="50" y="285" width="380" height="140" rx="14" fill="#1a1a2e" stroke="#f093fb" stroke-width="2"/>
  <text x="240" y="312" text-anchor="middle" fill="#f0a0ff" font-size="15" font-weight="bold">Metal GPU 실행 엔진</text>

  <rect x="70" y="325" width="160" height="40" rx="8" fill="#0f0c29" stroke="#f093fb" stroke-width="1"/>
  <text x="150" y="350" text-anchor="middle" fill="#f0a0ff" font-size="11">Metal 셰이더 커널</text>

  <rect x="250" y="325" width="160" height="40" rx="8" fill="#0f0c29" stroke="#f093fb" stroke-width="1"/>
  <text x="330" y="350" text-anchor="middle" fill="#f0a0ff" font-size="11">커스텀 GEMM 연산</text>

  <rect x="70" y="375" width="340" height="35" rx="8" fill="#0f0c29" stroke="#764ba2" stroke-width="1"/>
  <text x="240" y="397" text-anchor="middle" fill="#c9a8ff" font-size="11">자동 메모리 관리 (Unified Memory 직접 접근)</text>

  <!-- Fine-tuning Layer -->
  <rect x="470" y="285" width="380" height="140" rx="14" fill="#1a1a2e" stroke="#4facfe" stroke-width="2"/>
  <text x="660" y="312" text-anchor="middle" fill="#80c0ff" font-size="15" font-weight="bold">파인튜닝 엔진</text>

  <rect x="490" y="325" width="155" height="40" rx="8" fill="#0f0c29" stroke="#4facfe" stroke-width="1"/>
  <text x="567" y="345" text-anchor="middle" fill="#80c0ff" font-size="12" font-weight="bold">LoRA</text>
  <text x="567" y="360" text-anchor="middle" fill="#6090cc" font-size="10">저랭크 어댑터</text>

  <rect x="665" y="325" width="155" height="40" rx="8" fill="#0f0c29" stroke="#4facfe" stroke-width="1"/>
  <text x="742" y="345" text-anchor="middle" fill="#80c0ff" font-size="12" font-weight="bold">QLoRA</text>
  <text x="742" y="360" text-anchor="middle" fill="#6090cc" font-size="10">양자화 + LoRA</text>

  <rect x="490" y="375" width="330" height="35" rx="8" fill="#0f0c29" stroke="#667eea" stroke-width="1"/>
  <text x="655" y="397" text-anchor="middle" fill="#a8b4ff" font-size="11">M4 Pro 48GB에서 8B 모델 LoRA 약 30분 완료</text>
</svg>