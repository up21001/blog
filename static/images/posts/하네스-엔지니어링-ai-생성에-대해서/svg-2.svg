<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#F8F9FA" rx="12"/>
  <text x="400" y="38" font-family="'Malgun Gothic', sans-serif" font-size="18" font-weight="bold" fill="#2D3436" text-anchor="middle">수동 설계 vs AI 생성 설계 비교</text>

  <!-- Divider -->
  <line x1="400" y1="55" x2="400" y2="410" stroke="#E0E0E0" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- LEFT: 수동 설계 -->
  <rect x="40" y="60" width="340" height="50" rx="8" fill="#FF6B6B" filter="url(#shadow2)"/>
  <text x="210" y="82" font-family="'Malgun Gothic', sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">기존 수동 설계</text>
  <text x="210" y="99" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#FFE8E8" text-anchor="middle">Rule-based / Manual Engineering</text>

  <!-- Manual items -->
  <rect x="50" y="125" width="320" height="50" rx="8" fill="white" filter="url(#shadow2)"/>
  <text x="65" y="147" font-family="'Malgun Gothic', sans-serif" font-size="20" fill="#FF6B6B">✏</text>
  <text x="95" y="147" font-family="'Malgun Gothic', sans-serif" font-size="12" font-weight="bold" fill="#2D3436">설계 방식</text>
  <text x="95" y="163" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#555">2D 회로도 기반 3D 수동 스플라인 작업</text>

  <rect x="50" y="185" width="320" height="50" rx="8" fill="white" filter="url(#shadow2)"/>
  <text x="65" y="207" font-family="'Malgun Gothic', sans-serif" font-size="20" fill="#FF6B6B">⏱</text>
  <text x="95" y="207" font-family="'Malgun Gothic', sans-serif" font-size="12" font-weight="bold" fill="#2D3436">소요 시간</text>
  <text x="95" y="223" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#555">수개월 ~ 수년 (프로젝트 규모별)</text>

  <rect x="50" y="245" width="320" height="50" rx="8" fill="white" filter="url(#shadow2)"/>
  <text x="65" y="267" font-family="'Malgun Gothic', sans-serif" font-size="20" fill="#FF6B6B">🔍</text>
  <text x="95" y="267" font-family="'Malgun Gothic', sans-serif" font-size="12" font-weight="bold" fill="#2D3436">경로 탐색</text>
  <text x="95" y="283" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#555">Dijkstra · A* 단순 최단 거리</text>

  <rect x="50" y="305" width="320" height="50" rx="8" fill="white" filter="url(#shadow2)"/>
  <text x="65" y="327" font-family="'Malgun Gothic', sans-serif" font-size="20" fill="#FF6B6B">⚠</text>
  <text x="95" y="327" font-family="'Malgun Gothic', sans-serif" font-size="12" font-weight="bold" fill="#2D3436">최적화 수준</text>
  <text x="95" y="343" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#555">개인 경험 의존 · EMI 예측 어려움</text>

  <rect x="50" y="365" width="320" height="40" rx="8" fill="#FFECEC"/>
  <text x="210" y="390" font-family="'Malgun Gothic', sans-serif" font-size="12" fill="#C0392B" text-anchor="middle" font-weight="bold">변경 대응: 전체 수동 재설계 필요</text>

  <!-- RIGHT: AI 생성 설계 -->
  <rect x="420" y="60" width="340" height="50" rx="8" fill="#4A90D9" filter="url(#shadow2)"/>
  <text x="590" y="82" font-family="'Malgun Gothic', sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">AI 생성 설계</text>
  <text x="590" y="99" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#DDEEFF" text-anchor="middle">Generative AI Engineering</text>

  <!-- AI items -->
  <rect x="430" y="125" width="320" height="50" rx="8" fill="white" filter="url(#shadow2)"/>
  <text x="445" y="147" font-family="'Malgun Gothic', sans-serif" font-size="20" fill="#4A90D9">🤖</text>
  <text x="475" y="147" font-family="'Malgun Gothic', sans-serif" font-size="12" font-weight="bold" fill="#2D3436">설계 방식</text>
  <text x="475" y="163" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#555">시스템 요구사항 입력 → AI 자동 생성</text>

  <rect x="430" y="185" width="320" height="50" rx="8" fill="white" filter="url(#shadow2)"/>
  <text x="445" y="207" font-family="'Malgun Gothic', sans-serif" font-size="20" fill="#50C878">⚡</text>
  <text x="475" y="207" font-family="'Malgun Gothic', sans-serif" font-size="12" font-weight="bold" fill="#2D3436">소요 시간</text>
  <text x="475" y="223" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#555">수시간 ~ 수일 (90% 이상 단축)</text>

  <rect x="430" y="245" width="320" height="50" rx="8" fill="white" filter="url(#shadow2)"/>
  <text x="445" y="267" font-family="'Malgun Gothic', sans-serif" font-size="20" fill="#6C5CE7">🧠</text>
  <text x="475" y="267" font-family="'Malgun Gothic', sans-serif" font-size="12" font-weight="bold" fill="#2D3436">경로 탐색</text>
  <text x="475" y="283" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#555">DRL 기반 복합 제약 조건 동시 처리</text>

  <rect x="430" y="305" width="320" height="50" rx="8" fill="white" filter="url(#shadow2)"/>
  <text x="445" y="327" font-family="'Malgun Gothic', sans-serif" font-size="20" fill="#50C878">✓</text>
  <text x="475" y="327" font-family="'Malgun Gothic', sans-serif" font-size="12" font-weight="bold" fill="#2D3436">최적화 수준</text>
  <text x="475" y="343" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#555">열·EMI·진동 동시 고려 · 경량화 최적</text>

  <rect x="430" y="365" width="320" height="40" rx="8" fill="#E8F5E9"/>
  <text x="590" y="390" font-family="'Malgun Gothic', sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">변경 대응: 실시간 자동 재라우팅</text>
</svg>
