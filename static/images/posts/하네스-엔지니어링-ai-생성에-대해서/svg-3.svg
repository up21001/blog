<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#F8F9FA" rx="12"/>
  <text x="400" y="38" font-family="'Malgun Gothic', sans-serif" font-size="18" font-weight="bold" fill="#2D3436" text-anchor="middle">AI 도입 핵심 이점 3가지</text>

  <!-- Card 1: 무게/비용 절감 -->
  <rect x="40" y="60" width="220" height="300" rx="14" fill="#4A90D9" filter="url(#shadow3)"/>
  <!-- Icon area -->
  <circle cx="150" cy="130" r="45" fill="white" fill-opacity="0.2"/>
  <text x="150" y="145" font-family="'Malgun Gothic', sans-serif" font-size="40" text-anchor="middle" fill="white">⚖</text>
  <!-- Title -->
  <text x="150" y="200" font-family="'Malgun Gothic', sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">무게 및 비용 절감</text>
  <text x="150" y="218" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#DDEEFF" text-anchor="middle">한계 돌파</text>
  <!-- Divider -->
  <line x1="65" y1="232" x2="235" y2="232" stroke="white" stroke-opacity="0.4" stroke-width="1"/>
  <!-- Body text -->
  <text x="150" y="255" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#E8F4FF" text-anchor="middle">수백만 경로 조합 탐색</text>
  <text x="150" y="272" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#E8F4FF" text-anchor="middle">최단 · 최적 경로 선택</text>
  <text x="150" y="295" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#FFD93D" text-anchor="middle" font-weight="bold">구리선 사용량 감소</text>
  <text x="150" y="312" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#FFD93D" text-anchor="middle" font-weight="bold">→ 원가 절감 + 경량화</text>
  <!-- Badge -->
  <rect x="75" y="330" width="150" height="24" rx="12" fill="white" fill-opacity="0.25"/>
  <text x="150" y="347" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">EV 주행거리 향상</text>

  <!-- Card 2: 복잡성 관리 -->
  <rect x="290" y="60" width="220" height="300" rx="14" fill="#50C878" filter="url(#shadow3)"/>
  <circle cx="400" cy="130" r="45" fill="white" fill-opacity="0.2"/>
  <text x="400" y="145" font-family="'Malgun Gothic', sans-serif" font-size="40" text-anchor="middle" fill="white">🔗</text>
  <text x="400" y="200" font-family="'Malgun Gothic', sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">복잡성 관리</text>
  <text x="400" y="218" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#E8FFF0" text-anchor="middle">자동화</text>
  <line x1="315" y1="232" x2="485" y2="232" stroke="white" stroke-opacity="0.4" stroke-width="1"/>
  <text x="400" y="255" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#E8FFF0" text-anchor="middle">EMI 간섭 자동 회피</text>
  <text x="400" y="272" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#E8FFF0" text-anchor="middle">열·진동 다중 제약 처리</text>
  <text x="400" y="295" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#FFD93D" text-anchor="middle" font-weight="bold">전력선 · 통신선 분리</text>
  <text x="400" y="312" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#FFD93D" text-anchor="middle" font-weight="bold">→ 신호 품질 보장</text>
  <rect x="325" y="330" width="150" height="24" rx="12" fill="white" fill-opacity="0.25"/>
  <text x="400" y="347" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">자율주행 대응 가능</text>

  <!-- Card 3: SW 패러다임 전환 -->
  <rect x="540" y="60" width="220" height="300" rx="14" fill="#6C5CE7" filter="url(#shadow3)"/>
  <circle cx="650" cy="130" r="45" fill="white" fill-opacity="0.2"/>
  <text x="650" y="145" font-family="'Malgun Gothic', sans-serif" font-size="40" text-anchor="middle" fill="white">🔄</text>
  <text x="650" y="200" font-family="'Malgun Gothic', sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">SW 패러다임</text>
  <text x="650" y="218" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#E8E4FF" text-anchor="middle">전환</text>
  <line x1="565" y1="232" x2="735" y2="232" stroke="white" stroke-opacity="0.4" stroke-width="1"/>
  <text x="650" y="255" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#E8E4FF" text-anchor="middle">룰 기반 → 생성 모델</text>
  <text x="650" y="272" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#E8E4FF" text-anchor="middle">결정론적 → 확률적</text>
  <text x="650" y="295" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#FFD93D" text-anchor="middle" font-weight="bold">설계 노하우 → 모델</text>
  <text x="650" y="312" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="#FFD93D" text-anchor="middle" font-weight="bold">가중치로 자산화</text>
  <rect x="575" y="330" width="150" height="24" rx="12" fill="white" fill-opacity="0.25"/>
  <text x="650" y="347" font-family="'Malgun Gothic', sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">기업 경쟁력 강화</text>
</svg>
