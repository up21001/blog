<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#F8F9FA" rx="12"/>
  <text x="400" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2D3436" text-anchor="middle">Manual Design vs. AI-Generated Design</text>

  <!-- Divider -->
  <line x1="400" y1="55" x2="400" y2="410" stroke="#E0E0E0" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- LEFT: Manual Design -->
  <rect x="40" y="60" width="340" height="50" rx="8" fill="#FF6B6B" filter="url(#shadow2)"/>
  <text x="210" y="82" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">Traditional Manual Design</text>
  <text x="210" y="99" font-family="Arial, sans-serif" font-size="11" fill="#FFE8E8" text-anchor="middle">Rule-based / Manual Engineering</text>

  <!-- Manual items -->
  <rect x="50" y="125" width="320" height="50" rx="8" fill="white" filter="url(#shadow2)"/>
  <text x="65" y="147" font-family="Arial, sans-serif" font-size="20" fill="#FF6B6B">✏</text>
  <text x="95" y="147" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3436">Design Method</text>
  <text x="95" y="163" font-family="Arial, sans-serif" font-size="11" fill="#555">Manual 3D spline routing from 2D schematics</text>

  <rect x="50" y="185" width="320" height="50" rx="8" fill="white" filter="url(#shadow2)"/>
  <text x="65" y="207" font-family="Arial, sans-serif" font-size="20" fill="#FF6B6B">⏱</text>
  <text x="95" y="207" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3436">Time Required</text>
  <text x="95" y="223" font-family="Arial, sans-serif" font-size="11" fill="#555">Months to years (depending on project scale)</text>

  <rect x="50" y="245" width="320" height="50" rx="8" fill="white" filter="url(#shadow2)"/>
  <text x="65" y="267" font-family="Arial, sans-serif" font-size="20" fill="#FF6B6B">🔍</text>
  <text x="95" y="267" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3436">Path Search</text>
  <text x="95" y="283" font-family="Arial, sans-serif" font-size="11" fill="#555">Dijkstra · A* simple shortest path</text>

  <rect x="50" y="305" width="320" height="50" rx="8" fill="white" filter="url(#shadow2)"/>
  <text x="65" y="327" font-family="Arial, sans-serif" font-size="20" fill="#FF6B6B">⚠</text>
  <text x="95" y="327" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3436">Optimization Level</text>
  <text x="95" y="343" font-family="Arial, sans-serif" font-size="11" fill="#555">Relies on individual expertise · EMI hard to predict</text>

  <rect x="50" y="365" width="320" height="40" rx="8" fill="#FFECEC"/>
  <text x="210" y="390" font-family="Arial, sans-serif" font-size="12" fill="#C0392B" text-anchor="middle" font-weight="bold">Change Response: Full manual redesign required</text>

  <!-- RIGHT: AI-Generated Design -->
  <rect x="420" y="60" width="340" height="50" rx="8" fill="#4A90D9" filter="url(#shadow2)"/>
  <text x="590" y="82" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">AI-Generated Design</text>
  <text x="590" y="99" font-family="Arial, sans-serif" font-size="11" fill="#DDEEFF" text-anchor="middle">Generative AI Engineering</text>

  <!-- AI items -->
  <rect x="430" y="125" width="320" height="50" rx="8" fill="white" filter="url(#shadow2)"/>
  <text x="445" y="147" font-family="Arial, sans-serif" font-size="20" fill="#4A90D9">🤖</text>
  <text x="475" y="147" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3436">Design Method</text>
  <text x="475" y="163" font-family="Arial, sans-serif" font-size="11" fill="#555">Input system requirements → AI auto-generates</text>

  <rect x="430" y="185" width="320" height="50" rx="8" fill="white" filter="url(#shadow2)"/>
  <text x="445" y="207" font-family="Arial, sans-serif" font-size="20" fill="#50C878">⚡</text>
  <text x="475" y="207" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3436">Time Required</text>
  <text x="475" y="223" font-family="Arial, sans-serif" font-size="11" fill="#555">Hours to days (90%+ reduction)</text>

  <rect x="430" y="245" width="320" height="50" rx="8" fill="white" filter="url(#shadow2)"/>
  <text x="445" y="267" font-family="Arial, sans-serif" font-size="20" fill="#6C5CE7">🧠</text>
  <text x="475" y="267" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3436">Path Search</text>
  <text x="475" y="283" font-family="Arial, sans-serif" font-size="11" fill="#555">DRL handling multiple constraints simultaneously</text>

  <rect x="430" y="305" width="320" height="50" rx="8" fill="white" filter="url(#shadow2)"/>
  <text x="445" y="327" font-family="Arial, sans-serif" font-size="20" fill="#50C878">✓</text>
  <text x="475" y="327" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3436">Optimization Level</text>
  <text x="475" y="343" font-family="Arial, sans-serif" font-size="11" fill="#555">Thermal · EMI · vibration · weight all optimized</text>

  <rect x="430" y="365" width="320" height="40" rx="8" fill="#E8F5E9"/>
  <text x="590" y="390" font-family="Arial, sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Change Response: Real-time auto-rerouting</text>
</svg>
