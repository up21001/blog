<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="shadow5" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#F8F9FA" rx="12"/>
  <text x="400" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2D3436" text-anchor="middle">3 Key Developer Challenges</text>

  <!-- Card 1: CAD API Integration -->
  <rect x="40" y="58" width="220" height="310" rx="14" fill="white" filter="url(#shadow5)"/>
  <!-- Top accent bar -->
  <rect x="40" y="58" width="220" height="8" rx="7" fill="#4A90D9"/>
  <!-- Number badge -->
  <circle cx="150" cy="100" r="30" fill="#EBF4FF"/>
  <text x="150" y="107" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#4A90D9" text-anchor="middle">01</text>
  <!-- Title -->
  <text x="150" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D3436" text-anchor="middle">CAD API Integration</text>
  <text x="150" y="167" font-family="Arial, sans-serif" font-size="11" fill="#4A90D9" text-anchor="middle">Plugin Development</text>
  <!-- Divider -->
  <line x1="60" y1="180" x2="240" y2="180" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Content -->
  <text x="58" y="200" font-family="Arial, sans-serif" font-size="11" fill="#555">• CATIA · NX · AutoCAD</text>
  <text x="58" y="218" font-family="Arial, sans-serif" font-size="11" fill="#555">  Electrical API integration</text>
  <text x="58" y="238" font-family="Arial, sans-serif" font-size="11" fill="#555">• C++ · C# · Python</text>
  <text x="58" y="256" font-family="Arial, sans-serif" font-size="11" fill="#555">  plugin architecture</text>
  <text x="58" y="276" font-family="Arial, sans-serif" font-size="11" fill="#555">• AI backend ↔ CAD</text>
  <text x="58" y="294" font-family="Arial, sans-serif" font-size="11" fill="#555">  frontend bridge</text>
  <!-- Challenge badge -->
  <rect x="55" y="315" width="190" height="40" rx="8" fill="#EBF4FF"/>
  <text x="150" y="331" font-family="Arial, sans-serif" font-size="10" fill="#4A90D9" text-anchor="middle" font-weight="bold">Key Challenge</text>
  <text x="150" y="347" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">Fragmented vendor-specific APIs</text>

  <!-- Card 2: Geometric Constraint Modeling -->
  <rect x="290" y="58" width="220" height="310" rx="14" fill="white" filter="url(#shadow5)"/>
  <rect x="290" y="58" width="220" height="8" rx="7" fill="#FF6B6B"/>
  <circle cx="400" cy="100" r="30" fill="#FFF0F0"/>
  <text x="400" y="107" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FF6B6B" text-anchor="middle">02</text>
  <text x="400" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D3436" text-anchor="middle">Geometric Constraint</text>
  <text x="400" y="167" font-family="Arial, sans-serif" font-size="11" fill="#FF6B6B" text-anchor="middle">Numerical Modeling</text>
  <line x1="310" y1="180" x2="490" y2="180" stroke="#E0E0E0" stroke-width="1"/>
  <text x="308" y="200" font-family="Arial, sans-serif" font-size="11" fill="#555">• 3D Voxel environment</text>
  <text x="308" y="218" font-family="Arial, sans-serif" font-size="11" fill="#555">  setup and collision detection</text>
  <text x="308" y="238" font-family="Arial, sans-serif" font-size="11" fill="#555">• Bend radius · tension as</text>
  <text x="308" y="256" font-family="Arial, sans-serif" font-size="11" fill="#555">  reward function terms</text>
  <text x="308" y="276" font-family="Arial, sans-serif" font-size="11" fill="#555">• EMI clearance encoded</text>
  <text x="308" y="294" font-family="Arial, sans-serif" font-size="11" fill="#555">  as penalties</text>
  <rect x="305" y="315" width="190" height="40" rx="8" fill="#FFF0F0"/>
  <text x="400" y="331" font-family="Arial, sans-serif" font-size="10" fill="#FF6B6B" text-anchor="middle" font-weight="bold">Key Challenge</text>
  <text x="400" y="347" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">Physics equations → AI loss functions</text>

  <!-- Card 3: Legacy Data / AI Model -->
  <rect x="540" y="58" width="220" height="310" rx="14" fill="white" filter="url(#shadow5)"/>
  <rect x="540" y="58" width="220" height="8" rx="7" fill="#50C878"/>
  <circle cx="650" cy="100" r="30" fill="#EDFFF4"/>
  <text x="650" y="107" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#50C878" text-anchor="middle">03</text>
  <text x="650" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D3436" text-anchor="middle">Legacy Data</text>
  <text x="650" y="167" font-family="Arial, sans-serif" font-size="11" fill="#50C878" text-anchor="middle">AI Model Building</text>
  <line x1="560" y1="180" x2="740" y2="180" stroke="#E0E0E0" stroke-width="1"/>
  <text x="558" y="200" font-family="Arial, sans-serif" font-size="11" fill="#555">• XML · PLMXML · STEP</text>
  <text x="558" y="218" font-family="Arial, sans-serif" font-size="11" fill="#555">  IGES parsing pipeline</text>
  <text x="558" y="238" font-family="Arial, sans-serif" font-size="11" fill="#555">• Heterogeneous data</text>
  <text x="558" y="256" font-family="Arial, sans-serif" font-size="11" fill="#555">  normalization &amp; denoising</text>
  <text x="558" y="276" font-family="Arial, sans-serif" font-size="11" fill="#555">• Domain-specific GNN/DRL</text>
  <text x="558" y="294" font-family="Arial, sans-serif" font-size="11" fill="#555">  training dataset construction</text>
  <rect x="555" y="315" width="190" height="40" rx="8" fill="#EDFFF4"/>
  <text x="650" y="331" font-family="Arial, sans-serif" font-size="10" fill="#50C878" text-anchor="middle" font-weight="bold">Key Challenge</text>
  <text x="650" y="347" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">Cleaning error-prone legacy data</text>
</svg>
