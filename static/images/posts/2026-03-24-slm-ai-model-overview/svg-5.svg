<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
    </filter>

    <!-- Arrow Marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="40" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">SLM AI 모델 아키텍처</text>

  <!-- Components -->

  <!-- 사용자/애플리케이션 (User/Application) -->
  <rect x="50" y="200" width="150" height="70" rx="10" ry="10" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="125" y="240" font-size="14" fill="#fff" text-anchor="middle">사용자/애플리케이션</text>

  <!-- API 게이트웨이 (API Gateway) -->
  <rect x="250" y="200" width="150" height="70" rx="10" ry="10" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="325" y="240" font-size="14" fill="#fff" text-anchor="middle">API 게이트웨이</text>

  <!-- 추론 서비스 (Inference Service) - Container -->
  <rect x="450" y="100" width="250" height="250" rx="15" ry="15" fill="#e0f2f7" stroke="#4A90D9" stroke-width="2" filter="url(#shadow)"/>
  <text x="575" y="125" font-size="16" font-weight="bold" fill="#4A90D9" text-anchor="middle">추론 서비스</text>

  <!-- 추론 엔진 (Inference Engine) - Inside Inference Service -->
  <rect x="470" y="150" width="210" height="60" rx="8" ry="8" fill="#50C878" filter="url(#shadow)"/>
  <text x="575" y="185" font-size="14" fill="#fff" text-anchor="middle">추론 엔진</text>

  <!-- SLM 모델 (SLM Model) - Inside Inference Service -->
  <rect x="470" y="250" width="210" height="60" rx="8" ry="8" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="575" y="285" font-size="14" fill="#333" text-anchor="middle">SLM 모델</text>

  <!-- 지식 저장소/벡터 DB (Knowledge Store/Vector DB) -->
  <rect x="450" y="400" width="250" height="70" rx="10" ry="10" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="575" y="440" font-size="14" fill="#fff" text-anchor="middle">지식 저장소/벡터 DB</text>

  <!-- 로깅 및 모니터링 (Logging & Monitoring) -->
  <rect x="720" y="200" width="150" height="70" rx="10" ry="10" fill="#666" filter="url(#shadow)"/>
  <text x="795" y="240" font-size="14" fill="#fff" text-anchor="middle">로깅 및 모니터링</text>

  <!-- Arrows -->

  <!-- 사용자 -> API 게이트웨이 (요청) -->
  <line x1="200" y1="235" x2="250" y2="235" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="225" y="225" font-size="12" fill="#666" text-anchor="middle">요청</text>

  <!-- API 게이트웨이 -> 추론 엔진 (요청) -->
  <line x1="400" y1="235" x2="470" y2="180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="435" y="215" font-size="12" fill="#666" text-anchor="middle">요청</text>

  <!-- 추론 엔진 -> SLM 모델 (처리) -->
  <line x1="575" y1="210" x2="575" y2="250" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="585" y="235" font-size="12" fill="#666">처리</text>

  <!-- SLM 모델 -> 추론 엔진 (결과) -->
  <line x1="575" y1="310" x2="575" y2="210" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="585" y="245" font-size="12" fill="#666">결과</text>

  <!-- 추론 엔진 <-> 지식 저장소/벡터 DB (컨텍스트 검색) -->
  <line x1="575" y1="210" x2="575" y2="400" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="575" y1="400" x2="575" y2="210" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="585" y="305" font-size="12" fill="#666">컨텍스트 검색</text>

  <!-- 추론 엔진 -> API 게이트웨이 (응답) -->
  <line x1="470" y1="180" x2="400" y2="235" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="435" y="215" font-size="12" fill="#666" text-anchor="middle">응답</text>

  <!-- API 게이트웨이 -> 사용자 (응답) -->
  <line x1="250" y1="235" x2="200" y2="235" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="225" y="225" font-size="12" fill="#666" text-anchor="middle">응답</text>

  <!-- 로깅 및 모니터링 연결 -->
  <line x1="400" y1="235" x2="720" y2="235" stroke="#666" stroke-width="1" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <line x1="680" y1="180" x2="720" y2="235" stroke="#666" stroke-width="1" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <line x1="680" y1="280" x2="720" y2="235" stroke="#666" stroke-width="1" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <line x1="700" y1="435" x2="720" y2="235" stroke="#666" stroke-width="1" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="660" y="200" font-size="12" fill="#666" text-anchor="middle">로그/메트릭</text>

</svg>