<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#2d3748">Cron Expression — 5 Field Structure</text>

  <!-- Field boxes -->
  <!-- Minute -->
  <rect x="48" y="58" width="128" height="80" rx="10" fill="#4A90D9" filter="url(#shadow3)"/>
  <text x="112" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Minute</text>
  <text x="112" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#d0e8ff">0 – 59</text>

  <!-- Hour -->
  <rect x="192" y="58" width="128" height="80" rx="10" fill="#50C878" filter="url(#shadow3)"/>
  <text x="256" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Hour</text>
  <text x="256" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#d0fde4">0 – 23</text>

  <!-- Day -->
  <rect x="336" y="58" width="128" height="80" rx="10" fill="#FFD93D" filter="url(#shadow3)"/>
  <text x="400" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2d3748">Day</text>
  <text x="400" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7a6000">1 – 31</text>

  <!-- Month -->
  <rect x="480" y="58" width="128" height="80" rx="10" fill="#FF6B6B" filter="url(#shadow3)"/>
  <text x="544" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Month</text>
  <text x="544" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffd0d0">1 – 12</text>

  <!-- Weekday -->
  <rect x="624" y="58" width="128" height="80" rx="10" fill="#6C5CE7" filter="url(#shadow3)"/>
  <text x="688" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Weekday</text>
  <text x="688" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ddd0ff">0 – 7</text>

  <!-- Separator dots -->
  <text x="182" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#aaaaaa">·</text>
  <text x="326" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#aaaaaa">·</text>
  <text x="470" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#aaaaaa">·</text>
  <text x="614" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#aaaaaa">·</text>

  <!-- Example section -->
  <rect x="80" y="168" width="640" height="60" rx="10" fill="#2d3748" filter="url(#shadow3)"/>
  <text x="400" y="193" text-anchor="middle" font-family="Arial, monospace" font-size="22" font-weight="bold" fill="#FFD93D">0   0   *   *   *</text>
  <text x="400" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#a0aec0">= Run every day at midnight (00:00)</text>

  <!-- Field labels below boxes -->
  <text x="112" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666666">minute</text>
  <text x="256" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666666">hour</text>
  <text x="400" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666666">day</text>
  <text x="544" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666666">month</text>
  <text x="688" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666666">weekday</text>

  <!-- Wildcard note -->
  <text x="400" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888888">* = Any value (wildcard)</text>
</svg>
