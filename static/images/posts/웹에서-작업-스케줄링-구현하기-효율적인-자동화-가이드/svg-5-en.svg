<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="shadow5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
    <marker id="arrow5" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#50C878"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="100" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2d3748">Idempotency</text>

  <!-- Center result circle -->
  <circle cx="100" cy="118" r="30" fill="#50C878" filter="url(#shadow5)"/>
  <text x="100" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">Same</text>
  <text x="100" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">Result</text>

  <!-- Input circles (3 arrows) -->
  <circle cx="36" cy="60" r="18" fill="#4A90D9" filter="url(#shadow5)"/>
  <text x="36" y="57" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">Run</text>
  <text x="36" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">#1</text>

  <circle cx="100" cy="42" r="18" fill="#4A90D9" filter="url(#shadow5)"/>
  <text x="100" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">Run</text>
  <text x="100" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">#2</text>

  <circle cx="164" cy="60" r="18" fill="#4A90D9" filter="url(#shadow5)"/>
  <text x="164" y="57" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">Run</text>
  <text x="164" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">#3</text>

  <!-- Arrows from inputs to result -->
  <line x1="50" y1="73" x2="80" y2="100" stroke="#50C878" stroke-width="2" marker-end="url(#arrow5)"/>
  <line x1="100" y1="61" x2="100" y2="86" stroke="#50C878" stroke-width="2" marker-end="url(#arrow5)"/>
  <line x1="150" y1="73" x2="120" y2="100" stroke="#50C878" stroke-width="2" marker-end="url(#arrow5)"/>

  <!-- Caption -->
  <text x="100" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555555">Run multiple times,</text>
  <text x="100" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555555">always the same result</text>

  <!-- Check badge -->
  <circle cx="100" cy="148" r="8" fill="#ffffff" stroke="#50C878" stroke-width="1.5"/>
  <text x="100" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#50C878">✓</text>
</svg>
