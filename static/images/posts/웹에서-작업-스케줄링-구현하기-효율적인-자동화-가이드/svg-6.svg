<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="shadow6" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
    <marker id="arrow6" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#FF6B6B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="100" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2d3748">에러 핸들링 &amp; 알림</text>

  <!-- Central warning icon -->
  <polygon points="100,40 130,90 70,90" fill="#FF6B6B" filter="url(#shadow6)"/>
  <text x="100" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">!</text>

  <!-- Log file node -->
  <rect x="18" y="118" width="52" height="36" rx="6" fill="#4A90D9" filter="url(#shadow6)"/>
  <text x="44" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">로그</text>
  <text x="44" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#d0e8ff">파일</text>

  <!-- Email node -->
  <rect x="74" y="118" width="52" height="36" rx="6" fill="#50C878" filter="url(#shadow6)"/>
  <text x="100" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">이메일</text>
  <text x="100" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#d0fde4">알림</text>

  <!-- Slack node -->
  <rect x="130" y="118" width="52" height="36" rx="6" fill="#6C5CE7" filter="url(#shadow6)"/>
  <text x="156" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">Slack</text>
  <text x="156" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ddd0ff">알림</text>

  <!-- Arrows from warning to nodes -->
  <line x1="85" y1="90" x2="55" y2="116" stroke="#FF6B6B" stroke-width="2" marker-end="url(#arrow6)"/>
  <line x1="100" y1="90" x2="100" y2="116" stroke="#FF6B6B" stroke-width="2" marker-end="url(#arrow6)"/>
  <line x1="115" y1="90" x2="145" y2="116" stroke="#FF6B6B" stroke-width="2" marker-end="url(#arrow6)"/>

  <!-- Caption -->
  <text x="100" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555555">작업 실패 시 다채널</text>
  <text x="100" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555555">알림으로 빠른 대응</text>
</svg>
