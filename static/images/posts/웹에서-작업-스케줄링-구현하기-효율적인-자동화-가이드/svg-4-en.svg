<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <defs>
    <filter id="shadow4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6C5CE7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="250" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#2d3748">Celery Pipeline Flow</text>

  <!-- Box 1: Celery Beat -->
  <rect x="40" y="80" width="155" height="90" rx="10" fill="#6C5CE7" filter="url(#shadow4)"/>
  <text x="118" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#ffffff">⏱</text>
  <text x="118" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Celery Beat</text>
  <text x="118" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ddd0ff">Schedule Trigger</text>

  <!-- Box 2: Message Broker -->
  <rect x="230" y="80" width="155" height="90" rx="10" fill="#FF6B6B" filter="url(#shadow4)"/>
  <text x="308" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#ffffff">📨</text>
  <text x="308" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Message Broker</text>
  <text x="308" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffd0d0">Redis / RabbitMQ</text>

  <!-- Box 3: Celery Worker -->
  <rect x="420" y="80" width="155" height="90" rx="10" fill="#4A90D9" filter="url(#shadow4)"/>
  <text x="498" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#ffffff">⚙</text>
  <text x="498" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Celery Worker</text>
  <text x="498" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d0e8ff">Task Execution</text>

  <!-- Box 4: Task Complete -->
  <rect x="610" y="80" width="155" height="90" rx="10" fill="#50C878" filter="url(#shadow4)"/>
  <text x="688" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#ffffff">✅</text>
  <text x="688" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Task Complete</text>
  <text x="688" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d0fde4">Save Result / Notify</text>

  <!-- Arrows between boxes -->
  <line x1="197" y1="125" x2="228" y2="125" stroke="#6C5CE7" stroke-width="2.5" marker-end="url(#arrow4)"/>
  <line x1="387" y1="125" x2="418" y2="125" stroke="#6C5CE7" stroke-width="2.5" marker-end="url(#arrow4)"/>
  <line x1="577" y1="125" x2="608" y2="125" stroke="#6C5CE7" stroke-width="2.5" marker-end="url(#arrow4)"/>

  <!-- Step numbers -->
  <circle cx="118" cy="190" r="12" fill="#6C5CE7"/>
  <text x="118" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">1</text>

  <circle cx="308" cy="190" r="12" fill="#FF6B6B"/>
  <text x="308" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">2</text>

  <circle cx="498" cy="190" r="12" fill="#4A90D9"/>
  <text x="498" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">3</text>

  <circle cx="688" cy="190" r="12" fill="#50C878"/>
  <text x="688" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">4</text>
</svg>
