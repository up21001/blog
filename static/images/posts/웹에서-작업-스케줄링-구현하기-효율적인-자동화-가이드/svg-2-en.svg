<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3748">4 Categories of Scheduling Approaches</text>

  <!-- Top-left: OS Level -->
  <rect x="50" y="60" width="330" height="150" rx="12" fill="#ffffff" stroke="#4A90D9" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="50" y="60" width="330" height="44" rx="12" fill="#4A90D9"/>
  <rect x="50" y="92" width="330" height="12" fill="#4A90D9"/>
  <text x="215" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">🖥️ OS Level</text>
  <text x="80" y="132" font-family="Arial, sans-serif" font-size="28" fill="#4A90D9">$</text>
  <text x="118" y="128" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3748">Cron</text>
  <text x="118" y="148" font-family="Arial, sans-serif" font-size="12" fill="#666666">Linux built-in scheduler</text>
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="11" fill="#888888">• Configure via crontab -e</text>
  <text x="80" y="202" font-family="Arial, sans-serif" font-size="11" fill="#888888">• Best for single-server environments</text>

  <!-- Top-right: App Level -->
  <rect x="420" y="60" width="330" height="150" rx="12" fill="#ffffff" stroke="#50C878" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="420" y="60" width="330" height="44" rx="12" fill="#50C878"/>
  <rect x="420" y="92" width="330" height="12" fill="#50C878"/>
  <text x="585" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">📦 App Level</text>
  <text x="450" y="132" font-family="Arial, sans-serif" font-size="24" fill="#50C878">{ }</text>
  <text x="490" y="128" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3748">node-cron / APScheduler</text>
  <text x="490" y="148" font-family="Arial, sans-serif" font-size="12" fill="#666666">Scheduler embedded in app code</text>
  <text x="450" y="185" font-family="Arial, sans-serif" font-size="11" fill="#888888">• Unified deployment</text>
  <text x="450" y="202" font-family="Arial, sans-serif" font-size="11" fill="#888888">• Best for small web services</text>

  <!-- Bottom-left: Distributed -->
  <rect x="50" y="232" width="330" height="150" rx="12" fill="#ffffff" stroke="#6C5CE7" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="50" y="232" width="330" height="44" rx="12" fill="#6C5CE7"/>
  <rect x="50" y="264" width="330" height="12" fill="#6C5CE7"/>
  <text x="215" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">⚡ Distributed</text>
  <text x="80" y="305" font-family="Arial, sans-serif" font-size="22" fill="#6C5CE7">⚙⚙</text>
  <text x="118" y="300" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3748">Celery</text>
  <text x="118" y="320" font-family="Arial, sans-serif" font-size="12" fill="#666666">Worker-based distributed processing</text>
  <text x="80" y="357" font-family="Arial, sans-serif" font-size="11" fill="#888888">• Redis / RabbitMQ broker</text>
  <text x="80" y="374" font-family="Arial, sans-serif" font-size="11" fill="#888888">• Best for large-scale services</text>

  <!-- Bottom-right: Cloud -->
  <rect x="420" y="232" width="330" height="150" rx="12" fill="#ffffff" stroke="#FFD93D" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="420" y="232" width="330" height="44" rx="12" fill="#FFD93D"/>
  <rect x="420" y="264" width="330" height="12" fill="#FFD93D"/>
  <text x="585" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2d3748">☁️ Cloud</text>
  <text x="450" y="305" font-family="Arial, sans-serif" font-size="22" fill="#FF9900">☁</text>
  <text x="490" y="300" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3748">AWS EventBridge</text>
  <text x="490" y="320" font-family="Arial, sans-serif" font-size="12" fill="#666666">Cloud-managed scheduler</text>
  <text x="450" y="357" font-family="Arial, sans-serif" font-size="11" fill="#888888">• Ideal for serverless environments</text>
  <text x="450" y="374" font-family="Arial, sans-serif" font-size="11" fill="#888888">• No infrastructure management</text>
</svg>
