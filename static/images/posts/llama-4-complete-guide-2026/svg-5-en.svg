<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">Getting Started with Llama 4 — API vs Local</text>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">Choose the right approach for your use case</text>

  <line x1="400" y1="75" x2="400" y2="470" stroke="#ecf0f1" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="400" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#95a5a6">── or ──</text>

  <!-- LEFT: API -->
  <text x="200" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3498db">☁️ API Approach (Cloud)</text>

  <rect x="40" y="105" width="320" height="52" rx="8" fill="#ebf5fb" stroke="#3498db" stroke-width="1.5"/>
  <text x="60" y="128" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3498db">1. Sign Up for a Service</text>
  <text x="60" y="148" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Choose: Groq · Together AI · Fireworks AI</text>
  <line x1="200" y1="157" x2="200" y2="173" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="40" y="173" width="320" height="52" rx="8" fill="#ebf5fb" stroke="#3498db" stroke-width="1.5"/>
  <text x="60" y="196" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3498db">2. Generate API Key</text>
  <text x="60" y="216" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Create key in dashboard, set as env variable</text>
  <line x1="200" y1="225" x2="200" y2="241" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="40" y="241" width="320" height="52" rx="8" fill="#ebf5fb" stroke="#3498db" stroke-width="1.5"/>
  <text x="60" y="264" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3498db">3. Install SDK</text>
  <text x="60" y="284" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">pip install groq  or  pip install together</text>
  <line x1="200" y1="293" x2="200" y2="309" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="40" y="309" width="320" height="80" rx="8" fill="#d6eaf8" stroke="#3498db" stroke-width="1.5"/>
  <text x="60" y="332" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3498db">4. Run Your Code</text>
  <text x="60" y="352" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">from groq import Groq</text>
  <text x="60" y="367" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">client = Groq()</text>
  <text x="60" y="382" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">model="llama-4-scout"</text>

  <rect x="50" y="405" width="300" height="32" rx="6" fill="#3498db"/>
  <text x="200" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">✅ Ready Immediately!</text>
  <text x="200" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Pro: No setup · Scalable | Con: Usage costs</text>

  <!-- RIGHT: Local -->
  <text x="600" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#27ae60">🖥️ Local (Ollama)</text>

  <rect x="440" y="105" width="320" height="52" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="460" y="128" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">1. Install Ollama</text>
  <text x="460" y="148" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Visit ollama.com → Download for your OS</text>
  <line x1="600" y1="157" x2="600" y2="173" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="440" y="173" width="320" height="52" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="460" y="196" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">2. Pull the Model</text>
  <text x="460" y="216" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">ollama pull llama4:scout  (~70GB)</text>
  <line x1="600" y1="225" x2="600" y2="241" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="440" y="241" width="320" height="52" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="460" y="264" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">3. Start the Server</text>
  <text x="460" y="284" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">ollama serve  →  localhost:11434 active</text>
  <line x1="600" y1="293" x2="600" y2="309" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="440" y="309" width="320" height="80" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="460" y="332" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">4. Start Chatting</text>
  <text x="460" y="352" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">ollama run llama4:scout</text>
  <text x="460" y="367" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Or use OpenAI-compatible API</text>
  <text x="460" y="382" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">curl localhost:11434/v1/chat/...</text>

  <rect x="450" y="405" width="300" height="32" rx="6" fill="#27ae60"/>
  <text x="600" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">✅ Full Privacy Guaranteed!</text>
  <text x="600" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Pro: Free · Offline | Con: GPU required (24GB+)</text>
</svg>
