<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">Llama 4 MoE (Mixture of Experts) 아키텍처</text>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">토큰당 2개의 전문가(Expert)만 활성화 → 효율적인 연산</text>

  <!-- Input Token -->
  <rect x="30" y="200" width="110" height="50" rx="8" fill="#3498db"/>
  <text x="85" y="221" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">입력 토큰</text>
  <text x="85" y="239" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#d6eaf8">"AI란 무엇?"</text>

  <!-- Arrow 1 -->
  <line x1="140" y1="225" x2="175" y2="225" stroke="#95a5a6" stroke-width="2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#95a5a6"/>
    </marker>
  </defs>

  <!-- Embedding Layer -->
  <rect x="175" y="195" width="110" height="60" rx="8" fill="#8e44ad"/>
  <text x="230" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">임베딩 레이어</text>
  <text x="230" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d7bde2">벡터 변환</text>
  <text x="230" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d7bde2">7168 차원</text>

  <!-- Arrow 2 -->
  <line x1="285" y1="225" x2="320" y2="225" stroke="#95a5a6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Router Gate -->
  <rect x="320" y="190" width="120" height="70" rx="8" fill="#e74c3c"/>
  <text x="380" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">라우터 게이트</text>
  <text x="380" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fadbd8">Top-2 Expert</text>
  <text x="380" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fadbd8">선택 알고리즘</text>

  <!-- Arrows to experts -->
  <line x1="440" y1="210" x2="510" y2="140" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <line x1="440" y1="225" x2="510" y2="225" stroke="#e74c3c" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="440" y1="240" x2="510" y2="310" stroke="#95a5a6" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="440" y1="245" x2="510" y2="390" stroke="#95a5a6" stroke-width="1" stroke-dasharray="3,4"/>
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e74c3c"/>
    </marker>
  </defs>

  <!-- Experts (active highlighted) -->
  <rect x="510" y="105" width="100" height="55" rx="8" fill="#27ae60"/>
  <text x="560" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Expert #3</text>
  <text x="560" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d5f5e3">✓ 활성화됨</text>

  <rect x="510" y="198" width="100" height="55" rx="8" fill="#27ae60"/>
  <text x="560" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Expert #7</text>
  <text x="560" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d5f5e3">✓ 활성화됨</text>

  <rect x="510" y="280" width="100" height="50" rx="6" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="560" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#95a5a6">Expert #12</text>
  <text x="560" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#bdc3c7">비활성</text>

  <rect x="510" y="358" width="100" height="50" rx="6" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="560" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#95a5a6">Expert #N</text>
  <text x="560" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#bdc3c7">비활성</text>

  <text x="560" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Scout: 16개 / Maverick: 128개</text>

  <!-- Aggregation -->
  <line x1="610" y1="132" x2="660" y2="195" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="610" y1="225" x2="660" y2="225" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr3)"/>
  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#27ae60"/>
    </marker>
    <marker id="arr4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f39c12"/>
    </marker>
  </defs>

  <rect x="660" y="185" width="110" height="80" rx="8" fill="#f39c12"/>
  <text x="715" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">가중 합산</text>
  <text x="715" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fef9e7">Weighted Sum</text>
  <text x="715" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fef9e7">출력 생성</text>

  <!-- Key insight box -->
  <rect x="30" y="330" width="460" height="80" rx="8" fill="#eaf4fb" stroke="#3498db" stroke-width="1.5"/>
  <text x="260" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">MoE의 핵심 장점</text>
  <text x="260" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">전체 파라미터의 일부만 활성화 → 대형 모델임에도 빠른 추론 속도</text>
  <text x="260" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Scout 109B → 실제 연산은 17B 수준 | Maverick 400B → 실제 연산은 17B 수준</text>
</svg>
