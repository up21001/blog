<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#2c3e50">Organizational Governance Checklist</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">Five essentials for 2026</text>

  <g>
    <rect x="50" y="100" width="340" height="115" rx="12" fill="#ffffff" stroke="#3498db" stroke-width="2"/>
    <circle cx="90" cy="140" r="22" fill="#3498db"/>
    <text x="90" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">01</text>
    <text x="125" y="128" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Policy Documentation</text>
    <text x="125" y="150" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Per-agent scope definition</text>
    <text x="70" y="178" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ Allowed data sources</text>
    <text x="70" y="195" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ Allowed tools + log retention</text>
  </g>

  <g>
    <rect x="410" y="100" width="340" height="115" rx="12" fill="#ffffff" stroke="#9b59b6" stroke-width="2"/>
    <circle cx="450" cy="140" r="22" fill="#9b59b6"/>
    <text x="450" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">02</text>
    <text x="485" y="128" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Privilege Separation</text>
    <text x="485" y="150" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Reject single master key</text>
    <text x="430" y="178" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ Separate tokens for risk tools</text>
    <text x="430" y="195" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ Distinct audit paths</text>
  </g>

  <g>
    <rect x="50" y="230" width="340" height="115" rx="12" fill="#ffffff" stroke="#e67e22" stroke-width="2"/>
    <circle cx="90" cy="270" r="22" fill="#e67e22"/>
    <text x="90" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">03</text>
    <text x="125" y="258" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">AI Red Team</text>
    <text x="125" y="280" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">At least quarterly exercises</text>
    <text x="70" y="308" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ Injection · abuse · leak scenarios</text>
    <text x="70" y="325" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ Automated adaptive suites</text>
  </g>

  <g>
    <rect x="410" y="230" width="340" height="115" rx="12" fill="#ffffff" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="450" cy="270" r="22" fill="#e74c3c"/>
    <text x="450" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">04</text>
    <text x="485" y="258" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Incident Response</text>
    <text x="485" y="280" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Add LLM category to SOC book</text>
    <text x="430" y="308" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ Full timeline reconstruction</text>
    <text x="430" y="325" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ Regulatory reporting flow</text>
  </g>

  <g>
    <rect x="230" y="360" width="340" height="100" rx="12" fill="#ffffff" stroke="#16a085" stroke-width="2"/>
    <circle cx="270" cy="400" r="22" fill="#16a085"/>
    <text x="270" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">05</text>
    <text x="305" y="388" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Awareness Training</text>
    <text x="305" y="410" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">All agent users</text>
    <text x="250" y="438" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ Verify external docs · never auto-accept approvals</text>
  </g>

  <text x="400" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">Technology + organization + training must move together to be effective</text>
</svg>
