<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#2c3e50">OWASP LLM Top 10 (2025)</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">에이전트 시대에 특히 중요한 항목 강조</text>

  <g font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">
    <rect x="40" y="85" width="720" height="36" fill="#fdecea" stroke="#e74c3c" stroke-width="1.5"/>
    <rect x="40" y="85" width="65" height="36" fill="#e74c3c"/>
    <text x="72" y="109" text-anchor="middle" font-weight="bold" fill="#ffffff">LLM01</text>
    <text x="120" y="109" font-weight="bold" fill="#c0392b">프롬프트 인젝션</text>
    <text x="370" y="109">다이렉트 + 인다이렉트 통합</text>
    <text x="720" y="109" text-anchor="end" fill="#c0392b" font-weight="bold">최상</text>

    <rect x="40" y="121" width="720" height="36" fill="#ffffff" stroke="#ecf0f1"/>
    <rect x="40" y="121" width="65" height="36" fill="#c0392b"/>
    <text x="72" y="145" text-anchor="middle" font-weight="bold" fill="#ffffff">LLM02</text>
    <text x="120" y="145" font-weight="bold">민감 정보 유출</text>
    <text x="370" y="145">문서 대량 처리 시 상수</text>
    <text x="720" y="145" text-anchor="end" fill="#e67e22" font-weight="bold">상</text>

    <rect x="40" y="157" width="720" height="36" fill="#f8f9fa" stroke="#ecf0f1"/>
    <rect x="40" y="157" width="65" height="36" fill="#e67e22"/>
    <text x="72" y="181" text-anchor="middle" font-weight="bold" fill="#ffffff">LLM03</text>
    <text x="120" y="181" font-weight="bold">공급망 위험</text>
    <text x="370" y="181">서드파티 모델·LoRA·MCP·플러그인</text>
    <text x="720" y="181" text-anchor="end" fill="#e67e22" font-weight="bold">상</text>

    <rect x="40" y="193" width="720" height="36" fill="#ffffff" stroke="#ecf0f1"/>
    <rect x="40" y="193" width="65" height="36" fill="#f39c12"/>
    <text x="72" y="217" text-anchor="middle" font-weight="bold" fill="#ffffff">LLM04</text>
    <text x="120" y="217" font-weight="bold">데이터/모델 오염</text>
    <text x="370" y="217">RAG 소스·파인튜닝 코퍼스 조작</text>
    <text x="720" y="217" text-anchor="end" fill="#f39c12" font-weight="bold">중</text>

    <rect x="40" y="229" width="720" height="36" fill="#fdecea" stroke="#e74c3c" stroke-width="1.5"/>
    <rect x="40" y="229" width="65" height="36" fill="#e74c3c"/>
    <text x="72" y="253" text-anchor="middle" font-weight="bold" fill="#ffffff">LLM05</text>
    <text x="120" y="253" font-weight="bold" fill="#c0392b">부적절한 출력 처리</text>
    <text x="370" y="253">모델 출력 → eval·SQL·쉘 직결</text>
    <text x="720" y="253" text-anchor="end" fill="#c0392b" font-weight="bold">최상</text>

    <rect x="40" y="265" width="720" height="36" fill="#fdecea" stroke="#e74c3c" stroke-width="1.5"/>
    <rect x="40" y="265" width="65" height="36" fill="#e74c3c"/>
    <text x="72" y="289" text-anchor="middle" font-weight="bold" fill="#ffffff">LLM06</text>
    <text x="120" y="289" font-weight="bold" fill="#c0392b">과도한 권한</text>
    <text x="370" y="289">에이전트 최소권한 위반의 단골</text>
    <text x="720" y="289" text-anchor="end" fill="#c0392b" font-weight="bold">최상</text>

    <rect x="40" y="301" width="720" height="36" fill="#ffffff" stroke="#ecf0f1"/>
    <rect x="40" y="301" width="65" height="36" fill="#f39c12"/>
    <text x="72" y="325" text-anchor="middle" font-weight="bold" fill="#ffffff">LLM07</text>
    <text x="120" y="325" font-weight="bold">시스템 프롬프트 누출</text>
    <text x="370" y="325">프롬프트 = 비밀이 아니도록 설계</text>
    <text x="720" y="325" text-anchor="end" fill="#f39c12" font-weight="bold">중</text>

    <rect x="40" y="337" width="720" height="36" fill="#f8f9fa" stroke="#ecf0f1"/>
    <rect x="40" y="337" width="65" height="36" fill="#f39c12"/>
    <text x="72" y="361" text-anchor="middle" font-weight="bold" fill="#ffffff">LLM08</text>
    <text x="120" y="361" font-weight="bold">벡터·임베딩 약점</text>
    <text x="370" y="361">RAG 독립 공격 벡터</text>
    <text x="720" y="361" text-anchor="end" fill="#f39c12" font-weight="bold">중</text>

    <rect x="40" y="373" width="720" height="36" fill="#ffffff" stroke="#ecf0f1"/>
    <rect x="40" y="373" width="65" height="36" fill="#95a5a6"/>
    <text x="72" y="397" text-anchor="middle" font-weight="bold" fill="#ffffff">LLM09</text>
    <text x="120" y="397" font-weight="bold">과신·오정보</text>
    <text x="370" y="397">검증 없이 출력 채택</text>
    <text x="720" y="397" text-anchor="end" fill="#95a5a6" font-weight="bold">중</text>

    <rect x="40" y="409" width="720" height="36" fill="#f8f9fa" stroke="#ecf0f1"/>
    <rect x="40" y="409" width="65" height="36" fill="#95a5a6"/>
    <text x="72" y="433" text-anchor="middle" font-weight="bold" fill="#ffffff">LLM10</text>
    <text x="120" y="433" font-weight="bold">무제한 리소스 소비</text>
    <text x="370" y="433">토큰·도구 호출 루프 폭주</text>
    <text x="720" y="433" text-anchor="end" fill="#95a5a6" font-weight="bold">중</text>
  </g>

  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">붉은 행 = 에이전트 환경에서 특히 위험도가 증폭되는 항목</text>
</svg>
