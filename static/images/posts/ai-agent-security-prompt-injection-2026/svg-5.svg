<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#2c3e50">조직 거버넌스 체크리스트</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">2026년 기업이 갖춰야 할 5가지</text>

  <g>
    <rect x="50" y="100" width="340" height="115" rx="12" fill="#ffffff" stroke="#3498db" stroke-width="2"/>
    <circle cx="90" cy="140" r="22" fill="#3498db"/>
    <text x="90" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">01</text>
    <text x="125" y="128" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">정책 문서화</text>
    <text x="125" y="150" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">에이전트별 허용 범위 정의</text>
    <text x="70" y="178" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ 허용 데이터 소스</text>
    <text x="70" y="195" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ 허용 도구 + 로그 보관 기간</text>
  </g>

  <g>
    <rect x="410" y="100" width="340" height="115" rx="12" fill="#ffffff" stroke="#9b59b6" stroke-width="2"/>
    <circle cx="450" cy="140" r="22" fill="#9b59b6"/>
    <text x="450" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">02</text>
    <text x="485" y="128" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">권한 분리</text>
    <text x="485" y="150" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">단일 API 키 금지</text>
    <text x="430" y="178" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ 고위험 도구 별도 토큰</text>
    <text x="430" y="195" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ 별도 감사 경로</text>
  </g>

  <g>
    <rect x="50" y="230" width="340" height="115" rx="12" fill="#ffffff" stroke="#e67e22" stroke-width="2"/>
    <circle cx="90" cy="270" r="22" fill="#e67e22"/>
    <text x="90" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">03</text>
    <text x="125" y="258" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">AI 레드팀</text>
    <text x="125" y="280" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">최소 분기 1회 모의 공격</text>
    <text x="70" y="308" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ 인젝션·오남용·유출 시나리오</text>
    <text x="70" y="325" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ 자동 어댑티브 공격 슈트</text>
  </g>

  <g>
    <rect x="410" y="230" width="340" height="115" rx="12" fill="#ffffff" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="450" cy="270" r="22" fill="#e74c3c"/>
    <text x="450" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">04</text>
    <text x="485" y="258" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">사고 대응(IR)</text>
    <text x="485" y="280" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">SOC 플레이북에 LLM 카테고리</text>
    <text x="430" y="308" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ 타임라인 재구성 가능</text>
    <text x="430" y="325" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ 규제 신고 프로세스</text>
  </g>

  <g>
    <rect x="230" y="360" width="340" height="100" rx="12" fill="#ffffff" stroke="#16a085" stroke-width="2"/>
    <circle cx="270" cy="400" r="22" fill="#16a085"/>
    <text x="270" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">05</text>
    <text x="305" y="388" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">인식 교육</text>
    <text x="305" y="410" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">사용 직원 전체 대상</text>
    <text x="250" y="438" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ 외부 문서 무결성 확인 + 승인 무조건 수락 금지</text>
  </g>

  <text x="400" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">기술 + 조직 + 교육의 삼각이 함께 움직여야 실효적이다</text>
</svg>
