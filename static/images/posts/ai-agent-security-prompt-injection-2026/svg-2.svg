<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#2c3e50">AI 에이전트 공격 표면</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">입력 · 도구 · 출력 — 단계별 위협</text>

  <defs>
    <marker id="ar1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7f8c8d"/>
    </marker>
  </defs>

  <!-- Input -->
  <rect x="40" y="100" width="220" height="300" rx="14" fill="#ffffff" stroke="#e74c3c" stroke-width="2"/>
  <rect x="40" y="100" width="220" height="45" rx="14" fill="#e74c3c"/>
  <rect x="40" y="130" width="220" height="15" fill="#e74c3c"/>
  <text x="150" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">① 입력</text>
  <text x="60" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c0392b">다이렉트 인젝션</text>
  <text x="60" y="190" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• "이전 지시 무시하고..."</text>
  <text x="60" y="208" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 시스템 프롬프트 덮어쓰기</text>
  <text x="60" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c0392b">인다이렉트 인젝션</text>
  <text x="60" y="260" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• PDF·이력서·웹페이지</text>
  <text x="60" y="278" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 하얀 글씨·meta 태그</text>
  <text x="60" y="296" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 로그·커밋 메시지</text>
  <text x="60" y="330" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c0392b">자동 트리거</text>
  <text x="60" y="350" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 받은 이메일 요약 시</text>
  <text x="60" y="368" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 저장소 자동 스캔 시</text>
  <text x="60" y="386" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 파일 업로드 처리 시</text>

  <line x1="265" y1="250" x2="290" y2="250" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#ar1)"/>

  <!-- Processing / Tools -->
  <rect x="290" y="100" width="220" height="300" rx="14" fill="#ffffff" stroke="#8e44ad" stroke-width="2"/>
  <rect x="290" y="100" width="220" height="45" rx="14" fill="#8e44ad"/>
  <rect x="290" y="130" width="220" height="15" fill="#8e44ad"/>
  <text x="400" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">② 도구 처리</text>
  <text x="310" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6c3483">도구 오남용</text>
  <text x="310" y="190" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 합법 호출 위장</text>
  <text x="310" y="208" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 이메일 전체 포워딩</text>
  <text x="310" y="226" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• DB 대량 조회</text>
  <text x="310" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6c3483">권한 체인 폭주</text>
  <text x="310" y="270" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 결제 + 삭제 + 전송</text>
  <text x="310" y="288" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 하나의 세션에 통합</text>
  <text x="310" y="310" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6c3483">MCP 서버 위험</text>
  <text x="310" y="330" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 미검증 서버 연결</text>
  <text x="310" y="348" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 임의 코드 실행 가능</text>
  <text x="310" y="376" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">※ 최소권한·승인 필수</text>

  <line x1="515" y1="250" x2="540" y2="250" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#ar1)"/>

  <!-- Output -->
  <rect x="540" y="100" width="220" height="300" rx="14" fill="#ffffff" stroke="#2980b9" stroke-width="2"/>
  <rect x="540" y="100" width="220" height="45" rx="14" fill="#2980b9"/>
  <rect x="540" y="130" width="220" height="15" fill="#2980b9"/>
  <text x="650" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">③ 출력</text>
  <text x="560" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1f618d">데이터 유출</text>
  <text x="560" y="190" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 프롬프트 그대로 출력</text>
  <text x="560" y="208" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 벡터 DB 문서 인용</text>
  <text x="560" y="226" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• API 키 노출</text>
  <text x="560" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1f618d">사이드채널</text>
  <text x="560" y="270" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• URL 파라미터로 정보 전송</text>
  <text x="560" y="288" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 이미지 호출 요청에 탑승</text>
  <text x="560" y="310" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1f618d">LLM → Shell 체인</text>
  <text x="560" y="330" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 코드 생성 → eval()</text>
  <text x="560" y="348" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• SQL · 쉘 직접 실행</text>
  <text x="560" y="376" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">※ 출력 = 새 공격 입력</text>

  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">하나의 단계에서 막지 못하면 다음 단계가 공격 표면이 된다</text>
</svg>
