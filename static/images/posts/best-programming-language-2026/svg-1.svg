<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">2026 프로그래밍 언어 생태계 지도</text>
  <text x="400" y="62" text-anchor="middle" fill="#64748b" font-size="13">버블 크기 = 생태계 규모 · 색상 = 주요 도메인</text>

  <!-- Python bubble (largest) -->
  <circle cx="200" cy="220" r="95" fill="#3b82f6" fill-opacity="0.18" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
  <text x="200" y="210" text-anchor="middle" fill="#93c5fd" font-size="22" font-weight="800">Python</text>
  <text x="200" y="232" text-anchor="middle" fill="#60a5fa" font-size="12">AI / ML / 자동화</text>
  <text x="200" y="250" text-anchor="middle" fill="#3b82f6" font-size="11">#1 가장 인기 언어</text>

  <!-- JavaScript/TypeScript bubble -->
  <circle cx="430" cy="200" r="78" fill="#f59e0b" fill-opacity="0.18" stroke="#f59e0b" stroke-width="2" filter="url(#glow)"/>
  <text x="430" y="192" text-anchor="middle" fill="#fcd34d" font-size="18" font-weight="800">JS / TS</text>
  <text x="430" y="212" text-anchor="middle" fill="#fbbf24" font-size="12">웹 / 풀스택</text>
  <text x="430" y="229" text-anchor="middle" fill="#f59e0b" font-size="11">유일한 브라우저 언어</text>

  <!-- Rust bubble -->
  <circle cx="630" cy="240" r="60" fill="#f97316" fill-opacity="0.18" stroke="#f97316" stroke-width="2" filter="url(#glow)"/>
  <text x="630" y="233" text-anchor="middle" fill="#fb923c" font-size="18" font-weight="800">Rust</text>
  <text x="630" y="252" text-anchor="middle" fill="#f97316" font-size="11">시스템 / 성능</text>

  <!-- Go bubble -->
  <circle cx="540" cy="360" r="55" fill="#06b6d4" fill-opacity="0.18" stroke="#06b6d4" stroke-width="2" filter="url(#glow)"/>
  <text x="540" y="354" text-anchor="middle" fill="#22d3ee" font-size="17" font-weight="800">Go</text>
  <text x="540" y="371" text-anchor="middle" fill="#06b6d4" font-size="11">백엔드 / 클라우드</text>

  <!-- Java/Kotlin bubble -->
  <circle cx="310" cy="375" r="50" fill="#a855f7" fill-opacity="0.18" stroke="#a855f7" stroke-width="2" filter="url(#glow)"/>
  <text x="310" y="368" text-anchor="middle" fill="#d8b4fe" font-size="15" font-weight="800">Java/Kotlin</text>
  <text x="310" y="385" text-anchor="middle" fill="#a855f7" font-size="11">엔터프라이즈 / 모바일</text>

  <!-- C++ bubble (smaller) -->
  <circle cx="155" cy="380" r="38" fill="#10b981" fill-opacity="0.18" stroke="#10b981" stroke-width="2"/>
  <text x="155" y="374" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="800">C++</text>
  <text x="155" y="389" text-anchor="middle" fill="#10b981" font-size="10">게임 / 임베디드</text>

  <!-- Legend -->
  <rect x="30" y="432" width="740" height="36" rx="8" fill="#1e293b" fill-opacity="0.6"/>
  <circle cx="70" cy="450" r="7" fill="#3b82f6" fill-opacity="0.6" stroke="#3b82f6"/>
  <text x="85" y="454" fill="#94a3b8" font-size="12">AI/ML</text>
  <circle cx="150" cy="450" r="7" fill="#f59e0b" fill-opacity="0.6" stroke="#f59e0b"/>
  <text x="165" y="454" fill="#94a3b8" font-size="12">웹/풀스택</text>
  <circle cx="255" cy="450" r="7" fill="#f97316" fill-opacity="0.6" stroke="#f97316"/>
  <text x="270" y="454" fill="#94a3b8" font-size="12">시스템</text>
  <circle cx="340" cy="450" r="7" fill="#06b6d4" fill-opacity="0.6" stroke="#06b6d4"/>
  <text x="355" y="454" fill="#94a3b8" font-size="12">백엔드</text>
  <circle cx="430" cy="450" r="7" fill="#a855f7" fill-opacity="0.6" stroke="#a855f7"/>
  <text x="445" y="454" fill="#94a3b8" font-size="12">엔터프라이즈</text>
  <circle cx="545" cy="450" r="7" fill="#10b981" fill-opacity="0.6" stroke="#10b981"/>
  <text x="560" y="454" fill="#94a3b8" font-size="12">게임/임베디드</text>
</svg>
