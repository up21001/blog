<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="800" height="520" fill="url(#bg4)" rx="16"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Language Selection Flowchart</text>

  <!-- START node -->
  <rect x="290" y="55" width="220" height="40" rx="20" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="80" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">🚀 Start: What is your goal?</text>

  <!-- Arrow down -->
  <line x1="400" y1="95" x2="400" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision 1 -->
  <polygon points="400,122 530,152 400,182 270,152" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="149" text-anchor="middle" fill="#cbd5e1" font-size="12">AI / Data Analysis?</text>
  <text x="400" y="163" text-anchor="middle" fill="#94a3b8" font-size="11">Machine learning, automation, data science</text>

  <!-- YES → Python -->
  <line x1="530" y1="152" x2="620" y2="152" stroke="#22c55e" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="570" y="145" text-anchor="middle" fill="#22c55e" font-size="11">YES</text>
  <rect x="622" y="132" width="140" height="40" rx="8" fill="#3b82f6" fill-opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <text x="692" y="151" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">🐍 Python</text>
  <text x="692" y="165" text-anchor="middle" fill="#60a5fa" font-size="10">King of AI/ML</text>

  <!-- NO → down -->
  <line x1="400" y1="182" x2="400" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="412" y="200" fill="#ef4444" font-size="11">NO</text>

  <!-- Decision 2 -->
  <polygon points="400,212 530,242 400,272 270,242" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="239" text-anchor="middle" fill="#cbd5e1" font-size="12">Web Development?</text>
  <text x="400" y="253" text-anchor="middle" fill="#94a3b8" font-size="11">UI, frontend, full-stack</text>

  <!-- YES → TypeScript -->
  <line x1="530" y1="242" x2="620" y2="242" stroke="#22c55e" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="570" y="235" text-anchor="middle" fill="#22c55e" font-size="11">YES</text>
  <rect x="622" y="222" width="140" height="40" rx="8" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="2"/>
  <text x="692" y="241" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="700">💛 TypeScript</text>
  <text x="692" y="255" text-anchor="middle" fill="#f59e0b" font-size="10">Web standard language</text>

  <!-- NO → down -->
  <line x1="400" y1="272" x2="400" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="412" y="290" fill="#ef4444" font-size="11">NO</text>

  <!-- Decision 3 -->
  <polygon points="400,302 530,332 400,362 270,332" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="329" text-anchor="middle" fill="#cbd5e1" font-size="12">Backend / Cloud?</text>
  <text x="400" y="343" text-anchor="middle" fill="#94a3b8" font-size="11">API, microservices, DevOps</text>

  <!-- YES → Go -->
  <line x1="530" y1="332" x2="620" y2="332" stroke="#22c55e" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="570" y="325" text-anchor="middle" fill="#22c55e" font-size="11">YES</text>
  <rect x="622" y="312" width="140" height="40" rx="8" fill="#06b6d4" fill-opacity="0.2" stroke="#06b6d4" stroke-width="2"/>
  <text x="692" y="331" text-anchor="middle" fill="#22d3ee" font-size="14" font-weight="700">🔵 Go</text>
  <text x="692" y="345" text-anchor="middle" fill="#06b6d4" font-size="10">Cloud-native optimized</text>

  <!-- NO → down -->
  <line x1="400" y1="362" x2="400" y2="390" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="412" y="380" fill="#ef4444" font-size="11">NO</text>

  <!-- Decision 4 -->
  <polygon points="400,392 530,422 400,452 270,422" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="419" text-anchor="middle" fill="#cbd5e1" font-size="12">Systems / Peak Performance?</text>
  <text x="400" y="433" text-anchor="middle" fill="#94a3b8" font-size="11">OS, embedded, game engines</text>

  <!-- YES → Rust -->
  <line x1="530" y1="422" x2="620" y2="422" stroke="#22c55e" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="570" y="415" text-anchor="middle" fill="#22c55e" font-size="11">YES</text>
  <rect x="622" y="402" width="140" height="40" rx="8" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-width="2"/>
  <text x="692" y="421" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="700">🦀 Rust</text>
  <text x="692" y="435" text-anchor="middle" fill="#f97316" font-size="10">Memory safe · Peak speed</text>

  <!-- NO → Java/Kotlin -->
  <line x1="400" y1="452" x2="400" y2="480" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="412" y="470" fill="#ef4444" font-size="11">NO</text>
  <rect x="290" y="480" width="220" height="32" rx="8" fill="#a855f7" fill-opacity="0.2" stroke="#a855f7" stroke-width="2"/>
  <text x="400" y="500" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700">☕ Java / Kotlin (Mobile · Enterprise)</text>

  <!-- Left side hint -->
  <text x="30" y="300" fill="#1e3a5f" font-size="11" font-style="italic">※ First language?</text>
  <text x="30" y="314" fill="#1e3a5f" font-size="11" font-style="italic">Start with Python</text>
</svg>
