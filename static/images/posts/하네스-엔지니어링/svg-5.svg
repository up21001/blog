<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow5" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="20" fill="#f8f9fa"/>

  <!-- Cloud shape -->
  <ellipse cx="100" cy="60" rx="40" ry="22" fill="#4A90D9" opacity="0.15"/>
  <ellipse cx="80" cy="65" rx="25" ry="18" fill="#4A90D9" opacity="0.2"/>
  <ellipse cx="120" cy="65" rx="25" ry="18" fill="#4A90D9" opacity="0.2"/>
  <ellipse cx="100" cy="55" rx="35" ry="20" fill="#4A90D9" filter="url(#shadow5)"/>

  <!-- Dollar sign on cloud -->
  <text x="100" y="62" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">$</text>

  <!-- Down arrow (cost reduction) -->
  <polygon points="100,82 90,92 95,92 95,105 105,105 105,92 110,92" fill="#50C878"/>

  <!-- Bar chart -->
  <rect x="50" y="140" width="18" height="30" rx="2" fill="#FF6B6B" opacity="0.8"/>
  <rect x="73" y="130" width="18" height="40" rx="2" fill="#FFD93D" opacity="0.8"/>
  <rect x="96" y="120" width="18" height="50" rx="2" fill="#4A90D9" opacity="0.8"/>
  <rect x="119" y="135" width="18" height="35" rx="2" fill="#50C878" opacity="0.8"/>

  <!-- Trend line (going down = savings) -->
  <polyline points="59,138 82,128 105,118 128,125" fill="none" stroke="#50C878" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="59" cy="138" r="3" fill="#50C878"/>
  <circle cx="82" cy="128" r="3" fill="#50C878"/>
  <circle cx="105" cy="118" r="3" fill="#50C878"/>
  <circle cx="128" cy="125" r="3" fill="#50C878"/>

  <!-- Title -->
  <text x="100" y="188" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">Cloud Cost Management</text>
</svg>
