<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="ds3" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4A90D9"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="380" fill="#f8f9fa"/>
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">Harness GitOps Workflow</text>

  <!-- Developer -->
  <rect x="40" y="80" width="130" height="70" rx="10" fill="#6C5CE7" filter="url(#ds3)"/>
  <text x="105" y="110" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">👨‍💻</text>
  <text x="105" y="135" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle">Developer</text>

  <!-- Git Repo -->
  <rect x="230" y="80" width="130" height="70" rx="10" fill="#333" filter="url(#ds3)"/>
  <text x="295" y="110" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">Git Repository</text>
  <text x="295" y="130" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">pipeline.yaml</text>

  <!-- Harness CI -->
  <rect x="420" y="80" width="150" height="70" rx="10" fill="#4A90D9" filter="url(#ds3)"/>
  <text x="495" y="110" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">Harness CI</text>
  <text x="495" y="130" font-family="Arial, sans-serif" font-size="11" fill="#ddd" text-anchor="middle">Pipeline Trigger</text>

  <!-- Build -->
  <rect x="230" y="200" width="130" height="60" rx="10" fill="#50C878" filter="url(#ds3)"/>
  <text x="295" y="225" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">Build</text>
  <text x="295" y="245" font-family="Arial, sans-serif" font-size="11" fill="#ddd" text-anchor="middle">Compile + Test</text>

  <!-- Test -->
  <rect x="420" y="200" width="150" height="60" rx="10" fill="#FFD93D" filter="url(#ds3)"/>
  <text x="495" y="225" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">Test</text>
  <text x="495" y="245" font-family="Arial, sans-serif" font-size="11" fill="#555" text-anchor="middle">Test Intelligence</text>

  <!-- Deploy -->
  <rect x="630" y="200" width="130" height="60" rx="10" fill="#FF6B6B" filter="url(#ds3)"/>
  <text x="695" y="225" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">Deploy</text>
  <text x="695" y="245" font-family="Arial, sans-serif" font-size="11" fill="#ddd" text-anchor="middle">Canary / Blue-Green</text>

  <!-- Production -->
  <rect x="630" y="310" width="130" height="50" rx="10" fill="#6C5CE7" filter="url(#ds3)"/>
  <text x="695" y="342" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">Production 🎯</text>

  <!-- Webhook label -->
  <rect x="40" y="310" width="530" height="50" rx="8" fill="#E8F4FD"/>
  <text x="305" y="340" font-family="Arial, sans-serif" font-size="12" fill="#4A90D9" text-anchor="middle">Git Webhook → Auto Trigger → Build → Test → Deploy (all defined in YAML, managed as code)</text>

  <!-- Arrows -->
  <path d="M 170 115 L 225 115" stroke="#4A90D9" stroke-width="2" fill="none" marker-end="url(#arr3)"/>
  <text x="197" y="108" font-family="Arial, sans-serif" font-size="10" fill="#4A90D9" text-anchor="middle">push</text>

  <path d="M 360 115 L 415 115" stroke="#4A90D9" stroke-width="2" fill="none" marker-end="url(#arr3)"/>
  <text x="387" y="108" font-family="Arial, sans-serif" font-size="10" fill="#4A90D9" text-anchor="middle">webhook</text>

  <path d="M 495 150 L 495 170 L 295 170 L 295 195" stroke="#4A90D9" stroke-width="2" fill="none" marker-end="url(#arr3)"/>

  <path d="M 360 230 L 415 230" stroke="#4A90D9" stroke-width="2" fill="none" marker-end="url(#arr3)"/>
  <path d="M 570 230 L 625 230" stroke="#4A90D9" stroke-width="2" fill="none" marker-end="url(#arr3)"/>
  <path d="M 695 260 L 695 305" stroke="#4A90D9" stroke-width="2" fill="none" marker-end="url(#arr3)"/>
</svg>
