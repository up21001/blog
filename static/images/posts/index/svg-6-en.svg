<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D3748" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="500" fill="#f8f9fa"/>

  <!-- Stage 1: System Requirements Input -->
  <g class="pipeline-stage">
    <rect x="45" y="190" width="140" height="120" rx="8" ry="8" fill="#4A90D9" />
    <text x="55" y="210" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">1.</text>
    <!-- Icon: Document -->
    <path d="M100 220 H130 V245 H100 Z M120 220 V230 H130 Z" fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" />
    <text x="115" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">System</text>
    <text x="115" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Requirements</text>
    <text x="115" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Input</text>
  </g>

  <!-- Stage 2: Logical Topology Generation (GNN) -->
  <g class="pipeline-stage">
    <rect x="235" y="190" width="140" height="120" rx="8" ry="8" fill="#50C878" />
    <text x="245" y="210" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">2.</text>
    <!-- Icon: Network Graph (GNN) -->
    <circle cx="305" cy="225" r="5" fill="#ffffff"/>
    <circle cx="285" cy="245" r="5" fill="#ffffff"/>
    <circle cx="325" cy="245" r="5" fill="#ffffff"/>
    <line x1="305" y1="225" x2="285" y2="245" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="305" y1="225" x2="325" y2="245" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="285" y1="245" x2="325" y2="245" stroke="#ffffff" stroke-width="1.5"/>
    <text x="305" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Logical Topology</text>
    <text x="305" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Generation (GNN)</text>
  </g>

  <!-- Stage 3: 3D Physical Routing (DRL) -->
  <g class="pipeline-stage">
    <rect x="425" y="190" width="140" height="120" rx="8" ry="8" fill="#F7B731" />
    <text x="435" y="210" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">3.</text>
    <!-- Icon: 3D Cube -->
    <path d="M480 220 L500 220 L500 240 L480 240 Z" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="500" y1="220" x2="510" y2="210" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="480" y1="220" x2="490" y2="210" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="500" y1="240" x2="510" y2="230" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="490" y1="210" x2="510" y2="210" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="510" y1="210" x2="510" y2="230" stroke="#ffffff" stroke-width="1.5"/>
    <text x="495" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">3D Physical</text>
    <text x="495" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Routing (DRL)</text>
  </g>

  <!-- Stage 4: Real-time EMI &amp; Thermal Validation &amp; Optimization -->
  <g class="pipeline-stage">
    <rect x="615" y="190" width="140" height="120" rx="8" ry="8" fill="#6C5CE7" />
    <text x="625" y="210" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">4.</text>
    <!-- Icon: Checkmark -->
    <path d="M675 230 L685 240 L705 220" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="685" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Real-time EMI &amp;</text>
    <text x="685" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Thermal Validation</text>
    <text x="685" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">&amp; Optimization</text>
  </g>

  <!-- Arrows -->
  <!-- Arrow 1: Stage 1 to Stage 2 -->
  <path d="M185 250 H235" stroke="#2D3748" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="210" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2D3748">Processed</text>
  <text x="210" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2D3748">Requirements</text>

  <!-- Arrow 2: Stage 2 to Stage 3 -->
  <path d="M375 250 H425" stroke="#2D3748" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="400" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2D3748">Logical Graph,</text>
  <text x="400" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2D3748">Connectivity</text>

  <!-- Arrow 3: Stage 3 to Stage 4 -->
  <path d="M565 250 H615" stroke="#2D3748" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="590" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2D3748">Proposed</text>
  <text x="590" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2D3748">3D Route</text>

  <!-- Arrow 4: Feedback from Stage 4 to Stage 3 -->
  <path d="M755 250 
           H775 
           V100 
           H405 
           V250 
           H425" 
        stroke="#2D3748" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="590" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2D3748">Validation Results,</text>
  <text x="590" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2D3748">Optimization Directives</text>

</svg>