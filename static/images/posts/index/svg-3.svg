<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="1000" fill="#f8f8f8"/>

  <!-- Global Styles -->
  <defs>
    <style>
      .title { font-family: "Arial, sans-serif"; font-size: 36px; font-weight: bold; fill: #2c3e50; text-anchor: middle; }
      .block-title { font-family: "Arial, sans-serif"; font-size: 24px; font-weight: bold; fill: #ffffff; }
      .block-desc { font-family: "Arial, sans-serif"; font-size: 18px; fill: #ecf0f1; }
      .icon-color { fill: #ffffff; }
    </style>
  </defs>

  <!-- Main Title -->
  <text x="400" y="80" class="title">Key Benefits of AI in Harness Engineering</text>

  <!-- Benefit 1: Breaking Limits in Weight &amp; Cost Reduction -->
  <g transform="translate(40, 150)">
    <rect x="0" y="0" width="720" height="250" rx="15" ry="15" fill="#3498db"/>
    <!-- Icon: Weight with downward arrow -->
    <g transform="translate(70, 70)">
      <!-- Barbell bar -->
      <rect class="icon-color" x="0" y="40" width="100" height="20"/>
      <!-- Left weight plate -->
      <rect class="icon-color" x="10" y="30" width="20" height="40"/>
      <!-- Right weight plate -->
      <rect class="icon-color" x="70" y="30" width="20" height="40"/>
      <!-- Downward arrow -->
      <path class="icon-color" d="M50 70 L40 80 L60 80 L50 90 L50 70 Z"/>
    </g>
    <text x="200" y="60" class="block-title">Breaking Limits in Weight &amp; Cost Reduction</text>
    <text x="200" y="100" class="block-desc">Leverage AI to optimize harness designs, significantly reducing material usage and</text>
    <text x="200" y="125" class="block-desc">manufacturing costs beyond traditional engineering capabilities.</text>
  </g>

  <!-- Benefit 2: Automating Complexity Management -->
  <g transform="translate(40, 450)">
    <rect x="0" y="0" width="720" height="250" rx="15" ry="15" fill="#e67e22"/>
    <!-- Icon: Stylized Brain -->
    <g transform="translate(70, 70)">
      <path class="icon-color" d="M50 0 C20 0 0 25 0 50 C0 75 20 100 50 100 C80 100 100 75 100 50 C100 25 80 0 50 0 Z"/>
      <path class="icon-color" d="M50 0 C40 10 40 20 50 30 C60 20 60 10 50 0 Z"/>
      <path class="icon-color" d="M50 30 C40 40 40 50 50 60 C60 50 60 40 50 30 Z"/>
      <path class="icon-color" d="M50 60 C40 70 40 80 50 90 C60 80 60 70 50 60 Z"/>
    </g>
    <text x="200" y="60" class="block-title">Automating Complexity Management</text>
    <text x="200" y="100" class="block-desc">AI algorithms automate the intricate process of managing complex harness</text>
    <text x="200" y="125" class="block-desc">configurations, minimizing errors and accelerating design cycles.</text>
  </g>

  <!-- Benefit 3: Shifting Engineering Software Paradigm -->
  <g transform="translate(40, 750)">
    <rect x="0" y="0" width="720" height="250" rx="15" ry="15" fill="#9b59b6"/>
    <!-- Icon: Computer screen with AI chip -->
    <g transform="translate(70, 70)">
      <!-- Monitor body -->
      <rect class="icon-color" x="0" y="10" width="100" height="60" rx="5" ry="5"/>
      <!-- Screen -->
      <rect fill="#2c3e50" x="10" y="18" width="80" height="44" rx="3" ry="3"/>
      <!-- Stand -->
      <path class="icon-color" d="M40 70 L60 70 L60 80 L70 80 L70 90 L30 90 L30 80 L40 80 Z"/>
      <!-- AI chip on screen -->
      <g transform="translate(30, 30)">
        <rect fill="#3498db" x="0" y="0" width="40" height="20" rx="3" ry="3"/>
        <circle fill="#ecf0f1" cx="10" cy="10" r="3"/>
        <circle fill="#ecf0f1" cx="20" cy="10" r="3"/>
        <circle fill="#ecf0f1" cx="30" cy="10" r="3"/>
      </g>
    </g>
    <text x="200" y="60" class="block-title">Shifting Engineering Software Paradigm</text>
    <text x="200" y="100" class="block-desc">Transition from manual, rule-based design to intelligent, AI-driven software</text>
    <text x="200" y="125" class="block-desc">that predicts optimal solutions and adapts to evolving requirements.</text>
  </g>

</svg>