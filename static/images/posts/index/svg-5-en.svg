<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <rect x="0" y="0" width="800" height="1000" fill="#f8f8f8"/>

    <!-- Global Styles -->
    <style>
        .title { font-family: "Arial, sans-serif"; font-size: 36px; font-weight: bold; fill: #333; text-anchor: middle; }
        .subtitle { font-family: "Arial, sans-serif"; font-size: 24px; font-weight: bold; fill: #555; text-anchor: middle; }
        .challenge-title { font-family: "Arial, sans-serif"; font-size: 22px; font-weight: bold; fill: #333; text-anchor: middle; }
        .description { font-family: "Arial, sans-serif"; font-size: 18px; fill: #666; text-anchor: middle; }
        .icon-bg-1 { fill: #4CAF50; } /* Green */
        .icon-bg-2 { fill: #2196F3; } /* Blue */
        .icon-bg-3 { fill: #FFC107; } /* Amber */
        .box-fill-1 { fill: #e8f5e9; } /* Light Green */
        .box-fill-2 { fill: #e3f2fd; } /* Light Blue */
        .box-fill-3 { fill: #fff8e1; } /* Light Amber */
        .box-stroke { stroke: #ccc; stroke-width: 1; }
        .icon-detail-light { fill: #fff; }
    </style>

    <!-- Title -->
    <text x="400" y="70" class="title">Challenges in Harness Engineering AI Adoption</text>
    <text x="400" y="110" class="subtitle">Key Hurdles for Developers</text>

    <!-- Challenge 1: API Integration with Existing CAD Systems -->
    <g transform="translate(40, 180)">
        <rect x="0" y="0" width="720" height="240" rx="15" ry="15" class="box-fill-1 box-stroke"/>

        <!-- Icon: API Integration -->
        <g transform="translate(360, 40)">
            <rect x="-40" y="-40" width="80" height="80" rx="15" ry="15" class="icon-bg-1"/>
            <!-- Left System -->
            <rect x="-30" y="-15" width="20" height="30" rx="3" ry="3" class="icon-detail-light"/>
            <!-- Right System -->
            <rect x="10" y="-15" width="20" height="30" rx="3" ry="3" class="icon-detail-light"/>
            <!-- Connection Line -->
            <line x1="-10" y1="0" x2="10" y2="0" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
            <!-- Connection Points -->
            <circle cx="-10" cy="0" r="4" class="icon-detail-light"/>
            <circle cx="10" cy="0" r="4" class="icon-detail-light"/>
            <!-- Small API plugs -->
            <rect x="-15" y="-5" width="5" height="10" fill="#4CAF50"/>
            <rect x="10" y="-5" width="5" height="10" fill="#4CAF50"/>
        </g>

        <text x="360" y="160" class="challenge-title">API Integration with CAD Systems</text>
        <text x="360" y="195" class="description">
            Connecting AI generation tools with established CAD platforms
        </text>
        <text x="360" y="215" class="description">
            requires robust API development and seamless data exchange.
        </text>
    </g>

    <!-- Challenge 2: Quantification of Complex Geometric Constraints -->
    <g transform="translate(40, 450)">
        <rect x="0" y="0" width="720" height="240" rx="15" ry="15" class="box-fill-2 box-stroke"/>

        <!-- Icon: Geometric Constraints -->
        <g transform="translate(360, 40)">
            <rect x="-40" y="-40" width="80" height="80" rx="15" ry="15" class="icon-bg-2"/>
            <!-- Main Shape -->
            <rect x="-20" y="-20" width="40" height="40" rx="5" ry="5" class="icon-detail-light"/>
            <!-- Dimension Line 1 (Width) -->
            <line x1="-30" y1="-10" x2="-20" y2="-10" stroke="#fff" stroke-width="2"/>
            <line x1="-30" y1="10" x2="-20" y2="10" stroke="#fff" stroke-width="2"/>
            <line x1="-25" y1="-15" x2="-25" y2="15" stroke="#fff" stroke-width="1"/>
            <path d="M-28 -15 L-25 -18 L-22 -15" stroke="#fff" stroke-width="1" fill="none"/>
            <path d="M-28 15 L-25 18 L-22 15" stroke="#fff" stroke-width="1" fill="none"/>
            <text x="-35" y="5" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">W</text>
            <!-- Dimension Line 2 (Height) -->
            <line x1="-10" y1="-30" x2="-10" y2="-20" stroke="#fff" stroke-width="2"/>
            <line x1="10" y1="-30" x2="10" y2="-20" stroke="#fff" stroke-width="2"/>
            <line x1="-15" y1="-25" x2="15" y2="-25" stroke="#fff" stroke-width="1"/>
            <path d="M-15 -28 L-18 -25 L-15 -22" stroke="#fff" stroke-width="1" fill="none"/>
            <path d="M15 -28 L18 -25 L15 -22" stroke="#fff" stroke-width="1" fill="none"/>
            <text x="0" y="-35" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">H</text>
            <!-- Constraint symbol (circle with cross) -->
            <circle cx="25" cy="25" r="8" stroke="#fff" stroke-width="2" fill="none"/>
            <line x1="20" y1="25" x2="30" y2="25" stroke="#fff" stroke-width="2"/>
            <line x1="25" y1="20" x2="25" y2="30" stroke="#fff" stroke-width="2"/>
        </g>

        <text x="360" y="160" class="challenge-title">Quantifying Complex Geometric Constraints</text>
        <text x="360" y="195" class="description">
            Translating intricate physical and spatial restrictions into
        </text>
        <text x="360" y="215" class="description">
            computable parameters for AI models is a significant hurdle.
        </text>
    </g>

    <!-- Challenge 3: Building Domain-Specific AI Models using Legacy Design Data -->
    <g transform="translate(40, 720)">
        <rect x="0" y="0" width="720" height="240" rx="15" ry="15" class="box-fill-3 box-stroke"/>

        <!-- Icon: Legacy Data &amp; AI Model -->
        <g transform="translate(360, 40)">
            <rect x="-40" y="-40" width="80" height="80" rx="15" ry="15" class="icon-bg-3"/>
            <!-- Data Stack -->
            <rect x="-25" y="10" width="30" height="10" rx="3" ry="3" class="icon-detail-light" opacity="0.8"/>
            <rect x="-25" y="0" width="30" height="10" rx="3" ry="3" class="icon-detail-light" opacity="0.6"/>
            <rect x="-25" y="-10" width="30" height="10" rx="3" ry="3" class="icon-detail-light" opacity="0.4"/>
            <!-- AI Brain/Chip -->
            <circle cx="20" cy="-20" r="10" class="icon-detail-light"/>
            <path d="M15 -20 A5 5 0 0 1 25 -20 A5 5 0 0 1 15 -20 Z" fill="#FFC107"/>
            <circle cx="20" cy="-20" r="3" class="icon-detail-light"/>
            <!-- Arrow from data to AI -->
            <path d="M-5 5 L10 -15" stroke="#fff" stroke-width="3" marker-end="url(#arrowhead)" fill="none"/>
        </g>

        <text x="360" y="160" class="challenge-title">Domain-Specific AI Models from Legacy Data</text>
        <text x="360" y="195" class="description">
            Leveraging historical design archives to train specialized AI models
        </text>
        <text x="360" y="215" class="description">
            demands sophisticated data parsing, cleaning, and feature engineering.
        </text>
    </g>

    <!-- Arrowhead definition for reuse -->
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#fff" />
        </marker>
    </defs>
</svg>