<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    .background { fill: #f8f9fa; }
    .stage-box { rx: 10; ry: 10; fill: #4A90D9; stroke: #ccc; stroke-width: 1; }
    .stage-label { font-family: "Arial, sans-serif"; font-size: 14px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
    .progress-circle { fill: #2D3748; stroke: #f8f9fa; stroke-width: 2; }
    .progress-text { font-family: "Arial, sans-serif"; font-size: 12px; font-weight: bold; fill: #f8f9fa; text-anchor: middle; dominant-baseline: central; }
    .icon { fill: #ffffff; }
    .arrow-path { fill: none; stroke: #2D3748; stroke-width: 2; marker-end: url(#arrowhead); }
    .arrow-label { font-family: "Arial, sans-serif"; font-size: 12px; fill: #2D3748; text-anchor: middle; }
    .feedback-arrow-path { fill: none; stroke: #6C5CE7; stroke-width: 2; stroke-dasharray: 4 2; marker-end: url(#feedback-arrowhead); }
    .feedback-arrow-label { font-family: "Arial, sans-serif"; font-size: 11px; fill: #6C5CE7; text-anchor: middle; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="10 3.5, 0 0, 0 7" fill="#2D3748" />
    </marker>
    <marker id="feedback-arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="10 3.5, 0 0, 0 7" fill="#6C5CE7" />
    </marker>
    <!-- Icon for Stage 1: Document/Input -->
    <path id="icon-document" d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm-2 16H8v-2h4v2zm0-4H8v-2h4v2zm-1-5V3.5L18.5 9H13z" />
    <!-- Icon for Stage 2: Gear/Process (GNN) -->
    <path id="icon-gear" d="M19.4 12.9c.04-.32.06-.64.06-.98 0-.34-.02-.66-.06-.98l1.9-1.55c.18-.15.24-.42.1-.65l-1.9-3.29c-.14-.23-.4-.32-.66-.23l-2.39.96c-.5-.38-1.03-.7-1.6-.98V2.83c0-.27-.22-.5-.5-.5h-3.8c-.27 0-.5.23-.5.5v2.32c-.57.28-1.1.6-1.6.98l-2.39-.96c-.26-.09-.52 0-.66.23l-1.9 3.29c-.14.23-.08.5.1.65l1.9 1.55c-.04.32-.06.64-.06.98 0 .34.02.66.06.98l-1.9 1.55c-.18.15-.24.42-.1.65l1.9 3.29c.14.23.4.32.66.23l2.39-.96c.5.38 1.03.7 1.6.98v2.32c0 .27.22.5.5.5h3.8c.27 0 .5-.23.5-.5v-2.32c.57-.28 1.1-.6 1.6-.98l2.39.96c.26.09.52 0 .66-.23l1.9-3.29c.14-.23.08-.5-.1-.65l-1.9-1.55zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z" />
    <!-- Icon for Stage 3: 3D Cube (DRL) -->
    <path id="icon-cube" d="M12 2L6 6v12l6 4 6-4V6L12 2zM12 4.3L16.7 7 12 9.7 7.3 7 12 4.3zM7 8.3L11 10.6v5.8L7 13.9V8.3zM13 10.6L17 8.3v5.6L13 16.4V10.6z" />
    <!-- Icon for Stage 4: Shield with Check (Validation) -->
    <path id="icon-shield-check" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1 15L6 11l1.41-1.41L11 13.17l4.59-4.59L17 10l-6 6z" />
  </defs>

  <rect x="0" y="0" width="800" height="500" class="background" />

  <!-- Stage 1: System Requirements Input -->
  <rect x="32" y="190" width="160" height="120" class="stage-box" style="fill: #4A90D9;" />
  <text x="112" y="270" class="stage-label">System Requirements</text>
  <text x="112" y="288" class="stage-label">Input</text>
  <circle cx="112" cy="170" r="12" class="progress-circle" />
  <text x="112" y="170" class="progress-text">1</text>
  <use href="#icon-document" transform="translate(97, 210) scale(0.6)" class="icon" />

  <!-- Stage 2: Logical Topology Generation (using GNN) -->
  <rect x="224" y="190" width="160" height="120" class="stage-box" style="fill: #50C878;" />
  <text x="304" y="270" class="stage-label">Logical Topology</text>
  <text x="304" y="288" class="stage-label">Generation (GNN)</text>
  <circle cx="304" cy="170" r="12" class="progress-circle" />
  <text x="304" y="170" class="progress-text">2</text>
  <use href="#icon-gear" transform="translate(289, 210) scale(0.6)" class="icon" />

  <!-- Stage 3: 3D Physical Routing (using DRL) -->
  <rect x="416" y="190" width="160" height="120" class="stage-box" style="fill: #6C5CE7;" />
  <text x="496" y="270" class="stage-label">3D Physical</text>
  <text x="496" y="288" class="stage-label">Routing (DRL)</text>
  <circle cx="496" cy="170" r="12" class="progress-circle" />
  <text x="496" y="170" class="progress-text">3</text>
  <use href="#icon-cube" transform="translate(481, 210) scale(0.6)" class="icon" />

  <!-- Stage 4: Real-time EMI &amp; Thermal Constraint Validation &amp; Optimization -->
  <rect x="608" y="190" width="160" height="120" class="stage-box" style="fill: #3A7AC9;" />
  <text x="688" y="270" class="stage-label">Real-time EMI/Thermal</text>
  <text x="688" y="288" class="stage-label">Validation &amp; Optimization</text>
  <circle cx="688" cy="170" r="12" class="progress-circle" />
  <text x="688" y="170" class="progress-text">4</text>
  <use href="#icon-shield-check" transform="translate(673, 210) scale(0.6)" class="icon" />

  <!-- Arrows (Forward Flow) -->
  <path d="M192 250 L224 250" class="arrow-path" />
  <text x="208" y="230" class="arrow-label">Design Specs, Constraints</text>

  <path d="M384 250 L416 250" class="arrow-path" />
  <text x="400" y="230" class="arrow-label">Logical Netlist, Initial Topology</text>

  <path d="M576 250 L608 250" class="arrow-path" />
  <text x="592" y="230" class="arrow-label">Proposed 3D Routes</text>

  <!-- Arrows (Feedback Flow) -->
  <!-- Stage 4 -> Stage 3: Optimization Feedback -->
  <path d="M608 270 L608 330 L576 330 L576 270" class="feedback-arrow-path" />
  <text x="592" y="345" class="feedback-arrow-label">Optimization Feedback</text>
  <text x="592" y="360" class="feedback-arrow-label">(EMI/Thermal violations)</text>

  <!-- Stage 4 -> Stage 2: Topology Refinement Suggestions -->
  <path d="M608 230 L608 130 L384 130 L384 230" class="feedback-arrow-path" />
  <text x="496" y="115" class="feedback-arrow-label">Topology Refinement Suggestions</text>

</svg>