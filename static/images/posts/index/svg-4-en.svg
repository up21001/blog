<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <style>
        .background { fill: #f8f9fa; }
        .node-component { fill: #4A90D9; stroke: #2D3748; stroke-width: 1; }
        .node-connector { fill: #50C878; stroke: #2D3748; stroke-width: 1; }
        .node-mount { fill: #FFD93D; stroke: #2D3748; stroke-width: 1; }
        .label { font-family: "Arial, sans-serif"; font-size: 16px; fill: #f8f9fa; text-anchor: middle; }
        .label-dark { font-family: "Arial, sans-serif"; font-size: 16px; fill: #2D3748; text-anchor: middle; }
        .title { font-family: "Arial, sans-serif"; font-size: 24px; font-weight: bold; fill: #2D3748; text-anchor: middle; }
        .legend-label { font-family: "Arial, sans-serif"; font-size: 14px; fill: #2D3748; }
        .attribute-label { font-family: "Courier New, monospace"; font-size: 12px; fill: #2D3748; }
        .path { fill: none; stroke: #2D3748; stroke-width: 2; }
    </style>

    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#2D3748" />
        </marker>
    </defs>

    <rect x="0" y="0" width="800" height="600" class="background" />

    <!-- Title -->
    <text x="400" y="40" class="title">Vehicle 3D Model as a Graph for AI Analysis</text>

    <!-- Legend -->
    <g transform="translate(50, 70)">
        <text x="0" y="0" class="legend-label" font-weight="bold">Legend:</text>
        
        <rect x="0" y="20" width="20" height="20" rx="3" ry="3" class="node-component" />
        <text x="30" y="35" class="legend-label">Component</text>

        <circle cx="10" cy="65" r="10" class="node-connector" />
        <text x="30" y="70" class="legend-label">Connector</text>

        <polygon points="0,100 10,110 0,120 -10,110" transform="translate(10,110)" class="node-mount" />
        <text x="30" y="115" class="legend-label">Mounting Point</text>

        <line x1="0" y1="140" x2="20" y2="140" class="path" />
        <text x="30" y="145" class="legend-label">Wiring Path</text>
    </g>

    <!-- Nodes -->
    <!-- Headlight (Component) -->
    <rect x="100" y="200" width="120" height="60" rx="5" ry="5" class="node-component" />
    <text x="160" y="235" class="label">Headlight</text>
    <text x="100" y="280" class="attribute-label">
        <tspan x="100" dy="1.2em" font-weight="bold">Attributes:</tspan>
        <tspan x="100" dy="1.2em">Elec: V=12V, I=5A</tspan>
        <tspan x="100" dy="1.2em">Mech: W=0.5kg</tspan>
        <tspan x="100" dy="1.2em">Env: TR=-40C to 85C</tspan>
    </text>

    <!-- C1 (Connector) -->
    <circle cx="280" cy="230" r="25" class="node-connector" />
    <text x="280" y="235" class="label">C1</text>
    <text x="280" y="280" class="attribute-label">
        <tspan x="280" dy="1.2em" font-weight="bold">Attributes:</tspan>
        <tspan x="280" dy="1.2em">Elec: MaxV=12V, MaxI=10A, Pins=6</tspan>
        <tspan x="280" dy="1.2em">Mech: MatingForce=10N</tspan>
        <tspan x="280" dy="1.2em">Env: IP_Rating=IP67</tspan>
    </text>

    <!-- ECU (Component) -->
    <rect x="450" y="100" width="100" height="60" rx="5" ry="5" class="node-component" />
    <text x="500" y="135" class="label">ECU</text>
    <text x="450" y="180" class="attribute-label">
        <tspan x="450" dy="1.2em" font-weight="bold">Attributes:</tspan>
        <tspan x="450" dy="1.2em">Elec: V=12V, I=2A, Proc=High</tspan>
        <tspan x="450" dy="1.2em">Mech: Dim=10x8x3cm</tspan>
        <tspan x="450" dy="1.2em">Env: TR=-40C to 105C, Vib=10G</tspan>
    </text>

    <!-- C2 (Connector) -->
    <circle cx="590" cy="130" r="25" class="node-connector" />
    <text x="590" y="135" class="label">C2</text>
    <text x="590" y="180" class="attribute-label">
        <tspan x="590" dy="1.2em" font-weight="bold">Attributes:</tspan>
        <tspan x="590" dy="1.2em">Elec: MaxV=12V, MaxI=5A, Pins=8</tspan>
        <tspan x="590" dy="1.2em">Mech: MatingForce=8N</tspan>
        <tspan x="590" dy="1.2em">Env: IP_Rating=IP65</tspan>
    </text>

    <!-- M1 (Mounting Point) -->
    <polygon points="380,350 405,375 380,400 355,375" class="node-mount" />
    <text x="380" y="380" class="label-dark">M1</text>
    <text x="350" y="420" class="attribute-label">
        <tspan x="350" dy="1.2em" font-weight="bold">Attributes:</tspan>
        <tspan x="350" dy="1.2em">Mech: Fastener=Bolt, Torque=15Nm</tspan>
        <tspan x="350" dy="1.2em">Env: Loc=EngineBay</tspan>
    </text>

    <!-- C3 (Connector) -->
    <circle cx="200" cy="400" r="25" class="node-connector" />
    <text x="200" y="405" class="label">C3</text>
    <text x="200" y="450" class="attribute-label">
        <tspan x="200" dy="1.2em" font-weight="bold">Attributes:</tspan>
        <tspan x="200" dy="1.2em">Elec: MaxV=12V, MaxI=15A, Pins=4</tspan>
        <tspan x="200" dy="1.2em">Mech: MatingForce=12N</tspan>
        <tspan x="200" dy="1.2em">Env: IP_Rating=IP68</tspan>
    </text>

    <!-- Sensor A (Component) -->
    <rect x="650" y="250" width="100" height="60" rx="5" ry="5" class="node-component" />
    <text x="700" y="285" class="label">Sensor A</text>
    <text x="650" y="330" class="attribute-label">
        <tspan x="650" dy="1.2em" font-weight="bold">Attributes:</tspan>
        <tspan x="650" dy="1.2em">Elec: V=5V, I=0.1A</tspan>
        <tspan x="650" dy="1.2em">Mech: W=0.1kg</tspan>
        <tspan x="650" dy="1.2em">Env: TR=-20C to 70C</tspan>
    </text>

    <!-- Edge Attributes Example -->
    <text x="450" y="450" class="attribute-label">
        <tspan x="450" dy="1.2em" font-weight="bold">Wiring Path Attributes:</tspan>
        <tspan x="450" dy="1.2em">Elec: Res=0.1Ohm/m, MaxI=10A</tspan>
        <tspan x="450" dy="1.2em">Mech: BendRad=10mm, Length=0.5m</tspan>
        <tspan x="450" dy="1.2em">Env: TempRating=105C, Shielding=Yes</tspan>
    </text>

    <!-- Arrows (MUST be last elements) -->
    <!-- Headlight (220,230) -> C1 (255,230) -->
    <polyline points="220 230, 255 230" class="path" marker-end="url(#arrowhead)" />

    <!-- ECU (550,130) -> C2 (565,130) -->
    <polyline points="550 130, 565 130" class="path" marker-end="url(#arrowhead)" />

    <!-- C1 (280,255) -> M1 (380,350) -->
    <polyline points="280 255, 280 300, 380 300, 380 365" class="path" marker-end="url(#arrowhead)" />

    <!-- C2 (590,155) -> M1 (380,350) -->
    <polyline points="590 155, 590 200, 400 200, 400 365" class="path" marker-end="url(#arrowhead)" />

    <!-- C1 (255,230) -> C3 (200,375) -->
    <polyline points="255 230, 200 230, 200 360" class="path" marker-end="url(#arrowhead)" />

    <!-- C3 (225,400) -> M1 (355,375) -->
    <polyline points="225 400, 300 400, 300 385, 365 385" class="path" marker-end="url(#arrowhead)" />

    <!-- C2 (615,130) -> Sensor A (700,250) -->
    <polyline points="615 130, 630 130, 630 235, 700 235" class="path" marker-end="url(#arrowhead)" />

</svg>