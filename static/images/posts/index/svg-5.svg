<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 32px; font-weight: bold; fill: #2c3e50; }
      .subtitle { font-size: 18px; fill: #7f8c8d; }
      .challenge-title { font-size: 22px; font-weight: bold; fill: #34495e; }
      .challenge-desc { font-size: 18px; fill: #7f8c8d; }
      .number-text { font-size: 24px; font-weight: bold; fill: #fff; }
      .block-bg-1 { fill: #ecf0f1; } /* Light Gray */
      .block-bg-2 { fill: #ecf0f1; }
      .block-bg-3 { fill: #ecf0f1; }
      .accent-1 { fill: #3498db; } /* Blue */
      .accent-2 { fill: #2ecc71; } /* Green */
      .accent-3 { fill: #e67e22; } /* Orange */
      .icon-stroke { stroke-width: 4px; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" class="title">Challenges in Adopting AI for Harness Engineering</text>
  <text x="400" y="100" text-anchor="middle" class="subtitle">Key hurdles developers face when integrating AI generation technology.</text>

  <!-- Challenge 1: API Integration with Existing CAD Systems -->
  <g transform="translate(0, 150)">
    <rect x="50" y="30" width="700" height="250" rx="15" class="block-bg-1"/>
    <circle cx="100" cy="80" r="30" class="accent-1"/>
    <text x="100" y="88" text-anchor="middle" class="number-text">1</text>

    <!-- Icon: API Integration (Two connected systems) -->
    <g transform="translate(170, 50) scale(0.8)">
      <rect x="0" y="10" width="60" height="40" rx="5" fill="#3498db" opacity="0.2"/>
      <rect x="70" y="10" width="60" height="40" rx="5" fill="#3498db" opacity="0.2"/>
      <path d="M60 30 H70" stroke="#3498db" class="icon-stroke"/>
      <path d="M65 25 L70 30 L65 35" fill="none" stroke="#3498db" class="icon-stroke"/>
      <rect x="5" y="15" width="20" height="10" rx="2" fill="#3498db"/>
      <rect x="95" y="25" width="20" height="10" rx="2" fill="#3498db"/>
    </g>

    <text x="260" y="80" class="challenge-title">API Integration with Existing CAD Systems</text>
    <text x="260" y="120" class="challenge-desc">Connecting AI-generated designs with diverse legacy CAD platforms</text>
    <text x="260" y="145" class="challenge-desc">requires robust API development and seamless data exchange protocols.</text>
  </g>

  <!-- Challenge 2: Quantification of Complex Geometric Constraints -->
  <g transform="translate(0, 430)">
    <rect x="50" y="30" width="700" height="250" rx="15" class="block-bg-2"/>
    <circle cx="100" cy="80" r="30" class="accent-2"/>
    <text x="100" y="88" text-anchor="middle" class="number-text">2</text>

    <!-- Icon: Geometric Constraints (Shape with measurements) -->
    <g transform="translate(170, 50) scale(0.8)">
      <rect x="10" y="10" width="40" height="40" rx="5" fill="#2ecc71" opacity="0.2"/>
      <path d="M10 10 L60 10 L60 60 L10 60 Z" fill="none" stroke="#2ecc71" class="icon-stroke"/>
      <line x1="5" y1="30" x2="15" y2="30" stroke="#2ecc71" stroke-width="2"/>
      <line x1="0" y1="20" x2="0" y2="40" stroke="#2ecc71" stroke-width="2"/>
      <text x="-20" y="35" font-size="14" fill="#2ecc71">L1</text>
      <line x1="30" y1="5" x2="30" y2="15" stroke="#2ecc71" stroke-width="2"/>
      <line x1="20" y1="0" x2="40" y2="0" stroke="#2ecc71" stroke-width="2"/>
      <text x="25" y="-5" font-size="14" fill="#2ecc71">W1</text>
      <path d="M70 20 L90 10 L110 20 L100 40 L80 50 Z" fill="none" stroke="#2ecc71" class="icon-stroke"/>
      <line x1="75" y1="25" x2="85" y2="20" stroke="#2ecc71" stroke-width="2"/>
      <line x1="80" y1="30" x2="90" y2="25" stroke="#2ecc71" stroke-width="2"/>
    </g>

    <text x="260" y="80" class="challenge-title">Quantification of Complex Geometric Constraints</text>
    <text x="260" y="120" class="challenge-desc">Translating intricate physical and functional geometric constraints</text>
    <text x="260" y="145" class="challenge-desc">into quantifiable parameters for AI models is a significant challenge.</text>
  </g>

  <!-- Challenge 3: Building Domain-Specific AI Models using Legacy Design Data -->
  <g transform="translate(0, 710)">
    <rect x="50" y="30" width="700" height="250" rx="15" class="block-bg-3"/>
    <circle cx="100" cy="80" r="30" class="accent-3"/>
    <text x="100" y="88" text-anchor="middle" class="number-text">3</text>

    <!-- Icon: AI Model with Legacy Data (Brain and data stack) -->
    <g transform="translate(170, 50) scale(0.8)">
      <path d="M60 10 C40 10 20 20 20 40 C20 60 40 70 60 70 C80 70 100 60 100 40 C100 20 80 10 60 10 Z" fill="#e67e22" opacity="0.2"/>
      <path d="M60 15 C45 15 30 22 30 40 C30 58 45 65 60 65 C75 65 90 58 90 40 C90 22 75 15 60 15 Z" fill="none" stroke="#e67e22" class="icon-stroke"/>
      <circle cx="45" cy="35" r="5" fill="#e67e22"/>
      <circle cx="75" cy="35" r="5" fill="#e67e22"/>
      <line x1="45" y1="50" x2="75" y2="50" stroke="#e67e22" class="icon-stroke"/>
      
      <!-- Data stack -->
      <rect x="5" y="60" width="30" height="10" rx="2" fill="#e67e22" opacity="0.5"/>
      <rect x="5" y="70" width="30" height="10" rx="2" fill="#e67e22" opacity="0.5"/>
      <rect x="5" y="80" width="30" height="10" rx="2" fill="#e67e22" opacity="0.5"/>
      <path d="M20 60 L20 15" stroke="#e67e22" stroke-width="3" stroke-dasharray="5,5"/>
      <path d="M20 15 L25 20 M20 15 L15 20" stroke="#e67e22" stroke-width="3" stroke-linecap="round"/>
    </g>

    <text x="260" y="80" class="challenge-title">Building Domain-Specific AI Models using Legacy Design Data</text>
    <text x="260" y="120" class="challenge-desc">Leveraging vast amounts of historical design data to train specialized AI models</text>
    <text x="260" y="145" class="challenge-desc">for harness engineering demands extensive data preprocessing and feature engineering.</text>
  </g>

</svg>