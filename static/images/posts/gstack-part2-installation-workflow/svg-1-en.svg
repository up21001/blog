<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="540" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" font-size="20" font-weight="700" fill="#1E1B4B">gstack Installation Process</text>
  <text x="450" y="68" text-anchor="middle" font-size="13" fill="#6B7280">Step-by-step guide — complete in 30 seconds</text>

  <!-- Step 1 -->
  <rect x="40" y="100" width="180" height="110" rx="10" fill="#4F46E5" opacity="0.1" stroke="#4F46E5" stroke-width="2"/>
  <circle cx="130" cy="130" r="18" fill="#4F46E5"/>
  <text x="130" y="136" text-anchor="middle" font-size="14" font-weight="700" fill="white">1</text>
  <text x="130" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#4F46E5">Prerequisites</text>
  <text x="130" y="174" text-anchor="middle" font-size="11" fill="#6B7280">Bun v1.0+</text>
  <text x="130" y="190" text-anchor="middle" font-size="11" fill="#6B7280">Claude Code</text>

  <!-- Arrow 1→2 -->
  <path d="M220 155 L250 155" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="255" y="100" width="180" height="110" rx="10" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="2"/>
  <circle cx="345" cy="130" r="18" fill="#10B981"/>
  <text x="345" y="136" text-anchor="middle" font-size="14" font-weight="700" fill="white">2</text>
  <text x="345" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#10B981">git clone</text>
  <text x="345" y="174" text-anchor="middle" font-size="11" fill="#6B7280">--single-branch</text>
  <text x="345" y="190" text-anchor="middle" font-size="11" fill="#6B7280">--depth 1</text>

  <!-- Arrow 2→3 -->
  <path d="M435 155 L465 155" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="470" y="100" width="180" height="110" rx="10" fill="#F59E0B" opacity="0.1" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="560" cy="130" r="18" fill="#F59E0B"/>
  <text x="560" y="136" text-anchor="middle" font-size="14" font-weight="700" fill="white">3</text>
  <text x="560" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#F59E0B">Run ./setup</text>
  <text x="560" y="174" text-anchor="middle" font-size="11" fill="#6B7280">Installs to</text>
  <text x="560" y="190" text-anchor="middle" font-size="11" fill="#6B7280">~/.claude/skills/gstack</text>

  <!-- Arrow 3→4 -->
  <path d="M650 155 L680 155" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="685" y="100" width="180" height="110" rx="10" fill="#EF4444" opacity="0.1" stroke="#EF4444" stroke-width="2"/>
  <circle cx="775" cy="130" r="18" fill="#EF4444"/>
  <text x="775" y="136" text-anchor="middle" font-size="14" font-weight="700" fill="white">4</text>
  <text x="775" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#EF4444">Ready!</text>
  <text x="775" y="174" text-anchor="middle" font-size="11" fill="#6B7280">Verify skill load</text>
  <text x="775" y="190" text-anchor="middle" font-size="11" fill="#6B7280">Run /office-hours</text>

  <!-- Command box -->
  <rect x="40" y="240" width="820" height="90" rx="8" fill="#1E1B4B"/>
  <text x="60" y="268" font-size="11" fill="#6EE7B7" font-family="'Courier New', monospace">$ git clone --single-branch --depth 1 \</text>
  <text x="60" y="286" font-size="11" fill="#FCD34D" font-family="'Courier New', monospace">    https://github.com/garrytan/gstack.git ~/.claude/skills/gstack</text>
  <text x="60" y="304" font-size="11" fill="#6EE7B7" font-family="'Courier New', monospace">$ cd ~/.claude/skills/gstack &amp;&amp; ./setup</text>
  <text x="680" y="320" font-size="10" fill="#9CA3AF" font-family="'Courier New', monospace"># completes in ~30 seconds</text>

  <!-- Skills installed -->
  <text x="450" y="368" text-anchor="middle" font-size="14" font-weight="700" fill="#1E1B4B">Skills Available After Install</text>

  <!-- Skill pills -->
  <rect x="40" y="382" width="120" height="32" rx="16" fill="#4F46E5"/>
  <text x="100" y="403" text-anchor="middle" font-size="11" font-weight="600" fill="white">/office-hours</text>

  <rect x="172" y="382" width="140" height="32" rx="16" fill="#10B981"/>
  <text x="242" y="403" text-anchor="middle" font-size="11" font-weight="600" fill="white">/plan-ceo-review</text>

  <rect x="324" y="382" width="140" height="32" rx="16" fill="#10B981"/>
  <text x="394" y="403" text-anchor="middle" font-size="11" font-weight="600" fill="white">/plan-eng-review</text>

  <rect x="476" y="382" width="90" height="32" rx="16" fill="#F59E0B"/>
  <text x="521" y="403" text-anchor="middle" font-size="11" font-weight="600" fill="white">/review</text>

  <rect x="578" y="382" width="70" height="32" rx="16" fill="#EF4444"/>
  <text x="613" y="403" text-anchor="middle" font-size="11" font-weight="600" fill="white">/qa</text>

  <rect x="660" y="382" width="70" height="32" rx="16" fill="#4F46E5"/>
  <text x="695" y="403" text-anchor="middle" font-size="11" font-weight="600" fill="white">/ship</text>

  <rect x="742" y="382" width="140" height="32" rx="16" fill="#EF4444"/>
  <text x="812" y="403" text-anchor="middle" font-size="11" font-weight="600" fill="white">/land-and-deploy</text>

  <!-- Vendor section -->
  <rect x="40" y="432" width="820" height="80" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="60" y="456" font-size="13" font-weight="700" fill="#065F46">Team Deployment: Vendor gstack into your project</text>
  <text x="60" y="476" font-size="11" fill="#374151" font-family="'Courier New', monospace">$ cd your-project</text>
  <text x="60" y="494" font-size="11" fill="#374151" font-family="'Courier New', monospace">$ gstack vendor    # copies to .claude/skills/gstack/ → shared with entire team</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9CA3AF"/>
    </marker>
  </defs>
</svg>
