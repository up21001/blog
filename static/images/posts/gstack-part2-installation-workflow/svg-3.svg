<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect width="900" height="580" fill="#F8FAFC" rx="12"/>

  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1E1B4B">스킬별 입력 / 출력 플로우</text>
  <text x="450" y="62" text-anchor="middle" font-size="12" fill="#6B7280">각 gstack 스킬의 입력값과 산출물 한눈에 보기</text>

  <!-- Column headers -->
  <text x="100" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#6B7280">스킬</text>
  <text x="340" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#6B7280">입력 (Input)</text>
  <text x="570" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#6B7280">처리 과정</text>
  <text x="790" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#6B7280">출력 (Output)</text>

  <!-- Divider line -->
  <line x1="20" y1="97" x2="880" y2="97" stroke="#E5E7EB" stroke-width="1"/>

  <!-- ROW 1: office-hours -->
  <rect x="20" y="108" width="160" height="64" rx="8" fill="#4F46E5" opacity="0.12" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="100" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#4F46E5">/office-hours</text>
  <text x="100" y="150" text-anchor="middle" font-size="10" fill="#374151">제품 프레이밍 세션</text>
  <text x="100" y="164" text-anchor="middle" font-size="10" fill="#6B7280">기획 단계</text>

  <path d="M180 140 L210 140" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="213" y="108" width="240" height="64" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="333" y="130" text-anchor="middle" font-size="10" fill="#374151">· 제품 아이디어 설명 (자유 형식)</text>
  <text x="333" y="147" text-anchor="middle" font-size="10" fill="#374151">· 현재 고민 중인 기능 목록</text>
  <text x="333" y="163" text-anchor="middle" font-size="10" fill="#374151">· 타겟 사용자 및 문제 정의</text>

  <path d="M453 140 L483 140" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="486" y="108" width="160" height="64" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="566" y="130" text-anchor="middle" font-size="10" fill="#4F46E5">강제 질문 생성</text>
  <text x="566" y="147" text-anchor="middle" font-size="10" fill="#4F46E5">범위 검증</text>
  <text x="566" y="163" text-anchor="middle" font-size="10" fill="#4F46E5">우선순위 정렬</text>

  <path d="M646 140 L676 140" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="679" y="108" width="200" height="64" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="779" y="130" text-anchor="middle" font-size="10" fill="#374151">· 검증된 제품 비전 문서</text>
  <text x="779" y="147" text-anchor="middle" font-size="10" fill="#374151">· 핵심 기능 우선순위 목록</text>
  <text x="779" y="163" text-anchor="middle" font-size="10" fill="#374151">· plan 단계 진입 준비 완료</text>

