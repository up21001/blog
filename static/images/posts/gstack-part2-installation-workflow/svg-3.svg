  <text x="566" y="387" text-anchor="middle" font-size="10" fill="#B91C1C">클릭/입력/탐색</text>
  <text x="566" y="403" text-anchor="middle" font-size="10" fill="#B91C1C">스크린샷 캡처</text>

  <path d="M646 380 L676 380" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="679" y="348" width="200" height="64" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="779" y="370" text-anchor="middle" font-size="10" fill="#374151">· 통과/실패 테스트 결과</text>
  <text x="779" y="387" text-anchor="middle" font-size="10" fill="#374151">· UI 버그 스크린샷</text>
  <text x="779" y="403" text-anchor="middle" font-size="10" fill="#374151">· 수정 필요 항목 목록</text>

  <!-- ROW 5: ship + land -->
  <rect x="20" y="428" width="160" height="64" rx="8" fill="#4F46E5" opacity="0.12" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="100" y="450" text-anchor="middle" font-size="11" font-weight="700" fill="#4338CA">/ship</text>
  <text x="100" y="466" text-anchor="middle" font-size="10" fill="#374151">+</text>
  <text x="100" y="481" text-anchor="middle" font-size="11" font-weight="700" fill="#991B1B">/land-and-deploy</text>

  <path d="M180 460 L210 460" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="213" y="428" width="240" height="64" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="333" y="450" text-anchor="middle" font-size="10" fill="#374151">· QA 통과된 코드베이스</text>
  <text x="333" y="467" text-anchor="middle" font-size="10" fill="#374151">· 커밋 히스토리</text>
  <text x="333" y="483" text-anchor="middle" font-size="10" fill="#374151">· 배포 타겟 환경 정보</text>

  <path d="M453 460 L483 460" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="486" y="428" width="160" height="64" rx="8" fill="#EDE9FE" stroke="#4F46E5" stroke-width="1"/>
  <text x="566" y="450" text-anchor="middle" font-size="10" fill="#4338CA">테스트 동기화</text>
  <text x="566" y="467" text-anchor="middle" font-size="10" fill="#4338CA">PR 자동 생성</text>
  <text x="566" y="483" text-anchor="middle" font-size="10" fill="#4338CA">배포 + 헬스체크</text>

  <path d="M646 460 L676 460" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="679" y="428" width="200" height="64" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="779" y="450" text-anchor="middle" font-size="10" fill="#374151">· 머지된 PR URL</text>
  <text x="779" y="467" text-anchor="middle" font-size="10" fill="#374151">· 커버리지 감사 리포트</text>
  <text x="779" y="483" text-anchor="middle" font-size="10" fill="#374151">· 프로덕션 헬스 대시보드</text>

  <!-- Bottom note -->
  <text x="450" y="520" text-anchor="middle" font-size="11" fill="#6B7280">각 스킬은 이전 단계 출력을 입력으로 받아 파이프라인을 자동 구성합니다</text>
</svg>
