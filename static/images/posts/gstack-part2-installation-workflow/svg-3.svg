  <path d="M180 380 L210 380" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="213" y="348" width="240" height="64" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
