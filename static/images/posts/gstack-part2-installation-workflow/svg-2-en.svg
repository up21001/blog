<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#6B7280"/>
    </marker>
    <marker id="arr-fix" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1E1B4B">Core Sprint Workflow</text>
  <text x="450" y="62" text-anchor="middle" font-size="12" fill="#6B7280">Full cycle from idea to production deployment</text>

  <!-- Phase labels -->
  <rect x="20" y="80" width="120" height="26" rx="6" fill="#EDE9FE"/>
  <text x="80" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#4F46E5">Planning Phase</text>

  <rect x="310" y="80" width="120" height="26" rx="6" fill="#D1FAE5"/>
  <text x="370" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">Dev Phase</text>

  <rect x="600" y="80" width="120" height="26" rx="6" fill="#FEF3C7"/>
  <text x="660" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Review Phase</text>

  <rect x="770" y="80" width="110" height="26" rx="6" fill="#FEE2E2"/>
  <text x="825" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#991B1B">Deploy Phase</text>

  <!-- Node 1: office-hours -->
  <rect x="20" y="120" width="150" height="80" rx="10" fill="#4F46E5" opacity="0.12" stroke="#4F46E5" stroke-width="2"/>
  <text x="95" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#4F46E5">/office-hours</text>
  <text x="95" y="166" text-anchor="middle" font-size="10" fill="#374151">Product idea validation</text>
  <text x="95" y="181" text-anchor="middle" font-size="10" fill="#374151">Forcing questions</text>

  <!-- Arrow 1→2 -->
  <path d="M170 160 L195 160" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 2: plan-ceo-review -->
  <rect x="198" y="120" width="150" height="80" rx="10" fill="#4F46E5" opacity="0.08" stroke="#7C3AED" stroke-width="2"/>
  <text x="273" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#7C3AED">/plan-ceo-review</text>
  <text x="273" y="163" text-anchor="middle" font-size="10" fill="#374151">Scope review &amp; refinement</text>
  <text x="273" y="178" text-anchor="middle" font-size="10" fill="#374151">"Do you really need this?"</text>

  <!-- Downward arrow to plan-eng-review -->
  <path d="M273 200 L273 220" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 3: plan-eng-review -->
  <rect x="198" y="222" width="150" height="80" rx="10" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="2"/>
  <text x="273" y="247" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">/plan-eng-review</text>
  <text x="273" y="265" text-anchor="middle" font-size="10" fill="#374151">Architecture design</text>
  <text x="273" y="280" text-anchor="middle" font-size="10" fill="#374151">TDD plan generation</text>

  <!-- Arrow from plan-eng-review to code -->
  <path d="M348 262 L378 262" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 4: Code Generation -->
  <rect x="380" y="222" width="150" height="80" rx="10" fill="#10B981" opacity="0.12" stroke="#10B981" stroke-width="2"/>
  <text x="455" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">Claude Code</text>
  <text x="455" y="268" text-anchor="middle" font-size="10" fill="#374151">Native code generation</text>
  <text x="455" y="283" text-anchor="middle" font-size="10" fill="#374151">Auto test writing</text>

  <!-- Arrow 4→5 -->
  <path d="M530 262 L560 262" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 5: review -->
  <rect x="562" y="222" width="150" height="80" rx="10" fill="#F59E0B" opacity="0.12" stroke="#F59E0B" stroke-width="2"/>
  <text x="637" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">/review</text>
  <text x="637" y="268" text-anchor="middle" font-size="10" fill="#374151">Staff engineer-level</text>
  <text x="637" y="283" text-anchor="middle" font-size="10" fill="#374151">code review + auto-fix</text>

  <!-- Arrow 5→6 -->
  <path d="M712 262 L742 262" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 6: qa -->
  <rect x="744" y="222" width="136" height="80" rx="10" fill="#EF4444" opacity="0.1" stroke="#EF4444" stroke-width="2"/>
  <text x="812" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#B91C1C">/qa [url]</text>
  <text x="812" y="268" text-anchor="middle" font-size="10" fill="#374151">Real Chromium browser</text>
  <text x="812" y="283" text-anchor="middle" font-size="10" fill="#374151">~100ms commands</text>

  <!-- Down arrow from qa -->
  <path d="M812 302 L812 332" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 7: ship -->
  <rect x="744" y="334" width="136" height="80" rx="10" fill="#4F46E5" opacity="0.12" stroke="#4F46E5" stroke-width="2"/>
  <text x="812" y="362" text-anchor="middle" font-size="13" font-weight="700" fill="#4338CA">/ship</text>
  <text x="812" y="380" text-anchor="middle" font-size="10" fill="#374151">Test sync</text>
  <text x="812" y="395" text-anchor="middle" font-size="10" fill="#374151">PR creation + coverage audit</text>

  <!-- Arrow ship → land-and-deploy (left) -->
  <path d="M744 374 L714 374" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Node 8: land-and-deploy -->
  <rect x="562" y="334" width="150" height="80" rx="10" fill="#EF4444" opacity="0.12" stroke="#EF4444" stroke-width="2"/>
  <text x="637" y="358" text-anchor="middle" font-size="12" font-weight="700" fill="#991B1B">/land-and-deploy</text>
  <text x="637" y="376" text-anchor="middle" font-size="10" fill="#374151">Merge + deploy verify</text>
  <text x="637" y="391" text-anchor="middle" font-size="10" fill="#374151">Production health check</text>

  <!-- Arrow to canary -->
  <path d="M562 374 L532 374" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Node 9: canary -->
  <rect x="380" y="334" width="150" height="80" rx="10" fill="#10B981" opacity="0.12" stroke="#10B981" stroke-width="2"/>
  <text x="455" y="362" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">/canary</text>
  <text x="455" y="380" text-anchor="middle" font-size="10" fill="#374151">Post-deploy monitoring</text>
  <text x="455" y="395" text-anchor="middle" font-size="10" fill="#374151">Anomaly detection</text>

  <!-- Review feedback loop -->
  <path d="M637 334 Q637 310 560 310 Q480 310 455 310 L455 302" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-fix)" fill="none"/>
  <text x="548" y="305" text-anchor="middle" font-size="9" fill="#92400E">Re-review if fixes needed</text>

  <!-- retro -->
  <rect x="198" y="446" width="150" height="60" rx="10" fill="#6B7280" opacity="0.12" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="273" y="474" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">/retro</text>
  <text x="273" y="491" text-anchor="middle" font-size="10" fill="#6B7280">Weekly team metrics review</text>

  <!-- Legend -->
  <rect x="20" y="470" width="160" height="70" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="100" y="490" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Legend</text>
  <circle cx="36" cy="506" r="5" fill="#4F46E5"/>
  <text x="48" y="510" font-size="10" fill="#374151">Planning/deploy skill</text>
  <circle cx="36" cy="524" r="5" fill="#10B981"/>
  <text x="48" y="528" font-size="10" fill="#374151">Dev skill</text>
  <circle cx="110" cy="506" r="5" fill="#F59E0B"/>
  <text x="122" y="510" font-size="10" fill="#374151">Review skill</text>
  <circle cx="110" cy="524" r="5" fill="#EF4444"/>
  <text x="122" y="528" font-size="10" fill="#374151">QA/deploy skill</text>
</svg>
