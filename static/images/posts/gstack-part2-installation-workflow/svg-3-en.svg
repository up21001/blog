  <text x="100" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#4F46E5">/office-hours</text>
  <text x="100" y="150" text-anchor="middle" font-size="10" fill="#374151">Product framing session</text>
  <text x="100" y="164" text-anchor="middle" font-size="10" fill="#6B7280">Planning phase</text>

  <path d="M180 140 L210 140" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

