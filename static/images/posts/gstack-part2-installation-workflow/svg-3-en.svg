  <text x="566" y="227" text-anchor="middle" font-size="10" fill="#065F46">Architecture decisions</text>
  <text x="566" y="243" text-anchor="middle" font-size="10" fill="#065F46">TDD strategy setup</text>

  <path d="M646 220 L676 220" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="679" y="188" width="200" height="64" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
