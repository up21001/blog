  <text x="333" y="403" text-anchor="middle" font-size="10" fill="#374151">· User flow description</text>

  <path d="M453 380 L483 380" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="486" y="348" width="160" height="64" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
