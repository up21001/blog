  <text x="570" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#6B7280">Processing</text>
  <text x="790" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#6B7280">Output</text>

  <line x1="20" y1="97" x2="880" y2="97" stroke="#E5E7EB" stroke-width="1"/>

  <!-- ROW 1: office-hours -->
