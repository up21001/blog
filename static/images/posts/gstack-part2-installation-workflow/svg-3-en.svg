  <text x="566" y="323" text-anchor="middle" font-size="10" fill="#92400E">Auto-fix application</text>

  <path d="M646 300 L676 300" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="679" y="268" width="200" height="64" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
