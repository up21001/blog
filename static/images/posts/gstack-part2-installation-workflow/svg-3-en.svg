  <text x="333" y="467" text-anchor="middle" font-size="10" fill="#374151">· Commit history</text>
  <text x="333" y="483" text-anchor="middle" font-size="10" fill="#374151">· Deployment target environment</text>

  <path d="M453 460 L483 460" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="486" y="428" width="160" height="64" rx="8" fill="#EDE9FE" stroke="#4F46E5" stroke-width="1"/>
  <text x="566" y="450" text-anchor="middle" font-size="10" fill="#4338CA">Test sync</text>
  <text x="566" y="467" text-anchor="middle" font-size="10" fill="#4338CA">Auto PR creation</text>
  <text x="566" y="483" text-anchor="middle" font-size="10" fill="#4338CA">Deploy + health check</text>

  <path d="M646 460 L676 460" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="679" y="428" width="200" height="64" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="779" y="450" text-anchor="middle" font-size="10" fill="#374151">· Merged PR URL</text>
  <text x="779" y="467" text-anchor="middle" font-size="10" fill="#374151">· Coverage audit report</text>
  <text x="779" y="483" text-anchor="middle" font-size="10" fill="#374151">· Production health dashboard</text>

  <text x="450" y="520" text-anchor="middle" font-size="11" fill="#6B7280">Each skill uses the previous step's output as input, automatically forming a pipeline</text>
