  <text x="566" y="387" text-anchor="middle" font-size="10" fill="#B91C1C">Click/type/navigate</text>
  <text x="566" y="403" text-anchor="middle" font-size="10" fill="#B91C1C">Screenshot capture</text>

  <path d="M646 380 L676 380" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="679" y="348" width="200" height="64" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
