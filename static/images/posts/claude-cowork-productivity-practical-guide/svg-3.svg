<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Instruction blueprint">
  <rect width="1200" height="560" fill="#0b1220"/>
  <text x="60" y="78" fill="#e5e7eb" font-size="40" font-family="Arial" font-weight="700">Instruction Blueprint</text>
  <text x="60" y="112" fill="#94a3b8" font-size="22" font-family="Arial">Set stable context before running workflows</text>
  <rect x="60" y="150" width="1080" height="340" rx="16" fill="#111827" stroke="#334155"/>
  <rect x="90" y="190" width="240" height="250" rx="12" fill="#1f2937"/>
  <rect x="360" y="190" width="240" height="250" rx="12" fill="#1f2937"/>
  <rect x="630" y="190" width="240" height="250" rx="12" fill="#1f2937"/>
  <rect x="900" y="190" width="210" height="250" rx="12" fill="#1f2937"/>
  <text x="110" y="235" fill="#e2e8f0" font-size="24" font-family="Arial" font-weight="700">Role</text>
