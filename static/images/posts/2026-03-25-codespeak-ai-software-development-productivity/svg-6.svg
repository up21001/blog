<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrowhead marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>

  <!-- Components -->

  <!-- Client -->
  <rect x="40" y="50" width="120" height="60" rx="10" ry="10" fill="#E0E0E0" filter="url(#shadow)"/>
  <text x="100" y="85" font-family="Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle">Client</text>

  <!-- Load Balancer -->
  <rect x="200" y="150" width="150" height="60" rx="10" ry="10" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="275" y="185" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle">Load Balancer</text>

  <!-- Web Servers -->
  <rect x="150" y="270" width="120" height="60" rx="10" ry="10" fill="#50C878" filter="url(#shadow)"/>
  <text x="210" y="305" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle">Web Server 1</text>

  <rect x="300" y="270" width="120" height="60" rx="10" ry="10" fill="#50C878" filter="url(#shadow)"/>
  <text x="360" y="305" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle">Web Server 2</text>

  <!-- Application Servers -->
  <rect x="150" y="390" width="120" height="60" rx="10" ry="10" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="210" y="425" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle">App Server 1</text>

  <rect x="300" y="390" width="120" height="60" rx="10" ry="10" fill="#6C5CE7" filter="url(#shadow)"/>
  <text x="360" y="425" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle">App Server 2</text>

  <!-- Cache -->
  <rect x="500" y="330" width="120" height="60" rx="10" ry="10" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="560" y="365" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle">Cache</text>

  <!-- Database -->
  <rect x="650" y="330" width="120" height="60" rx="10" ry="10" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="710" y="365" font-family="Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle">Database</text>

  <!-- Connections -->

  <!-- Client to Load Balancer -->
  <line x1="100" y1="110" x2="275" y2="150" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Load Balancer to Web Servers -->
  <line x1="275" y1="210" x2="210" y2="270" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="275" y1="210" x2="360" y2="270" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Web Servers to Application Servers -->
  <line x1="210" y1="330" x2="210" y2="390" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="360" y1="330" x2="360" y2="390" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Application Servers to Cache -->
  <line x1="270" y1="420" x2="500" y2="360" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="420" x2="500" y2="370" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Cache to Database -->
  <line x1="620" y1="360" x2="650" y2="360" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Application Servers to Database (direct path for cache miss/writes) -->
  <line x1="420" y1="420" x2="650" y2="380" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

</svg>