<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#333"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>

  <!-- Components -->

  <!-- User -->
  <text x="400" y="40" text-anchor="middle" font-size="20" fill="#333">사용자 (User)</text>

  <!-- Web/Mobile Client -->
  <rect x="325" y="80" width="150" height="70" rx="10" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="400" y="120" text-anchor="middle" font-size="14" fill="#fff">웹/모바일 클라이언트</text>
  <text x="400" y="138" text-anchor="middle" font-size="12" fill="#fff">(Web/Mobile Client)</text>

  <!-- API Gateway / Load Balancer -->
  <rect x="300" y="180" width="200" height="70" rx="10" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="400" y="220" text-anchor="middle" font-size="14" fill="#fff">API 게이트웨이 / 로드 밸런서</text>
  <text x="400" y="238" text-anchor="middle" font-size="12" fill="#fff">(API Gateway / Load Balancer)</text>

  <!-- Web/Application Servers -->
  <rect x="150" y="300" width="150" height="70" rx="10" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="225" y="340" text-anchor="middle" font-size="14" fill="#fff">웹/애플리케이션 서버</text>
  <text x="225" y="358" text-anchor="middle" font-size="12" fill="#fff">(App Server 1)</text>

  <rect x="325" y="300" width="150" height="70" rx="10" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="400" y="340" text-anchor="middle" font-size="14" fill="#fff">웹/애플리케이션 서버</text>
  <text x="400" y="358" text-anchor="middle" font-size="12" fill="#fff">(App Server 2)</text>

  <rect x="500" y="300" width="150" height="70" rx="10" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="575" y="340" text-anchor="middle" font-size="14" fill="#fff">웹/애플리케이션 서버</text>
  <text x="575" y="358" text-anchor="middle" font-size="12" fill="#fff">(App Server 3)</text>

  <!-- Database -->
  <rect x="200" y="450" width="150" height="70" rx="10" fill="#50C878" filter="url(#shadow)"/>
  <text x="275" y="490" text-anchor="middle" font-size="14" fill="#fff">데이터베이스</text>
  <text x="275" y="508" text-anchor="middle" font-size="12" fill="#fff">(Database)</text>

  <!-- Cache Server -->
  <rect x="450" y="450" width="150" height="70" rx="10" fill="#FFD93D" filter="url(#shadow)"/>
  <text x="525" y="490" text-anchor="middle" font-size="14" fill="#333">캐시 서버</text>
  <text x="525" y="508" text-anchor="middle" font-size="12" fill="#333">(Cache Server)</text>

  <!-- Arrows -->
  <line x1="400" y1="50" x2="400" y2="80" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="150" x2="400" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- API Gateway to App Servers -->
  <line x1="400" y1="250" x2="225" y2="300" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="250" x2="400" y2="300" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="250" x2="575" y2="300" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- App Servers to Database -->
  <line x1="225" y1="370" x2="275" y2="450" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="370" x2="290" y2="450" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="575" y1="370" x2="310" y2="450" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- App Servers to Cache Server -->
  <line x1="225" y1="370" x2="490" y2="450" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="370" x2="525" y2="450" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="575" y1="370" x2="525" y2="450" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

</svg>