<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <rect width="820" height="480" fill="#FFFFFF"/>
  <rect x="0" y="0" width="820" height="60" fill="#FDF4FF" rx="0"/>
  <text x="410" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#581C87">양자 컴퓨팅 3대 핵심 원리</text>
  <text x="410" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">양자 컴퓨팅이 강력한 이유 — 중첩 · 얽힘 · 간섭</text>

  <!-- Principle 1: Superposition -->
  <rect x="30" y="80" width="240" height="360" rx="14" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <rect x="30" y="80" width="240" height="52" rx="14" fill="#3B82F6"/>
  <rect x="30" y="118" width="240" height="14" fill="#3B82F6"/>
  <text x="150" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">① 양자 중첩</text>
  <text x="150" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="32">🌀</text>
  <text x="150" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1D4ED8">Quantum Superposition</text>
  <line x1="50" y1="214" x2="250" y2="214" stroke="#BFDBFE" stroke-width="1"/>
  <text x="150" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">큐비트가 0과 1을</text>
  <text x="150" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">동시에 존재하는 상태</text>
  <text x="150" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">마치 공중에 던진 동전처럼</text>
  <text x="150" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">측정 전까지 앞/뒤 동시 가능</text>
  <rect x="55" y="345" width="180" height="44" rx="8" fill="#DBEAFE"/>
  <text x="145" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1E40AF">효과: 여러 답을</text>
  <text x="145" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1E40AF">동시에 탐색 가능</text>
  <text x="150" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">n개 큐비트 = 2ⁿ 상태 동시 처리</text>

  <!-- Principle 2: Entanglement -->
  <rect x="290" y="80" width="240" height="360" rx="14" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <rect x="290" y="80" width="240" height="52" rx="14" fill="#22C55E"/>
  <rect x="290" y="118" width="240" height="14" fill="#22C55E"/>
  <text x="410" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">② 양자 얽힘</text>
  <text x="410" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="32">🔗</text>
  <text x="410" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803D">Quantum Entanglement</text>
  <line x1="310" y1="214" x2="510" y2="214" stroke="#BBF7D0" stroke-width="1"/>
  <text x="410" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">두 큐비트가 연결되어</text>
  <text x="410" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">하나를 측정하면 나머지도</text>
  <text x="410" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">즉시 상태가 결정됨</text>
  <text x="410" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">거리와 무관하게 즉각 반응</text>
  <text x="410" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">(Einstein: "귀신 같은 원격 작용")</text>
  <rect x="315" y="358" width="190" height="44" rx="8" fill="#DCFCE7"/>
  <text x="410" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">효과: 큐비트들이</text>
  <text x="410" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">협력하여 연산 처리</text>
  <text x="410" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">양자 통신 · 암호화 핵심 원리</text>

  <!-- Principle 3: Interference -->
  <rect x="550" y="80" width="240" height="360" rx="14" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <rect x="550" y="80" width="240" height="52" rx="14" fill="#F59E0B"/>
  <rect x="550" y="118" width="240" height="14" fill="#F59E0B"/>
  <text x="670" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">③ 양자 간섭</text>
  <text x="670" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="32">〰️</text>
  <text x="670" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#B45309">Quantum Interference</text>
  <line x1="570" y1="214" x2="770" y2="214" stroke="#FDE68A" stroke-width="1"/>
  <text x="670" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">잘못된 답의 경로는</text>
  <text x="670" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">상쇄하고, 올바른 답의</text>
  <text x="670" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">경로는 강화하는 원리</text>
  <text x="670" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">파동의 보강·상쇄 간섭과</text>
  <text x="670" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">동일한 물리 원리 적용</text>
  <rect x="575" y="358" width="190" height="44" rx="8" fill="#FEF3C7"/>
  <text x="670" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400E">효과: 알고리즘 효율</text>
  <text x="670" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400E">극대화 — 최적 답 도출</text>
  <text x="670" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">양자 알고리즘의 핵심 메커니즘</text>

  <text x="410" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">양자 컴퓨팅 핵심 원리 · 2026</text>
</svg>
