<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <rect width="820" height="480" fill="#FFFFFF"/>
  <rect x="0" y="0" width="820" height="60" fill="#FDF4FF" rx="0"/>
  <text x="410" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#581C87">3 Core Principles of Quantum Computing</text>
  <text x="410" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">Why Quantum Computers Are Powerful — Superposition · Entanglement · Interference</text>

  <!-- Principle 1: Superposition -->
  <rect x="30" y="80" width="240" height="360" rx="14" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <rect x="30" y="80" width="240" height="52" rx="14" fill="#3B82F6"/>
  <rect x="30" y="118" width="240" height="14" fill="#3B82F6"/>
  <text x="150" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">① Superposition</text>
  <text x="150" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="32">🌀</text>
  <text x="150" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1D4ED8">Quantum Superposition</text>
  <line x1="50" y1="214" x2="250" y2="214" stroke="#BFDBFE" stroke-width="1"/>
  <text x="150" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">A qubit exists as both</text>
  <text x="150" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">0 and 1 simultaneously</text>
  <text x="150" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Like a spinning coin in the air —</text>
  <text x="150" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">heads AND tails until it lands</text>
  <rect x="55" y="345" width="180" height="44" rx="8" fill="#DBEAFE"/>
  <text x="145" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1E40AF">Effect: Explore many</text>
  <text x="145" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1E40AF">solutions simultaneously</text>
  <text x="150" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">n qubits = 2ⁿ states processed at once</text>

  <!-- Principle 2: Entanglement -->
  <rect x="290" y="80" width="240" height="360" rx="14" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <rect x="290" y="80" width="240" height="52" rx="14" fill="#22C55E"/>
  <rect x="290" y="118" width="240" height="14" fill="#22C55E"/>
  <text x="410" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">② Entanglement</text>
  <text x="410" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="32">🔗</text>
  <text x="410" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803D">Quantum Entanglement</text>
  <line x1="310" y1="214" x2="510" y2="214" stroke="#BBF7D0" stroke-width="1"/>
  <text x="410" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">Two qubits are linked —</text>
  <text x="410" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">measuring one instantly</text>
  <text x="410" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">determines the other</text>
  <text x="410" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Instantaneous correlation</text>
  <text x="410" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">(Einstein: "spooky action at a distance")</text>
  <rect x="315" y="358" width="190" height="44" rx="8" fill="#DCFCE7"/>
  <text x="410" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">Effect: Qubits work</text>
  <text x="410" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">together on computations</text>
  <text x="410" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Core of quantum cryptography &amp; comms</text>

  <!-- Principle 3: Interference -->
  <rect x="550" y="80" width="240" height="360" rx="14" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <rect x="550" y="80" width="240" height="52" rx="14" fill="#F59E0B"/>
  <rect x="550" y="118" width="240" height="14" fill="#F59E0B"/>
  <text x="670" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">③ Interference</text>
  <text x="670" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="32">〰️</text>
  <text x="670" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#B45309">Quantum Interference</text>
  <line x1="570" y1="214" x2="770" y2="214" stroke="#FDE68A" stroke-width="1"/>
  <text x="670" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">Wrong-answer paths cancel out;</text>
  <text x="670" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">correct-answer paths</text>
  <text x="670" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">are amplified</text>
  <text x="670" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Same wave mechanics as</text>
  <text x="670" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">light constructive/destructive interference</text>
  <rect x="575" y="358" width="190" height="44" rx="8" fill="#FEF3C7"/>
  <text x="670" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400E">Effect: Maximizes</text>
  <text x="670" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400E">algorithm efficiency</text>
  <text x="670" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Core mechanism of quantum algorithms</text>

  <text x="410" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Core Principles of Quantum Computing · 2026</text>
</svg>
