<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <rect width="820" height="480" fill="#FFFFFF"/>
  <rect x="0" y="0" width="820" height="60" fill="#FFFBEB" rx="0"/>
  <text x="410" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#78350F">4 Industries Quantum Computing Will Transform</text>
  <text x="410" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">The Core Areas Where Innovation Will Arrive First</text>

  <!-- Card 1: Drug Discovery -->
  <rect x="30" y="80" width="370" height="170" rx="14" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="50" y="116" font-family="Arial, sans-serif" font-size="32">💊</text>
  <text x="105" y="108" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1D4ED8">Drug Discovery &amp; Molecular Design</text>
  <text x="105" y="128" font-family="Arial, sans-serif" font-size="12" fill="#475569">Most anticipated near-term application</text>
  <line x1="50" y1="140" x2="380" y2="140" stroke="#BFDBFE" stroke-width="1"/>
  <text x="50" y="164" font-family="Arial, sans-serif" font-size="12" fill="#334155">• Precise simulation of molecular &amp; protein interactions</text>
  <text x="50" y="184" font-family="Arial, sans-serif" font-size="12" fill="#334155">• Drug discovery timeline: decades → years</text>
  <text x="50" y="204" font-family="Arial, sans-serif" font-size="12" fill="#334155">• Precision medicine &amp; atom-by-atom material design</text>
  <rect x="50" y="220" width="330" height="22" rx="6" fill="#DBEAFE"/>
  <text x="215" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1E40AF">Players: Pfizer, Roche, BASF, Samsung SDI</text>

  <!-- Card 2: Cryptography -->
  <rect x="420" y="80" width="370" height="170" rx="14" fill="#FFF1F2" stroke="#F43F5E" stroke-width="2"/>
  <text x="440" y="116" font-family="Arial, sans-serif" font-size="32">🔐</text>
  <text x="495" y="108" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#BE123C">Cryptography &amp; Cybersecurity</text>
  <text x="495" y="128" font-family="Arial, sans-serif" font-size="12" fill="#475569">Requires action right now</text>
  <line x1="440" y1="140" x2="770" y2="140" stroke="#FECDD3" stroke-width="1"/>
  <text x="440" y="164" font-family="Arial, sans-serif" font-size="12" fill="#334155">• Shor's algorithm can break RSA encryption</text>
  <text x="440" y="184" font-family="Arial, sans-serif" font-size="12" fill="#334155">• NIST post-quantum standards already finalized</text>
  <text x="440" y="204" font-family="Arial, sans-serif" font-size="12" fill="#334155">• "Harvest now, decrypt later" attacks are real</text>
  <rect x="440" y="220" width="330" height="22" rx="6" fill="#FFE4E6"/>
  <text x="605" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#BE123C">Immediate action needed — plan migration now</text>

  <!-- Card 3: Finance -->
  <rect x="30" y="270" width="370" height="170" rx="14" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="50" y="306" font-family="Arial, sans-serif" font-size="32">📈</text>
  <text x="105" y="298" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#15803D">Financial Optimization &amp; Risk</text>
  <text x="105" y="318" font-family="Arial, sans-serif" font-size="12" fill="#475569">Most active investment area</text>
  <line x1="50" y1="330" x2="380" y2="330" stroke="#BBF7D0" stroke-width="1"/>
  <text x="50" y="354" font-family="Arial, sans-serif" font-size="12" fill="#334155">• Portfolio optimization &amp; derivatives pricing</text>
  <text x="50" y="374" font-family="Arial, sans-serif" font-size="12" fill="#334155">• QAOA for combinatorial optimization</text>
  <text x="50" y="394" font-family="Arial, sans-serif" font-size="12" fill="#334155">• Higher-fidelity real-time risk simulation</text>
  <rect x="50" y="410" width="330" height="22" rx="6" fill="#DCFCE7"/>
  <text x="215" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">Players: JPMorgan, Goldman Sachs, BlackRock</text>

  <!-- Card 4: AI/ML -->
  <rect x="420" y="270" width="370" height="170" rx="14" fill="#FDF4FF" stroke="#A855F7" stroke-width="2"/>
  <text x="440" y="306" font-family="Arial, sans-serif" font-size="32">🧠</text>
  <text x="495" y="298" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#7E22CE">Artificial Intelligence &amp; ML</text>
  <text x="495" y="318" font-family="Arial, sans-serif" font-size="12" fill="#475569">Longest-term but highest impact</text>
  <line x1="440" y1="330" x2="770" y2="330" stroke="#E9D5FF" stroke-width="1"/>
  <text x="440" y="354" font-family="Arial, sans-serif" font-size="12" fill="#334155">• Quantum ML (QML) accelerates learning</text>
  <text x="440" y="374" font-family="Arial, sans-serif" font-size="12" fill="#334155">• Faster large-scale neural network optimization</text>
  <text x="440" y="394" font-family="Arial, sans-serif" font-size="12" fill="#334155">• Potential to slash AI training cost &amp; time</text>
  <rect x="440" y="410" width="330" height="22" rx="6" fill="#F3E8FF"/>
  <text x="605" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7E22CE">Players: Google, IBM, Microsoft, NVIDIA</text>

  <text x="410" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Quantum Computing Applications · 2026</text>
</svg>
