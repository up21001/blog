<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" width="820" height="460">
  <rect width="820" height="460" fill="#FFFFFF"/>
  <rect x="0" y="0" width="820" height="60" fill="#F0F9FF" rx="0"/>
  <text x="410" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0C4A6E">고전 컴퓨팅 vs 양자 컴퓨팅</text>
  <text x="410" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">비트와 큐비트 — 두 패러다임의 근본적 차이</text>

  <!-- Classical Side -->
  <rect x="30" y="80" width="360" height="340" rx="14" fill="#F8FAFC" stroke="#94A3B8" stroke-width="2"/>
  <text x="210" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#334155">🖥️ 고전 컴퓨터</text>

  <!-- Bit visualization -->
  <rect x="80" y="130" width="60" height="60" rx="8" fill="#E2E8F0" stroke="#94A3B8" stroke-width="2"/>
  <text x="110" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#334155">0</text>
  <rect x="200" y="130" width="60" height="60" rx="8" fill="#334155" stroke="#94A3B8" stroke-width="2"/>
  <text x="230" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="290" y="165" font-family="Arial, sans-serif" font-size="12" fill="#64748B">← 비트</text>
  <text x="210" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748B">0 또는 1 — 둘 중 하나만</text>

  <line x1="60" y1="240" x2="370" y2="240" stroke="#E2E8F0" stroke-width="1"/>

  <text x="210" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#475569">특성</text>
  <text x="210" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748B">• 결정론적 연산</text>
  <text x="210" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748B">• 순차적 문제 해결</text>
  <text x="210" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748B">• 실온에서 안정 작동</text>
  <text x="210" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748B">• 성숙한 기술, 범용성</text>
  <rect x="60" y="376" width="300" height="28" rx="6" fill="#E2E8F0"/>
  <text x="210" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">10비트 → 동시에 1개 상태 표현</text>

  <!-- VS divider -->
  <text x="410" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#94A3B8">VS</text>

  <!-- Quantum Side -->
  <rect x="430" y="80" width="360" height="340" rx="14" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="610" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1D4ED8">⚛️ 양자 컴퓨터</text>

  <!-- Qubit visualization -->
  <circle cx="530" cy="162" r="32" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="530" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1D4ED8">0</text>
  <text x="530" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1D4ED8">1</text>
  <text x="530" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7C3AED">+</text>
  <text x="600" y="158" font-family="Arial, sans-serif" font-size="12" fill="#64748B">← 큐비트</text>
  <text x="600" y="176" font-family="Arial, sans-serif" font-size="12" fill="#64748B">  (중첩 상태)</text>
  <text x="610" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3B82F6">0과 1 동시 — 측정 전까지</text>

  <line x1="450" y1="240" x2="770" y2="240" stroke="#BFDBFE" stroke-width="1"/>

  <text x="610" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1D4ED8">특성</text>
  <text x="610" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2563EB">• 확률론적 연산 (중첩)</text>
  <text x="610" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2563EB">• 병렬 상태 탐색</text>
  <text x="610" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2563EB">• 극저온 필요 (-273°C)</text>
  <text x="610" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2563EB">• 특정 문제에 지수적 우위</text>
  <rect x="450" y="376" width="300" height="28" rx="6" fill="#DBEAFE"/>
  <text x="610" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1D4ED8">10큐비트 → 동시에 1024개 상태!</text>

  <text x="410" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">고전 컴퓨팅 vs 양자 컴퓨팅 · 2026</text>
</svg>
