<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <rect width="820" height="480" fill="#FFFFFF"/>
  <rect x="0" y="0" width="820" height="60" fill="#F0F9FF" rx="0"/>
  <text x="410" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0C4A6E">Quantum Computing Development Roadmap</text>
  <text x="410" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">Evolution Path from the NISQ Era to Universal Quantum Computing</text>

  <!-- Stage 1: NISQ Era -->
  <rect x="30" y="80" width="230" height="340" rx="14" fill="#F1F5F9" stroke="#94A3B8" stroke-width="2"/>
  <rect x="30" y="80" width="230" height="48" rx="14" fill="#64748B"/>
  <rect x="30" y="114" width="230" height="14" fill="#64748B"/>
  <text x="145" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">📍 Now — NISQ Era</text>
  <text x="145" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">2019 – Present</text>
  <text x="145" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#334155">Tens to Thousands of Qubits</text>
  <line x1="50" y1="192" x2="240" y2="192" stroke="#E2E8F0" stroke-width="1"/>
  <text x="50" y="216" font-family="Arial, sans-serif" font-size="12" fill="#475569">• High error rates limit</text>
  <text x="50" y="236" font-family="Arial, sans-serif" font-size="12" fill="#475569">  practical problem solving</text>
  <text x="50" y="258" font-family="Arial, sans-serif" font-size="12" fill="#475569">• Google Willow: 105 qubits</text>
  <text x="50" y="278" font-family="Arial, sans-serif" font-size="12" fill="#475569">• IBM Condor: 1000+ qubits</text>
  <text x="50" y="300" font-family="Arial, sans-serif" font-size="12" fill="#475569">• Active error correction R&amp;D</text>
  <rect x="50" y="330" width="190" height="52" rx="8" fill="#E2E8F0"/>
  <text x="145" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#334155">Benchmarks &amp; Research</text>
  <text x="145" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Limited commercial use</text>

  <!-- Arrow 1 -->
  <text x="292" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#3B82F6">→</text>

  <!-- Stage 2: Error-corrected -->
  <rect x="305" y="80" width="210" height="340" rx="14" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <rect x="305" y="80" width="210" height="48" rx="14" fill="#3B82F6"/>
  <rect x="305" y="114" width="210" height="14" fill="#3B82F6"/>
  <text x="410" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">🔜 Near-to-Mid Term</text>
  <text x="410" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3B82F6">2026 – 2032</text>
  <text x="410" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1D4ED8">Error-Corrected Quantum</text>
  <line x1="325" y1="192" x2="495" y2="192" stroke="#BFDBFE" stroke-width="1"/>
  <text x="325" y="216" font-family="Arial, sans-serif" font-size="12" fill="#475569">• Hundreds of logical qubits</text>
  <text x="325" y="236" font-family="Arial, sans-serif" font-size="12" fill="#475569">• Stable error correction</text>
  <text x="325" y="258" font-family="Arial, sans-serif" font-size="12" fill="#475569">• First quantum advantage</text>
  <text x="325" y="278" font-family="Arial, sans-serif" font-size="12" fill="#2563EB">  on real problems</text>
  <text x="325" y="298" font-family="Arial, sans-serif" font-size="12" fill="#475569">• Pharma, finance, logistics</text>
  <text x="325" y="318" font-family="Arial, sans-serif" font-size="12" fill="#475569">  commercial use begins</text>
  <rect x="325" y="330" width="170" height="52" rx="8" fill="#DBEAFE"/>
  <text x="410" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1D4ED8">Limited Practical Use</text>
  <text x="410" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3B82F6">ROI for specific industries</text>

  <!-- Arrow 2 -->
  <text x="528" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#8B5CF6">→</text>

  <!-- Stage 3: Universal -->
  <rect x="550" y="80" width="240" height="340" rx="14" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
  <rect x="550" y="80" width="240" height="48" rx="14" fill="#8B5CF6"/>
  <rect x="550" y="114" width="240" height="14" fill="#8B5CF6"/>
  <text x="670" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">🚀 Long-Term Vision</text>
  <text x="670" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8B5CF6">2032 and Beyond</text>
  <text x="670" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6D28D9">Universal Quantum Computing</text>
  <line x1="570" y1="192" x2="770" y2="192" stroke="#DDD6FE" stroke-width="1"/>
  <text x="570" y="216" font-family="Arial, sans-serif" font-size="12" fill="#475569">• Thousands of logical qubits</text>
  <text x="570" y="236" font-family="Arial, sans-serif" font-size="12" fill="#475569">• Current encryption rebuilt</text>
  <text x="570" y="258" font-family="Arial, sans-serif" font-size="12" fill="#475569">• AI training paradigm shift</text>
  <text x="570" y="278" font-family="Arial, sans-serif" font-size="12" fill="#7C3AED">• Scientific discovery accelerated</text>
  <text x="570" y="298" font-family="Arial, sans-serif" font-size="12" fill="#475569">• Molecular biology &amp; materials</text>
  <text x="570" y="318" font-family="Arial, sans-serif" font-size="12" fill="#475569">  research fully transformed</text>
  <rect x="570" y="330" width="200" height="52" rx="8" fill="#EDE9FE"/>
  <text x="670" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6D28D9">Industry-Wide Revolution</text>
  <text x="670" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7C3AED">Timeline still subject to change</text>

  <text x="410" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Quantum Computing Roadmap · 2026</text>
</svg>
