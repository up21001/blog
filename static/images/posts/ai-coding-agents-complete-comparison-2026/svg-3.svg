<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#2c3e50">가격 대 자율성 2x2 매트릭스</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">어디에 얼마를 투자할지 판단하는 기준</text>

  <!-- Axis -->
  <line x1="120" y1="440" x2="720" y2="440" stroke="#2c3e50" stroke-width="1.5"/>
  <polygon points="720,440 713,436 713,444" fill="#2c3e50"/>
  <line x1="120" y1="440" x2="120" y2="100" stroke="#2c3e50" stroke-width="1.5"/>
  <polygon points="120,100 116,107 124,107" fill="#2c3e50"/>

  <text x="730" y="445" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">자율성</text>
  <text x="120" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">가격</text>

  <!-- Quadrant lines -->
  <line x1="420" y1="440" x2="420" y2="100" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="270" x2="720" y2="270" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="270" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">고가 · 저자율</text>
  <text x="570" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">고가 · 고자율</text>
  <text x="270" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">저가 · 저자율</text>
  <text x="570" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">저가 · 고자율</text>

  <!-- Cursor -->
  <circle cx="280" cy="360" r="30" fill="#3498db" opacity="0.85"/>
  <text x="280" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Cursor</text>
  <text x="280" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">$20/월</text>

  <!-- Windsurf -->
  <circle cx="340" cy="330" r="30" fill="#16a085" opacity="0.85"/>
  <text x="340" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Windsurf</text>
  <text x="340" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">$15-40/월</text>

  <!-- Cline -->
  <circle cx="460" cy="355" r="30" fill="#f39c12" opacity="0.85"/>
  <text x="460" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Cline</text>
  <text x="460" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">API 사용량</text>

  <!-- Claude Code -->
  <circle cx="560" cy="250" r="32" fill="#9b59b6" opacity="0.85"/>
  <text x="560" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Claude</text>
  <text x="560" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Code</text>
  <text x="560" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">구독+API</text>

  <!-- Devin -->
  <circle cx="660" cy="160" r="35" fill="#e74c3c" opacity="0.85"/>
  <text x="660" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Devin</text>
  <text x="660" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">$500+/월</text>

  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">가격은 개인 유료 기준 추정치 · 자율성은 실제 업무 위임 가능 범위 기준</text>
</svg>
