<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#2c3e50">2026년형 3계층 워크플로</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">도구 하나가 아닌 계층별 조합이 정답이다</text>

  <!-- Layer 1 -->
  <rect x="60" y="90" width="680" height="105" rx="12" fill="#ebf5fb" stroke="#3498db" stroke-width="2"/>
  <rect x="60" y="90" width="160" height="105" rx="12" fill="#3498db"/>
  <rect x="200" y="90" width="20" height="105" fill="#3498db"/>
  <text x="140" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">⚡ 즉시 반응</text>
  <text x="140" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ebf5fb">Immediate</text>
  <text x="140" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ebf5fb">IDE 계층</text>
  <text x="240" y="121" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Cursor / Windsurf</text>
  <text x="240" y="143" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 컴포넌트 단위 편집 · 버그 수정</text>
  <text x="240" y="163" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 테스트 초안 · 빠른 Diff 수락</text>
  <text x="240" y="183" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">적합: 키스트로크 단위 피드백 루프</text>

  <!-- Layer 2 -->
  <rect x="60" y="210" width="680" height="105" rx="12" fill="#f4ecf7" stroke="#9b59b6" stroke-width="2"/>
  <rect x="60" y="210" width="160" height="105" rx="12" fill="#9b59b6"/>
  <rect x="200" y="210" width="20" height="105" fill="#9b59b6"/>
  <text x="140" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">🎯 세션 단위</text>
  <text x="140" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f4ecf7">Session</text>
  <text x="140" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f4ecf7">CLI 계층</text>
  <text x="240" y="241" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Claude Code / Cline</text>
  <text x="240" y="263" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• PR 단위 작업 · 훅·MCP 활용</text>
  <text x="240" y="283" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• CI 로그·테스트·릴리스 노트까지</text>
  <text x="240" y="303" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">적합: 1-3시간 집중 세션</text>

  <!-- Layer 3 -->
  <rect x="60" y="330" width="680" height="105" rx="12" fill="#fdecea" stroke="#e74c3c" stroke-width="2"/>
  <rect x="60" y="330" width="160" height="105" rx="12" fill="#e74c3c"/>
  <rect x="200" y="330" width="20" height="105" fill="#e74c3c"/>
  <text x="140" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">🤖 비동기 위임</text>
  <text x="140" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fdecea">Async</text>
  <text x="140" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fdecea">클라우드 계층</text>
  <text x="240" y="361" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Devin</text>
  <text x="240" y="383" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 수 시간 단위 마이그레이션</text>
  <text x="240" y="403" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• 의존성 업데이트 · 문서 자동화</text>
  <text x="240" y="423" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">적합: 스펙 명확 + 최종 PR 리뷰 가능</text>

  <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">귀찮고 반복적인 무거운 일</text>
  <text x="400" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">→ 그 자리에만 가장 비싼 에이전트를 투입한다</text>
</svg>
