<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#2c3e50">AI Coding Agent Architecture Comparison</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">IDE · CLI · Cloud — three layers</text>

  <!-- IDE layer -->
  <rect x="40" y="90" width="720" height="115" rx="10" fill="#ffffff" stroke="#3498db" stroke-width="2"/>
  <text x="60" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3498db">IDE Layer</text>
  <text x="60" y="133" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Inside the editor · inline edits · diff accept</text>

  <rect x="180" y="140" width="150" height="50" rx="8" fill="#ebf5fb" stroke="#3498db" stroke-width="1.5"/>
  <text x="255" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Cursor</text>
  <text x="255" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Composer · Agent modes</text>

  <rect x="360" y="140" width="150" height="50" rx="8" fill="#e8f6f3" stroke="#16a085" stroke-width="1.5"/>
  <text x="435" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Windsurf</text>
  <text x="435" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Cascade · multi-file edits</text>

  <rect x="540" y="140" width="150" height="50" rx="8" fill="#fef5e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="615" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Cline</text>
  <text x="615" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">VS Code ext. · BYO key</text>

  <!-- CLI layer -->
  <rect x="40" y="225" width="720" height="105" rx="10" fill="#ffffff" stroke="#9b59b6" stroke-width="2"/>
  <text x="60" y="250" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#9b59b6">CLI Layer</text>
  <text x="60" y="268" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Terminal-based · hooks · subagents · MCP</text>

  <rect x="260" y="278" width="280" height="40" rx="8" fill="#f4ecf7" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="400" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Claude Code</text>
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Slash commands · hooks · MCP servers · subagents</text>

  <!-- Cloud layer -->
  <rect x="40" y="350" width="720" height="110" rx="10" fill="#ffffff" stroke="#e74c3c" stroke-width="2"/>
  <text x="60" y="375" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">Cloud Layer</text>
  <text x="60" y="393" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Remote VM · built-in browser · PR automation</text>

  <rect x="260" y="405" width="280" height="45" rx="8" fill="#fdecea" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="400" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Devin (Cognition AI)</text>
  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Isolated VM · shell · browser · GitHub integration</text>

  <text x="400" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">Moving downward increases autonomy and reduces real-time intervention</text>
</svg>
