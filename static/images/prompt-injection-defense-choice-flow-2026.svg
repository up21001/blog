<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .bg{fill:#0f172a}
      .box{fill:#111827;stroke:#334155;stroke-width:2;rx:20;ry:20}
      .t1{font:700 50px Arial,sans-serif;fill:#f8fafc}
      .t2{font:400 22px Arial,sans-serif;fill:#cbd5e1}
      .h{font:700 24px Arial,sans-serif;fill:#e2e8f0}
      .p{font:400 18px Arial,sans-serif;fill:#cbd5e1}
      .line{stroke:#f59e0b;stroke-width:5;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" class="bg"/>
  <text x="70" y="82" class="t1">Where does the attack land?</text>
  <text x="70" y="124" class="t2">Use the trust boundary to decide the control point.</text>
  <rect x="70" y="190" width="280" height="110" class="box"/>
  <rect x="460" y="190" width="280" height="110" class="box"/>
  <rect x="850" y="190" width="280" height="110" class="box"/>
  <text x="100" y="232" class="h">Content layer</text>
  <text x="100" y="262" class="p">sanitize, tag, strip commands</text>
  <text x="490" y="232" class="h">Context layer</text>
  <text x="490" y="262" class="p">isolate memory and sources</text>
  <text x="880" y="232" class="h">Action layer</text>
  <text x="880" y="262" class="p">approve tools and side effects</text>
  <path d="M350 245 L460 245" class="line"/>
  <path d="M740 245 L850 245" class="line"/>
  <rect x="70" y="360" width="1030" height="180" class="box"/>
  <text x="95" y="405" class="h">Default policy</text>
  <text x="95" y="445" class="p">Treat every external string as hostile until proven otherwise. Treat every state change as unsafe until approved.</text>
  <text x="95" y="480" class="p">That simple rule prevents most prompt injection failures in production agents.</text>
</svg>
