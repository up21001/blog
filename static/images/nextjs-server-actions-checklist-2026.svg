<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720"><rect width="1200" height="720" fill="#fffaf2"/><text x="70" y="88" font-family="Segoe UI, Arial" font-size="38" font-weight="700" fill="#21384c">Server Actions 체크리스트</text><text x="70" y="126" font-family="Segoe UI, Arial" font-size="20" fill="#5b7388">revalidation과 보안 설정을 같이 봐야 실무에서 안전합니다.</text><rect x="250" y="200" width="700" height="360" rx="28" fill="#0f4c81"/><text x="320" y="265" font-family="Segoe UI, Arial" font-size="26" font-weight="700" fill="#fff">점검 항목</text><text x="320" y="315" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- use server 위치가 명확한가</text><text x="320" y="355" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- revalidate 전략이 있는가</text><text x="320" y="395" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- allowedOrigins가 필요한가</text><text x="320" y="435" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- bodySizeLimit 검토가 필요한가</text><text x="320" y="475" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- 직렬화 가능 인자만 쓰는가</text></svg>
