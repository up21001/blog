<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#f0fdfa"/><text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#155e75">Should You Use Dify?</text><rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#22d3ee"/><text x="486" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#155e75">Need LLM app platform?</text><rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#67e8f9"/><text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">No</text><text x="145" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">A lighter orchestration layer may be enough</text><rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#67e8f9"/><text x="499" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Need workflow and</text><text x="530" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">RAG?</text><rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#67e8f9"/><text x="844" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Need tracing and</text><text x="857" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">MCP tools?</text><rect x="445" y="500" width="320" height="110" rx="26" fill="#155e75"/><text x="531" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ecfeff">Use Dify</text><text x="480" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#ccfbf1">Great for production LLM apps</text></svg>
