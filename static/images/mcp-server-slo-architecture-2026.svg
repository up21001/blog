<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MCP server SLO architecture</title>
  <desc id="desc">Layered architecture for collecting and enforcing SLO metrics.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #fff; }
      .sub { font: 400 18px Arial, sans-serif; fill: #dcfce7; }
      .layer { fill: rgba(255,255,255,0.1); stroke: rgba(255,255,255,0.35); stroke-width: 2; rx: 18; }
      .node { fill: #dcfce7; stroke: #34d399; stroke-width: 2; rx: 16; }
      .text { font: 700 20px Arial, sans-serif; fill: #052e16; }
      .small { font: 400 15px Arial, sans-serif; fill: #052e16; }
      .arrow { stroke: #fff; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#fff"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <text x="60" y="78" class="title">MCP Server SLO Architecture</text>
  <text x="60" y="112" class="sub">Trace every layer, then enforce release rules</text>
  <rect x="80" y="160" width="1040" height="110" class="layer"/>
  <rect x="110" y="185" width="200" height="60" class="node"/>
  <rect x="340" y="185" width="200" height="60" class="node"/>
  <rect x="570" y="185" width="200" height="60" class="node"/>
  <rect x="800" y="185" width="290" height="60" class="node"/>
  <text x="150" y="222" class="text">Agent</text>
  <text x="368" y="222" class="text">Gateway</text>
  <text x="611" y="222" class="text">MCP Server</text>
  <text x="845" y="222" class="text">Dashboards / Alerts</text>
  <path class="arrow" d="M310 215 L340 215"/>
  <path class="arrow" d="M540 215 L570 215"/>
  <path class="arrow" d="M770 215 L800 215"/>
  <rect x="80" y="330" width="340" height="200" class="layer"/>
  <rect x="460" y="330" width="300" height="200" class="layer"/>
  <rect x="800" y="330" width="320" height="200" class="layer"/>
  <text x="110" y="375" class="text" fill="#fff">Metrics</text>
  <text x="110" y="410" class="sub">p95 latency</text>
  <text x="110" y="438" class="sub">success rate</text>
  <text x="110" y="466" class="sub">timeout rate</text>
  <text x="490" y="375" class="text" fill="#fff">Policy</text>
  <text x="490" y="410" class="sub">error budget burn</text>
  <text x="490" y="438" class="sub">release freeze</text>
  <text x="490" y="466" class="sub">rollback trigger</text>
  <text x="830" y="375" class="text" fill="#fff">Action</text>
  <text x="830" y="410" class="sub">continue deploy</text>
  <text x="830" y="438" class="sub">investigate bottleneck</text>
  <text x="830" y="466" class="sub">escalate incident</text>
</svg>

