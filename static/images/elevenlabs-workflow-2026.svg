<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">ElevenLabs Workflow 2026</title>
  <desc id="desc">Workflow for ElevenLabs voice agents with CLI, dashboard, versioning and deployment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#9a3412" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9a3412"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">ElevenLabs Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">Voice agents, CLI, dashboard, versioning and monitoring in one loop</text>

  <rect x="70" y="200" rx="24" ry="24" width="220" height="120" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="115" y="252" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Conversation</text>
  <text x="120" y="286" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">Natural dialogue</text>
  <text x="105" y="308" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">voice / text input</text>

  <rect x="355" y="150" rx="28" ry="28" width="500" height="330" fill="#fffaf5" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <text x="545" y="198" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">ElevenLabs</text>
  <rect x="400" y="232" rx="18" ry="18" width="170" height="88" fill="#fff" stroke="#fdba74"/>
  <text x="444" y="282" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Agents API</text>
  <rect x="610" y="232" rx="18" ry="18" width="170" height="88" fill="#fff" stroke="#fdba74"/>
  <text x="671" y="282" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">CLI</text>
  <rect x="400" y="350" rx="18" ry="18" width="170" height="88" fill="#fff" stroke="#fdba74"/>
  <text x="435" y="400" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Dashboard</text>
  <rect x="610" y="350" rx="18" ry="18" width="170" height="88" fill="#fff" stroke="#fdba74"/>
  <text x="642" y="400" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Versioning</text>
  <rect x="900" y="200" rx="24" ry="24" width="220" height="120" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="955" y="252" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Deploy</text>
  <text x="945" y="286" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">web, telephony, mobile</text>

  <path d="M290 260 C320 260, 330 260, 355 260" fill="none" stroke="#9a3412" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M855 260 C880 260, 890 260, 900 260" fill="none" stroke="#9a3412" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M485 320 C485 335, 485 340, 485 350" fill="none" stroke="#c2410c" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M695 320 C695 335, 695 340, 695 350" fill="none" stroke="#c2410c" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
