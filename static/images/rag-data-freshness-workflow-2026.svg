<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <style>
      .title { font: 700 42px sans-serif; fill: #082f49; }
      .sub { font: 400 20px sans-serif; fill: #0f172a; }
      .boxTitle { font: 700 22px sans-serif; fill: #082f49; }
      .boxText { font: 400 18px sans-serif; fill: #334155; }
      .card { rx: 22; ry: 22; stroke: #7dd3fc; stroke-width: 2; }
    </style>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0369a1"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <text x="70" y="78" class="title">RAG Data Freshness</text>
  <text x="70" y="114" class="sub">최신 문서를 빠르게 반영하는 운영 흐름</text>

  <rect x="70" y="170" width="180" height="120" class="card" fill="#ffffff"/>
  <text x="160" y="218" text-anchor="middle" class="boxTitle">Source</text>
  <text x="160" y="250" text-anchor="middle" class="boxText">문서 변경 감지</text>

  <rect x="290" y="170" width="180" height="120" class="card" fill="#f0f9ff"/>
  <text x="380" y="218" text-anchor="middle" class="boxTitle">Diff</text>
  <text x="380" y="250" text-anchor="middle" class="boxText">변경분 추출</text>

  <rect x="510" y="170" width="180" height="120" class="card" fill="#ecfccb"/>
  <text x="600" y="218" text-anchor="middle" class="boxTitle">Index</text>
  <text x="600" y="250" text-anchor="middle" class="boxText">증분 반영</text>

  <rect x="730" y="170" width="180" height="120" class="card" fill="#fef9c3"/>
  <text x="820" y="218" text-anchor="middle" class="boxTitle">Freshness</text>
  <text x="820" y="250" text-anchor="middle" class="boxText">metadata 기록</text>

  <rect x="950" y="170" width="180" height="120" class="card" fill="#ffe4e6"/>
  <text x="1040" y="218" text-anchor="middle" class="boxTitle">Retrieval</text>
  <text x="1040" y="250" text-anchor="middle" class="boxText">최신 문서 선택</text>

  <line x1="250" y1="230" x2="290" y2="230" stroke="#0369a1" stroke-width="4" marker-end="url(#arrow2)"/>
  <line x1="470" y1="230" x2="510" y2="230" stroke="#0369a1" stroke-width="4" marker-end="url(#arrow2)"/>
  <line x1="690" y1="230" x2="730" y2="230" stroke="#0369a1" stroke-width="4" marker-end="url(#arrow2)"/>
  <line x1="910" y1="230" x2="950" y2="230" stroke="#0369a1" stroke-width="4" marker-end="url(#arrow2)"/>

  <rect x="70" y="350" width="1060" height="150" rx="22" ry="22" fill="#ffffff" stroke="#7dd3fc" stroke-width="2"/>
  <text x="100" y="395" class="boxTitle">운영 지점</text>
  <text x="100" y="435" class="boxText">source freshness, ingestion lag, index lag, retrieval freshness를 분리해서 봅니다.</text>
</svg>
