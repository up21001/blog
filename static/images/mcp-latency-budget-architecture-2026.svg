<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MCP latency budget architecture</title>
  <desc id="desc">Layered architecture for capturing latency budget metrics.</desc>
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #fff; }
      .sub { font: 400 18px Arial, sans-serif; fill: #ffedd5; }
      .layer { fill: rgba(255,255,255,0.1); stroke: rgba(255,255,255,0.35); stroke-width: 2; rx: 18; }
      .node { fill: #ffedd5; stroke: #fb923c; stroke-width: 2; rx: 16; }
      .text { font: 700 19px Arial, sans-serif; fill: #431407; }
      .small { font: 400 14px Arial, sans-serif; fill: #431407; }
      .arrow { stroke: #fff; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#fff"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg6)"/>
  <text x="60" y="78" class="title">MCP Latency Budget Architecture</text>
  <text x="60" y="112" class="sub">Collect latency at each layer and enforce the budget centrally</text>
  <rect x="80" y="155" width="1040" height="110" class="layer"/>
  <rect x="110" y="180" width="190" height="60" class="node"/>
  <rect x="330" y="180" width="190" height="60" class="node"/>
  <rect x="550" y="180" width="190" height="60" class="node"/>
  <rect x="770" y="180" width="330" height="60" class="node"/>
  <text x="150" y="217" class="text">Agent</text>
  <text x="350" y="217" class="text">Gateway</text>
  <text x="590" y="217" class="text">MCP Server</text>
  <text x="820" y="217" class="text">Latency Dashboard</text>
  <path class="arrow" d="M300 210 L330 210"/>
  <path class="arrow" d="M520 210 L550 210"/>
  <path class="arrow" d="M740 210 L770 210"/>
  <rect x="80" y="320" width="340" height="220" class="layer"/>
  <rect x="460" y="320" width="300" height="220" class="layer"/>
  <rect x="800" y="320" width="320" height="220" class="layer"/>
  <text x="110" y="365" class="text" fill="#fff">Metrics</text>
  <text x="110" y="400" class="sub">p50, p95, p99</text>
  <text x="110" y="428" class="sub">route latency</text>
  <text x="110" y="456" class="sub">tool latency</text>
  <text x="490" y="365" class="text" fill="#fff">Budget</text>
  <text x="490" y="400" class="sub">planning slice</text>
  <text x="490" y="428" class="sub">execution slice</text>
  <text x="490" y="456" class="sub">retry slice</text>
  <text x="830" y="365" class="text" fill="#fff">Action</text>
  <text x="830" y="400" class="sub">warn when burn grows</text>
  <text x="830" y="428" class="sub">freeze release when p99 spikes</text>
  <text x="830" y="456" class="sub">investigate tool bottlenecks</text>
</svg>

