<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <style>
      .title { font: 700 42px sans-serif; fill: #0f172a; }
      .sub { font: 400 20px sans-serif; fill: #475569; }
      .boxTitle { font: 700 22px sans-serif; fill: #0f172a; }
      .boxText { font: 400 18px sans-serif; fill: #334155; }
      .small { font: 600 16px sans-serif; fill: #2563eb; }
      .card { rx: 22; ry: 22; stroke: #cbd5e1; stroke-width: 2; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="78" class="title">RAG Operations Checklist</text>
  <text x="70" y="114" class="sub">배포 전 반드시 확인할 운영 흐름</text>

  <rect x="70" y="170" width="190" height="120" class="card" fill="#dbeafe"/>
  <text x="165" y="218" text-anchor="middle" class="boxTitle">Ingestion</text>
  <text x="165" y="250" text-anchor="middle" class="boxText">수집 / 갱신</text>

  <rect x="300" y="170" width="190" height="120" class="card" fill="#e0f2fe"/>
  <text x="395" y="218" text-anchor="middle" class="boxTitle">Chunking</text>
  <text x="395" y="250" text-anchor="middle" class="boxText">크기 / overlap</text>

  <rect x="530" y="170" width="190" height="120" class="card" fill="#dcfce7"/>
  <text x="625" y="218" text-anchor="middle" class="boxTitle">Retrieval</text>
  <text x="625" y="250" text-anchor="middle" class="boxText">Hybrid / Filter</text>

  <rect x="760" y="170" width="190" height="120" class="card" fill="#fef9c3"/>
  <text x="855" y="218" text-anchor="middle" class="boxTitle">Generation</text>
  <text x="855" y="250" text-anchor="middle" class="boxText">Grounded answer</text>

  <rect x="990" y="170" width="140" height="120" class="card" fill="#ffe4e6"/>
  <text x="1060" y="218" text-anchor="middle" class="boxTitle">Eval</text>
  <text x="1060" y="250" text-anchor="middle" class="boxText">Metrics</text>

  <line x1="260" y1="230" x2="300" y2="230" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="490" y1="230" x2="530" y2="230" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="720" y1="230" x2="760" y2="230" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="950" y1="230" x2="990" y2="230" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="70" y="360" width="1070" height="170" class="card" fill="#ffffff"/>
  <text x="100" y="402" class="small">체크 포인트</text>
  <text x="100" y="442" class="boxText">문서 최신성, chunk 규칙, retrieval 품질, groundedness, trace, alerting</text>
  <text x="100" y="482" class="boxText">RAG Ops와 Evaluation을 함께 연결해야 운영 비용이 줄어듭니다.</text>
</svg>
