<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Vercel AI Gateway Choice Flow 2026</title>
  <desc id="desc">Decision flow for when to use Vercel AI Gateway.</desc>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d4ed8" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg4)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Should You Use Vercel AI Gateway?</text>
  <rect x="440" y="120" width="330" height="90" rx="22" fill="#fff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow4)"/>
  <text x="470" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Need model routing?</text>
  <rect x="110" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow4)"/>
  <text x="180" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">No</text>
  <text x="145" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">A direct provider client may be enough</text>
  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow4)"/>
  <text x="495" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Need budgets and</text>
  <text x="533" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">fallbacks?</text>
  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow4)"/>
  <text x="838" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Need AI SDK and</text>
  <text x="857" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">compatibility?</text>
  <rect x="445" y="500" width="330" height="110" rx="26" fill="#1e3a8a" filter="url(#shadow4)"/>
  <text x="504" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#eff6ff">Use AI Gateway</text>
  <text x="482" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#bfdbfe">Strong fit for unified model operations</text>
  <path d="M605 210 L605 285" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
  <path d="M450 340 L410 340" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
  <path d="M750 340 L790 340" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
  <path d="M605 395 L605 500" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow4)" fill="none"/>
</svg>
