<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LLM observability choice flow">
  <rect width="1200" height="630" fill="#111827"/>
  <circle cx="980" cy="130" r="180" fill="#8b5cf6" opacity="0.12"/>
  <text x="80" y="90" fill="#f8fafc" font-size="42" font-family="Arial, sans-serif" font-weight="700">What should you watch first?</text>
  <text x="80" y="128" fill="#9ca3af" font-size="22" font-family="Arial, sans-serif">Cost, latency, quality, or failures</text>
  <rect x="120" y="220" width="210" height="110" rx="18" fill="#0f172a" stroke="#8b5cf6" stroke-width="2"/>
  <text x="225" y="266" fill="#fff" font-size="23" font-family="Arial, sans-serif" text-anchor="middle" font-weight="700">Quality issue?</text>
  <text x="225" y="294" fill="#cbd5e1" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">use evals</text>
  <polygon points="585,205 670,270 585,335 500,270" fill="#0f172a" stroke="#06b6d4" stroke-width="2"/>
  <text x="585" y="266" fill="#fff" font-size="23" font-family="Arial, sans-serif" text-anchor="middle" font-weight="700">Trace</text>
  <text x="585" y="294" fill="#cbd5e1" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">find the root cause</text>
  <rect x="870" y="220" width="210" height="110" rx="18" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="975" y="266" fill="#fff" font-size="23" font-family="Arial, sans-serif" text-anchor="middle" font-weight="700">Operational?</text>
  <text x="975" y="294" fill="#cbd5e1" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">use metrics</text>
  <path d="M330 275 H495" stroke="#8b5cf6" stroke-width="6" fill="none"/>
  <polygon points="495,275 479,265 479,285" fill="#8b5cf6"/>
  <path d="M670 275 H855" stroke="#22c55e" stroke-width="6" fill="none"/>
  <polygon points="855,275 839,265 839,285" fill="#22c55e"/>
  <rect x="180" y="430" width="840" height="100" rx="20" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="600" y="472" fill="#fff" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" font-weight="700">Trace first, dashboard second, eval third</text>
  <text x="600" y="502" fill="#9ca3af" font-size="17" font-family="Arial, sans-serif" text-anchor="middle">the order matters when the system is already broken</text>
</svg>
