<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#f5f3ff"/><text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">Should You Use Mastra?</text><rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#818cf8"/><text x="505" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">Building agents?</text><rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#a5b4fc"/><text x="165" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Need only one API</text><text x="181" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">A smaller SDK may be enough</text><rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#a5b4fc"/><text x="493" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Need workflow,</text><text x="505" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">memory, MCP?</text><rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#a5b4fc"/><text x="855" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">TypeScript</text><text x="833" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">first stack?</text><rect x="445" y="500" width="320" height="110" rx="26" fill="#312e81"/><text x="525" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#eef2ff">Use Mastra</text><text x="476" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c7d2fe">Strong fit for TS agent apps</text></svg>
