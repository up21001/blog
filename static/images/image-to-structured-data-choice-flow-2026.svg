  </defs>
  <rect width="1200" height="630" fill="url(#bg6)"/>
  <text x="80" y="82" fill="#f8fafc" font-family="Arial, sans-serif" font-size="46" font-weight="700">Extraction Strategy</text>
  <text x="80" y="122" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="22">Pick the output target before choosing the model flow</text>
