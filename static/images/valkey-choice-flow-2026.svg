<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"><title id="title">Valkey Choice Flow 2026</title><desc id="desc">Decision flow diagram for when Valkey is the right choice.</desc><rect width="1200" height="675" fill="#f0fdf4"/><text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#166534">Valkey Choice Flow</text><text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#15803d">open source cache, session store, AI memory layer</text><rect x="70" y="210" width="260" height="150" rx="24" fill="#fff" stroke="#86efac"/><text x="108" y="262" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Need low latency?</text><text x="98" y="302" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#166534">cache or state access</text><rect x="380" y="210" width="260" height="150" rx="24" fill="#fff" stroke="#86efac"/><text x="416" y="262" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Need Redis-like API?</text><text x="404" y="302" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#166534">compatibility matters</text><rect x="690" y="210" width="260" height="150" rx="24" fill="#fff" stroke="#86efac"/><text x="718" y="262" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Need open source?</text><text x="716" y="302" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#166534">vendor-neutral choice</text><rect x="1000" y="210" width="130" height="150" rx="24" fill="#fff" stroke="#86efac"/><text x="1028" y="262" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Yes</text><text x="1016" y="302" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#166534">Valkey</text><path d="M330 285 C350 285, 355 285, 380 285" fill="none" stroke="#166534" stroke-width="4"/><path d="M640 285 C660 285, 665 285, 690 285" fill="none" stroke="#166534" stroke-width="4"/><path d="M950 285 C970 285, 975 285, 1000 285" fill="none" stroke="#166534" stroke-width="4"/><rect x="220" y="430" width="760" height="110" rx="24" fill="#fff" stroke="#bbf7d0"/><text x="270" y="477" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Best fit</text><text x="270" y="512" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#166534">cache, session, queue, rate limit, AI state, Redis OSS migration path</text></svg>
