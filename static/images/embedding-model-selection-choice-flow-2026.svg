<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1320"/>
      <stop offset="1" stop-color="#223657"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <text x="80" y="110" fill="#f3fbff" font-family="Arial" font-size="50" font-weight="700">Embedding Choice Flow</text>
  <g filter="url(#shadow)">
    <rect x="70" y="180" width="210" height="110" rx="22" fill="#14253a" stroke="#5b8fb8" stroke-width="2"/>
    <rect x="320" y="180" width="210" height="110" rx="22" fill="#14253a" stroke="#5b8fb8" stroke-width="2"/>
    <rect x="570" y="180" width="210" height="110" rx="22" fill="#14253a" stroke="#5b8fb8" stroke-width="2"/>
    <rect x="820" y="180" width="310" height="110" rx="22" fill="#17344b" stroke="#4fd1c5" stroke-width="2"/>
  </g>
  <text x="175" y="225" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Multilingual?</text>
  <text x="425" y="225" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Need high recall?</text>
  <text x="675" y="225" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Budget limited?</text>
  <text x="975" y="225" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Pick model + eval</text>
  <path d="M280 235 H310" stroke="#90cdf4" stroke-width="5" stroke-linecap="round"/>
  <path d="M530 235 H560" stroke="#90cdf4" stroke-width="5" stroke-linecap="round"/>
  <path d="M780 235 H810" stroke="#90cdf4" stroke-width="5" stroke-linecap="round"/>
  <text x="175" y="320" text-anchor="middle" fill="#b6cde0" font-family="Arial" font-size="18">yes -> multilingual model</text>
  <text x="425" y="320" text-anchor="middle" fill="#b6cde0" font-family="Arial" font-size="18">yes -> stronger embeddings</text>
  <text x="675" y="320" text-anchor="middle" fill="#b6cde0" font-family="Arial" font-size="18">yes -> cheaper model</text>
  <text x="975" y="320" text-anchor="middle" fill="#b6cde0" font-family="Arial" font-size="18">final shortlist</text>
  <text x="80" y="430" fill="#d9f1ff" font-family="Arial" font-size="28" font-weight="700">Select by data language, retrieval goal, and operating cost.</text>
  <text x="80" y="474" fill="#d9f1ff" font-family="Arial" font-size="28" font-weight="700">Then validate against a real evaluation set.</text>
</svg>
