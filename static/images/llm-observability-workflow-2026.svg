<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LLM observability workflow">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <text x="80" y="90" fill="#f8fafc" font-size="42" font-family="Arial, sans-serif" font-weight="700">LLM Observability Workflow</text>
  <text x="80" y="128" fill="#9ca3af" font-size="22" font-family="Arial, sans-serif">Quality -&gt; Cost -&gt; Latency -&gt; Action</text>
  <rect x="70" y="220" width="240" height="140" rx="24" fill="#0f172a" stroke="#8b5cf6" stroke-width="2"/>
  <text x="190" y="268" fill="#fff" font-size="25" font-family="Arial, sans-serif" text-anchor="middle" font-weight="700">Collect Signals</text>
  <text x="190" y="300" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif" text-anchor="middle">trace, metrics, logs</text>
  <rect x="480" y="220" width="240" height="140" rx="24" fill="#0f172a" stroke="#06b6d4" stroke-width="2"/>
  <text x="600" y="268" fill="#fff" font-size="25" font-family="Arial, sans-serif" text-anchor="middle" font-weight="700">Analyze</text>
  <text x="600" y="300" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif" text-anchor="middle">quality, cost, latency</text>
  <rect x="890" y="220" width="240" height="140" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="1010" y="268" fill="#fff" font-size="25" font-family="Arial, sans-serif" text-anchor="middle" font-weight="700">Act</text>
  <text x="1010" y="300" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif" text-anchor="middle">alerts, evals, routing</text>
  <path d="M310 290 H470" stroke="#8b5cf6" stroke-width="6" fill="none"/>
  <polygon points="470,290 454,280 454,300" fill="#8b5cf6"/>
  <path d="M720 290 H880" stroke="#06b6d4" stroke-width="6" fill="none"/>
  <polygon points="880,290 864,280 864,300" fill="#06b6d4"/>
  <rect x="220" y="430" width="760" height="100" rx="20" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="600" y="472" fill="#fff" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" font-weight="700">One dashboard should answer: is it correct, cheap, and fast?</text>
  <text x="600" y="502" fill="#9ca3af" font-size="17" font-family="Arial, sans-serif" text-anchor="middle">separate signals, connect by request id</text>
</svg>
