<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Tool calling decision flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#334155" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#111827">Tool Calling Decision Flow</text>
  <text x="70" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#475569">choose the right action path before the model acts</text>
  <rect x="80" y="230" width="220" height="110" rx="24" fill="#2563eb" filter="url(#shadow)"/>
  <text x="190" y="270" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Need action?</text>
  <text x="190" y="304" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#dbeafe">read / write / external</text>
  <rect x="370" y="200" width="220" height="170" rx="24" fill="#0891b2" filter="url(#shadow)"/>
  <text x="480" y="246" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Read-only</text>
  <text x="480" y="280" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#cffafe">search / retrieve</text>
  <text x="480" y="308" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#cffafe">safe by default</text>
  <rect x="370" y="410" width="220" height="120" rx="24" fill="#ea580c" filter="url(#shadow)"/>
  <text x="480" y="456" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Write action</text>
  <text x="480" y="488" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ffedd5">approval required</text>
  <rect x="650" y="245" width="220" height="130" rx="24" fill="#334155" filter="url(#shadow)"/>
  <text x="760" y="292" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Validate args</text>
  <text x="760" y="324" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#e2e8f0">schema + policy</text>
  <rect x="930" y="245" width="190" height="130" rx="24" fill="#111827" filter="url(#shadow)"/>
  <text x="1025" y="292" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Execute</text>
  <text x="1025" y="324" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#cbd5e1">tool / API / MCP</text>
  <line x1="300" y1="285" x2="370" y2="285" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="590" y1="285" x2="650" y2="285" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="870" y1="310" x2="930" y2="310" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M190 340 C190 430, 330 470, 370 470" fill="none" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
</svg>
