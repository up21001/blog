  <text x="630" y="93" text-anchor="middle" font-size="11" fill="#4C1D95">AI-First IDE</text>

  <!-- 행: 가격 -->
  <rect x="30" y="108" width="200" height="42" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
