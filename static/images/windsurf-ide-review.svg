<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- 배경 -->
  <rect width="800" height="450" fill="#F8FAFC" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Windsurf vs Cursor — 기능 비교</text>

  <!-- 헤더 -->
  <rect x="30" y="55" width="200" height="45" rx="6" fill="#1E293B"/>
  <text x="130" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="white">비교 항목</text>

  <rect x="240" y="55" width="240" height="45" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="360" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">Windsurf</text>
  <text x="360" y="93" text-anchor="middle" font-size="11" fill="#1D4ED8">by Codeium</text>

