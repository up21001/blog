  <text x="630" y="127" text-anchor="middle" font-size="12" fill="#4C1D95">Free / Pro $20/월</text>
  <text x="630" y="143" text-anchor="middle" font-size="11" fill="#4C1D95">Business $40/월/사용자</text>

