  <text x="630" y="295" text-anchor="middle" font-size="12" fill="#065F46">빠름 (Tab AI)</text>
  <text x="630" y="311" text-anchor="middle" font-size="11" fill="#065F46">예측 정확도 높음</text>

  <!-- 행: VS Code 호환 -->
  <rect x="30" y="318" width="200" height="42" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="130" y="344" text-anchor="middle" font-size="12" fill="#475569">VS Code 확장 호환</text>
  <rect x="240" y="318" width="240" height="42" fill="#D1FAE5" stroke="#E2E8F0" stroke-width="1"/>
  <text x="360" y="337" text-anchor="middle" font-size="12" fill="#065F46">✓ 완전 호환</text>
  <text x="360" y="353" text-anchor="middle" font-size="11" fill="#065F46">VS Code 포크 기반</text>
  <rect x="490" y="318" width="280" height="42" fill="#D1FAE5" stroke="#E2E8F0" stroke-width="1"/>
  <text x="630" y="337" text-anchor="middle" font-size="12" fill="#065F46">✓ 완전 호환</text>
  <text x="630" y="353" text-anchor="middle" font-size="11" fill="#065F46">VS Code 포크 기반</text>

  <!-- 추천 요약 -->
  <rect x="30" y="375" width="350" height="60" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="205" y="397" text-anchor="middle" font-size="12" font-weight="bold" fill="#1D4ED8">Windsurf 추천 상황</text>
  <text x="205" y="414" text-anchor="middle" font-size="11" fill="#1E40AF">• 비용 절감이 중요한 팀</text>
  <text x="205" y="429" text-anchor="middle" font-size="11" fill="#1E40AF">• Cascade 자율 에이전트 선호</text>

  <rect x="420" y="375" width="350" height="60" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="595" y="397" text-anchor="middle" font-size="12" font-weight="bold" fill="#4C1D95">Cursor 추천 상황</text>
  <text x="595" y="414" text-anchor="middle" font-size="11" fill="#4C1D95">• 정밀한 컨텍스트 제어 필요</text>
  <text x="595" y="429" text-anchor="middle" font-size="11" fill="#4C1D95">• 다양한 최신 모델 사용 희망</text>

  <text x="400" y="447" text-anchor="middle" font-size="10" fill="#94A3B8">* 2026년 3월 기준 | 각 공식 문서 참조</text>
</svg>
