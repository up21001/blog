  <rect x="30" y="276" width="200" height="42" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="130" y="302" text-anchor="middle" font-size="12" fill="#475569">인라인 완성 속도</text>
