  <text x="360" y="211" text-anchor="middle" font-size="12" fill="#1D4ED8">Claude, GPT-4o, Gemini</text>
  <text x="360" y="227" text-anchor="middle" font-size="11" fill="#1D4ED8">자체 Codeium 모델</text>
