  <text x="360" y="185" text-anchor="middle" font-size="11" fill="#1D4ED8">Flow 기반 멀티스텝</text>
  <rect x="490" y="150" width="280" height="42" fill="#EDE9FE" stroke="#E2E8F0" stroke-width="1"/>
