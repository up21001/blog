<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#1d2a3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <style>
      .title{font:700 42px system-ui,Segoe UI,sans-serif;fill:#fff}
      .sub{font:500 20px system-ui,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#f59e0b;stroke-width:2;rx:18}
      .box2{fill:#0f172a;stroke:#38bdf8;stroke-width:2;rx:18}
      .text{font:600 18px system-ui,sans-serif;fill:#e5e7eb}
      .small{font:500 15px system-ui,sans-serif;fill:#94a3b8}
      .arrow{stroke:url(#accent);stroke-width:4;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="82" class="title">LLM Incident Response</text>
  <text x="60" y="118" class="sub">감지 → 분류 → 우회 → 복구 → 회고</text>
  <rect x="70" y="185" width="180" height="110" class="box"/>
  <text x="96" y="228" class="text">Detect</text>
  <text x="96" y="255" class="small">alerts / anomalies</text>
  <rect x="290" y="185" width="180" height="110" class="box2"/>
  <text x="318" y="228" class="text">Triage</text>
  <text x="318" y="255" class="small">severity / impact</text>
  <rect x="510" y="185" width="180" height="110" class="box"/>
  <text x="538" y="228" class="text">Fallback</text>
  <text x="538" y="255" class="small">model / route / rule</text>
  <rect x="730" y="185" width="180" height="110" class="box2"/>
  <text x="758" y="228" class="text">Recover</text>
  <text x="758" y="255" class="small">rollback / fix / shift</text>
  <rect x="950" y="185" width="180" height="110" class="box"/>
  <text x="976" y="228" class="text">Review</text>
  <text x="976" y="255" class="small">postmortem</text>
  <path d="M250 240 H290" class="arrow"/>
  <path d="M470 240 H510" class="arrow"/>
  <path d="M690 240 H730" class="arrow"/>
  <path d="M910 240 H950" class="arrow"/>
  <rect x="135" y="350" width="930" height="165" class="box"/>
  <text x="175" y="395" class="text">응답 키</text>
  <text x="175" y="428" class="small">severity, owner, runbook_id, impact_scope, fallback_used, model_version, trace_id</text>
  <text x="175" y="455" class="small">장애 대응은 알림만이 아니라 복구와 회고까지 자동으로 이어져야 한다.</text>
</svg>
