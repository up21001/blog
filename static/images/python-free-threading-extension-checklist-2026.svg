<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720"><rect width="1200" height="720" fill="#fffaf2"/><text x="70" y="88" font-family="Segoe UI, Arial" font-size="38" font-weight="700" fill="#21384c">확장 모듈 점검 체크리스트</text><text x="70" y="126" font-family="Segoe UI, Arial" font-size="20" fill="#5b7388">GIL 없는 환경에서 가장 먼저 확인할 항목들</text><rect x="250" y="200" width="700" height="360" rx="28" fill="#0f4c81"/><text x="310" y="265" font-family="Segoe UI, Arial" font-size="26" font-weight="700" fill="#fff">필수 점검</text><text x="310" y="315" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- Py_GIL_DISABLED 분기 확인</text><text x="310" y="355" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- 모듈 초기화 지원 선언 확인</text><text x="310" y="395" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- 전역 mutable 상태 점검</text><text x="310" y="435" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- 멀티스레드 스트레스 테스트 추가</text><text x="310" y="475" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- Windows 빌드 확인</text></svg>
