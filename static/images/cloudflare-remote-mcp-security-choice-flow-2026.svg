<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#2a334f"/>
    </linearGradient>
    <marker id="arrow4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffe08a"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg4)"/>
  <text x="70" y="88" fill="#fff1cb" font-size="38" font-weight="700" font-family="Inter, Arial, sans-serif">Remote MCP Security: choose the safe path</text>
  <text x="70" y="122" fill="#b9c3d6" font-size="20" font-family="Inter, Arial, sans-serif">default deny, then allow only what you can observe</text>
  <rect x="70" y="190" width="250" height="120" rx="24" fill="#181f2f" stroke="#8b7752"/>
  <text x="195" y="236" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">Can the tool write?</text>
  <text x="195" y="270" text-anchor="middle" fill="#c8d0de" font-size="18" font-family="Inter, Arial, sans-serif">create, delete, send</text>
  <rect x="380" y="150" width="220" height="120" rx="22" fill="#1e283c" stroke="#8b7752"/>
  <text x="490" y="195" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">Yes</text>
  <text x="490" y="228" text-anchor="middle" fill="#c8d0de" font-size="18" font-family="Inter, Arial, sans-serif">require approval</text>
  <rect x="380" y="320" width="220" height="120" rx="22" fill="#1e283c" stroke="#8b7752"/>
  <text x="490" y="365" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">No</text>
  <text x="490" y="398" text-anchor="middle" fill="#c8d0de" font-size="18" font-family="Inter, Arial, sans-serif">read-only allowed</text>
  <rect x="690" y="190" width="250" height="120" rx="24" fill="#18243a" stroke="#8b7752"/>
  <text x="815" y="236" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">Is it allowlisted?</text>
  <text x="815" y="270" text-anchor="middle" fill="#c8d0de" font-size="18" font-family="Inter, Arial, sans-serif">domain + tool name</text>
  <rect x="1010" y="150" width="120" height="120" rx="22" fill="#22314a" stroke="#8b7752"/>
  <text x="1070" y="196" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700" font-family="Inter, Arial, sans-serif">Block</text>
  <text x="1070" y="228" text-anchor="middle" fill="#c8d0de" font-size="16" font-family="Inter, Arial, sans-serif">deny</text>
  <rect x="1010" y="320" width="120" height="120" rx="22" fill="#22314a" stroke="#8b7752"/>
  <text x="1070" y="366" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700" font-family="Inter, Arial, sans-serif">Log</text>
  <text x="1070" y="398" text-anchor="middle" fill="#c8d0de" font-size="16" font-family="Inter, Arial, sans-serif">audit</text>
  <line x1="320" y1="240" x2="380" y2="210" stroke="#ffe08a" stroke-width="5" marker-end="url(#arrow4)"/>
  <line x1="320" y1="240" x2="380" y2="380" stroke="#ffe08a" stroke-width="5" marker-end="url(#arrow4)"/>
  <line x1="600" y1="210" x2="690" y2="240" stroke="#ffe08a" stroke-width="5" marker-end="url(#arrow4)"/>
  <line x1="600" y1="380" x2="1010" y2="380" stroke="#ffe08a" stroke-width="5" marker-end="url(#arrow4)"/>
  <line x1="940" y1="240" x2="1010" y2="210" stroke="#ffe08a" stroke-width="5" marker-end="url(#arrow4)"/>
  <line x1="940" y1="260" x2="1010" y2="380" stroke="#ffe08a" stroke-width="5" marker-end="url(#arrow4)"/>
  <rect x="70" y="500" width="1060" height="80" rx="20" fill="#151c2b" stroke="#8b7752"/>
  <text x="600" y="548" text-anchor="middle" fill="#fff1cb" font-size="20" font-family="Inter, Arial, sans-serif">Default deny, approve writes, and keep every remote MCP call observable</text>
</svg>
