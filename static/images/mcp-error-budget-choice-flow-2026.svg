<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MCP error budget choice flow</title>
  <desc id="desc">Decision flow for handling error budget burn, rollback, and freeze.</desc>
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #fff; }
      .sub { font: 400 18px Arial, sans-serif; fill: #ffedd5; }
      .card { fill: #ffedd5; stroke: #fb923c; stroke-width: 2; rx: 18; }
      .text { font: 700 20px Arial, sans-serif; fill: #431407; }
      .small { font: 400 15px Arial, sans-serif; fill: #431407; }
      .arrow { stroke: #fff; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#fff"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg8)"/>
  <text x="60" y="78" class="title">MCP Error Budget Choice Flow</text>
  <text x="60" y="112" class="sub">What should happen when failures rise?</text>
  <rect x="70" y="180" width="250" height="120" class="card"/>
  <rect x="470" y="180" width="250" height="120" class="card"/>
  <rect x="870" y="180" width="260" height="120" class="card"/>
  <text x="108" y="226" class="text">Burn rate OK?</text>
  <text x="108" y="255" class="small">keep shipping</text>
  <text x="505" y="226" class="text">Burn rate high?</text>
  <text x="505" y="255" class="small">freeze release</text>
  <text x="905" y="226" class="text">Critical spike?</text>
  <text x="905" y="255" class="small">rollback and investigate</text>
  <path class="arrow" d="M320 240 L470 240"/>
  <path class="arrow" d="M720 240 L870 240"/>
  <rect x="120" y="360" width="960" height="140" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.35)" stroke-width="2" rx="22"/>
  <text x="150" y="410" class="text" fill="#fff">Practical rule</text>
  <text x="150" y="445" class="sub">Use budget burn to decide release posture. High burn should block features before it blocks trust.</text>
</svg>

