<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">LlamaIndex Workflows Workflow 2026</title>
  <desc id="desc">Event-driven workflow showing StartEvent, steps, parallel branches, and observability.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#334155" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">LlamaIndex Workflows</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Event-driven steps for agent, RAG, and extraction flows</text>

  <rect x="70" y="250" rx="24" ry="24" width="190" height="110" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="116" y="298" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Start</text>
  <text x="92" y="330" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#475569">StartEvent input</text>

  <rect x="320" y="190" rx="22" ry="22" width="220" height="100" fill="#fff" stroke="#94a3b8" filter="url(#shadow)"/>
  <text x="380" y="235" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Step 1</text>
  <text x="346" y="263" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#475569">agent / rag / extract</text>

  <rect x="320" y="355" rx="22" ry="22" width="220" height="100" fill="#fff" stroke="#94a3b8" filter="url(#shadow)"/>
  <text x="380" y="400" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Step 2</text>
  <text x="350" y="428" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#475569">emit next event</text>

  <rect x="620" y="190" rx="22" ry="22" width="220" height="100" fill="#fff" stroke="#94a3b8" filter="url(#shadow)"/>
  <text x="680" y="235" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Parallel</text>
  <text x="648" y="263" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#475569">RAG strategies / branches</text>

  <rect x="620" y="355" rx="22" ry="22" width="220" height="100" fill="#fff" stroke="#94a3b8" filter="url(#shadow)"/>
  <text x="675" y="400" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Observability</text>
  <text x="652" y="428" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#475569">instrumented step traces</text>

  <rect x="930" y="250" rx="24" ry="24" width="190" height="110" fill="#0f172a" filter="url(#shadow)"/>
  <text x="990" y="298" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#f8fafc">Stop</text>
  <text x="955" y="330" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#cbd5e1">StopEvent result</text>

  <path d="M260 305 C285 305, 290 240, 320 240" fill="none" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M430 290 L430 355" fill="none" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M540 240 C585 240, 590 240, 620 240" fill="none" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M730 290 L730 355" fill="none" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M840 240 C880 240, 900 270, 930 300" fill="none" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
