<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f0ea"/>
      <stop offset="100%" stop-color="#e9eef7"/>
    </linearGradient>
    <style>
      .title{font:700 42px Arial,sans-serif;fill:#172033}
      .sub{font:400 22px Arial,sans-serif;fill:#455067}
      .box{fill:#ffffff;stroke:#2c3e50;stroke-width:3;rx:18;ry:18}
      .label{font:700 22px Arial,sans-serif;fill:#172033}
      .small{font:400 18px Arial,sans-serif;fill:#4a5568}
      .arrow{stroke:#2c3e50;stroke-width:4;fill:none;marker-end:url(#m)}
      .pill{fill:#172033;rx:999;ry:999}
      .pillText{font:700 18px Arial,sans-serif;fill:#fff}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2c3e50"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="70" class="title">Agent Approval Flow</text>
  <text x="60" y="110" class="sub">Low risk auto-exec, medium risk review, high risk human approval</text>
  <rect x="60" y="140" width="180" height="40" class="pill"/>
  <text x="85" y="167" class="pillText">workflow</text>
  <rect class="box" x="80" y="230" width="170" height="110"/>
  <text x="120" y="275" class="label">Agent</text>
  <text x="110" y="305" class="small">Creates action</text>
  <rect class="box" x="350" y="230" width="190" height="110"/>
  <text x="390" y="275" class="label">Policy Gate</text>
  <text x="376" y="305" class="small">Risk scoring</text>
  <rect class="box" x="650" y="190" width="190" height="110"/>
  <text x="690" y="235" class="label">Auto Execute</text>
  <text x="674" y="265" class="small">Low risk path</text>
  <rect class="box" x="650" y="330" width="190" height="110"/>
  <text x="690" y="375" class="label">Human Review</text>
  <text x="674" y="405" class="small">Medium / high risk</text>
  <rect class="box" x="930" y="260" width="180" height="110"/>
  <text x="960" y="305" class="label">Audit Log</text>
  <text x="955" y="335" class="small">Track decisions</text>
  <path class="arrow" d="M250 285 L350 285"/>
  <path class="arrow" d="M540 285 L650 245"/>
  <path class="arrow" d="M540 285 L650 385"/>
  <path class="arrow" d="M840 245 L930 315"/>
  <path class="arrow" d="M840 385 L930 315"/>
</svg>
