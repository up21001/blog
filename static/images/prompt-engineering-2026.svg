<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">프롬프트 엔지니어링 핵심 기법 체계</text>

  <!-- Level 1: Foundation -->
  <rect x="270" y="60" width="260" height="55" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="400" y="83" text-anchor="middle" font-size="14" font-weight="bold" fill="#5B21B6">기초 원칙</text>
  <text x="400" y="103" text-anchor="middle" font-size="12" fill="#6D28D9">명확성 · 구체성 · 컨텍스트 · 출력 형식 지정</text>

  <!-- Arrows down -->
  <line x1="320" y1="115" x2="200" y2="165" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#pa)"/>
  <line x1="400" y1="115" x2="400" y2="165" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#pa)"/>
  <line x1="480" y1="115" x2="600" y2="165" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#pa)"/>

  <!-- Level 2: Techniques -->
  <rect x="60" y="165" width="170" height="80" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="145" y="191" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4ED8">역할 부여</text>
  <text x="145" y="211" text-anchor="middle" font-size="12" fill="#1E40AF">You are a senior</text>
  <text x="145" y="229" text-anchor="middle" font-size="12" fill="#1E40AF">engineer with 10y exp.</text>

  <rect x="280" y="165" width="240" height="80" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="400" y="191" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">Chain-of-Thought (CoT)</text>
  <text x="400" y="211" text-anchor="middle" font-size="12" fill="#047857">단계별 추론 유도</text>
  <text x="400" y="229" text-anchor="middle" font-size="12" fill="#047857">"Let's think step by step"</text>

  <rect x="570" y="165" width="170" height="80" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="655" y="191" text-anchor="middle" font-size="13" font-weight="bold" fill="#78350F">Few-shot</text>
  <text x="655" y="211" text-anchor="middle" font-size="12" fill="#92400E">입력→출력 예시</text>
  <text x="655" y="229" text-anchor="middle" font-size="12" fill="#92400E">2~5개 패턴 제시</text>

  <!-- Arrows down level 2->3 -->
  <line x1="200" y1="245" x2="280" y2="300" stroke="#6B7280" stroke-width="1.5" marker-end="url(#pb)"/>
  <line x1="400" y1="245" x2="400" y2="300" stroke="#6B7280" stroke-width="1.5" marker-end="url(#pb)"/>
  <line x1="600" y1="245" x2="520" y2="300" stroke="#6B7280" stroke-width="1.5" marker-end="url(#pb)"/>

  <!-- Level 3: Advanced -->
  <rect x="60" y="300" width="220" height="75" rx="10" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="170" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">구조화 프롬프트</text>
  <text x="170" y="345" text-anchor="middle" font-size="12" fill="#6B7280">XML 태그 · 마크다운</text>
  <text x="170" y="362" text-anchor="middle" font-size="12" fill="#6B7280">섹션 분리 · 우선순위</text>

  <rect x="300" y="300" width="200" height="75" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="400" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#5B21B6">자기 일관성</text>
  <text x="400" y="345" text-anchor="middle" font-size="12" fill="#6D28D9">다중 경로 샘플링</text>
  <text x="400" y="362" text-anchor="middle" font-size="12" fill="#6D28D9">다수결 최종 선택</text>

  <rect x="520" y="300" width="220" height="75" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="630" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">Tree-of-Thought</text>
  <text x="630" y="345" text-anchor="middle" font-size="12" fill="#047857">탐색 트리 구성</text>
  <text x="630" y="362" text-anchor="middle" font-size="12" fill="#047857">가지치기 · BFS/DFS</text>

  <!-- Bottom bar -->
  <rect x="30" y="395" width="740" height="40" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="400" y="420" text-anchor="middle" font-size="13" fill="#78350F">핵심 원칙: 모델은 대화 파트너 — 역할·맥락·형식·제약을 명확히 줄수록 품질이 선형 향상됩니다</text>

  <defs>
    <marker id="pa" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8B5CF6"/>
    </marker>
    <marker id="pb" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
  </defs>
</svg>
