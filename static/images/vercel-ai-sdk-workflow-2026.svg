<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Vercel AI SDK Workflow 2026</title>
  <desc id="desc">Workflow diagram for Vercel AI SDK with model calls, streaming, tools, and UI rendering.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#312e81" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4338ca"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg3)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">Vercel AI SDK Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">Streaming text, tool calls, and generative UI for React and Next.js apps</text>
  <rect x="80" y="190" width="210" height="110" rx="24" fill="#fff" stroke="#a5b4fc" filter="url(#shadow3)"/>
  <text x="125" y="248" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">User Input</text>
  <rect x="355" y="170" width="520" height="310" rx="30" fill="#fff" stroke="#818cf8" stroke-width="2" filter="url(#shadow3)"/>
  <text x="412" y="220" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">AI SDK App Layer</text>
  <rect x="405" y="250" width="170" height="82" rx="18" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="445" y="298" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">streamText</text>
  <rect x="645" y="250" width="170" height="82" rx="18" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="676" y="298" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Tools</text>
  <rect x="405" y="360" width="170" height="82" rx="18" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="431" y="408" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Structured</text>
  <text x="454" y="434" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">Output</text>
  <rect x="645" y="360" width="170" height="82" rx="18" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="674" y="405" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">UI State</text>
  <text x="675" y="432" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">streaming render</text>
  <rect x="930" y="190" width="210" height="110" rx="24" fill="#fff" stroke="#a5b4fc" filter="url(#shadow3)"/>
  <text x="992" y="247" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">Models</text>
  <text x="963" y="274" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">OpenAI, Anthropic,</text>
  <text x="986" y="298" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">Gemini, more</text>
  <rect x="930" y="350" width="210" height="110" rx="24" fill="#fff" stroke="#a5b4fc" filter="url(#shadow3)"/>
  <text x="992" y="405" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">UI</text>
  <text x="965" y="432" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">React, Next.js,</text>
  <text x="977" y="456" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">Generative UX</text>
  <path d="M290 245 C325 245, 330 245, 355 245" fill="none" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow3)"/>
  <path d="M875 245 C900 245, 905 245, 930 245" fill="none" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow3)"/>
  <path d="M815 405 C870 405, 895 405, 930 405" fill="none" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow3)"/>
</svg>
