<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <rect width="800" height="450" fill="#F8FAFC" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">사이드 프로젝트 수익화 로드맵</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#64748B">아이디어 발굴 → 검증 → 출시 → 성장 → 월 100만원+</text>

  <!-- 단계 화살표 흐름 -->
  <!-- 1단계 -->
  <rect x="30" y="90" width="130" height="150" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="95" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4ED8">① 아이디어</text>
  <line x1="40" y1="126" x2="150" y2="126" stroke="#93C5FD" stroke-width="1"/>
  <text x="95" y="146" text-anchor="middle" font-size="10" fill="#1D4ED8">내 불편함 목록</text>
  <text x="95" y="162" text-anchor="middle" font-size="10" fill="#1D4ED8">Reddit/커뮤니티 탐색</text>
  <text x="95" y="178" text-anchor="middle" font-size="10" fill="#1D4ED8">트렌드 키워드 분석</text>
  <text x="95" y="194" text-anchor="middle" font-size="10" fill="#1D4ED8">경쟁자 리뷰 읽기</text>
  <text x="95" y="213" text-anchor="middle" font-size="10" fill="#3B82F6">기간: 2주</text>

  <text x="170" y="170" text-anchor="middle" font-size="22" fill="#94A3B8">→</text>

  <!-- 2단계 -->
  <rect x="185" y="90" width="130" height="150" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="250" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">② 검증</text>
  <line x1="195" y1="126" x2="305" y2="126" stroke="#6EE7B7" stroke-width="1"/>
  <text x="250" y="146" text-anchor="middle" font-size="10" fill="#065F46">랜딩 페이지 먼저</text>
  <text x="250" y="162" text-anchor="middle" font-size="10" fill="#065F46">이메일 사전 등록</text>
  <text x="250" y="178" text-anchor="middle" font-size="10" fill="#065F46">100명 인터뷰 목표</text>
  <text x="250" y="194" text-anchor="middle" font-size="10" fill="#065F46">결제 의향 확인</text>
  <text x="250" y="213" text-anchor="middle" font-size="10" fill="#10B981">기간: 2 – 4주</text>

  <text x="325" y="170" text-anchor="middle" font-size="22" fill="#94A3B8">→</text>

  <!-- 3단계 -->
  <rect x="340" y="90" width="130" height="150" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="405" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">③ MVP 출시</text>
  <line x1="350" y1="126" x2="460" y2="126" stroke="#FCD34D" stroke-width="1"/>
  <text x="405" y="146" text-anchor="middle" font-size="10" fill="#92400E">핵심 기능 1개만</text>
  <text x="405" y="162" text-anchor="middle" font-size="10" fill="#92400E">4 – 8주 내 출시</text>
  <text x="405" y="178" text-anchor="middle" font-size="10" fill="#92400E">초기 사용자 피드백</text>
  <text x="405" y="194" text-anchor="middle" font-size="10" fill="#92400E">가격 테스트</text>
  <text x="405" y="213" text-anchor="middle" font-size="10" fill="#F59E0B">기간: 4 – 8주</text>

  <text x="480" y="170" text-anchor="middle" font-size="22" fill="#94A3B8">→</text>

  <!-- 4단계 -->
  <rect x="495" y="90" width="130" height="150" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="560" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#5B21B6">④ 성장</text>
  <line x1="505" y1="126" x2="615" y2="126" stroke="#C4B5FD" stroke-width="1"/>
  <text x="560" y="146" text-anchor="middle" font-size="10" fill="#5B21B6">SEO 콘텐츠 마케팅</text>
  <text x="560" y="162" text-anchor="middle" font-size="10" fill="#5B21B6">ProductHunt 런치</text>
  <text x="560" y="178" text-anchor="middle" font-size="10" fill="#5B21B6">커뮤니티 참여</text>
  <text x="560" y="194" text-anchor="middle" font-size="10" fill="#5B21B6">유료 플랜 추가</text>
  <text x="560" y="213" text-anchor="middle" font-size="10" fill="#8B5CF6">기간: 3 – 6개월</text>

  <text x="635" y="170" text-anchor="middle" font-size="22" fill="#94A3B8">→</text>

  <!-- 5단계 -->
  <rect x="650" y="90" width="120" height="150" rx="10" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <text x="710" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#C2410C">⑤ 수익화</text>
  <line x1="660" y1="126" x2="760" y2="126" stroke="#FDBA74" stroke-width="1"/>
  <text x="710" y="148" text-anchor="middle" font-size="10" fill="#C2410C">월 구독 SaaS</text>
  <text x="710" y="164" text-anchor="middle" font-size="10" fill="#C2410C">앱스토어 판매</text>
  <text x="710" y="180" text-anchor="middle" font-size="10" fill="#C2410C">광고 수익</text>
  <text x="710" y="196" text-anchor="middle" font-size="10" fill="#C2410C">강의·e북</text>
  <text x="710" y="216" text-anchor="middle" font-size="10" fill="#F97316">목표: 월 100만원+</text>

  <!-- 수익 모델 비교 -->
  <rect x="30" y="268" width="740" height="160" rx="10" fill="#F0F9FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="400" y="292" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">수익 모델 비교</text>

  <!-- SaaS -->
  <rect x="50" y="304" width="160" height="108" rx="8" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="130" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#1D4ED8">SaaS 구독</text>
  <text x="130" y="343" text-anchor="middle" font-size="10" fill="#374151">난이도: ★★★★</text>
  <text x="130" y="359" text-anchor="middle" font-size="10" fill="#374151">월 수익: 100만 – 1000만+</text>
  <text x="130" y="375" text-anchor="middle" font-size="10" fill="#374151">시간: 6 – 18개월</text>
  <text x="130" y="391" text-anchor="middle" font-size="10" fill="#374151">안정성: 높음 (재구매)</text>

  <!-- 앱 -->
  <rect x="230" y="304" width="160" height="108" rx="8" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <text x="310" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">모바일 앱</text>
  <text x="310" y="343" text-anchor="middle" font-size="10" fill="#374151">난이도: ★★★</text>
  <text x="310" y="359" text-anchor="middle" font-size="10" fill="#374151">월 수익: 10만 – 300만</text>
  <text x="310" y="375" text-anchor="middle" font-size="10" fill="#374151">시간: 3 – 9개월</text>
  <text x="310" y="391" text-anchor="middle" font-size="10" fill="#374151">안정성: 중간</text>

  <!-- 콘텐츠 -->
  <rect x="410" y="304" width="160" height="108" rx="8" fill="white" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="490" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">기술 블로그/강의</text>
  <text x="490" y="343" text-anchor="middle" font-size="10" fill="#374151">난이도: ★★</text>
  <text x="490" y="359" text-anchor="middle" font-size="10" fill="#374151">월 수익: 50만 – 500만</text>
  <text x="490" y="375" text-anchor="middle" font-size="10" fill="#374151">시간: 6 – 24개월</text>
  <text x="490" y="391" text-anchor="middle" font-size="10" fill="#374151">안정성: 성장형</text>

  <!-- 오픈소스 -->
  <rect x="590" y="304" width="160" height="108" rx="8" fill="white" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="670" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#5B21B6">오픈소스 스폰서</text>
  <text x="670" y="343" text-anchor="middle" font-size="10" fill="#374151">난이도: ★★★★★</text>
  <text x="670" y="359" text-anchor="middle" font-size="10" fill="#374151">월 수익: 0 – 무한</text>
  <text x="670" y="375" text-anchor="middle" font-size="10" fill="#374151">시간: 1 – 5년</text>
  <text x="670" y="391" text-anchor="middle" font-size="10" fill="#374151">안정성: 낮음 – 높음</text>
</svg>
