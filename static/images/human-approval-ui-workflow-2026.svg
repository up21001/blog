<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff5ef"/>
      <stop offset="100%" stop-color="#eef3ff"/>
    </linearGradient>
    <style>
      .title{font:700 42px Arial,sans-serif;fill:#172033}
      .sub{font:400 22px Arial,sans-serif;fill:#4b5563}
      .box{fill:#fff;stroke:#172033;stroke-width:3;rx:18;ry:18}
      .label{font:700 22px Arial,sans-serif;fill:#172033}
      .small{font:400 18px Arial,sans-serif;fill:#4b5563}
      .arrow{stroke:#172033;stroke-width:4;fill:none;marker-end:url(#m)}
      .pill{fill:#172033;rx:999;ry:999}
      .pillText{font:700 18px Arial,sans-serif;fill:#fff}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#172033"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="70" class="title">Human Approval UI</text>
  <text x="60" y="110" class="sub">Show action, impact, recommendation, and outcome in one view</text>
  <rect x="60" y="140" width="180" height="40" class="pill"/>
  <text x="85" y="167" class="pillText">workflow</text>
  <rect class="box" x="80" y="230" width="170" height="110"/>
  <text x="118" y="275" class="label">Request</text>
  <text x="92" y="305" class="small">Agent pauses</text>
  <rect class="box" x="350" y="230" width="190" height="110"/>
  <text x="396" y="275" class="label">Summarize</text>
  <text x="383" y="305" class="small">What and why</text>
  <rect class="box" x="650" y="230" width="190" height="110"/>
  <text x="692" y="275" class="label">Approve</text>
  <text x="681" y="305" class="small">Or reject</text>
  <rect class="box" x="930" y="230" width="180" height="110"/>
  <text x="972" y="275" class="label">Execute</text>
  <text x="955" y="305" class="small">Or stop</text>
  <path class="arrow" d="M250 285 L350 285"/>
  <path class="arrow" d="M540 285 L650 285"/>
  <path class="arrow" d="M840 285 L930 285"/>
</svg>
