<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">LlamaIndex Workflows Choice Flow 2026</title>
  <desc id="desc">Decision map showing when to choose LlamaIndex Workflows.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#334155" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Should You Use LlamaIndex Workflows?</text>

  <rect x="430" y="120" width="340" height="90" rx="22" fill="#fff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow2)"/>
  <text x="482" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Need event-driven steps?</text>

  <rect x="110" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#cbd5e1" filter="url(#shadow2)"/>
  <text x="184" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">No</text>
  <text x="145" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">A simpler chain may be enough</text>

  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#cbd5e1" filter="url(#shadow2)"/>
  <text x="498" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Need RAG, agent,</text>
  <text x="525" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">or extraction?</text>

  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#cbd5e1" filter="url(#shadow2)"/>
  <text x="844" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Need observability</text>
  <text x="857" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">per step?</text>

  <rect x="445" y="500" width="320" height="110" rx="26" fill="#0f172a" filter="url(#shadow2)"/>
  <text x="485" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#f8fafc">Use Workflows</text>
  <text x="476" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#cbd5e1">Best for structured event-driven AI flows</text>

  <path d="M600 210 L600 285" stroke="#475569" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M430 340 L410 340" stroke="#475569" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M750 340 L790 340" stroke="#475569" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M600 395 L600 500" stroke="#475569" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
</svg>
