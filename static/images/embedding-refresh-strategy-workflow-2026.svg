<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06101d"/>
      <stop offset="1" stop-color="#1d3557"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="180" x2="1080" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <text x="70" y="96" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="700">Embedding Refresh Strategy</text>
  <text x="70" y="138" fill="#93c5fd" font-family="Arial, Helvetica, sans-serif" font-size="22">detect change - decide scope - refresh - validate</text>
  <rect x="70" y="220" width="180" height="110" rx="20" fill="#10263d" stroke="#60a5fa" stroke-width="2"/>
  <rect x="285" y="220" width="180" height="110" rx="20" fill="#10263d" stroke="#60a5fa" stroke-width="2"/>
  <rect x="500" y="220" width="180" height="110" rx="20" fill="#10263d" stroke="#60a5fa" stroke-width="2"/>
  <rect x="715" y="220" width="180" height="110" rx="20" fill="#0f3b37" stroke="#34d399" stroke-width="2"/>
  <rect x="930" y="220" width="200" height="110" rx="20" fill="#10263d" stroke="#60a5fa" stroke-width="2"/>
  <text x="160" y="262" text-anchor="middle" fill="#fff" font-family="Arial" font-size="24" font-weight="700">Detect</text>
  <text x="160" y="292" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="16">doc or model change</text>
  <text x="375" y="262" text-anchor="middle" fill="#fff" font-family="Arial" font-size="24" font-weight="700">Scope</text>
  <text x="375" y="292" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="16">full / partial</text>
  <text x="590" y="262" text-anchor="middle" fill="#fff" font-family="Arial" font-size="24" font-weight="700">Refresh</text>
  <text x="590" y="292" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="16">re-embed chunks</text>
  <text x="805" y="262" text-anchor="middle" fill="#fff" font-family="Arial" font-size="24" font-weight="700">Validate</text>
  <text x="805" y="292" text-anchor="middle" fill="#bbf7d0" font-family="Arial" font-size="16">sample queries</text>
  <text x="1030" y="262" text-anchor="middle" fill="#fff" font-family="Arial" font-size="22" font-weight="700">Cleanup</text>
  <text x="1030" y="292" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="16">old versions</text>
  <path d="M250 275 H275" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M465 275 H490" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M680 275 H705" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M895 275 H920" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <text x="70" y="410" fill="#dbeafe" font-family="Arial" font-size="26" font-weight="700">Refresh strategy keeps search quality current without paying for unnecessary reindexing.</text>
</svg>

