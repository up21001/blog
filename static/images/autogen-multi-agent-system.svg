<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F2937">AutoGen 멀티 에이전트 시스템 구조</text>

  <!-- UserProxyAgent -->
  <rect x="40" y="70" width="160" height="80" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="120" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">UserProxyAgent</text>
  <text x="120" y="123" text-anchor="middle" font-size="11" fill="#1E40AF">사용자 입력 / 실행</text>
  <text x="120" y="139" text-anchor="middle" font-size="11" fill="#1E40AF">코드 실행 허가</text>

  <!-- AssistantAgent -->
  <rect x="320" y="70" width="160" height="80" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">AssistantAgent</text>
  <text x="400" y="123" text-anchor="middle" font-size="11" fill="#065F46">LLM 기반 계획</text>
  <text x="400" y="139" text-anchor="middle" font-size="11" fill="#065F46">코드 생성 / 분석</text>

  <!-- CodeExecutorAgent -->
  <rect x="600" y="70" width="160" height="80" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="680" y="101" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">CodeExecutor</text>
  <text x="680" y="117" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">Agent</text>
  <text x="680" y="135" text-anchor="middle" font-size="11" fill="#92400E">코드 실행 환경</text>

  <!-- Arrows top row -->
  <line x1="200" y1="110" x2="318" y2="110" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="480" y1="110" x2="598" y2="110" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="600" y1="130" x2="482" y2="130" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="320" y1="130" x2="202" y2="130" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen2)"/>

  <!-- Label arrows -->
  <text x="259" y="105" text-anchor="middle" font-size="10" fill="#1E40AF">요청</text>
  <text x="539" y="105" text-anchor="middle" font-size="10" fill="#065F46">코드 전달</text>
  <text x="541" y="148" text-anchor="middle" font-size="10" fill="#92400E">실행 결과</text>
  <text x="261" y="148" text-anchor="middle" font-size="10" fill="#065F46">피드백</text>

  <!-- GroupChat Box -->
  <rect x="160" y="200" width="480" height="60" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="400" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#5B21B6">GroupChat / GroupChatManager</text>
  <text x="400" y="248" text-anchor="middle" font-size="11" fill="#5B21B6">에이전트 간 메시지 라우팅 · 발화 순서 관리 · 종료 조건 판단</text>

  <!-- Vertical arrows to GroupChat -->
  <line x1="120" y1="150" x2="230" y2="198" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="150" x2="400" y2="198" stroke="#10B981" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <line x1="680" y1="150" x2="570" y2="198" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>

  <!-- Tools row -->
  <rect x="60" y="310" width="130" height="60" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="125" y="337" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">웹 검색</text>
  <text x="125" y="355" text-anchor="middle" font-size="11" fill="#374151">Tool / Function</text>

  <rect x="215" y="310" width="130" height="60" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="280" y="337" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">코드 실행기</text>
  <text x="280" y="355" text-anchor="middle" font-size="11" fill="#374151">Docker / Local</text>

  <rect x="370" y="310" width="130" height="60" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="435" y="337" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">파일 I/O</text>
  <text x="435" y="355" text-anchor="middle" font-size="11" fill="#374151">읽기 / 쓰기</text>

  <rect x="525" y="310" width="130" height="60" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="590" y="337" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">API 호출</text>
  <text x="590" y="355" text-anchor="middle" font-size="11" fill="#374151">외부 서비스</text>

  <!-- Label Tools -->
  <text x="400" y="298" text-anchor="middle" font-size="12" fill="#6B7280">연결 가능한 도구 (Tools)</text>
  <line x1="400" y1="260" x2="400" y2="296" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>

  <!-- Termination condition -->
  <rect x="160" y="390" width="480" height="45" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="400" y="408" text-anchor="middle" font-size="12" font-weight="bold" fill="#991B1B">종료 조건 (Termination)</text>
  <text x="400" y="426" text-anchor="middle" font-size="11" fill="#991B1B">max_turns 도달 · TERMINATE 키워드 감지 · 목표 달성 확인</text>

  <!-- Defs -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10B981"/>
    </marker>
    <marker id="arrowGreen2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10B981"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F59E0B"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8B5CF6"/>
    </marker>
  </defs>
</svg>
