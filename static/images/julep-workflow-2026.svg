<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Julep Workflow 2026</title>
  <desc id="desc">Julep persistent agents workflow with memory, multi-step tasks, tools, and parallel branches.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">Julep Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Persistent agents, memory, loops, parallel branches, and tools in one runtime</text>

  <rect x="70" y="220" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="125" y="272" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">Session</text>
  <text x="114" y="306" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">remembered context</text>

  <rect x="330" y="150" rx="28" ry="28" width="540" height="360" fill="#fff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="205" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">Julep</text>

  <rect x="380" y="250" rx="18" ry="18" width="170" height="86" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="408" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Persistent</text>
  <text x="430" y="326" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">agents</text>

  <rect x="585" y="250" rx="18" ry="18" width="170" height="86" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="623" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Memory</text>
  <text x="620" y="326" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">long-term</text>

  <rect x="380" y="370" rx="18" ry="18" width="170" height="86" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="409" y="420" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Tools</text>
  <text x="421" y="446" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">API calls</text>

  <rect x="585" y="370" rx="18" ry="18" width="170" height="86" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="613" y="420" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Parallel</text>
  <text x="626" y="446" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">branches</text>

  <rect x="910" y="220" rx="24" ry="24" width="220" height="120" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="966" y="272" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">Tasks</text>
  <text x="947" y="306" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">multi-step workflows</text>

  <path d="M280 280 C310 280, 320 280, 330 280" fill="none" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M800 280 C845 280, 865 280, 910 280" fill="none" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M465 336 C465 350, 465 358, 465 370" fill="none" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M670 336 C670 350, 670 358, 670 370" fill="none" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
