<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AssemblyAI Workflow 2026</title>
  <desc id="desc">Workflow for AssemblyAI speech-to-text, streaming, audio intelligence, and LLM gateway.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d4ed8" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">AssemblyAI Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">Streaming transcription, intelligence, and analysis from audio to insight</text>

  <rect x="70" y="200" rx="24" ry="24" width="220" height="120" fill="#fff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="134" y="252" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Audio Input</text>
  <text x="112" y="286" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">file / stream / mic</text>

  <rect x="355" y="150" width="500" height="360" rx="28" fill="#fff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
  <text x="530" y="198" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">AssemblyAI</text>
  <rect x="400" y="232" rx="18" ry="18" width="170" height="88" fill="#fff" stroke="#93c5fd"/>
  <text x="421" y="282" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Speech-to-Text</text>
  <rect x="610" y="232" rx="18" ry="18" width="170" height="88" fill="#fff" stroke="#93c5fd"/>
  <text x="654" y="282" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Streaming</text>
  <rect x="400" y="350" rx="18" ry="18" width="170" height="88" fill="#fff" stroke="#93c5fd"/>
  <text x="435" y="400" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Audio</text>
  <text x="427" y="427" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">Intelligence</text>
  <rect x="610" y="350" rx="18" ry="18" width="170" height="88" fill="#fff" stroke="#93c5fd"/>
  <text x="650" y="400" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">LLM</text>
  <text x="636" y="427" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">Gateway</text>

  <rect x="900" y="200" rx="24" ry="24" width="220" height="120" fill="#fff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="964" y="252" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Insights</text>
  <text x="935" y="286" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">transcripts, summaries</text>

  <path d="M290 260 C320 260, 330 260, 355 260" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M855 260 C880 260, 890 260, 900 260" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M485 320 C485 335, 485 340, 485 350" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M695 320 C695 335, 695 340, 695 350" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
