<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#F8FAFC" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Ollama 로컬 LLM 아키텍처 — 내 PC에서 AI 실행하기</text>

  <!-- Local PC box -->
  <rect x="20" y="60" width="480" height="300" fill="#F3F4F6" stroke="#6B7280" stroke-width="2" rx="10"/>
  <text x="260" y="84" text-anchor="middle" font-size="13" fill="#374151" font-weight="bold">내 PC / 서버 (프라이빗 환경)</text>

  <!-- Ollama Server -->
  <rect x="40" y="95" width="200" height="110" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" rx="8"/>
  <text x="140" y="118" text-anchor="middle" font-size="13" fill="#1D4ED8" font-weight="bold">Ollama Server</text>
  <text x="140" y="138" text-anchor="middle" font-size="11" fill="#1E40AF">localhost:11434</text>
  <text x="140" y="156" text-anchor="middle" font-size="11" fill="#1E40AF">REST API 제공</text>
  <text x="140" y="174" text-anchor="middle" font-size="11" fill="#1E40AF">모델 자동 다운로드/관리</text>
  <text x="140" y="192" text-anchor="middle" font-size="11" fill="#1E40AF">GPU/CPU 자동 감지</text>

  <!-- Models -->
  <rect x="270" y="95" width="210" height="50" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5" rx="6"/>
  <text x="375" y="115" text-anchor="middle" font-size="12" fill="#065F46" font-weight="bold">Llama 3.2 (3B/8B/70B)</text>
  <text x="375" y="133" text-anchor="middle" font-size="11" fill="#064E3B">범용 · 한국어 우수</text>

  <rect x="270" y="153" width="210" height="50" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" rx="6"/>
  <text x="375" y="173" text-anchor="middle" font-size="12" fill="#92400E" font-weight="bold">Mistral 7B / Mixtral</text>
  <text x="375" y="191" text-anchor="middle" font-size="11" fill="#78350F">코딩 · 추론 최적화</text>

  <rect x="270" y="211" width="210" height="50" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5" rx="6"/>
  <text x="375" y="231" text-anchor="middle" font-size="12" fill="#6D28D9" font-weight="bold">Gemma 2 / Phi-3</text>
  <text x="375" y="249" text-anchor="middle" font-size="11" fill="#5B21B6">경량 · 저사양 PC용</text>

  <!-- Data stays local -->
  <rect x="40" y="220" width="200" height="120" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" rx="8"/>
  <text x="140" y="244" text-anchor="middle" font-size="13" fill="#92400E" font-weight="bold">데이터 완전 로컬</text>
  <text x="140" y="265" text-anchor="middle" font-size="11" fill="#78350F">인터넷 연결 불필요</text>
  <text x="140" y="283" text-anchor="middle" font-size="11" fill="#78350F">민감정보 안전 처리</text>
  <text x="140" y="301" text-anchor="middle" font-size="11" fill="#78350F">API 비용 없음</text>
  <text x="140" y="319" text-anchor="middle" font-size="11" fill="#78350F">오프라인 동작</text>

  <!-- Arrow -->
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
  </defs>
  <line x1="500" y1="210" x2="540" y2="210" stroke="#6B7280" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- App box -->
  <rect x="540" y="130" width="240" height="230" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2" rx="10"/>
  <text x="660" y="156" text-anchor="middle" font-size="13" fill="#6D28D9" font-weight="bold">연동 앱 / 클라이언트</text>

  <rect x="555" y="168" width="210" height="35" fill="white" stroke="#8B5CF6" stroke-width="1" rx="5"/>
<text x="660" y="191" text-anchor="middle" font-size="12" fill="#5B21B6">Python / openai 호환 API</text>

  <rect x="555" y="210" width="210" height="35" fill="white" stroke="#8B5CF6" stroke-width="1" rx="5"/>
  <text x="660" y="233" text-anchor="middle" font-size="12" fill="#5B21B6">Open WebUI (브라우저 UI)</text>

  <rect x="555" y="252" width="210" height="35" fill="white" stroke="#8B5CF6" stroke-width="1" rx="5"/>
  <text x="660" y="275" text-anchor="middle" font-size="12" fill="#5B21B6">LangChain / LlamaIndex</text>

  <rect x="555" y="294" width="210" height="35" fill="white" stroke="#8B5CF6" stroke-width="1" rx="5"/>
  <text x="660" y="317" text-anchor="middle" font-size="12" fill="#5B21B6">Continue.dev (VS Code)</text>

  <!-- Bottom spec -->
  <rect x="20" y="375" width="760" height="55" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5" rx="8"/>
  <text x="400" y="397" text-anchor="middle" font-size="13" fill="#065F46" font-weight="bold">권장 사양</text>
  <text x="200" y="418" text-anchor="middle" font-size="11" fill="#064E3B">RAM 8GB+ (7B 모델)</text>
  <text x="400" y="418" text-anchor="middle" font-size="11" fill="#064E3B">RAM 16GB+ (13B 모델)</text>
  <text x="600" y="418" text-anchor="middle" font-size="11" fill="#064E3B">VRAM 8GB+ GPU (속도 3-5x 향상)</text>
</svg>
