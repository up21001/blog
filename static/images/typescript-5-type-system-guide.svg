<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#F8FAFC" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">TypeScript 5.x 타입 시스템 구조</text>

  <!-- 기본 타입 -->
  <rect x="30" y="60" width="160" height="160" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="110" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">기본 타입</text>
  <text x="50" y="108" font-size="11" fill="#1D4ED8">• string / number</text>
  <text x="50" y="126" font-size="11" fill="#1D4ED8">• boolean / null</text>
  <text x="50" y="144" font-size="11" fill="#1D4ED8">• undefined / void</text>
  <text x="50" y="162" font-size="11" fill="#1D4ED8">• any / unknown</text>
  <text x="50" y="180" font-size="11" fill="#1D4ED8">• never / object</text>
  <text x="50" y="198" font-size="11" fill="#1D4ED8">• literal types</text>

  <!-- 제네릭 -->
  <rect x="210" y="60" width="160" height="160" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="290" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">제네릭</text>
  <text x="228" y="108" font-size="11" fill="#047857">• T extends 제약</text>
  <text x="228" y="126" font-size="11" fill="#047857">• 기본값 T = string</text>
  <text x="228" y="144" font-size="11" fill="#047857">• 다중 타입 파라미터</text>
  <text x="228" y="162" font-size="11" fill="#047857">• 조건부 타입</text>
  <text x="228" y="180" font-size="11" fill="#047857">• infer 키워드</text>
  <text x="228" y="198" font-size="11" fill="#047857">• 재귀 제네릭</text>

  <!-- 유틸리티 타입 -->
  <rect x="390" y="60" width="170" height="160" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="475" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">유틸리티 타입</text>
  <text x="408" y="108" font-size="11" fill="#B45309">• Partial / Required</text>
  <text x="408" y="126" font-size="11" fill="#B45309">• Readonly / Record</text>
  <text x="408" y="144" font-size="11" fill="#B45309">• Pick / Omit</text>
  <text x="408" y="162" font-size="11" fill="#B45309">• Exclude / Extract</text>
  <text x="408" y="180" font-size="11" fill="#B45309">• ReturnType</text>
  <text x="408" y="198" font-size="11" fill="#B45309">• Parameters</text>

  <!-- TS 5.x 신기능 -->
  <rect x="580" y="60" width="190" height="160" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="675" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#5B21B6">TS 5.x 신기능</text>
  <text x="598" y="108" font-size="11" fill="#6D28D9">• Const Type Parameters</text>
  <text x="598" y="126" font-size="11" fill="#6D28D9">• variadic tuple 개선</text>
  <text x="598" y="144" font-size="11" fill="#6D28D9">• satisfies 연산자</text>
  <text x="598" y="162" font-size="11" fill="#6D28D9">• using 선언</text>
  <text x="598" y="180" font-size="11" fill="#6D28D9">• override 키워드</text>
  <text x="598" y="198" font-size="11" fill="#6D28D9">• Decorators (표준)</text>

  <!-- 중간 화살표 및 연결 -->
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- 하단: 실전 패턴 -->
  <rect x="30" y="250" width="350" height="170" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="205" y="276" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">실전 패턴</text>
  <text x="50" y="300" font-size="11" fill="#4B5563">• Discriminated Union으로 상태 모델링</text>
  <text x="50" y="320" font-size="11" fill="#4B5563">• Template Literal Types로 API 경로 타입화</text>
  <text x="50" y="340" font-size="11" fill="#4B5563">• Mapped Types로 폼 필드 자동 생성</text>
  <text x="50" y="360" font-size="11" fill="#4B5563">• as const로 상수 타입 좁히기</text>
  <text x="50" y="380" font-size="11" fill="#4B5563">• type guard로 런타임 안전성 확보</text>
  <text x="50" y="400" font-size="11" fill="#4B5563">• Zod + TypeScript 스키마 연동</text>

  <!-- 하단: tsconfig -->
  <rect x="410" y="250" width="360" height="170" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="590" y="276" text-anchor="middle" font-size="13" font-weight="bold" fill="#5B21B6">tsconfig 핵심 설정</text>
  <text x="428" y="300" font-size="11" fill="#6D28D9">• "strict": true → 모든 엄격 검사 활성화</text>
  <text x="428" y="320" font-size="11" fill="#6D28D9">• "moduleResolution": "bundler"</text>
  <text x="428" y="340" font-size="11" fill="#6D28D9">• "target": "ES2022" 이상 권장</text>
  <text x="428" y="360" font-size="11" fill="#6D28D9">• "paths": 절대 경로 alias</text>
  <text x="428" y="380" font-size="11" fill="#6D28D9">• "noUncheckedIndexedAccess": true</text>
  <text x="428" y="400" font-size="11" fill="#6D28D9">• "exactOptionalPropertyTypes": true</text>
</svg>
