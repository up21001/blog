<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Tool Selection Strategy Workflow 2026</title>
  <desc id="desc">Decision flow for choosing the right tool type in AI systems</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">Tool Selection Strategy</text>
  <text x="70" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#475569">search, MCP, browser, file, API</text>
  <rect x="70" y="230" width="180" height="110" rx="22" fill="#2563eb" filter="url(#shadow)"/>
  <text x="160" y="274" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Task</text>
  <text x="160" y="304" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#dbeafe">what is needed?</text>
  <rect x="310" y="180" width="230" height="200" rx="24" fill="#0f766e" filter="url(#shadow)"/>
  <text x="425" y="230" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Read</text>
  <text x="425" y="264" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ccfbf1">search / retrieve</text>
  <text x="425" y="294" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ccfbf1">File Search / web</text>
  <rect x="310" y="420" width="230" height="110" rx="24" fill="#ea580c" filter="url(#shadow)"/>
  <text x="425" y="466" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Write</text>
  <text x="425" y="496" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ffedd5">approval / policy</text>
  <rect x="600" y="200" width="220" height="170" rx="24" fill="#334155" filter="url(#shadow)"/>
  <text x="710" y="246" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Standardize</text>
  <text x="710" y="280" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#e2e8f0">MCP / API layer</text>
  <text x="710" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#e2e8f0">less branching</text>
  <rect x="880" y="220" width="220" height="130" rx="24" fill="#111827" filter="url(#shadow)"/>
  <text x="990" y="268" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Execute</text>
  <text x="990" y="300" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#cbd5e1">tool result</text>
  <line x1="250" y1="285" x2="310" y2="285" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="540" y1="280" x2="600" y2="280" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="820" y1="285" x2="880" y2="285" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M160 340 C160 410, 310 470, 310 475" fill="none" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
</svg>
