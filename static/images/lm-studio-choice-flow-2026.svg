<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">LM Studio Choice Flow 2026</title>
  <desc id="desc">Decision flow for using LM Studio in local AI setups.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#134e4a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#134e4a">Should You Use LM Studio?</text>

  <rect x="430" y="120" width="340" height="92" rx="22" fill="#fff" stroke="#5eead4" stroke-width="2" filter="url(#shadow)"/>
  <text x="485" y="176" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#134e4a">Need local inference?</text>

  <rect x="110" y="290" width="300" height="110" rx="24" fill="#fff" stroke="#99f6e4" filter="url(#shadow)"/>
  <text x="176" y="340" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">No</text>
  <text x="141" y="370" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">A hosted API may be enough</text>

  <rect x="450" y="290" width="300" height="110" rx="24" fill="#fff" stroke="#99f6e4" filter="url(#shadow)"/>
  <text x="485" y="340" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Need REST + model</text>
  <text x="514" y="370" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">management?</text>

  <rect x="790" y="290" width="300" height="110" rx="24" fill="#fff" stroke="#99f6e4" filter="url(#shadow)"/>
  <text x="842" y="340" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Need MCP and</text>
  <text x="860" y="370" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">stateful chats?</text>

  <rect x="450" y="500" width="320" height="108" rx="26" fill="#134e4a" filter="url(#shadow)"/>
  <text x="523" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ecfeff">Use LM Studio</text>
  <text x="477" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#ccfbf1">Great for local developer workflows</text>
</svg>
