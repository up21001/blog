<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Context Compression Choice Flow</title>
  <desc id="desc">Decision flow for choosing a context compression strategy.</desc>
  <defs>
    <style>
      .bg{fill:#111827}
      .box{fill:#1f2937; stroke:#334155; stroke-width:2}
      .box2{fill:#0f172a; stroke:#475569; stroke-width:2}
      .title{font:700 40px Arial,sans-serif; fill:#f8fafc}
      .sub{font:400 20px Arial,sans-serif; fill:#cbd5e1}
      .h{font:700 21px Arial,sans-serif; fill:#e2e8f0}
      .t{font:400 17px Arial,sans-serif; fill:#cbd5e1}
      .arrow{stroke:#94a3b8; stroke-width:4; fill:none; marker-end:url(#m)}
      .yes{font:700 15px Arial,sans-serif; fill:#86efac}
      .no{font:700 15px Arial,sans-serif; fill:#fca5a5}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" class="bg"/>
  <text x="64" y="74" class="title">What should be compressed?</text>
  <text x="64" y="112" class="sub">Choose the cheapest compression that preserves the next action.</text>

  <rect x="72" y="180" rx="20" ry="20" width="220" height="110" class="box"/>
  <text x="94" y="224" class="h">Conversation too long?</text>
  <text x="94" y="254" class="t">summarize history</text>

  <rect x="320" y="180" rx="20" ry="20" width="220" height="110" class="box2"/>
  <text x="342" y="224" class="h">Tool output too noisy?</text>
  <text x="342" y="254" class="t">extract facts only</text>

  <rect x="568" y="180" rx="20" ry="20" width="220" height="110" class="box"/>
  <text x="590" y="224" class="h">Memory bloated?</text>
  <text x="590" y="254" class="t">prune stale state</text>

  <rect x="816" y="180" rx="20" ry="20" width="220" height="110" class="box2"/>
  <text x="838" y="224" class="h">Prompt budget low?</text>
  <text x="838" y="254" class="t">rebuild minimal prompt</text>

  <rect x="162" y="360" rx="20" ry="20" width="250" height="120" class="box"/>
  <text x="186" y="404" class="h">Yes</text>
  <text x="186" y="434" class="t">apply compression layer</text>

  <rect x="482" y="360" rx="20" ry="20" width="250" height="120" class="box2"/>
  <text x="506" y="404" class="h">No</text>
  <text x="506" y="434" class="t">leave raw context intact</text>

  <rect x="802" y="360" rx="20" ry="20" width="286" height="120" class="box"/>
  <text x="826" y="404" class="h">Re-evaluate</text>
  <text x="826" y="434" class="t">quality, cost, and latency</text>

  <path class="arrow" d="M 182 290 L 182 355"/>
  <path class="arrow" d="M 430 290 L 430 355"/>
  <path class="arrow" d="M 678 290 L 678 355"/>
  <path class="arrow" d="M 926 290 L 926 355"/>
  <path class="arrow" d="M 412 420 L 482 420"/>
  <path class="arrow" d="M 732 420 L 802 420"/>
  <text x="286" y="336" class="yes">yes</text>
  <text x="530" y="336" class="no">no</text>
</svg>

