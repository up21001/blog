<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#09101c"/>
  <text x="60" y="68" fill="#f8fafc" font-family="Arial" font-size="34" font-weight="700">MCP Degradation Mode Architecture</text>
  <g font-family="Arial" font-size="17" font-weight="600" fill="#fff">
    <rect x="50" y="150" width="170" height="110" rx="18" fill="#1d4ed8"/><text x="135" y="198" text-anchor="middle">Client</text><text x="135" y="224" text-anchor="middle" font-size="15" font-weight="400">normal / degraded</text>
    <rect x="255" y="150" width="170" height="110" rx="18" fill="#7c3aed"/><text x="340" y="198" text-anchor="middle">Policy Layer</text><text x="340" y="224" text-anchor="middle" font-size="15" font-weight="400">mode decision</text>
    <rect x="460" y="150" width="170" height="110" rx="18" fill="#0f766e"/><text x="545" y="198" text-anchor="middle">Tool Router</text><text x="545" y="224" text-anchor="middle" font-size="15" font-weight="400">enable/disable</text>
    <rect x="665" y="150" width="170" height="110" rx="18" fill="#b45309"/><text x="750" y="198" text-anchor="middle">Observability</text><text x="750" y="224" text-anchor="middle" font-size="15" font-weight="400">state + alerts</text>
    <rect x="870" y="150" width="280" height="110" rx="18" fill="#dc2626"/><text x="1010" y="198" text-anchor="middle">Safe Mode / Recovery</text><text x="1010" y="224" text-anchor="middle" font-size="15" font-weight="400">limited capability</text>
  </g>
  <path d="M220 205 L255 205" stroke="#f8fafc" stroke-width="3"/>
  <path d="M425 205 L460 205" stroke="#f8fafc" stroke-width="3"/>
  <path d="M630 205 L665 205" stroke="#f8fafc" stroke-width="3"/>
  <path d="M835 205 L870 205" stroke="#f8fafc" stroke-width="3"/>
  <rect x="145" y="340" width="280" height="126" rx="20" fill="#111827" stroke="#60a5fa" stroke-width="2"/>
  <text x="285" y="388" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="18" font-weight="600">Keep core only</text>
  <text x="285" y="416" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="15">read-only / summary</text>
  <rect x="470" y="340" width="280" height="126" rx="20" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
  <text x="610" y="388" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="18" font-weight="600">Turn off risky tools</text>
  <text x="610" y="416" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="15">approval before action</text>
  <rect x="795" y="340" width="280" height="126" rx="20" fill="#111827" stroke="#fca5a5" stroke-width="2"/>
  <text x="935" y="388" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="18" font-weight="600">Return to normal</text>
  <text x="935" y="416" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="15">after verification</text>
</svg>
