  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <circle cx="1040" cy="110" r="160" fill="#38bdf8" fill-opacity="0.10"/>
  <circle cx="180" cy="540" r="180" fill="#34d399" fill-opacity="0.10"/>
  <text x="70" y="96" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700">RAG Indexing Pipeline</text>
  <text x="70" y="138" fill="#93c5fd" font-family="Arial, Helvetica, sans-serif" font-size="22">source ingest - normalize - chunk - embed - index</text>
  <rect x="70" y="220" width="180" height="110" rx="20" fill="#10263d" stroke="#3b82f6" stroke-width="2"/>
  <rect x="285" y="220" width="180" height="110" rx="20" fill="#10263d" stroke="#3b82f6" stroke-width="2"/>
  <rect x="500" y="220" width="180" height="110" rx="20" fill="#10263d" stroke="#3b82f6" stroke-width="2"/>
  <rect x="715" y="220" width="180" height="110" rx="20" fill="#10263d" stroke="#3b82f6" stroke-width="2"/>
  <rect x="930" y="220" width="200" height="110" rx="20" fill="#0f3b37" stroke="#34d399" stroke-width="2"/>
  <text x="160" y="262" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="26" font-weight="700">Source</text>
  <text x="160" y="292" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="16">Docs / APIs</text>
  <text x="375" y="262" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="26" font-weight="700">Normalize</text>
  <text x="375" y="292" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="16">parse / clean</text>
  <text x="590" y="262" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="26" font-weight="700">Chunk</text>
  <text x="590" y="292" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="16">structure aware</text>
  <text x="805" y="262" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="26" font-weight="700">Embed</text>
  <text x="805" y="292" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="16">model versioned</text>
  <text x="1030" y="262" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Index</text>
  <text x="1030" y="292" text-anchor="middle" fill="#bbf7d0" font-family="Arial" font-size="16">vector DB</text>
  <path d="M250 275 H275" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M465 275 H490" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M680 275 H705" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M895 275 H920" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <text x="70" y="410" fill="#dbeafe" font-family="Arial" font-size="28" font-weight="700">The goal is stable meaning preservation, not just fast ingestion</text>
  <text x="70" y="452" fill="#cbd5e1" font-family="Arial" font-size="18">Versioning, backfill, and metadata matter as much as embedding generation.</text>
