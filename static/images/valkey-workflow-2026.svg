<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"><title id="title">Valkey Workflow 2026</title><desc id="desc">Workflow diagram of Valkey, clients, cache, state, and high availability.</desc><rect width="1200" height="675" fill="#f0fdf4"/><text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#166534">Valkey Workflow</text><text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#15803d">open source in-memory datastore, cache, state, queue</text><rect x="70" y="240" width="200" height="120" rx="24" fill="#fff" stroke="#86efac"/><text x="118" y="292" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Apps</text><text x="92" y="326" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#166534">web, AI, jobs</text><rect x="330" y="185" width="250" height="230" rx="28" fill="#fff" stroke="#4ade80" stroke-width="2"/><text x="413" y="235" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Valkey</text><rect x="360" y="265" width="190" height="54" rx="16" fill="#f0fdf4" stroke="#86efac"/><text x="414" y="299" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">Cache</text><rect x="360" y="330" width="190" height="54" rx="16" fill="#f0fdf4" stroke="#86efac"/><text x="403" y="364" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">State / Queue</text><rect x="650" y="180" width="220" height="110" rx="24" fill="#fff" stroke="#86efac"/><text x="693" y="230" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Replication</text><text x="685" y="260" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#166534">HA and failover</text><rect x="650" y="335" width="220" height="110" rx="24" fill="#fff" stroke="#86efac"/><text x="717" y="385" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Cluster</text><text x="678" y="415" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#166534">scale out workloads</text><rect x="940" y="240" width="190" height="120" rx="24" fill="#fff" stroke="#86efac"/><text x="980" y="292" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Clients</text><text x="963" y="326" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#166534">Redis-compatible</text><path d="M270 300 C300 300, 305 300, 330 300" fill="none" stroke="#166534" stroke-width="4"/><path d="M580 300 C610 300, 615 235, 650 235" fill="none" stroke="#166534" stroke-width="4"/><path d="M580 300 C610 300, 615 390, 650 390" fill="none" stroke="#166534" stroke-width="4"/><path d="M870 235 C900 235, 905 300, 940 300" fill="none" stroke="#166534" stroke-width="4"/><path d="M870 390 C900 390, 905 320, 940 300" fill="none" stroke="#166534" stroke-width="4"/></svg>
