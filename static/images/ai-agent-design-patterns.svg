<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#F8FAFC" rx="12"/>
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">AI 에이전트 설계 패턴 — ReAct · CoT · Tool Use</text>

  <defs>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
    <marker id="arr4b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
  </defs>

  <!-- ReAct Pattern -->
  <rect x="20" y="55" width="235" height="260" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" rx="10"/>
  <text x="137" y="78" text-anchor="middle" font-size="14" fill="#1D4ED8" font-weight="bold">ReAct 패턴</text>
  <text x="137" y="95" text-anchor="middle" font-size="11" fill="#1E40AF">Reasoning + Acting 반복</text>

  <rect x="50" y="108" width="175" height="30" fill="white" stroke="#3B82F6" rx="5"/>
  <text x="137" y="128" text-anchor="middle" font-size="12" fill="#1D4ED8" font-weight="bold">Thought (추론)</text>

  <line x1="137" y1="138" x2="137" y2="155" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr4b)"/>

  <rect x="50" y="158" width="175" height="30" fill="white" stroke="#3B82F6" rx="5"/>
  <text x="137" y="178" text-anchor="middle" font-size="12" fill="#1D4ED8" font-weight="bold">Action (도구 실행)</text>

  <line x1="137" y1="188" x2="137" y2="205" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr4b)"/>

  <rect x="50" y="208" width="175" height="30" fill="white" stroke="#3B82F6" rx="5"/>
  <text x="137" y="228" text-anchor="middle" font-size="12" fill="#1D4ED8" font-weight="bold">Observation (결과)</text>

  <line x1="137" y1="238" x2="137" y2="255" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr4b)"/>

  <rect x="50" y="258" width="175" height="30" fill="#BFDBFE" stroke="#3B82F6" rx="5"/>
  <text x="137" y="278" text-anchor="middle" font-size="12" fill="#1D4ED8">목표 달성 시 종료</text>

  <text x="137" y="300" text-anchor="middle" font-size="10" fill="#1E40AF">↑ 루프 반복 (최대 N회)</text>
  <text x="137" y="315" text-anchor="middle" font-size="10" fill="#1E40AF">적합: 검색, 계산, API 호출</text>

  <!-- CoT Pattern -->
  <rect x="285" y="55" width="235" height="260" fill="#D1FAE5" stroke="#10B981" stroke-width="2" rx="10"/>
  <text x="402" y="78" text-anchor="middle" font-size="14" fill="#065F46" font-weight="bold">Chain of Thought</text>
  <text x="402" y="95" text-anchor="middle" font-size="11" fill="#064E3B">단계별 추론 사고 연쇄</text>

  <rect x="305" y="108" width="195" height="145" fill="white" stroke="#10B981" rx="5"/>
  <text x="402" y="130" text-anchor="middle" font-size="11" fill="#065F46" font-weight="bold">프롬프트 예시:</text>
  <text x="315" y="150" font-size="10" fill="#064E3B">"문제를 단계별로 생각하세요.</text>
  <text x="315" y="168" font-size="10" fill="#064E3B">1단계: 핵심 조건 파악</text>
  <text x="315" y="186" font-size="10" fill="#064E3B">2단계: 중간 결과 계산</text>
  <text x="315" y="204" font-size="10" fill="#064E3B">3단계: 최종 답 도출"</text>
  <text x="315" y="222" font-size="10" fill="#064E3B">→ Let's think step by step</text>
  <text x="315" y="240" font-size="10" fill="#064E3B">→ Zero-shot CoT 가능</text>

  <text x="402" y="275" text-anchor="middle" font-size="10" fill="#064E3B">적합: 수학 문제, 논리 추론</text>
  <text x="402" y="292" text-anchor="middle" font-size="10" fill="#064E3B">복잡한 분석, 코드 디버깅</text>
  <text x="402" y="308" text-anchor="middle" font-size="10" fill="#064E3B">추가 비용 없이 정확도 향상</text>

  <!-- Tool Use Pattern -->
  <rect x="550" y="55" width="230" height="260" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" rx="10"/>
  <text x="665" y="78" text-anchor="middle" font-size="14" fill="#92400E" font-weight="bold">Tool Use 패턴</text>
  <text x="665" y="95" text-anchor="middle" font-size="11" fill="#78350F">LLM + 외부 도구 통합</text>

  <rect x="568" y="108" width="194" height="32" fill="white" stroke="#F59E0B" rx="4"/>
  <text x="665" y="129" text-anchor="middle" font-size="11" fill="#92400E">웹 검색 (Tavily, Google)</text>

  <rect x="568" y="146" width="194" height="32" fill="white" stroke="#F59E0B" rx="4"/>
  <text x="665" y="167" text-anchor="middle" font-size="11" fill="#92400E">코드 실행 (Python REPL)</text>

  <rect x="568" y="184" width="194" height="32" fill="white" stroke="#F59E0B" rx="4"/>
  <text x="665" y="205" text-anchor="middle" font-size="11" fill="#92400E">DB 쿼리 / API 호출</text>

  <rect x="568" y="222" width="194" height="32" fill="white" stroke="#F59E0B" rx="4"/>
  <text x="665" y="243" text-anchor="middle" font-size="11" fill="#92400E">파일 읽기/쓰기</text>

  <text x="665" y="275" text-anchor="middle" font-size="10" fill="#78350F">tools 파라미터로 스키마 정의</text>
  <text x="665" y="292" text-anchor="middle" font-size="10" fill="#78350F">LLM이 필요 시 자동 선택</text>
  <text x="665" y="308" text-anchor="middle" font-size="10" fill="#78350F">OpenAI / Anthropic 모두 지원</text>

  <!-- Agent loop bottom -->
  <rect x="20" y="330" width="760" height="100" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2" rx="10"/>
  <text x="400" y="352" text-anchor="middle" font-size="14" fill="#6D28D9" font-weight="bold">에이전트 루프 구조 (세 패턴 통합)</text>

  <rect x="40" y="362" width="110" height="55" fill="white" stroke="#8B5CF6" rx="5"/>
  <text x="95" y="382" text-anchor="middle" font-size="11" fill="#6D28D9" font-weight="bold">사용자 입력</text>
  <text x="95" y="400" text-anchor="middle" font-size="10" fill="#5B21B6">목표 · 컨텍스트</text>
  <text x="95" y="413" text-anchor="middle" font-size="10" fill="#5B21B6">히스토리</text>

  <line x1="150" y1="389" x2="178" y2="389" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arr4)"/>

  <rect x="178" y="362" width="120" height="55" fill="white" stroke="#8B5CF6" rx="5"/>
  <text x="238" y="382" text-anchor="middle" font-size="11" fill="#6D28D9" font-weight="bold">CoT 추론</text>
  <text x="238" y="400" text-anchor="middle" font-size="10" fill="#5B21B6">계획 수립</text>
  <text x="238" y="413" text-anchor="middle" font-size="10" fill="#5B21B6">단계 분해</text>

  <line x1="298" y1="389" x2="326" y2="389" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arr4)"/>

  <rect x="326" y="362" width="130" height="55" fill="white" stroke="#8B5CF6" rx="5"/>
  <text x="391" y="382" text-anchor="middle" font-size="11" fill="#6D28D9" font-weight="bold">Tool Use 실행</text>
  <text x="391" y="400" text-anchor="middle" font-size="10" fill="#5B21B6">도구 선택/호출</text>
  <text x="391" y="413" text-anchor="middle" font-size="10" fill="#5B21B6">결과 수집</text>

  <line x1="456" y1="389" x2="484" y2="389" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arr4)"/>

  <rect x="484" y="362" width="130" height="55" fill="white" stroke="#8B5CF6" rx="5"/>
  <text x="549" y="382" text-anchor="middle" font-size="11" fill="#6D28D9" font-weight="bold">ReAct 루프</text>
  <text x="549" y="400" text-anchor="middle" font-size="10" fill="#5B21B6">관찰 → 재추론</text>
  <text x="549" y="413" text-anchor="middle" font-size="10" fill="#5B21B6">목표 달성 확인</text>

  <line x1="614" y1="389" x2="642" y2="389" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arr4)"/>

  <rect x="642" y="362" width="118" height="55" fill="#C4B5FD" stroke="#8B5CF6" rx="5"/>
  <text x="701" y="382" text-anchor="middle" font-size="11" fill="#4C1D95" font-weight="bold">최종 응답</text>
  <text x="701" y="400" text-anchor="middle" font-size="10" fill="#4C1D95">결과 포맷팅</text>
  <text x="701" y="413" text-anchor="middle" font-size="10" fill="#4C1D95">사용자 전달</text>
</svg>
