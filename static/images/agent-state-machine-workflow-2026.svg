<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="70" y="84" fill="#f8fafc" font-size="32" font-family="Arial, sans-serif" font-weight="700">Agent State Machine</text>
  <g fill="#111827" stroke="#f472b6" stroke-width="2">
    <rect x="80" y="190" width="170" height="88" rx="18"/>
    <rect x="295" y="190" width="170" height="88" rx="18"/>
    <rect x="510" y="190" width="170" height="88" rx="18"/>
    <rect x="725" y="190" width="170" height="88" rx="18"/>
    <rect x="940" y="190" width="170" height="88" rx="18"/>
  </g>
  <g fill="#e2e8f0" font-family="Arial, sans-serif" font-size="18" font-weight="700">
    <text x="120" y="234">Idle</text>
    <text x="339" y="234">Observe</text>
    <text x="548" y="234">Decide</text>
    <text x="765" y="234">Act</text>
    <text x="975" y="234">Done</text>
  </g>
  <g stroke="#38bdf8" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M250 234H290"/>
    <path d="M465 234H505"/>
    <path d="M680 234H720"/>
    <path d="M895 234H935"/>
  </g>
  <text x="80" y="350" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">explicit transitions make debugging and approval easier</text>
  <text x="80" y="392" fill="#94a3b8" font-size="16" font-family="Arial, sans-serif">each state has a clear next state and exit condition</text>
</svg>
