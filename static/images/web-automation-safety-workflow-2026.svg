<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#08111f"/>
  <text x="80" y="86" fill="#f8fafc" font-size="42" font-family="Arial, sans-serif" font-weight="700">Web Automation Safety</text>
  <text x="80" y="126" fill="#94a3b8" font-size="20" font-family="Arial, sans-serif">Policy -> Session -> Protection -> Stop</text>
  <rect x="70" y="210" width="220" height="180" rx="22" fill="#1e293b" stroke="#334155"/>
  <rect x="320" y="210" width="220" height="180" rx="22" fill="#1e293b" stroke="#334155"/>
  <rect x="570" y="210" width="220" height="180" rx="22" fill="#1e293b" stroke="#334155"/>
  <rect x="820" y="210" width="310" height="180" rx="22" fill="#1e293b" stroke="#334155"/>
  <text x="118" y="260" fill="#38bdf8" font-size="28" font-family="Arial, sans-serif" font-weight="700">Policy</text>
  <text x="118" y="296" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">allowlist / denylist</text>
  <text x="368" y="260" fill="#22c55e" font-size="28" font-family="Arial, sans-serif" font-weight="700">Session</text>
  <text x="368" y="296" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">profiles / cookies</text>
  <text x="618" y="260" fill="#f59e0b" font-size="28" font-family="Arial, sans-serif" font-weight="700">Protection</text>
  <text x="618" y="296" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">approval / retries</text>
  <text x="868" y="260" fill="#f97316" font-size="28" font-family="Arial, sans-serif" font-weight="700">Stop</text>
  <text x="868" y="296" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">halt, log, review</text>
  <path d="M290 300 L315 300" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M540 300 L565 300" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M790 300 L815 300" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
