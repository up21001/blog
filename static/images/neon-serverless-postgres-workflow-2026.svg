<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Neon Serverless Postgres Workflow 2026</title>
  <desc id="desc">Diagram of Neon serverless postgres with app, branching, compute, storage, and preview workflows.</desc>
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d4ed8" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow5" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg5)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Neon Serverless Postgres</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">Modern Postgres workflow with branching, preview environments, and serverless compute</text>
  <rect x="80" y="220" width="220" height="120" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow5)"/>
  <text x="134" y="276" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">App Layer</text>
  <text x="122" y="306" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">Web app, API, ORM,</text>
  <text x="142" y="330" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">preview deploy</text>
  <rect x="380" y="150" width="440" height="360" rx="28" fill="#fff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow5)"/>
  <text x="490" y="200" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Neon Platform</text>
  <rect x="425" y="235" width="160" height="90" rx="18" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="456" y="288" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Branches</text>
  <rect x="620" y="235" width="160" height="90" rx="18" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="647" y="288" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Compute</text>
  <rect x="425" y="355" width="160" height="90" rx="18" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="467" y="408" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Storage</text>
  <rect x="620" y="355" width="160" height="90" rx="18" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="664" y="396" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Dev</text>
  <text x="651" y="423" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">Workflows</text>
  <rect x="900" y="220" width="220" height="120" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow5)"/>
  <text x="963" y="276" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Preview</text>
  <text x="935" y="306" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">Feature branch test,</text>
  <text x="942" y="330" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">migration validation</text>
  <path d="M300 280 C340 280, 350 280, 380 280" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow5)"/>
  <path d="M820 280 C860 280, 870 280, 900 280" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow5)"/>
  <path d="M585 280 C605 280, 610 280, 620 280" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow5)"/>
  <path d="M505 325 C505 335, 505 345, 505 355" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow5)"/>
  <path d="M700 325 C700 335, 700 345, 700 355" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow5)"/>
</svg>
