<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Deepgram Workflow 2026</title>
  <desc id="desc">Deepgram architecture showing audio input, STT, intelligence, TTS, and self-hosted deployment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d4ed8" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Deepgram Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">Speech-to-text, intelligence, text-to-speech, and voice agents in one stack</text>
  <rect x="70" y="190" width="220" height="120" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="126" y="242" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Audio Input</text>
  <text x="104" y="274" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">stream or file</text>
  <rect x="360" y="150" width="480" height="360" rx="28" fill="#fff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
  <text x="520" y="202" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Deepgram</text>
  <rect x="405" y="236" width="160" height="82" rx="18" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="442" y="286" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">STT</text>
  <rect x="625" y="236" width="160" height="82" rx="18" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="651" y="286" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Intelligence</text>
  <rect x="405" y="356" width="160" height="82" rx="18" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="442" y="406" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">TTS</text>
  <rect x="625" y="356" width="160" height="82" rx="18" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="635" y="396" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Voice Agent</text>
  <text x="648" y="423" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">turn-taking</text>
  <rect x="900" y="190" width="230" height="120" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="962" y="242" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Apps</text>
  <text x="933" y="274" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">contact center, captions</text>
  <text x="949" y="298" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">assistants, IVR</text>
  <path d="M290 250 C325 250, 330 250, 360 250" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M800 250 C850 250, 870 250, 900 250" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M565 397 C585 397, 600 397, 625 397" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M485 318 C485 332, 485 340, 485 356" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M705 318 C705 332, 705 340, 705 356" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
