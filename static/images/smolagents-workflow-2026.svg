<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">smolagents Workflow 2026</title>
  <desc id="desc">smolagents architecture showing code agent, tool calling, sandbox execution, telemetry, and Hugging Face Hub.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f766e" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">smolagents Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#115e59">Lightweight Python agents with code execution, tools, and telemetry</text>

  <rect x="70" y="180" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#5eead4" filter="url(#shadow)"/>
  <text x="108" y="232" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Python App</text>
  <text x="116" y="265" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#115e59">CodeAgent or ToolCallingAgent</text>

  <rect x="360" y="140" rx="28" ry="28" width="470" height="360" fill="#ffffff" stroke="#14b8a6" stroke-width="2" filter="url(#shadow)"/>
  <text x="470" y="194" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">smolagents</text>
  <rect x="405" y="228" rx="18" ry="18" width="170" height="90" fill="#f0fdfa" stroke="#5eead4"/>
  <text x="446" y="280" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">CodeAgent</text>
  <rect x="615" y="228" rx="18" ry="18" width="170" height="90" fill="#f0fdfa" stroke="#5eead4"/>
  <text x="638" y="268" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">ToolCalling</text>
  <text x="660" y="296" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Agent</text>

  <rect x="405" y="348" rx="18" ry="18" width="170" height="90" fill="#f0fdfa" stroke="#5eead4"/>
  <text x="436" y="388" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Sandbox</text>
  <text x="439" y="415" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#115e59">Docker/E2B</text>

  <rect x="615" y="348" rx="18" ry="18" width="170" height="90" fill="#f0fdfa" stroke="#5eead4"/>
  <text x="651" y="388" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Telemetry</text>
  <text x="639" y="415" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#115e59">run inspection</text>

  <rect x="920" y="170" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#5eead4" filter="url(#shadow)"/>
  <text x="983" y="218" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Tools</text>
  <text x="953" y="252" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#115e59">Python functions</text>
  <text x="958" y="276" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#115e59">and computations</text>

  <rect x="920" y="345" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#5eead4" filter="url(#shadow)"/>
  <text x="988" y="392" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Hub</text>
  <text x="946" y="425" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#115e59">share/load agents</text>

  <path d="M280 240 C320 240, 330 240, 360 240" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M830 240 C870 240, 885 240, 920 240" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M830 405 C875 405, 885 405, 920 405" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M575 273 C595 273, 600 273, 615 273" fill="none" stroke="#14b8a6" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M490 318 C490 328, 490 337, 490 348" fill="none" stroke="#14b8a6" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M700 318 C700 328, 700 337, 700 348" fill="none" stroke="#14b8a6" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
