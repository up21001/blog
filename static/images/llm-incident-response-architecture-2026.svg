<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#13253a"/>
    </linearGradient>
    <style>
      .title{font:700 42px system-ui,Segoe UI,sans-serif;fill:#fff}
      .sub{font:500 20px system-ui,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#f59e0b;stroke-width:2;rx:18}
      .box2{fill:#0f172a;stroke:#38bdf8;stroke-width:2;rx:18}
      .text{font:600 18px system-ui,sans-serif;fill:#e5e7eb}
      .small{font:500 15px system-ui,sans-serif;fill:#94a3b8}
      .arrow{stroke:#38bdf8;stroke-width:4;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="82" class="title">LLM Incident Response Architecture</text>
  <text x="60" y="118" class="sub">감지 시스템과 대응 시스템을 분리한다</text>
  <rect x="65" y="185" width="180" height="115" class="box"/>
  <text x="95" y="228" class="text">Monitor</text>
  <text x="95" y="255" class="small">metrics / traces</text>
  <rect x="285" y="185" width="180" height="115" class="box2"/>
  <text x="315" y="228" class="text">Alert Router</text>
  <text x="315" y="255" class="small">severity / owner</text>
  <rect x="505" y="185" width="180" height="115" class="box"/>
  <text x="535" y="228" class="text">Runbook</text>
  <text x="535" y="255" class="small">fallback / rollback</text>
  <rect x="725" y="185" width="180" height="115" class="box2"/>
  <text x="755" y="228" class="text">Incident Desk</text>
  <text x="755" y="255" class="small">ticket / comms</text>
  <rect x="945" y="185" width="180" height="115" class="box"/>
  <text x="977" y="228" class="text">Postmortem</text>
  <text x="977" y="255" class="small">learn / update</text>
  <path d="M245 243 H285" class="arrow"/>
  <path d="M465 243 H505" class="arrow"/>
  <path d="M685 243 H725" class="arrow"/>
  <path d="M905 243 H945" class="arrow"/>
  <rect x="135" y="350" width="930" height="165" class="box"/>
  <text x="175" y="395" class="text">복구 우선순위</text>
  <text x="175" y="428" class="small">1. 사용자 영향이 큰 경로부터 우회한다.</text>
  <text x="175" y="455" class="small">2. 품질 회귀는 모델/프롬프트/라우팅 순으로 좁힌다.</text>
  <text x="175" y="482" class="small">3. incident 결과를 event schema와 audit log에 남긴다.</text>
</svg>
