<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf6ef"/>
      <stop offset="100%" stop-color="#eef6f7"/>
    </linearGradient>
    <style>
      .title{font:700 42px Arial,sans-serif;fill:#172033}
      .sub{font:400 22px Arial,sans-serif;fill:#4c5567}
      .box{fill:#fff;stroke:#172033;stroke-width:3;rx:18;ry:18}
      .label{font:700 22px Arial,sans-serif;fill:#172033}
      .small{font:400 18px Arial,sans-serif;fill:#4c5567}
      .arrow{stroke:#172033;stroke-width:4;fill:none;marker-end:url(#m)}
      .pill{fill:#172033;rx:999;ry:999}
      .pillText{font:700 18px Arial,sans-serif;fill:#fff}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#172033"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="70" class="title">Approval Flow Architecture</text>
  <text x="60" y="110" class="sub">Policy, queue, execution, and audit should be separated</text>
  <rect x="60" y="140" width="210" height="40" class="pill"/>
  <text x="85" y="167" class="pillText">architecture</text>
  <rect class="box" x="70" y="230" width="190" height="110"/>
  <text x="112" y="275" class="label">Policy Layer</text>
  <text x="93" y="305" class="small">Risk rules</text>
  <rect class="box" x="320" y="230" width="190" height="110"/>
  <text x="370" y="275" class="label">Approval Queue</text>
  <text x="350" y="305" class="small">Pending actions</text>
  <rect class="box" x="570" y="230" width="190" height="110"/>
  <text x="610" y="275" class="label">Executor</text>
  <text x="592" y="305" class="small">Approved only</text>
  <rect class="box" x="820" y="230" width="190" height="110"/>
  <text x="868" y="275" class="label">Audit Store</text>
  <text x="845" y="305" class="small">Who, why, when</text>
  <rect class="box" x="320" y="400" width="440" height="110"/>
  <text x="450" y="445" class="label">Human Approval UI</text>
  <text x="400" y="475" class="small">Shows action, impact, and next step</text>
  <path class="arrow" d="M260 285 L320 285"/>
  <path class="arrow" d="M510 285 L570 285"/>
  <path class="arrow" d="M760 285 L820 285"/>
  <path class="arrow" d="M415 340 L415 400"/>
  <path class="arrow" d="M650 400 L650 340"/>
</svg>
