<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Unstructured Workflow 2026</title>
  <desc id="desc">Document ETL pipeline for Unstructured showing connectors, partition, chunk, embed, and stage.</desc>
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg1)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Unstructured Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Document ETL for AI data preparation</text>
  <rect x="70" y="220" width="190" height="110" rx="24" fill="#fff" stroke="#cbd5e1" filter="url(#shadow1)"/>
  <text x="114" y="280" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Sources</text>
  <text x="102" y="310" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">PDF, HTML, email</text>
  <rect x="330" y="150" width="500" height="360" rx="28" fill="#fff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow1)"/>
  <text x="505" y="200" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Unstructured</text>
  <rect x="375" y="250" width="160" height="82" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="404" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Partition</text>
  <rect x="585" y="250" width="160" height="82" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="637" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Chunk</text>
  <rect x="375" y="370" width="160" height="82" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="412" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Embed</text>
  <text x="420" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">vectorize</text>
  <rect x="585" y="370" width="160" height="82" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="637" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Stage</text>
  <text x="632" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">index/store</text>
  <rect x="900" y="220" width="210" height="110" rx="24" fill="#fff" stroke="#cbd5e1" filter="url(#shadow1)"/>
  <text x="948" y="280" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Connectors</text>
  <path d="M260 275 C295 275, 300 275, 330 275" fill="none" stroke="#334155" stroke-width="4" marker-end="url(#arrow1)"/>
  <path d="M830 275 C860 275, 875 275, 900 275" fill="none" stroke="#334155" stroke-width="4" marker-end="url(#arrow1)"/>
  <path d="M535 291 C555 291, 560 291, 585 291" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow1)"/>
  <path d="M455 332 C455 342, 455 352, 455 370" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow1)"/>
  <path d="M665 332 C665 342, 665 352, 665 370" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow1)"/>
</svg>
