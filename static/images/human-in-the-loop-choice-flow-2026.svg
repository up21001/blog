<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#f0fdf4"/><rect x="40" y="40" width="1120" height="550" rx="32" fill="#fff" stroke="#bbf7d0"/><text x="80" y="105" font-size="40" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Need Human Review?</text><rect x="120" y="200" width="220" height="110" rx="24" fill="#dcfce7" stroke="#4ade80"/><text x="160" y="245" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">Low Risk</text><text x="152" y="276" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#15803d">auto proceed</text><rect x="470" y="160" width="260" height="190" rx="28" fill="#f0fdf4" stroke="#86efac"/><text x="522" y="210" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Review Criteria</text><text x="505" y="245" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#166534">impact, cost, confidence</text><text x="505" y="275" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#166534">or policy sensitivity</text><rect x="860" y="200" width="220" height="110" rx="24" fill="#bbf7d0" stroke="#22c55e"/><text x="909" y="245" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">Human Gate</text><text x="897" y="276" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#15803d">approve or edit</text><path d="M340 255 H470" stroke="#166534" stroke-width="4" marker-end="url(#arrow)"/><path d="M730 255 H860" stroke="#166534" stroke-width="4" marker-end="url(#arrow)"/><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#166534"/></marker></defs></svg>
