  <text x="96" y="274" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">Slack, email, CRM,</text>
  <text x="104" y="298" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">webhook, file</text>
  <rect x="350" y="145" rx="28" ry="28" width="500" height="320" fill="#fffaf5" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="196" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Make AI Agent</text>
