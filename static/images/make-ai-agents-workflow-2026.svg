  <text x="430" y="393" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Reasoning</text>
  <rect x="590" y="345" rx="18" ry="18" width="160" height="84" fill="#fff" stroke="#fdba74"/>
  <text x="632" y="393" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Actions</text>
  <rect x="900" y="190" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="962" y="240" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Apps</text>
