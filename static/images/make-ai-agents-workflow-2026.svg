  <text x="420" y="280" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Knowledge</text>
  <rect x="590" y="230" rx="18" ry="18" width="160" height="84" fill="#fff" stroke="#fdba74"/>
  <text x="638" y="280" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Tools</text>
