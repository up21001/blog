<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MCP Server Deployment Choice Flow</title>
  <desc id="desc">Choice flow showing when to use local, remote, or gateway deployment.</desc>
  <rect width="1200" height="630" rx="36" fill="#f8f3ea"/>
  <text x="64" y="86" fill="#2a1f12" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700">Deployment Choice Flow</text>
  <text x="64" y="122" fill="#6f5a41" font-family="Inter, Arial, sans-serif" font-size="20">Choose the smallest safe deployment boundary</text>
  <g fill="#ffffff" stroke="#b06a2a" stroke-width="2">
    <rect x="90" y="220" width="220" height="110" rx="22"/>
    <rect x="350" y="220" width="220" height="110" rx="22"/>
    <rect x="610" y="220" width="220" height="110" rx="22"/>
    <rect x="870" y="220" width="220" height="110" rx="22"/>
  </g>
  <g fill="#2a1f12" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">
    <text x="146" y="262">Local</text>
    <text x="394" y="262">Remote</text>
    <text x="654" y="262">Gateway</text>
    <text x="912" y="262">Rollout</text>
  </g>
  <g stroke="#b06a2a" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M310 275 H340"/>
    <path d="M570 275 H600"/>
    <path d="M830 275 H860"/>
  </g>
  <g fill="#6f5a41" font-family="Inter, Arial, sans-serif" font-size="18">
    <text x="106" y="302">Single tenant</text>
    <text x="362" y="302">Shared access</text>
    <text x="632" y="302">Policy control</text>
    <text x="910" y="302">Safe release</text>
  </g>
</svg>
