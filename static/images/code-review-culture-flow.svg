<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F2937">건강한 코드 리뷰 문화 사이클</text>

  <!-- Center circle -->
  <circle cx="400" cy="225" r="60" fill="#374151" stroke="#1F2937" stroke-width="2"/>
  <text x="400" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="white">심리적</text>
  <text x="400" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="white">안전감</text>
  <text x="400" y="252" text-anchor="middle" font-size="10" fill="#9CA3AF">팀 문화의 핵심</text>

  <!-- Node 1 - PR 작성 -->
  <rect x="30" y="60" width="155" height="80" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="107" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="#1D4ED8">① PR 작성 원칙</text>
  <text x="107" y="104" text-anchor="middle" font-size="11" fill="#374151">400줄 이하 / 단일 목적</text>
  <text x="107" y="120" text-anchor="middle" font-size="11" fill="#374151">컨텍스트 설명 포함</text>
  <text x="107" y="136" text-anchor="middle" font-size="10" fill="#6B7280">셀프 리뷰 먼저</text>

  <!-- Node 2 - 리뷰 요청 -->
  <rect x="615" y="60" width="155" height="80" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="692" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">② 리뷰 요청</text>
  <text x="692" y="104" text-anchor="middle" font-size="11" fill="#374151">24시간 내 초기 응답</text>
  <text x="692" y="120" text-anchor="middle" font-size="11" fill="#374151">도메인 전문가 지정</text>
  <text x="692" y="136" text-anchor="middle" font-size="10" fill="#6B7280">리뷰어 부담 분산</text>

  <!-- Node 3 - 피드백 -->
  <rect x="615" y="310" width="155" height="80" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="692" y="336" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">③ 건설적 피드백</text>
  <text x="692" y="354" text-anchor="middle" font-size="11" fill="#374151">질문형 표현 사용</text>
  <text x="692" y="370" text-anchor="middle" font-size="11" fill="#374151">칭찬 + 개선 균형</text>
  <text x="692" y="386" text-anchor="middle" font-size="10" fill="#6B7280">Nit: 으로 마이너 표시</text>

  <!-- Node 4 - 반영 -->
  <rect x="30" y="310" width="155" height="80" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="107" y="336" text-anchor="middle" font-size="12" font-weight="bold" fill="#4C1D95">④ 반영 & 학습</text>
  <text x="107" y="354" text-anchor="middle" font-size="11" fill="#374151">토론은 PR 댓글로</text>
  <text x="107" y="370" text-anchor="middle" font-size="11" fill="#374151">패턴은 문서화</text>
  <text x="107" y="386" text-anchor="middle" font-size="10" fill="#6B7280">팀 컨벤션 축적</text>

  <!-- Arrows between nodes - clockwise -->
  <line x1="185" y1="100" x2="338" y2="180" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="462" y1="180" x2="615" y2="100" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="615" y1="350" x2="462" y2="270" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="338" y1="270" x2="185" y2="350" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Labels on arrows -->
  <text x="255" y="155" text-anchor="middle" font-size="10" fill="#6B7280">PR 오픈</text>
  <text x="550" y="155" text-anchor="middle" font-size="10" fill="#6B7280">리뷰 시작</text>
  <text x="550" y="320" text-anchor="middle" font-size="10" fill="#6B7280">댓글 작성</text>
  <text x="255" y="320" text-anchor="middle" font-size="10" fill="#6B7280">수정 반영</text>

  <!-- Bottom metrics -->
  <rect x="30" y="415" width="175" height="25" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="117" y="432" text-anchor="middle" font-size="11" fill="#1D4ED8">목표 리뷰 시간: &lt; 24h</text>
  <rect x="215" y="415" width="175" height="25" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="302" y="432" text-anchor="middle" font-size="11" fill="#065F46">PR 크기: 400줄 이하</text>
  <rect x="400" y="415" width="175" height="25" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="487" y="432" text-anchor="middle" font-size="11" fill="#92400E">리뷰어: 1~2명 적정</text>
  <rect x="585" y="415" width="185" height="25" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="677" y="432" text-anchor="middle" font-size="11" fill="#4C1D95">승인률 목표: 80% 이상</text>
</svg>
