<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F2937">시크릿 관리 계층 구조</text>

  <!-- Dev Environment -->
  <rect x="30" y="60" width="220" height="330" rx="10" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="140" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">개발 환경</text>
  <rect x="45" y="100" width="190" height="40" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="140" y="116" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">.env 파일</text>
  <text x="140" y="132" text-anchor="middle" font-size="10" fill="#78350F">로컬 개발용 · .gitignore 필수</text>
  <rect x="45" y="150" width="190" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="140" y="166" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">dotenv / python-decouple</text>
  <text x="140" y="182" text-anchor="middle" font-size="10" fill="#1E3A8A">환경변수 로드 라이브러리</text>
  <rect x="45" y="200" width="190" height="40" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="140" y="216" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">.env.example</text>
  <text x="140" y="232" text-anchor="middle" font-size="10" fill="#064E3B">키 이름만 공유 (값 제외)</text>
  <rect x="45" y="250" width="190" height="40" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="140" y="266" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">direnv</text>
  <text x="140" y="282" text-anchor="middle" font-size="10" fill="#4C1D95">디렉토리별 자동 환경 주입</text>
  <rect x="45" y="300" width="190" height="75" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="140" y="320" text-anchor="middle" font-size="11" font-weight="bold" fill="#991B1B">절대 하지 말 것</text>
  <text x="140" y="338" text-anchor="middle" font-size="10" fill="#7F1D1D">코드에 키 하드코딩</text>
  <text x="140" y="354" text-anchor="middle" font-size="10" fill="#7F1D1D">Git에 .env 커밋</text>
  <text x="140" y="370" text-anchor="middle" font-size="10" fill="#7F1D1D">로그에 시크릿 출력</text>

  <!-- Arrow -->
  <text x="290" y="230" text-anchor="middle" font-size="24" fill="#9CA3AF">→</text>

  <!-- CI/CD -->
  <rect x="310" y="60" width="200" height="200" rx="10" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="410" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">CI/CD 환경</text>
  <rect x="325" y="100" width="170" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="410" y="116" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">GitHub Secrets</text>
  <text x="410" y="132" text-anchor="middle" font-size="10" fill="#1E3A8A">레포 / 조직 / 환경 레벨</text>
  <rect x="325" y="150" width="170" height="40" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="410" y="166" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">GitLab CI Variables</text>
  <text x="410" y="182" text-anchor="middle" font-size="10" fill="#064E3B">Masked · Protected 설정</text>
  <rect x="325" y="200" width="170" height="40" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="410" y="216" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">OIDC 연동</text>
  <text x="410" y="232" text-anchor="middle" font-size="10" fill="#4C1D95">장수명 키 없이 임시 토큰</text>

  <!-- Arrow 2 -->
  <text x="530" y="145" text-anchor="middle" font-size="24" fill="#9CA3AF">→</text>

  <!-- Production -->
  <rect x="555" y="60" width="215" height="330" rx="10" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="663" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">프로덕션 환경</text>
  <rect x="570" y="100" width="185" height="40" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="663" y="116" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">AWS Secrets Manager</text>
  <text x="663" y="132" text-anchor="middle" font-size="10" fill="#78350F">자동 교체 · KMS 암호화</text>
  <rect x="570" y="150" width="185" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="663" y="166" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">HashiCorp Vault</text>
  <text x="663" y="182" text-anchor="middle" font-size="10" fill="#1E3A8A">동적 시크릿 · 감사 로그</text>
  <rect x="570" y="200" width="185" height="40" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="663" y="216" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">GCP Secret Manager</text>
  <text x="663" y="232" text-anchor="middle" font-size="10" fill="#064E3B">버전 관리 · IAM 연동</text>
  <rect x="570" y="250" width="185" height="40" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="663" y="266" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">Kubernetes Secrets</text>
  <text x="663" y="282" text-anchor="middle" font-size="10" fill="#4C1D95">etcd 암호화 · RBAC 설정</text>
  <rect x="570" y="300" width="185" height="75" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="663" y="320" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">모범 사례</text>
  <text x="663" y="338" text-anchor="middle" font-size="10" fill="#064E3B">최소 권한 IAM 역할</text>
  <text x="663" y="354" text-anchor="middle" font-size="10" fill="#064E3B">90일 이내 자동 교체</text>
  <text x="663" y="370" text-anchor="middle" font-size="10" fill="#064E3B">접근 감사 로그 필수</text>

  <!-- Bottom label -->
  <rect x="30" y="405" width="740" height="32" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="400" y="426" text-anchor="middle" font-size="11" fill="#1E40AF">git-secrets · truffleHog · detect-secrets 로 커밋 전 시크릿 스캔 자동화 권장</text>
</svg>
