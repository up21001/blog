<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">RAG ops choice flow 2026</title>
  <desc id="desc">Decision flow diagram for whether a team needs formal RAG operations and evaluation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1320"/>
      <stop offset="100%" stop-color="#2a2d4d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 40px/1.2 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .sub { font: 400 18px/1.5 'Segoe UI', Arial, sans-serif; fill: #cad4e5; }
      .box { font: 700 19px/1.2 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .small { font: 400 15px/1.4 'Segoe UI', Arial, sans-serif; fill: #e6edf8; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="84" class="title">RAG ops choice flow</text>
  <text x="70" y="118" class="sub">Use formal operations once quality, scale, and traceability start to matter</text>

  <rect x="70" y="210" width="220" height="92" rx="22" fill="#0f4c81" filter="url(#shadow)"/>
  <text x="117" y="248" class="box">Need RAG?</text>
  <text x="99" y="277" class="small">retrieval + generation</text>

  <rect x="350" y="210" width="220" height="92" rx="22" fill="#1f8a70" filter="url(#shadow)"/>
  <text x="388" y="248" class="box">Need metrics?</text>
  <text x="368" y="277" class="small">quality and traces</text>

  <rect x="630" y="170" width="220" height="92" rx="22" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="667" y="208" class="box">Build RAG ops</text>
  <text x="656" y="237" class="small">evaluation, observability</text>

  <rect x="630" y="290" width="220" height="92" rx="22" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="659" y="328" class="box">Basic pipeline</text>
  <text x="644" y="357" class="small">good for prototypes</text>

  <rect x="910" y="170" width="220" height="92" rx="22" fill="#ef4444" filter="url(#shadow)"/>
  <text x="956" y="208" class="box">Use Qdrant / pgvector</text>
  <text x="935" y="237" class="small">connect evaluation later</text>

  <path d="M290 256 L350 256" stroke="#9fb2c8" stroke-width="7" stroke-linecap="round"/>
  <path d="M570 256 L630 212" stroke="#9fb2c8" stroke-width="7" stroke-linecap="round"/>
  <path d="M570 256 L630 332" stroke="#9fb2c8" stroke-width="7" stroke-linecap="round"/>
  <path d="M850 212 L910 212" stroke="#9fb2c8" stroke-width="7" stroke-linecap="round"/>

  <text x="70" y="454" class="sub">Once you need repeatable quality improvement, treat RAG like an operational system, not a one-time feature.</text>
</svg>
