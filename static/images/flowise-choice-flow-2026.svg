<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#fff8f1"/><text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Should You Use Flowise?</text><rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#fb923c"/><text x="477" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Need visual LLM apps?</text><rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74"/><text x="188" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">No</text><text x="146" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">A code-first stack may be enough</text><rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74"/><text x="493" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need Agentflow and</text><text x="521" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">evaluations?</text><rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74"/><text x="840" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need self-hosted</text><text x="860" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">deployment too?</text><rect x="445" y="500" width="320" height="110" rx="26" fill="#7c2d12"/><text x="530" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fff7ed">Use Flowise</text><text x="487" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#fed7aa">Strong fit for low-code LLM workflows</text></svg>
