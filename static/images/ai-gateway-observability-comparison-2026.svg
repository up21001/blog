<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI Gateway and Observability Comparison 2026</title>
  <desc id="desc">Comparison diagram for LiteLLM, Portkey, and Helicone positioning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">AI Gateway and Observability Comparison</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#334155">LiteLLM, Portkey, and Helicone solve different layers of the stack</text>

  <rect x="80" y="190" rx="24" width="310" height="330" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="165" y="240" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">LiteLLM</text>
  <text x="115" y="280" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Gateway / proxy / SDK</text>
  <text x="110" y="320" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Routing, fallback, budgets</text>
  <text x="110" y="360" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">OpenAI-compatible format</text>
  <text x="110" y="400" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Cost control for teams</text>

  <rect x="445" y="190" rx="24" width="310" height="330" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="535" y="240" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Portkey</text>
  <text x="487" y="280" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">AI control panel / gateway</text>
  <text x="485" y="320" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Guardrails, prompt library</text>
  <text x="485" y="360" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Observability and logs</text>
  <text x="485" y="400" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Budgets and routing</text>

  <rect x="810" y="190" rx="24" width="310" height="330" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="887" y="240" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Helicone</text>
  <text x="841" y="280" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Observability / sessions</text>
  <text x="845" y="320" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Multi-step request tracing</text>
  <text x="845" y="360" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Analytics and latency</text>
  <text x="845" y="400" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Agent flow debugging</text>
</svg>
