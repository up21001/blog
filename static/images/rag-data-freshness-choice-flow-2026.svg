<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f8fafc"/>
  <style>
    .h1 { font: 700 40px sans-serif; fill: #0f172a; }
    .h2 { font: 400 20px sans-serif; fill: #475569; }
    .b { font: 700 20px sans-serif; fill: #0f172a; }
    .t { font: 400 18px sans-serif; fill: #334155; }
    .r { rx: 18; ry: 18; stroke: #cbd5e1; stroke-width: 2; }
  </style>
  <text x="70" y="76" class="h1">Freshness Decision Flow</text>
  <text x="70" y="110" class="h2">최신 문서 반영이 느릴 때 어디를 볼지 정하는 기준</text>

  <rect x="90" y="170" width="240" height="110" class="r" fill="#dbeafe"/>
  <text x="210" y="212" text-anchor="middle" class="b">Source가 바뀌었는가</text>
  <text x="210" y="244" text-anchor="middle" class="t">change detection</text>

  <rect x="420" y="170" width="240" height="110" class="r" fill="#dcfce7"/>
  <text x="540" y="212" text-anchor="middle" class="b">Index가 늦는가</text>
  <text x="540" y="244" text-anchor="middle" class="t">incremental indexing</text>

  <rect x="750" y="170" width="240" height="110" class="r" fill="#fef9c3"/>
  <text x="870" y="212" text-anchor="middle" class="b">Retrieval이 stale한가</text>
  <text x="870" y="244" text-anchor="middle" class="t">freshness metadata</text>

  <line x1="330" y1="225" x2="420" y2="225" stroke="#64748b" stroke-width="4"/>
  <line x1="660" y1="225" x2="750" y2="225" stroke="#64748b" stroke-width="4"/>

  <rect x="150" y="340" width="900" height="150" class="r" fill="#ffffff"/>
  <text x="185" y="390" class="b">실무 원칙</text>
  <text x="185" y="428" class="t">전체 재색인보다 증분 반영을 우선하고, stale 문서는 검색에서 배제합니다.</text>
</svg>
