<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#fff7ed"/><rect x="40" y="40" width="1120" height="550" rx="32" fill="#fff" stroke="#fed7aa"/><text x="80" y="105" font-size="40" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">When to Handoff?</text><rect x="120" y="200" width="220" height="110" rx="24" fill="#ffedd5" stroke="#fb923c"/><text x="167" y="245" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Same Owner</text><text x="156" y="276" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">keep in one agent</text><rect x="470" y="160" width="260" height="190" rx="28" fill="#fff7ed" stroke="#fdba74"/><text x="512" y="210" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Decision Point</text><text x="505" y="245" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">tool, permission, review</text><text x="505" y="275" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">or domain change</text><rect x="860" y="200" width="220" height="110" rx="24" fill="#fef3c7" stroke="#f59e0b"/><text x="915" y="245" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">Pass the Baton</text><text x="903" y="276" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#b45309">handoff packet</text><path d="M340 255 H470" stroke="#9a3412" stroke-width="4" marker-end="url(#arrow)"/><path d="M730 255 H860" stroke="#9a3412" stroke-width="4" marker-end="url(#arrow)"/><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#9a3412"/></marker></defs></svg>
