<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Exa Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when Exa is a good fit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d4ed8" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Should You Use Exa?</text>
  <rect x="430" y="120" width="340" height="90" rx="22" fill="#fff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
  <text x="470" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Need web research?</text>
  <rect x="110" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="183" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">No</text>
  <text x="143" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">A model API or builder may be enough</text>
  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="487" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Need citations and</text>
  <text x="534" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">answering?</text>
  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="836" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Need structured</text>
  <text x="839" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Websets?</text>
  <rect x="445" y="500" width="320" height="110" rx="26" fill="#1e3a8a" filter="url(#shadow)"/>
  <text x="532" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#eff6ff">Use Exa</text>
  <text x="491" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#bfdbfe">Best fit for AI-native search and research</text>
</svg>
