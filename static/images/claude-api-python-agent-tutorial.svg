<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Claude API Python 에이전트 — 실행 흐름</text>

  <!-- Left: Code panel -->
  <rect x="30" y="52" width="370" height="330" rx="10" fill="#1E293B"/>
  <rect x="30" y="52" width="370" height="28" rx="10" fill="#374151"/>
  <rect x="30" y="68" width="370" height="12" fill="#374151"/>
  <text x="215" y="68" text-anchor="middle" font-size="11" fill="#9CA3AF">agent.py — 에이전트 루프</text>

  <text x="46" y="100" font-size="11" fill="#C084FC" font-family="monospace">import</text>
  <text x="90" y="100" font-size="11" fill="#D1FAE5" font-family="monospace">anthropic</text>

  <text x="46" y="120" font-size="11" fill="#C084FC" font-family="monospace">client =</text>
  <text x="100" y="120" font-size="11" fill="#60A5FA" font-family="monospace">anthropic.Anthropic()</text>

  <text x="46" y="144" font-size="10" fill="#6B7280" font-family="monospace"># 도구 정의</text>
  <text x="46" y="160" font-size="11" fill="#FDE68A" font-family="monospace">tools = [&#123;</text>
  <text x="54" y="176" font-size="11" fill="#D1FAE5" font-family="monospace">"name": "get_weather",</text>
  <text x="54" y="192" font-size="11" fill="#D1FAE5" font-family="monospace">"description": "날씨 조회",</text>
  <text x="54" y="208" font-size="11" fill="#D1FAE5" font-family="monospace">"input_schema": &#123;...&#125;</text>
  <text x="46" y="224" font-size="11" fill="#FDE68A" font-family="monospace">&#125;]</text>

  <text x="46" y="248" font-size="10" fill="#6B7280" font-family="monospace"># 에이전트 루프</text>
  <text x="46" y="264" font-size="11" fill="#C084FC" font-family="monospace">while</text>
  <text x="84" y="264" font-size="11" fill="#D1FAE5" font-family="monospace">True:</text>
  <text x="54" y="280" font-size="11" fill="#60A5FA" font-family="monospace">response = client.messages.create(</text>
  <text x="62" y="296" font-size="11" fill="#94A3B8" font-family="monospace">model="claude-opus-4-5",</text>
  <text x="62" y="312" font-size="11" fill="#94A3B8" font-family="monospace">messages=messages,</text>
  <text x="62" y="328" font-size="11" fill="#94A3B8" font-family="monospace">tools=tools</text>
  <text x="54" y="344" font-size="11" fill="#60A5FA" font-family="monospace">)</text>
  <text x="54" y="362" font-size="11" fill="#C084FC" font-family="monospace">if</text>
  <text x="70" y="362" font-size="11" fill="#D1FAE5" font-family="monospace">stop_reason == "end_turn":</text>
  <text x="62" y="378" font-size="11" fill="#10B981" font-family="monospace">break  # 완료</text>

  <!-- Right: Flow diagram -->
  <rect x="420" y="52" width="350" height="330" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="595" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">에이전트 실행 흐름</text>

  <!-- Flow boxes -->
  <rect x="445" y="88" width="300" height="36" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="595" y="111" text-anchor="middle" font-size="12" fill="#1D4ED8">1. 사용자 입력 수신</text>

  <line x1="595" y1="124" x2="595" y2="140" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a2)"/>

  <rect x="445" y="140" width="300" height="36" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="595" y="163" text-anchor="middle" font-size="12" fill="#065F46">2. Claude API 호출</text>

  <line x1="595" y1="176" x2="595" y2="192" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a2)"/>

  <rect x="445" y="192" width="300" height="36" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="595" y="215" text-anchor="middle" font-size="12" fill="#92400E">3. 응답 분석 (tool_use?)</text>

  <!-- Branch -->
  <line x1="595" y1="228" x2="595" y2="244" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a2)"/>

  <rect x="445" y="244" width="130" height="36" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="510" y="267" text-anchor="middle" font-size="11" fill="#5B21B6">도구 실행</text>

  <rect x="615" y="244" width="130" height="36" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="680" y="267" text-anchor="middle" font-size="11" fill="#374151">최종 응답 반환</text>

  <!-- Loop arrow -->
  <path d="M510 280 Q510 310 595 310 Q680 310 680 280" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="595" y1="308" x2="595" y2="192" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a3)"/>
  <text x="595" y="325" text-anchor="middle" font-size="10" fill="#7C3AED">루프 반복</text>

  <defs>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8B5CF6"/>
    </marker>
  </defs>

  <!-- SDK key points -->
  <rect x="420" y="340" width="350" height="42" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="595" y="358" text-anchor="middle" font-size="11" font-weight="bold" fill="#1D4ED8">SDK 핵심 패턴</text>
  <text x="595" y="374" text-anchor="middle" font-size="10" fill="#1E40AF">client.messages.create() → stop_reason 확인 → tool_use 분기 → 루프</text>

  <!-- Bottom bar -->
  <rect x="30" y="396" width="740" height="42" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="400" y="414" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">설치: pip install anthropic | 환경변수: ANTHROPIC_API_KEY</text>
  <text x="400" y="430" text-anchor="middle" font-size="11" fill="#047857">Tool Use → 에이전트 루프 → 스트리밍 → 멀티턴 대화 순서로 익히면 됩니다</text>
</svg>
