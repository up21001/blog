<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Weaviate Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when Weaviate is a good fit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#14532d" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Should You Use Weaviate?</text>

  <rect x="430" y="120" width="340" height="90" rx="22" fill="#fff" stroke="#4ade80" stroke-width="2" filter="url(#shadow)"/>
  <text x="468" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Need hybrid search?</text>

  <rect x="110" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#16a34a">No</text>
  <text x="136" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#16a34a">A simpler vector DB may be enough</text>

  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="489" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#16a34a">Need modules or</text>
  <text x="534" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#16a34a">rerank?</text>

  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="832" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#16a34a">Need multitenancy</text>
  <text x="857" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#16a34a">and scale?</text>

  <rect x="445" y="500" width="320" height="110" rx="26" fill="#14532d" filter="url(#shadow)"/>
  <text x="512" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#f0fdf4">Use Weaviate</text>
  <text x="479" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#bbf7d0">Strong fit for search-heavy RAG apps</text>

  <path d="M600 210 L600 285" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <path d="M450 340 L410 340" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <path d="M750 340 L790 340" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <path d="M600 395 L600 500" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
</svg>
