<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">W&B Weave Workflow 2026</title>
  <desc id="desc">Observability and evaluation flow for LLM apps with tracing, judges, datasets, and experiments.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#4338ca" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4338ca"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">W&B Weave Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">Tracing, judges, datasets, experiments, and app improvement</text>
  <rect x="80" y="220" width="220" height="110" rx="24" fill="#fff" stroke="#c7d2fe" filter="url(#shadow)"/>
  <text x="127" y="280" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">LLM App</text>
  <rect x="355" y="150" width="500" height="360" rx="28" fill="#fff" stroke="#818cf8" stroke-width="2" filter="url(#shadow)"/>
  <text x="545" y="205" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">W&B Weave</text>
  <rect x="405" y="250" width="170" height="82" rx="18" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="448" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Tracing</text>
  <rect x="635" y="250" width="170" height="82" rx="18" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="683" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Judges</text>
  <rect x="405" y="370" width="170" height="82" rx="18" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="447" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Datasets</text>
  <text x="445" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">eval set</text>
  <rect x="635" y="370" width="170" height="82" rx="18" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="654" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Experiments</text>
  <text x="662" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4338ca">compare</text>
  <rect x="900" y="220" width="220" height="110" rx="24" fill="#fff" stroke="#c7d2fe" filter="url(#shadow)"/>
  <text x="968" y="280" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#312e81">Improved App</text>
  <path d="M300 275 C330 275, 340 275, 355 275" fill="none" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M855 275 C875 275, 885 275, 900 275" fill="none" stroke="#4338ca" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
