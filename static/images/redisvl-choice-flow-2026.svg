<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"><title id="title">RedisVL Choice Flow 2026</title><desc id="desc">Decision flow diagram for when RedisVL is the right choice.</desc><rect width="1200" height="675" fill="#fff7ed"/><text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">RedisVL Choice Flow</text><text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">semantic search, semantic cache, Redis-native AI workflows</text><rect x="70" y="210" width="260" height="150" rx="24" fill="#fff" stroke="#fdba74"/><text x="112" y="262" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Need vectors?</text><text x="98" y="302" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">embeddings + similarity</text><rect x="380" y="210" width="260" height="150" rx="24" fill="#fff" stroke="#fdba74"/><text x="424" y="262" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Use Redis?</text><text x="412" y="302" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">already on Redis stack</text><rect x="690" y="210" width="260" height="150" rx="24" fill="#fff" stroke="#fdba74"/><text x="718" y="262" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Need cache?</text><text x="718" y="302" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">semantic cache or state</text><rect x="1000" y="210" width="130" height="150" rx="24" fill="#fff" stroke="#fdba74"/><text x="1028" y="262" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Yes</text><text x="1016" y="302" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">RedisVL</text><path d="M330 285 C350 285, 355 285, 380 285" fill="none" stroke="#9a3412" stroke-width="4"/><path d="M640 285 C660 285, 665 285, 690 285" fill="none" stroke="#9a3412" stroke-width="4"/><path d="M950 285 C970 285, 975 285, 1000 285" fill="none" stroke="#9a3412" stroke-width="4"/><rect x="220" y="430" width="760" height="110" rx="24" fill="#fff" stroke="#fed7aa"/><text x="270" y="477" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Best fit</text><text x="270" y="512" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">vector search + semantic cache + Python AI app + low-latency Redis layer</text></svg>
