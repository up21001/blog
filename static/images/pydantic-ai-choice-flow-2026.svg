<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#f8fbff"/><text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Should You Use PydanticAI?</text><rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#60a5fa"/><text x="500" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Python team?</text><rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd"/><text x="183" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">No strict types</text><text x="160" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">A simpler SDK may be enough</text><rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd"/><text x="493" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Need structured</text><text x="515" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">output?</text><rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd"/><text x="831" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Need tools and</text><text x="855" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">deps?</text><rect x="445" y="500" width="320" height="110" rx="26" fill="#1e3a8a"/><text x="483" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#eff6ff">Use PydanticAI</text><text x="485" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#bfdbfe">Strong fit for typed Python agents</text></svg>
