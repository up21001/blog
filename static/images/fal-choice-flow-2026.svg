<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">fal Choice Flow 2026</title>
  <desc id="desc">Decision flow for when to use fal.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf5"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2410c"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Should You Use fal?</text>
  <rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#fb923c" stroke-width="2"/>
  <text x="477" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Need media inference?</text>
  <rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74"/>
  <text x="188" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">No</text>
  <text x="149" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">A general model API may be enough</text>
  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74"/>
  <text x="495" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need queue and</text>
  <text x="524" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">GPU scaling?</text>
  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74"/>
  <text x="833" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need image/video</text>
  <text x="860" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">pipelines?</text>
  <rect x="445" y="500" width="320" height="110" rx="26" fill="#7c2d12"/>
  <text x="537" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fff7ed">Use fal</text>
  <text x="487" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#fed7aa">Best when generation throughput matters</text>
  <path d="M600 210 L600 285" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M450 340 L420 340" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M750 340 L790 340" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M600 395 L600 500" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
