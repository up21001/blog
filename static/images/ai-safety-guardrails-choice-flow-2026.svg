<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .bg{fill:#0b1020}
      .a{fill:#111827;stroke:#475569;stroke-width:2;rx:20;ry:20}
      .b{fill:#0f172a;stroke:#64748b;stroke-width:2;rx:20;ry:20}
      .t1{font:700 50px Arial,sans-serif;fill:#f8fafc}
      .t2{font:400 22px Arial,sans-serif;fill:#cbd5e1}
      .h{font:700 24px Arial,sans-serif;fill:#e2e8f0}
      .p{font:400 18px Arial,sans-serif;fill:#cbd5e1}
      .line{stroke:#7dd3fc;stroke-width:5;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#7dd3fc"/>
    </marker>
  </defs>
  <rect width="1200" height="630" class="bg"/>
  <text x="70" y="82" class="t1">Which guardrail first?</text>
  <text x="70" y="124" class="t2">Start with the highest-risk failure mode, then add layers outward.</text>
  <rect x="70" y="190" width="260" height="110" class="a"/>
  <rect x="470" y="190" width="260" height="110" class="b"/>
  <rect x="870" y="190" width="260" height="110" class="a"/>
  <text x="100" y="232" class="h">Input risk</text>
  <text x="100" y="262" class="p">prompt injection, PII, jailbreak</text>
  <text x="500" y="232" class="h">Policy gate</text>
  <text x="500" y="262" class="p">allowlist, denylist, escalation</text>
  <text x="900" y="232" class="h">Execution gate</text>
  <text x="900" y="262" class="p">tools, payments, deletes, deploys</text>
  <path d="M330 245 L470 245" class="line"/>
  <path d="M730 245 L870 245" class="line"/>
  <rect x="70" y="360" width="1030" height="180" class="b"/>
  <text x="95" y="405" class="h">Decision rule</text>
  <text x="95" y="445" class="p">If the risk is about what the model reads, filter input. If the risk is about what it says, validate output.</text>
  <text x="95" y="480" class="p">If the risk can change state in the real world, require explicit approval before execution.</text>
  <text x="95" y="515" class="p">This keeps safety checks cheap, local, and observable.</text>
</svg>
