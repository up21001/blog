<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI Gateway Observability Decision Map 2026</title>
  <desc id="desc">Decision map showing when to choose LiteLLM, Portkey, or Helicone.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Which One Fits?</text>

  <rect x="430" y="120" rx="22" width="340" height="90" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="464" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Need a unified API?</text>

  <rect x="105" y="285" rx="24" width="300" height="110" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="175" y="337" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">No</text>
  <text x="140" y="367" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">A pure observability tool may be enough</text>

  <rect x="450" y="285" rx="24" width="300" height="110" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="505" y="337" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Need routing and</text>
  <text x="525" y="367" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">budgets?</text>

  <rect x="785" y="285" rx="24" width="320" height="110" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="840" y="337" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Need sessions and</text>
  <text x="868" y="367" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">agent tracing?</text>

  <rect x="450" y="500" rx="26" width="320" height="110" fill="#0f172a" filter="url(#shadow)"/>
  <text x="530" y="551" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fff7ed">Use the right layer</text>
  <text x="495" y="581" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#fed7aa">LiteLLM, Portkey, or Helicone</text>
</svg>
