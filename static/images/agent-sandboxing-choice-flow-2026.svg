<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" rx="36" fill="#0f172a"/>
  <text x="70" y="92" fill="#e2e8f0" font-size="40" font-family="Arial" font-weight="700">Sandbox Choice Flow</text>
  <text x="70" y="130" fill="#94a3b8" font-size="20" font-family="Arial">file, network, runtime, secrets</text>
  <rect x="90" y="220" width="220" height="90" rx="18" fill="#111827" stroke="#334155"/>
  <text x="200" y="262" fill="#f8fafc" text-anchor="middle" font-size="24" font-family="Arial" font-weight="700">Needs disk?</text>
  <rect x="350" y="220" width="220" height="90" rx="18" fill="#111827" stroke="#334155"/>
  <text x="460" y="262" fill="#f8fafc" text-anchor="middle" font-size="24" font-family="Arial" font-weight="700">Needs network?</text>
  <rect x="610" y="220" width="220" height="90" rx="18" fill="#111827" stroke="#334155"/>
  <text x="720" y="262" fill="#f8fafc" text-anchor="middle" font-size="24" font-family="Arial" font-weight="700">Needs secrets?</text>
  <rect x="880" y="220" width="220" height="90" rx="18" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  <text x="990" y="262" fill="#f8fafc" text-anchor="middle" font-size="24" font-family="Arial" font-weight="700">Allow inside box</text>
  <path d="M310 265 L340 265" stroke="#38bdf8" stroke-width="5"/>
  <path d="M570 265 L600 265" stroke="#38bdf8" stroke-width="5"/>
  <path d="M830 265 L860 265" stroke="#38bdf8" stroke-width="5"/>
  <rect x="120" y="380" width="960" height="150" rx="24" fill="#111827" stroke="#334155"/>
  <text x="600" y="430" fill="#f8fafc" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700">Every answer is "how much scope?"</text>
  <text x="600" y="468" fill="#cbd5e1" text-anchor="middle" font-size="20" font-family="Arial">smallest writable area, smallest network set, shortest-lived token</text>
  <text x="600" y="504" fill="#38bdf8" text-anchor="middle" font-size="18" font-family="Arial">limit the blast radius before the first tool call</text>
</svg>

