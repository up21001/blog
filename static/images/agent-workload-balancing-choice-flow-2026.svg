<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Agent Workload Balancing Choice Flow</title>
  <desc id="desc">Decision flow for balancing by capability, queue depth, and cost.</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #e5e7eb; }
      .title { font-size: 38px; font-weight: 700; }
      .small { font-size: 18px; fill: #cbd5e1; }
      .box { rx: 18; ry: 18; stroke: #14b8a6; stroke-width: 2.5; fill: rgba(17, 24, 39, 0.75); }
      .line { stroke: #5eead4; stroke-width: 4; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#5eead4"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="#06131f"/>
  <text x="60" y="82" class="title">Agent Workload Balancing Choice Flow</text>
  <text x="60" y="120" class="small">Choose agent by queue depth, capability, and cost target</text>
  <rect x="70" y="200" width="220" height="100" class="box"/>
  <text x="180" y="240" text-anchor="middle" font-size="22" font-weight="700">Queue depth high?</text>
  <text x="180" y="268" text-anchor="middle" class="small">Need reroute</text>
  <rect x="360" y="175" width="230" height="150" class="box"/>
  <text x="475" y="218" text-anchor="middle" font-size="22" font-weight="700">Skill match?</text>
  <text x="475" y="246" text-anchor="middle" class="small">Capability first</text>
  <text x="475" y="274" text-anchor="middle" class="small">Then cost</text>
  <rect x="665" y="170" width="240" height="160" class="box"/>
  <text x="785" y="214" text-anchor="middle" font-size="22" font-weight="700">Cost acceptable?</text>
  <text x="785" y="242" text-anchor="middle" class="small">Premium path?</text>
  <text x="785" y="270" text-anchor="middle" class="small">Fallback agent</text>
  <rect x="980" y="195" width="150" height="110" class="box"/>
  <text x="1055" y="235" text-anchor="middle" font-size="22" font-weight="700">Assign</text>
  <text x="1055" y="262" text-anchor="middle" class="small">Worker</text>
  <line x1="290" y1="250" x2="360" y2="250" class="line"/>
  <line x1="590" y1="250" x2="665" y2="250" class="line"/>
  <line x1="905" y1="250" x2="980" y2="250" class="line"/>
</svg>
