<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111d"/>
      <stop offset="1" stop-color="#162844"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="180" x2="1080" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <text x="70" y="96" fill="#e2e8f0" font-family="Arial" font-size="52" font-weight="700">Chunking Choice Flow</text>
  <text x="70" y="138" fill="#fbbf24" font-family="Arial" font-size="22">fixed length vs semantic vs hierarchical</text>
  <rect x="70" y="210" width="170" height="100" rx="18" fill="#1f2937" stroke="#f59e0b" stroke-width="2"/>
  <text x="155" y="252" text-anchor="middle" fill="#fff" font-family="Arial" font-size="24" font-weight="700">Doc type?</text>
  <text x="155" y="280" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="16">layout matters</text>
  <polygon points="340,260 400,200 460,260 400,320" fill="#12344d" stroke="#60a5fa" stroke-width="2"/>
  <text x="400" y="256" text-anchor="middle" fill="#fff" font-family="Arial" font-size="22" font-weight="700">Structure?</text>
  <text x="400" y="282" text-anchor="middle" fill="#fff" font-family="Arial" font-size="22" font-weight="700">strong</text>
  <rect x="520" y="190" width="210" height="120" rx="18" fill="#1f2937" stroke="#f59e0b" stroke-width="2"/>
  <text x="625" y="240" text-anchor="middle" fill="#fff" font-family="Arial" font-size="24" font-weight="700">Fixed length</text>
  <text x="625" y="270" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="16">simple docs</text>
  <rect x="520" y="360" width="210" height="120" rx="18" fill="#1f2937" stroke="#f59e0b" stroke-width="2"/>
  <text x="625" y="410" text-anchor="middle" fill="#fff" font-family="Arial" font-size="24" font-weight="700">Semantic</text>
  <text x="625" y="440" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="16">section aware</text>
  <rect x="800" y="280" width="250" height="120" rx="18" fill="#12344d" stroke="#60a5fa" stroke-width="2"/>
  <text x="925" y="330" text-anchor="middle" fill="#fff" font-family="Arial" font-size="24" font-weight="700">Hierarchical</text>
  <text x="925" y="360" text-anchor="middle" fill="#bfdbfe" font-family="Arial" font-size="16">manuals and policy docs</text>
  <path d="M240 260 H330" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M460 260 H510" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M460 260 C540 260, 510 420, 520 420" stroke="url(#accent)" stroke-width="6" fill="none"/>
  <path d="M730 250 H790" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <text x="70" y="545" fill="#dbeafe" font-family="Arial" font-size="24" font-weight="700">The right strategy depends on document structure, not model preference alone.</text>
</svg>

