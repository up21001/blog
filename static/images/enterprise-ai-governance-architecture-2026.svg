<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise AI Governance Architecture</title>
  <desc id="desc">Layered architecture showing policy, execution, and audit for enterprise AI governance.</desc>
  <rect width="1200" height="630" fill="#0d2033"/>
  <text x="70" y="88" fill="#f0f6ff" font-size="34" font-weight="700">Governance Architecture</text>
  <text x="70" y="124" fill="#a8bed4" font-size="18">Policy layer, execution layer, and audit layer working together</text>
  <g fill="#12304c" stroke="#6c87a6" stroke-width="2">
    <rect x="90" y="180" rx="16" width="1020" height="88"/>
    <rect x="90" y="290" rx="16" width="1020" height="88"/>
    <rect x="90" y="400" rx="16" width="1020" height="88"/>
  </g>
  <g fill="#f0f6ff" font-size="22" font-weight="700">
    <text x="130" y="232">Policy Layer</text>
    <text x="330" y="232">Roles, approvals, tool policy, data scope</text>
    <text x="130" y="342">Execution Layer</text>
    <text x="330" y="342">Model calls, tool use, guardrails, exceptions</text>
    <text x="130" y="452">Audit Layer</text>
    <text x="330" y="452">Logs, traces, replay, compliance evidence</text>
  </g>
  <g stroke="#9fd3ff" stroke-width="4" fill="none">
    <path d="M600 268 V288"/>
    <path d="M600 378 V398"/>
  </g>
  <circle cx="980" cy="520" r="62" fill="#1f7a8c" opacity="0.35"/>
  <circle cx="1030" cy="170" r="42" fill="#ffcf7d" opacity="0.28"/>
</svg>
