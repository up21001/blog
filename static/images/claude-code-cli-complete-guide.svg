<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Claude Code CLI 완전 정복 — 핵심 명령어 구조</text>

  <!-- Terminal box -->
  <rect x="30" y="55" width="360" height="280" rx="10" fill="#1E293B"/>
  <rect x="30" y="55" width="360" height="32" rx="10" fill="#374151"/>
  <rect x="30" y="75" width="360" height="12" fill="#374151"/>
  <circle cx="54" cy="71" r="6" fill="#EF4444"/>
  <circle cx="74" cy="71" r="6" fill="#F59E0B"/>
  <circle cx="94" cy="71" r="6" fill="#10B981"/>
  <text x="200" y="76" text-anchor="middle" font-size="11" fill="#9CA3AF">Terminal</text>

  <text x="46" y="108" font-size="12" fill="#10B981" font-family="monospace">$ claude</text>
  <text x="46" y="128" font-size="11" fill="#94A3B8" font-family="monospace">Claude Code v1.x — agentic coding</text>
  <text x="46" y="148" font-size="12" fill="#60A5FA" font-family="monospace">&gt; /help</text>
  <text x="46" y="168" font-size="11" fill="#D1FAE5" font-family="monospace">  /help     — 도움말 표시</text>
  <text x="46" y="184" font-size="11" fill="#D1FAE5" font-family="monospace">  /commit   — 커밋 메시지 생성</text>
  <text x="46" y="200" font-size="11" fill="#D1FAE5" font-family="monospace">  /review   — 코드 리뷰 요청</text>
  <text x="46" y="216" font-size="11" fill="#D1FAE5" font-family="monospace">  /clear    — 컨텍스트 초기화</text>
  <text x="46" y="232" font-size="11" fill="#D1FAE5" font-family="monospace">  /exit     — 종료</text>
  <text x="46" y="252" font-size="12" fill="#60A5FA" font-family="monospace">&gt; 버그를 찾아서 고쳐줘</text>
  <text x="46" y="272" font-size="11" fill="#FDE68A" font-family="monospace">  파일 분석 중...</text>
  <text x="46" y="292" font-size="11" fill="#FDE68A" font-family="monospace">  수정 제안 작성 중...</text>
  <text x="46" y="312" font-size="12" fill="#10B981" font-family="monospace">  [y/n] 적용하시겠습니까?</text>

  <!-- Right side: flow steps -->
  <text x="430" y="72" font-size="14" font-weight="bold" fill="#1E293B">워크플로우 단계</text>

  <!-- Step boxes -->
  <rect x="430" y="85" width="340" height="44" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="450" y="103" font-size="12" font-weight="bold" fill="#1D4ED8">1. 설치 및 시작</text>
  <text x="450" y="120" font-size="11" fill="#1E40AF">npm install -g @anthropic-ai/claude-code</text>

  <rect x="430" y="140" width="340" height="44" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="450" y="158" font-size="12" font-weight="bold" fill="#065F46">2. 코드베이스 탐색</text>
  <text x="450" y="175" font-size="11" fill="#064E3B">"이 프로젝트 구조를 설명해줘"</text>

  <rect x="430" y="195" width="340" height="44" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="450" y="213" font-size="12" font-weight="bold" fill="#92400E">3. 슬래시 커맨드 활용</text>
  <text x="450" y="230" font-size="11" fill="#78350F">/commit, /review, /clear, /help</text>

  <rect x="430" y="250" width="340" height="44" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="450" y="268" font-size="12" font-weight="bold" fill="#5B21B6">4. 승인 기반 편집</text>
  <text x="450" y="285" font-size="11" fill="#4C1D95">변경 검토 → y/n 확인 → 적용</text>

  <rect x="430" y="305" width="340" height="44" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="450" y="323" font-size="12" font-weight="bold" fill="#374151">5. Git 통합</text>
  <text x="450" y="340" font-size="11" fill="#1F2937">커밋 메시지 자동 생성 및 PR 보조</text>

  <!-- Arrow between terminal and steps -->
  <line x1="395" y1="195" x2="425" y2="195" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Bottom tips -->
  <rect x="30" y="355" width="740" height="70" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="400" y="374" text-anchor="middle" font-size="12" font-weight="bold" fill="#1D4ED8">실전 팁</text>
  <text x="60" y="394" font-size="11" fill="#1E40AF">- 작은 작업 단위로 요청할수록 결과가 정확해집니다</text>
  <text x="60" y="412" font-size="11" fill="#1E40AF">- /clear 로 컨텍스트를 초기화하면 새 작업에 집중할 수 있습니다</text>
  <text x="420" y="394" font-size="11" fill="#1E40AF">- 탐색 먼저, 수정 나중의 순서를 지킵니다</text>
  <text x="420" y="412" font-size="11" fill="#1E40AF">- Git 작업까지 Claude Code 한 흐름에서 처리 가능합니다</text>
</svg>
