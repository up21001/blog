<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#fffaf5"/><text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Should You Use Browser Use?</text><rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#fb923c"/><text x="460" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Need browser automation?</text><rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74"/><text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">No</text><text x="140" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">A normal API integration may be enough</text><rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74"/><text x="487" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need sessions and</text><text x="519" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">profiles?</text><rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74"/><text x="831" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need stealth, proxy,</text><text x="861" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">or MCP?</text><rect x="445" y="500" width="320" height="110" rx="26" fill="#7c2d12"/><text x="493" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fff7ed">Use Browser Use</text><text x="476" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#fed7aa">Best for agentic browser workflows</text></svg>
