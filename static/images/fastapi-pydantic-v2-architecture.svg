<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <rect width="800" height="450" fill="#FAFAFA" rx="12"/>
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">FastAPI + Pydantic v2 요청 처리 흐름</text>

  <!-- Client -->
  <rect x="30" y="185" width="110" height="60" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2" rx="8"/>
  <text x="85" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="#5B21B6">클라이언트</text>
  <text x="85" y="228" text-anchor="middle" font-size="11" fill="#6D28D9">HTTP Request</text>

  <!-- Arrow 1 -->
  <line x1="142" y1="215" x2="178" y2="215" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- FastAPI Router -->
  <rect x="180" y="175" width="130" height="80" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" rx="8"/>
  <text x="245" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">FastAPI</text>
  <text x="245" y="222" text-anchor="middle" font-size="11" fill="#1D4ED8">Router / Endpoint</text>
  <text x="245" y="240" text-anchor="middle" font-size="10" fill="#3B82F6">자동 라우팅</text>

  <!-- Arrow 2 -->
  <line x1="312" y1="215" x2="348" y2="215" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Pydantic v2 -->
  <rect x="350" y="155" width="140" height="120" fill="#D1FAE5" stroke="#10B981" stroke-width="2" rx="8"/>
  <text x="420" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">Pydantic v2</text>
  <text x="420" y="200" text-anchor="middle" font-size="11" fill="#047857">모델 유효성 검사</text>
  <text x="420" y="218" text-anchor="middle" font-size="10" fill="#10B981">• 타입 강제 변환</text>
  <text x="420" y="234" text-anchor="middle" font-size="10" fill="#10B981">• 커스텀 validator</text>
  <text x="420" y="250" text-anchor="middle" font-size="10" fill="#10B981">• Rust 기반 코어</text>

  <!-- Arrow 3 -->
  <line x1="492" y1="215" x2="528" y2="215" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Business Logic -->
  <rect x="530" y="175" width="130" height="80" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" rx="8"/>
  <text x="595" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">비즈니스 로직</text>
  <text x="595" y="222" text-anchor="middle" font-size="11" fill="#B45309">서비스 레이어</text>
  <text x="595" y="240" text-anchor="middle" font-size="10" fill="#D97706">DB / 외부 API</text>

  <!-- Arrow 4 -->
  <line x1="662" y1="215" x2="698" y2="215" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Response -->
  <rect x="700" y="185" width="80" height="60" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2" rx="8"/>
  <text x="740" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#5B21B6">JSON</text>
  <text x="740" y="228" text-anchor="middle" font-size="11" fill="#6D28D9">Response</text>

  <!-- Error flow -->
  <rect x="350" y="310" width="140" height="60" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5" rx="8"/>
  <text x="420" y="335" text-anchor="middle" font-size="12" font-weight="bold" fill="#991B1B">422 Validation</text>
  <text x="420" y="353" text-anchor="middle" font-size="11" fill="#B91C1C">Error Response</text>
  <line x1="420" y1="277" x2="420" y2="308" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>

  <!-- Bottom stats -->
  <rect x="60" y="395" width="200" height="40" fill="#DBEAFE" stroke="#3B82F6" rx="6"/>
  <text x="160" y="411" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">Pydantic v2 성능</text>
  <text x="160" y="428" text-anchor="middle" font-size="11" fill="#1D4ED8">v1 대비 5~50배 빠름</text>

  <rect x="300" y="395" width="200" height="40" fill="#D1FAE5" stroke="#10B981" rx="6"/>
  <text x="400" y="411" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">자동 문서 생성</text>
  <text x="400" y="428" text-anchor="middle" font-size="11" fill="#047857">OpenAPI + Swagger UI</text>

  <rect x="540" y="395" width="200" height="40" fill="#FEF3C7" stroke="#F59E0B" rx="6"/>
  <text x="640" y="411" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">비동기 지원</text>
  <text x="640" y="428" text-anchor="middle" font-size="11" fill="#B45309">async/await 네이티브</text>

  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10B981"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F59E0B"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#EF4444"/>
    </marker>
  </defs>
</svg>
