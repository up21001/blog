<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Tool Calling Workflow 2026</title>
  <desc id="desc">Diagram showing tool calling flow from user request to app response</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">Tool Calling Workflow</text>
  <text x="70" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#475569">request -> schema -> tool execution -> validation -> answer</text>
  <rect x="70" y="230" width="170" height="110" rx="22" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="155" y="274" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">User</text>
  <text x="155" y="304" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#dbeafe">natural language</text>
  <rect x="290" y="210" width="220" height="150" rx="24" fill="#0f766e" filter="url(#shadow)"/>
  <text x="400" y="258" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">Model</text>
  <text x="400" y="292" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#d1fae5">select tool</text>
  <text x="400" y="320" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#d1fae5">build args</text>
  <rect x="580" y="190" width="190" height="90" rx="20" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="675" y="244" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Tool Schema</text>
  <rect x="580" y="305" width="190" height="90" rx="20" fill="#ea580c" filter="url(#shadow)"/>
  <text x="675" y="359" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Tool Result</text>
  <rect x="820" y="220" width="160" height="120" rx="22" fill="#334155" filter="url(#shadow)"/>
  <text x="900" y="268" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">Validate</text>
  <text x="900" y="300" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#e2e8f0">check output</text>
  <rect x="1020" y="230" width="120" height="100" rx="20" fill="#111827" filter="url(#shadow)"/>
  <text x="1080" y="274" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">App</text>
  <text x="1080" y="302" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#cbd5e1">final answer</text>
  <line x1="240" y1="285" x2="290" y2="285" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="510" y1="275" x2="580" y2="235" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="510" y1="305" x2="580" y2="350" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="770" y1="280" x2="820" y2="280" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="980" y1="280" x2="1020" y2="280" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
</svg>
