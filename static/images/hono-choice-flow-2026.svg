<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#f0fdf4"/><text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#166534">Should You Use Hono?</text><rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#4ade80"/><text x="486" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#166534">Need lightweight API?</text><rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#86efac"/><text x="189" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">No</text><text x="146" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#15803d">A fuller server framework may fit better</text><rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#86efac"/><text x="504" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">Need multi-</text><text x="517" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">runtime?</text><rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#86efac"/><text x="851" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">Edge or web</text><text x="856" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">standards?</text><rect x="445" y="500" width="320" height="110" rx="26" fill="#166534"/><text x="534" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ecfdf5">Use Hono</text><text x="485" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#bbf7d0">Great for lightweight runtime-flexible APIs</text></svg>
