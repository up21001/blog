<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise AI Governance Choice Flow</title>
  <desc id="desc">Decision flow for whether an AI request is allowed, denied, or escalated.</desc>
  <rect width="1200" height="630" fill="#16263a"/>
  <text x="70" y="88" fill="#f2f7ff" font-size="34" font-weight="700">Governance Choice Flow</text>
  <text x="70" y="124" fill="#a9bfd7" font-size="18">Allowed, denied, or escalated based on policy and risk</text>
  <g fill="#1f3550" stroke="#88a6c7" stroke-width="2">
    <rect x="70" y="210" rx="18" width="190" height="88"/>
    <rect x="350" y="170" rx="18" width="210" height="88"/>
    <rect x="350" y="310" rx="18" width="210" height="88"/>
    <rect x="650" y="170" rx="18" width="210" height="88"/>
    <rect x="650" y="310" rx="18" width="210" height="88"/>
    <rect x="930" y="240" rx="18" width="200" height="88"/>
  </g>
  <g fill="#f2f7ff" font-size="20" font-weight="700">
    <text x="118" y="258">Request</text>
    <text x="394" y="205">Policy check</text>
    <text x="410" y="345">Risk check</text>
    <text x="706" y="205">Approved</text>
    <text x="685" y="345">Needs human</text>
    <text x="978" y="294">Execute</text>
  </g>
  <g fill="#9fd3ff" stroke="#9fd3ff" stroke-width="4">
    <path d="M260 254 H340"/>
    <path d="M560 214 L640 214"/>
    <path d="M560 354 L640 354"/>
    <path d="M860 214 H920"/>
    <path d="M860 354 L930 294"/>
  </g>
  <text x="286" y="242" fill="#ffcf7d" font-size="18">allowed</text>
  <text x="286" y="330" fill="#ff9f9f" font-size="18">blocked</text>
  <text x="574" y="244" fill="#ffcf7d" font-size="18">low risk</text>
  <text x="574" y="382" fill="#ffcf7d" font-size="18">high risk</text>
  <text x="72" y="560" fill="#c8d8eb" font-size="18">Decision path should be deterministic, explainable, and logged.</text>
</svg>
