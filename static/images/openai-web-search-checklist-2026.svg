<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720"><rect width="1200" height="720" fill="#fffaf2"/><text x="70" y="88" font-family="Segoe UI, Arial" font-size="38" font-weight="700" fill="#21384c">Web Search 설계 체크리스트</text><text x="70" y="126" font-family="Segoe UI, Arial" font-size="20" fill="#5b7388">정확도, 최신성, 재현성, 출처 표시는 함께 설계해야 합니다.</text><rect x="250" y="200" width="700" height="360" rx="28" fill="#0f4c81"/><text x="320" y="265" font-family="Segoe UI, Arial" font-size="26" font-weight="700" fill="#fff">점검 항목</text><text x="320" y="315" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- live access가 필요한가</text><text x="320" y="355" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- domain filtering이 필요한가</text><text x="320" y="395" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- sources를 기록할 것인가</text><text x="320" y="435" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- 최신 정보 질문과 내부 문서 질문을 분리했는가</text><text x="320" y="475" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- 비용/지연을 감안했는가</text></svg>
