<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#f0fdfa"/><text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#166534">Should You Use Pipedream?</text><rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#4ade80"/><text x="468" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#166534">Need integrations?</text><rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#86efac"/><text x="186" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">No</text><text x="150" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#15803d">A simpler app may not need it yet</text><rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#86efac"/><text x="494" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">Need auth and</text><text x="520" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">triggers?</text><rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#86efac"/><text x="848" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">Need code steps</text><text x="854" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">and MCP?</text><rect x="445" y="500" width="320" height="110" rx="26" fill="#166534"/><text x="516" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ecfdf5">Use Pipedream</text><text x="488" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#bbf7d0">Great for integrations and automation</text></svg>
