<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">MCP Server Architecture 2026</title>
  <desc id="desc">AI client, MCP server, and external tools architecture diagram</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f9ff"/>
      <stop offset="100%" stop-color="#e4f1ea"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4c81"/>
      <stop offset="100%" stop-color="#2166a5"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#146356"/>
      <stop offset="100%" stop-color="#1f8a70"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc6b2c"/>
      <stop offset="100%" stop-color="#e58f45"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#37526b" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#35566f"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="70" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#163047">MCP 서버 아키텍처</text>
  <text x="70" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#436176">모델, 표준 인터페이스, 외부 도구를 분리해 연결하는 구조</text>

  <rect x="80" y="200" rx="28" ry="28" width="270" height="260" fill="url(#cardA)" filter="url(#shadow)"/>
  <text x="115" y="260" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">AI Client</text>
  <text x="115" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#d9ebff">Claude Desktop</text>
  <text x="115" y="338" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#d9ebff">IDE Agent</text>
  <text x="115" y="371" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#d9ebff">Workflow Runner</text>
  <text x="115" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ffffff">도구 호출 계획 수립</text>
  <text x="115" y="448" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ffffff">입력과 응답 해석</text>

  <rect x="455" y="160" rx="32" ry="32" width="300" height="340" fill="url(#cardB)" filter="url(#shadow)"/>
  <text x="500" y="225" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">MCP Server</text>
  <text x="500" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#dff7ef">표준 스키마, 권한, 도구 노출</text>
  <rect x="500" y="302" rx="18" ry="18" width="210" height="52" fill="#f2fbf8" opacity="0.95"/>
  <text x="525" y="336" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#156150">tools</text>
  <rect x="500" y="370" rx="18" ry="18" width="210" height="52" fill="#f2fbf8" opacity="0.95"/>
  <text x="525" y="404" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#156150">resources</text>
  <rect x="500" y="438" rx="18" ry="18" width="210" height="52" fill="#f2fbf8" opacity="0.95"/>
  <text x="525" y="472" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#156150">permissions</text>

  <rect x="850" y="110" rx="24" ry="24" width="250" height="120" fill="url(#cardC)" filter="url(#shadow)"/>
  <text x="885" y="160" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Filesystem</text>
  <text x="885" y="195" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#fff5e7">허용된 폴더만 접근</text>

  <rect x="850" y="270" rx="24" ry="24" width="250" height="120" fill="url(#cardC)" filter="url(#shadow)"/>
  <text x="885" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Git / Repo</text>
  <text x="885" y="355" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#fff5e7">커밋, 브랜치, 변경 이력</text>

  <rect x="850" y="430" rx="24" ry="24" width="250" height="120" fill="url(#cardC)" filter="url(#shadow)"/>
  <text x="885" y="480" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Docs / API</text>
  <text x="885" y="515" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#fff5e7">검색, 조회, 업무 시스템</text>

  <path d="M350 330 L455 330" stroke="#35566f" stroke-width="8" fill="none" marker-end="url(#arrow)"/>
  <path d="M755 220 L850 170" stroke="#35566f" stroke-width="8" fill="none" marker-end="url(#arrow)"/>
  <path d="M755 330 L850 330" stroke="#35566f" stroke-width="8" fill="none" marker-end="url(#arrow)"/>
  <path d="M755 440 L850 490" stroke="#35566f" stroke-width="8" fill="none" marker-end="url(#arrow)"/>

  <rect x="80" y="560" rx="20" ry="20" width="1020" height="96" fill="#ffffff" opacity="0.8"/>
  <text x="110" y="607" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1f3e54">핵심 포인트</text>
  <text x="280" y="607" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#365972">모델은 모든 시스템을 직접 이해하지 않고, MCP 서버를 통해 안전한 도구와 데이터만 표준 형식으로 사용합니다.</text>
</svg>
