<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f8f4"/>
      <stop offset="100%" stop-color="#edf2ff"/>
    </linearGradient>
    <style>
      .title{font:700 42px Arial,sans-serif;fill:#132238}
      .sub{font:400 22px Arial,sans-serif;fill:#435168}
      .box{fill:#fff;stroke:#132238;stroke-width:3;rx:18;ry:18}
      .label{font:700 22px Arial,sans-serif;fill:#132238}
      .small{font:400 18px Arial,sans-serif;fill:#4b5563}
      .arrow{stroke:#132238;stroke-width:4;fill:none;marker-end:url(#m)}
      .pill{fill:#132238;rx:999;ry:999}
      .pillText{font:700 18px Arial,sans-serif;fill:#fff}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#132238"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="70" class="title">Approval Decision Flow</text>
  <text x="60" y="110" class="sub">Classify by impact, reversibility, and data sensitivity</text>
  <rect x="60" y="140" width="180" height="40" class="pill"/>
  <text x="85" y="167" class="pillText">choice flow</text>
  <rect class="box" x="80" y="230" width="170" height="110"/>
  <text x="115" y="275" class="label">Read</text>
  <text x="100" y="305" class="small">Auto approve</text>
  <rect class="box" x="350" y="230" width="170" height="110"/>
  <text x="386" y="275" class="label">Write</text>
  <text x="372" y="305" class="small">Conditional</text>
  <rect class="box" x="620" y="230" width="170" height="110"/>
  <text x="662" y="275" class="label">Delete</text>
  <text x="640" y="305" class="small">Human review</text>
  <rect class="box" x="890" y="230" width="170" height="110"/>
  <text x="922" y="275" class="label">Release</text>
  <text x="903" y="305" class="small">Final approval</text>
  <path class="arrow" d="M250 285 L350 285"/>
  <path class="arrow" d="M520 285 L620 285"/>
  <path class="arrow" d="M790 285 L890 285"/>
</svg>
