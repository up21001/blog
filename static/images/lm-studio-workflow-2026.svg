<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">LM Studio Workflow 2026</title>
  <desc id="desc">LM Studio local inference workflow with REST API, model management, chats, and MCP.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#155e75" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#134e4a">LM Studio Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">Local inference, model management, stateful chats, and MCP via API</text>

  <rect x="70" y="210" width="220" height="120" rx="24" fill="#fff" stroke="#67e8f9" filter="url(#shadow)"/>
  <text x="132" y="260" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#134e4a">User App</text>
  <text x="115" y="292" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">CLI, app, notebook</text>

  <rect x="360" y="150" width="480" height="370" rx="28" fill="#fff" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
  <text x="530" y="204" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#134e4a">LM Studio</text>
  <rect x="405" y="250" width="160" height="82" rx="18" fill="#f0fdff" stroke="#67e8f9"/>
  <text x="439" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">REST API</text>
  <rect x="625" y="250" width="160" height="82" rx="18" fill="#f0fdff" stroke="#67e8f9"/>
  <text x="644" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Model Mgmt</text>
  <rect x="405" y="370" width="160" height="82" rx="18" fill="#f0fdff" stroke="#67e8f9"/>
  <text x="426" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Stateful</text>
  <text x="442" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">chats</text>
  <rect x="625" y="370" width="160" height="82" rx="18" fill="#f0fdff" stroke="#67e8f9"/>
  <text x="655" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">MCP</text>
  <text x="649" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">via API</text>

  <rect x="920" y="210" width="210" height="120" rx="24" fill="#fff" stroke="#67e8f9" filter="url(#shadow)"/>
  <text x="976" y="260" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#134e4a">OpenAI</text>
  <text x="946" y="292" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">and Anthropic clients</text>

  <path d="M290 270 C325 270, 330 270, 360 270" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M845 270 C885 270, 900 270, 920 270" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M505 332 C505 350, 505 360, 505 370" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M705 332 C705 350, 705 360, 705 370" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
