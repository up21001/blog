<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <style>
      .title { font: 700 42px sans-serif; fill: #7c2d12; }
      .sub { font: 400 20px sans-serif; fill: #9a3412; }
      .boxTitle { font: 700 22px sans-serif; fill: #7c2d12; }
      .boxText { font: 400 18px sans-serif; fill: #334155; }
      .card { rx: 22; ry: 22; stroke: #fdba74; stroke-width: 2; }
    </style>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <text x="70" y="78" class="title">RAG Monitoring</text>
  <text x="70" y="114" class="sub">검색 품질, 답변 품질, 비용을 같이 추적하는 흐름</text>

  <rect x="70" y="170" width="180" height="120" class="card" fill="#ffffff"/>
  <text x="160" y="218" text-anchor="middle" class="boxTitle">Query Logs</text>
  <text x="160" y="250" text-anchor="middle" class="boxText">질의 수집</text>

  <rect x="290" y="170" width="180" height="120" class="card" fill="#fff7ed"/>
  <text x="380" y="218" text-anchor="middle" class="boxTitle">Retrieval Trace</text>
  <text x="380" y="250" text-anchor="middle" class="boxText">검색 추적</text>

  <rect x="510" y="170" width="180" height="120" class="card" fill="#ecfccb"/>
  <text x="600" y="218" text-anchor="middle" class="boxTitle">Answer Trace</text>
  <text x="600" y="250" text-anchor="middle" class="boxText">답변 추적</text>

  <rect x="730" y="170" width="180" height="120" class="card" fill="#fef9c3"/>
  <text x="820" y="218" text-anchor="middle" class="boxTitle">Metrics</text>
  <text x="820" y="250" text-anchor="middle" class="boxText">품질 / 비용</text>

  <rect x="950" y="170" width="180" height="120" class="card" fill="#ffe4e6"/>
  <text x="1040" y="218" text-anchor="middle" class="boxTitle">Alerts</text>
  <text x="1040" y="250" text-anchor="middle" class="boxText">이상 징후</text>

  <line x1="250" y1="230" x2="290" y2="230" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow3)"/>
  <line x1="470" y1="230" x2="510" y2="230" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow3)"/>
  <line x1="690" y1="230" x2="730" y2="230" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow3)"/>
  <line x1="910" y1="230" x2="950" y2="230" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow3)"/>

  <rect x="70" y="350" width="1060" height="150" rx="22" ry="22" fill="#ffffff" stroke="#fdba74" stroke-width="2"/>
  <text x="100" y="395" class="boxTitle">모니터링 지표</text>
  <text x="100" y="435" class="boxText">retrieval hit rate, groundedness, hallucination rate, latency, token cost, failure rate</text>
</svg>
