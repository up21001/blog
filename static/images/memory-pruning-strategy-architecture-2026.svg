  <text x="95" y="272" fill="#cbd5e1" font-size="16" font-family="sans-serif">duplicates / stale</text>
  <rect x="275" y="200" width="170" height="108" rx="18" fill="#111827" stroke="#34d399" stroke-width="2"/>
  <text x="316" y="242" fill="#e2e8f0" font-size="21" font-family="sans-serif" font-weight="700">Merge</text>
  <text x="302" y="272" fill="#cbd5e1" font-size="16" font-family="sans-serif">summaries</text>
  <rect x="480" y="200" width="170" height="108" rx="18" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
  <text x="521" y="242" fill="#e2e8f0" font-size="21" font-family="sans-serif" font-weight="700">Compress</text>
  <text x="512" y="272" fill="#cbd5e1" font-size="16" font-family="sans-serif">state reduction</text>
  <rect x="685" y="200" width="170" height="108" rx="18" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
