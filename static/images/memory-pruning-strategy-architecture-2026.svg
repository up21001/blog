  <text x="716" y="272" fill="#cbd5e1" font-size="16" font-family="sans-serif">cold store</text>
  <rect x="890" y="200" width="240" height="108" rx="18" fill="#111827" stroke="#fb7185" stroke-width="2"/>
  <text x="965" y="242" fill="#e2e8f0" font-size="21" font-family="sans-serif" font-weight="700">Delete</text>
