<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <style>
      .title{font:700 42px system-ui,Segoe UI,sans-serif;fill:#fff}
      .sub{font:500 20px system-ui,Segoe UI,sans-serif;fill:#cbd5e1}
      .node{fill:#111827;stroke:#60a5fa;stroke-width:2;rx:16}
      .node2{fill:#0f172a;stroke:#34d399;stroke-width:2;rx:16}
      .text{font:600 18px system-ui,Segoe UI,sans-serif;fill:#e5e7eb}
      .small{font:500 15px system-ui,Segoe UI,sans-serif;fill:#94a3b8}
      .arrow{stroke:#38bdf8;stroke-width:4;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="84" class="title">AI Log Analysis Decision Flow</text>
  <text x="60" y="118" class="sub">무엇을 먼저 볼지 빠르게 고르는 기준</text>
  <rect x="70" y="180" width="220" height="100" class="node"/>
  <text x="100" y="222" class="text">증상은 무엇인가</text>
  <text x="100" y="250" class="small">latency / error / quality / cost</text>
  <rect x="340" y="165" width="220" height="130" class="node2"/>
  <text x="370" y="208" class="text">Trace 중심</text>
  <text x="370" y="236" class="small">원인 경로 재현</text>
  <text x="370" y="260" class="small">AI Tracing / Agent Debugging</text>
  <rect x="610" y="165" width="220" height="130" class="node"/>
  <text x="640" y="208" class="text">Event 중심</text>
  <text x="640" y="236" class="small">상태 변화 추적</text>
  <text x="640" y="260" class="small">AI Audit Log / Schema</text>
  <rect x="880" y="165" width="240" height="130" class="node2"/>
  <text x="910" y="208" class="text">Ops 중심</text>
  <text x="910" y="236" class="small">알림 / 런북 / 복구</text>
  <text x="910" y="260" class="small">LLM Incident Response</text>
  <path d="M290 230 H340" class="arrow"/>
  <path d="M560 230 H610" class="arrow"/>
  <path d="M830 230 H880" class="arrow"/>
  <rect x="120" y="350" width="960" height="170" class="node"/>
  <text x="160" y="398" class="text">실무 기준</text>
  <text x="160" y="430" class="small">1. 장애 재현이 목적이면 trace를 먼저 본다.</text>
  <text x="160" y="458" class="small">2. 반복 실패와 감사가 목적이면 event schema를 본다.</text>
  <text x="160" y="486" class="small">3. 사용자 영향과 복구가 목적이면 incident runbook을 본다.</text>
</svg>
