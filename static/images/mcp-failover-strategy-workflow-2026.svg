<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#07111f"/>
  <text x="60" y="68" fill="#f8fafc" font-family="Arial" font-size="34" font-weight="700">MCP Failover Strategy Workflow</text>
  <text x="60" y="104" fill="#cbd5e1" font-family="Arial" font-size="18">primary -> detect -> switch -> verify -> restore</text>
  <g font-family="Arial" font-size="17" font-weight="600" fill="#fff">
    <rect x="70" y="180" width="170" height="90" rx="18" fill="#2563eb"/><text x="155" y="232" text-anchor="middle">Primary</text>
    <rect x="285" y="180" width="170" height="90" rx="18" fill="#7c3aed"/><text x="370" y="232" text-anchor="middle">Detect</text>
    <rect x="500" y="180" width="170" height="90" rx="18" fill="#0f766e"/><text x="585" y="232" text-anchor="middle">Switch</text>
    <rect x="715" y="180" width="170" height="90" rx="18" fill="#b45309"/><text x="800" y="232" text-anchor="middle">Verify</text>
    <rect x="930" y="180" width="170" height="90" rx="18" fill="#dc2626"/><text x="1015" y="232" text-anchor="middle">Restore</text>
  </g>
  <path d="M240 225 L285 225" stroke="#f8fafc" stroke-width="3"/>
  <path d="M455 225 L500 225" stroke="#f8fafc" stroke-width="3"/>
  <path d="M670 225 L715 225" stroke="#f8fafc" stroke-width="3"/>
  <path d="M885 225 L930 225" stroke="#f8fafc" stroke-width="3"/>
  <rect x="170" y="350" width="300" height="120" rx="20" fill="#111827" stroke="#93c5fd" stroke-width="2"/>
  <text x="320" y="398" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="18" font-weight="600">Primary Path Healthy</text>
  <text x="320" y="426" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="15">keep normal mode active</text>
  <rect x="520" y="350" width="300" height="120" rx="20" fill="#111827" stroke="#5eead4" stroke-width="2"/>
  <text x="670" y="398" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="18" font-weight="600">Secondary Path</text>
  <text x="670" y="426" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="15">limited capability fallback</text>
  <rect x="870" y="350" width="240" height="120" rx="20" fill="#111827" stroke="#fca5a5" stroke-width="2"/>
  <text x="990" y="398" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="18" font-weight="600">Auto Restore</text>
  <text x="990" y="426" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="15">after verification</text>
</svg>
