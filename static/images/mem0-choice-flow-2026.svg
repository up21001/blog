<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#faf5ff"/><text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#581c87">Should You Use Mem0?</text><rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#c084fc"/><text x="472" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#581c87">Need persistent memory?</text><rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#d8b4fe"/><text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7e22ce">No</text><text x="149" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#7e22ce">A stateless app may be enough</text><rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#d8b4fe"/><text x="493" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7e22ce">Need self-improving</text><text x="525" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7e22ce">memory?</text><rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#d8b4fe"/><text x="825" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7e22ce">Need platform or</text><text x="853" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7e22ce">self-hosted?</text><rect x="445" y="500" width="320" height="110" rx="26" fill="#581c87"/><text x="531" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#faf5ff">Use Mem0</text><text x="483" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#e9d5ff">Strong fit for agent memory layers</text></svg>
