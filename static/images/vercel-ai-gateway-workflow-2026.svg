<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Vercel AI Gateway Workflow 2026</title>
  <desc id="desc">Unified API gateway flow with models, budgets, fallbacks, and observability.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d4ed8" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg3)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Vercel AI Gateway Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">Unified API, budgets, fallbacks, observability, and no-markup pricing</text>
  <rect x="80" y="220" width="220" height="110" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow3)"/>
  <text x="143" y="280" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">App</text>
  <rect x="360" y="150" width="480" height="360" rx="28" fill="#fff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow3)"/>
  <text x="555" y="205" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">AI Gateway</text>
  <rect x="405" y="250" width="160" height="82" rx="18" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="450" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Routing</text>
  <rect x="625" y="250" width="160" height="82" rx="18" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="663" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Budgets</text>
  <rect x="405" y="370" width="160" height="82" rx="18" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="440" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Fallbacks</text>
  <text x="441" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">retries</text>
  <rect x="625" y="370" width="160" height="82" rx="18" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="640" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Observability</text>
  <text x="652" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">usage</text>
  <rect x="900" y="220" width="220" height="110" rx="24" fill="#fff" stroke="#93c5fd" filter="url(#shadow3)"/>
  <text x="957" y="280" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Models</text>
  <path d="M300 275 C330 275, 340 275, 360 275" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow3)"/>
  <path d="M840 275 C870 275, 880 275, 900 275" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow3)"/>
</svg>
