<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <style>
      .title{font:700 40px system-ui,Segoe UI,sans-serif;fill:#fff}
      .sub{font:500 20px system-ui,sans-serif;fill:#cbd5e1}
      .node{fill:#111827;stroke:#f59e0b;stroke-width:2;rx:16}
      .node2{fill:#0f172a;stroke:#38bdf8;stroke-width:2;rx:16}
      .text{font:600 18px system-ui,sans-serif;fill:#e5e7eb}
      .small{font:500 15px system-ui,sans-serif;fill:#94a3b8}
      .arrow{stroke:#38bdf8;stroke-width:4;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="82" class="title">LLM Incident Response Decision Flow</text>
  <text x="60" y="118" class="sub">무엇부터 대응할지 정하는 기준</text>
  <rect x="70" y="185" width="220" height="110" class="node"/>
  <text x="98" y="228" class="text">문제 유형은?</text>
  <text x="98" y="255" class="small">quality / latency / cost / outage</text>
  <rect x="335" y="175" width="220" height="130" class="node2"/>
  <text x="365" y="218" class="text">품질 문제</text>
  <text x="365" y="246" class="small">evaluation / prompt / routing</text>
  <text x="365" y="270" class="small">AI Tracing / Agent Debugging</text>
  <rect x="600" y="175" width="220" height="130" class="node"/>
  <text x="630" y="218" class="text">운영 문제</text>
  <text x="630" y="246" class="small">alerts / severity / fallback</text>
  <text x="630" y="270" class="small">LLM Observability / Runbook</text>
  <rect x="865" y="175" width="250" height="130" class="node2"/>
  <text x="895" y="218" class="text">회고 문제</text>
  <text x="895" y="246" class="small">schema / postmortem / audit</text>
  <text x="895" y="270" class="small">AI Audit Log / Event Schema</text>
  <path d="M290 240 H335" class="arrow"/>
  <path d="M555 240 H600" class="arrow"/>
  <path d="M820 240 H865" class="arrow"/>
  <rect x="120" y="350" width="960" height="160" class="node"/>
  <text x="160" y="395" class="text">운영 원칙</text>
  <text x="160" y="428" class="small">1. 품질 이슈와 인프라 이슈를 구분한다.</text>
  <text x="160" y="455" class="small">2. fallback과 rollback은 미리 문서화한다.</text>
  <text x="160" y="482" class="small">3. incident 이벤트는 trace와 audit에 동시에 남긴다.</text>
</svg>
