<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI Audit Log Workflow</title>
  <desc id="desc">Workflow showing request, decision, tool call, output, and audit storage for AI systems.</desc>
  <rect width="1200" height="630" fill="#13233a"/>
  <text x="70" y="88" fill="#f2f7ff" font-size="34" font-weight="700">AI Audit Log Workflow</text>
  <text x="70" y="124" fill="#a8bed4" font-size="18">Record request, decision, tool call, output, and evidence</text>
  <g fill="#1f3550" stroke="#88a6c7" stroke-width="2">
    <rect x="70" y="210" rx="18" width="170" height="110"/>
    <rect x="280" y="210" rx="18" width="170" height="110"/>
    <rect x="490" y="210" rx="18" width="190" height="110"/>
    <rect x="720" y="210" rx="18" width="180" height="110"/>
    <rect x="940" y="210" rx="18" width="180" height="110"/>
  </g>
  <g fill="#f2f7ff" font-size="20" font-weight="700">
    <text x="108" y="252">Request</text>
    <text x="322" y="252">Policy</text>
    <text x="528" y="252">Tool Call</text>
    <text x="760" y="252">Output</text>
    <text x="983" y="252">Audit</text>
  </g>
  <g stroke="#9fd3ff" stroke-width="4" fill="none">
    <path d="M240 265 H270"/>
    <path d="M450 265 H480"/>
    <path d="M680 265 H710"/>
    <path d="M900 265 H930"/>
  </g>
  <g fill="#9fd3ff">
    <polygon points="262,265 246,257 246,273"/>
    <polygon points="472,265 456,257 456,273"/>
    <polygon points="702,265 686,257 686,273"/>
    <polygon points="922,265 906,257 906,273"/>
  </g>
  <rect x="170" y="400" width="860" height="92" rx="18" fill="#102236" stroke="#4f6c8c" stroke-width="2"/>
  <text x="210" y="438" fill="#f2f7ff" font-size="22" font-weight="700">Store:</text>
  <text x="210" y="470" fill="#a8bed4" font-size="18">session id, user id, policy decision, tool name, timestamps, result hash</text>
</svg>
