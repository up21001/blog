<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Local RAG stack workflow diagram">
  <rect width="1200" height="630" fill="#07111f"/>
  <rect x="60" y="60" width="1080" height="510" rx="34" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="100" y="132" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="44" font-weight="700">Local RAG Stack</text>
  <text x="100" y="172" fill="#94a3b8" font-family="Arial, sans-serif" font-size="22">Ingest, embed, search, rerank, generate</text>

  <rect x="90" y="260" width="180" height="110" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <text x="180" y="302" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700">Docs</text>
  <text x="180" y="334" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">ingest</text>

  <rect x="320" y="260" width="180" height="110" rx="22" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  <text x="410" y="302" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700">Embed</text>
  <text x="410" y="334" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">vectors</text>

  <rect x="550" y="260" width="180" height="110" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
  <text x="640" y="302" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700">Search</text>
  <text x="640" y="334" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">hybrid / vector</text>

  <rect x="780" y="260" width="180" height="110" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
  <text x="870" y="302" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700">Rerank</text>
  <text x="870" y="334" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">top results</text>

  <rect x="1010" y="260" width="120" height="110" rx="22" fill="#111827" stroke="#f97316" stroke-width="2"/>
  <text x="1070" y="302" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700">LLM</text>
  <text x="1070" y="334" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">answer</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <path d="M270 315 H320" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M500 315 H550" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M730 315 H780" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M960 315 H1010" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="100" y="460" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="22">Best for private document search, internal assistants, and controlled data flow.</text>
</svg>
