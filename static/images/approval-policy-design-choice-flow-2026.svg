<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f4ec"/>
      <stop offset="100%" stop-color="#f0f4fa"/>
    </linearGradient>
    <style>
      .title{font:700 40px Arial,sans-serif;fill:#172033}
      .sub{font:400 22px Arial,sans-serif;fill:#49566e}
      .box{fill:#fff;stroke:#23324a;stroke-width:3;rx:18;ry:18}
      .label{font:700 22px Arial,sans-serif;fill:#172033}
      .small{font:400 18px Arial,sans-serif;fill:#49566e}
      .arrow{stroke:#23324a;stroke-width:4;fill:none;marker-end:url(#m)}
      .pill{fill:#172033;rx:999;ry:999}
      .pillText{font:700 18px Arial,sans-serif;fill:#fff}
      .yes{fill:#2e7d32;rx:999;ry:999}
      .no{fill:#b23b3b;rx:999;ry:999}
      .yesText{font:700 16px Arial,sans-serif;fill:#fff}
      .noText{font:700 16px Arial,sans-serif;fill:#fff}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#23324a"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="68" class="title">Policy Decision Flow</text>
  <text x="60" y="106" class="sub">Define one rule, reuse it everywhere</text>
  <rect x="60" y="140" width="170" height="38" class="pill"/>
  <text x="90" y="166" class="pillText">choice flow</text>

  <rect class="box" x="70" y="230" width="180" height="110"/>
  <text x="114" y="274" class="label">Request</text>
  <text x="95" y="304" class="small">Action context</text>
  <rect class="box" x="320" y="230" width="220" height="110"/>
  <text x="355" y="274" class="label">Policy Rule</text>
  <text x="340" y="304" class="small">Risk + role + type</text>
  <rect class="box" x="620" y="180" width="200" height="110"/>
  <text x="655" y="224" class="label">Allow</text>
  <text x="648" y="254" class="small">Auto execute</text>
  <rect class="box" x="620" y="330" width="200" height="110"/>
  <text x="650" y="374" class="label">Review</text>
  <text x="639" y="404" class="small">Human approval</text>
  <rect class="box" x="915" y="255" width="180" height="110"/>
  <text x="948" y="299" class="label">Audit</text>
  <text x="928" y="329" class="small">Policy hit saved</text>
  <path class="arrow" d="M250 285 L320 285"/>
  <path class="arrow" d="M540 285 L620 235"/>
  <path class="arrow" d="M540 285 L620 385"/>
  <rect x="520" y="190" width="72" height="30" class="yes"/>
  <text x="538" y="210" class="yesText">yes</text>
  <rect x="520" y="335" width="72" height="30" class="no"/>
  <text x="541" y="355" class="noText">no</text>
  <path class="arrow" d="M820 292 L915 310"/>
</svg>
