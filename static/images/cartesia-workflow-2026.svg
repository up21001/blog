<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Cartesia Workflow 2026</title>
  <desc id="desc">Cartesia architecture showing text input, Sonic TTS, STT, voice agents, and telephony.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#c2410c" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Cartesia Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">Low-latency voice models, voice agents, and telephony in one platform</text>
  <rect x="70" y="190" width="220" height="120" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="122" y="242" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Text / Audio</text>
  <text x="108" y="274" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">app input or call</text>
  <rect x="360" y="150" width="480" height="360" rx="28" fill="#fff" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <text x="520" y="202" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Cartesia</text>
  <rect x="405" y="236" width="160" height="82" rx="18" fill="#fff7ed" stroke="#fdba74"/>
  <text x="440" y="286" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Sonic TTS</text>
  <rect x="625" y="236" width="160" height="82" rx="18" fill="#fff7ed" stroke="#fdba74"/>
  <text x="645" y="286" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Voice Agent</text>
  <rect x="405" y="356" width="160" height="82" rx="18" fill="#fff7ed" stroke="#fdba74"/>
  <text x="438" y="406" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">STT</text>
  <rect x="625" y="356" width="160" height="82" rx="18" fill="#fff7ed" stroke="#fdba74"/>
  <text x="654" y="396" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Telephony</text>
  <text x="640" y="423" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">phone numbers</text>
  <rect x="900" y="190" width="230" height="120" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="958" y="242" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Apps</text>
  <text x="930" y="274" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">companions, call bots</text>
  <text x="943" y="298" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">voice interfaces</text>
  <path d="M290 250 C325 250, 330 250, 360 250" fill="none" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M800 250 C850 250, 870 250, 900 250" fill="none" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M565 397 C585 397, 600 397, 625 397" fill="none" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M485 318 C485 332, 485 340, 485 356" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M705 318 C705 332, 705 340, 705 356" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
