<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720"><rect width="1200" height="720" fill="#fffaf2"/><text x="70" y="88" font-family="Segoe UI, Arial" font-size="38" font-weight="700" fill="#21384c">Prompt files 체크리스트</text><text x="70" y="126" font-family="Segoe UI, Arial" font-size="20" fill="#5b7388">짧고 재사용 가능하며 결과 형식이 분명한 템플릿이 가장 잘 작동합니다.</text><rect x="250" y="200" width="700" height="360" rx="28" fill="#0f4c81"/><text x="320" y="265" font-family="Segoe UI, Arial" font-size="26" font-weight="700" fill="#fff">점검 항목</text><text x="320" y="315" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- 한 작업만 다루는가</text><text x="320" y="355" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- 출력 형식이 명확한가</text><text x="320" y="395" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- 팀 공통 문구를 담고 있는가</text><text x="320" y="435" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- 너무 길지 않은가</text><text x="320" y="475" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- 리뷰 가능한 저장소 파일인가</text></svg>
