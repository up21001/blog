<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F2937">2026년 기술 스택 선택 프레임워크</text>

  <!-- 4 Quadrants -->
  <!-- Q1: 지금 당장 (top-left) -->
  <rect x="20" y="55" width="375" height="175" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="207" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">지금 당장 익혀야 할 것</text>
  <text x="40" y="100" font-size="12" fill="#374151">• TypeScript — JS 생태계 표준 (GitHub 1위)</text>
  <text x="40" y="120" font-size="12" fill="#374151">• AI 에이전트 프레임워크 (LangGraph, Claude SDK)</text>
  <text x="40" y="140" font-size="12" fill="#374151">• Cursor / AI-first IDE 활용법</text>
  <text x="40" y="160" font-size="12" fill="#374151">• 벡터 DB 기초 (Pinecone, pgvector)</text>
  <text x="40" y="180" font-size="12" fill="#374151">• 컨테이너 오케스트레이션 (k8s 기초)</text>
  <text x="207" y="218" text-anchor="middle" font-size="11" fill="#3B82F6">투자 대비 수익 즉시 발생</text>

  <!-- Q2: 중기 투자 (top-right) -->
  <rect x="405" y="55" width="375" height="175" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="592" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#065F46">6~12개월 안에 투자</text>
  <text x="425" y="100" font-size="12" fill="#374151">• Rust — 시스템 프로그래밍 · 임베디드</text>
  <text x="425" y="120" font-size="12" fill="#374151">• WebAssembly (WASM) — 브라우저 성능</text>
  <text x="425" y="140" font-size="12" fill="#374151">• Edge Computing (Cloudflare Workers)</text>
  <text x="425" y="160" font-size="12" fill="#374151">• Observability (OpenTelemetry)</text>
  <text x="425" y="180" font-size="12" fill="#374151">• Fine-tuning 소형 LLM (로컬 모델)</text>
  <text x="592" y="218" text-anchor="middle" font-size="11" fill="#10B981">경쟁력 확보용 전략 투자</text>

  <!-- Q3: 관망 (bottom-left) -->
  <rect x="20" y="245" width="375" height="160" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="207" y="268" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400E">관망하며 지켜볼 것</text>
  <text x="40" y="292" font-size="12" fill="#374151">• Deno 2 — Node.js 대체 여부 불확실</text>
  <text x="40" y="312" font-size="12" fill="#374151">• AGI 프레임워크 — 변화 속도 너무 빠름</text>
  <text x="40" y="332" font-size="12" fill="#374151">• 새 JS 프레임워크 — React 지위 견고</text>
  <text x="40" y="352" font-size="12" fill="#374151">• Blockchain/Web3 — 실용 사례 부족</text>
  <text x="207" y="392" text-anchor="middle" font-size="11" fill="#F59E0B">과도한 조기 투자 지양</text>

  <!-- Q4: 엔지니어 특화 (bottom-right) -->
  <rect x="405" y="245" width="375" height="160" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="592" y="268" text-anchor="middle" font-size="14" font-weight="bold" fill="#4C1D95">HW+SW 엔지니어 특화</text>
  <text x="425" y="292" font-size="12" fill="#374151">• ESP-IDF + MicroPython (임베디드)</text>
  <text x="425" y="312" font-size="12" fill="#374151">• TinyML / Edge AI (MCU 위의 AI)</text>
  <text x="425" y="332" font-size="12" fill="#374151">• ROS 2 (로보틱스 관심 시)</text>
  <text x="425" y="352" font-size="12" fill="#374151">• Flutter 3 (크로스플랫폼 UI)</text>
  <text x="592" y="392" text-anchor="middle" font-size="11" fill="#8B5CF6">하드웨어 배경의 차별점</text>

  <!-- Center labels -->
  <text x="400" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">← 즉시 ROI</text>
  <text x="400" y="246" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">장기 투자 →</text>

  <!-- Bottom bar -->
  <rect x="20" y="415" width="760" height="26" rx="6" fill="#374151"/>
  <text x="400" y="433" text-anchor="middle" font-size="12" fill="white">선택 원칙: "5년 후에도 쓸 기술인가?" + "내 도메인과 시너지가 있는가?"</text>
</svg>
