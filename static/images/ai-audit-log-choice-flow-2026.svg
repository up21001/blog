<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI Audit Log Choice Flow</title>
  <desc id="desc">Decision flow for what to log, redact, or retain in AI audit logging.</desc>
  <rect width="1200" height="630" fill="#16263a"/>
  <text x="70" y="88" fill="#f2f7ff" font-size="34" font-weight="700">Audit Log Choice Flow</text>
  <text x="70" y="124" fill="#a9bfd7" font-size="18">Log everything useful, redact sensitive data, keep evidence replayable</text>
  <g fill="#1f3550" stroke="#88a6c7" stroke-width="2">
    <rect x="80" y="210" rx="18" width="180" height="88"/>
    <rect x="330" y="160" rx="18" width="220" height="88"/>
    <rect x="330" y="320" rx="18" width="220" height="88"/>
    <rect x="630" y="160" rx="18" width="220" height="88"/>
    <rect x="630" y="320" rx="18" width="220" height="88"/>
    <rect x="930" y="240" rx="18" width="190" height="88"/>
  </g>
  <g fill="#f2f7ff" font-size="20" font-weight="700">
    <text x="118" y="258">Event</text>
    <text x="365" y="205">Sensitive?</text>
    <text x="360" y="365">Need replay?</text>
    <text x="676" y="205">Redact</text>
    <text x="675" y="365">Retain</text>
    <text x="981" y="294">Store</text>
  </g>
  <g stroke="#9fd3ff" stroke-width="4" fill="none">
    <path d="M260 254 H320"/>
    <path d="M550 204 H620"/>
    <path d="M550 364 H620"/>
    <path d="M850 204 H920"/>
    <path d="M850 364 L930 284"/>
  </g>
  <text x="270" y="242" fill="#ffcf7d" font-size="18">yes</text>
  <text x="270" y="330" fill="#ff9f9f" font-size="18">no</text>
  <text x="560" y="242" fill="#ffcf7d" font-size="18">mask</text>
  <text x="560" y="380" fill="#ffcf7d" font-size="18">full detail</text>
</svg>
