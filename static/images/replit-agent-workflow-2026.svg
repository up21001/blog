<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Replit Agent Workflow 2026</title>
  <desc id="desc">Replit Agent workflow showing natural language idea, workspace build, testing, deployment, database and hosting integration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#7c3aed" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#5b21b6">Replit Agent Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#6d28d9">Natural language app creation, testing, and deployment in one workspace</text>

  <rect x="70" y="180" rx="24" ry="24" width="220" height="120" fill="#fff" stroke="#c4b5fd" filter="url(#shadow)"/>
  <text x="120" y="232" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#5b21b6">Idea / Prompt</text>
  <text x="114" y="265" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#6d28d9">plain language request</text>

  <rect x="360" y="140" rx="28" ry="28" width="470" height="360" fill="#ffffff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="194" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#5b21b6">Replit Agent</text>
  <rect x="405" y="228" rx="18" ry="18" width="170" height="90" fill="#faf5ff" stroke="#c4b5fd"/>
  <text x="430" y="280" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">Workspace</text>
  <rect x="615" y="228" rx="18" ry="18" width="170" height="90" fill="#faf5ff" stroke="#c4b5fd"/>
  <text x="649" y="268" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">Build</text>
  <text x="648" y="296" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#6d28d9">code + infra</text>

  <rect x="405" y="348" rx="18" ry="18" width="170" height="90" fill="#faf5ff" stroke="#c4b5fd"/>
  <text x="451" y="388" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">Test</text>
  <text x="439" y="415" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#6d28d9">self-check</text>

  <rect x="615" y="348" rx="18" ry="18" width="170" height="90" fill="#faf5ff" stroke="#c4b5fd"/>
  <text x="643" y="388" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">Deploy</text>
  <text x="650" y="415" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#6d28d9">share app</text>

  <rect x="920" y="170" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#c4b5fd" filter="url(#shadow)"/>
  <text x="966" y="218" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#5b21b6">Database</text>
  <text x="948" y="252" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#6d28d9">and hosting</text>
  <text x="951" y="276" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#6d28d9">integration</text>

  <rect x="920" y="345" rx="24" ry="24" width="210" height="120" fill="#fff" stroke="#c4b5fd" filter="url(#shadow)"/>
  <text x="965" y="392" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#5b21b6">App</text>
  <text x="944" y="425" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#6d28d9">published result</text>

  <path d="M290 240 C320 240, 330 240, 360 240" fill="none" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M830 240 C870 240, 885 240, 920 240" fill="none" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M830 405 C875 405, 885 405, 920 405" fill="none" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M575 273 C595 273, 600 273, 615 273" fill="none" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M490 318 C490 328, 490 337, 490 348" fill="none" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M700 318 C700 328, 700 337, 700 348" fill="none" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
