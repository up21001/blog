<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Weaviate Workflow 2026</title>
  <desc id="desc">Weaviate architecture showing modules, hybrid search, multi-tenancy, and search engine positioning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#14532d" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Weaviate Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#16a34a">Vector-native search platform with modules, hybrid search, and multi-tenancy</text>

  <rect x="80" y="220" width="220" height="120" rx="24" fill="#fff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="136" y="272" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">App / Search</text>
  <text x="134" y="304" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#16a34a">query, tenant, module</text>

  <rect x="360" y="140" width="470" height="380" rx="28" fill="#fff" stroke="#4ade80" stroke-width="2" filter="url(#shadow)"/>
  <text x="530" y="194" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Weaviate</text>
  <rect x="405" y="236" width="160" height="90" rx="18" fill="#f0fdf4" stroke="#86efac"/>
  <text x="436" y="289" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#16a34a">Modules</text>
  <rect x="625" y="236" width="160" height="90" rx="18" fill="#f0fdf4" stroke="#86efac"/>
  <text x="648" y="289" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#16a34a">Hybrid</text>
  <rect x="405" y="356" width="160" height="90" rx="18" fill="#f0fdf4" stroke="#86efac"/>
  <text x="430" y="409" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#16a34a">Multi-tenancy</text>
  <text x="454" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#16a34a">shards</text>
  <rect x="625" y="356" width="160" height="90" rx="18" fill="#f0fdf4" stroke="#86efac"/>
  <text x="656" y="409" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#16a34a">Search</text>
  <text x="649" y="437" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#16a34a">engine</text>

  <rect x="910" y="220" width="200" height="120" rx="24" fill="#fff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="946" y="273" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Outputs</text>
  <text x="935" y="305" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#16a34a">search, RAG, QA</text>

  <path d="M300 280 C330 280, 338 280, 360 280" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M830 280 C865 280, 880 280, 910 280" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M500 326 C500 338, 500 346, 500 356" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M705 326 C705 338, 705 346, 705 356" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
