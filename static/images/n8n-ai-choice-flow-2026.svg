<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">n8n AI Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when to use n8n AI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f766e" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#155e75">Should You Use n8n AI?</text>
  <rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
  <text x="472" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#155e75">Need workflow AI?</text>
  <rect x="110" y="280" width="300" height="110" rx="24" fill="#fff" stroke="#67e8f9" filter="url(#shadow)"/>
  <text x="188" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">No</text>
  <text x="148" y="360" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">A plain workflow may be enough</text>
  <rect x="450" y="280" width="300" height="110" rx="24" fill="#fff" stroke="#67e8f9" filter="url(#shadow)"/>
  <text x="496" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Need tools and</text>
  <text x="523" y="360" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">agent nodes?</text>
  <rect x="790" y="280" width="300" height="110" rx="24" fill="#fff" stroke="#67e8f9" filter="url(#shadow)"/>
  <text x="834" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Need self-hosted</text>
  <text x="855" y="360" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">control too?</text>
  <rect x="445" y="500" width="320" height="110" rx="26" fill="#155e75" filter="url(#shadow)"/>
  <text x="526" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ecfeff">Use n8n AI</text>
  <text x="483" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#ccfbf1">Best for practical AI workflow automation</text>
  <path d="M600 210 L600 280" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M450 335 L410 335" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M750 335 L790 335" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M600 390 L600 500" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
