<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#faf5ff"/><text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#581c87">Should You Use Temporal?</text><rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#c084fc"/><text x="462" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#581c87">Need never-fail workflows?</text><rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#d8b4fe"/><text x="190" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7e22ce">No</text><text x="134" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#7e22ce">A lighter job system may be enough</text><rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#d8b4fe"/><text x="500" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7e22ce">Need durable</text><text x="532" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7e22ce">retries?</text><rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#d8b4fe"/><text x="839" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7e22ce">Need long-running</text><text x="856" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7e22ce">processes?</text><rect x="445" y="500" width="320" height="110" rx="26" fill="#581c87"/><text x="514" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#faf5ff">Use Temporal</text><text x="480" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#e9d5ff">Strong fit for critical durable workflows</text></svg>
