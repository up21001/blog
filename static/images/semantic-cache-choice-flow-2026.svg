<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#fff9f1"/>
  <text x="70" y="82" font-family="Segoe UI, Arial" font-size="40" font-weight="700" fill="#3b2b17">Semantic Cache Decision Flow</text>
  <text x="70" y="120" font-family="Segoe UI, Arial" font-size="20" fill="#7b6550">Choose cache, fallback, or direct LLM based on repetition and freshness</text>

  <rect x="80" y="220" width="220" height="100" rx="22" fill="#2d6cdf"/>
  <text x="136" y="270" font-family="Segoe UI, Arial" font-size="26" font-weight="700" fill="#fff">Incoming Query</text>

  <rect x="370" y="220" width="240" height="100" rx="22" fill="#0f9d58"/>
  <text x="402" y="262" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#fff">Is it similar to</text>
  <text x="402" y="290" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#fff">previous queries?</text>

  <rect x="700" y="130" width="200" height="100" rx="22" fill="#18a999"/>
  <text x="740" y="182" font-family="Segoe UI, Arial" font-size="26" font-weight="700" fill="#fff">Cache Hit</text>

  <rect x="700" y="310" width="200" height="110" rx="22" fill="#d1495b"/>
  <text x="732" y="360" font-family="Segoe UI, Arial" font-size="26" font-weight="700" fill="#fff">Cache Miss</text>
  <text x="718" y="390" font-family="Segoe UI, Arial" font-size="16" fill="#ffe8ec">call LLM / RAG</text>

  <rect x="700" y="480" width="200" height="110" rx="22" fill="#f59f00"/>
  <text x="735" y="530" font-family="Segoe UI, Arial" font-size="26" font-weight="700" fill="#fff">Freshness?</text>
  <text x="714" y="560" font-family="Segoe UI, Arial" font-size="16" fill="#fff4db">TTL / policy check</text>

  <rect x="970" y="130" width="150" height="100" rx="18" fill="#4f6df5"/>
  <text x="995" y="182" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#fff">Reuse answer</text>

  <rect x="970" y="310" width="150" height="110" rx="18" fill="#8c52ff"/>
  <text x="1002" y="360" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#fff">Generate</text>
  <text x="993" y="390" font-family="Segoe UI, Arial" font-size="16" fill="#f1e8ff">new response</text>

  <rect x="970" y="480" width="150" height="110" rx="18" fill="#2f855a"/>
  <text x="995" y="530" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#fff">Store + TTL</text>
  <text x="982" y="560" font-family="Segoe UI, Arial" font-size="16" fill="#eafaf0">keep cache warm</text>

  <path d="M300 270 L370 270" stroke="#5a4630" stroke-width="8" stroke-linecap="round"/>
  <path d="M610 250 C660 250 660 175 700 175" stroke="#5a4630" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M610 290 C660 290 660 365 700 365" stroke="#5a4630" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M800 230 L800 310" stroke="#5a4630" stroke-width="8" stroke-linecap="round"/>
  <path d="M900 185 L970 185" stroke="#5a4630" stroke-width="8" stroke-linecap="round"/>
  <path d="M900 365 L970 365" stroke="#5a4630" stroke-width="8" stroke-linecap="round"/>
  <path d="M800 420 L800 480" stroke="#5a4630" stroke-width="8" stroke-linecap="round"/>
  <path d="M900 535 L970 535" stroke="#5a4630" stroke-width="8" stroke-linecap="round"/>

  <text x="635" y="175" font-family="Segoe UI, Arial" font-size="18" fill="#5a4630">yes</text>
  <text x="633" y="347" font-family="Segoe UI, Arial" font-size="18" fill="#5a4630">no</text>
  <text x="917" y="520" font-family="Segoe UI, Arial" font-size="18" fill="#5a4630">after generate</text>
</svg>

