<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06101d"/>
      <stop offset="1" stop-color="#183454"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="170" x2="1080" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <text x="70" y="96" fill="#e2e8f0" font-family="Arial" font-size="52" font-weight="700">Refresh Choice Flow</text>
  <text x="70" y="138" fill="#93c5fd" font-family="Arial" font-size="22">full reindex vs incremental refresh vs partial backfill</text>
  <rect x="70" y="210" width="170" height="100" rx="18" fill="#10263d" stroke="#60a5fa" stroke-width="2"/>
  <text x="155" y="252" text-anchor="middle" fill="#fff" font-family="Arial" font-size="24" font-weight="700">Trigger?</text>
  <text x="155" y="280" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="16">change event</text>
  <polygon points="340,260 400,200 460,260 400,320" fill="#0f3b37" stroke="#34d399" stroke-width="2"/>
  <text x="400" y="256" text-anchor="middle" fill="#fff" font-family="Arial" font-size="20" font-weight="700">Model or</text>
  <text x="400" y="281" text-anchor="middle" fill="#fff" font-family="Arial" font-size="20" font-weight="700">schema changed?</text>
  <rect x="520" y="190" width="220" height="120" rx="18" fill="#10263d" stroke="#60a5fa" stroke-width="2"/>
  <text x="630" y="240" text-anchor="middle" fill="#fff" font-family="Arial" font-size="24" font-weight="700">Full refresh</text>
  <text x="630" y="270" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="16">safe reset</text>
  <rect x="520" y="360" width="220" height="120" rx="18" fill="#10263d" stroke="#60a5fa" stroke-width="2"/>
  <text x="630" y="410" text-anchor="middle" fill="#fff" font-family="Arial" font-size="24" font-weight="700">Incremental</text>
  <text x="630" y="440" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="16">small delta</text>
  <rect x="810" y="275" width="260" height="120" rx="18" fill="#0f3b37" stroke="#34d399" stroke-width="2"/>
  <text x="940" y="322" text-anchor="middle" fill="#fff" font-family="Arial" font-size="24" font-weight="700">Partial backfill</text>
  <text x="940" y="352" text-anchor="middle" fill="#bbf7d0" font-family="Arial" font-size="16">quality drop detected</text>
  <path d="M240 260 H330" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M460 260 H510" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M460 260 C540 260, 510 420, 520 420" stroke="url(#accent)" stroke-width="6" fill="none"/>
  <path d="M740 250 H800" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <text x="70" y="545" fill="#dbeafe" font-family="Arial" font-size="24" font-weight="700">Refresh the smallest safe scope first, then expand if the issue persists.</text>
</svg>

