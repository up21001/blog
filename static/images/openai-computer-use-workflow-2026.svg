<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">OpenAI Computer Use Workflow 2026</title>
  <desc id="desc">Workflow diagram for OpenAI Computer Use</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#f3fbf5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#284458" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#416377"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#163244">OpenAI Computer Use Workflow</text>
  <text x="70" y="122" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#5a7284">브라우저 화면을 읽고 클릭과 입력을 수행하는 에이전트 흐름</text>

  <g filter="url(#shadow)">
    <rect x="70" y="230" width="190" height="120" rx="22" fill="#0f4c81"/>
    <rect x="320" y="230" width="190" height="120" rx="22" fill="#205d67"/>
    <rect x="570" y="230" width="190" height="120" rx="22" fill="#2f6f4e"/>
    <rect x="820" y="230" width="190" height="120" rx="22" fill="#7b5ea7"/>
    <rect x="1030" y="230" width="100" height="120" rx="22" fill="#9b3d49"/>
  </g>
  <line x1="260" y1="290" x2="320" y2="290" stroke="#416377" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="510" y1="290" x2="570" y2="290" stroke="#416377" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="760" y1="290" x2="820" y2="290" stroke="#416377" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1010" y1="290" x2="1030" y2="290" stroke="#416377" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="165" y="278" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Request</text>
  <text x="165" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#d7e8f5">User task</text>
  <text x="415" y="278" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Agent</text>
  <text x="415" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#d7eef1">Plan action</text>
  <text x="665" y="278" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Browser</text>
  <text x="665" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#dff4e6">Click / type</text>
  <text x="915" y="278" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Verify</text>
  <text x="915" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#f0e8fb">Check result</text>
  <text x="1080" y="278" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#fff">Done</text>
  <text x="1080" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ffe2e5">Log output</text>
</svg>
