<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">LiteLLM Workflow 2026</title>
  <desc id="desc">LiteLLM proxy and routing workflow showing app, gateway, router, providers, budgets, and observability.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#14532d" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#166534"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="88" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">LiteLLM Workflow</text>
  <text x="70" y="124" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#166534">OpenAI-compatible gateway with routing, budgets, and spend tracking</text>

  <rect x="70" y="220" rx="24" ry="24" width="220" height="110" fill="#fff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="118" y="276" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">App / SDK</text>
  <text x="110" y="304" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#166534">OpenAI-style request</text>

  <rect x="360" y="150" rx="28" ry="28" width="480" height="360" fill="#ffffff" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="515" y="205" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">LiteLLM Proxy</text>
  <rect x="415" y="250" rx="18" ry="18" width="160" height="82" fill="#f0fdf4" stroke="#86efac"/>
  <text x="462" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#166534">Router</text>
  <rect x="625" y="250" rx="18" ry="18" width="160" height="82" fill="#f0fdf4" stroke="#86efac"/>
  <text x="651" y="300" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#166534">Budget</text>
  <rect x="415" y="370" rx="18" ry="18" width="160" height="82" fill="#f0fdf4" stroke="#86efac"/>
  <text x="439" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#166534">Providers</text>
  <text x="439" y="436" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#166534">fallback</text>
  <rect x="625" y="370" rx="18" ry="18" width="160" height="82" fill="#f0fdf4" stroke="#86efac"/>
  <text x="640" y="410" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#166534">Observability</text>
  <text x="656" y="436" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#166534">logs</text>

  <rect x="910" y="220" rx="24" ry="24" width="220" height="110" fill="#fff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="950" y="276" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#14532d">Model APIs</text>
  <text x="940" y="304" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#166534">OpenAI, Anthropic,</text>
  <text x="948" y="328" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#166534">Azure, Vertex, ...</text>

  <path d="M290 275 C320 275, 330 275, 360 275" fill="none" stroke="#166534" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M840 275 C875 275, 885 275, 910 275" fill="none" stroke="#166534" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M575 332 C575 344, 575 356, 575 370" fill="none" stroke="#166534" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M705 332 C705 344, 705 356, 705 370" fill="none" stroke="#166534" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
