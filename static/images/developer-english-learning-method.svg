<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F2937">개발자 영어 학습 피라미드</text>

  <!-- Pyramid levels - bottom to top -->
  <!-- Level 1 - Foundation -->
  <polygon points="100,380 700,380 620,300 180,300" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="400" y="347" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4ED8">기초: 기술 문서 읽기</text>
  <text x="400" y="367" text-anchor="middle" font-size="11" fill="#374151">공식 Docs · RFC · MDN · Stack Overflow 매일 읽기</text>

  <!-- Level 2 -->
  <polygon points="180,300 620,300 550,220 250,220" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="400" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">응용: 영어로 쓰기</text>
  <text x="400" y="282" text-anchor="middle" font-size="11" fill="#374151">커밋 메시지 · PR 설명 · GitHub 이슈 작성</text>

  <!-- Level 3 -->
  <polygon points="250,220 550,220 490,145 310,145" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="186" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">심화: 듣기 + 말하기</text>
  <text x="400" y="203" text-anchor="middle" font-size="11" fill="#374151">Tech 팟캐스트 · 컨퍼런스 발표 · 영어 미팅</text>

  <!-- Level 4 - Top -->
  <polygon points="310,145 490,145 400,80 400,80" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="400" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="#4C1D95">고수: 기여</text>
  <text x="400" y="137" text-anchor="middle" font-size="10" fill="#374151">오픈소스 · 블로그</text>

  <!-- Right side tips -->
  <rect x="30" y="75" width="60" height="290" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="60" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151" transform="rotate(-90, 60, 220)">학습 도구 추천</text>

  <!-- Left annotations -->
  <rect x="30" y="300" width="65" height="28" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="62" y="318" text-anchor="middle" font-size="10" fill="#1D4ED8">레벨 1</text>
  <rect x="30" y="232" width="65" height="28" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="62" y="250" text-anchor="middle" font-size="10" fill="#065F46">레벨 2</text>
  <rect x="30" y="155" width="65" height="28" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="62" y="173" text-anchor="middle" font-size="10" fill="#92400E">레벨 3</text>
  <rect x="30" y="90" width="65" height="28" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="62" y="108" text-anchor="middle" font-size="10" fill="#4C1D95">레벨 4</text>

  <!-- Bottom section - practical resources -->
  <rect x="30" y="395" width="740" height="45" rx="8" fill="#374151" stroke="#1F2937" stroke-width="1.5"/>
  <text x="400" y="412" text-anchor="middle" font-size="12" font-weight="bold" fill="white">필수 리소스</text>
  <text x="130" y="430" text-anchor="middle" font-size="11" fill="#DBEAFE">Google Tech Writing</text>
  <text x="290" y="430" text-anchor="middle" font-size="11" fill="#D1FAE5">Changelog 팟캐스트</text>
  <text x="450" y="430" text-anchor="middle" font-size="11" fill="#FEF3C7">DeepL + ChatGPT 교정</text>
  <text x="630" y="430" text-anchor="middle" font-size="11" fill="#EDE9FE">shadowing (영어 강연)</text>
</svg>
