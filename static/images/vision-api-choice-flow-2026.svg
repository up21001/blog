<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <text x="80" y="82" fill="#f8fafc" font-family="Arial, sans-serif" font-size="48" font-weight="700">Vision API Choice Flow</text>
  <text x="80" y="122" fill="#94a3b8" font-family="Arial, sans-serif" font-size="24">Pick the right path for image understanding</text>
  <rect x="80" y="180" width="240" height="130" rx="24" fill="#0f172a" stroke="#475569"/>
  <rect x="480" y="180" width="240" height="130" rx="24" fill="#0f172a" stroke="#475569"/>
  <rect x="880" y="180" width="240" height="130" rx="24" fill="#0f172a" stroke="#475569"/>
  <text x="200" y="232" fill="#e2e8f0" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700">Simple image Q&A</text>
  <text x="200" y="266" fill="#94a3b8" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">Use Vision directly</text>
  <text x="600" y="232" fill="#e2e8f0" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700">Need fields</text>
  <text x="600" y="266" fill="#94a3b8" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">Vision + Structured Outputs</text>
  <text x="1000" y="232" fill="#e2e8f0" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700">Need retrieval</text>
  <text x="1000" y="266" fill="#94a3b8" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">Vision + File Search</text>
  <line x1="320" y1="245" x2="480" y2="245" stroke="#38bdf8" stroke-width="6" stroke-linecap="round"/>
  <line x1="720" y1="245" x2="880" y2="245" stroke="#38bdf8" stroke-width="6" stroke-linecap="round"/>
  <rect x="180" y="390" width="840" height="124" rx="28" fill="#020617" stroke="#334155"/>
  <text x="600" y="438" fill="#f8fafc" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700">Decide by output type, not by model name</text>
  <text x="600" y="472" fill="#94a3b8" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">Question, extraction, or retrieval lead to different pipelines</text>
