<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI Access Control Choice Flow</title>
  <desc id="desc">Decision flow for whether an AI action is permitted, scoped, or denied.</desc>
  <rect width="1200" height="630" fill="#17283c"/>
  <text x="70" y="88" fill="#f5f8ff" font-size="34" font-weight="700">Access Control Choice Flow</text>
  <text x="70" y="124" fill="#a8bed4" font-size="18">Least privilege, scoped permissions, explicit deny</text>
  <g fill="#1f3550" stroke="#88a6c7" stroke-width="2">
    <rect x="80" y="210" rx="18" width="170" height="88"/>
    <rect x="330" y="160" rx="18" width="210" height="88"/>
    <rect x="330" y="320" rx="18" width="210" height="88"/>
    <rect x="620" y="160" rx="18" width="210" height="88"/>
    <rect x="620" y="320" rx="18" width="210" height="88"/>
    <rect x="920" y="240" rx="18" width="190" height="88"/>
  </g>
  <g fill="#f5f8ff" font-size="20" font-weight="700">
    <text x="118" y="258">Action</text>
    <text x="362" y="205">Policy match?</text>
    <text x="365" y="365">Need approval?</text>
    <text x="665" y="205">Allow</text>
    <text x="657" y="365">Escalate</text>
    <text x="970" y="294">Run</text>
  </g>
  <g stroke="#9fd3ff" stroke-width="4" fill="none">
    <path d="M250 254 H320"/>
    <path d="M540 204 H610"/>
    <path d="M540 364 H610"/>
    <path d="M830 204 H910"/>
    <path d="M830 364 L920 284"/>
  </g>
  <text x="270" y="242" fill="#ffcf7d" font-size="18">yes</text>
  <text x="270" y="330" fill="#ff9f9f" font-size="18">no</text>
  <text x="560" y="242" fill="#ffcf7d" font-size="18">low risk</text>
  <text x="560" y="380" fill="#ffcf7d" font-size="18">high risk</text>
</svg>
