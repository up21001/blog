<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10121e"/>
      <stop offset="1" stop-color="#24314f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <text x="80" y="110" fill="#f4fbff" font-family="Arial" font-size="52" font-weight="700">Reranking Workflow</text>
  <text x="80" y="156" fill="#b6c7e0" font-family="Arial" font-size="22">candidate retrieval -> rerank -> final context</text>
  <g filter="url(#shadow)">
    <rect x="80" y="220" width="220" height="120" rx="22" fill="#16213a" stroke="#6a8ecb" stroke-width="2"/>
    <rect x="350" y="220" width="220" height="120" rx="22" fill="#16213a" stroke="#6a8ecb" stroke-width="2"/>
    <rect x="620" y="220" width="220" height="120" rx="22" fill="#16213a" stroke="#6a8ecb" stroke-width="2"/>
    <rect x="890" y="220" width="220" height="120" rx="22" fill="#17344b" stroke="#4fd1c5" stroke-width="2"/>
  </g>
  <text x="190" y="265" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="26" font-weight="700">Retrieve 50</text>
  <text x="190" y="297" text-anchor="middle" fill="#b6c7e0" font-family="Arial" font-size="18">vector / hybrid</text>
  <text x="460" y="265" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="26" font-weight="700">Reranker</text>
  <text x="460" y="297" text-anchor="middle" fill="#b6c7e0" font-family="Arial" font-size="18">cross encoder / LLM</text>
  <text x="730" y="265" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="26" font-weight="700">Top 5</text>
  <text x="730" y="297" text-anchor="middle" fill="#b6c7e0" font-family="Arial" font-size="18">keep strongest</text>
  <text x="1000" y="265" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="26" font-weight="700">Answer</text>
  <text x="1000" y="297" text-anchor="middle" fill="#b6c7e0" font-family="Arial" font-size="18">final context</text>
  <path d="M300 280 H340" stroke="#90cdf4" stroke-width="6" stroke-linecap="round"/>
  <path d="M570 280 H610" stroke="#90cdf4" stroke-width="6" stroke-linecap="round"/>
  <path d="M840 280 H880" stroke="#90cdf4" stroke-width="6" stroke-linecap="round"/>
  <text x="80" y="430" fill="#d8ebff" font-family="Arial" font-size="28" font-weight="700">Reranking is the final gate that turns good candidates into useful results.</text>
  <text x="80" y="474" fill="#d8ebff" font-family="Arial" font-size="20">It is most valuable when retrieval returns many near-matches.</text>
</svg>
