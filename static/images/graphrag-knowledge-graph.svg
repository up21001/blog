<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">GraphRAG — 그래프 기반 RAG 아키텍처</text>

  <!-- Traditional RAG (left) -->
  <rect x="20" y="55" width="340" height="165" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="190" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">기존 RAG (벡터 유사도)</text>

  <rect x="35" y="90" width="100" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6"/>
  <text x="85" y="115" text-anchor="middle" font-size="11" fill="#1E40AF">청크 A</text>

  <rect x="155" y="90" width="100" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6"/>
  <text x="205" y="115" text-anchor="middle" font-size="11" fill="#1E40AF">청크 B</text>

  <rect x="275" y="90" width="70" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6"/>
  <text x="310" y="115" text-anchor="middle" font-size="11" fill="#1E40AF">청크 C</text>

  <text x="190" y="155" text-anchor="middle" font-size="11" fill="#6B7280">↓ 코사인 유사도로 TOP-K 검색</text>
  <rect x="60" y="165" width="260" height="40" rx="6" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="190" y="182" text-anchor="middle" font-size="11" fill="#92400E">한계: 청크 간 관계 무시</text>
  <text x="190" y="198" text-anchor="middle" font-size="11" fill="#92400E">전역 맥락 파악 어려움</text>

  <!-- GraphRAG (right) -->
  <rect x="380" y="55" width="400" height="165" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="580" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#5B21B6">GraphRAG (지식 그래프)</text>

  <!-- Graph nodes -->
  <circle cx="470" cy="130" r="28" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="470" y="127" text-anchor="middle" font-size="10" fill="#1E40AF">엔티티</text>
  <text x="470" y="141" text-anchor="middle" font-size="10" fill="#1E40AF">A</text>

  <circle cx="570" cy="100" r="28" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="570" y="97" text-anchor="middle" font-size="10" fill="#065F46">엔티티</text>
  <text x="570" y="111" text-anchor="middle" font-size="10" fill="#065F46">B</text>

  <circle cx="660" cy="130" r="28" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="660" y="127" text-anchor="middle" font-size="10" fill="#92400E">엔티티</text>
  <text x="660" y="141" text-anchor="middle" font-size="10" fill="#92400E">C</text>

  <circle cx="565" cy="175" r="28" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="565" y="172" text-anchor="middle" font-size="10" fill="#5B21B6">엔티티</text>
  <text x="565" y="186" text-anchor="middle" font-size="10" fill="#5B21B6">D</text>

  <!-- Graph edges with labels -->
  <line x1="497" y1="115" x2="543" y2="107" stroke="#6B7280" stroke-width="1.5"/>
  <text x="515" y="107" text-anchor="middle" font-size="9" fill="#374151">관계1</text>
  <line x1="598" y1="115" x2="633" y2="122" stroke="#6B7280" stroke-width="1.5"/>
  <text x="622" y="111" text-anchor="middle" font-size="9" fill="#374151">관계2</text>
  <line x1="497" y1="145" x2="537" y2="163" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="640" y1="155" x2="592" y2="168" stroke="#6B7280" stroke-width="1.5"/>
  <text x="625" y="165" text-anchor="middle" font-size="9" fill="#374151">관계3</text>
  <line x1="570" y1="128" x2="566" y2="147" stroke="#6B7280" stroke-width="1.5"/>
  <text x="555" y="143" text-anchor="middle" font-size="9" fill="#374151">연결</text>

  <!-- GraphRAG Pipeline -->
  <text x="400" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#374151">— GraphRAG 처리 파이프라인 —</text>

  <rect x="25" y="260" width="140" height="55" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="95" y="283" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">문서 처리</text>
  <text x="95" y="300" text-anchor="middle" font-size="10" fill="#1E40AF">텍스트 분할</text>

  <line x1="165" y1="287" x2="195" y2="287" stroke="#6B7280" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="195" y="260" width="140" height="55" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="265" y="283" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">엔티티 추출</text>
  <text x="265" y="300" text-anchor="middle" font-size="10" fill="#5B21B6">LLM으로 NER</text>

  <line x1="335" y1="287" x2="365" y2="287" stroke="#6B7280" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="365" y="260" width="140" height="55" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="435" y="283" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">그래프 구성</text>
  <text x="435" y="300" text-anchor="middle" font-size="10" fill="#065F46">관계 엣지 생성</text>

  <line x1="505" y1="287" x2="535" y2="287" stroke="#6B7280" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="535" y="260" width="120" height="55" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="595" y="283" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">커뮤니티</text>
  <text x="595" y="300" text-anchor="middle" font-size="10" fill="#92400E">클러스터링</text>

  <line x1="655" y1="287" x2="685" y2="287" stroke="#6B7280" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="685" y="260" width="95" height="55" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="732" y="283" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">요약 생성</text>
  <text x="732" y="300" text-anchor="middle" font-size="10" fill="#374151">계층 요약</text>

  <!-- Advantages -->
  <rect x="25" y="335" width="360" height="95" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="205" y="357" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">GraphRAG 강점</text>
  <text x="40" y="377" font-size="11" fill="#065F46">• 전역 주제/트렌드 파악 가능 (커뮤니티 요약)</text>
  <text x="40" y="395" font-size="11" fill="#065F46">• 엔티티 간 복잡한 관계 추론</text>
  <text x="40" y="413" font-size="11" fill="#065F46">• "~와 관련된 모든 인물" 같은 복합 쿼리 처리</text>

  <rect x="405" y="335" width="370" height="95" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="590" y="357" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">GraphRAG 주의사항</text>
  <text x="420" y="377" font-size="11" fill="#92400E">• 인덱싱 비용: 기존 RAG 대비 5~10배</text>
  <text x="420" y="395" font-size="11" fill="#92400E">• 소규모 문서에는 오버엔지니어링</text>
  <text x="420" y="413" font-size="11" fill="#92400E">• Microsoft graphrag 패키지로 시작 가능</text>

  <defs>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
  </defs>
  <text x="400" y="443" text-anchor="middle" font-size="10" fill="#9CA3AF">Microsoft GraphRAG — 지식 그래프 기반 전역 검색 + 로컬 검색 이중 전략</text>
</svg>
