<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Claude Code vs Cursor AI — 2026년 비교</text>

  <!-- Column headers -->
  <rect x="30" y="50" width="220" height="40" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="140" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">비교 항목</text>

  <rect x="265" y="50" width="230" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="380" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">Claude Code</text>

  <rect x="510" y="50" width="260" height="40" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="640" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#065F46">Cursor AI</text>

  <!-- Row 1 -->
  <rect x="30" y="100" width="220" height="38" rx="4" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="140" y="124" text-anchor="middle" font-size="12" fill="#374151">인터페이스</text>
  <rect x="265" y="100" width="230" height="38" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="380" y="124" text-anchor="middle" font-size="11" fill="#1D4ED8">터미널 CLI (에이전트형)</text>
  <rect x="510" y="100" width="260" height="38" rx="4" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="640" y="124" text-anchor="middle" font-size="11" fill="#065F46">VS Code 기반 IDE (GUI)</text>

  <!-- Row 2 -->
  <rect x="30" y="146" width="220" height="38" rx="4" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="140" y="170" text-anchor="middle" font-size="12" fill="#374151">AI 모델</text>
  <rect x="265" y="146" width="230" height="38" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="380" y="170" text-anchor="middle" font-size="11" fill="#1D4ED8">Claude Sonnet / Opus</text>
  <rect x="510" y="146" width="260" height="38" rx="4" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="640" y="170" text-anchor="middle" font-size="11" fill="#065F46">GPT-4o, Claude, Gemini 선택</text>

  <!-- Row 3 -->
  <rect x="30" y="192" width="220" height="38" rx="4" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="140" y="216" text-anchor="middle" font-size="12" fill="#374151">가격 (2026년 기준)</text>
  <rect x="265" y="192" width="230" height="38" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="380" y="216" text-anchor="middle" font-size="11" fill="#1D4ED8">Claude Pro 구독 포함 / API 종량제</text>
  <rect x="510" y="192" width="260" height="38" rx="4" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="640" y="216" text-anchor="middle" font-size="11" fill="#065F46">$20/월 (Pro), $40/월 (Business)</text>

  <!-- Row 4 -->
  <rect x="30" y="238" width="220" height="38" rx="4" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="140" y="262" text-anchor="middle" font-size="12" fill="#374151">코드베이스 인식</text>
  <rect x="265" y="238" width="230" height="38" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="380" y="262" text-anchor="middle" font-size="11" fill="#1D4ED8">전체 레포 탐색 (에이전트)</text>
  <rect x="510" y="238" width="260" height="38" rx="4" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="640" y="262" text-anchor="middle" font-size="11" fill="#065F46">@Codebase, 컨텍스트 창 활용</text>

  <!-- Row 5 -->
  <rect x="30" y="284" width="220" height="38" rx="4" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="140" y="308" text-anchor="middle" font-size="12" fill="#374151">자동화 / 훅</text>
  <rect x="265" y="284" width="230" height="38" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="380" y="308" text-anchor="middle" font-size="11" fill="#1D4ED8">Hooks (Pre/PostToolUse) 지원</text>
  <rect x="510" y="284" width="260" height="38" rx="4" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="640" y="308" text-anchor="middle" font-size="11" fill="#065F46">Rules 파일 기반 커스터마이징</text>

  <!-- Row 6 -->
  <rect x="30" y="330" width="220" height="38" rx="4" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="140" y="354" text-anchor="middle" font-size="12" fill="#374151">추천 대상</text>
  <rect x="265" y="330" width="230" height="38" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="380" y="354" text-anchor="middle" font-size="11" fill="#1D4ED8">CLI/터미널 중심 백엔드 개발자</text>
  <rect x="510" y="330" width="260" height="38" rx="4" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="640" y="354" text-anchor="middle" font-size="11" fill="#065F46">GUI/IDE 선호 풀스택 개발자</text>

  <!-- Bottom note -->
  <rect x="30" y="384" width="740" height="50" rx="8" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="400" y="403" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">선택 기준</text>
  <text x="400" y="422" text-anchor="middle" font-size="11" fill="#78350F">터미널+Git 흐름 선호 → Claude Code | IDE 안에서 빠른 완성+채팅 선호 → Cursor | 팀 컨벤션 자동화 필요 → Claude Code Hooks</text>
</svg>
