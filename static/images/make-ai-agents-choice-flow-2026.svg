<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Make AI Agents Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when to use Make AI Agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8f1"/>
      <stop offset="100%" stop-color="#ffe4c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#7c2d12" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9a3412"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Should You Use Make AI Agents?</text>
  <rect x="445" y="120" width="310" height="90" rx="22" fill="#fff" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <text x="492" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Need 3000+ app flows?</text>
  <rect x="110" y="280" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="173" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">No</text>
  <text x="142" y="360" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">A simpler automation tool may be enough</text>
  <rect x="450" y="280" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="494" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Need transparent</text>
  <text x="532" y="360" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">agent decisions?</text>
  <rect x="790" y="280" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="838" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Need visual</text>
  <text x="848" y="360" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">workflow control?</text>
  <rect x="445" y="500" width="320" height="110" rx="26" fill="#7c2d12" filter="url(#shadow)"/>
  <text x="515" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fff7ed">Use Make AI Agents</text>
  <text x="490" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#fed7aa">Best for transparent multi-app automation</text>
  <path d="M600 210 L600 280" stroke="#9a3412" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M445 335 L410 335" stroke="#9a3412" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M750 335 L790 335" stroke="#9a3412" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M600 390 L600 500" stroke="#9a3412" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
