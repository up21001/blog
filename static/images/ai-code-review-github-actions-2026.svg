<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">AI 코드 리뷰 자동화 파이프라인</text>

  <!-- Step 1: PR Open -->
  <rect x="30" y="90" width="140" height="75" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="100" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#78350F">PR 생성</text>
  <text x="100" y="138" text-anchor="middle" font-size="12" fill="#92400E">git push origin</text>
  <text x="100" y="155" text-anchor="middle" font-size="11" fill="#D97706">on: pull_request</text>

  <!-- Arrow -->
  <line x1="170" y1="127" x2="210" y2="127" stroke="#6B7280" stroke-width="2" marker-end="url(#ca)"/>

  <!-- Step 2: GitHub Actions -->
  <rect x="210" y="90" width="155" height="75" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="287" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4ED8">GitHub Actions</text>
  <text x="287" y="135" text-anchor="middle" font-size="12" fill="#1E40AF">워크플로우 트리거</text>
  <text x="287" y="153" text-anchor="middle" font-size="11" fill="#3B82F6">ubuntu-latest runner</text>

  <!-- Arrow -->
  <line x1="365" y1="127" x2="405" y2="127" stroke="#6B7280" stroke-width="2" marker-end="url(#ca)"/>

  <!-- Step 3: Diff Extract -->
  <rect x="405" y="90" width="155" height="75" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="482" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">Diff 추출</text>
  <text x="482" y="135" text-anchor="middle" font-size="12" fill="#047857">git diff HEAD~1</text>
  <text x="482" y="153" text-anchor="middle" font-size="11" fill="#10B981">변경 파일 파싱</text>

  <!-- Arrow -->
  <line x1="560" y1="127" x2="600" y2="127" stroke="#6B7280" stroke-width="2" marker-end="url(#ca)"/>

  <!-- Step 4: AI Review -->
  <rect x="600" y="75" width="165" height="105" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2.5"/>
  <text x="682" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#5B21B6">AI 리뷰</text>
  <text x="682" y="123" text-anchor="middle" font-size="12" fill="#6D28D9">Claude API 호출</text>
  <text x="682" y="141" text-anchor="middle" font-size="12" fill="#6D28D9">버그 · 보안 · 성능</text>
  <text x="682" y="159" text-anchor="middle" font-size="11" fill="#A78BFA">claude-opus-4-5</text>

  <!-- Arrow down from AI -->
  <line x1="682" y1="180" x2="682" y2="220" stroke="#8B5CF6" stroke-width="2" marker-end="url(#ca)"/>

  <!-- Step 5: PR Comment -->
  <rect x="590" y="220" width="185" height="75" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="682" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">PR 댓글 게시</text>
  <text x="682" y="268" text-anchor="middle" font-size="12" fill="#047857">GitHub API · octokit</text>
  <text x="682" y="284" text-anchor="middle" font-size="11" fill="#10B981">인라인 · 요약 리뷰</text>

  <!-- YAML snippet area -->
  <rect x="30" y="210" width="530" height="170" rx="10" fill="#1E293B" stroke="#475569" stroke-width="1.5"/>
  <text x="50" y="238" font-size="12" fill="#94A3B8">name: AI Code Review</text>
  <text x="50" y="258" font-size="12" fill="#94A3B8">on:</text>
  <text x="70" y="276" font-size="12" fill="#93C5FD">  pull_request:</text>
  <text x="90" y="294" font-size="12" fill="#86EFAC">    types: [opened, synchronize]</text>
  <text x="50" y="314" font-size="12" fill="#94A3B8">jobs:</text>
  <text x="70" y="332" font-size="12" fill="#93C5FD">  ai-review:</text>
  <text x="90" y="350" font-size="12" fill="#94A3B8">    runs-on: ubuntu-latest</text>
  <text x="90" y="368" font-size="12" fill="#FCD34D">    env:</text>
  <text x="110" y="386" font-size="12" fill="#86EFAC">      ANTHROPIC_API_KEY: $&#123;&#123; secrets.ANTHROPIC_API_KEY &#125;&#125;</text>

  <!-- Bottom label -->
  <rect x="30" y="400" width="740" height="35" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="400" y="422" text-anchor="middle" font-size="12" fill="#1D4ED8">핵심: secrets에 API 키 저장 · 리뷰 대상을 diff로 제한 · 코멘트는 upsert 방식으로 중복 방지</text>

  <defs>
    <marker id="ca" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
  </defs>
</svg>
