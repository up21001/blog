<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Cloudflare Agents Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when to use Cloudflare Agents.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8f1"/>
      <stop offset="100%" stop-color="#ffe4c7"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#7c2d12" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9a3412"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Should You Use Cloudflare Agents?</text>
  <rect x="445" y="120" width="310" height="90" rx="22" fill="#fff" stroke="#fb923c" stroke-width="2" filter="url(#shadow2)"/>
  <text x="500" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c2d12">Need AI agents?</text>
  <rect x="120" y="280" width="300" height="110" rx="24" fill="#ffffff" stroke="#fdba74" filter="url(#shadow2)"/>
  <text x="172" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">No long-lived state</text>
  <text x="150" y="360" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#9a3412">Simple request/response API may be enough</text>
  <rect x="450" y="280" width="300" height="110" rx="24" fill="#ffffff" stroke="#fdba74" filter="url(#shadow2)"/>
  <text x="505" y="327" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Need memory and</text>
  <text x="521" y="358" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">realtime sync?</text>
  <rect x="780" y="280" width="300" height="110" rx="24" fill="#ffffff" stroke="#fdba74" filter="url(#shadow2)"/>
  <text x="832" y="330" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Need tools and</text>
  <text x="842" y="360" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">scheduled tasks?</text>
  <rect x="445" y="485" width="320" height="110" rx="26" fill="#7c2d12" filter="url(#shadow2)"/>
  <text x="496" y="535" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fff7ed">Use Cloudflare Agents</text>
  <text x="487" y="565" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#ffedd5">Stateful runtime with Durable Objects</text>
  <path d="M600 210 L600 280" stroke="#9a3412" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M450 335 L420 335" stroke="#9a3412" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M750 335 L780 335" stroke="#9a3412" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M600 390 L600 485" stroke="#9a3412" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
</svg>
