<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Vector Database Operations Architecture</title>
  <desc id="desc">Architecture diagram showing ingest, storage, query, and observability layers.</desc>
  <rect width="1200" height="630" fill="#111827"/>
  <text x="64" y="74" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#93c5fd">ARCHITECTURE</text>
  <text x="64" y="118" font-size="40" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#f8fafc">Operational layers for vector databases</text>
  <text x="64" y="154" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#cbd5e1">Query, storage, indexing, and observability must evolve together.</text>

  <rect x="70" y="230" width="220" height="110" rx="20" fill="#1f2937" stroke="#334155"/>
  <rect x="330" y="230" width="220" height="110" rx="20" fill="#1f2937" stroke="#334155"/>
  <rect x="590" y="230" width="220" height="110" rx="20" fill="#1f2937" stroke="#334155"/>
  <rect x="850" y="230" width="280" height="110" rx="20" fill="#1f2937" stroke="#334155"/>
  <text x="104" y="272" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#e2e8f0">Ingest</text>
  <text x="104" y="300" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#cbd5e1">chunk + metadata</text>
  <text x="364" y="272" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#e2e8f0">Storage</text>
  <text x="364" y="300" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#cbd5e1">vectors + versions</text>
  <text x="624" y="272" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#e2e8f0">Query</text>
  <text x="624" y="300" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#cbd5e1">filter + rerank</text>
  <text x="884" y="272" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#e2e8f0">Observability</text>
  <text x="884" y="300" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#cbd5e1">trace + alert + backup</text>
  <path d="M290 285 L330 285" stroke="#38bdf8" stroke-width="4" fill="none" marker-end="url(#m)"/>
  <path d="M550 285 L590 285" stroke="#38bdf8" stroke-width="4" fill="none" marker-end="url(#m)"/>
  <path d="M810 285 L850 285" stroke="#38bdf8" stroke-width="4" fill="none" marker-end="url(#m)"/>
  <defs>
    <marker id="m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
  </defs>
</svg>
