<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .bg{fill:#111827}
      .box{fill:#0f172a;stroke:#475569;stroke-width:2;rx:18;ry:18}
      .t1{font:700 50px Arial,sans-serif;fill:#f8fafc}
      .t2{font:400 22px Arial,sans-serif;fill:#cbd5e1}
      .h{font:700 24px Arial,sans-serif;fill:#e2e8f0}
      .p{font:400 18px Arial,sans-serif;fill:#cbd5e1}
      .line{stroke:#60a5fa;stroke-width:5;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="1200" height="630" class="bg"/>
  <text x="70" y="82" class="t1">Which policy layer first?</text>
  <text x="70" y="124" class="t2">Map the failure to the cheapest control point.</text>
  <rect x="70" y="190" width="280" height="110" class="box"/>
  <rect x="460" y="190" width="280" height="110" class="box"/>
  <rect x="850" y="190" width="280" height="110" class="box"/>
  <text x="100" y="232" class="h">Content policy</text>
  <text x="100" y="262" class="p">toxicity, PII, unsafe output</text>
  <text x="490" y="232" class="h">Tool policy</text>
  <text x="490" y="262" class="p">allowlist tools and parameters</text>
  <text x="880" y="232" class="h">Execution policy</text>
  <text x="880" y="262" class="p">approval for side effects</text>
  <path d="M350 245 L460 245" class="line"/>
  <path d="M740 245 L850 245" class="line"/>
  <rect x="70" y="360" width="1030" height="180" class="box"/>
  <text x="95" y="405" class="h">Rule of thumb</text>
  <text x="95" y="445" class="p">If the risk is in the words, filter the words. If the risk is in the action, gate the action.</text>
  <text x="95" y="480" class="p">Everything else is just implementation detail.</text>
</svg>
