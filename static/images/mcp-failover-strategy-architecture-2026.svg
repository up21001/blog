<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#09101c"/>
  <text x="60" y="68" fill="#f8fafc" font-family="Arial" font-size="34" font-weight="700">MCP Failover Strategy Architecture</text>
  <g font-family="Arial" font-size="17" font-weight="600" fill="#fff">
    <rect x="55" y="150" width="180" height="112" rx="18" fill="#1d4ed8"/><text x="145" y="198" text-anchor="middle">Primary MCP</text><text x="145" y="224" text-anchor="middle" font-size="15" font-weight="400">default route</text>
    <rect x="280" y="150" width="180" height="112" rx="18" fill="#7c3aed"/><text x="370" y="198" text-anchor="middle">Router</text><text x="370" y="224" text-anchor="middle" font-size="15" font-weight="400">policy + failover</text>
    <rect x="505" y="150" width="180" height="112" rx="18" fill="#0f766e"/><text x="595" y="198" text-anchor="middle">Secondary MCP</text><text x="595" y="224" text-anchor="middle" font-size="15" font-weight="400">fallback route</text>
    <rect x="730" y="150" width="180" height="112" rx="18" fill="#b45309"/><text x="820" y="198" text-anchor="middle">Observability</text><text x="820" y="224" text-anchor="middle" font-size="15" font-weight="400">metrics + traces</text>
    <rect x="955" y="150" width="180" height="112" rx="18" fill="#dc2626"/><text x="1045" y="198" text-anchor="middle">Approval / SLA</text><text x="1045" y="224" text-anchor="middle" font-size="15" font-weight="400">escalation path</text>
  </g>
  <path d="M235 206 L280 206" stroke="#f8fafc" stroke-width="3"/>
  <path d="M460 206 L505 206" stroke="#f8fafc" stroke-width="3"/>
  <path d="M685 206 L730 206" stroke="#f8fafc" stroke-width="3"/>
  <path d="M910 206 L955 206" stroke="#f8fafc" stroke-width="3"/>
  <rect x="170" y="340" width="300" height="126" rx="20" fill="#111827" stroke="#93c5fd" stroke-width="2"/>
  <text x="320" y="388" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="18" font-weight="600">Routing Policy</text>
  <text x="320" y="416" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="15">time, error, risk, budget</text>
  <rect x="515" y="340" width="300" height="126" rx="20" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
  <text x="665" y="388" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="18" font-weight="600">State Store</text>
  <text x="665" y="416" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="15">current route + cooldown</text>
  <rect x="860" y="340" width="260" height="126" rx="20" fill="#111827" stroke="#fca5a5" stroke-width="2"/>
  <text x="990" y="388" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="18" font-weight="600">Recovery Loop</text>
  <text x="990" y="416" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="15">verify, restore, replay</text>
