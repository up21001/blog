<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Portkey Choice Flow 2026</title>
  <desc id="desc">Decision flow showing when Portkey is a good fit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f766e" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#115e59">Should You Use Portkey?</text>
  <rect x="445" y="120" width="310" height="90" rx="22" fill="#fff" stroke="#14b8a6" stroke-width="2" filter="url(#shadow)"/>
  <text x="492" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#115e59">Need model gateway?</text>
  <rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#5eead4" filter="url(#shadow)"/>
  <text x="187" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">No</text>
  <text x="146" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">Direct provider SDK may be enough</text>
  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#5eead4" filter="url(#shadow)"/>
  <text x="496" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Need routing and</text>
  <text x="508" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">guardrails?</text>
  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#5eead4" filter="url(#shadow)"/>
  <text x="824" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Need observability</text>
  <text x="856" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">and access control?</text>
  <rect x="445" y="500" width="320" height="110" rx="26" fill="#115e59" filter="url(#shadow)"/>
  <text x="527" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ecfeff">Use Portkey</text>
  <text x="483" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#ccfbf1">Great for centralized AI operations</text>
</svg>
