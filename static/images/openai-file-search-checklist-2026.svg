<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720"><rect width="1200" height="720" fill="#fffaf2"/><text x="70" y="88" font-family="Segoe UI, Arial" font-size="38" font-weight="700" fill="#21384c">File Search 설계 체크리스트</text><text x="70" y="126" font-family="Segoe UI, Arial" font-size="20" fill="#5b7388">결과 수, 메타데이터, citation, 디버깅 가시성을 함께 설계해야 합니다.</text><rect x="250" y="200" width="700" height="360" rx="28" fill="#0f4c81"/><text x="320" y="265" font-family="Segoe UI, Arial" font-size="26" font-weight="700" fill="#fff">점검 항목</text><text x="320" y="315" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- vector store 분리가 적절한가</text><text x="320" y="355" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- max_num_results를 조정했는가</text><text x="320" y="395" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- metadata filtering이 필요한가</text><text x="320" y="435" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- include로 디버깅 가능한가</text><text x="320" y="475" font-family="Segoe UI, Arial" font-size="20" fill="#dcebff">- citation UI를 고려했는가</text></svg>
