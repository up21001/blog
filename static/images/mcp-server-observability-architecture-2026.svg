<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MCP Server Observability Architecture</title>
  <desc id="desc">Architecture showing trace store, audit store, replay harness, and dashboard.</desc>
  <rect width="1200" height="630" rx="36" fill="#0b1720"/>
  <text x="64" y="88" fill="#f5f7fb" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">MCP Server Observability Architecture</text>
  <text x="64" y="124" fill="#92a7bc" font-family="Inter, Arial, sans-serif" font-size="19">Trace store -> audit store -> replay harness -> dashboard</text>
  <g fill="#132433" stroke="#6ee7d8" stroke-width="2">
    <rect x="70" y="210" width="220" height="140" rx="20"/>
    <rect x="330" y="210" width="220" height="140" rx="20"/>
    <rect x="590" y="210" width="220" height="140" rx="20"/>
    <rect x="850" y="210" width="280" height="140" rx="20"/>
  </g>
  <g fill="#f5f7fb" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="600">
    <text x="105" y="252">Trace Store</text>
    <text x="372" y="252">Audit Store</text>
    <text x="623" y="252">Replay Harness</text>
    <text x="924" y="252">Dashboard</text>
  </g>
  <g fill="#92a7bc" font-family="Inter, Arial, sans-serif" font-size="17">
    <text x="98" y="286">Call path and latency</text>
    <text x="360" y="286">User and tool record</text>
    <text x="620" y="286">Failure reproduction</text>
    <text x="898" y="286">Trend and alert view</text>
  </g>
  <g stroke="#6ee7d8" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M290 280 H320"/>
    <path d="M550 280 H580"/>
    <path d="M810 280 H840"/>
  </g>
</svg>
