<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <style>
      .title { font: 700 42px sans-serif; fill: #0f172a; }
      .sub { font: 400 20px sans-serif; fill: #475569; }
      .boxTitle { font: 700 22px sans-serif; fill: #0f172a; }
      .boxText { font: 400 18px sans-serif; fill: #334155; }
      .card { rx: 22; ry: 22; stroke: #cbd5e1; stroke-width: 2; }
    </style>
    <marker id="arrow5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg5)"/>
  <text x="70" y="78" class="title">Invalidation Choice Flow</text>
  <text x="70" y="114" class="sub">TTL, version, event 중 무엇을 쓸까</text>

  <rect x="70" y="170" width="170" height="110" class="card" fill="#dcfce7"/>
  <text x="155" y="215" text-anchor="middle" class="boxTitle">Changes Often?</text>
  <text x="155" y="245" text-anchor="middle" class="boxText">자주 바뀌나</text>

  <rect x="290" y="170" width="170" height="110" class="card" fill="#bbf7d0"/>
  <text x="375" y="215" text-anchor="middle" class="boxTitle">Versioned?</text>
  <text x="375" y="245" text-anchor="middle" class="boxText">버전 관리</text>

  <rect x="510" y="170" width="170" height="110" class="card" fill="#86efac"/>
  <text x="595" y="215" text-anchor="middle" class="boxTitle">Event Source?</text>
  <text x="595" y="245" text-anchor="middle" class="boxText">변경 이벤트</text>

  <rect x="730" y="170" width="170" height="110" class="card" fill="#fef9c3"/>
  <text x="815" y="215" text-anchor="middle" class="boxTitle">TTL Only</text>
  <text x="815" y="245" text-anchor="middle" class="boxText">단기 캐시</text>

  <rect x="950" y="170" width="180" height="110" class="card" fill="#ffe4e6"/>
  <text x="1040" y="215" text-anchor="middle" class="boxTitle">Invalidate</text>
  <text x="1040" y="245" text-anchor="middle" class="boxText">즉시 삭제</text>

  <line x1="240" y1="225" x2="290" y2="225" stroke="#64748b" stroke-width="4" marker-end="url(#arrow5)"/>
  <line x1="460" y1="225" x2="510" y2="225" stroke="#64748b" stroke-width="4" marker-end="url(#arrow5)"/>
  <line x1="680" y1="225" x2="730" y2="225" stroke="#64748b" stroke-width="4" marker-end="url(#arrow5)"/>
  <line x1="900" y1="225" x2="950" y2="225" stroke="#64748b" stroke-width="4" marker-end="url(#arrow5)"/>

  <rect x="70" y="350" width="1060" height="190" class="card" fill="#ffffff"/>
  <text x="100" y="392" class="boxTitle">선택 기준</text>
  <text x="100" y="432" class="boxText">변경이 잦고 원본 이벤트가 있으면 event-based invalidation을 우선한다.</text>
  <text x="100" y="470" class="boxText">버전이 명확하면 version-based invalidation, 단순 반복 질의는 TTL-only로도 충분할 수 있다.</text>
  <text x="100" y="508" class="boxText">핵심은 stale answer를 허용할지 여부를 먼저 정하는 것이다.</text>
</svg>
