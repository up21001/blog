<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#f8fbff"/><text x="70" y="90" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Should You Use Better Auth?</text><rect x="440" y="120" width="320" height="90" rx="22" fill="#fff" stroke="#60a5fa"/><text x="468" y="175" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Need full auth stack?</text><rect x="120" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd"/><text x="188" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">No</text><text x="138" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2563eb">A hosted auth layer may be enough</text><rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd"/><text x="490" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Need passkey,</text><text x="517" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">session, org?</text><rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#93c5fd"/><text x="839" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">Want framework</text><text x="832" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#2563eb">agnostic auth?</text><rect x="445" y="500" width="320" height="110" rx="26" fill="#1e3a8a"/><text x="485" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#eff6ff">Use Better Auth</text><text x="470" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#bfdbfe">Strong fit for TypeScript auth control</text></svg>
