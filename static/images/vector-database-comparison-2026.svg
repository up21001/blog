<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">벡터 데이터베이스 비교 — Chroma vs Pinecone vs Weaviate</text>

  <!-- Header Row -->
  <rect x="30" y="55" width="160" height="40" rx="6" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
  <text x="110" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">항목</text>

  <rect x="200" y="55" width="170" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="285" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E40AF">Chroma</text>

  <rect x="380" y="55" width="170" height="40" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="465" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#065F46">Pinecone</text>

  <rect x="560" y="55" width="210" height="40" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="665" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#5B21B6">Weaviate</text>

  <!-- Row 1: Type -->
  <rect x="30" y="100" width="160" height="38" rx="4" fill="#F3F4F6" stroke="#E5E7EB"/>
  <text x="110" y="124" text-anchor="middle" font-size="12" fill="#374151">배포 방식</text>
  <rect x="200" y="100" width="170" height="38" rx="4" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="285" y="124" text-anchor="middle" font-size="12" fill="#1E40AF">로컬 / 임베디드</text>
  <rect x="380" y="100" width="170" height="38" rx="4" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="465" y="124" text-anchor="middle" font-size="12" fill="#065F46">완전 관리형 SaaS</text>
  <rect x="560" y="100" width="210" height="38" rx="4" fill="#F5F3FF" stroke="#DDD6FE"/>
  <text x="665" y="124" text-anchor="middle" font-size="12" fill="#5B21B6">셀프 / 클라우드</text>

  <!-- Row 2: Pricing -->
  <rect x="30" y="142" width="160" height="38" rx="4" fill="#F3F4F6" stroke="#E5E7EB"/>
  <text x="110" y="166" text-anchor="middle" font-size="12" fill="#374151">가격</text>
  <rect x="200" y="142" width="170" height="38" rx="4" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="285" y="166" text-anchor="middle" font-size="12" fill="#1E40AF">무료 오픈소스</text>
  <rect x="380" y="142" width="170" height="38" rx="4" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="465" y="158" text-anchor="middle" font-size="12" fill="#065F46">무료 1M 벡터</text>
  <text x="465" y="174" text-anchor="middle" font-size="11" fill="#065F46">이후 사용량 과금</text>
  <rect x="560" y="142" width="210" height="38" rx="4" fill="#F5F3FF" stroke="#DDD6FE"/>
  <text x="665" y="166" text-anchor="middle" font-size="12" fill="#5B21B6">오픈소스 무료</text>

  <!-- Row 3: Scale -->
  <rect x="30" y="184" width="160" height="38" rx="4" fill="#F3F4F6" stroke="#E5E7EB"/>
  <text x="110" y="208" text-anchor="middle" font-size="12" fill="#374151">확장성</text>
  <rect x="200" y="184" width="170" height="38" rx="4" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="285" y="208" text-anchor="middle" font-size="12" fill="#1E40AF">소규모 적합</text>
  <rect x="380" y="184" width="170" height="38" rx="4" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="465" y="208" text-anchor="middle" font-size="12" fill="#065F46">수억 벡터 지원</text>
  <rect x="560" y="184" width="210" height="38" rx="4" fill="#F5F3FF" stroke="#DDD6FE"/>
  <text x="665" y="208" text-anchor="middle" font-size="12" fill="#5B21B6">대규모 지원</text>

  <!-- Row 4: Speed -->
  <rect x="30" y="226" width="160" height="38" rx="4" fill="#F3F4F6" stroke="#E5E7EB"/>
  <text x="110" y="250" text-anchor="middle" font-size="12" fill="#374151">검색 속도</text>
  <rect x="200" y="226" width="170" height="38" rx="4" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="285" y="250" text-anchor="middle" font-size="12" fill="#1E40AF">중간 (로컬 의존)</text>
  <rect x="380" y="226" width="170" height="38" rx="4" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="465" y="250" text-anchor="middle" font-size="12" fill="#065F46">매우 빠름 (~10ms)</text>
  <rect x="560" y="226" width="210" height="38" rx="4" fill="#F5F3FF" stroke="#DDD6FE"/>
  <text x="665" y="250" text-anchor="middle" font-size="12" fill="#5B21B6">빠름 + 필터 강점</text>

  <!-- Row 5: Metadata -->
  <rect x="30" y="268" width="160" height="38" rx="4" fill="#F3F4F6" stroke="#E5E7EB"/>
  <text x="110" y="292" text-anchor="middle" font-size="12" fill="#374151">메타데이터 필터</text>
  <rect x="200" y="268" width="170" height="38" rx="4" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="285" y="292" text-anchor="middle" font-size="12" fill="#1E40AF">기본 지원</text>
  <rect x="380" y="268" width="170" height="38" rx="4" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="465" y="292" text-anchor="middle" font-size="12" fill="#065F46">강력한 필터</text>
  <rect x="560" y="268" width="210" height="38" rx="4" fill="#F5F3FF" stroke="#DDD6FE"/>
  <text x="665" y="292" text-anchor="middle" font-size="12" fill="#5B21B6">GraphQL 기반</text>

  <!-- Row 6: Best For -->
  <rect x="30" y="310" width="160" height="38" rx="4" fill="#F3F4F6" stroke="#E5E7EB"/>
  <text x="110" y="334" text-anchor="middle" font-size="12" fill="#374151">추천 용도</text>
  <rect x="200" y="310" width="170" height="38" rx="4" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="285" y="326" text-anchor="middle" font-size="11" fill="#1E40AF">프로토타입</text>
  <text x="285" y="342" text-anchor="middle" font-size="11" fill="#1E40AF">개인 프로젝트</text>
  <rect x="380" y="310" width="170" height="38" rx="4" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="465" y="326" text-anchor="middle" font-size="11" fill="#065F46">프로덕션</text>
  <text x="465" y="342" text-anchor="middle" font-size="11" fill="#065F46">엔터프라이즈</text>
  <rect x="560" y="310" width="210" height="38" rx="4" fill="#F5F3FF" stroke="#DDD6FE"/>
  <text x="665" y="326" text-anchor="middle" font-size="11" fill="#5B21B6">복잡한 쿼리</text>
  <text x="665" y="342" text-anchor="middle" font-size="11" fill="#5B21B6">멀티모달 검색</text>

  <!-- Decision Guide -->
  <rect x="30" y="365" width="740" height="65" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="400" y="385" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">선택 가이드</text>
  <text x="50" y="403" font-size="11" fill="#92400E">• 빠르게 프로토타입 → Chroma    • 프로덕션 즉시 투입, 인프라 관리 없음 → Pinecone    • 오픈소스 + 복잡한 필터/그래프 쿼리 → Weaviate</text>
  <text x="50" y="422" font-size="11" fill="#92400E">• 대용량 로컬 처리 → FAISS    • Rust 성능 + 셀프 호스팅 → Qdrant    • 비용 최소화 + 단순 RAG → Chroma + SQLite 조합</text>
</svg>
