<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Vapi Choice Flow 2026</title>
  <desc id="desc">Decision flow for when to use Vapi for phone assistants and call automation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf5"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#c2410c" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2410c"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="86" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Should You Use Vapi?</text>
  <rect x="430" y="120" width="340" height="90" rx="22" fill="#fff" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <text x="478" y="174" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a3412">Need phone assistant?</text>
  <rect x="110" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="180" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">No</text>
  <text x="148" y="365" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#c2410c">A chat or web voice stack may be enough</text>
  <rect x="450" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="491" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need inbound and</text>
  <text x="516" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">outbound calls?</text>
  <rect x="790" y="285" width="300" height="110" rx="24" fill="#fff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="830" y="335" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Need tools and</text>
  <text x="852" y="365" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">structured outputs?</text>
  <rect x="445" y="500" width="320" height="110" rx="26" fill="#c2410c" filter="url(#shadow)"/>
  <text x="536" y="550" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#fff7ed">Use Vapi</text>
  <text x="486" y="580" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#fee2e2">Strong fit for phone automation</text>
  <path d="M600 210 L600 285" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M410 340 L450 340" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M750 340 L790 340" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M600 395 L600 500" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
