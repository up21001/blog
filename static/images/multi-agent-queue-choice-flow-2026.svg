<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Multi-Agent Queue Choice Flow</title>
  <desc id="desc">Choice flow for queue design by task priority, latency, and human review requirements.</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #e5e7eb; }
      .title { font-size: 38px; font-weight: 700; }
      .small { font-size: 18px; fill: #cbd5e1; }
      .box { rx: 18; ry: 18; stroke: #f59e0b; stroke-width: 2.5; fill: rgba(17, 24, 39, 0.72); }
      .yes { fill: #16a34a; }
      .no { fill: #2563eb; }
      .line { stroke: #cbd5e1; stroke-width: 4; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#cbd5e1"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="#111827"/>
  <text x="60" y="82" class="title">Multi-Agent Queue Choice Flow</text>
  <text x="60" y="120" class="small">Pick a queue strategy based on urgency, retry risk, and review needs</text>
  <rect x="70" y="190" width="220" height="90" class="box"/>
  <text x="180" y="225" text-anchor="middle" font-size="22" font-weight="700">Task arrives</text>
  <text x="180" y="252" text-anchor="middle" class="small">New request</text>
  <rect x="360" y="165" width="250" height="120" class="box"/>
  <text x="485" y="205" text-anchor="middle" font-size="22" font-weight="700">Priority?</text>
  <text x="485" y="232" text-anchor="middle" class="small">High / normal / low</text>
  <rect x="690" y="150" width="240" height="150" class="box"/>
  <text x="810" y="190" text-anchor="middle" font-size="22" font-weight="700">Retry needed?</text>
  <text x="810" y="218" text-anchor="middle" class="small">Backoff queue</text>
  <text x="810" y="246" text-anchor="middle" class="small">Dedicated lane</text>
  <rect x="980" y="175" width="150" height="120" class="box"/>
  <text x="1055" y="215" text-anchor="middle" font-size="22" font-weight="700">Human?</text>
  <text x="1055" y="243" text-anchor="middle" class="small">Review gate</text>
  <line x1="290" y1="235" x2="360" y2="235" class="line"/>
  <line x1="610" y1="235" x2="690" y2="235" class="line"/>
  <line x1="930" y1="235" x2="980" y2="235" class="line"/>
  <text x="340" y="205" class="yes">yes</text>
  <text x="650" y="205" class="no">no</text>
  <text x="940" y="205" class="yes">yes</text>
  <rect x="310" y="380" width="580" height="120" rx="20" ry="20" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
  <text x="600" y="425" text-anchor="middle" font-size="22" font-weight="700">Decision rule</text>
  <text x="600" y="453" text-anchor="middle" class="small">Urgency first, then retry path, then review path</text>
  <text x="600" y="482" text-anchor="middle" class="small">Queue layout should match the business SLA</text>
</svg>
