<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MCP latency budget workflow</title>
  <desc id="desc">Flow that divides latency into agent, gateway, tool, and downstream budgets.</desc>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <style>
      .title { font: 700 36px Arial, sans-serif; fill: #fff; }
      .sub { font: 400 18px Arial, sans-serif; fill: #ede9fe; }
      .box { fill: #ede9fe; stroke: #8b5cf6; stroke-width: 2; rx: 18; }
      .text { font: 700 20px Arial, sans-serif; fill: #1f1147; }
      .small { font: 400 15px Arial, sans-serif; fill: #1f1147; }
      .arrow { stroke: #fff; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#fff"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg4)"/>
  <text x="60" y="78" class="title">MCP Latency Budget Workflow</text>
  <text x="60" y="112" class="sub">Split end-to-end latency into measurable slices</text>
  <rect x="60" y="180" width="190" height="110" class="box"/>
  <rect x="280" y="180" width="190" height="110" class="box"/>
  <rect x="500" y="180" width="190" height="110" class="box"/>
  <rect x="720" y="180" width="190" height="110" class="box"/>
  <rect x="940" y="180" width="200" height="110" class="box"/>
  <text x="95" y="225" class="text">Agent</text>
  <text x="88" y="252" class="small">planning budget</text>
  <text x="304" y="225" class="text">Gateway</text>
  <text x="305" y="252" class="small">routing budget</text>
  <text x="525" y="225" class="text">MCP</text>
  <text x="520" y="252" class="small">tool budget</text>
  <text x="743" y="225" class="text">Downstream</text>
  <text x="744" y="252" class="small">API budget</text>
  <text x="970" y="225" class="text">Release</text>
  <text x="968" y="252" class="small">ship or freeze</text>
  <path class="arrow" d="M250 235 L280 235"/>
  <path class="arrow" d="M470 235 L500 235"/>
  <path class="arrow" d="M690 235 L720 235"/>
  <path class="arrow" d="M910 235 L940 235"/>
  <rect x="120" y="355" width="960" height="170" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.35)" stroke-width="2" rx="24"/>
  <text x="150" y="405" class="text" fill="#fff">Budget rule</text>
  <text x="150" y="438" class="sub">Total SLO = sum of slices, and each slice has its own p95 / p99 target.</text>
  <text x="150" y="470" class="sub">If one slice exceeds budget, optimize that layer before changing the whole system.</text>
</svg>

