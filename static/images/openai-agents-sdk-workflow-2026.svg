<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">OpenAI Agents SDK Workflow 2026</title>
  <desc id="desc">Workflow diagram for OpenAI Agents SDK</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef8ff"/>
      <stop offset="100%" stop-color="#effbf2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#33505f" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#46606f"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#163244">OpenAI Agents SDK Workflow</text>
  <text x="70" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#597082">사용자 요청을 에이전트 판단과 도구 실행으로 연결하는 기본 흐름</text>

  <rect x="70" y="230" width="200" height="120" rx="22" fill="#0f4c81" filter="url(#shadow)"/>
  <text x="114" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">User</text>
  <text x="98" y="312" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#d7e8ff">질문 / 작업 요청</text>

  <rect x="330" y="195" width="250" height="190" rx="28" fill="#1f8a70" filter="url(#shadow)"/>
  <text x="383" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#fff">Agent</text>
  <text x="377" y="286" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#e8fff8">role + instructions</text>
  <text x="367" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#e8fff8">tool selection</text>
  <text x="364" y="352" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#e8fff8">step-by-step loop</text>

  <rect x="650" y="120" width="210" height="92" rx="20" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="699" y="176" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Web Search</text>

  <rect x="650" y="236" width="210" height="92" rx="20" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="698" y="292" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">File Search</text>

  <rect x="650" y="352" width="210" height="92" rx="20" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="696" y="408" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Remote MCP</text>

  <rect x="650" y="468" width="210" height="92" rx="20" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="692" y="524" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">Functions</text>

  <rect x="920" y="235" width="220" height="140" rx="24" fill="#24415a" filter="url(#shadow)"/>
  <text x="975" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#fff">Result</text>
  <text x="960" y="323" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#d8ebff">final answer</text>
  <text x="957" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#d8ebff">state update</text>

  <path d="M270 290 L330 290" stroke="#46606f" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <path d="M580 270 L650 166" stroke="#46606f" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <path d="M580 300 L650 282" stroke="#46606f" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <path d="M580 330 L650 398" stroke="#46606f" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <path d="M580 360 L650 514" stroke="#46606f" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <path d="M860 280 L920 300" stroke="#46606f" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <path d="M860 520 L920 330" stroke="#46606f" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
</svg>
