<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08131f"/>
      <stop offset="1" stop-color="#18324d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <text x="80" y="110" fill="#f3fbff" font-family="Arial" font-size="48" font-weight="700">Embedding Model Selection</text>
  <text x="80" y="156" fill="#b6cde0" font-family="Arial" font-size="22">language -> quality -> cost -> evaluation</text>
  <g filter="url(#shadow)">
    <rect x="70" y="220" width="180" height="120" rx="22" fill="#12253b" stroke="#5b8fb8" stroke-width="2"/>
    <rect x="280" y="220" width="180" height="120" rx="22" fill="#12253b" stroke="#5b8fb8" stroke-width="2"/>
    <rect x="490" y="220" width="180" height="120" rx="22" fill="#12253b" stroke="#5b8fb8" stroke-width="2"/>
    <rect x="700" y="220" width="180" height="120" rx="22" fill="#12253b" stroke="#5b8fb8" stroke-width="2"/>
    <rect x="910" y="220" width="220" height="120" rx="22" fill="#17344b" stroke="#4fd1c5" stroke-width="2"/>
  </g>
  <text x="160" y="265" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Data</text>
  <text x="160" y="297" text-anchor="middle" fill="#b6cde0" font-family="Arial" font-size="18">language / domain</text>
  <text x="370" y="265" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Shortlist</text>
  <text x="370" y="297" text-anchor="middle" fill="#b6cde0" font-family="Arial" font-size="18">2-4 candidates</text>
  <text x="580" y="265" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Embed</text>
  <text x="580" y="297" text-anchor="middle" fill="#b6cde0" font-family="Arial" font-size="18">chunk / query</text>
  <text x="790" y="265" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Evaluate</text>
  <text x="790" y="297" text-anchor="middle" fill="#b6cde0" font-family="Arial" font-size="18">retrieval quality</text>
  <text x="1020" y="265" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">Choose</text>
  <text x="1020" y="297" text-anchor="middle" fill="#b6cde0" font-family="Arial" font-size="18">best fit model</text>
  <path d="M250 280 H270" stroke="#90cdf4" stroke-width="6" stroke-linecap="round"/>
  <path d="M460 280 H480" stroke="#90cdf4" stroke-width="6" stroke-linecap="round"/>
  <path d="M670 280 H690" stroke="#90cdf4" stroke-width="6" stroke-linecap="round"/>
  <path d="M880 280 H900" stroke="#90cdf4" stroke-width="6" stroke-linecap="round"/>
  <text x="80" y="430" fill="#d7eaff" font-family="Arial" font-size="28" font-weight="700">Model selection is not about size alone. It is about fit for your data and budget.</text>
  <text x="80" y="474" fill="#d7eaff" font-family="Arial" font-size="20">Evaluate before you commit to production indexing.</text>
</svg>
