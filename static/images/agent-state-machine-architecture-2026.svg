<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#09111d"/>
  <text x="70" y="82" fill="#f8fafc" font-size="32" font-family="Arial, sans-serif" font-weight="700">Agent State Machine Architecture</text>
  <g fill="#111827" stroke="#f472b6" stroke-width="2">
    <rect x="70" y="150" width="240" height="90" rx="18"/>
    <rect x="70" y="270" width="240" height="90" rx="18"/>
    <rect x="70" y="390" width="240" height="90" rx="18"/>
    <rect x="360" y="150" width="280" height="330" rx="18"/>
    <rect x="700" y="150" width="430" height="330" rx="18"/>
  </g>
  <g fill="#e2e8f0" font-family="Arial, sans-serif" font-size="18" font-weight="700">
    <text x="132" y="204">States</text>
    <text x="123" y="324">Transitions</text>
    <text x="122" y="444">Guards</text>
    <text x="428" y="204">State Engine</text>
    <text x="822" y="204">External Effects</text>
  </g>
  <g fill="#94a3b8" font-family="Arial, sans-serif" font-size="15">
    <text x="400" y="262">idle, observe, decide, act</text>
    <text x="400" y="292">conditions, retries, approvals</text>
    <text x="400" y="322">terminal state, error state</text>
    <text x="400" y="352">event log, replay, trace</text>
  </g>
  <text x="730" y="276" fill="#cbd5e1" font-size="16" font-family="Arial, sans-serif">tools, APIs, human approvals, monitoring</text>
  <text x="730" y="314" fill="#cbd5e1" font-size="16" font-family="Arial, sans-serif">state machine keeps transitions deterministic</text>
</svg>
