<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F2937">엔지니어 홈 오피스 셋업 구성도</text>

  <!-- Desk surface -->
  <rect x="60" y="200" width="680" height="18" rx="4" fill="#92400E" opacity="0.6"/>
  <text x="400" y="212" text-anchor="middle" font-size="10" fill="white">전동 스탠딩 데스크 (160×80cm)</text>

  <!-- Monitors -->
  <rect x="200" y="100" width="180" height="100" rx="4" fill="#1F2937" stroke="#374151" stroke-width="2"/>
  <rect x="206" y="106" width="168" height="86" rx="2" fill="#DBEAFE" opacity="0.8"/>
  <text x="290" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#1D4ED8">32" 4K 메인</text>
  <text x="290" y="165" text-anchor="middle" font-size="10" fill="#374151">코드 편집 주 화면</text>
  <rect x="288" y="200" width="4" height="18" fill="#374151"/>

  <rect x="400" y="110" width="160" height="90" rx="4" fill="#1F2937" stroke="#374151" stroke-width="2"/>
  <rect x="405" y="115" width="150" height="78" rx="2" fill="#D1FAE5" opacity="0.8"/>
  <text x="480" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">27" QHD 서브</text>
  <text x="480" y="168" text-anchor="middle" font-size="10" fill="#374151">문서 / 참고 화면</text>
  <rect x="478" y="200" width="4" height="18" fill="#374151"/>

  <!-- Laptop stand -->
  <rect x="580" y="155" width="100" height="45" rx="4" fill="#374151" stroke="#6B7280" stroke-width="1.5"/>
  <text x="630" y="176" text-anchor="middle" font-size="10" fill="white">MacBook</text>
  <text x="630" y="190" text-anchor="middle" font-size="9" fill="#9CA3AF">M4 Pro</text>

  <!-- Keyboard area -->
  <rect x="210" y="218" width="220" height="35" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="320" y="232" text-anchor="middle" font-size="11" fill="#374151">기계식 키보드</text>
  <text x="320" y="247" text-anchor="middle" font-size="10" fill="#6B7280">HHKB / Keychron Q1</text>

  <!-- Mouse -->
  <rect x="450" y="218" width="80" height="35" rx="12" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="490" y="233" text-anchor="middle" font-size="10" fill="#374151">MX Master 3</text>
  <text x="490" y="247" text-anchor="middle" font-size="9" fill="#6B7280">트랙볼 고려</text>

  <!-- Left side items -->
  <rect x="60" y="218" width="130" height="35" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="125" y="233" text-anchor="middle" font-size="11" fill="#4C1D95">USB-C 허브</text>
  <text x="125" y="247" text-anchor="middle" font-size="10" fill="#6B7280">CalDigit TS4</text>

  <!-- Chair -->
  <rect x="310" y="270" width="120" height="80" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="370" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">에르고 체어</text>
  <text x="370" y="322" text-anchor="middle" font-size="11" fill="#374151">Herman Miller</text>
  <text x="370" y="338" text-anchor="middle" font-size="10" fill="#6B7280">or 시디즈 T80</text>

  <!-- Left panel - lighting -->
  <rect x="30" y="70" width="110" height="90" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="85" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">조명 세팅</text>
  <text x="85" y="110" text-anchor="middle" font-size="10" fill="#374151">자연광 왼쪽</text>
  <text x="85" y="126" text-anchor="middle" font-size="10" fill="#374151">키 라이트 보조</text>
  <text x="85" y="142" text-anchor="middle" font-size="10" fill="#374151">모니터 바 후면</text>

  <!-- Right panel - network -->
  <rect x="660" y="70" width="110" height="90" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="715" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">네트워크</text>
  <text x="715" y="110" text-anchor="middle" font-size="10" fill="#374151">WiFi 6E 라우터</text>
  <text x="715" y="126" text-anchor="middle" font-size="10" fill="#374151">유선 기가비트</text>
  <text x="715" y="142" text-anchor="middle" font-size="10" fill="#374151">NAS 백업</text>

  <!-- Budget breakdown -->
  <rect x="30" y="365" width="740" height="70" rx="8" fill="#374151" stroke="#1F2937" stroke-width="1.5"/>
  <text x="400" y="385" text-anchor="middle" font-size="13" font-weight="bold" fill="white">단계별 투자 계획</text>
  <rect x="45" y="393" width="155" height="28" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="122" y="411" text-anchor="middle" font-size="11" fill="#1D4ED8">1단계 ~50만원</text>
  <text x="122" y="425" text-anchor="middle" font-size="9" fill="#9CA3AF" dy="-2">모니터 + 체어</text>
  <rect x="215" y="393" width="155" height="28" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="292" y="411" text-anchor="middle" font-size="11" fill="#065F46">2단계 ~100만원</text>
  <text x="292" y="425" text-anchor="middle" font-size="9" fill="#9CA3AF" dy="-2">스탠딩 데스크 추가</text>
  <rect x="385" y="393" width="155" height="28" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="462" y="411" text-anchor="middle" font-size="11" fill="#92400E">3단계 ~200만원</text>
  <text x="462" y="425" text-anchor="middle" font-size="9" fill="#9CA3AF" dy="-2">입력장치 + 오디오</text>
  <rect x="555" y="393" width="205" height="28" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="657" y="411" text-anchor="middle" font-size="11" fill="#4C1D95">완성형 ~400만원+</text>
  <text x="657" y="425" text-anchor="middle" font-size="9" fill="#9CA3AF" dy="-2">조명 + 어쿠스틱 패널</text>
</svg>
