<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Qdrant Cloud workflow 2026</title>
  <desc id="desc">Managed Qdrant workflow showing reduced operational burden with the same vector search flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08131d"/>
      <stop offset="100%" stop-color="#17324a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 40px/1.2 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .sub { font: 400 18px/1.5 'Segoe UI', Arial, sans-serif; fill: #cad8e8; }
      .box { font: 700 20px/1.2 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .small { font: 400 16px/1.4 'Segoe UI', Arial, sans-serif; fill: #e6eef8; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="84" class="title">Qdrant Cloud workflow</text>
  <text x="70" y="118" class="sub">Managed vector search with less infrastructure to run</text>

  <rect x="70" y="200" width="180" height="94" rx="20" fill="#0f4c81" filter="url(#shadow)"/>
  <text x="112" y="240" class="box">App</text>
  <text x="95" y="268" class="small">API / agent</text>

  <rect x="305" y="176" width="210" height="142" rx="24" fill="#1f8a70" filter="url(#shadow)"/>
  <text x="352" y="222" class="box">Qdrant Cloud</text>
  <text x="344" y="252" class="small">managed scaling</text>
  <text x="330" y="280" class="small">backup / ops reduced</text>

  <rect x="580" y="176" width="170" height="84" rx="20" fill="#cc6b2c" filter="url(#shadow)"/>
  <text x="615" y="226" class="box">Search</text>

  <rect x="800" y="176" width="170" height="84" rx="20" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="842" y="226" class="box">Answer</text>

  <rect x="580" y="286" width="390" height="84" rx="20" fill="#0b5c84" filter="url(#shadow)"/>
  <text x="626" y="336" class="box">Less ops, same retrieval pattern</text>

  <path d="M250 247 L305 247" stroke="#9fb2c8" stroke-width="7" stroke-linecap="round"/>
  <path d="M515 247 L580 218" stroke="#9fb2c8" stroke-width="7" stroke-linecap="round"/>
  <path d="M750 218 L800 218" stroke="#9fb2c8" stroke-width="7" stroke-linecap="round"/>

  <text x="70" y="456" class="sub">Use Qdrant Cloud when you want the retrieval stack to stay stable while the team focuses on product work.</text>
</svg>
