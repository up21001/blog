<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Vector Database Operations Choice Flow</title>
  <desc id="desc">Decision flow for selecting operational patterns in vector databases.</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <text x="64" y="76" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Operational Choice Flow</text>
  <text x="64" y="112" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Pick the operating model before the data grows.</text>
  <rect x="64" y="180" width="250" height="340" rx="24" fill="#eff6ff" stroke="#93c5fd"/>
  <rect x="336" y="180" width="250" height="340" rx="24" fill="#ecfdf5" stroke="#86efac"/>
  <rect x="608" y="180" width="250" height="340" rx="24" fill="#fff7ed" stroke="#fdba74"/>
  <rect x="880" y="180" width="250" height="340" rx="24" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="128" y="236" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Managed</text>
  <text x="128" y="272" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Qdrant Cloud</text>
  <text x="128" y="304" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#334155">fast ops, less toil</text>
  <text x="400" y="236" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Self-host</text>
  <text x="400" y="272" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Qdrant / pgvector</text>
  <text x="400" y="304" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#334155">more control</text>
  <text x="672" y="236" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Tune</text>
  <text x="672" y="272" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#334155">index, filter, backup</text>
  <text x="672" y="304" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#334155">benchmark before change</text>
  <text x="944" y="236" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Recover</text>
  <text x="944" y="272" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#334155">restore, reindex</text>
  <text x="944" y="304" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#334155">alert on drift</text>
  <path d="M314 350 L336 350" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#m)"/>
  <path d="M586 350 L608 350" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#m)"/>
  <path d="M858 350 L880 350" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#m)"/>
  <defs>
    <marker id="m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
