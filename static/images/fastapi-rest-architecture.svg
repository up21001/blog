<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', sans-serif">
  <rect width="800" height="450" fill="#F9FAFB" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F2937">FastAPI REST 서버 아키텍처</text>

  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- 클라이언트 -->
  <rect x="30" y="185" width="120" height="80" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="90" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">클라이언트</text>
  <text x="90" y="236" text-anchor="middle" font-size="11" fill="#3B82F6">Browser</text>
  <text x="90" y="252" text-anchor="middle" font-size="11" fill="#3B82F6">Mobile App</text>

  <line x1="150" y1="225" x2="195" y2="225" stroke="#6B7280" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- FastAPI 앱 -->
  <rect x="195" y="80" width="200" height="300" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2.5"/>
  <text x="295" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#065F46">FastAPI App</text>

  <rect x="215" y="125" width="160" height="36" rx="6" fill="white" stroke="#10B981"/>
  <text x="295" y="148" text-anchor="middle" font-size="12" fill="#065F46">Router (경로 정의)</text>

  <rect x="215" y="172" width="160" height="36" rx="6" fill="white" stroke="#10B981"/>
  <text x="295" y="195" text-anchor="middle" font-size="12" fill="#065F46">Pydantic 스키마</text>

  <rect x="215" y="219" width="160" height="36" rx="6" fill="white" stroke="#10B981"/>
  <text x="295" y="242" text-anchor="middle" font-size="12" fill="#065F46">Dependency Injection</text>

  <rect x="215" y="266" width="160" height="36" rx="6" fill="white" stroke="#10B981"/>
  <text x="295" y="289" text-anchor="middle" font-size="12" fill="#065F46">JWT 인증 미들웨어</text>

  <rect x="215" y="313" width="160" height="36" rx="6" fill="white" stroke="#10B981"/>
  <text x="295" y="336" text-anchor="middle" font-size="12" fill="#065F46">자동 Swagger Docs</text>

  <!-- 화살표 -->
  <line x1="395" y1="225" x2="440" y2="225" stroke="#6B7280" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- 서비스 레이어 -->
  <rect x="440" y="160" width="160" height="130" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="520" y="188" text-anchor="middle" font-size="13" font-weight="bold" fill="#5B21B6">Service Layer</text>
  <text x="520" y="210" text-anchor="middle" font-size="11" fill="#7C3AED">비즈니스 로직</text>
  <text x="520" y="228" text-anchor="middle" font-size="11" fill="#7C3AED">SQLAlchemy ORM</text>
  <text x="520" y="246" text-anchor="middle" font-size="11" fill="#7C3AED">async / await</text>
  <text x="520" y="264" text-anchor="middle" font-size="11" fill="#7C3AED">Celery 태스크</text>

  <line x1="600" y1="225" x2="640" y2="225" stroke="#6B7280" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- DB -->
  <rect x="640" y="150" width="130" height="70" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="705" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">PostgreSQL</text>
  <text x="705" y="200" text-anchor="middle" font-size="11" fill="#92400E">asyncpg 드라이버</text>

  <rect x="640" y="235" width="130" height="70" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="705" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="#991B1B">Redis</text>
  <text x="705" y="285" text-anchor="middle" font-size="11" fill="#991B1B">캐싱 / 세션</text>

  <!-- 하단 배포 -->
  <rect x="195" y="400" width="575" height="36" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="482" y="423" text-anchor="middle" font-size="12" fill="#374151">배포: Uvicorn + Docker + Gunicorn · Kubernetes</text>
</svg>
