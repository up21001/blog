baseURL = "https://blog-8ye.pages.dev"
languageCode = "ko"
defaultContentLanguage = "ko"
title = "통합 블로그 | 하드웨어·소프트웨어·AI 엔지니어링"
theme = "blowfish"
enableRobotsTXT = true
[pagination]
  pagerSize = 10

[params]
  colorScheme = "ocean"
  defaultAppearance = "light"
  autoSwitchAppearance = true
  enableSearch = true
  enableCodeCopy = true
  mainSections = ["posts"]
  description = "하드웨어/소프트웨어 엔지니어의 기술 블로그 - PCB 설계, 임베디드, AI, DevOps 실전 경험 공유"
  keywords = ["하드웨어", "소프트웨어", "AI", "임베디드", "PCB 설계", "Python", "DevOps"]

[params.author]
  name = "Engineer"

[params.homepage]
  layout = "profile"
  showRecent = true
  recentLimit = 5

[params.article]
  showDate = true
  showAuthor = true
  showTableOfContents = true
  showReadingTime = true
  showWordCount = true
  showRelatedContent = true
  relatedContentLimit = 3
  showEdit = false
  showHeadingAnchors = true

[params.footer]
  showCopyright = true
  showThemeAttribution = false
  showScrollToTop = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[markup]
  [markup.highlight]
    style = "github"
    lineNos = true
    lineNumbersInTable = true

