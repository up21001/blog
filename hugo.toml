baseURL = "https://blog-8ye.pages.dev"
languageCode = "ko"
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = false
disableLanguages = ["en"]
# 미래 날짜 글도 HTML/RSS/index.json에 포함 (예: 발행일이 오늘보다 뒤인 초안 공개 글)
buildFuture = true
title = "통합 블로그"
description = "하드웨어/소프트웨어 엔지니어의 기술 블로그 - PCB 설계, 임베디드, AI, DevOps 실전 경험 공유"
theme = "blowfish"
enableRobotsTXT = true
[permalinks]
  posts = "/posts/:slug/"

[pagination]
  pagerSize = 10

[params]
  colorScheme = "ocean"
  description = "하드웨어/소프트웨어 엔지니어의 기술 블로그 - PCB 설계, 임베디드, AI, DevOps 실전 경험 공유"
  keywords = ["하드웨어", "소프트웨어", "AI", "임베디드", "PCB 설계", "Python", "DevOps"]
  defaultAppearance = "light"
  autoSwitchAppearance = true
  enableSearch = true
  enableCodeCopy = true
  mainSections = ["posts"]

[params.verification]
  google = "dUlA-mHlZxD1WkU1NXY2THAW5fT5Oa0Kmw6IM6jF1Bw"
  bing = "2A34F9D8910EAE2FB3B6D41CCA337145"

[params.author]
  name = "Engineer"

[params.homepage]
  layout = "profile"
  showRecent = true
  recentLimit = 12

[params.list]
  showHero = true
  heroStyle = "basic"

[params.term]
  showHero = true
  heroStyle = "basic"

[params.taxonomy]
  showHero = true
  heroStyle = "basic"

[params.article]
  showDate = true
  showAuthor = true
  showTableOfContents = true
  showReadingTime = true
  showWordCount = true
  showRelatedContent = false
  relatedContentLimit = 0
  showEdit = false
  showHeadingAnchors = true

[params.footer]
  showCopyright = true
  showThemeAttribution = false
  showScrollToTop = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = "categories"
  series = "series"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"
    lineNos = true
    lineNumbersInTable = true

